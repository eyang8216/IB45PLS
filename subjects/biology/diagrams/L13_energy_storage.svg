<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs><style>text { font-family: Arial, sans-serif; } .title { font-size: 18px; font-weight: bold; fill: #1a6b3c; text-anchor: middle; } .lab { font-size: 13px; fill: #333; text-anchor: middle; } .sm { font-size: 11px; fill: #555; text-anchor: middle; } .big { font-size: 22px; font-weight: bold; text-anchor: middle; }</style></defs>
  <rect width="600" height="400" fill="#fff"/>
  <text x="300" y="28" class="title">Energy Storage: Lipids vs Carbohydrates</text>

  <!-- Two comparison columns -->
  <rect x="20" y="45" width="270" height="280" rx="8" fill="#fff3e0" stroke="#ffb74d" stroke-width="2"/>
  <text x="155" y="72" class="lab" fill="#e65100" font-weight="bold">Lipids (Triglycerides)</text>
  <text x="155" y="100" class="big" fill="#e65100">~38 kJ/g</text>
  <text x="155" y="118" class="sm">(~9 kcal/g)</text>
  <text x="155" y="145" class="lab" fill="#333">✓ More reduced (more C-H bonds)</text>
  <text x="155" y="165" class="lab" fill="#333">✓ Anhydrous storage (no water)</text>
  <text x="155" y="185" class="lab" fill="#333">✓ Stored as droplets in adipose</text>
  <text x="155" y="205" class="lab" fill="#333">✗ Slower mobilization</text>
  <text x="155" y="225" class="lab" fill="#333">✗ Requires β-oxidation</text>
  <text x="155" y="250" class="lab" font-weight="bold" fill="#e65100">Long-term energy storage</text>
  <text x="155" y="270" class="sm" fill="#e65100">"Savings account"</text>

  <rect x="310" y="45" width="270" height="280" rx="8" fill="#e8f5e9" stroke="#81c784" stroke-width="2"/>
  <text x="445" y="72" class="lab" fill="#1a6b3c" font-weight="bold">Carbohydrates (Glycogen/Starch)</text>
  <text x="445" y="100" class="big" fill="#1a6b3c">~17 kJ/g</text>
  <text x="445" y="118" class="sm">(~4 kcal/g)</text>
  <text x="445" y="145" class="lab" fill="#333">✓ Rapid mobilization</text>
  <text x="445" y="165" class="lab" fill="#333">✓ Easily accessible</text>
  <text x="445" y="185" class="lab" fill="#333">✗ Hydrated (~2-3g water/g)</text>
  <text x="445" y="205" class="lab" fill="#333">✗ More oxidized (C-OH groups)</text>
  <text x="445" y="225" class="lab" fill="#333">✗ Higher osmotic effect</text>
  <text x="445" y="250" class="lab" font-weight="bold" fill="#1a6b3c">Short-term energy</text>
  <text x="445" y="270" class="sm" fill="#1a6b3c">"Cash in wallet"</text>

  <!-- Ratio callout -->
  <rect x="80" y="340" width="440" height="50" rx="6" fill="#e8eaf6" stroke="#7986cb" stroke-width="2"/>
  <text x="300" y="360" class="lab" font-weight="bold" fill="#283593">Lipids store ~2.2× more energy per gram than carbohydrates</text>
  <text x="300" y="380" class="sm">Why: Lipids are more reduced (more C-H) + stored anhydrously (no associated water)</text>
</svg>
