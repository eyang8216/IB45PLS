<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 550" font-family="Arial, sans-serif">
  <rect width="600" height="550" fill="#fff"/>
  <text x="300" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Positive Feedback: Permafrost Melt &amp; Tipping Points</text>

  <!-- Permafrost feedback -->
  <text x="150" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#e53935">Permafrost Melt — Positive Feedback</text>

  <g transform="translate(30,70)">
    <!-- Cycle -->
    <circle cx="120" cy="0" r="50" fill="none" stroke="#e53935" stroke-width="2.5"/>
    <text x="120" y="-15" text-anchor="middle" font-size="10" fill="#e53935" font-weight="bold">Global</text>
    <text x="120" y="-2" text-anchor="middle" font-size="10" fill="#e53935" font-weight="bold">Warming</text>

    <circle cx="120" cy="120" r="50" fill="none" stroke="#ff8f00" stroke-width="2.5"/>
    <text x="120" y="105" text-anchor="middle" font-size="10" fill="#ff8f00" font-weight="bold">Permafrost</text>
    <text x="120" y="118" text-anchor="middle" font-size="10" fill="#ff8f00" font-weight="bold">Thaws</text>

    <circle cx="120" cy="240" r="50" fill="none" stroke="#e53935" stroke-width="2.5"/>
    <text x="120" y="225" text-anchor="middle" font-size="10" fill="#e53935" font-weight="bold">CH₄ + CO₂</text>
    <text x="120" y="238" text-anchor="middle" font-size="10" fill="#e53935" font-weight="bold">Released</text>

    <circle cx="120" cy="360" r="50" fill="none" stroke="#ff8f00" stroke-width="2.5"/>
    <text x="120" y="345" text-anchor="middle" font-size="10" fill="#ff8f00" font-weight="bold">More</text>
    <text x="120" y="358" text-anchor="middle" font-size="10" fill="#ff8f00" font-weight="bold">Warming</text>

    <text x="120" y="430" text-anchor="middle" font-size="10" fill="#e53935" font-weight="bold">→ Amplifies original change ←</text>

    <!-- Arrows -->
    <defs><marker id="arrPF" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#e53935"/></marker></defs>
    <path d="M120 50 L120 70" stroke="#e53935" stroke-width="2.5" marker-end="url(#arrPF)"/>
    <path d="M120 170 L120 190" stroke="#e53935" stroke-width="2.5" marker-end="url(#arrPF)"/>
    <path d="M120 290 L120 310" stroke="#e53935" stroke-width="2.5" marker-end="url(#arrPF)"/>

    <text x="200" y="90" font-size="9" fill="#e53935">→</text>
    <text x="200" y="210" font-size="9" fill="#e53935">→</text>
    <text x="200" y="330" font-size="9" fill="#e53935">→</text>
  </g>

  <!-- Info box -->
  <g transform="translate(280,80)">
    <rect x="0" y="0" width="290" height="80" rx="6" fill="#e53935" opacity="0.08"/>
    <text x="145" y="18" text-anchor="middle" font-size="10" font-weight="bold" fill="#e53935">Key Facts</text>
    <text x="10" y="36" font-size="9" fill="#333">• ~1,400–1,600 GtC locked in permafrost</text>
    <text x="10" y="52" font-size="9" fill="#333">• Double the carbon in today's atmosphere</text>
    <text x="10" y="68" font-size="9" fill="#333">• Arctic warming ~3−4× global average rate</text>
  </g>

  <!-- Tipping point diagram -->
  <text x="450" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">Tipping Points</text>

  <g transform="translate(300,180)">
    <!-- Ball-in-valley -->
    <text x="0" y="0" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Ball-in-Valley: Alternative Stable States</text>

    <!-- Valley 1 -->
    <path d="M-180 90 Q-140 10 -90 90 Q-60 130 -30 90" fill="none" stroke="#333" stroke-width="2.5"/>
    <circle cx="-90" cy="82" r="10" fill="#1a6b3c" opacity="0.7"/>
    <text x="-90" y="115" text-anchor="middle" font-size="9" fill="#1a6b3c">State 1</text>
    <text x="-90" y="128" text-anchor="middle" font-size="8" fill="#333">(Stable)</text>

    <!-- Hill between -->
    <path d="M-30 90 Q0 10 30 90" fill="none" stroke="#333" stroke-width="2.5"/>
    <text x="0" y="22" text-anchor="middle" font-size="9" fill="#e53935" font-weight="bold">TIPPING</text>
    <text x="0" y="35" text-anchor="middle" font-size="9" fill="#e53935" font-weight="bold">POINT</text>

    <!-- Valley 2 -->
    <path d="M30 90 Q60 130 90 90 Q140 10 180 80" fill="none" stroke="#333" stroke-width="2.5"/>
    <circle cx="90" cy="82" r="10" fill="#e53935" opacity="0.7"/>
    <text x="90" y="115" text-anchor="middle" font-size="9" fill="#e53935">State 2</text>
    <text x="90" y="128" text-anchor="middle" font-size="8" fill="#333">(Alternative)</text>

    <text x="0" y="155" text-anchor="middle" font-size="9" fill="#333">Hysteresis: path to State 2 is different from path back to State 1</text>
  </g>

  <!-- Examples -->
  <rect x="30" y="380" width="540" height="155" rx="8" fill="none" stroke="#ddd" stroke-width="2"/>
  <text x="300" y="402" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Examples of Alternative Stable States</text>

  <g font-size="9" fill="#333">
    <text x="50" y="425">• <tspan font-weight="bold">Coral reefs:</tspan> Coral-dominated ↔ Algae-dominated (overfishing + nutrients → algae outcompete coral)</text>
    <text x="50" y="445">• <tspan font-weight="bold">Shallow lakes:</tspan> Clear water + macrophytes ↔ Turbid water + phytoplankton (nutrient loading → shift)</text>
    <text x="50" y="465">• <tspan font-weight="bold">Kelp forests:</tspan> Kelp-dominated + otters ↔ Urchin barrens (otter removal → urchin explosion → kelp grazed)</text>
    <text x="50" y="485">• <tspan font-weight="bold">Savanna-Forest:</tspan> Fire-maintained savanna ↔ Closed forest (fire suppression → tree seedlings survive → shade out grass)</text>
    <text x="50" y="505">• <tspan font-weight="bold">Amazon rainforest:</tspan> Rainforest ↔ Savanna (deforestation → reduced rainfall → loss of self-sustaining moisture)</text>
  </g>
</svg>