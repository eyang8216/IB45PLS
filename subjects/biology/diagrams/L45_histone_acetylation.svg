<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" font-family="Arial, sans-serif">
  <rect width="600" height="520" fill="#fff"/>
  <text x="300" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Histone Acetylation: Chromatin Remodeling</text>

  <!-- Left: Acetylated - Euchromatin -->
  <text x="180" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a6b3c">Acetylated — Euchromatin (Active)</text>

  <!-- DNA loosely wrapped -->
  <g transform="translate(180,95)">
    <!-- Nucleosome cores -->
    <circle cx="-80" cy="0" r="18" fill="#81c784" stroke="#1a6b3c" stroke-width="2"/>
    <circle cx="0" cy="0" r="18" fill="#81c784" stroke="#1a6b3c" stroke-width="2"/>
    <circle cx="80" cy="0" r="18" fill="#81c784" stroke="#1a6b3c" stroke-width="2"/>

    <!-- DNA loosely wrapped -->
    <path d="M-120,-10 Q-100,-30 -80,-18 Q-60,-6 -60,10 Q-60,25 -40,18 Q-20,10 -20,-10 Q-20,-30 0,-18 Q20,-6 20,10 Q20,25 40,18 Q60,10 60,-10 Q60,-30 80,-18 Q100,-6 100,10" fill="none" stroke="#1565c0" stroke-width="2.5"/>

    <!-- Acetyl groups on histone tails -->
    <line x1="-80" y1="18" x2="-95" y2="40" stroke="#1a6b3c" stroke-width="1.5"/>
    <circle cx="-95" cy="43" r="4" fill="#ff8f00"/>
    <text x="-95" y="52" text-anchor="middle" font-size="6" fill="#ff8f00">Ac</text>

    <line x1="-80" y1="18" x2="-65" y2="38" stroke="#1a6b3c" stroke-width="1.5"/>
    <circle cx="-65" cy="41" r="4" fill="#ff8f00"/>
    <text x="-65" y="50" text-anchor="middle" font-size="6" fill="#ff8f00">Ac</text>

    <line x1="0" y1="18" x2="15" y2="40" stroke="#1a6b3c" stroke-width="1.5"/>
    <circle cx="15" cy="43" r="4" fill="#ff8f00"/>
    <text x="15" y="52" text-anchor="middle" font-size="6" fill="#ff8f00">Ac</text>

    <line x1="80" y1="18" x2="65" y2="38" stroke="#1a6b3c" stroke-width="1.5"/>
    <circle cx="65" cy="41" r="4" fill="#ff8f00"/>
    <text x="65" y="50" text-anchor="middle" font-size="6" fill="#ff8f00">Ac</text>

    <line x1="80" y1="18" x2="95" y2="40" stroke="#1a6b3c" stroke-width="1.5"/>
    <circle cx="95" cy="43" r="4" fill="#ff8f00"/>
    <text x="95" y="52" text-anchor="middle" font-size="6" fill="#ff8f00">Ac</text>

    <!-- HAT label -->
    <text x="-120" y="70" font-size="9" fill="#ff8f00">HAT adds acetyl</text>

    <!-- RNA Pol accessing -->
    <g transform="translate(-30, -40)">
      <ellipse cx="0" cy="0" rx="22" ry="12" fill="#43a047" opacity="0.8"/>
      <text x="0" y="-2" text-anchor="middle" font-size="7" fill="#fff">RNAP</text>
      <text x="0" y="8" text-anchor="middle" font-size="6" fill="#fff">access OK</text>
    </g>
  </g>

  <!-- HAT mechanism text -->
  <text x="180" y="175" text-anchor="middle" font-size="10" fill="#1a6b3c">Acetyl groups on lysine tails neutralize +ve charge</text>
  <text x="180" y="192" text-anchor="middle" font-size="10" fill="#1a6b3c">→ DNA-histone interaction loosens → open chromatin</text>
  <text x="180" y="209" text-anchor="middle" font-size="10" fill="#1a6b3c">→ Transcription factors and RNAP can access DNA</text>

  <!-- Divider -->
  <line x1="30" y1="225" x2="570" y2="225" stroke="#ddd" stroke-width="1.5"/>

  <!-- Right: Deacetylated - Heterochromatin -->
  <text x="180" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#e53935">Deacetylated — Heterochromatin (Silent)</text>

  <g transform="translate(180,295)">
    <!-- Nucleosome cores tightly packed -->
    <circle cx="-80" cy="0" r="18" fill="#bbb" stroke="#999" stroke-width="2"/>
    <circle cx="-45" cy="0" r="18" fill="#999" stroke="#777" stroke-width="2"/>
    <circle cx="-10" cy="0" r="18" fill="#bbb" stroke="#999" stroke-width="2"/>
    <circle cx="25" cy="0" r="18" fill="#999" stroke="#777" stroke-width="2"/>
    <circle cx="60" cy="0" r="18" fill="#bbb" stroke="#999" stroke-width="2"/>

    <!-- DNA tightly wrapped -->
    <path d="M-120,-12 Q-100,-25 -80,-12 Q-60,0 -60,12 Q-60,25 -45,12 Q-30,0 -30,-12 Q-30,-25 -10,-12 Q10,0 10,12 Q10,25 25,12 Q40,0 40,-12 Q40,-25 60,-12 Q80,0 85,12" fill="none" stroke="#1565c0" stroke-width="2.5"/>

    <!-- No acetyl groups - bare tails -->
    <line x1="-80" y1="18" x2="-88" y2="35" stroke="#999" stroke-width="1.5"/>
    <line x1="-45" y1="18" x2="-38" y2="35" stroke="#999" stroke-width="1.5"/>
    <line x1="25" y1="18" x2="32" y2="35" stroke="#999" stroke-width="1.5"/>
    <line x1="60" y1="18" x2="68" y2="35" stroke="#999" stroke-width="1.5"/>

    <!-- HDAC label -->
    <text x="-120" y="70" font-size="9" fill="#e53935">HDAC removes acetyl</text>

    <!-- RNAP blocked -->
    <g transform="translate(-30, -40)">
      <ellipse cx="0" cy="0" rx="22" ry="12" fill="#e53935" opacity="0.6"/>
      <text x="0" y="-2" text-anchor="middle" font-size="7" fill="#fff">RNAP</text>
      <text x="0" y="8" text-anchor="middle" font-size="6" fill="#fff">BLOCKED</text>
    </g>
  </g>

  <text x="180" y="375" text-anchor="middle" font-size="10" fill="#e53935">No acetyl groups → histones retain +ve charge</text>
  <text x="180" y="392" text-anchor="middle" font-size="10" fill="#e53935">→ DNA tightly wrapped → compact chromatin</text>
  <text x="180" y="409" text-anchor="middle" font-size="10" fill="#e53935">→ Transcription factors and RNAP excluded</text>

  <!-- Bottom summary -->
  <rect x="30" y="430" width="540" height="80" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="452" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Enzyme Roles</text>

  <g transform="translate(60,465)">
    <rect x="0" y="0" width="200" height="28" rx="4" fill="#ff8f00" opacity="0.15"/>
    <text x="100" y="13" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">HAT (Histone Acetyltransferase)</text>
    <text x="100" y="25" text-anchor="middle" font-size="9" fill="#333">Adds acetyl → loosens → activates</text>
  </g>

  <g transform="translate(310,465)">
    <rect x="0" y="0" width="200" height="28" rx="4" fill="#e53935" opacity="0.15"/>
    <text x="100" y="13" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">HDAC (Histone Deacetylase)</text>
    <text x="100" y="25" text-anchor="middle" font-size="9" fill="#333">Removes acetyl → tightens → silences</text>
  </g>
</svg>