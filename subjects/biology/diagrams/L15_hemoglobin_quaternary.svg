<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs><style>text { font-family: Arial, sans-serif; } .title { font-size: 18px; font-weight: bold; fill: #1a6b3c; text-anchor: middle; } .lab { font-size: 13px; fill: #333; text-anchor: middle; } .sm { font-size: 11px; fill: #555; text-anchor: middle; }</style></defs>
  <rect width="600" height="450" fill="#fff"/>
  <text x="300" y="28" class="title">Hemoglobin — Quaternary Structure (α₂β₂ Tetramer)</text>

  <!-- 4 subunits -->
  <!-- α1 -->
  <ellipse cx="200" cy="125" rx="55" ry="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
  <text x="200" y="120" class="lab" fill="#1565c0" font-weight="bold">α₁ subunit</text>
  <text x="200" y="137" class="sm" fill="#1565c0">141 amino acids</text>
  <!-- Heme + Fe -->
  <rect x="188" y="150" width="24" height="16" rx="2" fill="#ff8f00" stroke="#e65100" stroke-width="1.5"/>
  <circle cx="200" cy="158" r="4" fill="#e53935"/>
  <text x="212" y="175" class="sm" fill="#e53935">Heme + Fe²⁺</text>

  <!-- α2 -->
  <ellipse cx="400" cy="125" rx="55" ry="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
  <text x="400" y="120" class="lab" fill="#1565c0" font-weight="bold">α₂ subunit</text>
  <text x="400" y="137" class="sm" fill="#1565c0">141 amino acids</text>
  <rect x="388" y="150" width="24" height="16" rx="2" fill="#ff8f00" stroke="#e65100" stroke-width="1.5"/>
  <circle cx="400" cy="158" r="4" fill="#e53935"/>
  <text x="412" y="175" class="sm" fill="#e53935">Heme + Fe²⁺</text>

  <!-- β1 -->
  <ellipse cx="200" cy="260" rx="55" ry="40" fill="#e8f5e9" stroke="#43a047" stroke-width="3"/>
  <text x="200" y="255" class="lab" fill="#1a6b3c" font-weight="bold">β₁ subunit</text>
  <text x="200" y="272" class="sm" fill="#1a6b3c">146 amino acids</text>
  <rect x="188" y="285" width="24" height="16" rx="2" fill="#ff8f00" stroke="#e65100" stroke-width="1.5"/>
  <circle cx="200" cy="293" r="4" fill="#e53935"/>
  <text x="212" y="310" class="sm" fill="#e53935">Heme + Fe²⁺</text>

  <!-- β2 -->
  <ellipse cx="400" cy="260" rx="55" ry="40" fill="#e8f5e9" stroke="#43a047" stroke-width="3"/>
  <text x="400" y="255" class="lab" fill="#1a6b3c" font-weight="bold">β₂ subunit</text>
  <text x="400" y="272" class="sm" fill="#1a6b3c">146 amino acids</text>
  <rect x="388" y="285" width="24" height="16" rx="2" fill="#ff8f00" stroke="#e65100" stroke-width="1.5"/>
  <circle cx="400" cy="293" r="4" fill="#e53935"/>
  <text x="412" y="310" class="sm" fill="#e53935">Heme + Fe²⁺</text>

  <!-- O2 molecules -->
  <text x="165" y="195" class="sm" fill="#1565c0">O₂</text>
  <text x="435" y="195" class="sm" fill="#1565c0">O₂</text>
  <text x="165" y="330" class="sm" fill="#43a047">O₂</text>
  <text x="435" y="330" class="sm" fill="#43a047">O₂</text>

  <!-- Cooperative binding note -->
  <rect x="40" y="360" width="520" height="80" rx="8" fill="#fff3e0" stroke="#ffb74d" stroke-width="2"/>
  <text x="300" y="380" class="lab" fill="#e65100" font-weight="bold">Cooperative O₂ Binding → Sigmoidal Curve</text>
  <text x="300" y="400" class="sm">T-state (tense, low affinity) → first O₂ binds → conformational shift → R-state (relaxed, high affinity)</text>
  <text x="300" y="417" class="sm">4th O₂ binds with ~300× higher affinity than 1st. Each Hb carries 4 O₂ molecules total.</text>
  <text x="300" y="434" class="sm">Quaternary structure allows cooperativity — myoglobin (single subunit) has hyperbolic curve</text>
</svg>
