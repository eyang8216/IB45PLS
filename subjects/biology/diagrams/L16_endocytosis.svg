<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Endocytosis: Three Types</text>

  <!-- PHAGOCYTOSIS -->
  <g>
    <rect x="15" y="40" width="180" height="340" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
    <text x="105" y="60" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">PHAGOCYTOSIS</text>
    <text x="105" y="76" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">"Cell eating"</text>

    <!-- Membrane -->
    <path d="M30,100 Q105,130 180,100" fill="none" stroke="#1a6b3c" stroke-width="3"/>

    <!-- Particle -->
    <circle cx="105" cy="88" r="15" fill="#e53935" opacity="0.8"/>
    <text x="105" y="92" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Bacterium</text>

    <!-- Pseudopodia -->
    <path d="M70,100 Q65,85 80,82" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>
    <path d="M140,100 Q145,85 130,82" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>

    <text x="105" y="135" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Pseudopodia extend</text>
    <text x="105" y="148" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">and engulf particle</text>

    <!-- Phagosome -->
    <circle cx="105" cy="190" r="25" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>
    <circle cx="105" cy="190" r="12" fill="#e53935" opacity="0.7"/>
    <text x="105" y="193" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">particle</text>
    <text x="105" y="225" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Phagosome</text>

    <!-- Lysosome fusion -->
    <circle cx="105" cy="270" r="25" fill="none" stroke="#6a1b9a" stroke-width="2.5" stroke-dasharray="4,2"/>
    <circle cx="105" cy="270" r="12" fill="#6a1b9a" opacity="0.5"/>
    <text x="105" y="273" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">digested</text>
    <text x="105" y="305" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Phagolysosome</text>

    <text x="105" y="330" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Large particles</text>
    <text x="105" y="343" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(e.g. bacteria, debris)</text>
    <text x="105" y="358" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Macrophages, neutrophils</text>
  </g>

  <!-- PINOCYTOSIS -->
  <g>
    <rect x="210" y="40" width="180" height="340" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
    <text x="300" y="60" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">PINOCYTOSIS</text>
    <text x="300" y="76" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">"Cell drinking"</text>

    <path d="M225,100 Q300,120 375,100" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>

    <!-- Fluid droplets -->
    <circle cx="270" cy="95" r="5" fill="#1565c0" opacity="0.6"/>
    <circle cx="300" cy="90" r="5" fill="#1565c0" opacity="0.6"/>
    <circle cx="330" cy="95" r="5" fill="#1565c0" opacity="0.6"/>
    <circle cx="285" cy="105" r="4" fill="#1565c0" opacity="0.4"/>
    <circle cx="315" cy="108" r="4" fill="#1565c0" opacity="0.4"/>

    <text x="300" y="130" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Membrane folds inward</text>
    <text x="300" y="143" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">traps extracellular fluid</text>

    <!-- Vesicle -->
    <circle cx="300" cy="185" r="22" fill="none" stroke="#1565c0" stroke-width="2.5"/>
    <circle cx="290" cy="180" r="6" fill="#1565c0" opacity="0.5"/>
    <circle cx="310" cy="185" r="6" fill="#1565c0" opacity="0.5"/>
    <circle cx="300" cy="195" r="5" fill="#1565c0" opacity="0.5"/>
    <text x="300" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Pinocytic vesicle</text>

    <text x="300" y="320" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Non-specific</text>
    <text x="300" y="335" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Solute + fluid uptake</text>
    <text x="300" y="350" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Most cells perform this</text>
  </g>

  <!-- RECEPTOR-MEDIATED -->
  <g>
    <rect x="405" y="40" width="180" height="340" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
    <text x="495" y="60" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">RECEPTOR-MEDIATED</text>
    <text x="495" y="76" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Specific uptake</text>

    <path d="M420,100 Q495,120 570,100" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>

    <!-- Receptors -->
    <g fill="#6a1b9a">
      <path d="M450,100 L450,85 L445,90 M450,85 L455,90" stroke="#6a1b9a" stroke-width="1.5"/>
      <path d="M480,102 L480,87 L475,92 M480,87 L485,92" stroke="#6a1b9a" stroke-width="1.5"/>
      <path d="M510,102 L510,87 L505,92 M510,87 L515,92" stroke="#6a1b9a" stroke-width="1.5"/>
      <path d="M540,100 L540,85 L535,90 M540,85 L545,90" stroke="#6a1b9a" stroke-width="1.5"/>
    </g>
    <!-- Ligands -->
    <g fill="#ff8f00">
      <circle cx="450" cy="82" r="5"/><circle cx="480" cy="84" r="5"/>
      <circle cx="510" cy="84" r="5"/><circle cx="540" cy="82" r="5"/>
    </g>

    <text x="495" y="130" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Ligand binds receptor</text>
    <text x="495" y="143" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Clathrin-coated pit</text>

    <!-- Clathrin pit -->
    <path d="M460,170 Q495,195 530,170" fill="none" stroke="#6a1b9a" stroke-width="2.5"/>
    <path d="M460,170 Q495,200 530,170" fill="none" stroke="#6a1b9a" stroke-width="2.5" stroke-dasharray="3,2"/>
    <circle cx="495" cy="178" r="18" fill="none" stroke="#6a1b9a" stroke-width="2"/>
    <text x="495" y="182" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Clathrin</text>

    <text x="495" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Coated vesicle</text>
    <text x="495" y="228" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">buds inward</text>

    <!-- Vesicle -->
    <circle cx="495" cy="265" r="22" fill="none" stroke="#6a1b9a" stroke-width="2.5"/>
    <circle cx="495" cy="265" r="12" fill="#ff8f00" opacity="0.4"/>
    <text x="495" y="268" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">LDL</text>

    <text x="495" y="320" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Highly specific</text>
    <text x="495" y="335" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">e.g. LDL, transferrin</text>
    <text x="495" y="350" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Receptors recycled</text>
  </g>
</svg>