<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420">
  <rect width="600" height="420" fill="#fff"/>
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#333">Sympatric Speciation — Polyploidy (Instant Speciation)</text>
  <text x="300" y="45" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">No geographic barrier — reproductive isolation within same area</text>
  <!-- Autopolyploidy -->
  <rect x="25" y="65" width="265" height="320" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="157" y="90" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">Autopolyploidy</text>
  <text x="157" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Chromosome doubling within one species</text>
  <text x="157" y="130" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Meiotic error → diploid (2n) gametes</text>
  <circle cx="110" cy="165" r="15" fill="#a5d6a7" stroke="#333" stroke-width="2"/>
  <text x="110" y="169" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">2n</text>
  <text x="110" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Parent species</text>
  <line x1="130" y1="165" x2="170" y2="165" stroke="#333" stroke-width="2"/>
  <text x="150" y="160" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Meiotic</text>
  <text x="150" y="172" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">error</text>
  <circle cx="190" cy="165" r="18" fill="#66bb6a" stroke="#333" stroke-width="2.5"/>
  <text x="190" y="169" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">4n</text>
  <text x="190" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c" font-weight="bold">Tetraploid</text>
  <text x="190" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Can self-fertilize</text>
  <text x="157" y="240" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">If 4n × 2n → sterile 3n offspring</text>
  <text x="157" y="258" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">→ INSTANT reproductive isolation</text>
  <text x="157" y="285" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Common in plants (~50% of angiosperms are polyploid)</text>
  <text x="157" y="310" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Examples: potato, alfalfa, many ferns</text>
  <!-- Allopolyploidy -->
  <rect x="310" y="65" width="265" height="320" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="442" y="90" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">Allopolyploidy</text>
  <text x="442" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Hybridization + chromosome doubling</text>
  <circle cx="390" cy="155" r="14" fill="#ce93d8" stroke="#333" stroke-width="2"/>
  <text x="390" y="159" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">SpA</text>
  <circle cx="490" cy="155" r="14" fill="#ba68c8" stroke="#333" stroke-width="2"/>
  <text x="490" y="159" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">SpB</text>
  <line x1="405" y1="155" x2="475" y2="155" stroke="#333" stroke-width="2"/>
  <text x="440" y="148" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Hybrid</text>
  <circle cx="440" cy="195" r="15" fill="#e1bee7" stroke="#333" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="440" y="199" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">F1</text>
  <text x="440" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Sterile!</text>
  <text x="440" y="233" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Chromosomes</text>
  <text x="440" y="246" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">cannot pair</text>
  <line x1="440" y1="250" x2="440" y2="270" stroke="#333" stroke-width="2"/>
  <text x="440" y="265" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Chr. doubling</text>
  <circle cx="440" cy="295" r="20" fill="#8e24aa" stroke="#333" stroke-width="2.5"/>
  <text x="440" y="293" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#fff">ALLO</text>
  <text x="440" y="308" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#fff">POLYPLOID</text>
  <text x="440" y="330" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a" font-weight="bold">FERTILE — new species!</text>
  <text x="442" y="355" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Bread wheat (hexaploid), tobacco, cotton</text>
  <text x="442" y="375" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Isolated from BOTH parent species</text>
  <!-- Bottom -->
  <rect x="50" y="398" width="500" height="18" rx="5" fill="#ff8f00" opacity="0.15"/>
  <text x="300" y="412" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Sympatric speciation: no geographic barrier — polyploidy = instant isolation</text>
</svg>