<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" width="600" height="520">
  <rect width="600" height="520" fill="white"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">L44b — Meiosis II &amp; Non-Disjunction</text>

  <!-- Meiosis II overview -->
  <text x="160" y="55" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">Meiosis II (Equational)</text>

  <rect x="15" y="68" width="280" height="100" rx="6" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="155" y="90" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">Prophase II → Metaphase II → Anaphase II → Telophase II</text>
  <text x="155" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Like mitosis of a haploid cell. No DNA replication.</text>
  <text x="155" y="128" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Centromeres split → sister chromatids separate.</text>
  <text x="155" y="148" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1a6b3c">Result: 4 genetically unique haploid gametes (n=23, 1C DNA)</text>

  <!-- Result diagram -->
  <text x="300" y="198" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Overall Outcome: 2n (diploid) → 4 × n (haploid gametes)</text>
  <g font-family="Arial" font-size="11" fill="#333">
    <text x="30" y="222">Start: 1 cell (2n=46)</text>
    <text x="30" y="240">Meiosis I: 2 cells (n=23, each chromosome = 2 chromatids)</text>
    <text x="30" y="258">Meiosis II: 4 cells (n=23, each chromosome = 1 chromatid) → genetically unique</text>
  </g>

  <!-- Non-Disjunction -->
  <text x="300" y="295" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#e53935">Non-Disjunction: When Meiosis Goes Wrong</text>

  <!-- Meiosis I ND -->
  <rect x="15" y="315" width="270" height="195" rx="6" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="150" y="340" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">Meiosis I Non-Disjunction</text>
  <!-- Show pair failing to separate -->
  <circle cx="150" cy="400" r="35" fill="none" stroke="#333" stroke-width="2"/>
  <g fill="#1565c0"><rect x="130" y="382" width="5" height="22" rx="1"/><rect x="130" y="408" width="5" height="22" rx="1"/></g>
  <g fill="#e53935"><rect x="140" y="380" width="5" height="22" rx="1"/><rect x="140" y="406" width="5" height="22" rx="1"/></g>
  <!-- Arrow to same pole -->
  <text x="170" y="395" font-family="Arial" font-size="8" fill="#e53935">→ both →</text>

  <text x="150" y="455" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Homologous pair fails to separate</text>
  <text x="150" y="472" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">→ 2 gametes with n+1</text>
  <text x="150" y="488" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">→ 2 gametes with n−1</text>
  <text x="150" y="504" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">All 4 gametes abnormal</text>

  <!-- Meiosis II ND -->
  <rect x="310" y="315" width="275" height="195" rx="6" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="447" y="340" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">Meiosis II Non-Disjunction</text>
  <circle cx="447" cy="400" r="35" fill="none" stroke="#333" stroke-width="2"/>
  <g fill="#1565c0"><rect x="427" y="382" width="5" height="22" rx="1"/><rect x="427" y="408" width="5" height="22" rx="1"/></g>
  <text x="465" y="395" font-family="Arial" font-size="8" fill="#e53935">→ both →</text>

  <text x="447" y="455" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Sister chromatids fail to separate</text>
  <text x="447" y="472" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">→ 1 gamete with n+1, 1 with n−1</text>
  <text x="447" y="488" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">→ 2 gametes normal</text>

  <!-- Trisomy table -->
  <rect x="15" y="525" width="570" height="90" rx="6" fill="#fafafa" stroke="#333" stroke-width="1.5"/>
  <text x="300" y="548" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">Fertilization of n+1 gamete → Trisomy (2n+1)</text>
  <g font-family="Arial" font-size="11" fill="#333">
    <text x="30" y="570">Trisomy 21 → Down syndrome (47,XX,+21 or 47,XY,+21): 3 copies chr 21. Most common autosomal trisomy.</text>
    <text x="30" y="590">Trisomy 18 → Edwards syndrome | Trisomy 13 → Patau syndrome | Monosomy X → Turner syndrome (XO)</text>
    <text x="30" y="608">Maternal age ↑ → risk of non-disjunction ↑ (oocytes arrested in prophase I for decades → spindle deteriorates)</text>
  </g>
</svg>