<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420">
  <rect width="600" height="420" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Positive Feedback — Permafrost Thaw Amplifying Loop</text>

  <!-- Central cycle -->
  <!-- Box 1: Warming -->
  <rect x="210" y="60" width="180" height="50" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="2.5"/>
  <text x="300" y="80" text-anchor="middle" font-family="Arial" font-size="13" fill="#e53935" font-weight="bold">🌡️ Global Warming</text>
  <text x="300" y="97" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">Rising temperatures</text>

  <!-- Down arrow -->
  <line x1="300" y1="110" x2="300" y2="135" stroke="#e53935" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <text x="310" y="126" font-family="Arial" font-size="9" fill="#e53935">↑</text>

  <!-- Box 2: Permafrost thaw -->
  <rect x="210" y="140" width="180" height="50" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2.5"/>
  <text x="300" y="160" text-anchor="middle" font-family="Arial" font-size="13" fill="#6a1b9a" font-weight="bold">🧊 Permafrost Thaws</text>
  <text x="300" y="177" text-anchor="middle" font-family="Arial" font-size="10" fill="#4a148c">Frozen ground melts</text>

  <!-- Down arrow -->
  <line x1="300" y1="190" x2="300" y2="215" stroke="#6a1b9a" stroke-width="2.5" marker-end="url(#arrowP)"/>

  <!-- Box 3: GHG release -->
  <rect x="210" y="220" width="180" height="50" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="2.5"/>
  <text x="300" y="240" text-anchor="middle" font-family="Arial" font-size="13" fill="#ff8f00" font-weight="bold">💨 CH₄ + CO₂ Released</text>
  <text x="300" y="257" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Methane &amp; Carbon Dioxide</text>

  <!-- Feedback arrow (right side, back up) -->
  <path d="M390,245 Q540,245 540,140 Q540,60 395,60" fill="none" stroke="#e53935" stroke-width="3" marker-end="url(#arrowR)" stroke-dasharray="8,3"/>
  <text x="555" y="155" font-family="Arial" font-size="11" fill="#e53935" font-weight="bold" transform="rotate(90,555,155)">POSITIVE FEEDBACK LOOP</text>

  <!-- Amplifying label -->
  <text x="480" y="140" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">More warming</text>
  <text x="480" y="155" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">→ More thaw</text>

  <!-- Additional details -->
  <rect x="30" y="60" width="140" height="55" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="100" y="80" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c" font-weight="bold">Permafrost</text>
  <text x="100" y="95" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Frozen for</text>
  <text x="100" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">thousands of years</text>

  <rect x="30" y="320" width="140" height="55" rx="6" fill="#fce4ec" stroke="#e53935" stroke-width="1.5"/>
  <text x="100" y="340" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">Amplifying</text>
  <text x="100" y="355" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Each cycle makes</text>
  <text x="100" y="368" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">the next worse</text>

  <!-- Tipping point mention -->
  <rect x="430" y="320" width="155" height="55" rx="6" fill="#fff3e0" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="507" y="340" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00" font-weight="bold">⚠️ Tipping Point</text>
  <text x="507" y="355" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Once started,</text>
  <text x="507" y="368" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">hard to stop</text>

  <!-- Bottom note -->
  <text x="300" y="408" text-anchor="middle" font-family="Arial" font-size="10" fill="#666" font-style="italic">Permafrost contains ~1,500 billion tons of carbon — twice the amount in the atmosphere</text>

  <defs>
    <marker id="arrowR" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#e53935"/></marker>
    <marker id="arrowP" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#6a1b9a"/></marker>
  </defs>
</svg>