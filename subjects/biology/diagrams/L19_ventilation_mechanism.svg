<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 650" width="600" height="650">
  <rect width="600" height="650" fill="#fff"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Ventilation Mechanism — Inhalation vs Exhalation</text>

  <!-- INHALATION -->
  <text x="150" y="65" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#1a6b3c">INHALATION (Active)</text>

  <!-- Ribcage expanded -->
  <rect x="50" y="85" width="200" height="220" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <!-- Ribs -->
  <line x1="60" y1="110" x2="240" y2="105" stroke="#333" stroke-width="2.5"/>
  <line x1="60" y1="135" x2="240" y2="128" stroke="#333" stroke-width="2.5"/>
  <line x1="60" y1="160" x2="240" y2="151" stroke="#333" stroke-width="2.5"/>

  <!-- Lungs expanded -->
  <ellipse cx="150" cy="220" rx="55" ry="50" fill="none" stroke="#43a047" stroke-width="2"/>

  <!-- Diaphragm contracted - flat -->
  <path d="M60,280 Q150,300 240,280" fill="none" stroke="#1565c0" stroke-width="3"/>
  <text x="150" y="320" text-anchor="middle" font-family="Arial" font-size="11" fill="#1565c0">Diaphragm contracts ↓</text>

  <!-- Ribs arrows -->
  <text x="250" y="118" font-family="Arial" font-size="10" fill="#43a047">↑↑</text>
  <text x="250" y="165" font-family="Arial" font-size="10" fill="#43a047">External intercostals</text>
  <text x="250" y="178" font-family="Arial" font-size="10" fill="#43a047">lift ribs upward</text>

  <!-- Volume/Pressure -->
  <text x="150" y="345" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Volume ↑ → Pressure ↓</text>
  <text x="150" y="365" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">AIR IN</text>
  <text x="150" y="382" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">(to equalize pressure)</text>

  <!-- EXHALATION -->
  <text x="450" y="65" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#e53935">EXHALATION (Passive)</text>

  <rect x="350" y="85" width="200" height="220" rx="8" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
  <!-- Ribs lowered -->
  <line x1="360" y1="130" x2="540" y2="135" stroke="#333" stroke-width="2.5"/>
  <line x1="360" y1="155" x2="540" y2="162" stroke="#333" stroke-width="2.5"/>
  <line x1="360" y1="180" x2="540" y2="189" stroke="#333" stroke-width="2.5"/>

  <!-- Lungs contracted -->
  <ellipse cx="450" cy="235" rx="45" ry="38" fill="none" stroke="#e53935" stroke-width="2"/>

  <!-- Diaphragm relaxed - dome -->
  <path d="M360,290 Q450,260 540,290" fill="none" stroke="#e53935" stroke-width="3"/>
  <text x="450" y="320" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935">Diaphragm relaxes ↑</text>

  <text x="555" y="148" font-family="Arial" font-size="10" fill="#e53935">↓↓</text>
  <text x="555" y="165" font-family="Arial" font-size="10" fill="#e53935">Ribcage</text>
  <text x="555" y="178" font-family="Arial" font-size="10" fill="#e53935">moves down</text>

  <text x="450" y="345" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Volume ↓ → Pressure ↑</text>
  <text x="450" y="365" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">AIR OUT</text>
  <text x="450" y="382" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">(elastic recoil)</text>

  <!-- Summary table -->
  <rect x="40" y="410" width="520" height="230" rx="6" fill="#f5f5f5" stroke="#333" stroke-width="1"/>
  <text x="300" y="435" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Summary: Inhalation vs Exhalation</text>

  <line x1="40" y1="448" x2="560" y2="448" stroke="#ccc" stroke-width="1"/>
  <text x="100" y="468" font-family="Arial" font-size="10" fill="#333">Feature</text>
  <text x="240" y="468" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">Inhalation</text>
  <text x="400" y="468" font-family="Arial" font-size="10" font-weight="bold" fill="#e53935">Exhalation (quiet)</text>

  <text x="100" y="490" font-family="Arial" font-size="10" fill="#333">Diaphragm</text>
  <text x="240" y="490" font-family="Arial" font-size="10" fill="#333">Contracts, flattens ↓</text>
  <text x="400" y="490" font-family="Arial" font-size="10" fill="#333">Relaxes, domes ↑</text>

  <text x="100" y="512" font-family="Arial" font-size="10" fill="#333">External intercostals</text>
  <text x="240" y="512" font-family="Arial" font-size="10" fill="#333">Contract — ribs up ↑↑</text>
  <text x="400" y="512" font-family="Arial" font-size="10" fill="#333">Relax — ribs down ↓↓</text>

  <text x="100" y="534" font-family="Arial" font-size="10" fill="#333">Thoracic volume</text>
  <text x="240" y="534" font-family="Arial" font-size="10" fill="#333">Increases</text>
  <text x="400" y="534" font-family="Arial" font-size="10" fill="#333">Decreases</text>

  <text x="100" y="556" font-family="Arial" font-size="10" fill="#333">Alveolar pressure</text>
  <text x="240" y="556" font-family="Arial" font-size="10" fill="#333">Drops below atmospheric</text>
  <text x="400" y="556" font-family="Arial" font-size="10" fill="#333">Rises above atmospheric</text>

  <text x="100" y="578" font-family="Arial" font-size="10" fill="#333">Air movement</text>
  <text x="240" y="578" font-family="Arial" font-size="10" fill="#333">Into lungs</text>
  <text x="400" y="578" font-family="Arial" font-size="10" fill="#333">Out of lungs</text>

  <text x="100" y="600" font-family="Arial" font-size="10" fill="#333">Energy required</text>
  <text x="240" y="600" font-family="Arial" font-size="10" fill="#333">Yes (muscle contraction)</text>
  <text x="400" y="600" font-family="Arial" font-size="10" fill="#333">No (elastic recoil)</text>

  <text x="300" y="630" text-anchor="middle" font-family="Arial" font-size="11" fill="#1565c0">Boyle's Law: P ∝ 1/V — pressure inversely proportional to volume</text>
</svg>
