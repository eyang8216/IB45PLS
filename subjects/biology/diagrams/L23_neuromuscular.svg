<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Neuromuscular Junction (NMJ)</text>

  <!-- Motor neuron -->
  <rect x="30" y="55" width="100" height="35" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="80" y="77" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Motor Neuron</text>

  <!-- Axon -->
  <line x1="130" y1="72" x2="240" y2="72" stroke="#1565c0" stroke-width="3"/>

  <!-- Axon terminal -->
  <rect x="240" y="55" width="70" height="35" rx="6" fill="#bbdefb" stroke="#1565c0" stroke-width="2"/>
  <text x="275" y="78" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Axon</text>
  <text x="275" y="88" text-anchor="middle" font-family="Arial" font-size="7" fill="#1565c0">Terminal</text>

  <!-- Synaptic vesicles -->
  <circle cx="260" cy="65" r="6" fill="#fff" stroke="#1565c0" stroke-width="1"/>
  <circle cx="275" cy="62" r="6" fill="#fff" stroke="#1565c0" stroke-width="1"/>
  <circle cx="290" cy="65" r="6" fill="#fff" stroke="#1565c0" stroke-width="1"/>
  <circle cx="268" cy="78" r="5" fill="#fff" stroke="#1565c0" stroke-width="1"/>
  <circle cx="285" cy="76" r="5" fill="#fff" stroke="#1565c0" stroke-width="1"/>
  <text x="275" y="100" text-anchor="middle" font-family="Arial" font-size="7" fill="#1565c0">ACh vesicles</text>

  <!-- Mitochondria -->
  <ellipse cx="300" cy="70" rx="6" ry="4" fill="#e53935" stroke="#c62828" stroke-width="1"/>

  <!-- Synaptic cleft -->
  <rect x="310" y="62" width="30" height="25" rx="3" fill="#fff" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="325" y="78" text-anchor="middle" font-family="Arial" font-size="6" fill="#333">Cleft</text>

  <!-- Sarcolemma -->
  <rect x="340" y="45" width="220" height="75" rx="6" fill="#fce4ec" stroke="#e53935" stroke-width="2.5"/>
  <text x="450" y="60" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e53935">Sarcolemma (Muscle Fiber)</text>

  <!-- Junctional folds -->
  <path d="M345,65 L345,90 L350,75 L355,90 L360,70 L365,90 L370,75" fill="none" stroke="#e53935" stroke-width="1.5"/>
  <text x="450" y="78" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Junctional folds with nicotinic ACh receptors</text>

  <!-- ACh receptors -->
  <circle cx="355" cy="72" r="3" fill="#ff8f00" stroke="#e65100" stroke-width="1"/>
  <circle cx="365" cy="72" r="3" fill="#ff8f00" stroke="#e65100" stroke-width="1"/>
  <circle cx="360" cy="82" r="3" fill="#ff8f00" stroke="#e65100" stroke-width="1"/>

  <!-- T-tubules and SR -->
  <line x1="450" y1="120" x2="450" y2="250" stroke="#e53935" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="450" y="140" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">T-tubule</text>

  <rect x="420" y="200" width="60" height="40" rx="4" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
  <text x="450" y="218" text-anchor="middle" font-family="Arial" font-size="7" fill="#e53935">SR</text>
  <text x="450" y="230" text-anchor="middle" font-family="Arial" font-size="7" fill="#e53935">Ca²⁺ store</text>

  <!-- Flow of events -->
  <rect x="30" y="280" width="540" height="110" rx="6" fill="#fafafa" stroke="#333" stroke-width="1"/>
  <text x="300" y="302" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Signal Transmission Sequence</text>
  <text x="50" y="322" font-family="Arial" font-size="9" fill="#333">1. Action potential arrives at presynaptic terminal → voltage-gated Ca²⁺ channels open → Ca²⁺ enters</text>
  <text x="50" y="340" font-family="Arial" font-size="9" fill="#333">2. Ca²⁺ triggers exocytosis of ACh vesicles → ACh released into synaptic cleft</text>
  <text x="50" y="358" font-family="Arial" font-size="9" fill="#333">3. ACh diffuses across cleft → binds nicotinic ACh receptors (ligand-gated Na⁺ channels) → Na⁺ influx → end-plate potential (EPP)</text>
  <text x="50" y="376" font-family="Arial" font-size="9" fill="#333">4. EPP always suprathreshold → voltage-gated Na⁺ channels open → muscle action potential → propagates along sarcolemma + T-tubules</text>
  <text x="50" y="394" font-family="Arial" font-size="9" fill="#333">5. Acetylcholinesterase (AChE) in cleft rapidly hydrolyzes ACh → choline + acetate → signal terminated</text>
</svg>