<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 430" width="600" height="430">
  <rect width="600" height="430" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#333">Effect of pH on Enzyme Activity — Pepsin vs Trypsin</text>

  <!-- Axes -->
  <line x1="70" y1="370" x2="540" y2="370" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="370" x2="70" y2="50" stroke="#333" stroke-width="2"/>
  <text x="300" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">pH →</text>
  <text x="22" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333" transform="rotate(-90,22,210)">Rate of Reaction →</text>

  <!-- pH ticks -->
  <line x1="90" y1="370" x2="90" y2="376" stroke="#333" stroke-width="2"/><text x="90" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">1</text>
  <line x1="135" y1="370" x2="135" y2="376" stroke="#333" stroke-width="2"/><text x="135" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">3</text>
  <line x1="180" y1="370" x2="180" y2="376" stroke="#333" stroke-width="2"/><text x="180" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">5</text>
  <line x1="225" y1="370" x2="225" y2="376" stroke="#333" stroke-width="2"/><text x="225" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">7</text>
  <line x1="270" y1="370" x2="270" y2="376" stroke="#333" stroke-width="2"/><text x="270" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">9</text>
  <line x1="315" y1="370" x2="315" y2="376" stroke="#333" stroke-width="2"/><text x="315" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">11</text>
  <line x1="360" y1="370" x2="360" y2="376" stroke="#333" stroke-width="2"/><text x="360" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">13</text>

  <!-- Pepsin curve - low pH optimum -->
  <path d="M90,365 Q100,260 120,170 Q135,105 160,95 Q200,90 230,150 Q260,280 300,360" fill="none" stroke="#e53935" stroke-width="3"/>
  <text x="160" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#e53935" font-weight="bold">Pepsin</text>
  <text x="160" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e53935">Optimum pH ~2</text>
  <text x="160" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e53935">(Stomach)</text>

  <!-- Trypsin curve - neutral/high pH -->
  <path d="M120,360 Q160,350 200,300 Q250,200 280,130 Q310,100 340,140 Q380,250 400,360" fill="none" stroke="#1565c0" stroke-width="3"/>
  <text x="280" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1565c0" font-weight="bold">Trypsin</text>
  <text x="280" y="101" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1565c0">Optimum pH ~8</text>
  <text x="280" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1565c0">(Small Intestine)</text>

  <!-- pH scale bar -->
  <rect x="70" y="385" width="470" height="14" fill="none" stroke="#333" stroke-width="1"/>
  <rect x="70" y="385" width="156" height="14" fill="#ffcdd2"/><text x="148" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Acidic</text>
  <rect x="226" y="385" width="158" height="14" fill="#e3f2fd"/><text x="305" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Neutral</text>
  <rect x="384" y="385" width="156" height="14" fill="#ede7f6"/><text x="462" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Basic</text>

  <!-- Note -->
  <rect x="120" y="415" width="360" height="16" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="300" y="427" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Extreme pH disrupts ionic bonds → denaturation → permanent loss of activity</text>
</svg>
