<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 550">
  <rect width="600" height="550" fill="#fff"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Pedigree Analysis — Symbols &amp; Inheritance Patterns</text>

  <!-- Symbols legend -->
  <rect x="20" y="45" width="270" height="185" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="155" y="68" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Pedigree Symbols</text>

  <g transform="translate(30, 80)">
    <rect x="5" y="5" width="18" height="18" rx="1" fill="none" stroke="#333" stroke-width="1.5"/>
    <text x="35" y="20" font-family="Arial" font-size="11" fill="#333">Unaffected male</text>

    <circle cx="14" cy="45" r="9" fill="none" stroke="#333" stroke-width="1.5"/>
    <text x="35" y="50" font-family="Arial" font-size="11" fill="#333">Unaffected female</text>

    <rect x="5" y="65" width="18" height="18" rx="1" fill="#333"/>
    <text x="35" y="80" font-family="Arial" font-size="11" fill="#333">Affected male</text>

    <circle cx="14" cy="105" r="9" fill="#333"/>
    <text x="35" y="110" font-family="Arial" font-size="11" fill="#333">Affected female</text>

    <rect x="5" y="128" width="18" height="18" rx="1" fill="none" stroke="#333" stroke-width="1.5"/>
    <line x1="7" y1="130" x2="21" y2="144" stroke="#333" stroke-width="1.5"/>
    <text x="35" y="143" font-family="Arial" font-size="11" fill="#333">Deceased</text>

    <circle cx="134" cy="15" r="9" fill="#aaa"/>
    <text x="150" y="20" font-family="Arial" font-size="11" fill="#333">Carrier</text>

    <rect x="125" y="45" width="18" height="18" rx="1" fill="#aaa"/>
    <text x="150" y="60" font-family="Arial" font-size="11" fill="#333">Carrier male</text>

    <text x="78" y="170" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">□—○ Mating | ├──┤ Siblings | I, II, III = Generations</text>
  </g>

  <!-- Pedigree 1: Autosomal Dominant -->
  <rect x="310" y="45" width="270" height="275" rx="8" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="445" y="68" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">Autosomal Dominant</text>

  <g transform="translate(330, 80)">
    <text x="100" y="8" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Generation I</text>
    <rect x="30" y="15" width="18" height="18" rx="1" fill="#333"/>
    <text x="75" y="30" font-family="Arial" font-size="9" fill="#555">Affected</text>
    <circle cx="150" cy="24" r="9" fill="none" stroke="#333" stroke-width="2"/>
    <text x="165" y="30" font-family="Arial" font-size="9" fill="#555">Normal</text>
    <line x1="48" y1="24" x2="141" y2="24" stroke="#333" stroke-width="1.5"/>

    <!-- Vertical line -->
    <line x1="90" y1="33" x2="90" y2="50" stroke="#333" stroke-width="1.5"/>

    <text x="100" y="62" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Generation II</text>
    <line x1="30" y1="50" x2="170" y2="50" stroke="#333" stroke-width="1"/>

    <line x1="50" y1="50" x2="50" y2="68" stroke="#333" stroke-width="1"/>
    <rect x="41" y="68" width="18" height="18" rx="1" fill="#333"/>
    <text x="40" y="98" font-family="Arial" font-size="8" fill="#555">Affected</text>

    <line x1="90" y1="50" x2="90" y2="68" stroke="#333" stroke-width="1"/>
    <circle cx="90" cy="77" r="9" fill="none" stroke="#333" stroke-width="2"/>

    <line x1="130" y1="50" x2="130" y2="68" stroke="#333" stroke-width="1"/>
    <circle cx="130" cy="77" r="9" fill="#333"/>

    <line x1="170" y1="50" x2="170" y2="68" stroke="#333" stroke-width="1"/>
    <rect x="161" y="68" width="18" height="18" rx="1" fill="none" stroke="#333" stroke-width="2"/>

    <!-- Key text -->
    <text x="100" y="120" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">✓ In every generation</text>
    <text x="100" y="137" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">✓ Males &amp; females affected</text>
    <text x="100" y="154" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">✓ Father → son possible</text>
    <text x="100" y="171" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">✗ Cannot skip generations</text>
  </g>

  <!-- Pedigree 2: Autosomal Recessive -->
  <rect x="20" y="250" width="270" height="140" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="155" y="273" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">Autosomal Recessive</text>

  <g transform="translate(40, 285)">
    <text x="95" y="5" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">Gen I</text>
    <rect x="30" y="12" width="16" height="16" rx="1" fill="none" stroke="#333" stroke-width="1.5"/>
    <circle cx="140" cy="20" r="8" fill="none" stroke="#333" stroke-width="1.5"/>
    <line x1="46" y1="20" x2="132" y2="20" stroke="#333" stroke-width="1"/>
    <line x1="80" y1="28" x2="80" y2="40" stroke="#333" stroke-width="1"/>

    <text x="95" y="52" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">Gen II</text>
    <line x1="20" y1="40" x2="160" y2="40" stroke="#333" stroke-width="1"/>
    <rect x="30" y="58" width="16" height="16" rx="1" fill="none" stroke="#333" stroke-width="1.5"/>
    <rect x="90" y="58" width="16" height="16" rx="1" fill="#333"/>
    <circle cx="150" cy="66" r="8" fill="none" stroke="#333" stroke-width="1.5"/>

    <text x="95" y="95" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">✓ Skips generations (carrier parents)</text>
    <text x="95" y="112" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">✗ Cannot have father→son</text>
  </g>

  <!-- Pedigree 3: X-linked Recessive -->
  <rect x="310" y="330" width="270" height="203" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="445" y="353" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">X-Linked Recessive</text>

  <g transform="translate(330, 365)">
    <text x="100" y="5" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">Gen I</text>
    <rect x="30" y="12" width="16" height="16" rx="1" fill="none" stroke="#333" stroke-width="1.5"/>
    <circle cx="140" cy="20" r="8" fill="#aaa"/>
    <line x1="46" y1="20" x2="132" y2="20" stroke="#333" stroke-width="1"/>
    <line x1="80" y1="28" x2="80" y2="40" stroke="#333" stroke-width="1"/>

    <text x="100" y="52" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">Gen II</text>
    <line x1="20" y1="40" x2="160" y2="40" stroke="#333" stroke-width="1"/>
    <rect x="30" y="55" width="16" height="16" rx="1" fill="#333"/>
    <circle cx="90" cy="63" r="8" fill="#aaa"/>
    <rect x="140" y="55" width="16" height="16" rx="1" fill="none" stroke="#333" stroke-width="1.5"/>

    <line x1="38" y1="55" x2="38" y2="80" stroke="#333" stroke-width="1"/>
    <line x1="138" y1="55" x2="138" y2="80" stroke="#333" stroke-width="1"/>
    <line x1="38" y1="80" x2="138" y2="80" stroke="#333" stroke-width="0.8"/>

    <text x="100" y="95" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">Gen III</text>
    <rect x="50" y="102" width="16" height="16" rx="1" fill="#333"/>
    <circle cx="110" cy="110" r="8" fill="none" stroke="#333" stroke-width="1.5"/>
    <circle cx="140" cy="110" r="8" fill="#aaa"/>

    <text x="100" y="140" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">✓ More males affected</text>
    <text x="100" y="157" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">✓ NO father → son</text>
    <text x="100" y="174" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">✓ Affected ♂ → all ♀ carriers</text>
    <text x="100" y="191" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">✓ Skips via carrier females</text>
  </g>

  <!-- Decision flowchart -->
  <rect x="20" y="405" width="560" height="130" rx="8" fill="#fafafa" stroke="#333" stroke-width="1"/>
  <text x="300" y="428" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Pedigree Analysis Decision Flow</text>

  <g transform="translate(30, 442)">
    <rect x="0" y="0" width="160" height="32" rx="6" fill="#ddd"/>
    <text x="80" y="21" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Father → son present?</text>
    <text x="190" y="16" font-family="Arial" font-size="13" fill="#1a6b3c">Yes → Autosomal</text>
    <text x="310" y="34" font-family="Arial" font-size="13" fill="#e53935">No → X-linked (recessive) likely</text>

    <text x="50" y="58" font-family="Arial" font-size="11" fill="#333">Skips generations?</text>
    <text x="190" y="58" font-family="Arial" font-size="13" fill="#1a6b3c">Yes → Autosomal Recessive</text>
    <text x="190" y="78" font-family="Arial" font-size="13" fill="#6a1b9a">No → Autosomal Dominant</text>
  </g>
</svg>
