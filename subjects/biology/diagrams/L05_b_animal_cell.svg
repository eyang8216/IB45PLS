### L05_b: Eukaryotic Animal Cell ###
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 650" style="background:#fff">
  <defs><linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a6b3c"/><stop offset="100%" stop-color="#43a047"/></linearGradient></defs>
  <rect width="600" height="650" fill="#fff"/>
  <rect x="0" y="0" width="600" height="42" fill="url(#hdr)"/>
  <text x="300" y="28" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="16">Eukaryotic Animal Cell — Organelles &amp; Structures</text>

  <!-- Cell body -->
  <ellipse cx="300" cy="310" rx="180" ry="150" fill="#fafafa" stroke="#333" stroke-width="2.5"/>

  <!-- Nucleus -->
  <ellipse cx="300" cy="270" rx="70" ry="52" fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
  <ellipse cx="300" cy="270" rx="66" ry="48" fill="none" stroke="#1565c0" stroke-width="1.2"/>
  <circle cx="300" cy="280" r="16" fill="#1a237e" opacity="0.7"/>
  <text x="300" y="284" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="9">Nucleolus</text>
  <!-- Nuclear pores -->
  <circle cx="260" cy="248" r="5" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <circle cx="275" cy="240" r="5" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <circle cx="340" cy="248" r="5" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <circle cx="290" cy="230" r="5" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>

  <!-- RER -->
  <path d="M160,210 C170,205 175,210 165,218" stroke="#333" stroke-width="2" fill="none"/>
  <path d="M155,230 C165,225 170,230 160,238" stroke="#333" stroke-width="2" fill="none"/>
  <path d="M148,250 C158,245 163,250 153,258" stroke="#333" stroke-width="2" fill="none"/>
  <circle cx="167" cy="210" r="3" fill="#6a1b9a"/><circle cx="163" cy="215" r="3" fill="#6a1b9a"/>
  <circle cx="162" cy="230" r="3" fill="#6a1b9a"/><circle cx="158" cy="235" r="3" fill="#6a1b9a"/>
  <circle cx="155" cy="250" r="3" fill="#6a1b9a"/><circle cx="151" cy="255" r="3" fill="#6a1b9a"/>

  <!-- SER -->
  <path d="M150,320 C140,315 135,325 145,332" stroke="#333" stroke-width="1.5" fill="none"/>
  <path d="M140,340 C130,335 125,345 135,352" stroke="#333" stroke-width="1.5" fill="none"/>
  <path d="M148,360 C138,355 133,365 143,372" stroke="#333" stroke-width="1.5" fill="none"/>

  <!-- Golgi -->
  <path d="M430,280 C445,275 460,280 450,290 C460,295 445,300 430,295" stroke="#333" stroke-width="2" fill="#fff9c4"/>
  <path d="M425,300 C440,295 455,300 445,310 C455,315 440,320 425,315" stroke="#333" stroke-width="2" fill="#fff9c4"/>
  <path d="M420,320 C435,315 450,320 440,330 C450,335 435,340 420,335" stroke="#333" stroke-width="2" fill="#fff9c4"/>
  <path d="M415,340 C430,335 445,340 435,350 C445,355 430,360 415,355" stroke="#333" stroke-width="2" fill="#fff9c4"/>

  <!-- Vesicles -->
  <circle cx="450" cy="265" r="6" fill="#eee" stroke="#333" stroke-width="1.5"/>
  <circle cx="470" cy="300" r="6" fill="#eee" stroke="#333" stroke-width="1.5"/>
  <circle cx="480" cy="340" r="6" fill="#eee" stroke="#333" stroke-width="1.5"/>

  <!-- Mitochondria -->
  <ellipse cx="250" cy="420" rx="45" ry="22" fill="#fff9c4" stroke="#ff8f00" stroke-width="2.5"/>
  <ellipse cx="250" cy="420" rx="40" ry="18" fill="none" stroke="#e65100" stroke-width="1.5"/>
  <path d="M225,420 C230,406 235,406 240,420" stroke="#e65100" stroke-width="1.5" fill="none"/>
  <path d="M245,420 C250,404 255,404 260,420" stroke="#e65100" stroke-width="1.5" fill="none"/>
  <path d="M265,420 C270,410 275,410 280,420" stroke="#e65100" stroke-width="1.5" fill="none"/>

  <ellipse cx="400" cy="400" rx="45" ry="22" fill="#fff9c4" stroke="#ff8f00" stroke-width="2.5"/>
  <ellipse cx="400" cy="400" rx="40" ry="18" fill="none" stroke="#e65100" stroke-width="1.5"/>
  <path d="M375,400 C380,386 385,386 390,400" stroke="#e65100" stroke-width="1.5" fill="none"/>

  <!-- Lysosomes -->
  <circle cx="200" cy="370" r="14" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
  <circle cx="205" cy="367" r="3" fill="#e53935"/><circle cx="195" cy="372" r="3" fill="#e53935"/><circle cx="200" cy="378" r="3" fill="#e53935"/>

  <!-- Free ribosomes -->
  <circle cx="320" cy="360" r="3" fill="#6a1b9a"/><circle cx="335" cy="355" r="3" fill="#6a1b9a"/>
  <circle cx="350" cy="370" r="3" fill="#6a1b9a"/><circle cx="310" cy="380" r="3" fill="#6a1b9a"/>
  <circle cx="340" cy="390" r="3" fill="#6a1b9a"/>

  <!-- Key labels -->
  <line x1="300" y1="220" x2="235" y2="170" stroke="#1565c0" stroke-width="1.5"/>
  <text x="170" y="165" text-anchor="middle" fill="#1565c0" font-family="Arial" font-weight="bold" font-size="11">Nucleus</text>
  <text x="170" y="180" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">(nuclear pores,</text>
  <text x="170" y="193" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">nucleolus, chromatin)</text>

  <text x="120" y="255" fill="#333" font-family="Arial" font-weight="bold" font-size="11">Rough ER</text>
  <text x="80" y="350" fill="#333" font-family="Arial" font-weight="bold" font-size="11">Smooth ER</text>
  <text x="490" y="320" fill="#333" font-family="Arial" font-weight="bold" font-size="11">Golgi</text>
  <text x="490" y="335" font-family="Arial" font-size="9">Apparatus</text>

  <text x="340" y="415" text-anchor="middle" fill="#ff8f00" font-family="Arial" font-weight="bold" font-size="11">Mitochondria</text>
  <text x="170" y="405" text-anchor="middle" fill="#e53935" font-family="Arial" font-weight="bold" font-size="11">Lysosome</text>

  <!-- Cytoskeleton hints -->
  <line x1="200" y1="170" x2="380" y2="180" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="180" y1="400" x2="440" y2="380" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Plasma membrane label -->
  <text x="490" y="230" fill="#333" font-family="Arial" font-weight="bold" font-size="11">Plasma</text>
  <text x="490" y="245" fill="#333" font-family="Arial" font-weight="bold" font-size="11">Membrane</text>

  <!-- Bottom legend -->
  <rect x="20" y="470" width="560" height="170" rx="8" fill="#f5f5f5"/>
  <text x="300" y="495" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="14">Eukaryotic Animal Cell — Key Features</text>
  <text x="40" y="520" fill="#333" font-family="Arial" font-size="11">• True nucleus with nuclear envelope, nuclear pores, and nucleolus — stores genetic information</text>
  <text x="40" y="542" fill="#333" font-family="Arial" font-size="11">• Membrane-bound organelles: RER (protein synthesis for secretion), SER (lipid synthesis, detoxification)</text>
  <text x="40" y="564" fill="#333" font-family="Arial" font-size="11">• Golgi apparatus (cis → trans): modifies, sorts, packages proteins into vesicles</text>
  <text x="40" y="586" fill="#333" font-family="Arial" font-size="11">• Mitochondria (double membrane, cristae): aerobic respiration → ATP (Krebs cycle + ETC)</text>
  <text x="40" y="608" fill="#333" font-family="Arial" font-size="11">• Lysosomes (pH ~5): hydrolytic enzymes for intracellular digestion and autophagy</text>
  <text x="40" y="630" fill="#333" font-family="Arial" font-size="11">• 80S ribosomes (60S+40S): free in cytoplasm or bound to RER — protein synthesis</text>
</svg>