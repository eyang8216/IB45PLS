<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" width="600" height="520">
  <rect width="600" height="520" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Antibiotic Resistance — Natural Selection &amp; Horizontal Gene Transfer</text>

  <!-- ===== TOP: Natural Selection ===== -->
  <text x="300" y="48" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">A. Evolution by Natural Selection</text>

  <!-- Stage 1: Before antibiotic -->
  <rect x="20" y="56" width="175" height="160" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="107" y="76" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1a6b3c">Before Antibiotic</text>

  <!-- Sensitive bacteria -->
  <ellipse cx="60" cy="115" rx="14" ry="9" fill="#81c784" stroke="#43a047" stroke-width="1.5"/>
  <text x="60" y="118" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">S</text>
  <ellipse cx="100" cy="105" rx="14" ry="9" fill="#81c784" stroke="#43a047" stroke-width="1.5"/>
  <text x="100" y="108" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">S</text>
  <ellipse cx="140" cy="115" rx="14" ry="9" fill="#81c784" stroke="#43a047" stroke-width="1.5"/>
  <text x="140" y="118" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">S</text>
  <ellipse cx="80" cy="135" rx="14" ry="9" fill="#81c784" stroke="#43a047" stroke-width="1.5"/>
  <text x="80" y="138" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">S</text>
  <ellipse cx="120" cy="135" rx="14" ry="9" fill="#81c784" stroke="#43a047" stroke-width="1.5"/>
  <text x="120" y="138" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">S</text>
  <!-- One mutant -->
  <ellipse cx="160" cy="135" rx="14" ry="9" fill="#e53935" stroke="#b71c1c" stroke-width="2"/>
  <text x="160" y="138" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">R</text>

  <text x="107" y="170" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Mostly sensitive (S)</text>
  <text x="107" y="182" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">One mutant resistant (R)</text>
  <text x="107" y="196" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">(random mutation)</text>

  <line x1="195" y1="136" x2="215" y2="136" stroke="#333" stroke-width="2" marker-end="url(#aR)"/>
  <defs><marker id="aR" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#333"/></marker></defs>

  <!-- Stage 2: Antibiotic applied -->
  <rect x="220" y="56" width="175" height="160" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="307" y="76" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e53935">Antibiotic Applied</text>

  <!-- Sensitive dying -->
  <ellipse cx="260" cy="115" rx="14" ry="9" fill="#81c784" stroke="#43a047" stroke-width="1" opacity="0.4"/>
  <text x="260" y="118" text-anchor="middle" font-family="Arial" font-size="6" fill="#999">S ✘</text>
  <ellipse cx="300" cy="105" rx="14" ry="9" fill="#81c784" stroke="#43a047" stroke-width="1" opacity="0.4"/>
  <text x="300" y="108" text-anchor="middle" font-family="Arial" font-size="6" fill="#999">S ✘</text>
  <ellipse cx="340" cy="115" rx="14" ry="9" fill="#81c784" stroke="#43a047" stroke-width="1" opacity="0.4"/>
  <text x="340" y="118" text-anchor="middle" font-family="Arial" font-size="6" fill="#999">S ✘</text>
  <ellipse cx="280" cy="135" rx="14" ry="9" fill="#81c784" stroke="#43a047" stroke-width="1" opacity="0.4"/>
  <text x="280" y="138" text-anchor="middle" font-family="Arial" font-size="6" fill="#999">S ✘</text>
  <ellipse cx="320" cy="135" rx="14" ry="9" fill="#81c784" stroke="#43a047" stroke-width="1" opacity="0.4"/>
  <text x="320" y="138" text-anchor="middle" font-family="Arial" font-size="6" fill="#999">S ✘</text>

  <!-- Resistant survives -->
  <ellipse cx="360" cy="135" rx="16" ry="11" fill="#e53935" stroke="#b71c1c" stroke-width="2"/>
  <text x="360" y="138" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">R ✓</text>

  <text x="307" y="170" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Sensitive die</text>
  <text x="307" y="182" text-anchor="middle" font-family="Arial" font-size="8" fill="#1a6b3c">Resistant survives</text>
  <text x="307" y="196" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">(selective advantage)</text>

  <line x1="395" y1="136" x2="415" y2="136" stroke="#333" stroke-width="2" marker-end="url(#aR)"/>

  <!-- Stage 3: After antibiotic -->
  <rect x="420" y="56" width="165" height="160" rx="8" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
  <text x="502" y="76" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e53935">After Antibiotic</text>

  <ellipse cx="460" cy="110" rx="14" ry="9" fill="#e53935" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="460" y="113" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">R</text>
  <ellipse cx="500" cy="105" rx="14" ry="9" fill="#e53935" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="500" y="108" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">R</text>
  <ellipse cx="540" cy="110" rx="14" ry="9" fill="#e53935" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="540" y="113" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">R</text>
  <ellipse cx="480" cy="130" rx="14" ry="9" fill="#e53935" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="480" y="133" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">R</text>
  <ellipse cx="520" cy="130" rx="14" ry="9" fill="#e53935" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="520" y="133" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">R</text>

  <text x="502" y="170" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Resistant reproduces</text>
  <text x="502" y="182" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Population now</text>
  <text x="502" y="196" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">mostly resistant</text>

  <!-- ===== BOTTOM: Horizontal Gene Transfer ===== -->
  <text x="300" y="245" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">B. Horizontal Gene Transfer — Conjugation</text>

  <!-- Donor bacterium -->
  <ellipse cx="120" cy="320" rx="45" ry="30" fill="#e3f2fd" stroke="#1565c0" stroke-width="2.5"/>
  <text x="120" y="310" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Donor</text>
  <text x="120" y="325" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">(has R-plasmid)</text>

  <!-- Plasmid inside donor -->
  <circle cx="110" cy="335" r="12" fill="none" stroke="#e53935" stroke-width="2" stroke-dasharray="3 2"/>
  <text x="110" y="338" text-anchor="middle" font-family="Arial" font-size="6" fill="#e53935">R-gene</text>

  <!-- Pilus -->
  <path d="M165,310 Q250,300 280,320 Q300,335 350,325" fill="none" stroke="#ff8f00" stroke-width="2.5"/>
  <text x="250" y="298" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff8f00" font-weight="bold">Conjugation Pilus</text>

  <!-- Recipient -->
  <ellipse cx="420" cy="320" rx="45" ry="30" fill="#e8f5e9" stroke="#43a047" stroke-width="2.5"/>
  <text x="420" y="310" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#43a047">Recipient</text>
  <text x="420" y="325" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">(no plasmid)</text>

  <!-- Plasmid transfer -->
  <circle cx="390" cy="335" r="12" fill="none" stroke="#e53935" stroke-width="2" stroke-dasharray="3 2"/>
  <text x="390" y="338" text-anchor="middle" font-family="Arial" font-size="6" fill="#e53935">R-gene</text>

  <!-- After transfer -->
  <text x="270" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">→ Plasmid copy transferred</text>
  <text x="270" y="384" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">→ Recipient becomes resistant</text>

  <!-- Now recipient has R plasmid -->
  <ellipse cx="420" cy="420" rx="45" ry="30" fill="#fce4ec" stroke="#e53935" stroke-width="2.5"/>
  <text x="420" y="410" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e53935">Now Resistant</text>
  <circle cx="420" cy="435" r="12" fill="none" stroke="#e53935" stroke-width="2" stroke-dasharray="3 2"/>
  <text x="420" y="438" text-anchor="middle" font-family="Arial" font-size="6" fill="#e53935">R-gene</text>

  <!-- Summary box -->
  <rect x="30" y="465" width="540" height="45" rx="6" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="300" y="485" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ff8f00">⚠ Antibiotic resistance spreads via: (1) Natural selection (vertical) + (2) Conjugation/HGT (horizontal)</text>
  <text x="300" y="502" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Causes: MRSA, MDR-TB, VRE — Complete antibiotic courses! No agricultural misuse!</text>
</svg>