<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Vaccination: Primary &amp; Secondary Immune Response</text>

  <!-- Axes -->
  <line x1="60" y1="340" x2="580" y2="340" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="340" x2="60" y2="40" stroke="#333" stroke-width="2"/>

  <!-- Axis labels -->
  <text x="300" y="375" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">Time (days)</text>
  <text x="18" y="195" text-anchor="middle" font-family="Arial" font-size="13" fill="#333" transform="rotate(-90, 18, 195)">Antibody Concentration</text>

  <!-- X-axis ticks -->
  <line x1="60" y1="340" x2="60" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="60" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">0</text>

  <line x1="110" y1="340" x2="110" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="110" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">7</text>

  <line x1="160" y1="340" x2="160" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="160" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">14</text>

  <line x1="210" y1="340" x2="210" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="210" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">21</text>

  <line x1="260" y1="340" x2="260" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="260" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">28</text>

  <line x1="310" y1="340" x2="310" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="310" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">35</text>

  <line x1="360" y1="340" x2="360" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="360" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">42</text>

  <line x1="410" y1="340" x2="410" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="410" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">49</text>

  <line x1="460" y1="340" x2="460" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="460" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">56</text>

  <line x1="510" y1="340" x2="510" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="510" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">63</text>

  <!-- Primary Exposure marker -->
  <line x1="65" y1="55" x2="65" y2="340" stroke="#e53935" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="65" y="48" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e53935">1° Exposure</text>

  <!-- Secondary Exposure marker -->
  <line x1="360" y1="55" x2="360" y2="340" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="360" y="48" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">2° Exposure</text>

  <!-- Primary IgM curve -->
  <!-- Lag ~7 days, small peak around day 14-17, then decline -->
  <path d="M65,335 L115,330 Q130,310 145,250 Q160,200 180,190 Q200,200 220,230 Q240,260 260,280 Q280,295 310,300 Q340,300 360,300"
        fill="none" stroke="#ff8f00" stroke-width="2.5"/>
  <text x="195" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00" font-weight="bold">IgM</text>

  <!-- Primary IgG curve -->
  <path d="M65,335 L115,330 Q140,310 160,240 Q180,190 210,210 Q240,240 270,270 Q300,295 340,300"
        fill="none" stroke="#43a047" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="165" y="225" text-anchor="middle" font-family="Arial" font-size="10" fill="#43a047">IgG</text>

  <!-- Secondary IgG curve -->
  <path d="M360,300 Q365,180 375,110 Q385,60 400,50 Q420,50 440,70 Q470,110 500,160 Q530,210 560,250"
        fill="none" stroke="#1565c0" stroke-width="3"/>
  <text x="405" y="40" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">IgG (very high)</text>

  <!-- Secondary IgM (small) -->
  <path d="M360,300 Q370,260 385,240 Q400,235 420,245 Q450,270 490,290"
        fill="none" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="425" y="240" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff8f00">IgM</text>

  <!-- Memory cells label -->
  <text x="360" y="390" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">Memory Cells activated — rapid, high response</text>

  <!-- Lag bar primary -->
  <line x1="66" y1="315" x2="115" y2="315" stroke="#333" stroke-width="1"/>
  <line x1="66" y1="312" x2="66" y2="318" stroke="#333" stroke-width="1"/>
  <line x1="115" y1="312" x2="115" y2="318" stroke="#333" stroke-width="1"/>
  <text x="90" y="310" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Lag ~7d</text>

  <!-- Lag bar secondary -->
  <line x1="360" y1="315" x2="385" y2="315" stroke="#333" stroke-width="1"/>
  <line x1="360" y1="312" x2="360" y2="318" stroke="#333" stroke-width="1"/>
  <line x1="385" y1="312" x2="385" y2="318" stroke="#333" stroke-width="1"/>
  <text x="372" y="310" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">1-2d</text>

  <!-- Y-axis label approximate -->
  <text x="50" y="45" font-family="Arial" font-size="9" fill="#555">High</text>
  <text x="50" y="200" font-family="Arial" font-size="9" fill="#555">Mid</text>
  <text x="50" y="335" font-family="Arial" font-size="9" fill="#555">Low</text>
</svg>
