<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565c0"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#1a6b3c">Hydrogen Bonding Between Water Molecules</text>

  <!-- Legend -->
  <text x="420" y="55" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#333">── covalent bond</text>
  <line x1="400" y1="52" x2="415" y2="52" stroke="#333" stroke-width="2.5"/>
  <text x="455" y="72" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1565c0">┄┄ hydrogen bond</text>
  <line x1="400" y1="69" x2="415" y2="69" stroke="#1565c0" stroke-width="2" stroke-dasharray="5,4"/>

  <!-- Molecule 1 (center top) -->
  <circle cx="300" cy="100" r="45" fill="#e53935" fill-opacity="0.15" stroke="#e53935" stroke-width="2.5"/>
  <text x="300" y="107" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#e53935">O</text>
  <circle cx="245" cy="68" r="25" fill="#1565c0" fill-opacity="0.1" stroke="#1565c0" stroke-width="2"/>
  <text x="245" y="74" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1565c0">H</text>
  <circle cx="355" cy="68" r="25" fill="#1565c0" fill-opacity="0.1" stroke="#1565c0" stroke-width="2"/>
  <text x="355" y="74" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1565c0">H</text>
  <line x1="275" y1="83" x2="256" y2="75" stroke="#333" stroke-width="2.5"/>
  <line x1="325" y1="83" x2="344" y2="75" stroke="#333" stroke-width="2.5"/>

  <!-- Molecule 2 (bottom left) -->
  <circle cx="160" cy="260" r="45" fill="#e53935" fill-opacity="0.15" stroke="#e53935" stroke-width="2.5"/>
  <text x="160" y="267" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#e53935">O</text>
  <circle cx="105" cy="228" r="25" fill="#1565c0" fill-opacity="0.1" stroke="#1565c0" stroke-width="2"/>
  <text x="105" y="234" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1565c0">H</text>
  <circle cx="215" cy="228" r="25" fill="#1565c0" fill-opacity="0.1" stroke="#1565c0" stroke-width="2"/>
  <text x="215" y="234" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1565c0">H</text>
  <line x1="135" y1="243" x2="116" y2="235" stroke="#333" stroke-width="2.5"/>
  <line x1="185" y1="243" x2="204" y2="235" stroke="#333" stroke-width="2.5"/>

  <!-- Molecule 3 (bottom right) -->
  <circle cx="440" cy="260" r="45" fill="#e53935" fill-opacity="0.15" stroke="#e53935" stroke-width="2.5"/>
  <text x="440" y="267" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#e53935">O</text>
  <circle cx="385" cy="228" r="25" fill="#1565c0" fill-opacity="0.1" stroke="#1565c0" stroke-width="2"/>
  <text x="385" y="234" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1565c0">H</text>
  <circle cx="495" cy="228" r="25" fill="#1565c0" fill-opacity="0.1" stroke="#1565c0" stroke-width="2"/>
  <text x="495" y="234" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1565c0">H</text>
  <line x1="415" y1="243" x2="396" y2="235" stroke="#333" stroke-width="2.5"/>
  <line x1="465" y1="243" x2="484" y2="235" stroke="#333" stroke-width="2.5"/>

  <!-- Hydrogen bonds (dotted lines) -->
  <!-- H of mol 1 to O of mol 2 -->
  <line x1="245" y1="85" x2="160" y2="220" stroke="#1565c0" stroke-width="2.5" stroke-dasharray="6,5"/>
  <text x="185" y="150" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1565c0">H-bond</text>

  <!-- H of mol 1 to O of mol 3 -->
  <line x1="355" y1="85" x2="440" y2="220" stroke="#1565c0" stroke-width="2.5" stroke-dasharray="6,5"/>
  <text x="410" y="150" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1565c0">H-bond</text>

  <!-- H of mol 2 to O of mol 1 -->
  <line x1="105" y1="223" x2="270" y2="135" stroke="#1565c0" stroke-width="2.5" stroke-dasharray="6,5"/>

  <!-- H of mol 3 to O of mol 1 -->
  <line x1="495" y1="223" x2="330" y2="135" stroke="#1565c0" stroke-width="2.5" stroke-dasharray="6,5"/>

  <!-- Key note -->
  <text x="300" y="370" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#333">Each water molecule can form up to 4 hydrogen bonds</text>
  <text x="300" y="390" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#555">H-bonds are ~20× weaker than covalent bonds but collectively strong</text>
</svg>
