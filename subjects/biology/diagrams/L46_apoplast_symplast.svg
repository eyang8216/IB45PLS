<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" font-family="Arial, sans-serif">
  <rect width="600" height="500" fill="#fff"/>
  <text x="300" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Apoplast vs Symplast Pathways &amp; Casparian Strip</text>

  <!-- Root cross section -->
  <text x="300" y="50" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Root Cross-Section (Pathway View)</text>

  <!-- Root outline -->
  <ellipse cx="300" cy="240" rx="160" ry="110" fill="#f5f5f5" stroke="#333" stroke-width="2"/>

  <!-- Epidermis -->
  <ellipse cx="300" cy="240" rx="160" ry="110" fill="none" stroke="#333" stroke-width="2"/>
  <ellipse cx="300" cy="240" rx="145" ry="95" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="300" y="163" text-anchor="middle" font-size="9" fill="#333">Epidermis</text>

  <!-- Root hair -->
  <path d="M160 240 Q130 230 125 210" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="110" y="200" font-size="8" fill="#333">Root hair</text>

  <!-- Cortex -->
  <ellipse cx="300" cy="240" rx="145" ry="95" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <ellipse cx="300" cy="240" rx="100" ry="65" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="420" y="215" text-anchor="middle" font-size="9" fill="#333">Cortex</text>

  <!-- Endodermis (thick) -->
  <ellipse cx="300" cy="240" rx="100" ry="65" fill="none" stroke="#e53935" stroke-width="3"/>
  <text x="400" y="250" text-anchor="middle" font-size="9" fill="#e53935">Endodermis</text>

  <!-- Casparian strip markers -->
  <g transform="translate(300,240)">
    <rect x="95" y="-8" width="8" height="16" rx="1" fill="#e53935" opacity="0.8"/>
    <rect x="-103" y="-8" width="8" height="16" rx="1" fill="#e53935" opacity="0.8"/>
    <rect x="-8" y="58" width="16" height="8" rx="1" fill="#e53935" opacity="0.8"/>
    <rect x="-8" y="-66" width="16" height="8" rx="1" fill="#e53935" opacity="0.8"/>
  </g>
  <text x="200" y="310" text-anchor="middle" font-size="8" fill="#e53935" font-weight="bold">Casparian strip (suberin)</text>

  <!-- Vascular cylinder -->
  <ellipse cx="300" cy="240" rx="60" ry="40" fill="#43a047" opacity="0.15" stroke="#43a047" stroke-width="1.5"/>
  <text x="300" y="243" text-anchor="middle" font-size="9" fill="#43a047" font-weight="bold">Vascular</text>
  <text x="300" y="255" text-anchor="middle" font-size="9" fill="#43a047" font-weight="bold">cylinder</text>

  <!-- Xylem -->
  <ellipse cx="290" cy="235" rx="8" ry="12" fill="#1565c0" opacity="0.3" stroke="#1565c0" stroke-width="1.5"/>
  <text x="290" y="239" text-anchor="middle" font-size="7" fill="#1565c0">X</text>
  <ellipse cx="310" cy="245" rx="8" ry="12" fill="#1565c0" opacity="0.3" stroke="#1565c0" stroke-width="1.5"/>
  <text x="310" y="249" text-anchor="middle" font-size="7" fill="#1565c0">X</text>

  <!-- Apoplast arrows -->
  <defs><marker id="arrowAp" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="#ff8f00"/></marker></defs>
  <defs><marker id="arrowSy" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="#1a6b3c"/></marker></defs>

  <!-- Apoplast pathway (orange) -->
  <path d="M170 230 Q220 225 260 235" fill="none" stroke="#ff8f00" stroke-width="2.5" stroke-dasharray="5,3"/>
  <text x="225" y="220" font-size="8" fill="#ff8f00">Apoplast</text>
  <text x="225" y="230" font-size="8" fill="#ff8f00">pathway</text>

  <!-- Blocked at Casparian -->
  <path d="M260 235 Q290 238 300 238" fill="none" stroke="#ff8f00" stroke-width="2.5"/>
  <line x1="298" y1="232" x2="310" y2="244" stroke="#e53935" stroke-width="2"/>
  <text x="320" y="240" font-size="8" fill="#e53935" font-weight="bold">BLOCKED</text>

  <!-- Symplast pathway (green) -->
  <path d="M175 250 Q210 265 240 255 Q260 248 280 252 Q300 258 305 248" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="210" y="275" font-size="8" fill="#1a6b3c">Symplast pathway</text>
  <text x="210" y="285" font-size="8" fill="#1a6b3c">(through cytoplasm)</text>

  <!-- Plasmodesmata -->
  <g transform="translate(240,252)">
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#1a6b3c" stroke-width="1.5"/>
    <line x1="-3" y1="-3" x2="3" y2="-3" stroke="#1a6b3c" stroke-width="1.5"/>
    <line x1="-3" y1="3" x2="3" y2="3" stroke="#1a6b3c" stroke-width="1.5"/>
  </g>

  <!-- Bottom explanation -->
  <rect x="30" y="360" width="540" height="130" rx="8" fill="none" stroke="#ddd" stroke-width="2"/>
  <text x="300" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Pathway Comparison</text>

  <g font-size="10" fill="#333">
    <text x="50" y="408" font-weight="bold" fill="#ff8f00">Apoplast Pathway:</text>
    <text x="50" y="423">Water moves through cell walls (cellulose mesh) and intercellular spaces — stays outside plasma membranes.</text>
    <text x="50" y="440">Blocked at endodermis by the Casparian strip (suberin band) — forces water into the symplast.</text>

    <text x="50" y="462" font-weight="bold" fill="#1a6b3c">Symplast Pathway:</text>
    <text x="50" y="477">Water moves through cytoplasm, connected by plasmodesmata — crosses plasma membrane at root hair.</text>
    <text x="50" y="494">The plasma membrane of endodermal cells provides selective control of solutes entering the xylem.</text>
  </g>
</svg>