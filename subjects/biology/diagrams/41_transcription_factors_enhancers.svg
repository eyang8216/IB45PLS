<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480">
  <rect width="600" height="480" fill="#fff"/>
  <text x="300" y="24" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#1a6b3c">Transcription Factors, Enhancers &amp; DNA Looping</text>
  <text x="300" y="42" text-anchor="middle" font-family="Arial" font-size="10" fill="#666" font-style="italic">Eukaryotic gene regulation — long-distance control</text>

  <!-- DNA strand (linear with looping) -->
  <!-- The DNA as a looping line -->
  <path d="M40,160 L180,160 Q230,160 260,200 Q280,230 250,270 Q230,290 200,280 Q170,270 180,230 Q185,210 210,200 L260,160 L420,160 L460,160 L550,160" fill="none" stroke="#333" stroke-width="3"/>

  <!-- Enhancer region -->
  <rect x="40" y="148" width="80" height="24" rx="4" fill="#1565c0" opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <text x="80" y="164" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0" font-weight="bold">Enhancer</text>

  <!-- Activator proteins on enhancer -->
  <ellipse cx="60" cy="138" rx="15" ry="10" fill="#1565c0" opacity="0.3" stroke="#1565c0" stroke-width="1.5"/>
  <text x="60" y="141" text-anchor="middle" font-family="Arial" font-size="7" fill="#1565c0">Activator</text>
  <ellipse cx="100" cy="138" rx="15" ry="10" fill="#1565c0" opacity="0.3" stroke="#1565c0" stroke-width="1.5"/>
  <text x="100" y="141" text-anchor="middle" font-family="Arial" font-size="7" fill="#1565c0">Activator</text>

  <!-- Promoter region -->
  <rect x="420" y="148" width="80" height="24" rx="4" fill="#1a6b3c" opacity="0.2" stroke="#1a6b3c" stroke-width="2"/>
  <text x="460" y="164" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c" font-weight="bold">Promoter</text>

  <!-- TATA box -->
  <rect x="430" y="155" width="60" height="10" rx="2" fill="#ff8f00" opacity="0.4" stroke="#ff8f00" stroke-width="1"/>
  <text x="460" y="163" text-anchor="middle" font-family="Arial" font-size="6" fill="#ff8f00">TATA box</text>

  <!-- RNA Polymerase II + GTFs on promoter -->
  <ellipse cx="460" cy="125" rx="28" ry="16" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="460" y="123" text-anchor="middle" font-family="Arial" font-size="8" fill="#1a6b3c" font-weight="bold">RNA Pol II</text>
  <text x="460" y="133" text-anchor="middle" font-family="Arial" font-size="6" fill="#1a6b3c">+ GTFs</text>

  <!-- Mediator complex -->
  <rect x="200" y="250" width="120" height="30" rx="8" fill="#6a1b9a" opacity="0.2" stroke="#6a1b9a" stroke-width="2"/>
  <text x="260" y="268" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a" font-weight="bold">Mediator Complex</text>

  <!-- Looping arrows showing contact -->
  <path d="M80,170 Q120,220 200,260" fill="none" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M320,260 Q400,220 430,170" fill="none" stroke="#1a6b3c" stroke-width="1.5" stroke-dasharray="4,3"/>

  <text x="220" y="220" font-family="Arial" font-size="9" fill="#333" font-style="italic">DNA Looping</text>

  <!-- Gene -->
  <rect x="505" y="148" width="55" height="24" rx="4" fill="#e53935" opacity="0.15" stroke="#e53935" stroke-width="1.5"/>
  <text x="532" y="164" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Gene</text>

  <!-- Silencer part -->
  <text x="300" y="310" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Silencer Function</text>
  <rect x="80" y="325" width="440" height="75" rx="6" fill="none" stroke="#ccc" stroke-width="1"/>

  <!-- Silencer DNA -->
  <line x1="100" y1="365" x2="500" y2="365" stroke="#333" stroke-width="2.5"/>
  <rect x="100" y="355" width="60" height="20" rx="3" fill="#e53935" opacity="0.2" stroke="#e53935" stroke-width="1.5"/>
  <text x="130" y="369" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Silencer</text>

  <ellipse cx="130" cy="348" rx="14" ry="8" fill="#e53935" opacity="0.25" stroke="#e53935" stroke-width="1.5"/>
  <text x="130" y="350" text-anchor="middle" font-family="Arial" font-size="7" fill="#e53935">Repressor</text>

  <rect x="380" y="355" width="80" height="20" rx="3" fill="#1a6b3c" opacity="0.15" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="420" y="369" text-anchor="middle" font-family="Arial" font-size="8" fill="#1a6b3c">Promoter</text>

  <!-- X -->
  <line x1="420" y1="345" x2="440" y2="365" stroke="#e53935" stroke-width="2.5"/>
  <line x1="440" y1="345" x2="420" y2="365" stroke="#e53935" stroke-width="2.5"/>

  <text x="270" y="370" font-family="Arial" font-size="9" fill="#555">Repressor blocks → no transcription</text>

  <!-- Combinatorial control panel -->
  <text x="300" y="420" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Combinatorial Control</text>

  <rect x="40" y="432" width="520" height="38" rx="5" fill="#e8eaf6" stroke="#c5cae9" stroke-width="1"/>
  <text x="300" y="450" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Multiple enhancers + silencers → each binds specific TFs → combination of activators &amp;</text>
  <text x="300" y="464" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">repressors present determines gene expression level → basis of cell-specific expression</text>
</svg>
