<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#fff"/>
  <text x="300" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#333">Michaelis-Menten Kinetics — The Hyperbolic Rate vs [S] Curve</text>

  <!-- Axes -->
  <line x1="70" y1="350" x2="540" y2="350" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="350" x2="70" y2="50" stroke="#333" stroke-width="2"/>
  <text x="300" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">[S] (Substrate Concentration) →</text>
  <text x="22" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333" transform="rotate(-90,22,205)">Initial Rate (v₀) →</text>

  <!-- Hyperbolic curve -->
  <path d="M80,345 Q130,335 170,290 Q240,200 300,130 Q370,80 460,58 Q510,52 540,50" fill="none" stroke="#1a6b3c" stroke-width="3"/>

  <!-- Vmax asymptote -->
  <line x1="70" y1="48" x2="540" y2="48" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="545" y="52" font-family="Arial, sans-serif" font-size="14" fill="#ff8f00" font-weight="bold">Vmax</text>

  <!-- ½ Vmax -->
  <line x1="70" y1="200" x2="540" y2="200" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="545" y="204" font-family="Arial, sans-serif" font-size="12" fill="#1565c0" font-weight="bold">½ Vmax</text>

  <!-- Km drop -->
  <line x1="210" y1="200" x2="210" y2="350" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="210" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1565c0" font-weight="bold">Km</text>

  <!-- Dotted horizontal from curve to ½ Vmax intersection -->
  <circle cx="210" cy="200" r="4" fill="#e53935"/>

  <!-- Michaelis-Menten equation -->
  <rect x="120" y="90" width="360" height="50" rx="8" fill="none" stroke="#333" stroke-width="1"/>
  <text x="300" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#333" font-weight="bold">Michaelis-Menten Equation</text>
  <text x="300" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a6b3c" font-style="italic">v₀ = Vmax · [S] / (Km + [S])</text>

  <!-- Explanation box -->
  <rect x="70" y="330" width="480" height="55" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="85" y="352" font-family="Arial, sans-serif" font-size="12" fill="#333">• <tspan font-weight="bold" fill="#ff8f00">Vmax</tspan>: Maximum rate when all active sites are saturated with substrate</text>
  <text x="85" y="370" font-family="Arial, sans-serif" font-size="12" fill="#333">• <tspan font-weight="bold" fill="#1565c0">Km</tspan>: Substrate concentration at which v₀ = ½Vmax — measure of enzyme affinity</text>
  <text x="85" y="382" font-family="Arial, sans-serif" font-size="11" fill="#555">   Lower Km = Higher affinity (less substrate needed) | Higher Km = Lower affinity</text>
</svg>
