<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect width="600" height="360" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Stem Cell Hierarchy — Potency &amp; Differentiation</text>

  <!-- Zygote -->
  <ellipse cx="300" cy="55" rx="40" ry="22" fill="#6a1b9a" opacity="0.8"/>
  <text x="300" y="50" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">Zygote</text>
  <text x="300" y="65" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Totipotent</text>

  <!-- Arrow down -->
  <line x1="300" y1="77" x2="300" y2="95" stroke="#333" stroke-width="2"/>
  <polygon points="296,95 300,102 304,95" fill="#333"/>

  <!-- Morula -->
  <circle cx="300" cy="115" r="18" fill="#6a1b9a" opacity="0.6"/>
  <text x="300" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Morula</text>
  <text x="300" y="125" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">~16 cells</text>

  <line x1="300" y1="133" x2="300" y2="150" stroke="#333" stroke-width="2"/>
  <polygon points="296,150 300,157 304,150" fill="#333"/>

  <!-- Blastocyst -->
  <ellipse cx="300" cy="175" rx="55" ry="22" fill="none" stroke="#e53935" stroke-width="2.5"/>
  <text x="300" y="170" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Blastocyst</text>
  <!-- ICM -->
  <circle cx="280" cy="175" r="10" fill="#e53935" opacity="0.7"/>
  <text x="280" y="171" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">ICM</text>
  <text x="280" y="183" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">Pluripotent</text>

  <!-- Arrow from ICM -->
  <line x1="280" y1="197" x2="280" y2="215" stroke="#333" stroke-width="2"/>
  <polygon points="276,215 280,222 284,215" fill="#333"/>

  <!-- Branches from pluripotent -->
  <!-- Ectoderm -->
  <line x1="280" y1="222" x2="180" y2="240" stroke="#1565c0" stroke-width="2"/>
  <rect x="110" y="238" width="70" height="25" rx="5" fill="#1565c0" opacity="0.7"/>
  <text x="145" y="254" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Ectoderm</text>
  <line x1="145" y1="263" x2="145" y2="280" stroke="#1565c0" stroke-width="1.5"/>
  <text x="145" y="293" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Neurons, skin</text>

  <!-- Mesoderm -->
  <line x1="280" y1="222" x2="280" y2="240" stroke="#ff8f00" stroke-width="2"/>
  <rect x="245" y="238" width="70" height="25" rx="5" fill="#ff8f00" opacity="0.7"/>
  <text x="280" y="254" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Mesoderm</text>
  <line x1="280" y1="263" x2="280" y2="280" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="280" y="293" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Muscle, blood,</text>
  <text x="280" y="305" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">bone</text>

  <!-- Endoderm -->
  <line x1="280" y1="222" x2="380" y2="240" stroke="#1a6b3c" stroke-width="2"/>
  <rect x="345" y="238" width="70" height="25" rx="5" fill="#1a6b3c" opacity="0.7"/>
  <text x="380" y="254" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Endoderm</text>
  <line x1="380" y1="263" x2="380" y2="280" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="380" y="293" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Liver, gut,</text>
  <text x="380" y="305" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">lungs</text>

  <!-- From mesoderm: hematopoietic multipotent -->
  <line x1="280" y1="310" x2="280" y2="325" stroke="#ff8f00" stroke-width="2"/>
  <rect x="230" y="325" width="100" height="22" rx="5" fill="#ff8f00" opacity="0.5"/>
  <text x="280" y="340" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Hematopoietic SC</text>
  <text x="280" y="355" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff8f00">Multipotent → RBC, WBC, platelets</text>

  <!-- Potency labels -->
  <g font-family="Arial" font-size="8" fill="#555">
    <text x="420" y="55">Totipotent: can form all</text>
    <text x="420" y="68">cell types + placenta</text>
    <text x="420" y="88">Pluripotent: all cell types</text>
    <text x="420" y="101">(ICM, ESCs)</text>
    <text x="420" y="121">Multipotent: limited to</text>
    <text x="420" y="134">one lineage</text>
  </g>

  <!-- Potency arrows -->
  <text x="500" y="55" font-family="Arial" font-size="9" fill="#6a1b9a">← Most potent</text>
  <text x="500" y="135" font-family="Arial" font-size="9" fill="#ff8f00">← Least potent</text>
</svg>