<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#1a6b3c">Ice Lattice vs. Liquid Water Structure</text>

  <!-- LEFT: Ice (hexagonal lattice) -->
  <text x="190" y="60" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1565c0">Ice (hydrogen-bonded lattice)</text>
  <text x="190" y="78" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#555">Less dense — floats on water</text>

  <!-- Ice: hexagonal honeycomb arrangement -->
  <!-- Central hexagon -->
  <polygon points="160,130 200,110 240,130 240,170 200,190 160,170" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <!-- O atoms at vertices -->
  <circle cx="160" cy="130" r="10" fill="#e53935" fill-opacity="0.3" stroke="#e53935" stroke-width="1.5"/>
  <text x="160" y="134" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e53935">O</text>
  <circle cx="200" cy="110" r="10" fill="#e53935" fill-opacity="0.3" stroke="#e53935" stroke-width="1.5"/>
  <text x="200" y="114" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e53935">O</text>
  <circle cx="240" cy="130" r="10" fill="#e53935" fill-opacity="0.3" stroke="#e53935" stroke-width="1.5"/>
  <text x="240" y="134" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e53935">O</text>
  <circle cx="240" cy="170" r="10" fill="#e53935" fill-opacity="0.3" stroke="#e53935" stroke-width="1.5"/>
  <text x="240" y="174" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e53935">O</text>
  <circle cx="200" cy="190" r="10" fill="#e53935" fill-opacity="0.3" stroke="#e53935" stroke-width="1.5"/>
  <text x="200" y="194" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e53935">O</text>
  <circle cx="160" cy="170" r="10" fill="#e53935" fill-opacity="0.3" stroke="#e53935" stroke-width="1.5"/>
  <text x="160" y="174" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#e53935">O</text>

  <!-- H-bonds extending outward from hexagon vertices -->
  <line x1="160" y1="130" x2="120" y2="110" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="120" cy="110" r="8" fill="#e53935" fill-opacity="0.3" stroke="#e53935" stroke-width="1"/>
  <text x="120" y="114" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#e53935">O</text>

  <line x1="240" y1="130" x2="280" y2="110" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="280" cy="110" r="8" fill="#e53935" fill-opacity="0.3" stroke="#e53935" stroke-width="1"/>
  <text x="280" y="114" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#e53935">O</text>

  <line x1="240" y1="170" x2="280" y2="190" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="280" cy="190" r="8" fill="#e53935" fill-opacity="0.3" stroke="#e53935" stroke-width="1"/>
  <text x="280" y="194" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#e53935">O</text>

  <line x1="160" y1="170" x2="120" y2="190" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="120" cy="190" r="8" fill="#e53935" fill-opacity="0.3" stroke="#e53935" stroke-width="1"/>
  <text x="120" y="194" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#e53935">O</text>

  <!-- "Open space" label in center of hexagon -->
  <text x="200" y="155" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ff8f00">Open</text>
  <text x="200" y="168" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ff8f00">space</text>

  <!-- RIGHT: Liquid water -->
  <text x="430" y="60" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#e53935">Liquid Water (more dense)</text>
  <text x="430" y="78" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#555">Molecules packed closer together</text>

  <!-- Liquid: Random close-packed arrangement -->
  <circle cx="380" cy="120" r="12" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="420" cy="115" r="12" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="450" cy="130" r="12" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="395" cy="160" r="12" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="440" cy="165" r="12" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="470" cy="155" r="12" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="410" cy="195" r="12" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="450" cy="200" r="12" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="380" cy="180" r="12" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>

  <!-- H-bond dashed lines in liquid -->
  <line x1="392" y1="120" x2="408" y2="115" stroke="#1565c0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="432" y1="115" x2="438" y2="130" stroke="#1565c0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="392" y1="160" x2="392" y2="180" stroke="#1565c0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="407" y1="160" x2="428" y2="165" stroke="#1565c0" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Key property note -->
  <line x1="50" y1="370" x2="550" y2="370" stroke="#ddd" stroke-width="1"/>

  <text x="190" y="360" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#1a6b3c">Ice lattice</text>
  <text x="190" y="378" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">Each H₂O: 4 H-bonds (max)</text>
  <text x="190" y="393" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">Open hexagonal arrangement</text>

  <text x="430" y="360" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#1a6b3c">Liquid water</text>
  <text x="430" y="378" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">Each H₂O: ~3.4 H-bonds (avg)</text>
  <text x="430" y="393" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">H-bonds constantly break and reform</text>
</svg>
