### L06_a: Scale Bar + Atypical Cells ###
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" style="background:#fff">
  <defs><linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a6b3c"/><stop offset="100%" stop-color="#43a047"/></linearGradient></defs>
  <rect width="600" height="700" fill="#fff"/>
  <rect x="0" y="0" width="600" height="42" fill="url(#hdr)"/>
  <text x="300" y="28" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="16">Scale Bar Calculations &amp; Atypical Cell Structures (HL)</text>

  <!-- Scale bar section -->
  <rect x="20" y="52" width="560" height="95" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="35" y="72" fill="#1a6b3c" font-family="Arial" font-weight="bold" font-size="14">Magnification Formula: M = I / A</text>
  <text x="35" y="92" fill="#333" font-family="Arial" font-size="12">• M = magnification (e.g., ×30,000) | I = image size | A = actual size</text>
  <text x="35" y="110" fill="#333" font-family="Arial" font-size="12">• 1 cm = 10 mm = 10,000 µm = 10,000,000 nm</text>
  <text x="35" y="128" fill="#666" font-family="Arial" font-size="11">Example: Scale bar 15 mm labeled "0.5 µm" → M = 15,000 µm / 0.5 µm = ×30,000</text>

  <!-- Striated muscle -->
  <rect x="20" y="160" width="270" height="170" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5"/>
  <text x="155" y="182" text-anchor="middle" fill="#1565c0" font-family="Arial" font-weight="bold" font-size="13">Striated Muscle Fiber</text>
  <rect x="40" y="195" width="230" height="80" rx="6" fill="#fafafa" stroke="#333" stroke-width="2"/>
  <!-- Striations -->
  <line x1="40" y1="215" x2="270" y2="215" stroke="#e53935" stroke-width="1"/><line x1="40" y1="225" x2="270" y2="225" stroke="#1565c0" stroke-width="1"/>
  <line x1="40" y1="235" x2="270" y2="235" stroke="#e53935" stroke-width="1"/><line x1="40" y1="245" x2="270" y2="245" stroke="#1565c0" stroke-width="1"/>
  <line x1="40" y1="255" x2="270" y2="255" stroke="#e53935" stroke-width="1"/><line x1="40" y1="265" x2="270" y2="265" stroke="#1565c0" stroke-width="1"/>
  <!-- Nuclei -->
  <ellipse cx="110" cy="210" rx="12" ry="7" fill="#6a1b9a"/><ellipse cx="180" cy="220" rx="12" ry="7" fill="#6a1b9a"/><ellipse cx="140" cy="250" rx="12" ry="7" fill="#6a1b9a"/>
  <text x="155" y="290" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Multinucleated (syncytium)</text>
  <text x="155" y="305" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Multiple peripheral nuclei</text>
  <text x="155" y="320" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Single continuous cytoplasm</text>

  <!-- Aseptate hypha -->
  <rect x="310" y="160" width="270" height="170" rx="8" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="445" y="182" text-anchor="middle" fill="#6a1b9a" font-family="Arial" font-weight="bold" font-size="13">Aseptate Fungal Hypha</text>
  <path d="M330,210 C340,200 360,200 370,210 L370,255 C360,265 340,265 330,255 Z" fill="#fafafa" stroke="#6a1b9a" stroke-width="2"/>
  <path d="M370,210 C380,200 400,200 410,210 L410,255 C400,265 380,265 370,255 Z" fill="#fafafa" stroke="#6a1b9a" stroke-width="2"/>
  <path d="M410,210 C420,200 440,200 450,210 L450,250 C440,260 420,260 410,250 Z" fill="#fafafa" stroke="#6a1b9a" stroke-width="2"/>
  <path d="M440,210 C450,200 470,200 480,218 L480,250 C470,260 450,260 440,250 Z" fill="#fafafa" stroke="#6a1b9a" stroke-width="2"/>
  <!-- No septa - continuous -->
  <circle cx="345" cy="235" r="4" fill="#e53935"/><circle cx="390" cy="225" r="4" fill="#e53935"/>
  <circle cx="420" cy="240" r="4" fill="#e53935"/><circle cx="460" cy="230" r="4" fill="#e53935"/>
  <text x="445" y="290" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">No septa (cross-walls)</text>
  <text x="445" y="305" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Continuous tube of cytoplasm</text>
  <text x="445" y="320" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Many nuclei (coenocytic)</text>

  <!-- Phloem sieve tube -->
  <rect x="20" y="342" width="270" height="160" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="1.5"/>
  <text x="155" y="364" text-anchor="middle" fill="#e65100" font-family="Arial" font-weight="bold" font-size="13">Phloem Sieve Tube Element</text>
  <rect x="55" y="378" width="200" height="40" fill="#fafafa" stroke="#333" stroke-width="2"/>
  <rect x="55" y="418" width="200" height="40" fill="#fafafa" stroke="#333" stroke-width="2"/>
  <!-- Sieve plates -->
  <line x1="55" y1="418" x2="255" y2="418" stroke="#e53935" stroke-width="2.5" stroke-dasharray="3,2"/>
  <line x1="55" y1="458" x2="255" y2="458" stroke="#e53935" stroke-width="2.5" stroke-dasharray="3,2"/>
  <text x="155" y="438" text-anchor="middle" fill="#e65100" font-family="Arial" font-size="10" font-weight="bold">Sieve plate (pores)</text>
  <!-- Companion cell -->
  <rect x="260" y="388" width="30" height="25" rx="3" fill="#81c784" stroke="#2e7d32" stroke-width="1.5"/>
  <ellipse cx="275" cy="398" rx="6" ry="5" fill="#1a6b3c"/>
  <text x="155" y="490" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">No nucleus at maturity</text>
  <text x="155" y="503" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Companion cell provides support</text>

  <!-- RBC -->
  <rect x="310" y="342" width="270" height="160" rx="8" fill="#fce4ec" stroke="#f48fb1" stroke-width="1.5"/>
  <text x="445" y="364" text-anchor="middle" fill="#c62828" font-family="Arial" font-weight="bold" font-size="13">Red Blood Cell (Erythrocyte)</text>
  <!-- Biconcave shape - top view -->
  <ellipse cx="445" cy="405" rx="50" ry="30" fill="#ffcdd2" stroke="#c62828" stroke-width="2.5"/>
  <ellipse cx="445" cy="405" rx="30" ry="18" fill="#ef9a9a" opacity="0.5"/>
  <text x="445" y="408" text-anchor="middle" fill="#b71c1c" font-family="Arial" font-weight="bold" font-size="11">Top View</text>
  <!-- Side view -->
  <path d="M380,460 C380,448 395,442 410,445 C425,442 460,448 460,460 C460,472 440,478 420,475 C400,478 380,472 380,460 Z" fill="#ffcdd2" stroke="#c62828" stroke-width="2"/>
  <text x="445" y="498" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Biconcave shape</text>
  <text x="445" y="512" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">No nucleus, no mitochondria</text>

  <!-- Bottom summary -->
  <rect x="20" y="515" width="560" height="175" rx="8" fill="#f5f5f5"/>
  <text x="300" y="538" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="14">Atypical Cells — Challenging the "Typical Cell" Concept</text>
  <text x="40" y="562" fill="#333" font-family="Arial" font-size="11">• Striated muscle: Multinucleated syncytium formed by myoblast fusion — single cell up to several cm long</text>
  <text x="40" y="582" fill="#333" font-family="Arial" font-size="11">• Aseptate fungal hyphae: No septa → continuous multinucleated tube — rapid nutrient transport</text>
  <text x="40" y="602" fill="#333" font-family="Arial" font-size="11">• Phloem sieve tube: Loses nucleus at maturity; supported by companion cell via plasmodesmata</text>
  <text x="40" y="622" fill="#333" font-family="Arial" font-size="11">• RBC: No nucleus/mitochondria → maximizes hemoglobin capacity; biconcave shape ↑ SA:V ratio</text>
  <text x="40" y="646" fill="#666" font-family="Arial" font-size="10">All demonstrate: Cell structure is adapted to function — there is no single "typical" cell.</text>
</svg>