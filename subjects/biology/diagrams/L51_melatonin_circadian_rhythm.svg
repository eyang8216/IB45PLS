<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#fff"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Melatonin &amp; Circadian Rhythms — The Sleep-Wake Cycle</text>

  <!-- Light Detection Pathway -->
  <rect x="20" y="48" width="560" height="150" rx="8" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="300" y="72" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">Light Detection → Melatonin Suppression Pathway</text>

  <!-- Flow -->
  <g transform="translate(30, 82)">
    <!-- Eye -->
    <ellipse cx="40" cy="25" rx="35" ry="22" fill="#fff" stroke="#333" stroke-width="2"/>
    <circle cx="40" cy="25" r="10" fill="#333"/>
    <circle cx="40" cy="25" r="5" fill="#fff"/>
    <text x="40" y="60" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">ipRGCs</text>
    <text x="40" y="72" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">(melanopsin)</text>

    <!-- Arrow 1 -->
    <line x1="75" y1="25" x2="115" y2="25" stroke="#333" stroke-width="2"/>
    <polygon points="115,25 109,20 109,30" fill="#333"/>
    <text x="95" y="18" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">retinohypothalamic</text>
    <text x="95" y="28" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">tract</text>

    <!-- SCN -->
    <rect x="120" y="5" width="80" height="40" rx="6" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
    <text x="160" y="22" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ff8f00">SCN</text>
    <text x="160" y="36" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(Master Clock)</text>
    <text x="160" y="58" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">Hypothalamus</text>

    <!-- Arrow 2 -->
    <line x1="200" y1="25" x2="250" y2="25" stroke="#333" stroke-width="2"/>
    <polygon points="250,25 244,20 244,30" fill="#333"/>

    <!-- Light = inhibit -->
    <rect x="255" y="5" width="100" height="40" rx="6" fill="#fff9c4"/>
    <text x="305" y="18" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Sympathetic NS</text>
    <text x="305" y="34" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">INHIBITS</text>

    <!-- Arrow 3 -->
    <line x1="355" y1="25" x2="400" y2="25" stroke="#333" stroke-width="2"/>
    <polygon points="400,25 394,20 394,30" fill="#333"/>

    <!-- Pineal Gland -->
    <ellipse cx="445" cy="25" rx="40" ry="22" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
    <text x="445" y="22" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">Pineal</text>
    <text x="445" y="35" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Gland</text>
    <text x="445" y="58" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Melatonin ↓</text>
    <text x="445" y="70" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">(in light)</text>
  </g>

  <!-- Day/Night comparison -->
  <rect x="20" y="215" width="270" height="100" rx="8" fill="#fff9c4" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="155" y="238" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#ff8f00">☀ Daytime (Light)</text>
  <text x="155" y="258" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">ipRGCs detect light → SCN activated</text>
  <text x="155" y="278" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">→ Pineal inhibited → <tspan font-weight="bold" fill="#e53935">Melatonin LOW</tspan></text>
  <text x="155" y="298" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">→ Awake, alert</text>

  <rect x="310" y="215" width="270" height="100" rx="8" fill="#1a237e" opacity="0.85"/>
  <text x="445" y="238" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">🌙 Nighttime (Darkness)</text>
  <text x="445" y="258" text-anchor="middle" font-family="Arial" font-size="11" fill="#ccc">ipRGCs inactive → SCN not inhibiting</text>
  <text x="445" y="278" text-anchor="middle" font-family="Arial" font-size="11" fill="#ccc">→ Pineal active → <tspan font-weight="bold" fill="#81c784">Melatonin HIGH</tspan></text>
  <text x="445" y="298" text-anchor="middle" font-family="Arial" font-size="11" fill="#ccc">→ Sleepiness promoted</text>

  <!-- Melatonin curve -->
  <rect x="20" y="330" width="560" height="42" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="348" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">
    Melatonin peak: ~2-4 AM | Synthesis: Tryptophan → Serotonin → N-Acetylserotonin → <tspan font-weight="bold">Melatonin</tspan>
  </text>
  <text x="300" y="365" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">
    Jet lag: internal clock misaligned with light-dark cycle | Blue light from screens suppresses melatonin
  </text>
</svg>
