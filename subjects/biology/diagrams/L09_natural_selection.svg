<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <rect width="600" height="450" fill="#fff"/>
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#333">Darwin's Theory of Natural Selection</text>
  <text x="300" y="46" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Four Observations → Three Deductions</text>
  <!-- Observation 1 -->
  <rect x="30" y="65" width="260" height="55" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="160" y="85" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Observation 1: Overproduction</text>
  <text x="160" y="105" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">All species produce more offspring</text>
  <text x="160" y="118" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">than can survive to adulthood</text>
  <!-- Observation 2 -->
  <rect x="310" y="65" width="260" height="55" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="440" y="85" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Observation 2: Population Stability</text>
  <text x="440" y="105" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Despite overproduction, population</text>
  <text x="440" y="118" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">sizes remain roughly stable</text>
  <!-- Arrow down to Deduction 1 -->
  <line x1="160" y1="120" x2="160" y2="140" stroke="#e53935" stroke-width="3"/>
  <line x1="440" y1="120" x2="440" y2="140" stroke="#e53935" stroke-width="3"/>
  <line x1="160" y1="140" x2="440" y2="140" stroke="#e53935" stroke-width="3"/>
  <line x1="300" y1="140" x2="300" y2="155" stroke="#e53935" stroke-width="3"/>
  <!-- Deduction 1 -->
  <rect x="130" y="155" width="340" height="40" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="300" y="172" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">Deduction 1: Struggle for Existence</text>
  <text x="300" y="188" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Competition for limited resources → not all survive</text>
  <!-- Observation 3 -->
  <rect x="30" y="215" width="260" height="55" rx="8" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="160" y="235" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">Observation 3: Variation</text>
  <text x="160" y="255" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Individuals within a population</text>
  <text x="160" y="268" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">vary in their traits</text>
  <!-- Observation 4 -->
  <rect x="310" y="215" width="260" height="55" rx="8" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="440" y="235" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">Observation 4: Heritability</text>
  <text x="440" y="255" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Much of this variation is passed</text>
  <text x="440" y="268" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">from parents to offspring</text>
  <!-- Arrow to Deduction 2 -->
  <line x1="300" y1="270" x2="300" y2="290" stroke="#e53935" stroke-width="3"/>
  <!-- Deduction 2 -->
  <rect x="130" y="290" width="340" height="40" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="300" y="307" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">Deduction 2: Differential Survival &amp; Reproduction</text>
  <text x="300" y="323" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Favorable traits → more likely to survive &amp; reproduce = NATURAL SELECTION</text>
  <!-- Arrow -->
  <line x1="300" y1="330" x2="300" y2="350" stroke="#e53935" stroke-width="3"/>
  <!-- Deduction 3 -->
  <rect x="100" y="350" width="400" height="45" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="2.5"/>
  <text x="300" y="368" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100">Deduction 3: Evolution by Natural Selection</text>
  <text x="300" y="386" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Over generations, favorable traits accumulate → population becomes adapted</text>
  <!-- Key principles -->
  <text x="300" y="420" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Selection acts on phenotype | Population evolves (not individual) | Requires heritable variation</text>
</svg>