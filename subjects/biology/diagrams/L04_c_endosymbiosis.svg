### L04_c: Endosymbiosis Stages ###
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 580" style="background:#fff">
  <defs><linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a6b3c"/><stop offset="100%" stop-color="#43a047"/></linearGradient></defs>
  <rect width="600" height="580" fill="#fff"/>
  <rect x="0" y="0" width="600" height="42" fill="url(#hdr)"/>
  <text x="300" y="28" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="16">Endosymbiotic Theory — Origin of Mitochondria &amp; Chloroplasts</text>

  <!-- Stage 1: Ancestral eukaryote + aerobic bacterium -->
  <text x="150" y="70" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="14">① Engulfment</text>
  <!-- Ancestral eukaryote -->
  <ellipse cx="110" cy="130" rx="55" ry="40" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="110" y="125" text-anchor="middle" fill="#1a6b3c" font-family="Arial" font-weight="bold" font-size="11">Ancestral</text>
  <text x="110" y="140" text-anchor="middle" fill="#1a6b3c" font-family="Arial" font-weight="bold" font-size="11">Eukaryote</text>
  <text x="110" y="155" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">(anaerobic)</text>

  <!-- Aerobic bacterium -->
  <ellipse cx="220" cy="130" rx="30" ry="16" fill="#ffcdd2" stroke="#c62828" stroke-width="2"/>
  <text x="220" y="128" text-anchor="middle" fill="#c62828" font-family="Arial" font-weight="bold" font-size="10">Aerobic</text>
  <text x="220" y="140" text-anchor="middle" fill="#c62828" font-family="Arial" font-weight="bold" font-size="10">Bacterium</text>
  <text x="220" y="152" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">(proteobacterium)</text>

  <!-- Arrow -->
  <text x="170" y="130" text-anchor="middle" fill="#333" font-family="Arial" font-size="16">⟶</text>
  <text x="168" y="115" text-anchor="middle" fill="#e53935" font-family="Arial" font-size="9">Engulfment</text>

  <!-- Stage 2: Endosymbiont inside -->
  <text x="400" y="70" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="14">② Endosymbiont</text>
  <ellipse cx="400" cy="130" rx="65" ry="42" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2.5"/>
  <ellipse cx="410" cy="130" rx="30" ry="16" fill="#ffcdd2" stroke="#c62828" stroke-width="2"/>
  <text x="410" y="128" text-anchor="middle" fill="#c62828" font-family="Arial" font-weight="bold" font-size="10">Endosymbiont</text>
  <text x="410" y="140" text-anchor="middle" fill="#c62828" font-family="Arial" font-weight="bold" font-size="9">(within vesicle)</text>
  <text x="400" y="185" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Host provides protection;</text>
  <text x="400" y="198" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Bacterium provides ATP</text>

  <!-- Stage 3: Mitochondrion -->
  <text x="300" y="250" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="14">③ Integrated Organelle — Mitochondrion</text>
  <ellipse cx="300" cy="310" rx="80" ry="45" fill="#fff9c4" stroke="#ff8f00" stroke-width="3"/>
  <!-- Outer membrane -->
  <ellipse cx="300" cy="310" rx="75" ry="42" fill="none" stroke="#ff8f00" stroke-width="1.5"/>
  <!-- Inner membrane with cristae -->
  <ellipse cx="300" cy="310" rx="65" ry="34" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <!-- Cristae folds -->
  <path d="M260,310 C270,290 280,290 285,310" stroke="#e65100" stroke-width="2" fill="none"/>
  <path d="M295,310 C300,285 310,285 315,310" stroke="#e65100" stroke-width="2" fill="none"/>
  <path d="M325,310 C335,295 340,295 345,310" stroke="#e65100" stroke-width="2" fill="none"/>
  <text x="300" y="315" text-anchor="middle" fill="#e65100" font-family="Arial" font-weight="bold" font-size="12">MITOCHONDRION</text>
  <!-- Labels -->
  <text x="300" y="270" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Double membrane</text>
  <text x="300" y="365" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Circular DNA | 70S ribosomes | Binary fission</text>

  <!-- Chloroplast origin row -->
  <rect x="20" y="395" width="560" height="3" fill="#ddd"/>

  <text x="300" y="420" text-anchor="middle" fill="#1a6b3c" font-family="Arial" font-weight="bold" font-size="14">Chloroplast Origin — Secondary Endosymbiosis</text>

  <!-- Cell with mitochondrion engulfing cyanobacterium -->
  <ellipse cx="130" cy="488" rx="55" ry="38" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <ellipse cx="120" cy="485" rx="15" ry="10" fill="#fff9c4" stroke="#ff8f00" stroke-width="1.5"/>
  <ellipse cx="240" cy="488" rx="28" ry="16" fill="#c8e6c9" stroke="#1b5e20" stroke-width="2"/>
  <text x="240" y="486" text-anchor="middle" fill="#1b5e20" font-family="Arial" font-weight="bold" font-size="9">Cyanobacterium</text>
  <text x="240" y="497" text-anchor="middle" fill="#666" font-family="Arial" font-size="8">(photosynthetic)</text>

  <text x="190" y="488" text-anchor="middle" fill="#333" font-family="Arial" font-size="16">→</text>

  <!-- Final cell with both -->
  <ellipse cx="420" cy="488" rx="70" ry="40" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2.5"/>
  <ellipse cx="410" cy="482" rx="14" ry="9" fill="#fff9c4" stroke="#ff8f00" stroke-width="1.5"/>
  <ellipse cx="445" cy="495" rx="20" ry="13" fill="#c8e6c9" stroke="#1b5e20" stroke-width="2"/>
  <text x="420" y="520" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="12">Algal/Plant Cell</text>
  <text x="420" y="535" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Both mitochondria &amp; chloroplasts</text>

  <!-- Evidence summary box -->
  <rect x="20" y="548" width="560" height="28" rx="6" fill="#f5f5f5"/>
  <text x="300" y="567" text-anchor="middle" fill="#333" font-family="Arial" font-size="11">Evidence: Double membranes | Circular DNA | 70S ribosomes | Binary fission | Genome similar to α-proteobacteria / cyanobacteria</text>
</svg>