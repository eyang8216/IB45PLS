<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" font-family="Arial, sans-serif">
  <rect width="600" height="600" fill="#fff"/>
  <text x="300" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Plant Cells in Different Solutions</text>

  <!-- Cell 1: Hypotonic → Turgid -->
  <rect x="20" y="40" width="175" height="240" rx="8" fill="#1a6b3c" opacity="0.05" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="107" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a6b3c">Hypotonic Solution</text>
  <text x="107" y="78" text-anchor="middle" font-size="9" fill="#1a6b3c">(ψ higher outside)</text>

  <!-- Cell wall -->
  <rect x="40" y="92" width="135" height="140" rx="6" fill="none" stroke="#333" stroke-width="2.5"/>
  <text x="50" y="85" font-size="8" fill="#333">Cell wall</text>

  <!-- Plasma membrane pressed against wall -->
  <rect x="45" y="97" width="125" height="130" rx="4" fill="#81c784" opacity="0.3" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="107" y="115" text-anchor="middle" font-size="8" fill="#1a6b3c">PM pressed</text>
  <text x="107" y="126" text-anchor="middle" font-size="8" fill="#1a6b3c">against wall</text>

  <!-- Large vacuole -->
  <ellipse cx="107" cy="175" rx="45" ry="38" fill="#43a047" opacity="0.25" stroke="#43a047" stroke-width="1.5"/>
  <text x="107" y="178" text-anchor="middle" font-size="9" fill="#1a6b3c">Large</text>
  <text x="107" y="190" text-anchor="middle" font-size="9" fill="#1a6b3c">vacuole</text>

  <!-- Water arrows in -->
  <path d="M30 165 L45 165" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrowArr)"/>
  <path d="M30 185 L45 185" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrowArr)"/>
  <text x="25" y="155" font-size="8" fill="#1565c0">H₂O</text>
  <text x="25" y="200" font-size="8" fill="#1565c0">in</text>

  <text x="107" y="255" text-anchor="middle" font-size="10" fill="#1a6b3c" font-weight="bold">TURGID</text>
  <text x="107" y="270" text-anchor="middle" font-size="9" fill="#333">ψp = positive (+0.5 to +1.5)</text>

  <defs><marker id="arrowArr" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="#1565c0"/></marker></defs>

  <!-- Cell 2: Isotonic → Flaccid -->
  <rect x="212" y="40" width="175" height="240" rx="8" fill="#ff8f00" opacity="0.05" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="299" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff8f00">Isotonic Solution</text>
  <text x="299" y="78" text-anchor="middle" font-size="9" fill="#ff8f00">(ψ equal)</text>

  <rect x="240" y="92" width="120" height="140" rx="6" fill="none" stroke="#333" stroke-width="2.5"/>

  <!-- PM slightly pulled -->
  <rect x="250" y="100" width="100" height="125" rx="3" fill="#81c784" opacity="0.2" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Medium vacuole -->
  <ellipse cx="299" cy="175" rx="35" ry="30" fill="#43a047" opacity="0.15" stroke="#ff8f00" stroke-width="1.5"/>

  <!-- Water arrows both ways -->
  <path d="M225 165 L240 165" stroke="#999" stroke-width="1.5" marker-end="url(#arrowArr2)"/>
  <path d="M240 185 L225 185" stroke="#999" stroke-width="1.5" marker-end="url(#arrowArr2)"/>
  <text x="220" y="155" font-size="8" fill="#999">H₂O</text>
  <text x="220" y="196" font-size="8" fill="#999">H₂O</text>

  <defs><marker id="arrowArr2" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="#999"/></marker></defs>

  <text x="299" y="255" text-anchor="middle" font-size="10" fill="#ff8f00" font-weight="bold">FLACCID</text>
  <text x="299" y="270" text-anchor="middle" font-size="9" fill="#333">ψp ≈ 0</text>
  <text x="299" y="283" text-anchor="middle" font-size="8" fill="#333">Incipient plasmolysis</text>

  <!-- Cell 3: Hypertonic → Plasmolysis -->
  <rect x="405" y="40" width="175" height="240" rx="8" fill="#e53935" opacity="0.05" stroke="#e53935" stroke-width="1.5"/>
  <text x="492" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#e53935">Hypertonic Solution</text>
  <text x="492" y="78" text-anchor="middle" font-size="9" fill="#e53935">(ψ lower outside)</text>

  <rect x="430" y="92" width="125" height="140" rx="6" fill="none" stroke="#333" stroke-width="2.5"/>

  <!-- PM shrunken -->
  <ellipse cx="492" cy="175" rx="35" ry="28" fill="#81c784" opacity="0.15" stroke="#e53935" stroke-width="1.5"/>

  <!-- Small vacuole -->
  <ellipse cx="492" cy="175" rx="20" ry="16" fill="#43a047" opacity="0.1" stroke="#e53935" stroke-width="1.5"/>

  <!-- Space filled with solution -->
  <text x="492" y="120" text-anchor="middle" font-size="7" fill="#e53935">Ext. sol.</text>

  <!-- Water arrows out -->
  <path d="M460 155 L445 155" stroke="#e53935" stroke-width="1.5" marker-end="url(#arrowArr3)"/>
  <path d="M460 195 L445 195" stroke="#e53935" stroke-width="1.5" marker-end="url(#arrowArr3)"/>
  <text x="465" y="148" font-size="8" fill="#e53935">H₂O</text>
  <text x="465" y="210" font-size="8" fill="#e53935">out</text>

  <defs><marker id="arrowArr3" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="#e53935"/></marker></defs>

  <text x="492" y="255" text-anchor="middle" font-size="10" fill="#e53935" font-weight="bold">PLASMOLYZED</text>
  <text x="492" y="270" text-anchor="middle" font-size="9" fill="#333">ψp = 0 (membrane</text>
  <text x="492" y="283" text-anchor="middle" font-size="9" fill="#333">pulled from wall)</text>

  <!-- Gradients -->
  <text x="300" y="310" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Water Potential Gradients</text>

  <g transform="translate(30,330)">
    <rect x="0" y="0" width="540" height="30" rx="4" fill="#f5f5f5"/>
    <text x="15" y="20" font-size="10" fill="#333" font-weight="bold">Soil</text>
    <text x="65" y="20" font-size="10" fill="#333">ψ ≈ 0</text>
    <text x="140" y="20" font-size="10" fill="#333">→</text>
    <text x="165" y="20" font-size="10" fill="#333" font-weight="bold">Root cell</text>
    <text x="240" y="20" font-size="10" fill="#333">ψ ≈ −0.5</text>
    <text x="310" y="20" font-size="10" fill="#333">→</text>
    <text x="335" y="20" font-size="10" fill="#333" font-weight="bold">Xylem</text>
    <text x="390" y="20" font-size="10" fill="#333">ψ ≈ −1 to −3</text>
    <text x="460" y="20" font-size="10" fill="#333">→</text>
    <text x="485" y="20" font-size="10" fill="#333" font-weight="bold">Leaf</text>
  </g>

  <!-- Animal cell comparison -->
  <text x="300" y="395" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Animal Cell Comparison (no cell wall)</text>

  <g transform="translate(30,410)">
    <rect x="0" y="0" width="160" height="70" rx="4" fill="#1a6b3c" opacity="0.08"/>
    <text x="80" y="18" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a6b3c">Hypotonic</text>
    <text x="80" y="35" text-anchor="middle" font-size="9" fill="#e53935">H₂O enters → LYSIS</text>
    <text x="80" y="50" text-anchor="middle" font-size="9" fill="#e53935">Cell swells and bursts</text>
  </g>

  <g transform="translate(210,410)">
    <rect x="0" y="0" width="160" height="70" rx="4" fill="#ff8f00" opacity="0.08"/>
    <text x="80" y="18" text-anchor="middle" font-size="10" font-weight="bold" fill="#ff8f00">Isotonic</text>
    <text x="80" y="35" text-anchor="middle" font-size="9" fill="#333">No net movement</text>
    <text x="80" y="50" text-anchor="middle" font-size="9" fill="#333">Normal, healthy state</text>
  </g>

  <g transform="translate(390,410)">
    <rect x="0" y="0" width="160" height="70" rx="4" fill="#e53935" opacity="0.08"/>
    <text x="80" y="18" text-anchor="middle" font-size="10" font-weight="bold" fill="#e53935">Hypertonic</text>
    <text x="80" y="35" text-anchor="middle" font-size="9" fill="#e53935">H₂O leaves → CRENATION</text>
    <text x="80" y="50" text-anchor="middle" font-size="9" fill="#e53935">Cell shrinks, shrivels</text>
  </g>

  <text x="300" y="520" text-anchor="middle" font-size="9" fill="#666">Clinical: IV fluids are isotonic saline (0.9% NaCl) to prevent RBC lysis or crenation</text>

  <!-- Legend -->
  <g transform="translate(30,555)">
    <rect x="0" y="0" width="14" height="10" rx="2" fill="#1a6b3c"/>
    <text x="18" y="9" font-size="9" fill="#333">Turgid (ψp &gt; 0)</text>
    <rect x="160" y="0" width="14" height="10" rx="2" fill="#ff8f00"/>
    <text x="178" y="9" font-size="9" fill="#333">Flaccid (ψp ≈ 0)</text>
    <rect x="320" y="0" width="14" height="10" rx="2" fill="#e53935"/>
    <text x="338" y="9" font-size="9" fill="#333">Plasmolyzed (ψp = 0)</text>
  </g>
</svg>