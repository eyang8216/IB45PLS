<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420">
  <rect width="600" height="420" fill="#fff"/>
  <text x="300" y="24" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#1a6b3c">DNA Methylation &amp; Gene Silencing</text>
  <text x="300" y="42" text-anchor="middle" font-family="Arial" font-size="10" fill="#666" font-style="italic">CpG island methylation → chromatin condensation → transcription silenced</text>

  <!-- CpG island diagram -->
  <text x="300" y="68" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">CpG Island in Promoter Region</text>

  <!-- DNA strand with CpG -->
  <line x1="60" y1="95" x2="540" y2="95" stroke="#333" stroke-width="2"/>
  <!-- CpG repeats -->
  <rect x="180" y="88" width="16" height="14" rx="2" fill="#1565c0" opacity="0.5"/>
  <text x="188" y="99" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">C</text>
  <rect x="198" y="88" width="16" height="14" rx="2" fill="#e53935" opacity="0.5"/>
  <text x="206" y="99" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">G</text>

  <rect x="216" y="88" width="16" height="14" rx="2" fill="#1565c0" opacity="0.5"/>
  <text x="224" y="99" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">C</text>
  <rect x="234" y="88" width="16" height="14" rx="2" fill="#e53935" opacity="0.5"/>
  <text x="242" y="99" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">G</text>

  <rect x="252" y="88" width="16" height="14" rx="2" fill="#1565c0" opacity="0.5"/>
  <text x="260" y="99" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">C</text>
  <rect x="270" y="88" width="16" height="14" rx="2" fill="#e53935" opacity="0.5"/>
  <text x="278" y="99" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">G</text>

  <rect x="288" y="88" width="16" height="14" rx="2" fill="#1565c0" opacity="0.5"/>
  <text x="296" y="99" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">C</text>
  <rect x="306" y="88" width="16" height="14" rx="2" fill="#e53935" opacity="0.5"/>
  <text x="314" y="99" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">G</text>

  <text x="340" y="98" font-family="Arial" font-size="9" fill="#333">... CpG island (∼1000 bp)</text>

  <!-- Methyl groups on cytosines -->
  <circle cx="188" cy="82" r="5" fill="#e53935"/>
  <text x="188" y="80" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">CH₃</text>
  <circle cx="224" cy="82" r="5" fill="#e53935"/>
  <text x="224" y="80" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">CH₃</text>
  <circle cx="260" cy="82" r="5" fill="#e53935"/>
  <text x="260" y="80" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">CH₃</text>
  <circle cx="296" cy="82" r="5" fill="#e53935"/>
  <text x="296" y="80" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">CH₃</text>

  <text x="250" y="74" font-family="Arial" font-size="7" fill="#e53935" font-style="italic">↑ Methylated cytosines at CpG</text>

  <!-- Mechanism flowchart -->
  <text x="300" y="130" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Mechanism of Methylation-Mediated Silencing</text>

  <rect x="50" y="145" width="120" height="40" rx="6" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5"/>
  <text x="110" y="162" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0" font-weight="bold">① DNA Methylation</text>
  <text x="110" y="178" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">DNMT adds -CH₃ to CpG</text>

  <line x1="170" y1="165" x2="190" y2="165" stroke="#333" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="192" y="145" width="120" height="40" rx="6" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="252" y="162" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c" font-weight="bold">② MeCP2 Binding</text>
  <text x="252" y="178" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Methyl-binding proteins</text>

  <line x1="312" y1="165" x2="332" y2="165" stroke="#333" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="334" y="145" width="120" height="40" rx="6" fill="#fff3e0" stroke="#ffcc80" stroke-width="1.5"/>
  <text x="394" y="162" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff8f00" font-weight="bold">③ HDAC Recruitment</text>
  <text x="394" y="178" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Histone deacetylases</text>

  <line x1="454" y1="165" x2="474" y2="165" stroke="#333" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="476" y="145" width="100" height="40" rx="6" fill="#ffebee" stroke="#ef9a9a" stroke-width="1.5"/>
  <text x="526" y="162" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">④ Silencing</text>
  <text x="526" y="178" text-anchor="middle" font-family="Arial" font-size="7" fill="#c62828">Gene OFF</text>

  <!-- Nucleosome states -->
  <text x="300" y="215" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Effect on Chromatin Structure</text>

  <!-- Unmethylated: open -->
  <rect x="30" y="228" width="250" height="100" rx="6" fill="#e8f5e9" stroke="#81c784" stroke-width="1.5"/>
  <text x="155" y="248" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c" font-weight="bold">Unmethylated Promoter</text>

  <!-- Nucleosomes loose -->
  <circle cx="85" cy="290" r="18" fill="none" stroke="#43a047" stroke-width="2"/>
  <text x="85" y="293" text-anchor="middle" font-family="Arial" font-size="7" fill="#43a047">Euchromatin</text>
  <circle cx="155" cy="290" r="18" fill="none" stroke="#43a047" stroke-width="2"/>
  <circle cx="225" cy="290" r="18" fill="none" stroke="#43a047" stroke-width="2"/>
  <text x="155" y="318" text-anchor="middle" font-family="Arial" font-size="8" fill="#43a047">Open → Transcription ON</text>

  <!-- Methylated: closed -->
  <rect x="320" y="228" width="250" height="100" rx="6" fill="#ffebee" stroke="#ef9a9a" stroke-width="1.5"/>
  <text x="445" y="248" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">Methylated Promoter</text>

  <circle cx="375" cy="290" r="18" fill="#e53935" opacity="0.25" stroke="#e53935" stroke-width="2"/>
  <text x="375" y="293" text-anchor="middle" font-family="Arial" font-size="7" fill="#e53935">Heterochromatin</text>
  <circle cx="445" cy="290" r="18" fill="#e53935" opacity="0.25" stroke="#e53935" stroke-width="2"/>
  <circle cx="515" cy="290" r="18" fill="#e53935" opacity="0.25" stroke="#e53935" stroke-width="2"/>
  <text x="445" y="318" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Closed → Transcription OFF</text>

  <!-- X inactivation -->
  <text x="300" y="355" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Key Example: X-Chromosome Inactivation (Barr Body)</text>

  <rect x="60" y="368" width="480" height="40" rx="6" fill="#e8eaf6" stroke="#c5cae9" stroke-width="1"/>
  <text x="300" y="386" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">One X chromosome randomly inactivated in female cells → extensive DNA methylation</text>
  <text x="300" y="402" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">→ Barr body (condensed heterochromatin) → dosage compensation (equal expression to males XY)</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#333"/></marker>
  </defs>
</svg>
