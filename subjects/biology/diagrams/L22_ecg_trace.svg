<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <rect width="600" height="450" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">ECG — Electrocardiogram Trace</text>

  <!-- Grid background -->
  <rect x="40" y="55" width="520" height="200" fill="#fafafa" stroke="#333" stroke-width="1"/>
  <!-- Minor grid lines -->
  <line x1="40" y1="100" x2="560" y2="100" stroke="#eee" stroke-width="0.5"/>
  <line x1="40" y1="150" x2="560" y2="150" stroke="#eee" stroke-width="0.5"/>
  <line x1="40" y1="200" x2="560" y2="200" stroke="#eee" stroke-width="0.5"/>

  <!-- ECG trace -->
  <!-- P wave -->
  <path d="M80,155 Q100,130 120,155" fill="none" stroke="#333" stroke-width="2.5"/>
  <!-- PR segment -->
  <line x1="120" y1="155" x2="170" y2="155" stroke="#333" stroke-width="2"/>
  <!-- Q wave -->
  <line x1="170" y1="155" x2="180" y2="170" stroke="#333" stroke-width="2"/>
  <!-- R wave -->
  <line x1="180" y1="170" x2="200" y2="70" stroke="#333" stroke-width="2.5"/>
  <!-- S wave -->
  <line x1="200" y1="70" x2="220" y2="155" stroke="#333" stroke-width="2"/>
  <!-- ST segment -->
  <line x1="220" y1="155" x2="320" y2="155" stroke="#333" stroke-width="2"/>
  <!-- T wave -->
  <path d="M320,155 Q350,110 400,155" fill="none" stroke="#333" stroke-width="2.5"/>
  <!-- Baseline -->
  <line x1="400" y1="155" x2="480" y2="155" stroke="#333" stroke-width="1.5"/>
  <!-- Next P -->
  <path d="M480,155 Q500,130 520,155" fill="none" stroke="#333" stroke-width="2"/>

  <!-- Labels on waves -->
  <text x="100" y="145" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">P</text>
  <text x="100" y="175" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Atrial depolarization</text>

  <text x="200" y="55" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">R</text>
  <text x="180" y="185" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Q</text>
  <text x="215" y="185" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">S</text>
  <text x="200" y="195" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Ventricular depolarization</text>

  <text x="360" y="140" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#43a047">T</text>
  <text x="360" y="175" text-anchor="middle" font-family="Arial" font-size="8" fill="#43a047">Ventricular repolarization</text>

  <!-- Interval annotations -->
  <line x1="80" y1="210" x2="170" y2="210" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="207" x2="80" y2="213" stroke="#333" stroke-width="1.5"/>
  <line x1="170" y1="207" x2="170" y2="213" stroke="#333" stroke-width="1.5"/>
  <text x="125" y="225" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">PR Interval</text>

  <line x1="80" y1="235" x2="400" y2="235" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="232" x2="80" y2="238" stroke="#333" stroke-width="1.5"/>
  <line x1="400" y1="232" x2="400" y2="238" stroke="#333" stroke-width="1.5"/>
  <text x="240" y="250" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">QT Interval (total ventricular depolarization + repolarization)</text>

  <!-- ST segment -->
  <text x="270" y="145" font-family="Arial" font-size="8" fill="#333">ST segment</text>

  <!-- Details panel -->
  <rect x="30" y="275" width="540" height="165" rx="6" fill="#fafafa" stroke="#333" stroke-width="1"/>
  <text x="300" y="298" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">ECG Wave Details &amp; Abnormalities</text>

  <text x="50" y="320" font-family="Arial" font-size="10" fill="#1565c0" font-weight="bold">P wave</text>
  <text x="50" y="334" font-family="Arial" font-size="9" fill="#333">Atrial depolarization; atrial contraction follows. Duration: ~0.08-0.10 s</text>

  <text x="50" y="354" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">QRS complex</text>
  <text x="50" y="368" font-family="Arial" font-size="9" fill="#333">Ventricular depolarization (masks atrial repolarization). Duration: ~0.06-0.10 s</text>

  <text x="50" y="388" font-family="Arial" font-size="10" fill="#43a047" font-weight="bold">T wave</text>
  <text x="50" y="402" font-family="Arial" font-size="9" fill="#333">Ventricular repolarization. Duration: ~0.15-0.20 s</text>

  <text x="50" y="422" font-family="Arial" font-size="10" fill="#ff8f00" font-weight="bold">Abnormalities:</text>
  <text x="50" y="436" font-family="Arial" font-size="9" fill="#333">Prolonged PR (>0.20 s) = 1st degree heart block. ST elevation = STEMI (acute MI). Irregular QRS = arrhythmia</text>
</svg>