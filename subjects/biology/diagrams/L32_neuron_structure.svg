<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 550" width="600" height="550">
  <defs><marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#333"/></marker></defs>
  <rect width="600" height="550" fill="#fff" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#6a1b9a">Multipolar Motor Neuron — Structure &amp; Function</text>

  <!-- Dendrites -->
  <text x="45" y="120" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Dendrites</text>
  <text x="45" y="135" font-family="Arial" font-size="8" fill="#555">Receptive surface</text>
  <text x="45" y="148" font-family="Arial" font-size="7" fill="#888">Receive signals</text>

  <path d="M80,200 Q60,160 40,140 M80,200 Q55,170 30,170 M80,200 Q65,150 50,130 M80,200 Q75,150 70,130" fill="none" stroke="#1565c0" stroke-width="2.5"/>

  <!-- Dendritic spines -->
  <circle cx="40" cy="140" r="3" fill="#81c784"/>
  <circle cx="30" cy="170" r="3" fill="#81c784"/>
  <circle cx="50" cy="130" r="3" fill="#81c784"/>
  <circle cx="70" cy="130" r="3" fill="#81c784"/>

  <!-- Soma -->
  <circle cx="120" cy="200" r="45" fill="#e3f2fd" stroke="#1565c0" stroke-width="2.5"/>
  <text x="120" y="192" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">SOMA</text>
  <text x="120" y="207" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">(Cell Body)</text>
  <text x="120" y="222" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">Nucleus, Nissl bodies</text>

  <!-- Axon Hillock -->
  <path d="M160,185 L190,195 L160,215" fill="#e53935" stroke="#333" stroke-width="1.5"/>
  <text x="195" y="180" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">Axon Hillock</text>
  <text x="195" y="222" font-family="Arial" font-size="7" fill="#888">Integration zone</text>
  <text x="195" y="235" font-family="Arial" font-size="7" fill="#888">Highest Na⁺ channel density</text>

  <!-- Axon -->
  <line x1="185" y1="200" x2="490" y2="200" stroke="#333" stroke-width="3"/>

  <!-- Myelin segments -->
  <rect x="200" y="188" width="45" height="24" rx="12" fill="#bdbdbd" stroke="#666" stroke-width="1.5"/>
  <rect x="270" y="188" width="45" height="24" rx="12" fill="#bdbdbd" stroke="#666" stroke-width="1.5"/>
  <rect x="340" y="188" width="45" height="24" rx="12" fill="#bdbdbd" stroke="#666" stroke-width="1.5"/>
  <rect x="410" y="188" width="45" height="24" rx="12" fill="#bdbdbd" stroke="#666" stroke-width="1.5"/>

  <!-- Schwann cell nuclei -->
  <ellipse cx="222" cy="218" rx="8" ry="4" fill="#888"/>
  <ellipse cx="292" cy="218" rx="8" ry="4" fill="#888"/>
  <ellipse cx="362" cy="218" rx="8" ry="4" fill="#888"/>
  <ellipse cx="432" cy="218" rx="8" ry="4" fill="#888"/>

  <!-- Myelin labels -->
  <text x="222" y="175" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">Myelin</text>
  <text x="292" y="175" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">Sheath</text>
  <text x="362" y="175" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">(Schwann cell)</text>

  <!-- Nodes of Ranvier -->
  <rect x="245" y="186" width="8" height="28" rx="2" fill="#e53935"/>
  <rect x="315" y="186" width="8" height="28" rx="2" fill="#e53935"/>
  <rect x="385" y="186" width="8" height="28" rx="2" fill="#e53935"/>

  <text x="249" y="240" text-anchor="middle" font-family="Arial" font-size="7" fill="#e53935">Node of</text>
  <text x="249" y="251" text-anchor="middle" font-family="Arial" font-size="7" fill="#e53935">Ranvier</text>

  <!-- Axon direction -->
  <text x="320" y="260" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Axon: conducts action potential →</text>

  <!-- Synaptic terminals -->
  <path d="M490,200 Q510,180 520,170 M490,200 Q510,210 520,220 M490,200 Q510,200 520,200" fill="none" stroke="#333" stroke-width="2"/>

  <!-- Terminal boutons -->
  <circle cx="530" cy="168" r="12" fill="#fff9c4" stroke="#ff8f00" stroke-width="2"/>
  <text x="530" y="171" text-anchor="middle" font-family="Arial" font-size="6" fill="#333">Synaptic</text>

  <circle cx="535" cy="200" r="12" fill="#fff9c4" stroke="#ff8f00" stroke-width="2"/>
  <text x="535" y="203" text-anchor="middle" font-family="Arial" font-size="6" fill="#333">Terminals</text>

  <circle cx="525" cy="228" r="12" fill="#fff9c4" stroke="#ff8f00" stroke-width="2"/>
  <text x="525" y="231" text-anchor="middle" font-family="Arial" font-size="6" fill="#333">(Boutons)</text>

  <!-- Vesicles in terminals -->
  <circle cx="528" cy="165" r="2" fill="#ff8f00"/>
  <circle cx="533" cy="168" r="2" fill="#ff8f00"/>
  <circle cx="533" cy="197" r="2" fill="#ff8f00"/>
  <circle cx="528" cy="225" r="2" fill="#ff8f00"/>

  <text x="555" y="165" font-family="Arial" font-size="7" fill="#888">Vesicles</text>

  <!-- Function labels -->
  <rect x="20" y="290" width="560" height="120" rx="8" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
  <text x="300" y="312" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Structure → Function Mapping</text>

  <line x1="20" y1="320" x2="580" y2="320" stroke="#ccc" stroke-width="1"/>

  <text x="40" y="340" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Structure</text>
  <text x="200" y="340" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Key Feature</text>
  <text x="440" y="340" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Function</text>

  <text x="40" y="360" font-family="Arial" font-size="8" fill="#555">Dendrites</text>
  <text x="200" y="360" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Branched, spines</text>
  <text x="440" y="360" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Maximize synaptic input surface</text>

  <text x="40" y="378" font-family="Arial" font-size="8" fill="#555">Axon Hillock</text>
  <text x="200" y="378" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">High Na⁺ ch density</text>
  <text x="440" y="378" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">AP initiation (integration zone)</text>

  <text x="40" y="396" font-family="Arial" font-size="8" fill="#555">Myelin Sheath</text>
  <text x="200" y="396" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Lipid insulation</text>
  <text x="440" y="396" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">↑Conduction speed, ↓ATP cost</text>

  <!-- PNS vs CNS -->
  <rect x="20" y="425" width="560" height="50" rx="6" fill="#e8eaf6" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="300" y="445" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a" font-weight="bold">PNS: Schwann cells (one segment per axon) | CNS: Oligodendrocytes (myelinate multiple axons)</text>
  <text x="300" y="462" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">Multiple sclerosis: autoimmune attack on CNS myelin → slowed/blocked conduction</text>

  <rect x="20" y="490" width="560" height="30" rx="4" fill="#fff3e0" stroke="#ff8f00" stroke-width="1"/>
  <text x="300" y="510" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Signal flow: Dendrites → Soma → Axon Hillock (integration) → Axon (conduction) → Terminals (transmission)</text>
</svg>
