<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <defs><style>text { font-family: Arial, sans-serif; } .title { font-size: 18px; font-weight: bold; fill: #1a6b3c; text-anchor: middle; } .lab { font-size: 13px; fill: #333; text-anchor: middle; } .sm { font-size: 11px; fill: #555; text-anchor: middle; }</style></defs>
  <rect width="600" height="380" fill="#fff"/>
  <text x="300" y="28" class="title">Fibrous vs Globular Proteins</text>

  <!-- Fibrous -->
  <rect x="15" y="45" width="280" height="290" rx="8" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="2"/>
  <text x="155" y="70" class="lab" fill="#283593" font-weight="bold" font-size="15">Fibrous Proteins</text>
  <!-- elongated shape -->
  <rect x="55" y="85" width="200" height="35" rx="8" fill="#7986cb" opacity="0.5" stroke="#5c6bc0" stroke-width="2"/>
  <rect x="55" y="130" width="200" height="35" rx="8" fill="#7986cb" opacity="0.5" stroke="#5c6bc0" stroke-width="2"/>
  <rect x="55" y="175" width="200" height="35" rx="8" fill="#7986cb" opacity="0.5" stroke="#5c6bc0" stroke-width="2"/>
  <text x="155" y="240" class="sm" fill="#283593">✓ Elongated, rod-like</text>
  <text x="155" y="256" class="sm" fill="#283593">✓ Insoluble in water</text>
  <text x="155" y="272" class="sm" fill="#283593">✓ Structural function</text>
  <text x="155" y="288" class="sm" fill="#283593">✓ Repetitive sequences</text>
  <text x="155" y="310" class="lab" fill="#283593" font-weight="bold">Examples:</text>
  <text x="155" y="326" class="sm" fill="#283593">Collagen, Keratin, Elastin, Fibrin</text>

  <!-- Globular -->
  <rect x="305" y="45" width="280" height="290" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="445" y="70" class="lab" fill="#1a6b3c" font-weight="bold" font-size="15">Globular Proteins</text>
  <!-- compact shape -->
  <ellipse cx="445" cy="115" rx="60" ry="40" fill="#81c784" opacity="0.5" stroke="#43a047" stroke-width="2"/>
  <ellipse cx="445" cy="180" rx="40" ry="30" fill="#81c784" opacity="0.5" stroke="#43a047" stroke-width="2"/>
  <text x="445" y="240" class="sm" fill="#1a6b3c">✓ Compact, spherical</text>
  <text x="445" y="256" class="sm" fill="#1a6b3c">✓ Soluble in water</text>
  <text x="445" y="272" class="sm" fill="#1a6b3c">✓ Metabolic functions</text>
  <text x="445" y="288" class="sm" fill="#1a6b3c">✓ Mixed 2° structures</text>
  <text x="445" y="310" class="lab" fill="#1a6b3c" font-weight="bold">Examples:</text>
  <text x="445" y="326" class="sm" fill="#1a6b3c">Hemoglobin, Enzymes, Antibodies</text>

  <!-- Comparison note -->
  <rect x="40" y="345" width="520" height="28" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="364" class="sm" fill="#666">Fibrous = structural (collagen, keratin) | Globular = catalytic/transport (enzymes, hemoglobin)</text>
</svg>
