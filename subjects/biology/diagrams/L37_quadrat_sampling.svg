<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 640" width="600" height="640">
  <rect width="600" height="640" fill="white"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">L37a — Quadrat Random Sampling</text>

  <!-- Study area border -->
  <rect x="55" y="65" width="490" height="490" fill="#f5f5f0" stroke="#333" stroke-width="2.5"/>

  <!-- Grid lines -->
  <g stroke="#aaa" stroke-width="0.8" stroke-dasharray="4,3">
    <line x1="55" y1="114" x2="545" y2="114"/><line x1="55" y1="163" x2="545" y2="163"/>
    <line x1="55" y1="212" x2="545" y2="212"/><line x1="55" y1="261" x2="545" y2="261"/>
    <line x1="55" y1="310" x2="545" y2="310"/><line x1="55" y1="359" x2="545" y2="359"/>
    <line x1="55" y1="408" x2="545" y2="408"/><line x1="55" y1="457" x2="545" y2="457"/>
    <line x1="55" y1="506" x2="545" y2="506"/>
    <line x1="104" y1="65" x2="104" y2="555"/><line x1="153" y1="65" x2="153" y2="555"/>
    <line x1="202" y1="65" x2="202" y2="555"/><line x1="251" y1="65" x2="251" y2="555"/>
    <line x1="300" y1="65" x2="300" y2="555"/><line x1="349" y1="65" x2="349" y2="555"/>
    <line x1="398" y1="65" x2="398" y2="555"/><line x1="447" y1="65" x2="447" y2="555"/>
    <line x1="496" y1="65" x2="496" y2="555"/>
  </g>

  <!-- Axis labels -->
  <text x="300" y="590" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">X-coordinate (m) →</text>
  <text x="38" y="315" text-anchor="middle" font-family="Arial" font-size="14" fill="#333" transform="rotate(-90,38,315)">Y-coordinate (m) →</text>

  <!-- Grid numbers on axes -->
  <g font-family="Arial" font-size="11" fill="#666">
    <text x="82" y="62">0</text><text x="120" y="62">1</text><text x="169" y="62">2</text><text x="218" y="62">3</text>
    <text x="267" y="62">4</text><text x="316" y="62">5</text><text x="365" y="62">6</text><text x="414" y="62">7</text>
    <text x="463" y="62">8</text><text x="510" y="62">9</text><text x="555" y="62">10</text>
    <text x="45" y="118">0</text><text x="45" y="167">1</text><text x="45" y="216">2</text><text x="45" y="265">3</text>
    <text x="45" y="314">4</text><text x="45" y="363">5</text><text x="45" y="412">6</text><text x="45" y="461">7</text>
    <text x="45" y="510">8</text><text x="45" y="558">9</text>
  </g>

  <!-- Quadrats drawn at random positions -->
  <g fill="none" stroke="#e53935" stroke-width="2">
    <rect x="153" y="163" width="49" height="49"/>
    <rect x="349" y="114" width="49" height="49"/>
    <rect x="496" y="261" width="49" height="49"/>
    <rect x="251" y="408" width="49" height="49"/>
    <rect x="104" y="359" width="49" height="49"/>
    <rect x="447" y="457" width="49" height="49"/>
    <rect x="349" y="310" width="49" height="49"/>
    <rect x="55" y="212" width="49" height="49"/>
  </g>

  <!-- Quadrat labels -->
  <g font-family="Arial" font-size="10" fill="#e53935">
    <text x="177" y="155" text-anchor="middle">Q1</text>
    <text x="373" y="106" text-anchor="middle">Q2</text>
    <text x="520" y="253" text-anchor="middle">Q3</text>
    <text x="275" y="400" text-anchor="middle">Q4</text>
    <text x="128" y="351" text-anchor="middle">Q5</text>
    <text x="471" y="449" text-anchor="middle">Q6</text>
    <text x="373" y="302" text-anchor="middle">Q7</text>
    <text x="79" y="204" text-anchor="middle">Q8</text>
  </g>

  <!-- Organisms inside quadrats -->
  <g fill="#1a6b3c" font-size="14">⋆</g>
  <g font-family="Arial" font-size="8" fill="#1a6b3c">
    <!-- dots for organisms -->
  </g>
  <!-- Draw dots as organisms in quadrats -->
  <g fill="#1a6b3c">
    <circle cx="165" cy="180" r="2.5"/><circle cx="175" cy="192" r="2.5"/><circle cx="185" cy="176" r="2.5"/>
    <circle cx="170" cy="200" r="2.5"/><circle cx="190" cy="202" r="2.5"/><circle cx="178" cy="185" r="2.5"/>

    <circle cx="360" cy="130" r="2.5"/><circle cx="370" cy="145" r="2.5"/><circle cx="382" cy="135" r="2.5"/>
    <circle cx="355" cy="150" r="2.5"/>

    <circle cx="510" cy="275" r="2.5"/><circle cx="520" cy="290" r="2.5"/><circle cx="530" cy="280" r="2.5"/>
    <circle cx="515" cy="300" r="2.5"/><circle cx="505" cy="285" r="2.5"/>

    <circle cx="265" cy="420" r="2.5"/><circle cx="280" cy="435" r="2.5"/><circle cx="275" cy="445" r="2.5"/>

    <circle cx="118" cy="375" r="2.5"/><circle cx="130" cy="385" r="2.5"/>

    <circle cx="460" cy="470" r="2.5"/><circle cx="475" cy="485" r="2.5"/><circle cx="470" cy="495" r="2.5"/>
    <circle cx="485" cy="475" r="2.5"/>

    <circle cx="365" cy="325" r="2.5"/><circle cx="375" cy="340" r="2.5"/>

    <circle cx="70" cy="225" r="2.5"/><circle cx="80" cy="240" r="2.5"/><circle cx="85" cy="230" r="2.5"/>
  </g>

  <!-- Legend -->
  <rect x="55" y="570" width="490" height="52" rx="4" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
  <text x="72" y="590" font-family="Arial" font-size="12" fill="#333">Study area: 10 m × 10 m</text>
  <text x="260" y="590" font-family="Arial" font-size="12" fill="#e53935">▢ Quadrat 0.5 m × 0.5 m (random coordinates)</text>
  <text x="72" y="610" font-family="Arial" font-size="12" fill="#1a6b3c">● Organisms counted per quadrat</text>
  <text x="260" y="610" font-family="Arial" font-size="12" fill="#333">N = mean/quadrat × total area / quadrat area</text>
</svg>