<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480">
  <rect width="600" height="480" fill="#fff"/>
  <text x="300" y="26" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">The Central Dogma of Molecular Biology</text>
  <text x="300" y="44" text-anchor="middle" font-family="Arial" font-size="11" fill="#666" font-style="italic">DNA → RNA → Protein (Crick, 1958)</text>

  <!-- Nucleus -->
  <rect x="30" y="60" width="220" height="160" rx="12" fill="#e8eaf6" stroke="#7986cb" stroke-width="2"/>
  <text x="140" y="80" text-anchor="middle" font-family="Arial" font-size="11" fill="#5c6bc0" font-weight="bold">NUCLEUS</text>

  <!-- DNA double helix -->
  <g transform="translate(140,110)">
    <line x1="-50" y1="6" x2="50" y2="6" stroke="#1565c0" stroke-width="3"/>
    <line x1="-50" y1="16" x2="50" y2="16" stroke="#e53935" stroke-width="3"/>
    <!-- helix twists -->
    <path d="M-40,6 Q-30,11 -20,6" fill="none" stroke="#1565c0" stroke-width="1.5"/>
    <path d="M-20,16 Q-10,11 0,16" fill="none" stroke="#e53935" stroke-width="1.5"/>
    <path d="M10,6 Q20,11 30,6" fill="none" stroke="#1565c0" stroke-width="1.5"/>
    <path d="M0,16 Q10,11 20,16" fill="none" stroke="#e53935" stroke-width="1.5"/>
  </g>
  <text x="140" y="140" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">DNA</text>

  <!-- Transcription arrow -->
  <text x="220" y="118" font-family="Arial" font-size="9" fill="#1a6b3c">Transcription</text>
  <line x1="210" y1="125" x2="260" y2="125" stroke="#1a6b3c" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="235" y="114" font-family="Arial" font-size="7" fill="#1a6b3c">RNA Pol</text>

  <!-- mRNA -->
  <text x="305" y="115" font-family="Arial" font-size="10" fill="#333">mRNA</text>
  <line x1="270" y1="120" x2="350" y2="120" stroke="#ff8f00" stroke-width="2.5"/>

  <!-- Nuclear pore -->
  <rect x="350" y="82" width="20" height="50" rx="4" fill="#fff" stroke="#7986cb" stroke-width="1.5"/>
  <text x="360" y="115" text-anchor="middle" font-family="Arial" font-size="8" fill="#5c6bc0">↗</text>

  <!-- Cytoplasm label -->
  <text x="440" y="80" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff8f00" font-weight="bold">CYTOPLASM</text>

  <!-- Ribosome -->
  <ellipse cx="420" cy="130" rx="35" ry="18" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="420" y="134" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c" font-weight="bold">Ribosome</text>

  <!-- Translation arrow -->
  <line x1="460" y1="130" x2="510" y2="130" stroke="#1a6b3c" stroke-width="2"/>
  <text x="480" y="125" font-family="Arial" font-size="9" fill="#1a6b3c">Translation</text>

  <!-- Protein -->
  <text x="540" y="124" font-family="Arial" font-size="10" fill="#6a1b9a">Protein</text>
  <path d="M520,130 Q525,120 530,130 Q535,120 540,130 Q545,120 550,130 Q555,120 560,130" fill="none" stroke="#6a1b9a" stroke-width="2.5"/>

  <!-- Reverse transcription -->
  <defs>
    <marker id="arrG" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#1a6b3c"/></marker>
  </defs>

  <text x="300" y="175" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-style="italic">(DNA → RNA → Protein: Information flows one way, with exceptions)</text>

  <!-- Details panel -->
  <rect x="30" y="195" width="540" height="110" rx="6" fill="none" stroke="#ccc" stroke-width="1"/>
  <text x="300" y="216" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Key Steps</text>

  <rect x="45" y="226" width="245" height="68" rx="5" fill="#e8eaf6" stroke="#c5cae9" stroke-width="1"/>
  <text x="167" y="244" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Transcription (Nucleus)</text>
  <text x="55" y="260" font-family="Arial" font-size="9" fill="#555">• RNA polymerase binds promoter</text>
  <text x="55" y="274" font-family="Arial" font-size="9" fill="#555">• Reads template strand 3'→5'</text>
  <text x="55" y="288" font-family="Arial" font-size="9" fill="#555">• Synthesizes mRNA 5'→3' (U replaces T)</text>

  <rect x="310" y="226" width="245" height="68" rx="5" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="432" y="244" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">Translation (Cytoplasm)</text>
  <text x="320" y="260" font-family="Arial" font-size="9" fill="#555">• mRNA binds small ribosomal subunit</text>
  <text x="320" y="274" font-family="Arial" font-size="9" fill="#555">• tRNA anticodon pairs with mRNA codon</text>
  <text x="320" y="288" font-family="Arial" font-size="9" fill="#555">• Peptide bonds form → polypeptide chain</text>

  <!-- Reverse transcription arrow -->
  <line x1="280" y1="115" x2="120" y2="155" stroke="#e53935" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="260" y="150" font-family="Arial" font-size="7" fill="#e53935" transform="rotate(-20,260,150)">Reverse transcriptase (retroviruses)</text>

  <!-- mRNA processing note -->
  <text x="300" y="330" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">mRNA Processing (Eukaryotes only)</text>
  <text x="300" y="350" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">pre-mRNA → 5' cap + 3' poly-A tail + splicing → mature mRNA</text>

  <rect x="80" y="360" width="130" height="30" rx="4" fill="#1565c0" opacity="0.12" stroke="#1565c0" stroke-width="1"/>
  <text x="145" y="380" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">5' 7-methylguanosine Cap</text>

  <rect x="220" y="360" width="100" height="30" rx="4" fill="#43a047" opacity="0.12" stroke="#1a6b3c" stroke-width="1"/>
  <text x="270" y="380" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Splicing</text>

  <rect x="330" y="360" width="130" height="30" rx="4" fill="#ff8f00" opacity="0.12" stroke="#ff8f00" stroke-width="1"/>
  <text x="395" y="380" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff8f00">3' Poly-A Tail (∼200 A)</text>

  <text x="300" y="415" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">Prokaryotes: transcription &amp; translation are coupled (no nucleus, no processing)</text>

  <!-- Exceptions box -->
  <rect x="30" y="425" width="540" height="45" rx="5" fill="#fff3e0" stroke="#ffcc80" stroke-width="1"/>
  <text x="300" y="443" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00">⚠ Exceptions: Reverse transcription (retroviruses: RNA→DNA), RNA viruses (RNA→RNA), Prions (protein→protein conformation)</text>
  <text x="300" y="460" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00">Some RNA molecules are the final product (rRNA, tRNA, snRNA) — never translated.</text>
</svg>
