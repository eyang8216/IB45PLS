<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440">
  <rect width="600" height="440" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Negative Feedback Loop — Homeostatic Control</text>

  <!-- Circular diagram -->
  <g transform="translate(300, 230)">
    <!-- Central circle -->
    <circle cx="0" cy="0" r="195" fill="none" stroke="#ddd" stroke-width="3" stroke-dasharray="8,4"/>
    <circle cx="0" cy="0" r="55" fill="#1a6b3c" opacity="0.9"/>
    <text x="0" y="-5" text-anchor="middle" font-family="Arial" font-size="13" fill="#fff" font-weight="bold">SET</text>
    <text x="0" y="12" text-anchor="middle" font-family="Arial" font-size="13" fill="#fff" font-weight="bold">POINT</text>

    <!-- Arrows around the circle -->
    <!-- Top: Stimulus -->
    <circle cx="0" cy="-165" r="38" fill="#e53935" opacity="0.15"/>
    <text x="0" y="-172" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">① Stimulus</text>
    <text x="0" y="-156" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Deviation from</text>
    <text x="0" y="-144" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">set point</text>

    <!-- Right: Receptor -->
    <circle cx="165" cy="0" r="38" fill="#ff8f00" opacity="0.15"/>
    <text x="165" y="-7" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#ff8f00">② Receptor</text>
    <text x="165" y="9" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Detects</text>
    <text x="165" y="21" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">the change</text>

    <!-- Bottom-Right: Signal -->
    <circle cx="128" cy="115" r="38" fill="#6a1b9a" opacity="0.15"/>
    <text x="128" y="108" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">③ Signal</text>
    <text x="128" y="124" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Nerve impulse</text>
    <text x="128" y="136" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">or hormone</text>

    <!-- Bottom-Left: Integrator -->
    <circle cx="-128" cy="115" r="38" fill="#1565c0" opacity="0.15"/>
    <text x="-128" y="108" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">④ Integrator</text>
    <text x="-128" y="124" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Control centre</text>
    <text x="-128" y="136" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">(e.g., hypothalamus)</text>

    <!-- Top-Left: Effector + Response -->
    <circle cx="-128" cy="-115" r="38" fill="#43a047" opacity="0.15"/>
    <text x="-128" y="-122" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#43a047">⑤ Effector</text>
    <text x="-128" y="-106" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Carries out</text>
    <text x="-128" y="-94" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">response</text>

    <!-- Arrows connecting -->
    <path d="M0,-127 A20,20 0 0,1 38,-38" stroke="#999" stroke-width="2" fill="none"/>
    <path d="M127,0 A20,20 0 0,1 55,38" stroke="#999" stroke-width="2" fill="none"/>
    <path d="M90,90 A20,20 0 0,1 0,60" stroke="#999" stroke-width="2" fill="none"/>
    <path d="M-90,90 A20,20 0 0,1 -55,38" stroke="#999" stroke-width="2" fill="none"/>
    <path d="M-127,0 A20,20 0 0,1 -38,-38" stroke="#999" stroke-width="2" fill="none"/>
    <path d="M-90,-90 A20,20 0 0,1 0,-60" stroke="#999" stroke-width="2" fill="none"/>
  </g>

  <!-- Bottom text -->
  <rect x="30" y="45" width="540" height="55" rx="8" fill="#fff8e1" stroke="#ff8f00" stroke-width="1"/>
  <text x="300" y="65" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#ff8f00">NEGATIVE = Response OPPOSES stimulus → returns toward set point</text>
  <text x="300" y="85" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Contrast: Positive feedback AMPLIFIES stimulus (childbirth, blood clotting, action potential)</text>

  <rect x="30" y="390" width="540" height="38" rx="8" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="1"/>
  <text x="300" y="408" text-anchor="middle" font-family="Arial" font-size="12" fill="#1a6b3c">Controlled variables: temperature (~37°C), blood glucose (~5 mM), pH (7.35–7.45), osmolality (~290 mOsm)</text>
  <text x="300" y="424" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Homeostasis = dynamic equilibrium — continuous oscillation around set point</text>
</svg>
