<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Guard Cells &amp; iPSC Reprogramming</text>

  <!-- GUARD CELLS -->
  <rect x="20" y="40" width="270" height="200" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="155" y="60" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">Guard Cells (Stomata)</text>

  <!-- Kidney-shaped guard cells -->
  <g fill="#81c784" stroke="#1a6b3c" stroke-width="2.5">
    <path d="M100,130 Q95,160 100,190 Q140,180 150,160 Q130,150 100,130Z" opacity="0.8"/>
    <path d="M210,130 Q215,160 210,190 Q170,180 160,160 Q180,150 210,130Z" opacity="0.8"/>
  </g>

  <!-- Stoma (pore) -->
  <path d="M130,145 Q155,160 180,145" fill="none" stroke="#333" stroke-width="2"/>
  <text x="155" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Stoma</text>
  <text x="155" y="175" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">(pore)</text>

  <!-- Chloroplasts -->
  <g fill="#1a6b3c">
    <ellipse cx="110" cy="145" rx="6" ry="4"/><ellipse cx="120" cy="170" rx="6" ry="4"/>
    <ellipse cx="200" cy="145" rx="6" ry="4"/><ellipse cx="190" cy="170" rx="6" ry="4"/>
  </g>

  <!-- Uneven wall -->
  <text x="155" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Uneven cellulose wall</text>
  <text x="155" y="225" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">(inner thick, outer thin)</text>

  <text x="155" y="245" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Turgid → stoma opens</text>
  <text x="155" y="258" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Flaccid → stoma closes</text>

  <!-- iPSC -->
  <rect x="310" y="40" width="270" height="320" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="445" y="60" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">iPSC — Induced Pluripotent SC</text>

  <!-- Fibroblast -->
  <ellipse cx="370" cy="95" rx="35" ry="20" fill="#ff8f00" opacity="0.6" stroke="#e65100" stroke-width="2"/>
  <text x="370" y="90" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Adult</text>
  <text x="370" y="102" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Fibroblast</text>

  <!-- Arrow -->
  <line x1="420" y1="95" x2="460" y2="95" stroke="#333" stroke-width="2"/>
  <polygon points="460,90 470,95 460,100" fill="#333"/>

  <!-- Yamanaka factors box -->
  <rect x="470" y="75" width="100" height="40" rx="6" fill="#6a1b9a" opacity="0.8"/>
  <text x="520" y="90" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Oct4 Sox2</text>
  <text x="520" y="103" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Klf4 c-Myc</text>
  <text x="520" y="70" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Yamanaka</text>
  <text x="520" y="68" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">factors</text>

  <!-- Dedifferentiation arrow -->
  <path d="M520,115 Q520,145 520,160" stroke="#6a1b9a" stroke-width="2" fill="none" marker-end="url(#gip)"/>
  <defs><marker id="gip" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#6a1b9a"/></marker></defs>
  <text x="535" y="140" font-family="Arial" font-size="9" fill="#6a1b9a">Dedifferentiation</text>
  <text x="535" y="152" font-family="Arial" font-size="8" fill="#555">~2–4 weeks</text>

  <!-- iPSC -->
  <circle cx="520" cy="185" r="25" fill="#6a1b9a" opacity="0.7" stroke="#4a148c" stroke-width="2.5"/>
  <text x="520" y="182" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#fff">iPSC</text>
  <text x="520" y="198" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Pluripotent</text>

  <!-- Differentiation potential -->
  <g>
    <line x1="520" y1="210" x2="440" y2="250" stroke="#6a1b9a" stroke-width="1.5"/>
    <line x1="520" y1="210" x2="520" y2="260" stroke="#6a1b9a" stroke-width="1.5"/>
    <line x1="520" y1="210" x2="600" y2="250" stroke="#6a1b9a" stroke-width="1.5"/>

    <rect x="390" y="248" width="50" height="20" rx="4" fill="#1565c0" opacity="0.7"/>
    <text x="415" y="261" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Neurons</text>

    <rect x="495" y="258" width="50" height="20" rx="4" fill="#e53935" opacity="0.7"/>
    <text x="520" y="271" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Cardiomyocytes</text>

    <rect x="560" y="248" width="50" height="20" rx="4" fill="#1a6b3c" opacity="0.7"/>
    <text x="585" y="261" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Hepatocytes</text>
  </g>

  <!-- Key info -->
  <text x="445" y="300" font-family="Arial" font-size="9" fill="#555">4 transcription factors delivered</text>
  <text x="445" y="315" font-family="Arial" font-size="9" fill="#555">via viral vector → reprogram gene</text>
  <text x="445" y="330" font-family="Arial" font-size="9" fill="#555">expression → pluripotent state</text>
  <text x="445" y="350" font-family="Arial" font-size="9" fill="#555">No embryo needed (ethical advance)</text>
</svg>