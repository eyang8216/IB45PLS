<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 550" font-family="Arial, sans-serif">
  <rect width="600" height="550" fill="#fff"/>
  <text x="300" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Cohesion-Tension Theory: Transpiration Stream</text>

  <!-- Leaf at top -->
  <g transform="translate(300,50)">
    <ellipse cx="0" cy="0" rx="80" ry="25" fill="#43a047" opacity="0.3" stroke="#43a047" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-size="10" fill="#1a6b3c" font-weight="bold">LEAF</text>
    <text x="0" y="18" text-anchor="middle" font-size="8" fill="#333">(spongy mesophyll)</text>

    <!-- Evaporation -->
    <path d="M-20,-25 Q-30,-45 -20,-60" fill="none" stroke="#ff8f00" stroke-width="1.5" marker-end="url(#arrowEv)"/>
    <path d="M0,-25 Q5,-50 0,-65" fill="none" stroke="#ff8f00" stroke-width="1.5" marker-end="url(#arrowEv)"/>
    <path d="M20,-25 Q30,-45 20,-60" fill="none" stroke="#ff8f00" stroke-width="1.5" marker-end="url(#arrowEv)"/>
    <text x="0" y="-75" text-anchor="middle" font-size="9" fill="#ff8f00">Transpiration</text>
    <text x="0" y="-65" text-anchor="middle" font-size="8" fill="#ff8f00">(evaporation)</text>

    <defs><marker id="arrowEv" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="#ff8f00"/></marker></defs>
  </g>

  <!-- Xylem column -->
  <rect x="285" y="80" width="30" height="300" rx="4" fill="#1565c0" opacity="0.1" stroke="#1565c0" stroke-width="2"/>
  <text x="265" y="230" text-anchor="middle" font-size="10" fill="#1565c0" font-weight="bold" transform="rotate(-90,265,230)">XYLEM VESSEL</text>

  <!-- Water molecules with H-bonds -->
  <g transform="translate(300,0)">
    <circle cx="0" cy="110" r="6" fill="#43a047" opacity="0.6"/>
    <circle cx="0" cy="130" r="6" fill="#43a047" opacity="0.6"/>
    <circle cx="0" cy="150" r="6" fill="#43a047" opacity="0.6"/>
    <circle cx="0" cy="170" r="6" fill="#43a047" opacity="0.6"/>
    <circle cx="0" cy="190" r="6" fill="#43a047" opacity="0.6"/>
    <circle cx="0" cy="210" r="6" fill="#43a047" opacity="0.6"/>
    <circle cx="0" cy="230" r="6" fill="#43a047" opacity="0.6"/>
    <circle cx="0" cy="250" r="6" fill="#43a047" opacity="0.6"/>
    <circle cx="0" cy="270" r="6" fill="#43a047" opacity="0.6"/>
    <circle cx="0" cy="290" r="6" fill="#43a047" opacity="0.6"/>
    <circle cx="0" cy="310" r="6" fill="#43a047" opacity="0.6"/>
    <circle cx="0" cy="330" r="6" fill="#43a047" opacity="0.6"/>
    <circle cx="0" cy="350" r="6" fill="#43a047" opacity="0.6"/>
    <circle cx="0" cy="370" r="6" fill="#43a047" opacity="0.6"/>

    <!-- H-bonds between water -->
    <line x1="0" y1="116" x2="0" y2="124" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="3,3"/>
    <line x1="0" y1="136" x2="0" y2="144" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="3,3"/>
    <line x1="0" y1="156" x2="0" y2="164" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="3,3"/>
    <line x1="0" y1="176" x2="0" y2="184" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="3,3"/>
    <line x1="0" y1="196" x2="0" y2="204" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="3,3"/>
    <line x1="0" y1="216" x2="0" y2="224" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="3,3"/>
    <line x1="0" y1="236" x2="0" y2="244" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="3,3"/>
    <line x1="0" y1="256" x2="0" y2="264" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="3,3"/>
    <line x1="0" y1="276" x2="0" y2="284" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="3,3"/>
    <line x1="0" y1="296" x2="0" y2="304" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="3,3"/>
    <line x1="0" y1="316" x2="0" y2="324" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="3,3"/>
    <line x1="0" y1="336" x2="0" y2="344" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="3,3"/>
    <line x1="0" y1="356" x2="0" y2="364" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="3,3"/>
  </g>

  <text x="350" y="230" text-anchor="middle" font-size="9" fill="#1565c0">Cohesion:</text>
  <text x="350" y="243" text-anchor="middle" font-size="9" fill="#1565c0">H-bonds</text>
  <text x="350" y="256" text-anchor="middle" font-size="9" fill="#1565c0">between</text>
  <text x="350" y="269" text-anchor="middle" font-size="9" fill="#1565c0">H₂O</text>

  <!-- Adhesion to walls -->
  <text x="350" y="310" text-anchor="middle" font-size="9" fill="#6a1b9a">Adhesion:</text>
  <text x="350" y="323" text-anchor="middle" font-size="9" fill="#6a1b9a">H₂O sticks</text>
  <text x="350" y="336" text-anchor="middle" font-size="9" fill="#6a1b9a">to xylem</text>
  <text x="350" y="349" text-anchor="middle" font-size="9" fill="#6a1b9a">walls</text>

  <!-- Tension arrow -->
  <defs><marker id="arrowTen" markerWidth="8" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 Z" fill="#e53935"/></marker></defs>
  <line x1="300" y1="80" x2="300" y2="380" stroke="#e53935" stroke-width="3" marker-end="url(#arrowTen)"/>
  <text x="315" y="100" font-size="9" fill="#e53935" font-weight="bold">TENSION</text>
  <text x="315" y="112" font-size="9" fill="#e53935">(negative ψp)</text>

  <!-- Roots -->
  <g transform="translate(300,400)">
    <ellipse cx="0" cy="0" rx="60" ry="20" fill="#81c784" opacity="0.25" stroke="#1a6b3c" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-size="10" fill="#1a6b3c" font-weight="bold">ROOTS</text>
  </g>

  <!-- Water from soil -->
  <path d="M200 410 Q220 395 250 400" fill="none" stroke="#1565c0" stroke-width="2"/>
  <text x="190" y="418" font-size="8" fill="#1565c0">Water from soil</text>
  <text x="190" y="428" font-size="8" fill="#1565c0">(ψ ≈ 0)</text>

  <!-- Gradient -->
  <rect x="30" y="445" width="540" height="55" rx="6" fill="none" stroke="#ddd" stroke-width="1.5"/>
  <text x="300" y="465" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Water Potential Gradient</text>
  <text x="300" y="485" text-anchor="middle" font-size="10" fill="#333">ψsoil (~0) → ψroot xylem (~−0.2) → ψstem xylem (~−0.5 to −1) → ψleaf (~−1 to −3) → ψatmosphere (~−100 MPa)</text>

  <text x="300" y="520" text-anchor="middle" font-size="9" fill="#666">Massive ψ gradient between leaf and atmosphere is the ultimate driver of transpiration</text>
</svg>