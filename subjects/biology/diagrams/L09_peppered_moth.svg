<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420">
  <rect width="600" height="420" fill="#fff"/>
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#333">Peppered Moth (*Biston betularia*) — Industrial Melanism</text>
  <text x="300" y="45" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Natural selection in action: camouflage &amp; predation</text>
  <!-- BEFORE -->
  <rect x="20" y="65" width="270" height="320" rx="8" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  <text x="155" y="90" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">Pre-Industrial (before 1850)</text>
  <!-- Tree trunk - light -->
  <rect x="80" y="105" width="18" height="260" rx="5" fill="#c8b89a" stroke="#999" stroke-width="1.5"/>
  <rect x="85" y="120" width="8" height="20" rx="3" fill="#b8a88a" stroke="#999" stroke-width="1"/>
  <rect x="90" y="200" width="6" height="18" rx="3" fill="#b8a88a" stroke="#999" stroke-width="1"/>
  <rect x="82" y="260" width="12" height="22" rx="3" fill="#b8a88a" stroke="#999" stroke-width="1"/>
  <!-- Lichen spots -->
  <circle cx="88" cy="150" r="5" fill="#a8c898" opacity="0.7"/>
  <circle cx="92" cy="220" r="4" fill="#a8c898" opacity="0.7"/>
  <circle cx="86" cy="300" r="6" fill="#a8c898" opacity="0.7"/>
  <!-- Light moths -->
  <ellipse cx="120" cy="160" rx="14" ry="8" fill="#e8ddd0" stroke="#aaa" stroke-width="1.5"/>
  <ellipse cx="155" cy="220" rx="14" ry="8" fill="#e8ddd0" stroke="#aaa" stroke-width="1.5"/>
  <ellipse cx="130" cy="280" rx="14" ry="8" fill="#e8ddd0" stroke="#aaa" stroke-width="1.5"/>
  <ellipse cx="160" cy="310" rx="14" ry="8" fill="#e8ddd0" stroke="#aaa" stroke-width="1.5"/>
  <!-- Dark moth (few) -->
  <ellipse cx="105" cy="330" rx="14" ry="8" fill="#444" stroke="#333" stroke-width="1.5"/>
  <!-- Labels -->
  <text x="200" y="115" font-family="Arial" font-size="11" fill="#333">Light bark + lichen</text>
  <text x="200" y="135" font-family="Arial" font-size="11" fill="#333">Light moths CAMOUFLAGED</text>
  <text x="200" y="155" font-family="Arial" font-size="11" fill="#333">→ survive predation</text>
  <text x="200" y="180" font-family="Arial" font-size="11" fill="#333">Dark moths CONSPICUOUS</text>
  <text x="200" y="200" font-family="Arial" font-size="11" fill="#333">→ eaten by birds</text>
  <text x="200" y="245" font-family="Arial" font-size="11" font-weight="bold" fill="#1a6b3c">Population: mostly light</text>
  <!-- AFTER -->
  <rect x="310" y="65" width="270" height="320" rx="8" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  <text x="445" y="90" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e53935">Industrial (after 1850)</text>
  <!-- Tree trunk - dark -->
  <rect x="370" y="105" width="18" height="260" rx="5" fill="#555" stroke="#333" stroke-width="1.5"/>
  <rect x="375" y="140" width="8" height="20" rx="3" fill="#4a4a4a" stroke="#333" stroke-width="1"/>
  <rect x="380" y="230" width="6" height="18" rx="3" fill="#4a4a4a" stroke="#333" stroke-width="1"/>
  <!-- Soot -->
  <circle cx="378" cy="170" r="3" fill="#333"/>
  <circle cx="382" cy="250" r="4" fill="#333"/>
  <circle cx="376" cy="310" r="3" fill="#333"/>
  <!-- Dark moths -->
  <ellipse cx="395" cy="160" rx="14" ry="8" fill="#444" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="420" cy="220" rx="14" ry="8" fill="#444" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="400" cy="280" rx="14" ry="8" fill="#444" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="430" cy="310" rx="14" ry="8" fill="#444" stroke="#333" stroke-width="1.5"/>
  <!-- Light moth (few) -->
  <ellipse cx="385" cy="330" rx="14" ry="8" fill="#e8ddd0" stroke="#aaa" stroke-width="1.5"/>
  <!-- Labels -->
  <text x="490" y="115" font-family="Arial" font-size="11" fill="#333">Dark bark (soot, no lichen)</text>
  <text x="490" y="135" font-family="Arial" font-size="11" fill="#333">Dark moths CAMOUFLAGED</text>
  <text x="490" y="155" font-family="Arial" font-size="11" fill="#333">→ survive predation</text>
  <text x="490" y="180" font-family="Arial" font-size="11" fill="#333">Light moths CONSPICUOUS</text>
  <text x="490" y="200" font-family="Arial" font-size="11" fill="#333">→ eaten by birds</text>
  <text x="490" y="245" font-family="Arial" font-size="11" font-weight="bold" fill="#e53935">Population: mostly dark</text>
  <!-- Bottom summary -->
  <rect x="50" y="398" width="500" height="18" rx="5" fill="#ff8f00" opacity="0.15"/>
  <text x="300" y="412" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Selection pressure: predation by birds | Dark allele frequency increased → population evolved</text>
</svg>