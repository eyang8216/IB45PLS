<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520">
  <rect width="600" height="520" fill="#fff"/>
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#333">Hardy-Weinberg Equilibrium — p² + 2pq + q² = 1</text>
  <text x="300" y="46" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">The null model: if conditions met, allele &amp; genotype frequencies remain constant → no evolution</text>
  <!-- The equation -->
  <rect x="100" y="62" width="400" height="55" rx="8" fill="#e8eaf6" stroke="#3949ab" stroke-width="2.5"/>
  <text x="300" y="85" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#283593">p² + 2pq + q² = 1</text>
  <text x="300" y="105" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">p = frequency of dominant allele (A) | q = frequency of recessive allele (a) | p + q = 1</text>
  <!-- Genotype table -->
  <rect x="40" y="135" width="520" height="70" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1.5"/>
  <text x="120" y="155" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">AA = p²</text>
  <text x="120" y="175" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Homozygous dominant</text>
  <text x="120" y="192" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">p × p = p²</text>
  <text x="300" y="155" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">Aa = 2pq</text>
  <text x="300" y="175" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Heterozygous</text>
  <text x="300" y="192" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">pq + qp = 2pq</text>
  <text x="480" y="155" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">aa = q²</text>
  <text x="480" y="175" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Homozygous recessive</text>
  <text x="480" y="192" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">q × q = q²</text>
  <!-- Worked example -->
  <rect x="40" y="215" width="520" height="140" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="300" y="238" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">Worked Example: 1000 pea plants, 160 have white flowers (aa)</text>
  <text x="40" y="258" font-family="Arial" font-size="11" fill="#333">Step 1: q² = 160/1000 = 0.16</text>
  <text x="40" y="276" font-family="Arial" font-size="11" fill="#333">Step 2: q = √0.16 = 0.40</text>
  <text x="40" y="294" font-family="Arial" font-size="11" fill="#333">Step 3: p = 1 − q = 0.60</text>
  <text x="40" y="312" font-family="Arial" font-size="11" fill="#333">AA: p² = 0.36 → 360 plants | Aa: 2pq = 0.48 → 480 plants | aa: q² = 0.16 → 160 plants</text>
  <text x="40" y="335" font-family="Arial" font-size="11" font-weight="bold" fill="#e53935">⚠ Never calculate p directly from dominant phenotype! p² + 2pq are BOTH dominant phenotype.</text>
  <!-- 5 conditions -->
  <text x="300" y="375" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">Five Conditions for Hardy-Weinberg Equilibrium</text>
  <rect x="40" y="390" width="100" height="50" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="90" y="410" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">1. Large</text>
  <text x="90" y="425" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Population</text>
  <rect x="150" y="390" width="100" height="50" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="200" y="410" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">2. Random</text>
  <text x="200" y="425" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Mating</text>
  <rect x="260" y="390" width="100" height="50" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="310" y="410" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">3. No</text>
  <text x="310" y="425" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Mutation</text>
  <rect x="370" y="390" width="100" height="50" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="420" y="410" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">4. No Gene</text>
  <text x="420" y="425" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Flow</text>
  <rect x="480" y="390" width="80" height="50" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="520" y="410" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">5. No</text>
  <text x="520" y="425" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Selection</text>
  <!-- Bottom -->
  <rect x="50" y="455" width="500" height="35" rx="6" fill="#ff8f00" opacity="0.15"/>
  <text x="300" y="472" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">If ANY condition is violated → population is evolving (or experiencing drift/gene flow/non-random mating)</text>
  <text x="300" y="490" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Use chi-squared test to compare observed vs. expected genotypes — significant difference = evolution</text>
</svg>