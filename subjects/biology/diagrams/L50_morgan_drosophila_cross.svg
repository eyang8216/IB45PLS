<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480">
  <rect width="600" height="480" fill="#fff"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Morgan's Discovery — White-Eyed Mutant in Drosophila</text>

  <!-- Cross 1 -->
  <rect x="20" y="48" width="560" height="130" rx="8" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="300" y="72" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">Cross 1: White-eyed ♂ × Red-eyed ♀ (Pure-breeding)</text>

  <g transform="translate(40, 82)">
    <text x="100" y="10" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935">P: XʷY (white ♂)</text>
    <text x="240" y="10" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935">×</text>
    <text x="380" y="10" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935">X⁺X⁺ (red ♀)</text>
    <text x="240" y="35" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a6b3c">↓</text>
    <rect x="140" y="48" width="200" height="24" rx="5" fill="#c8e6c9"/>
    <text x="240" y="65" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">F₁: All red-eyed (both sexes)</text>
    <text x="240" y="82" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">♀: X⁺Xʷ (carriers) | ♂: X⁺Y (normal)</text>
  </g>

  <!-- Cross 2 -->
  <rect x="20" y="192" width="560" height="130" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="300" y="216" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">Cross 2: F₁ × F₁ (Inter se)</text>

  <g transform="translate(40, 226)">
    <text x="240" y="10" text-anchor="middle" font-family="Arial" font-size="11" fill="#1565c0">F₁ X⁺Xʷ (red ♀) × X⁺Y (red ♂)</text>
    <text x="240" y="35" text-anchor="middle" font-family="Arial" font-size="11" fill="#1565c0">↓</text>

    <!-- Results box -->
    <rect x="80" y="48" width="320" height="70" rx="5" fill="#bbdefb"/>
    <text x="240" y="67" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">F₂ Results:</text>
    <text x="240" y="85" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">♀: All red-eyed (X⁺X⁺ or X⁺Xʷ)</text>
    <text x="240" y="103" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">♂: 50% red (X⁺Y), 50% white (XʷY)</text>
  </g>

  <!-- Cross 3: Test cross -->
  <rect x="20" y="338" width="560" height="130" rx="8" fill="#fce4ec" stroke="#e53935" stroke-width="1.5"/>
  <text x="300" y="362" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e53935">Cross 3: White-eyed ♀ × Red-eyed ♂ (Criss-Cross)</text>

  <g transform="translate(40, 372)">
    <text x="240" y="10" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935">P: XʷXʷ (white ♀) × X⁺Y (red ♂)</text>
    <text x="240" y="35" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935">↓</text>

    <rect x="80" y="48" width="320" height="60" rx="5" fill="#ffcdd2"/>
    <text x="240" y="67" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">Criss-Cross Inheritance:</text>
    <text x="240" y="85" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">All daughters: X⁺Xʷ (RED — inherit father's X⁺)</text>
    <text x="240" y="102" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">All sons: XʷY (WHITE — inherit mother's Xʷ)</text>
  </g>
</svg>
