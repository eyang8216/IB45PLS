<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#1a6b3c">Ribose / Deoxyribose Sugar Ring Numbering</text>

  <!-- Pentagon ring -->
  <!-- Vertices: O at top, then 1', 2', 3', 4' clockwise from O-right -->
  <polygon points="300,90 370,140 340,220 240,220 210,140" fill="#e8f5e9" stroke="#43a047" stroke-width="3"/>

  <!-- O atom at top -->
  <circle cx="300" cy="90" r="18" fill="#e53935" fill-opacity="0.2" stroke="#e53935" stroke-width="2"/>
  <text x="300" y="96" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#e53935">O</text>

  <!-- Vertex labels -->
  <!-- 1' at upper right -->
  <circle cx="365" cy="145" r="4" fill="#333"/>
  <text x="385" y="145" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#333">1′</text>

  <!-- 2' at lower right -->
  <circle cx="335" cy="220" r="4" fill="#333"/>
  <text x="350" y="230" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#333">2′</text>

  <!-- 3' at bottom center -->
  <circle cx="275" cy="218" r="4" fill="#333"/>
  <text x="255" y="230" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#333">3′</text>

  <!-- 4' at upper left -->
  <circle cx="215" cy="145" r="4" fill="#333"/>
  <text x="180" y="145" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#333">4′</text>

  <!-- 5' branch off 4' -->
  <line x1="215" y1="145" x2="160" y2="90" stroke="#43a047" stroke-width="2.5"/>
  <circle cx="160" cy="90" r="4" fill="#333"/>
  <text x="130" y="95" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#333">5′</text>
  <text x="120" y="115" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ff8f00">CH₂OH</text>

  <!-- OH / H labels -->
  <!-- 2' position -->
  <text x="370" y="200" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#e53935">OH / H</text>
  <text x="385" y="214" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#555">(ribose/deoxy)</text>

  <!-- 3' position -->
  <text x="230" y="260" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#333">OH</text>

  <!-- Base attachment note -->
  <line x1="370" y1="140" x2="430" y2="110" stroke="#6a1b9a" stroke-width="2"/>
  <text x="440" y="110" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6a1b9a">Base attaches at 1′</text>

  <!-- Phosphate attachment -->
  <line x1="160" y1="90" x2="130" y2="50" stroke="#1565c0" stroke-width="2"/>
  <text x="100" y="50" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1565c0">Phosphate at 5′</text>

  <!-- Note at bottom -->
  <text x="300" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#333">Deoxyribose: -H at 2′ | Ribose: -OH at 2′</text>
  <text x="300" y="360" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#555">Prime notation (′) distinguishes sugar carbons from base carbons</text>
</svg>
