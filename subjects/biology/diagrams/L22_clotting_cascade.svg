<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 580" width="600" height="580">
  <rect width="600" height="580" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Blood Clotting Cascade</text>

  <!-- Step 1: Injury -->
  <rect x="30" y="50" width="130" height="50" rx="6" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
  <text x="95" y="70" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e53935">1. Vascular Injury</text>
  <text x="95" y="86" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Collagen exposed</text>

  <line x1="160" y1="75" x2="190" y2="75" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Platelets -->
  <rect x="195" y="50" width="140" height="50" rx="6" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="265" y="70" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff8f00">2. Platelet Plug</text>
  <text x="265" y="86" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Adhere → aggregate</text>

  <line x1="335" y1="75" x2="365" y2="75" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Cascade -->
  <rect x="370" y="50" width="180" height="50" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="460" y="70" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#43a047">3. Clotting Cascade</text>
  <text x="460" y="86" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Factors → Prothrombin</text>

  <line x1="460" y1="100" x2="460" y2="130" stroke="#333" stroke-width="2" marker-end="url(#arrowD)"/>

  <!-- Central: Thrombin -->
  <rect x="330" y="135" width="180" height="55" rx="10" fill="#fce4ec" stroke="#e53935" stroke-width="3"/>
  <text x="420" y="158" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e53935">THROMBIN</text>
  <text x="420" y="176" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">(Central enzyme)</text>

  <line x1="420" y1="190" x2="420" y2="225" stroke="#333" stroke-width="2" marker-end="url(#arrowD)"/>

  <!-- Step 4: Fibrinogen → Fibrin -->
  <rect x="280" y="230" width="280" height="50" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="420" y="252" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">4. Fibrinogen → FIBRIN</text>
  <text x="420" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">(Soluble → Insoluble threads)</text>

  <line x1="420" y1="280" x2="420" y2="315" stroke="#333" stroke-width="2" marker-end="url(#arrowD)"/>

  <!-- Step 5: Mesh -->
  <rect x="280" y="320" width="280" height="50" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="420" y="342" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">5. Fibrin Mesh Traps RBCs</text>
  <text x="420" y="358" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Solid clot formed — Factor XIII cross-links</text>

  <!-- Detail panel -->
  <rect x="30" y="400" width="540" height="170" rx="6" fill="#fafafa" stroke="#333" stroke-width="1"/>
  <text x="300" y="422" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Detailed Cascade Steps</text>

  <text x="50" y="445" font-family="Arial" font-size="10" fill="#333">1. Damaged endothelium → collagen fibers exposed in vessel wall</text>
  <text x="50" y="463" font-family="Arial" font-size="10" fill="#333">2. Platelets adhere via von Willebrand factor → become activated → release ADP, thromboxane A₂</text>
  <text x="50" y="481" font-family="Arial" font-size="10" fill="#333">3. ADP + thromboxane A₂ attract more platelets → platelet aggregation → TEMPORARY platelet plug (primary hemostasis)</text>
  <text x="50" y="499" font-family="Arial" font-size="10" fill="#333">4. Clotting factors (I-XIII) activate in cascade → Factor Xa converts Prothrombin → THROMBIN</text>
  <text x="50" y="517" font-family="Arial" font-size="10" fill="#333">5. Thrombin: (a) converts fibrinogen → fibrin threads; (b) activates Factor XIII (cross-links fibrin); (c) activates more platelets</text>
  <text x="50" y="535" font-family="Arial" font-size="10" fill="#333">6. Fibrin mesh traps erythrocytes + platelets → SOLID CLOT. Plasmin later digests clot (fibrinolysis) as vessel heals</text>
  <text x="50" y="558" font-family="Arial" font-size="10" fill="#e53935">Vitamin K: essential for synthesis of clotting factors II, VII, IX, X in liver. Warfarin inhibits vitamin K recycling.</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrowD" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M0,0 L4,6 L8,0 Z" fill="#333"/>
    </marker>
  </defs>
</svg>
