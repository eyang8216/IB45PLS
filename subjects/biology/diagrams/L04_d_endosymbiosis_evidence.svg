### L04_d: Endosymbiosis Evidence Diagram ###
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 650" style="background:#fff">
  <defs><linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a6b3c"/><stop offset="100%" stop-color="#43a047"/></linearGradient></defs>
  <rect width="600" height="650" fill="#fff"/>
  <rect x="0" y="0" width="600" height="42" fill="url(#hdr)"/>
  <text x="300" y="28" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="16">Evidence for Endosymbiosis — Mitochondria &amp; Chloroplasts</text>

  <!-- Item 1: Double membrane -->
  <rect x="20" y="55" width="560" height="95" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="35" y="78" fill="#1a6b3c" font-family="Arial" font-weight="bold" font-size="14">1. Double Membrane</text>
  <circle cx="130" cy="105" r="30" fill="#fff9c4" stroke="#ff8f00" stroke-width="2"/>
  <circle cx="130" cy="105" r="24" stroke="#e65100" stroke-width="1.5" fill="none"/>
  <text x="130" y="108" text-anchor="middle" fill="#333" font-family="Arial" font-size="8">Matrix</text>
  <text x="175" y="98" fill="#333" font-family="Arial" font-size="12">Outer membrane from host vesicle</text>
  <text x="175" y="118" fill="#333" font-family="Arial" font-size="12">Inner membrane from bacterial plasma membrane</text>

  <!-- Item 2: Circular DNA -->
  <rect x="20" y="160" width="560" height="95" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5"/>
  <text x="35" y="183" fill="#1565c0" font-family="Arial" font-weight="bold" font-size="14">2. Own Circular DNA</text>
  <ellipse cx="130" cy="210" rx="35" ry="25" fill="none" stroke="#1565c0" stroke-width="3"/>
  <text x="130" y="214" text-anchor="middle" fill="#1565c0" font-family="Arial" font-weight="bold" font-size="9">circular</text>
  <text x="130" y="226" text-anchor="middle" fill="#1565c0" font-family="Arial" font-size="9">DNA</text>
  <text x="175" y="203" fill="#333" font-family="Arial" font-size="12">Circular DNA (like bacteria), separate from nuclear genome</text>
  <text x="175" y="223" fill="#666" font-family="Arial" font-size="11">mtDNA: ~16,000 bp in humans | cpDNA: similar to cyanobacteria</text>
  <text x="175" y="243" fill="#666" font-family="Arial" font-size="11">Gene transfer to nucleus over evolution (most proteins now nuclear-encoded)</text>

  <!-- Item 3: 70S Ribosomes -->
  <rect x="20" y="265" width="560" height="95" rx="8" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="35" y="288" fill="#6a1b9a" font-family="Arial" font-weight="bold" font-size="14">3. 70S Ribosomes (Bacterial-type)</text>
  <!-- 70S ribosome -->
  <ellipse cx="120" cy="318" rx="22" ry="14" fill="#e1bee7" stroke="#6a1b9a" stroke-width="2"/>
  <ellipse cx="135" cy="308" rx="16" ry="10" fill="#ce93d8" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="120" y="314" text-anchor="middle" fill="#6a1b9a" font-family="Arial" font-weight="bold" font-size="8">50S</text>
  <text x="135" y="312" text-anchor="middle" fill="#6a1b9a" font-family="Arial" font-weight="bold" font-size="8">30S</text>
  <text x="130" y="340" text-anchor="middle" fill="#6a1b9a" font-family="Arial" font-size="10">70S</text>
  <text x="175" y="308" fill="#333" font-family="Arial" font-size="12">70S = bacterial ribosomes (50S + 30S)</text>
  <text x="175" y="328" fill="#333" font-family="Arial" font-size="12">Eukaryotic cytoplasm = 80S (60S + 40S)</text>
  <text x="175" y="348" fill="#666" font-family="Arial" font-size="11">Sensitive to bacterial antibiotics (chloramphenicol, tetracycline)</text>

  <!-- Item 4: Binary Fission -->
  <rect x="20" y="370" width="560" height="95" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="1.5"/>
  <text x="35" y="393" fill="#e65100" font-family="Arial" font-weight="bold" font-size="14">4. Division by Binary Fission</text>
  <ellipse cx="110" cy="422" rx="20" ry="16" fill="#ffe0b2" stroke="#e65100" stroke-width="2"/>
  <text x="130" y="422" text-anchor="middle" fill="#333" font-family="Arial" font-size="14">→</text>
  <ellipse cx="155" cy="418" rx="15" ry="12" fill="#ffe0b2" stroke="#e65100" stroke-width="2"/>
  <ellipse cx="170" cy="430" rx="15" ry="12" fill="#ffe0b2" stroke="#e65100" stroke-width="2"/>
  <text x="175" y="418" fill="#333" font-family="Arial" font-size="12">Mitochondria and chloroplasts divide</text>
  <text x="175" y="438" fill="#333" font-family="Arial" font-size="12">by binary fission (like bacteria), not mitosis</text>

  <!-- Item 5: Genome Similarity -->
  <rect x="20" y="475" width="560" height="95" rx="8" fill="#fce4ec" stroke="#f48fb1" stroke-width="1.5"/>
  <text x="35" y="498" fill="#c62828" font-family="Arial" font-weight="bold" font-size="14">5. Genome Sequence Similarity</text>
  <text x="35" y="522" fill="#333" font-family="Arial" font-size="12">Mitochondrial genes show highest similarity to α-proteobacteria</text>
  <text x="35" y="542" fill="#333" font-family="Arial" font-size="12">Chloroplast genes show highest similarity to cyanobacteria</text>
  <text x="35" y="562" fill="#666" font-family="Arial" font-size="11">DNA sequence analysis confirms bacterial ancestry of both organelles</text>

  <!-- Lynn Margulis -->
  <rect x="20" y="580" width="560" height="58" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="602" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="14">Lynn Margulis — Endosymbiotic Theory (1967)</text>
  <text x="300" y="622" text-anchor="middle" fill="#666" font-family="Arial" font-size="11">Initially rejected by mainstream biology, now one of the most strongly supported theories in biology</text>
</svg>