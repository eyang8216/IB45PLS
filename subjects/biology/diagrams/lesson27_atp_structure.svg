<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <rect width="600" height="380" fill="#fff"/>
  <text x="300" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#333">ATP Structure — Adenosine Triphosphate</text>

  <!-- Adenine -->
  <rect x="40" y="50" width="50" height="55" rx="3" fill="#ff7043" stroke="#d84315" stroke-width="2"/>
  <text x="65" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="bold">Adenine</text>
  <text x="65" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#fff">(N-base)</text>

  <!-- Ribose -->
  <rect x="95" y="55" width="50" height="45" rx="3" fill="#81c784" stroke="#43a047" stroke-width="2"/>
  <text x="120" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333" font-weight="bold">Ribose</text>
  <text x="120" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#333">(5C sugar)</text>

  <!-- Adenosine bracket -->
  <line x1="38" y1="44" x2="147" y2="44" stroke="#1565c0" stroke-width="2"/>
  <line x1="38" y1="42" x2="38" y2="108" stroke="#1565c0" stroke-width="2"/>
  <line x1="147" y1="42" x2="147" y2="108" stroke="#1565c0" stroke-width="2"/>
  <text x="92" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1565c0" font-weight="bold">Adenosine</text>

  <!-- Phosphate groups -->
  <circle cx="200" cy="75" r="14" fill="#fff" stroke="#ff8f00" stroke-width="2.5"/>
  <text x="200" y="73" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ff8f00" font-weight="bold">P</text>

  <line x1="214" y1="75" x2="238" y2="75" stroke="#333" stroke-width="2"/>

  <circle cx="255" cy="75" r="14" fill="#fff" stroke="#ff8f00" stroke-width="2.5"/>
  <text x="255" y="73" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ff8f00" font-weight="bold">P</text>

  <line x1="269" y1="75" x2="293" y2="75" stroke="#333" stroke-width="2"/>

  <circle cx="310" cy="75" r="14" fill="#fff" stroke="#ff8f00" stroke-width="2.5"/>
  <text x="310" y="73" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ff8f00" font-weight="bold">P</text>

  <!-- Labels -->
  <text x="200" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">α</text>
  <text x="255" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">β</text>
  <text x="310" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">γ</text>

  <!-- High energy bonds -->
  <path d="M218,60 Q231,50 244,60" fill="none" stroke="#e53935" stroke-width="2"/>
  <path d="M273,60 Q286,50 299,60" fill="none" stroke="#e53935" stroke-width="2"/>
  <text x="231" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#e53935">~</text>
  <text x="286" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#e53935">~</text>
  <text x="310" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e53935" font-weight="bold">High-energy bonds</text>

  <!-- Hydrolysis reaction -->
  <rect x="130" y="145" width="320" height="90" rx="8" fill="none" stroke="#43a047" stroke-width="1.5"/>
  <text x="290" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#43a047" font-weight="bold">Hydrolysis — Energy Release</text>

  <!-- Reaction -->
  <text x="145" y="190" font-family="Arial, sans-serif" font-size="12" fill="#333">ATP + H₂O → ADP + Pi</text>
  <text x="340" y="190" font-family="Arial, sans-serif" font-size="12" fill="#e53935" font-weight="bold">ΔG°′ = −30.5 kJ mol⁻¹</text>

  <text x="145" y="212" font-family="Arial, sans-serif" font-size="10" fill="#555">(Coupled to endergonic cellular processes)</text>

  <!-- Energy diagram inset -->
  <line x1="420" y1="220" x2="540" y2="220" stroke="#333" stroke-width="2"/>
  <line x1="420" y1="220" x2="420" y2="145" stroke="#333" stroke-width="2"/>
  <text x="480" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Progress</text>
  <rect x="430" y="190" width="20" height="30" fill="#ff8f00" stroke="#333" stroke-width="1"/>
  <text x="440" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">ATP</text>
  <rect x="500" y="208" width="20" height="12" fill="#81c784" stroke="#333" stroke-width="1"/>
  <text x="510" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#333">ADP+Pi</text>
  <line x1="450" y1="190" x2="500" y2="208" stroke="#e53935" stroke-width="2" marker-end="url(#a5)"/>
  <text x="475" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e53935">Energy</text>
  <text x="475" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e53935">released</text>

  <defs><marker id="a5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#e53935"/></marker></defs>

  <!-- Reasons ATP is energy currency -->
  <rect x="40" y="260" width="520" height="110" rx="6" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#333" font-weight="bold">Why ATP is the Universal Energy Currency</text>
  <text x="60" y="302" font-family="Arial, sans-serif" font-size="11" fill="#333">1. <tspan font-weight="bold">Negative charge repulsion</tspan>: 3 phosphate groups repel each other electrostatically — bond strain</text>
  <text x="60" y="320" font-family="Arial, sans-serif" font-size="11" fill="#333">2. <tspan font-weight="bold">Resonance stabilization</tspan>: Pi has more resonance forms than ATP-phosphates → products more stable</text>
  <text x="60" y="338" font-family="Arial, sans-serif" font-size="11" fill="#333">3. <tspan font-weight="bold">Better solvation</tspan>: ADP + Pi are better hydrated than ATP → lower energy state</text>
  <text x="60" y="356" font-family="Arial, sans-serif" font-size="11" fill="#333">4. <tspan font-weight="bold">Moderate ΔG</tspan>: −30.5 kJ/mol is "just right" — enough energy to drive reactions, not wasteful</text>
</svg>
