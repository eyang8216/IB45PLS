<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" width="600" height="480">
  <defs><style>text { font-family: Arial, sans-serif; } .title { font-size: 18px; font-weight: bold; fill: #1a6b3c; text-anchor: middle; } .lab { font-size: 13px; fill: #333; text-anchor: middle; } .sm { font-size: 11px; fill: #555; text-anchor: middle; } .cat { font-size: 14px; font-weight: bold; text-anchor: middle; }</style></defs>
  <rect width="600" height="480" fill="#fff"/>
  <text x="300" y="28" class="title">20 Amino Acids — R-Group Categories</text>

  <!-- Category 1: Nonpolar -->
  <rect x="15" y="42" width="285" height="130" rx="8" fill="#fff3e0" stroke="#ffb74d" stroke-width="2"/>
  <text x="157" y="62" class="cat" fill="#e65100">Nonpolar (Hydrophobic)</text>
  <text x="157" y="80" class="sm">Tend to cluster in protein core</text>
  <text x="157" y="96" class="sm">Gly (G), Ala (A), Val (V), Leu (L), Ile (I)</text>
  <text x="157" y="112" class="sm">Phe (F), Trp (W), Met (M), Pro (P)</text>
  <text x="157" y="130" class="sm">Gly = smallest (–H); Pro = ring, creates kink</text>

  <!-- Category 2: Polar -->
  <rect x="15" y="185" width="285" height="130" rx="8" fill="#e8f5e9" stroke="#81c784" stroke-width="2"/>
  <text x="157" y="205" class="cat" fill="#1a6b3c">Polar (Hydrophilic, Uncharged)</text>
  <text x="157" y="223" class="sm">Can form H-bonds; often on surface</text>
  <text x="157" y="239" class="sm">Ser (S), Thr (T), Cys (C), Tyr (Y)</text>
  <text x="157" y="255" class="sm">Asn (N), Gln (Q)</text>
  <text x="157" y="273" class="sm">Cys = can form disulfide bonds (–S–S–)</text>

  <!-- Category 3: Charged Acidic -->
  <rect x="315" y="42" width="270" height="130" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="450" y="62" class="cat" fill="#c62828">Charged Acidic (−)</text>
  <text x="450" y="80" class="sm">Negatively charged at pH 7</text>
  <text x="450" y="100" class="sm">Aspartic acid / Aspartate (Asp, D)</text>
  <text x="450" y="118" class="sm">Glutamic acid / Glutamate (Glu, E)</text>
  <text x="450" y="138" class="sm">R-group = –COO⁻</text>

  <!-- Category 4: Charged Basic -->
  <rect x="315" y="185" width="270" height="130" rx="8" fill="#e3f2fd" stroke="#64b5f6" stroke-width="2"/>
  <text x="450" y="205" class="cat" fill="#1565c0">Charged Basic (+)</text>
  <text x="450" y="223" class="sm">Positively charged at pH 7</text>
  <text x="450" y="243" class="sm">Lysine (Lys, K) –(CH₂)₄NH₃⁺</text>
  <text x="450" y="261" class="sm">Arginine (Arg, R) — guanidinium</text>
  <text x="450" y="279" class="sm">Histidine (His, H) — imidazole ring</text>

  <!-- Bottom summary -->
  <rect x="60" y="330" width="480" height="55" rx="6" fill="#f3e5f5" stroke="#ce93d8" stroke-width="2"/>
  <text x="300" y="350" class="cat" fill="#6a1b9a">Key Exam Facts</text>
  <text x="300" y="370" class="sm">Know: general structure, R-group classification, Cys forms disulfides, Gly = smallest, Pro = kink, His pKa≈6 (can switch)</text>

  <rect x="60" y="395" width="480" height="40" rx="6" fill="#e8eaf6" stroke="#7986cb" stroke-width="2"/>
  <text x="300" y="414" class="sm" fill="#283593" font-weight="bold">Essential AAs (9): His, Ile, Leu, Lys, Met, Phe, Thr, Trp, Val — cannot be synthesized; must come from diet</text>
</svg>
