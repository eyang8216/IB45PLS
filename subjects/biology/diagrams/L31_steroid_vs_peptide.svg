<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 650" width="600" height="650">
  <defs><marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#333"/></marker></defs>
  <rect width="600" height="650" fill="#fff" rx="8"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#1a6b3c">Steroid vs Peptide Hormone Mechanism</text>

  <!-- LEFT: Steroid Hormone -->
  <rect x="25" y="55" width="265" height="390" rx="10" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2.5"/>
  <rect x="25" y="55" width="265" height="30" rx="10" fill="#1a6b3c"/>
  <text x="157" y="76" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#fff">Steroid Hormone</text>

  <!-- Cell membrane -->
  <line x1="35" y1="110" x2="280" y2="110" stroke="#333" stroke-width="2"/>
  <text x="280" y="106" font-family="Arial" font-size="8" fill="#888">membrane</text>

  <!-- Hormone entering -->
  <circle cx="90" cy="100" r="6" fill="#1a6b3c" stroke="#333" stroke-width="1.5"/>
  <text x="90" y="95" font-family="Arial" font-size="8" fill="#1a6b3c">H</text>
  <line x1="90" y1="100" x2="90" y2="140" stroke="#1a6b3c" stroke-width="2" marker-end="url(#a)"/>
  <text x="121" y="118" font-family="Arial" font-size="8" fill="#555">Simple diffusion</text>

  <!-- Receptor -->
  <rect x="70" y="145" width="40" height="30" rx="5" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
  <text x="90" y="165" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">R</text>

  <line x1="110" y1="160" x2="150" y2="160" stroke="#333" stroke-width="2" marker-end="url(#a)"/>
  <text x="130" y="153" font-family="Arial" font-size="7" fill="#888">①</text>

  <!-- H-R complex -->
  <rect x="150" y="145" width="70" height="30" rx="8" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="185" y="158" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">H-R complex</text>
  <text x="185" y="170" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">(chaperone released)</text>

  <!-- Nucleus -->
  <rect x="120" y="200" width="140" height="100" rx="8" fill="#e8eaf6" stroke="#6a1b9a" stroke-width="2.5"/>
  <text x="190" y="220" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">NUCLEUS</text>

  <!-- Nuclear pore -->
  <rect x="175" y="195" width="30" height="10" rx="3" fill="#bbb" stroke="#666" stroke-width="1"/>

  <line x1="190" y1="175" x2="190" y2="200" stroke="#333" stroke-width="2" marker-end="url(#a)"/>
  <text x="210" y="192" font-family="Arial" font-size="7" fill="#888">②</text>

  <!-- DNA -->
  <line x1="140" y1="250" x2="240" y2="250" stroke="#1565c0" stroke-width="3"/>
  <text x="190" y="245" font-family="Arial" font-size="8" fill="#1565c0" font-weight="bold">DNA</text>

  <!-- HRE -->
  <rect x="155" y="242" width="30" height="16" rx="3" fill="#e53935" stroke="#333" stroke-width="1"/>
  <text x="170" y="254" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff" font-weight="bold">HRE</text>

  <text x="210" y="255" font-family="Arial" font-size="7" fill="#888">③</text>

  <!-- Transcription -->
  <text x="140" y="278" font-family="Arial" font-size="8" fill="#555">④ Transcription</text>
  <text x="140" y="290" font-family="Arial" font-size="8" fill="#555">   RNA pol II</text>

  <!-- mRNA -->
  <line x1="190" y1="300" x2="190" y2="335" stroke="#333" stroke-width="2" marker-end="url(#a)"/>
  <text x="205" y="318" font-family="Arial" font-size="7" fill="#888">⑤ mRNA</text>

  <!-- Ribosome -->
  <ellipse cx="190" cy="352" rx="30" ry="12" fill="#ffe0b2" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="190" y="356" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Ribosome</text>

  <line x1="190" y1="364" x2="190" y2="390" stroke="#333" stroke-width="2" marker-end="url(#a)"/>
  <text x="205" y="380" font-family="Arial" font-size="7" fill="#888">⑥ Translation</text>

  <!-- Protein -->
  <text x="190" y="410" text-anchor="middle" font-family="Arial" font-size="8" fill="#1a6b3c" font-weight="bold">→ New Proteins → Response</text>

  <!-- RIGHT: Peptide Hormone -->
  <rect x="310" y="55" width="265" height="390" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2.5"/>
  <rect x="310" y="55" width="265" height="30" rx="10" fill="#1565c0"/>
  <text x="442" y="76" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#fff">Peptide Hormone</text>

  <!-- Membrane -->
  <line x1="320" y1="110" x2="565" y2="110" stroke="#333" stroke-width="2"/>
  <text x="565" y="106" font-family="Arial" font-size="8" fill="#888">membrane</text>

  <!-- GPCR -->
  <rect x="350" y="115" width="80" height="50" rx="6" fill="#bbdefb" stroke="#1565c0" stroke-width="2"/>
  <text x="390" y="135" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">GPCR</text>
  <text x="390" y="150" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">7-TM receptor</text>

  <!-- Hormone binding -->
  <circle cx="370" cy="100" r="6" fill="#1565c0" stroke="#333" stroke-width="1.5"/>
  <text x="370" y="95" font-family="Arial" font-size="8" fill="#1565c0">H</text>
  <line x1="370" y1="106" x2="370" y2="115" stroke="#1565c0" stroke-width="2"/>

  <!-- G-protein -->
  <text x="440" y="125" font-family="Arial" font-size="8" fill="#555">① G-protein</text>
  <text x="440" y="138" font-family="Arial" font-size="8" fill="#555">   activation</text>
  <ellipse cx="455" cy="155" rx="25" ry="15" fill="#fff9c4" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="455" y="159" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Gα·GTP</text>

  <!-- Adenylyl cyclase -->
  <line x1="430" y1="165" x2="400" y2="185" stroke="#333" stroke-width="2" marker-end="url(#a)"/>
  <text x="440" y="180" font-family="Arial" font-size="7" fill="#888">②</text>

  <rect x="350" y="185" width="80" height="30" rx="5" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="390" y="197" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Adenylyl</text>
  <text x="390" y="210" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Cyclase</text>

  <!-- ATP → cAMP -->
  <line x1="390" y1="215" x2="390" y2="240" stroke="#333" stroke-width="2" marker-end="url(#a)"/>
  <text x="430" y="232" font-family="Arial" font-size="8" fill="#e53935">ATP → cAMP ③</text>

  <rect x="360" y="242" width="90" height="22" rx="5" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
  <text x="405" y="258" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e53935">Second Messenger</text>

  <!-- PKA -->
  <rect x="365" y="275" width="80" height="28" rx="6" fill="#fff9c4" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="405" y="292" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">PKA ④ (activated)</text>

  <!-- Phosphorylation -->
  <line x1="405" y1="303" x2="405" y2="340" stroke="#333" stroke-width="2" marker-end="url(#a)"/>

  <rect x="360" y="342" width="90" height="28" rx="6" fill="#e8eaf6" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="405" y="356" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">⑤ Phosphorylates</text>
  <text x="405" y="368" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">target enzymes</text>

  <line x1="405" y1="370" x2="405" y2="395" stroke="#333" stroke-width="2" marker-end="url(#a)"/>
  <text x="425" y="388" font-family="Arial" font-size="7" fill="#888">⑥</text>

  <text x="405" y="415" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0" font-weight="bold">→ Fast Response</text>

  <!-- Time indicators -->
  <text x="157" y="450" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">⏱ Hours to days</text>
  <text x="442" y="450" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">⏱ Seconds to minutes</text>

  <!-- Comparison table -->
  <rect x="25" y="470" width="550" height="95" rx="8" fill="#f5f5f5" stroke="#bbb" stroke-width="1.5"/>
  <text x="300" y="490" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Comparison</text>

  <line x1="170" y1="470" x2="170" y2="565" stroke="#ccc" stroke-width="1"/>
  <text x="75" y="510" font-family="Arial" font-size="9" fill="#555">Receptor</text>
  <text x="195" y="510" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Intracellular (cytosol/nucleus)</text>
  <text x="380" y="510" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Cell surface (transmembrane)</text>

  <text x="75" y="528" font-family="Arial" font-size="9" fill="#555">Mechanism</text>
  <text x="195" y="528" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Alters gene transcription</text>
  <text x="380" y="528" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Second messenger cascade</text>

  <text x="75" y="546" font-family="Arial" font-size="9" fill="#555">Amplification</text>
  <text x="195" y="546" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Minimal (1:1 with DNA)</text>
  <text x="380" y="546" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Massive (~10⁶ fold)</text>

  <text x="75" y="564" font-family="Arial" font-size="9" fill="#555">Examples</text>
  <text x="195" y="564" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Cortisol, testosterone, estrogen</text>
  <text x="380" y="564" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Insulin, glucagon, ADH</text>

  <!-- Bottom bar -->
  <rect x="25" y="580" width="550" height="25" rx="6" fill="#fff3e0" stroke="#ff8f00" stroke-width="1"/>
  <text x="300" y="597" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Key: Lipid-soluble → crosses membrane / Water-soluble → surface receptor + second messenger</text>
</svg>
