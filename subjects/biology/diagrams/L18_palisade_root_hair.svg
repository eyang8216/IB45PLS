<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Palisade Mesophyll &amp; Root Hair Cell</text>

  <!-- PALISADE MESOPHYLL -->
  <rect x="20" y="40" width="270" height="320" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="155" y="60" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">Palisade Mesophyll Cell</text>

  <!-- Columnar cells -->
  <g fill="#43a047" stroke="#1a6b3c" stroke-width="2" opacity="0.7">
    <rect x="50" y="80" width="60" height="150" rx="5"/>
    <rect x="120" y="80" width="60" height="150" rx="5"/>
    <rect x="190" y="80" width="60" height="150" rx="5"/>
  </g>

  <!-- Chloroplasts -->
  <g fill="#1a6b3c">
    <ellipse cx="70" cy="100" rx="10" ry="5"/><ellipse cx="85" cy="115" rx="10" ry="5"/>
    <ellipse cx="75" cy="130" rx="10" ry="5"/><ellipse cx="90" cy="145" rx="10" ry="5"/>
    <ellipse cx="70" cy="160" rx="10" ry="5"/><ellipse cx="80" cy="180" rx="10" ry="5"/>

    <ellipse cx="140" cy="100" rx="10" ry="5"/><ellipse cx="155" cy="115" rx="10" ry="5"/>
    <ellipse cx="145" cy="130" rx="10" ry="5"/><ellipse cx="160" cy="145" rx="10" ry="5"/>
    <ellipse cx="140" cy="160" rx="10" ry="5"/><ellipse cx="150" cy="180" rx="10" ry="5"/>

    <ellipse cx="210" cy="100" rx="10" ry="5"/><ellipse cx="225" cy="115" rx="10" ry="5"/>
    <ellipse cx="215" cy="130" rx="10" ry="5"/><ellipse cx="230" cy="145" rx="10" ry="5"/>
    <ellipse cx="210" cy="160" rx="10" ry="5"/><ellipse cx="220" cy="180" rx="10" ry="5"/>
  </g>

  <!-- Nucleus -->
  <circle cx="145" cy="200" r="12" fill="none" stroke="#1565c0" stroke-width="2"/>
  <text x="145" y="203" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Nucleus</text>

  <text x="155" y="245" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Columnar shape</text>
  <text x="155" y="260" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Packed with chloroplasts</text>
  <text x="155" y="275" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Located near upper</text>
  <text x="155" y="288" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">epidermis for max light</text>

  <text x="155" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Function: Primary site</text>
  <text x="155" y="330" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">of photosynthesis</text>
  <text x="155" y="345" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">in leaves</text>

  <!-- ROOT HAIR CELL -->
  <rect x="310" y="40" width="270" height="320" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="445" y="60" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#ff8f00">Root Hair Cell</text>

  <!-- Root surface -->
  <rect x="320" y="180" width="250" height="80" rx="4" fill="none" stroke="#8d6e63" stroke-width="2.5"/>

  <!-- Root hair projection -->
  <path d="M380,180 Q380,110 400,80 Q420,50 430,70 Q440,90 420,110 Q400,130 400,180" fill="#ff8f00" opacity="0.5" stroke="#e65100" stroke-width="2.5"/>
  <text x="430" y="105" font-family="Arial" font-size="10" fill="#e65100">Long, thin</text>
  <text x="430" y="118" font-family="Arial" font-size="10" fill="#e65100">projection</text>

  <!-- Cell body -->
  <rect x="360" y="190" width="100" height="60" rx="6" fill="#ff8f00" opacity="0.4" stroke="#e65100" stroke-width="2"/>
  <circle cx="410" cy="220" r="12" fill="none" stroke="#1565c0" stroke-width="2"/>
  <text x="410" y="223" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Nucleus</text>

  <!-- Mitochondria -->
  <g fill="none" stroke="#e53935" stroke-width="1.5">
    <ellipse cx="375" cy="205" rx="8" ry="5"/><ellipse cx="390" cy="210" rx="8" ry="5"/>
    <ellipse cx="430" cy="205" rx="8" ry="5"/><ellipse cx="445" cy="210" rx="8" ry="5"/>
  </g>

  <!-- Water/mineral arrows -->
  <g stroke="#1565c0" stroke-width="2" fill="none">
    <line x1="410" y1="140" x2="410" y2="180"/>
    <line x1="395" y1="130" x2="395" y2="180"/>
    <line x1="425" y1="130" x2="425" y2="180"/>
  </g>
  <text x="410" y="125" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">H₂O + minerals</text>

  <text x="445" y="275" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Large SA:V ratio</text>
  <text x="445" y="290" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Many mitochondria</text>
  <text x="445" y="305" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">for active transport</text>

  <text x="445" y="335" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Function: Absorb</text>
  <text x="445" y="350" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">water + minerals</text>
</svg>