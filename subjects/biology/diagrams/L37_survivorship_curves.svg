<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460" width="600" height="460">
  <rect width="600" height="460" fill="white"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">L37d — Survivorship Curves (Types I, II, III)</text>

  <!-- Axes -->
  <line x1="70" y1="370" x2="560" y2="370" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="370" x2="70" y2="50" stroke="#333" stroke-width="2"/>
  <text x="315" y="400" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">% of Maximum Lifespan (Age)</text>
  <text x="28" y="215" text-anchor="middle" font-family="Arial" font-size="13" fill="#333" transform="rotate(-90,28,215)">Log Number Surviving (n)</text>

  <!-- X-axis ticks -->
  <g font-family="Arial" font-size="11" fill="#666" text-anchor="middle">
    <text x="70" y="390">0</text><text x="210" y="390">25</text><text x="350" y="390">50</text>
    <text x="490" y="390">75</text><text x="550" y="390">100</text>
  </g>

  <!-- Y-axis ticks (log-style but linear labels) -->
  <g font-family="Arial" font-size="10" fill="#666" text-anchor="end">
    <text x="65" y="374">1</text><text x="65" y="310">10</text>
    <text x="65" y="245">100</text><text x="65" y="178">1000</text>
    <text x="58" y="115">10000</text>
  </g>

  <!-- Type I (Human/Elephant) - convex -->
  <path d="M70,110 L100,112 L150,115 L220,120 L300,130 L380,145 L440,165 L480,200 L505,240 L520,290 L530,340 L535,370"
        fill="none" stroke="#1565c0" stroke-width="3"/>

  <!-- Type II (Birds/Small mammals) - straight diagonal -->
  <path d="M70,110 L160,160 L250,210 L340,258 L430,308 L520,358 L540,370"
        fill="none" stroke="#1a6b3c" stroke-width="3"/>

  <!-- Type III (Fish/Oysters) - concave -->
  <path d="M70,110 L90,200 L110,260 L135,290 L170,310 L230,325 L310,335 L400,342 L500,348 L550,370"
        fill="none" stroke="#e53935" stroke-width="3"/>

  <!-- Labels with pointers -->
  <g font-family="Arial" font-size="13" font-weight="bold">
    <text x="475" y="195" fill="#1565c0">Type I</text>
    <text x="475" y="215" font-size="11" font-weight="normal" fill="#1565c0">Human, Elephant</text>
    <text x="475" y="230" font-size="10" font-weight="normal" fill="#666">High survival until old age</text>
    <text x="475" y="244" font-size="10" font-weight="normal" fill="#666">then steep drop (K-strategists)</text>

    <text x="420" y="305" fill="#1a6b3c">Type II</text>
    <text x="420" y="325" font-size="11" font-weight="normal" fill="#1a6b3c">Birds, Small mammals</text>
    <text x="420" y="340" font-size="10" font-weight="normal" fill="#666">Constant death rate</text>
    <text x="420" y="354" font-size="10" font-weight="normal" fill="#666">Straight line (log scale)</text>

    <text x="145" y="305" fill="#e53935">Type III</text>
    <text x="145" y="325" font-size="11" font-weight="normal" fill="#e53935">Fish, Oysters, Plants</text>
    <text x="145" y="340" font-size="10" font-weight="normal" fill="#666">Huge early mortality</text>
    <text x="145" y="354" font-size="10" font-weight="normal" fill="#666">Survivors live long (r-strategists)</text>
  </g>

  <!-- Small line to mark log scale note -->
  <text x="545" y="375" text-anchor="end" font-family="Arial" font-size="10" font-style="italic" fill="#888">Y-axis: logarithmic scale</text>

  <!-- Mini diagrams showing typical life stage examples -->
  <rect x="40" y="415" width="520" height="35" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="300" y="438" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Type I: extensive parental care, few offspring | Type II: constant risk regardless of age | Type III: massive offspring, no parental care</text>
</svg>