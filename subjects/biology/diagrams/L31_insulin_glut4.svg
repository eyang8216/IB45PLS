<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs><marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#333"/></marker></defs>
  <rect width="600" height="600" fill="#fff" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1565c0">Insulin Signaling — GLUT4 Translocation (Receptor Tyrosine Kinase)</text>

  <!-- BEFORE box -->
  <rect x="20" y="55" width="270" height="350" rx="10" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="155" y="78" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e53935">BEFORE Insulin</text>

  <!-- Cell -->
  <rect x="60" y="100" width="190" height="250" rx="12" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  <text x="155" y="120" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Muscle / Adipose Cell</text>

  <!-- GLUT4 in vesicles -->
  <rect x="100" y="180" width="110" height="30" rx="6" fill="#fff9c4" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="155" y="199" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">GLUT4 (vesicles)</text>

  <rect x="85" y="220" width="140" height="30" rx="6" fill="#fff9c4" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="155" y="239" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">GLUT4 (vesicles)</text>

  <rect x="100" y="260" width="110" height="30" rx="6" fill="#fff9c4" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="155" y="279" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">GLUT4 (vesicles)</text>

  <!-- No GLUT4 in membrane -->
  <text x="155" y="340" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">Membrane: NO GLUT4</text>
  <text x="155" y="355" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Low glucose uptake</text>

  <!-- Glucose outside -->
  <circle cx="60" cy="180" r="5" fill="#e53935"/>
  <circle cx="50" cy="195" r="5" fill="#e53935"/>
  <circle cx="68" cy="200" r="5" fill="#e53935"/>
  <text x="50" y="165" font-family="Arial" font-size="8" fill="#e53935">Glucose</text>

  <!-- ARROW -->
  <text x="300" y="280" text-anchor="middle" font-family="Arial" font-size="22" fill="#1565c0">→</text>
  <circle cx="300" cy="255" r="10" fill="#1565c0"/>
  <text x="300" y="259" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff" font-weight="bold">Ins</text>
  <text x="300" y="310" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0" font-weight="bold">Insulin</text>

  <!-- AFTER box -->
  <rect x="310" y="55" width="270" height="350" rx="10" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="445" y="78" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">AFTER Insulin</text>

  <!-- Cell -->
  <rect x="350" y="100" width="190" height="250" rx="12" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  <text x="445" y="120" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Muscle / Adipose Cell</text>

  <!-- GLUT4 in membrane -->
  <rect x="360" y="100" width="25" height="15" rx="4" fill="#1a6b3c" stroke="#333" stroke-width="1"/>
  <text x="372" y="112" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">G4</text>

  <rect x="400" y="100" width="25" height="15" rx="4" fill="#1a6b3c" stroke="#333" stroke-width="1"/>
  <text x="412" y="112" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">G4</text>

  <rect x="440" y="100" width="25" height="15" rx="4" fill="#1a6b3c" stroke="#333" stroke-width="1"/>
  <text x="452" y="112" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">G4</text>

  <rect x="480" y="100" width="25" height="15" rx="4" fill="#1a6b3c" stroke="#333" stroke-width="1"/>
  <text x="492" y="112" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">G4</text>

  <!-- Empty vesicles -->
  <circle cx="420" cy="210" r="12" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="460" cy="240" r="12" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Glucose entering -->
  <circle cx="365" cy="150" r="5" fill="#e53935"/>
  <circle cx="420" cy="145" r="5" fill="#e53935"/>
  <circle cx="480" cy="155" r="5" fill="#e53935"/>

  <line x1="372" y1="135" x2="372" y2="115" stroke="#e53935" stroke-width="1.5"/>
  <line x1="452" y1="135" x2="452" y2="115" stroke="#e53935" stroke-width="1.5"/>

  <text x="445" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c" font-weight="bold">GLUT4 in membrane</text>
  <text x="445" y="205" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Vesicles fused with PM</text>

  <text x="445" y="340" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c" font-weight="bold">HIGH glucose uptake</text>

  <!-- Mechanism box -->
  <rect x="20" y="425" width="560" height="75" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="300" y="448" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Insulin Receptor Tyrosine Kinase Mechanism</text>
  <text x="300" y="470" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Insulin → α-subunits → β-subunit autophosphorylation → IRS → PI3K → Akt →</text>
  <text x="300" y="488" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">→ GLUT4 vesicle translocation to membrane → Glucose uptake → ↓Blood glucose</text>

  <!-- Key distinction -->
  <rect x="20" y="515" width="560" height="40" rx="6" fill="#fff3e0" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="300" y="535" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">⚠️ Insulin uses Receptor Tyrosine Kinase (RTK) — NOT the GPCR-cAMP pathway</text>
  <text x="300" y="550" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Glucagon → GPCR-cAMP | Insulin → RTK-PI3K-Akt  —  READ THE QUESTION carefully on exams!</text>
</svg>
