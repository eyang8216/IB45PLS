<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs><marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#333"/></marker></defs>
  <rect width="600" height="600" fill="#fff" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#ff8f00">Gibberellin — Seed Germination (Barley Grain)</text>

  <!-- Barley grain cross-section -->
  <ellipse cx="220" cy="320" rx="90" ry="140" fill="#f5f5f5" stroke="#333" stroke-width="2.5"/>

  <!-- Seed coat -->
  <ellipse cx="220" cy="320" rx="92" ry="142" fill="none" stroke="#888" stroke-width="3"/>
  <text x="320" y="195" font-family="Arial" font-size="9" fill="#888">Seed coat (testa)</text>

  <!-- Aleurone layer -->
  <ellipse cx="220" cy="320" rx="78" ry="125" fill="none" stroke="#ff8f00" stroke-width="3"/>
  <text x="115" y="215" font-family="Arial" font-size="10" fill="#ff8f00" font-weight="bold">Aleurone</text>
  <text x="115" y="228" font-family="Arial" font-size="8" fill="#ff8f00">Layer</text>

  <!-- Endosperm -->
  <ellipse cx="220" cy="320" rx="65" ry="105" fill="#fff9c4" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="220" y="305" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ff8f00">ENDOSPERM</text>
  <text x="220" y="320" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">STARCH stores</text>

  <!-- Starch granules -->
  <circle cx="195" cy="340" r="6" fill="#ffe0b2" stroke="#ff8f00" stroke-width="1"/>
  <circle cx="235" cy="350" r="5" fill="#ffe0b2" stroke="#ff8f00" stroke-width="1"/>
  <circle cx="215" cy="365" r="7" fill="#ffe0b2" stroke="#ff8f00" stroke-width="1"/>
  <circle cx="245" cy="330" r="5" fill="#ffe0b2" stroke="#ff8f00" stroke-width="1"/>

  <!-- Embryo -->
  <ellipse cx="220" cy="430" rx="35" ry="22" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="220" y="433" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">EMBRYO</text>

  <!-- Arrow: embryo releases gibberellin -->
  <path d="M220,410 Q220,400 220,380" fill="none" stroke="#e53935" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="245" y="400" font-family="Arial" font-size="8" fill="#e53935">① Gibberellin</text>

  <!-- Arrow: GA to aleurone -->
  <path d="M230,360 Q255,340 270,300" fill="none" stroke="#1565c0" stroke-width="2" marker-end="url(#a)"/>
  <text x="270" y="335" font-family="Arial" font-size="8" fill="#1565c0">② GA →</text>
  <text x="270" y="348" font-family="Arial" font-size="8" fill="#1565c0">aleurone</text>

  <!-- α-amylase from aleurone -->
  <text x="130" y="280" font-family="Arial" font-size="8" fill="#1a6b3c" font-weight="bold">③ α‑amylase</text>
  <line x1="155" y1="285" x2="190" y2="310" stroke="#1a6b3c" stroke-width="2" marker-end="url(#a)"/>

  <!-- Sugar arrow -->
  <path d="M200,370 Q200,400 200,420" fill="none" stroke="#6a1b9a" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="160" y="405" font-family="Arial" font-size="8" fill="#6a1b9a">④ Sugar →</text>
  <text x="160" y="418" font-family="Arial" font-size="8" fill="#6a1b9a">embryo grows</text>

  <!-- Signal pathway on right -->
  <rect x="330" y="60" width="250" height="280" rx="10" fill="#e8eaf6" stroke="#6a1b9a" stroke-width="2"/>
  <text x="455" y="85" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">Signal Pathway</text>

  <text x="345" y="112" font-family="Arial" font-size="9" font-weight="bold" fill="#333">① Water imbibition</text>
  <text x="350" y="128" font-family="Arial" font-size="9" fill="#555">Seed absorbs water → swells</text>

  <line x1="455" y1="138" x2="455" y2="148" stroke="#333" stroke-width="2" marker-end="url(#a)"/>

  <text x="345" y="168" font-family="Arial" font-size="9" font-weight="bold" fill="#333">② Embryo produces GIBBERELLIN</text>
  <text x="350" y="184" font-family="Arial" font-size="8" fill="#555">GA diffuses to aleurone layer</text>

  <line x1="455" y1="194" x2="455" y2="204" stroke="#333" stroke-width="2" marker-end="url(#a)"/>

  <text x="345" y="224" font-family="Arial" font-size="9" font-weight="bold" fill="#333">③ Aleurone → α‑AMYLASE</text>
  <text x="350" y="240" font-family="Arial" font-size="8" fill="#555">GA triggers gene expression</text>
  <text x="350" y="255" font-family="Arial" font-size="8" fill="#555">α-amylase synthesized &amp; secreted</text>

  <line x1="455" y1="265" x2="455" y2="275" stroke="#333" stroke-width="2" marker-end="url(#a)"/>

  <text x="345" y="295" font-family="Arial" font-size="9" font-weight="bold" fill="#333">④ Starch → Maltose → Glucose</text>
  <text x="350" y="311" font-family="Arial" font-size="8" fill="#555">α-amylase hydrolyses endosperm starch</text>

  <line x1="455" y1="322" x2="455" y2="332" stroke="#333" stroke-width="2" marker-end="url(#a)"/>

  <text x="345" y="348" font-family="Arial" font-size="9" font-weight="bold" fill="#1a6b3c">⑤ Glucose → Embryo → Growth</text>

  <!-- Key insight -->
  <rect x="30" y="470" width="540" height="55" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="300" y="492" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ff8f00">Experimental Proof</text>
  <text x="300" y="512" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">De-embryonated seeds + water → NO α-amylase. De-embryonated seeds + GA → α-amylase produced!</text>

  <!-- Example -->
  <rect x="30" y="540" width="540" height="45" rx="6" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="300" y="560" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c" font-weight="bold">Application: Malting (Barley → Malt for beer/whisky)</text>
  <text x="300" y="578" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">GA added to barley grains → α-amylase breakdown of starch → maltose (sweet) → fermentation</text>
</svg>
