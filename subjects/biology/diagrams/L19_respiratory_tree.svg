<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700">
  <rect width="600" height="700" fill="#fff"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Human Ventilation System</text>

  <!-- Nasal Cavity -->
  <ellipse cx="300" cy="70" rx="35" ry="18" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="300" y="74" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">Nasal Cavity</text>

  <!-- Pharynx -->
  <rect x="275" y="95" width="50" height="30" rx="5" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="300" y="114" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">Pharynx</text>

  <!-- Larynx -->
  <rect x="278" y="130" width="44" height="22" rx="4" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="300" y="145" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Larynx</text>

  <!-- Trachea with C-shaped cartilage -->
  <rect x="278" y="160" width="44" height="90" rx="3" fill="#fff" stroke="#333" stroke-width="2"/>
  <!-- C-shaped rings -->
  <path d="M278,170 Q300,160 322,170" fill="none" stroke="#1565c0" stroke-width="2.5"/>
  <path d="M278,185 Q300,175 322,185" fill="none" stroke="#1565c0" stroke-width="2.5"/>
  <path d="M278,200 Q300,190 322,200" fill="none" stroke="#1565c0" stroke-width="2.5"/>
  <path d="M278,215 Q300,205 322,215" fill="none" stroke="#1565c0" stroke-width="2.5"/>
  <path d="M278,230 Q300,220 322,230" fill="none" stroke="#1565c0" stroke-width="2.5"/>
  <text x="300" y="175" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">C-shaped</text>
  <text x="300" y="190" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">cartilage</text>
  <text x="300" y="252" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">Trachea</text>

  <!-- Bronchi -->
  <line x1="300" y1="255" x2="210" y2="300" stroke="#333" stroke-width="3"/>
  <line x1="300" y1="255" x2="390" y2="300" stroke="#333" stroke-width="3"/>
  <text x="200" y="295" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">Right</text>
  <text x="200" y="308" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">Bronchus</text>
  <text x="400" y="295" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">Left</text>
  <text x="400" y="308" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">Bronchus</text>

  <!-- Bronchioles -->
  <line x1="210" y1="300" x2="155" y2="360" stroke="#555" stroke-width="2"/>
  <line x1="210" y1="300" x2="260" y2="370" stroke="#555" stroke-width="2"/>
  <line x1="390" y1="300" x2="340" y2="360" stroke="#555" stroke-width="2"/>
  <line x1="390" y1="300" x2="445" y2="370" stroke="#555" stroke-width="2"/>
  <text x="350" y="355" font-family="Arial" font-size="9" fill="#555">Bronchioles</text>

  <!-- Alveolar ducts and sacs -->
  <circle cx="145" cy="400" r="18" fill="none" stroke="#81c784" stroke-width="1.5"/>
  <circle cx="125" cy="385" r="10" fill="none" stroke="#81c784" stroke-width="1.5"/>
  <circle cx="165" cy="382" r="10" fill="none" stroke="#81c784" stroke-width="1.5"/>
  <circle cx="130" cy="415" r="10" fill="none" stroke="#81c784" stroke-width="1.5"/>
  <circle cx="160" cy="420" r="12" fill="none" stroke="#81c784" stroke-width="1.5"/>

  <circle cx="260" cy="410" r="20" fill="none" stroke="#81c784" stroke-width="1.5"/>
  <circle cx="235" cy="395" r="11" fill="none" stroke="#81c784" stroke-width="1.5"/>
  <circle cx="285" cy="390" r="11" fill="none" stroke="#81c784" stroke-width="1.5"/>
  <circle cx="240" cy="430" r="11" fill="none" stroke="#81c784" stroke-width="1.5"/>
  <circle cx="280" cy="432" r="13" fill="none" stroke="#81c784" stroke-width="1.5"/>

  <circle cx="345" cy="405" r="19" fill="none" stroke="#81c784" stroke-width="1.5"/>
  <circle cx="320" cy="390" r="11" fill="none" stroke="#81c784" stroke-width="1.5"/>
  <circle cx="370" cy="388" r="11" fill="none" stroke="#81c784" stroke-width="1.5"/>
  <circle cx="325" cy="425" r="11" fill="none" stroke="#81c784" stroke-width="1.5"/>
  <circle cx="365" cy="428" r="12" fill="none" stroke="#81c784" stroke-width="1.5"/>

  <circle cx="440" cy="405" r="17" fill="none" stroke="#81c784" stroke-width="1.5"/>
  <circle cx="420" cy="390" r="10" fill="none" stroke="#81c784" stroke-width="1.5"/>
  <circle cx="460" cy="385" r="10" fill="none" stroke="#81c784" stroke-width="1.5"/>
  <circle cx="425" cy="420" r="10" fill="none" stroke="#81c784" stroke-width="1.5"/>
  <circle cx="458" cy="422" r="11" fill="none" stroke="#81c784" stroke-width="1.5"/>

  <text x="150" y="455" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Alveolar</text>
  <text x="150" y="468" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Sacs</text>

  <!-- Flow arrows -->
  <text x="355" y="460" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">~300 million alveoli</text>
  <text x="355" y="473" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Total SA ~70 m²</text>

  <!-- Key features box -->
  <rect x="30" y="500" width="540" height="185" rx="6" fill="#fafafa" stroke="#333" stroke-width="1"/>
  <text x="50" y="522" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">Key Features of Gas Exchange Surfaces:</text>
  <text x="50" y="542" font-family="Arial" font-size="11" fill="#333">1. Large surface area to volume ratio</text>
  <text x="50" y="560" font-family="Arial" font-size="11" fill="#333">2. Thin — minimal diffusion distance (one or two cells)</text>
  <text x="50" y="578" font-family="Arial" font-size="11" fill="#333">3. Moist — gases must dissolve before diffusing</text>
  <text x="50" y="596" font-family="Arial" font-size="11" fill="#333">4. Permeable to gases</text>
  <text x="50" y="614" font-family="Arial" font-size="11" fill="#333">5. Well-vascularized — dense capillary network</text>
  <text x="50" y="640" font-family="Arial" font-size="11" fill="#e53935">Trachea: C-shaped hyaline cartilage rings prevent collapse</text>
  <text x="50" y="658" font-family="Arial" font-size="11" fill="#e53935">Bronchioles: smooth muscle replaces cartilage</text>
  <text x="50" y="676" font-family="Arial" font-size="11" fill="#e53935">Alveoli: single-cell-thick walls, fused basement membrane</text>
</svg>
