<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480">
  <rect width="600" height="480" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Darwin's Observations &amp; Inferences → Natural Selection</text>

  <!-- 4 observations -->
  <text x="300" y="55" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">4 Observations</text>

  <g transform="translate(20, 68)">
    <!-- O1 -->
    <rect x="0" y="0" width="270" height="70" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
    <circle cx="25" cy="35" r="14" fill="#1565c0"/>
    <text x="25" y="40" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff" font-weight="bold">1</text>
    <text x="48" y="28" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">Overproduction</text>
    <text x="48" y="48" font-family="Arial" font-size="11" fill="#555">All species produce more offspring</text>
    <text x="48" y="63" font-family="Arial" font-size="11" fill="#555">than can survive to maturity</text>

    <!-- O2 -->
    <rect x="290" y="0" width="270" height="70" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
    <circle cx="315" cy="35" r="14" fill="#1565c0"/>
    <text x="315" y="40" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff" font-weight="bold">2</text>
    <text x="338" y="28" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">Variation</text>
    <text x="338" y="48" font-family="Arial" font-size="11" fill="#555">Individuals within a species</text>
    <text x="338" y="63" font-family="Arial" font-size="11" fill="#555">show variation in characteristics</text>

    <!-- O3 -->
    <rect x="0" y="82" width="270" height="70" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
    <circle cx="25" cy="117" r="14" fill="#1565c0"/>
    <text x="25" y="122" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff" font-weight="bold">3</text>
    <text x="48" y="110" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">Heritability</text>
    <text x="48" y="130" font-family="Arial" font-size="11" fill="#555">Much of this variation is heritable</text>
    <text x="48" y="145" font-family="Arial" font-size="11" fill="#555">— offspring resemble parents</text>

    <!-- O4 -->
    <rect x="290" y="82" width="270" height="70" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
    <circle cx="315" cy="117" r="14" fill="#1565c0"/>
    <text x="315" y="122" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff" font-weight="bold">4</text>
    <text x="338" y="110" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">Struggle for Existence</text>
    <text x="338" y="130" font-family="Arial" font-size="11" fill="#555">Resources are limited →</text>
    <text x="338" y="145" font-family="Arial" font-size="11" fill="#555">competition for survival</text>
  </g>

  <!-- Arrow down -->
  <line x1="300" y1="240" x2="300" y2="270" stroke="#333" stroke-width="3"/>
  <polygon points="300,270 292,260 308,260" fill="#333"/>

  <!-- 2 inferences -->
  <text x="300" y="295" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">2 Inferences</text>

  <g transform="translate(40, 308)">
    <!-- I1 -->
    <rect x="0" y="0" width="520" height="60" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
    <circle cx="25" cy="30" r="14" fill="#e53935"/>
    <text x="25" y="35" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff" font-weight="bold">I</text>
    <text x="48" y="25" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">Differential Survival &amp; Reproduction (Natural Selection)</text>
    <text x="48" y="45" font-family="Arial" font-size="11" fill="#555">Individuals with advantageous traits are more likely to survive and reproduce → higher fitness</text>

    <!-- I2 -->
    <rect x="0" y="72" width="520" height="60" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
    <circle cx="25" cy="102" r="14" fill="#e53935"/>
    <text x="25" y="107" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff" font-weight="bold">II</text>
    <text x="48" y="97" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">Descent with Modification (Evolution)</text>
    <text x="48" y="117" font-family="Arial" font-size="11" fill="#555">Over generations, advantageous traits accumulate → population changes over time</text>
  </g>

  <!-- Bottom -->
  <rect x="20" y="445" width="560" height="28" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="464" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">
    Inspired by Malthus: populations grow geometrically, resources arithmetically → inevitable competition
  </text>
</svg>
