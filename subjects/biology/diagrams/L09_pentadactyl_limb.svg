<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480">
  <rect width="600" height="480" fill="#fff"/>
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#333">Homologous Structures — The Pentadactyl Limb</text>
  <text x="300" y="45" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Same bone pattern, different functions → evidence of common ancestry</text>
  <!-- Human -->
  <g transform="translate(40,70)">
    <text x="55" y="12" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">Human (grasping)</text>
    <rect x="45" y="18" width="8" height="50" rx="3" fill="#43a047" stroke="#333" stroke-width="2"/>
    <rect x="38" y="68" width="8" height="40" rx="2" fill="#81c784" stroke="#333" stroke-width="2"/>
    <rect x="50" y="68" width="8" height="40" rx="2" fill="#81c784" stroke="#333" stroke-width="2"/>
    <rect x="30" y="110" width="5" height="30" rx="2" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
    <rect x="37" y="110" width="5" height="35" rx="2" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
    <rect x="44" y="110" width="5" height="38" rx="2" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
    <rect x="51" y="110" width="5" height="32" rx="2" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
    <rect x="58" y="110" width="5" height="25" rx="2" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
    <text x="55" y="155" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Humerus→Radius/Ulna→Carpals→Digits</text>
  </g>
  <!-- Whale -->
  <g transform="translate(155,70)">
    <text x="55" y="12" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">Whale (swimming)</text>
    <rect x="45" y="18" width="8" height="30" rx="3" fill="#43a047" stroke="#333" stroke-width="2"/>
    <rect x="40" y="48" width="8" height="25" rx="2" fill="#81c784" stroke="#333" stroke-width="2"/>
    <rect x="50" y="48" width="8" height="25" rx="2" fill="#81c784" stroke="#333" stroke-width="2"/>
    <rect x="35" y="73" width="4" height="55" rx="2" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
    <rect x="41" y="73" width="4" height="60" rx="2" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
    <rect x="47" y="73" width="4" height="60" rx="2" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
    <rect x="53" y="73" width="4" height="55" rx="2" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
    <rect x="59" y="73" width="4" height="45" rx="2" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
  </g>
  <!-- Bat -->
  <g transform="translate(270,70)">
    <text x="55" y="12" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">Bat (flying)</text>
    <rect x="45" y="18" width="8" height="35" rx="3" fill="#43a047" stroke="#333" stroke-width="2"/>
    <rect x="38" y="53" width="8" height="30" rx="2" fill="#81c784" stroke="#333" stroke-width="2"/>
    <rect x="50" y="53" width="8" height="30" rx="2" fill="#81c784" stroke="#333" stroke-width="2"/>
    <rect x="28" y="85" width="4" height="70" rx="2" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
    <rect x="36" y="85" width="4" height="78" rx="2" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
    <rect x="44" y="85" width="4" height="80" rx="2" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
    <rect x="52" y="85" width="4" height="72" rx="2" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
    <rect x="60" y="85" width="4" height="60" rx="2" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
  </g>
  <!-- Horse -->
  <g transform="translate(385,70)">
    <text x="55" y="12" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">Horse (running)</text>
    <rect x="45" y="18" width="8" height="45" rx="3" fill="#43a047" stroke="#333" stroke-width="2"/>
    <rect x="40" y="63" width="8" height="35" rx="2" fill="#81c784" stroke="#333" stroke-width="2"/>
    <rect x="50" y="63" width="8" height="35" rx="2" fill="#81c784" stroke="#333" stroke-width="2"/>
    <rect x="45" y="100" width="20" height="50" rx="3" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
    <text x="55" y="165" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Reduced to single digit</text>
  </g>
  <!-- Bone color legend -->
  <g transform="translate(505,70)">
    <rect x="0" y="0" width="60" height="12" rx="3" fill="#43a047"/>
    <text x="65" y="10" font-family="Arial" font-size="10" fill="#333">Humerus</text>
    <rect x="0" y="18" width="60" height="12" rx="3" fill="#81c784"/>
    <text x="65" y="28" font-family="Arial" font-size="10" fill="#333">Radius/Ulna</text>
    <rect x="0" y="36" width="60" height="12" rx="3" fill="#a5d6a7"/>
    <text x="65" y="46" font-family="Arial" font-size="10" fill="#333">Carpals/Digits</text>
  </g>
  <!-- Bottom explanation -->
  <text x="300" y="200" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">1 bone → 2 bones → small bones → 5 digits</text>
  <text x="300" y="225" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Same pattern inherited from common tetrapod ancestor</text>
  <text x="300" y="245" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Modified by natural selection for different functions = DIVERGENT EVOLUTION</text>
  <!-- Comparison with analogous -->
  <rect x="50" y="270" width="500" height="90" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1.5"/>
  <text x="300" y="293" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">CONTRAST: Analogous Structures (Convergent Evolution)</text>
  <text x="300" y="315" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Bird wing vs. Insect wing — both fly, but different structural origin</text>
  <text x="300" y="338" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Bird wing: internal bones (vertebrate limb) | Insect wing: chitinous exoskeleton outgrowth</text>
  <text x="300" y="358" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935">Homology = shared ancestry | Analogy = shared function</text>
  <!-- Bottom summary -->
  <rect x="120" y="380" width="360" height="50" rx="6" fill="#ff8f00" opacity="0.15"/>
  <text x="300" y="400" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Evidence for Evolution: Structural similarity despite functional diversity</text>
  <text x="300" y="420" text-anchor="middle" font-family="Arial" font-size="12" fill="#e65100">Only explained by inheritance from a common ancestor (descent with modification)</text>
</svg>