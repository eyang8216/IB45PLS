<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 620" width="600" height="620">
  <rect width="600" height="620" fill="#fff" rx="8"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#1a6b3c">Photosystem Architecture — Antenna Complex to Reaction Centre</text>

  <!-- Antenna complex - outer ring of pigments -->
  <!-- Pigment molecules arranged in concentric rings -->
  <circle cx="300" cy="330" r="200" fill="none" stroke="#81c784" stroke-width="1.5" stroke-dasharray="4,8" opacity="0.5"/>
  <circle cx="300" cy="330" r="150" fill="none" stroke="#81c784" stroke-width="1.5" stroke-dasharray="4,8" opacity="0.5"/>
  <circle cx="300" cy="330" r="100" fill="none" stroke="#81c784" stroke-width="1.5" stroke-dasharray="4,8" opacity="0.5"/>

  <!-- Outer ring pigments (chlorophyll a/b, carotenoids) -->
  <circle cx="300" cy="140" r="7" fill="#43a047" stroke="#333" stroke-width="1.5"/>
  <circle cx="430" cy="180" r="7" fill="#66bb6a" stroke="#333" stroke-width="1.5"/>
  <circle cx="470" cy="300" r="7" fill="#ff8f00" stroke="#333" stroke-width="1.5"/>
  <circle cx="430" cy="420" r="7" fill="#43a047" stroke="#333" stroke-width="1.5"/>
  <circle cx="300" cy="470" r="7" fill="#66bb6a" stroke="#333" stroke-width="1.5"/>
  <circle cx="170" cy="420" r="7" fill="#ff8f00" stroke="#333" stroke-width="1.5"/>
  <circle cx="100" cy="330" r="7" fill="#43a047" stroke="#333" stroke-width="1.5"/>
  <circle cx="170" cy="210" r="7" fill="#66bb6a" stroke="#333" stroke-width="1.5"/>

  <!-- Middle ring -->
  <circle cx="380" cy="230" r="6" fill="#43a047" stroke="#333" stroke-width="1.5"/>
  <circle cx="440" cy="330" r="6" fill="#ff8f00" stroke="#333" stroke-width="1.5"/>
  <circle cx="380" cy="400" r="6" fill="#43a047" stroke="#333" stroke-width="1.5"/>
  <circle cx="220" cy="400" r="6" fill="#66bb6a" stroke="#333" stroke-width="1.5"/>
  <circle cx="140" cy="300" r="6" fill="#ff8f00" stroke="#333" stroke-width="1.5"/>
  <circle cx="220" cy="240" r="6" fill="#43a047" stroke="#333" stroke-width="1.5"/>

  <!-- Inner ring - core antenna -->
  <circle cx="340" cy="280" r="5" fill="#1a6b3c" stroke="#333" stroke-width="1"/>
  <circle cx="380" cy="340" r="5" fill="#1a6b3c" stroke="#333" stroke-width="1"/>
  <circle cx="340" cy="390" r="5" fill="#1a6b3c" stroke="#333" stroke-width="1"/>
  <circle cx="260" cy="390" r="5" fill="#1a6b3c" stroke="#333" stroke-width="1"/>
  <circle cx="220" cy="340" r="5" fill="#1a6b3c" stroke="#333" stroke-width="1"/>
  <circle cx="260" cy="280" r="5" fill="#1a6b3c" stroke="#333" stroke-width="1"/>

  <!-- Energy transfer arrows (FRET) -->
  <line x1="300" y1="140" x2="350" y2="230" stroke="#ff8f00" stroke-width="1.5" opacity="0.6"/>
  <line x1="170" y1="210" x2="230" y2="270" stroke="#ff8f00" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="330" x2="200" y2="340" stroke="#ff8f00" stroke-width="1.5" opacity="0.6"/>
  <line x1="430" y1="180" x2="380" y2="240" stroke="#ff8f00" stroke-width="1.5" opacity="0.6"/>

  <!-- Resonance energy transfer label -->
  <text x="350" y="175" font-family="Arial" font-size="9" fill="#ff8f00" font-style="italic">FRET</text>

  <!-- Reaction Centre -->
  <rect x="265" y="295" width="70" height="70" rx="8" fill="#e8eaf6" stroke="#6a1b9a" stroke-width="3"/>
  <text x="300" y="318" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Reaction</text>
  <text x="300" y="332" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Centre</text>

  <!-- Special pair -->
  <ellipse cx="300" cy="355" rx="18" ry="10" fill="#e53935" stroke="#333" stroke-width="1.5"/>
  <text x="300" y="358" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff" font-weight="bold">P680</text>

  <!-- Labels -->
  <text x="300" y="58" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">Light-Harvesting Antenna Complex (200–300 pigment molecules)</text>

  <!-- Legend -->
  <rect x="30" y="80" width="20" height="12" fill="#43a047" stroke="#333" stroke-width="1"/>
  <text x="56" y="91" font-family="Arial" font-size="11" fill="#333">Chlorophyll a</text>

  <rect x="160" y="80" width="20" height="12" fill="#66bb6a" stroke="#333" stroke-width="1"/>
  <text x="186" y="91" font-family="Arial" font-size="11" fill="#333">Chlorophyll b</text>

  <rect x="310" y="80" width="20" height="12" fill="#ff8f00" stroke="#333" stroke-width="1"/>
  <text x="336" y="91" font-family="Arial" font-size="11" fill="#333">Carotenoids</text>

  <!-- Right side annotations -->
  <line x1="480" y1="140" x2="520" y2="140" stroke="#333" stroke-width="1"/>
  <text x="525" y="144" font-family="Arial" font-size="11" fill="#333">❶ Photon absorbed by</text>
  <text x="525" y="159" font-family="Arial" font-size="11" fill="#333">   antenna pigment</text>

  <line x1="480" y1="200" x2="520" y2="200" stroke="#333" stroke-width="1"/>
  <text x="525" y="204" font-family="Arial" font-size="11" fill="#333">❷ Energy transferred via</text>
  <text x="525" y="219" font-family="Arial" font-size="11" fill="#333">   Förster Resonance</text>
  <text x="525" y="234" font-family="Arial" font-size="11" fill="#333">   (pigment to pigment)</text>

  <line x1="480" y1="280" x2="520" y2="280" stroke="#333" stroke-width="1"/>
  <text x="525" y="284" font-family="Arial" font-size="11" fill="#333">❸ Energy funneled to</text>
  <text x="525" y="299" font-family="Arial" font-size="11" fill="#333">   Reaction Centre</text>

  <line x1="480" y1="345" x2="520" y2="345" stroke="#333" stroke-width="1"/>
  <text x="525" y="349" font-family="Arial" font-size="11" fill="#333">❹ Special pair P680/P700</text>
  <text x="525" y="364" font-family="Arial" font-size="11" fill="#333">   undergoes charge</text>
  <text x="525" y="379" font-family="Arial" font-size="11" fill="#333">   separation → e⁻ transfer</text>

  <!-- Protein scaffold base -->
  <path d="M150,490 Q300,460 450,490" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="300" y="505" text-anchor="middle" font-family="Arial" font-size="10" fill="#888" font-style="italic">Protein scaffold (transmembrane)</text>

  <!-- Thylakoid membrane -->
  <rect x="80" y="520" width="440" height="30" rx="4" fill="none" stroke="#333" stroke-width="2"/>
  <text x="300" y="543" text-anchor="middle" font-family="Arial" font-size="12" fill="#333" font-weight="bold">Thylakoid Membrane</text>

  <!-- FRET explanation box -->
  <rect x="80" y="565" width="440" height="45" rx="6" fill="#fff3e0" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="300" y="583" text-anchor="middle" font-family="Arial" font-size="11" fill="#333" font-weight="bold">Förster Resonance Energy Transfer (FRET)</text>
  <text x="300" y="600" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Non-radiative energy transfer (no photon emitted). Energy hops pigment → pigment via dipole-dipole coupling.</text>
</svg>
