<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 680" width="600" height="680">
  <rect width="600" height="680" fill="white"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">L43b — Stages of Mitosis (PMAT)</text>

  <!-- Each stage in a panel -->

  <!-- Prophase -->
  <rect x="20" y="50" width="270" height="260" rx="6" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="155" y="75" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#ff8f00">1. PROPHASE</text>
  <!-- Cell -->
  <circle cx="155" cy="180" r="60" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Centrosomes -->
  <circle cx="105" cy="155" r="5" fill="#1565c0"/><circle cx="205" cy="205" r="5" fill="#1565c0"/>
  <!-- Spindle fibers -->
  <line x1="107" y1="155" x2="155" y2="185" stroke="#1565c0" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="203" y1="205" x2="155" y2="185" stroke="#1565c0" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Chromosomes (condensed) -->
  <g fill="#e53935">
    <path d="M140,175 L150,165 L150,195 L140,185 Z"/>
    <path d="M150,165 L160,175 L160,195 L150,185 Z" fill="#e53935" opacity="0.7"/>
    <path d="M155,200 L165,190 L165,220 L155,210 Z"/>
    <path d="M165,190 L175,200 L175,220 L165,210 Z" fill="#e53935" opacity="0.7"/>
  </g>
  <text x="155" y="268" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Chromatin condenses → chromosomes visible</text>
  <text x="155" y="284" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Nuclear envelope breaks down</text>
  <text x="155" y="300" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Spindle forms, centrosomes separate</text>

  <!-- Metaphase -->
  <rect x="310" y="50" width="270" height="260" rx="6" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="445" y="75" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1a6b3c">2. METAPHASE</text>
  <circle cx="445" cy="180" r="60" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="395" cy="180" r="4" fill="#1565c0"/><circle cx="495" cy="180" r="4" fill="#1565c0"/>
  <!-- Spindle from poles -->
  <line x1="399" y1="180" x2="460" y2="180" stroke="#1565c0" stroke-width="1.5"/>
  <!-- Chromosomes aligned -->
  <g fill="#e53935">
    <rect x="420" y="162" width="8" height="36" rx="2"/>
    <rect x="435" y="162" width="8" height="36" rx="2"/>
    <rect x="450" y="162" width="8" height="36" rx="2"/>
  </g>
  <line x1="395" y1="180" x2="555" y2="180" stroke="#ddd" stroke-width="0.8" stroke-dasharray="6,3"/>
  <text x="550" y="176" font-family="Arial" font-size="10" fill="#aaa">Equator</text>
  <text x="445" y="268" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Chromosomes align at metaphase plate</text>
  <text x="445" y="284" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Kinetochores attach to spindle</text>
  <text x="445" y="300" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Tension aligns, max condensed → karyotyping</text>

  <!-- Anaphase -->
  <rect x="20" y="325" width="270" height="260" rx="6" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="155" y="350" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#e53935">3. ANAPHASE</text>
  <circle cx="155" cy="455" r="60" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="105" cy="455" r="4" fill="#1565c0"/><circle cx="205" cy="455" r="4" fill="#1565c0"/>
  <!-- Separated chromatids -->
  <g fill="#e53935">
    <rect x="115" y="435" width="6" height="25" rx="1"/><rect x="115" y="470" width="6" height="25" rx="1"/>
    <rect x="128" y="435" width="6" height="25" rx="1"/><rect x="128" y="470" width="6" height="25" rx="1"/>
    <rect x="176" y="425" width="6" height="25" rx="1"/><rect x="176" y="460" width="6" height="25" rx="1"/>
    <rect x="189" y="425" width="6" height="25" rx="1"/><rect x="189" y="460" width="6" height="25" rx="1"/>
  </g>
  <text x="155" y="543" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Cohesin cleaved → sister chromatids separate</text>
  <text x="155" y="559" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Kinetochore MTs shorten → pull to poles</text>
  <text x="155" y="575" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">V-shape: centromere leads, arms trail</text>

  <!-- Telophase -->
  <rect x="310" y="325" width="270" height="260" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="445" y="350" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1565c0">4. TELOPHASE</text>
  <!-- Dumbbell cell -->
  <path d="M400,400 Q370,420 370,455 Q370,490 400,510 Q445,530 445,455 Q445,420 400,400 Z" fill="none" stroke="#333" stroke-width="2"/>
  <path d="M490,400 Q520,420 520,455 Q520,490 490,510 Q445,530 445,455 Q445,420 490,400 Z" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Two nuclei -->
  <circle cx="400" cy="455" r="20" fill="none" stroke="#1565c0" stroke-width="2"/>
  <circle cx="490" cy="455" r="20" fill="none" stroke="#1565c0" stroke-width="2"/>
  <!-- Chromatin inside -->
  <path d="M393,450 Q397,448 400,452 Q403,448 407,450 M396,458 Q400,455 404,458" fill="none" stroke="#e53935" stroke-width="1"/>
  <path d="M483,450 Q487,448 490,452 Q493,448 497,450 M486,458 Q490,455 494,458" fill="none" stroke="#e53935" stroke-width="1"/>

  <text x="445" y="543" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Nuclear envelope reforms</text>
  <text x="445" y="559" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Chromosomes decondense → chromatin</text>
  <text x="445" y="575" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Spindle disassembles, nucleoli reappear</text>

  <!-- Bottom note -->
  <rect x="20" y="600" width="560" height="65" rx="6" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
  <text x="300" y="622" text-anchor="middle" font-family="Arial" font-size="12" fill="#333" font-weight="bold">PMAT Mnemonic: Prophase → Metaphase → Anaphase → Telophase (then Cytokinesis)</text>
  <text x="300" y="642" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Key: Centromeres split in anaphase (not metaphase). Sister chromatids → individual chromosomes after separation.</text>
  <text x="300" y="658" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Mitosis = nuclear division. Cytokinesis = cytoplasmic division (cleavage furrow in animal cells, cell plate in plant cells).</text>
</svg>