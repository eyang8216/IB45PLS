<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 540" width="600" height="540">
  <rect width="600" height="540" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">MHC Class I &amp; MHC Class II Antigen Presentation</text>

  <!-- Divider -->
  <line x1="300" y1="30" x2="300" y2="525" stroke="#999" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- ===== PANEL 1: MHC I ===== -->
  <text x="150" y="48" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">MHC Class I</text>
  <text x="150" y="64" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">All nucleated cells · Endogenous pathway</text>

  <!-- Cell box -->
  <rect x="20" y="72" width="260" height="220" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="150" y="90" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Infected Cell (e.g. virus)</text>

  <!-- Viral protein -->
  <text x="60" y="112" font-family="Arial" font-size="9" fill="#e53935">Endogenous antigen</text>
  <ellipse cx="60" cy="130" rx="18" ry="10" fill="#e53935" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="60" y="133" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">Viral</text>
  <text x="60" y="142" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">protein</text>

  <!-- Proteasome -->
  <text x="120" y="112" font-family="Arial" font-size="8" fill="#555">Proteasome</text>
  <rect x="105" y="118" width="30" height="22" rx="3" fill="#ffcc80" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="120" y="133" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Degrade</text>
  <line x1="78" y1="130" x2="105" y2="130" stroke="#333" stroke-width="1.5" marker-end="url(#aM1)"/>

  <!-- Peptides -->
  <text x="80" y="158" font-family="Arial" font-size="8" fill="#555">Peptides (8-10 aa)</text>
  <line x1="120" y1="140" x2="100" y2="155" stroke="#333" stroke-width="1"/>

  <!-- TAP -->
  <text x="175" y="112" font-family="Arial" font-size="8" fill="#555">TAP</text>
  <rect x="160" y="118" width="30" height="22" rx="3" fill="#b3e5fc" stroke="#1565c0" stroke-width="1.5"/>
  <text x="175" y="133" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">TAP</text>
  <line x1="100" y1="163" x2="160" y2="130" stroke="#333" stroke-width="1"/>

  <!-- ER -->
  <text x="220" y="112" font-family="Arial" font-size="8" fill="#555">ER</text>
  <ellipse cx="220" cy="135" rx="22" ry="14" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
  <text x="220" y="138" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">ER</text>
  <line x1="190" y1="130" x2="198" y2="133" stroke="#333" stroke-width="1"/>

  <!-- MHC I -->
  <text x="220" y="162" font-family="Arial" font-size="8" fill="#555">MHC I + peptide</text>
  <line x1="220" y1="149" x2="220" y2="165" stroke="#333" stroke-width="1"/>

  <!-- Golgi -->
  <text x="175" y="185" font-family="Arial" font-size="8" fill="#555">Golgi</text>
  <rect x="155" y="190" width="40" height="18" rx="8" fill="#fff9c4" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="175" y="204" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Golgi</text>
  <line x1="220" y1="180" x2="195" y2="190" stroke="#333" stroke-width="1"/>

  <!-- Cell surface -->
  <line x1="20" y1="220" x2="280" y2="220" stroke="#1565c0" stroke-width="2.5"/>
  <text x="140" y="235" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Cell Surface Membrane</text>

  <!-- MHC I on surface -->
  <rect x="80" y="222" width="40" height="22" rx="3" fill="#1565c0" stroke="#0d47a1" stroke-width="1.5"/>
  <text x="100" y="237" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">MHC I</text>
  <line x1="175" y1="208" x2="100" y2="222" stroke="#333" stroke-width="1"/>

  <!-- CD8+ T cell -->
  <ellipse cx="100" cy="280" rx="28" ry="16" fill="#e53935" stroke="#b71c1c" stroke-width="2"/>
  <text x="100" y="278" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">CD8⁺</text>
  <text x="100" y="290" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">Cytotoxic T</text>
  <line x1="100" y1="244" x2="100" y2="264" stroke="#333" stroke-width="1.5" stroke-dasharray="3 2"/>

  <text x="100" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">→ Kills infected cell</text>
  <text x="100" y="330" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">(perforin, granzymes)</text>

  <!-- ===== PANEL 2: MHC II ===== -->
  <text x="450" y="48" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">MHC Class II</text>
  <text x="450" y="64" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">APCs only · Exogenous pathway</text>

  <!-- APC cell box -->
  <rect x="320" y="72" width="260" height="220" rx="10" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="450" y="90" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">Antigen-Presenting Cell (APC)</text>

  <!-- Exogenous antigen -->
  <text x="360" y="112" font-family="Arial" font-size="9" fill="#e53935">Exogenous antigen</text>
  <ellipse cx="360" cy="130" rx="18" ry="10" fill="#e53935" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="360" y="133" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">Bacterium</text>

  <!-- Phagocytosis -->
  <text x="420" y="112" font-family="Arial" font-size="8" fill="#555">Phagocytosis</text>
  <circle cx="420" cy="138" r="14" fill="none" stroke="#1a6b3c" stroke-width="2"/>
  <ellipse cx="420" cy="138" rx="8" ry="4" fill="#e53935" stroke="#b71c1c" stroke-width="0.5"/>
  <line x1="378" y1="130" x2="406" y2="135" stroke="#333" stroke-width="1.5"/>

  <!-- Phagolysosome -->
  <text x="480" y="112" font-family="Arial" font-size="8" fill="#555">Phagolysosome</text>
  <circle cx="480" cy="138" r="14" fill="none" stroke="#1a6b3c" stroke-width="2"/>
  <circle cx="475" cy="133" r="2" fill="#e53935"/>
  <circle cx="483" cy="136" r="2" fill="#e53935"/>
  <circle cx="478" cy="142" r="2" fill="#e53935"/>
  <text x="480" y="162" font-family="Arial" font-size="7" fill="#555">Digestion</text>

  <!-- Peptides -->
  <text x="420" y="175" font-family="Arial" font-size="8" fill="#555">Peptides (13-25 aa)</text>

  <!-- MHC II in ER -->
  <text x="360" y="195" font-family="Arial" font-size="8" fill="#555">MHC II synthesized</text>
  <ellipse cx="360" cy="208" rx="16" ry="10" fill="#c8e6c9" stroke="#43a047" stroke-width="1.5"/>
  <text x="360" y="211" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">ER</text>

  <!-- Vesicle fusion -->
  <text x="440" y="195" font-family="Arial" font-size="8" fill="#555">Vesicle fusion</text>
  <circle cx="440" cy="208" r="12" fill="none" stroke="#43a047" stroke-width="1.5" stroke-dasharray="3 2"/>
  <circle cx="440" cy="208" r="4" fill="#43a047"/>

  <!-- Cell surface -->
  <line x1="320" y1="225" x2="580" y2="225" stroke="#43a047" stroke-width="2.5"/>
  <text x="450" y="240" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Cell Surface Membrane</text>

  <!-- MHC II on surface -->
  <rect x="430" y="229" width="40" height="22" rx="3" fill="#43a047" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="450" y="244" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">MHC II</text>

  <!-- CD4+ T cell -->
  <ellipse cx="450" cy="280" rx="28" ry="16" fill="#1565c0" stroke="#0d47a1" stroke-width="2"/>
  <text x="450" y="278" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">CD4⁺</text>
  <text x="450" y="290" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">Helper T</text>
  <line x1="450" y1="251" x2="450" y2="264" stroke="#333" stroke-width="1.5" stroke-dasharray="3 2"/>

  <text x="450" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">→ Activates B cells,</text>
  <text x="450" y="330" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">macrophages, CTLs</text>

  <!-- Comparison table -->
  <rect x="20" y="350" width="560" height="180" rx="8" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="300" y="372" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Comparison: MHC I vs MHC II</text>

  <line x1="290" y1="380" x2="290" y2="520" stroke="#999" stroke-width="1"/>
  <line x1="20" y1="400" x2="580" y2="400" stroke="#ddd" stroke-width="1"/>
  <line x1="20" y1="430" x2="580" y2="430" stroke="#ddd" stroke-width="1"/>
  <line x1="20" y1="460" x2="580" y2="460" stroke="#ddd" stroke-width="1"/>
  <line x1="20" y1="490" x2="580" y2="490" stroke="#ddd" stroke-width="1"/>

  <text x="155" y="395" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">MHC Class I</text>
  <text x="445" y="395" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1a6b3c">MHC Class II</text>

  <text x="155" y="422" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">All nucleated cells</text>
  <text x="445" y="422" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">APCs only (DC, Mφ, B cells)</text>

  <text x="155" y="452" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Endogenous (intracellular)</text>
  <text x="445" y="452" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Exogenous (extracellular)</text>

  <text x="155" y="482" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">CD8⁺ Cytotoxic T cell</text>
  <text x="445" y="482" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">CD4⁺ Helper T cell</text>

  <text x="155" y="512" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Kills infected cell</text>
  <text x="445" y="512" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Activates immune response</text>
</svg>