<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 560" width="600" height="560">
  <rect width="600" height="560" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Fertilization — Acrosome Reaction &amp; Cortical Reaction</text>

  <!-- STEP 1: Sperm approaching -->
  <text x="95" y="52" text-anchor="middle" font-family="Arial" font-size="12" fill="#1a6b3c" font-weight="bold">① Sperm approaches egg</text>

  <!-- Egg -->
  <circle cx="120" cy="120" r="55" fill="#fff3e0" stroke="#ff8f00" stroke-width="3"/>
  <text x="120" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00">Secondary</text>
  <text x="120" y="128" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00">Oocyte</text>

  <!-- Corona radiata -->
  <circle cx="120" cy="120" r="68" fill="none" stroke="#81c784" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="120" y="78" text-anchor="middle" font-family="Arial" font-size="8" fill="#81c784">Corona radiata</text>

  <!-- Zona pellucida -->
  <circle cx="120" cy="120" r="62" fill="none" stroke="#e53935" stroke-width="2"/>
  <text x="120" y="100" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Zona pellucida</text>

  <!-- Sperm -->
  <g transform="translate(200,120)">
    <ellipse cx="0" cy="0" rx="8" ry="5" fill="#43a047" stroke="#1a6b3c" stroke-width="1.5"/>
    <line x1="-18" y1="0" x2="-8" y2="0" stroke="#1a6b3c" stroke-width="1.5"/>
    <line x1="-18" y1="0" x2="-22" y2="-5" stroke="#1a6b3c" stroke-width="0.8"/>
    <line x1="-18" y1="0" x2="-22" y2="5" stroke="#1a6b3c" stroke-width="0.8"/>
    <!-- Acrosome cap -->
    <path d="M-4,-5 Q-8,-7 -10,-5 Q-8,-3 -4,-5" fill="#e53935" stroke="#c62828" stroke-width="1"/>
  </g>
  <text x="200" y="145" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Acrosome</text>

  <!-- Arrow -->
  <line x1="230" y1="120" x2="250" y2="120" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- STEP 2: Acrosome Reaction -->
  <text x="330" y="52" text-anchor="middle" font-family="Arial" font-size="12" fill="#e53935" font-weight="bold">② Acrosome Reaction</text>

  <circle cx="330" cy="120" r="55" fill="#fff3e0" stroke="#ff8f00" stroke-width="3"/>
  <circle cx="330" cy="120" r="62" fill="none" stroke="#e53935" stroke-width="2"/>
  <text x="330" y="125" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff8f00">Egg</text>

  <!-- Sperm fused -->
  <g transform="translate(315,120)">
    <ellipse cx="0" cy="0" rx="8" ry="5" fill="#43a047" stroke="#1a6b3c" stroke-width="1.5"/>
    <line x1="-18" y1="0" x2="-8" y2="0" stroke="#1a6b3c" stroke-width="1.5"/>
  </g>

  <!-- Enzyme burst -->
  <circle cx="310" cy="110" r="15" fill="none" stroke="#e53935" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="310" y="100" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Enzymes</text>
  <text x="310" y="90" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">digest ZP</text>

  <line x1="380" y1="120" x2="400" y2="120" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- STEP 3: Membrane fusion -->
  <text x="475" y="52" text-anchor="middle" font-family="Arial" font-size="12" fill="#1565c0" font-weight="bold">③ Membrane</text>
  <text x="475" y="65" text-anchor="middle" font-family="Arial" font-size="12" fill="#1565c0" font-weight="bold">Fusion</text>

  <circle cx="475" cy="120" r="55" fill="#fff3e0" stroke="#ff8f00" stroke-width="3"/>
  <circle cx="475" cy="120" r="62" fill="none" stroke="#e53935" stroke-width="2"/>
  <text x="475" y="125" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Sperm membrane</text>
  <text x="475" y="138" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">fuses egg membrane</text>

  <!-- STEP 4: Cortical Reaction -->
  <text x="150" y="200" text-anchor="middle" font-family="Arial" font-size="12" fill="#6a1b9a" font-weight="bold">④ Cortical Reaction</text>

  <circle cx="120" cy="280" r="55" fill="#fff3e0" stroke="#ff8f00" stroke-width="3"/>
  <circle cx="120" cy="280" r="62" fill="none" stroke="#e53935" stroke-width="2.5"/>
  <text x="120" y="275" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00">Egg</text>

  <!-- Cortical granules -->
  <circle cx="95" cy="295" r="4" fill="#6a1b9a" stroke="#4a148c" stroke-width="1"/>
  <circle cx="108" cy="305" r="4" fill="#6a1b9a" stroke="#4a148c" stroke-width="1"/>
  <circle cx="130" cy="300" r="4" fill="#6a1b9a" stroke="#4a148c" stroke-width="1"/>
  <circle cx="100" cy="270" r="4" fill="#6a1b9a" stroke="#4a148c" stroke-width="1"/>
  <text x="120" y="325" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Cortical granules</text>
  <text x="120" y="337" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">released (exocytosis)</text>

  <line x1="180" y1="280" x2="210" y2="280" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- STEP 5: Zona hardening -->
  <text x="330" y="200" text-anchor="middle" font-family="Arial" font-size="12" fill="#e53935" font-weight="bold">⑤ Zona Hardens</text>

  <circle cx="300" cy="280" r="55" fill="#fff3e0" stroke="#ff8f00" stroke-width="3"/>
  <circle cx="300" cy="280" r="62" fill="none" stroke="#e53935" stroke-width="3"/>
  <text x="300" y="275" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Zona pellucida</text>
  <text x="300" y="288" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">HARDENS</text>

  <!-- Blocked sperm -->
  <g transform="translate(340,252)">
    <ellipse cx="0" cy="0" rx="6" ry="4" fill="#ccc" stroke="#999" stroke-width="1"/>
    <line x1="-12" y1="0" x2="-6" y2="0" stroke="#999" stroke-width="1"/>
  </g>
  <text x="355" y="248" font-family="Arial" font-size="8" fill="#999">✕ BLOCKED</text>

  <text x="300" y="325" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Polyspermy prevented</text>

  <line x1="360" y1="280" x2="390" y2="280" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- STEP 6: Pronuclei -->
  <text x="490" y="200" text-anchor="middle" font-family="Arial" font-size="12" fill="#1a6b3c" font-weight="bold">⑥ Pronuclei</text>

  <circle cx="480" cy="280" r="55" fill="#fff3e0" stroke="#ff8f00" stroke-width="3"/>
  <circle cx="480" cy="280" r="62" fill="none" stroke="#e53935" stroke-width="3"/>

  <circle cx="468" cy="275" r="10" fill="#43a047" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="468" y="278" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">♂ n</text>

  <circle cx="492" cy="285" r="10" fill="#ff8f00" stroke="#e65100" stroke-width="1.5"/>
  <text x="492" y="288" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">♀ n</text>

  <text x="480" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Male + Female pronuclei</text>
  <text x="480" y="327" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">fuse → ZYGOTE (2n)</text>

  <!-- Bottom summary -->
  <rect x="25" y="400" width="550" height="145" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="300" y="420" text-anchor="middle" font-family="Arial" font-size="12" fill="#333" font-weight="bold">Summary of Events</text>
  <text x="40" y="440" font-family="Arial" font-size="10" fill="#333">1. Sperm binds to zona pellucida (ZP3 glycoprotein)</text>
  <text x="40" y="458" font-family="Arial" font-size="10" fill="#333">2. Acrosome reaction: enzymes (acrosin) digest zona pellucida</text>
  <text x="40" y="476" font-family="Arial" font-size="10" fill="#333">3. Sperm membrane fuses with egg membrane</text>
  <text x="40" y="494" font-family="Arial" font-size="10" fill="#333">4. Cortical reaction: cortical granules release → zona hardens → blocks polyspermy</text>
  <text x="40" y="512" font-family="Arial" font-size="10" fill="#333">5. Egg completes meiosis II → ovum + 2nd polar body</text>
  <text x="40" y="530" font-family="Arial" font-size="10" fill="#333">6. Male pronucleus + female pronucleus fuse → ZYGOTE (diploid)</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#333"/></marker>
  </defs>
</svg>