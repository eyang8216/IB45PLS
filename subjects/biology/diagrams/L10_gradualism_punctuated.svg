<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420">
  <rect width="600" height="420" fill="#fff"/>
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#333">Gradualism vs. Punctuated Equilibrium</text>
  <text x="300" y="46" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Two models for the tempo of evolution</text>
  <!-- Gradualism -->
  <rect x="25" y="65" width="265" height="330" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="157" y="90" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">Gradualism (Darwin)</text>
  <text x="157" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Slow, steady accumulation of small changes</text>
  <text x="157" y="126" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">over vast periods of time</text>
  <!-- Graph -->
  <line x1="60" y1="280" x2="250" y2="280" stroke="#999" stroke-width="1"/>
  <line x1="60" y1="280" x2="60" y2="150" stroke="#999" stroke-width="1"/>
  <text x="155" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Time →</text>
  <text x="45" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#666" transform="rotate(-90,45,215)">Morphology →</text>
  <!-- Gradual line -->
  <polyline points="60,260 100,250 130,240 170,220 200,200 230,185 250,180" fill="none" stroke="#43a047" stroke-width="3"/>
  <text x="155" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Smooth, gradual change</text>
  <text x="155" y="335" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Fossil record: many intermediates</text>
  <text x="155" y="355" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Large populations transform together</text>
  <!-- Punctuated -->
  <rect x="310" y="65" width="265" height="330" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="442" y="90" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#6a1b9a">Punctuated Equilibrium</text>
  <text x="442" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">(Eldredge &amp; Gould, 1972)</text>
  <text x="442" y="128" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Long periods of stasis + rapid bursts</text>
  <!-- Graph -->
  <line x1="340" y1="280" x2="530" y2="280" stroke="#999" stroke-width="1"/>
  <line x1="340" y1="280" x2="340" y2="150" stroke="#999" stroke-width="1"/>
  <text x="435" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Time →</text>
  <!-- Staircase -->
  <polyline points="340,260 370,260 370,230 400,230 400,210 430,210 430,190 460,190 460,175 490,175 490,165 520,165" fill="none" stroke="#6a1b9a" stroke-width="3"/>
  <!-- Stasis brackets -->
  <line x1="340" y1="264" x2="370" y2="264" stroke="#e53935" stroke-width="2"/>
  <text x="355" y="275" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Stasis</text>
  <line x1="370" y1="264" x2="370" y2="230" stroke="#ff8f00" stroke-width="2"/>
  <text x="360" y="248" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff8f00">Rapid change</text>
  <line x1="400" y1="234" x2="430" y2="234" stroke="#e53935" stroke-width="2"/>
  <text x="415" y="245" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Stasis</text>
  <text x="435" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Step-like pattern</text>
  <text x="435" y="335" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Fossil record: species appear suddenly,</text>
  <text x="435" y="350" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">persist with little change, then disappear</text>
  <text x="435" y="370" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Speciation in small, peripheral populations</text>
  <!-- Bottom consensus -->
  <rect x="50" y="400" width="500" height="18" rx="5" fill="#ff8f00" opacity="0.15"/>
  <text x="300" y="414" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Modern consensus: Both patterns occur in nature — debate is about relative frequency, not existence</text>
</svg>