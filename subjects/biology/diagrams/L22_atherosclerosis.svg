<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 560" width="600" height="560">
  <rect width="600" height="560" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Atherosclerosis — Plaque Development</text>

  <!-- 6 stages in a flow -->
  <!-- Stage 1 -->
  <rect x="30" y="55" width="160" height="80" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="110" y="75" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">1. Endothelial Injury</text>
  <text x="110" y="92" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">High BP, smoking,</text>
  <text x="110" y="106" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">diabetes, toxins</text>
  <text x="110" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">damage intima</text>

  <text x="200" y="100" font-family="Arial" font-size="14" fill="#333">→</text>

  <!-- Stage 2 -->
  <rect x="215" y="55" width="160" height="80" rx="6" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="295" y="75" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff8f00">2. LDL Infiltration</text>
  <text x="295" y="92" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">LDL cholesterol</text>
  <text x="295" y="106" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">enters arterial</text>
  <text x="295" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">wall → oxidized</text>

  <text x="385" y="100" font-family="Arial" font-size="14" fill="#333">→</text>

  <!-- Stage 3 -->
  <rect x="400" y="55" width="165" height="80" rx="6" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
  <text x="482" y="75" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e53935">3. Foam Cells</text>
  <text x="482" y="92" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Monocytes enter</text>
  <text x="482" y="106" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">→ macrophages</text>
  <text x="482" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">→ foam cells</text>

  <!-- Artery cross-section: Healthy vs Plaque -->
  <text x="300" y="170" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">HEALTHY ARTERY</text>

  <!-- Healthy artery -->
  <circle cx="175" cy="280" r="85" fill="#fff" stroke="#333" stroke-width="2"/>
  <circle cx="175" cy="280" r="55" fill="#fce4ec" stroke="#e53935" stroke-width="1.5"/>
  <text x="175" y="285" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Wide Lumen</text>
  <circle cx="175" cy="280" r="65" fill="none" stroke="#e53935" stroke-width="1.5"/>
  <text x="175" y="380" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Smooth endothelium</text>
  <text x="175" y="395" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Normal blood flow</text>

  <!-- Plaque artery -->
  <text x="425" y="170" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e53935">ATHEROSCLEROTIC ARTERY</text>

  <circle cx="425" cy="280" r="85" fill="#fff" stroke="#333" stroke-width="2"/>
  <!-- Plaque buildup -->
  <path d="M375,220 Q390,200 440,195 Q480,200 475,240 Q470,310 440,340 Q400,350 375,330 Z" fill="#ffcdd2" stroke="#e53935" stroke-width="2"/>
  <text x="425" y="258" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">Plaque</text>
  <text x="425" y="273" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">(foam cells,</text>
  <text x="425" y="286" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">smooth muscle,</text>
  <text x="425" y="299" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">fibrous cap)</text>
  <!-- Narrow lumen -->
  <circle cx="425" cy="280" r="20" fill="#e3f2fd" stroke="#e53935" stroke-width="1.5"/>
  <text x="425" y="375" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Narrowed Lumen</text>
  <text x="425" y="395" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Reduced blood flow</text>

  <!-- Consequences -->
  <rect x="30" y="420" width="540" height="130" rx="6" fill="#fafafa" stroke="#333" stroke-width="1"/>
  <text x="300" y="445" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Consequences of Atherosclerosis</text>
  <text x="50" y="468" font-family="Arial" font-size="10" fill="#e53935">Angina: narrowed lumen → reduced blood flow → chest pain during exertion (O₂ demand > supply)</text>
  <text x="50" y="488" font-family="Arial" font-size="10" fill="#e53935">Plaque rupture: fibrous cap ruptures → thrombogenic core exposed → thrombosis (clot)</text>
  <text x="50" y="508" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">Myocardial infarction (heart attack): complete coronary artery blockage → cardiac muscle necrosis</text>
  <text x="50" y="528" font-family="Arial" font-size="10" fill="#e53935">Stroke: similar process in cerebral arteries → brain tissue death</text>
  <text x="50" y="548" font-family="Arial" font-size="9" fill="#333">Risk factors: smoking, high LDL/saturated fat diet, hypertension, diabetes, obesity, sedentary lifestyle, genetics</text>
</svg>