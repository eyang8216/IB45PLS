<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420">
  <rect width="600" height="420" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Predator-Prey Oscillation — Lynx &amp; Snowshoe Hare (~10-year cycle)</text>

  <!-- Axes -->
  <line x1="55" y1="60" x2="55" y2="360" stroke="#333" stroke-width="2"/>
  <line x1="55" y1="360" x2="570" y2="360" stroke="#333" stroke-width="2"/>

  <!-- Y axis labels -->
  <text x="48" y="65" text-anchor="end" font-family="Arial" font-size="9" fill="#333">HIGH</text>
  <text x="48" y="355" text-anchor="end" font-family="Arial" font-size="9" fill="#333">LOW</text>
  <text x="30" y="210" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" transform="rotate(-90,30,210)">Population Size</text>

  <!-- X axis -->
  <text x="300" y="390" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Time (years) →</text>

  <!-- Hare curve (before lynx) -->
  <polyline fill="none" stroke="#43a047" stroke-width="2.5"
    points="58,330 90,260 120,150 150,140 180,200 195,260 210,330 240,350 270,260 300,150 330,140 375,200 405,260 435,330 465,350 495,260 525,150 565,140"
    stroke-linejoin="round"/>

  <!-- Lynx curve (lagged) -->
  <polyline fill="none" stroke="#e53935" stroke-width="2.5"
    points="58,340 105,330 135,280 165,210 195,200 225,210 240,260 255,330 285,350 315,280 345,210 375,200 405,200 435,260 450,330 480,350 510,280 540,210 565,200"
    stroke-linejoin="round"/>

  <!-- Vertical dashed lines for phases -->
  <line x1="120" y1="60" x2="120" y2="360" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="195" y1="60" x2="195" y2="360" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="300" y1="60" x2="300" y2="360" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="405" y1="60" x2="405" y2="360" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Phase labels -->
  <text x="105" y="80" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Hare ↑</text>
  <text x="105" y="92" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Lynx low</text>

  <text x="195" y="80" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Lynx ↑</text>
  <text x="195" y="92" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Hare ↓</text>

  <text x="300" y="80" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Hare crash</text>
  <text x="300" y="92" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Lynx crash</text>

  <text x="405" y="80" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Hare ↑</text>
  <text x="405" y="92" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Cycle repeats</text>

  <!-- Legend -->
  <rect x="430" y="320" width="135" height="35" rx="4" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
  <line x1="440" y1="333" x2="465" y2="333" stroke="#43a047" stroke-width="2.5"/>
  <text x="475" y="337" font-family="Arial" font-size="10" fill="#43a047">Hare (prey)</text>
  <line x1="440" y1="348" x2="465" y2="348" stroke="#e53935" stroke-width="2.5"/>
  <text x="475" y="352" font-family="Arial" font-size="10" fill="#e53935">Lynx (predator)</text>

  <!-- Lag annotation -->
  <text x="160" y="120" font-family="Arial" font-size="9" fill="#e53935" font-style="italic">~1-2 year lag</text>
  <line x1="160" y1="124" x2="165" y2="140" stroke="#e53935" stroke-width="1"/>

  <!-- Negative feedback loop -->
  <rect x="30" y="52" width="20" height="20" rx="3" fill="none" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="40" y="66" text-anchor="middle" font-family="Arial" font-size="18" fill="#ff8f00">↻</text>

  <!-- Oscillation label -->
  <text x="315" y="415" text-anchor="middle" font-family="Arial" font-size="10" fill="#666" font-style="italic">~10-year cycle driven by negative feedback: more hares → more lynx → fewer hares → fewer lynx → more hares</text>
</svg>