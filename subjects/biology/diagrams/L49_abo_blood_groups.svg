<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#fff"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">ABO Blood Groups — Multiple Alleles &amp; Codominance</text>

  <text x="300" y="52" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">
    Three alleles: Iᴬ (A antigen), Iᴮ (B antigen), i (no antigen) — Iᴬ and Iᴮ are codominant; both dominant over i
  </text>

  <!-- Generate icons for each blood type -->
  <!-- Type A -->
  <g transform="translate(30, 72)">
    <rect x="0" y="0" width="120" height="145" rx="8" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
    <text x="60" y="22" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">Type A</text>
    <circle cx="60" cy="70" r="35" fill="#ffebee" stroke="#e53935" stroke-width="1.5"/>
    <!-- A antigen triangles -->
    <polygon points="38,60 45,48 52,60" fill="#e53935"/>
    <polygon points="60,55 67,43 74,55" fill="#e53935"/>
    <polygon points="70,68 77,56 84,68" fill="#e53935"/>
    <text x="60" y="95" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">A antigens</text>
    <text x="60" y="116" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Genotypes: IᴬIᴬ, Iᴬi</text>
    <text x="60" y="134" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Anti-B antibodies</text>
  </g>

  <!-- Type B -->
  <g transform="translate(165, 72)">
    <rect x="0" y="0" width="120" height="145" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
    <text x="60" y="22" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">Type B</text>
    <circle cx="60" cy="70" r="35" fill="#ffebee" stroke="#e53935" stroke-width="1.5"/>
    <circle cx="42" cy="58" r="7" fill="#1565c0"/>
    <circle cx="62" cy="52" r="7" fill="#1565c0"/>
    <circle cx="78" cy="65" r="7" fill="#1565c0"/>
    <text x="60" y="95" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">B antigens (circles)</text>
    <text x="60" y="116" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Genotypes: IᴮIᴮ, Iᴮi</text>
    <text x="60" y="134" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Anti-A antibodies</text>
  </g>

  <!-- Type AB -->
  <g transform="translate(300, 72)">
    <rect x="0" y="0" width="120" height="145" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
    <text x="60" y="22" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#6a1b9a">Type AB</text>
    <circle cx="60" cy="70" r="35" fill="#ffebee" stroke="#e53935" stroke-width="1.5"/>
    <polygon points="35,60 42,48 49,60" fill="#e53935"/>
    <circle cx="60" cy="55" r="7" fill="#1565c0"/>
    <polygon points="70,70 77,58 84,70" fill="#e53935"/>
    <circle cx="48" cy="72" r="7" fill="#1565c0"/>
    <text x="60" y="95" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">A + B antigens</text>
    <text x="60" y="116" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Genotype: IᴬIᴮ</text>
    <text x="60" y="134" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">No antibodies</text>
  </g>

  <!-- Type O -->
  <g transform="translate(435, 72)">
    <rect x="0" y="0" width="120" height="145" rx="8" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
    <text x="60" y="22" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e53935">Type O</text>
    <circle cx="60" cy="70" r="35" fill="#fafafa" stroke="#999" stroke-width="1.5"/>
    <text x="60" y="75" text-anchor="middle" font-family="Arial" font-size="11" fill="#999">no antigens</text>
    <text x="60" y="116" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Genotype: ii</text>
    <text x="60" y="134" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Anti-A + Anti-B</text>
  </g>

  <!-- Summary table below -->
  <rect x="30" y="232" width="540" height="130" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>

  <g transform="translate(30, 232)">
    <line x1="0" y1="28" x2="540" y2="28" stroke="#ddd" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="130" stroke="#ddd" stroke-width="1"/>
    <line x1="320" y1="28" x2="320" y2="130" stroke="#ddd" stroke-width="1"/>
    <line x1="420" y1="28" x2="420" y2="130" stroke="#ddd" stroke-width="1"/>

    <text x="80" y="18" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">Blood Type</text>
    <text x="240" y="18" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">Can Receive From</text>
    <text x="370" y="18" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">Can Donate To</text>
    <text x="480" y="18" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">Key Role</text>

    <text x="80" y="48" text-anchor="middle" font-family="Arial" font-size="12" fill="#1a6b3c">A</text>
    <text x="240" y="48" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">A, O</text>
    <text x="370" y="48" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">A, AB</text>
    <text x="480" y="48" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">—</text>

    <text x="80" y="73" text-anchor="middle" font-family="Arial" font-size="12" fill="#1565c0">B</text>
    <text x="240" y="73" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">B, O</text>
    <text x="370" y="73" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">B, AB</text>
    <text x="480" y="73" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">—</text>

    <text x="80" y="98" text-anchor="middle" font-family="Arial" font-size="12" fill="#6a1b9a">AB</text>
    <text x="240" y="98" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">A, B, AB, O</text>
    <text x="370" y="98" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">AB only</text>
    <text x="480" y="98" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c" font-weight="bold">Universal Recipient</text>

    <text x="80" y="123" text-anchor="middle" font-family="Arial" font-size="12" fill="#e53935">O</text>
    <text x="240" y="123" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">O only</text>
    <text x="370" y="123" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">A, B, AB, O</text>
    <text x="480" y="123" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">Universal Donor</text>
  </g>
</svg>
