<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#fff"/>
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#333">Keystone Species: Sea Otter → Urchin → Kelp Trophic Cascade</text>
  <text x="300" y="45" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Keystone species have disproportionate ecological impact relative to their abundance</text>
  <!-- With sea otters -->
  <rect x="20" y="65" width="270" height="300" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="155" y="90" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">WITH Sea Otters (Healthy)</text>
  <!-- Otter -->
  <ellipse cx="140" cy="130" rx="20" ry="14" fill="#8d6e63" stroke="#333" stroke-width="2"/>
  <text x="140" y="134" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#fff">OTTER</text>
  <text x="200" y="130" font-family="Arial" font-size="9" fill="#333">Sea otters abundant</text>
  <text x="200" y="145" font-family="Arial" font-size="9" fill="#333">Eat sea urchins</text>
  <!-- Down arrow -->
  <line x1="140" y1="145" x2="140" y2="165" stroke="#e53935" stroke-width="2"/>
  <text x="155" y="160" font-family="Arial" font-size="8" fill="#e53935">controls</text>
  <!-- Urchins -->
  <circle cx="140" cy="180" r="10" fill="#9c27b0" stroke="#333" stroke-width="1.5"/>
  <text x="140" y="183" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">URCHINS</text>
  <text x="200" y="180" font-family="Arial" font-size="9" fill="#333">Urchins few</text>
  <text x="200" y="195" font-family="Arial" font-size="9" fill="#333">Small population</text>
  <!-- Down arrow -->
  <line x1="140" y1="191" x2="140" y2="210" stroke="#1565c0" stroke-width="2"/>
  <text x="155" y="206" font-family="Arial" font-size="8" fill="#1565c0">allows</text>
  <!-- Kelp -->
  <rect x="80" y="218" width="120" height="80" rx="5" fill="#81c784" stroke="#333" stroke-width="1.5"/>
  <text x="140" y="250" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">KELP FOREST</text>
  <text x="140" y="268" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Thriving</text>
  <text x="140" y="285" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">High biodiversity</text>
  <text x="140" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Fish, invertebrates</text>
  <!-- Without sea otters -->
  <rect x="310" y="65" width="270" height="300" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="445" y="90" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#c62828">WITHOUT Sea Otters (Collapse)</text>
  <!-- Otter -->
  <ellipse cx="430" cy="130" rx="20" ry="14" fill="#bdbdbd" stroke="#999" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="430" y="134" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">OTTER</text>
  <text x="490" y="130" font-family="Arial" font-size="9" fill="#c62828">Sea otters hunted</text>
  <text x="490" y="145" font-family="Arial" font-size="9" fill="#c62828">to near extinction</text>
  <!-- No control -->
  <line x1="430" y1="145" x2="430" y2="165" stroke="#999" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="455" y="160" font-family="Arial" font-size="8" fill="#999">no control</text>
  <!-- Urchins -->
  <circle cx="410" cy="180" r="10" fill="#9c27b0" stroke="#333" stroke-width="1.5"/>
  <circle cx="430" cy="175" r="10" fill="#9c27b0" stroke="#333" stroke-width="1.5"/>
  <circle cx="450" cy="180" r="10" fill="#9c27b0" stroke="#333" stroke-width="1.5"/>
  <circle cx="420" cy="190" r="10" fill="#9c27b0" stroke="#333" stroke-width="1.5"/>
  <circle cx="440" cy="190" r="10" fill="#9c27b0" stroke="#333" stroke-width="1.5"/>
  <text x="490" y="185" font-family="Arial" font-size="9" fill="#c62828" font-weight="bold">URCHIN EXPLOSION</text>
  <!-- Down arrow -->
  <line x1="430" y1="200" x2="430" y2="220" stroke="#e53935" stroke-width="2"/>
  <text x="455" y="215" font-family="Arial" font-size="8" fill="#e53935">destroys</text>
  <!-- Kelp barren -->
  <rect x="370" y="228" width="120" height="70" rx="5" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <text x="430" y="255" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#666">URCHIN BARREN</text>
  <text x="430" y="273" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">No kelp</text>
  <text x="430" y="288" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Low biodiversity</text>
  <!-- Bottom -->
  <rect x="40" y="378" width="520" height="18" rx="5" fill="#ff8f00" opacity="0.15"/>
  <text x="300" y="392" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Trophic cascade: removal of top predator (keystone) → urchin overpopulation → kelp forest destruction → ecosystem collapse</text>
</svg>