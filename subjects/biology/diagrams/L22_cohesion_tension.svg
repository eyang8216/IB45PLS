<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 580" width="600" height="580">
  <rect width="600" height="580" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Xylem — Cohesion-Tension Theory</text>

  <!-- Tree -->
  <rect x="50" y="55" width="20" height="380" fill="#8d6e63" stroke="#5d4037" stroke-width="1"/>
  <!-- Branches -->
  <line x1="60" y1="80" x2="100" y2="55" stroke="#8d6e63" stroke-width="4"/>
  <line x1="60" y1="100" x2="30" y2="70" stroke="#8d6e63" stroke-width="3"/>
  <line x1="60" y1="70" x2="90" y2="40" stroke="#8d6e63" stroke-width="3"/>

  <!-- Leaf -->
  <ellipse cx="90" cy="40" rx="30" ry="15" fill="#a5d6a7" stroke="#1a6b3c" stroke-width="1.5"/>
  <ellipse cx="30" cy="70" rx="25" ry="12" fill="#a5d6a7" stroke="#1a6b3c" stroke-width="1.5"/>
  <ellipse cx="100" cy="55" rx="20" ry="10" fill="#a5d6a7" stroke="#1a6b3c" stroke-width="1.5"/>

  <!-- Transpiration arrow -->
  <text x="90" y="22" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">TRANSPIRATION</text>
  <text x="90" y="33" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Water evaporates</text>
  <text x="90" y="44" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">from leaves</text>

  <!-- Roots -->
  <line x1="60" y1="435" x2="30" y2="470" stroke="#8d6e63" stroke-width="3"/>
  <line x1="60" y1="435" x2="60" y2="475" stroke="#8d6e63" stroke-width="3"/>
  <line x1="60" y1="435" x2="90" y2="470" stroke="#8d6e63" stroke-width="3"/>
  <text x="60" y="495" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Water enters</text>
  <text x="60" y="507" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">by osmosis</text>

  <!-- Water column in xylem -->
  <line x1="60" y1="65" x2="60" y2="435" stroke="#42a5f5" stroke-width="4" stroke-dasharray="2,2"/>

  <!-- Cohesion detail -->
  <rect x="130" y="55" width="440" height="250" rx="6" fill="#fafafa" stroke="#333" stroke-width="1"/>
  <text x="350" y="78" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Three Components of Cohesion-Tension</text>

  <!-- 1. Transpiration -->
  <rect x="145" y="92" width="410" height="55" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="160" y="112" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">1. Transpiration (Driving Force)</text>
  <text x="160" y="130" font-family="Arial" font-size="9" fill="#333">Water evaporates from moist mesophyll cell walls → diffuses out through stomata → creates negative pressure (tension) at top of xylem</text>

  <!-- 2. Cohesion -->
  <rect x="145" y="155" width="410" height="55" rx="4" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="160" y="175" font-family="Arial" font-size="11" font-weight="bold" fill="#1a6b3c">2. Cohesion (Water sticks to water)</text>
  <text x="160" y="193" font-family="Arial" font-size="9" fill="#333">H₂O molecules held by H-bonds → continuous unbroken water column from roots to leaves → tension transmitted along entire column</text>

  <!-- 3. Adhesion -->
  <rect x="145" y="218" width="410" height="55" rx="4" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="160" y="238" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">3. Adhesion (Water sticks to walls)</text>
  <text x="160" y="256" font-family="Arial" font-size="9" fill="#333">H₂O molecules adhere to hydrophilic cellulose + lignin of xylem walls → counteracts gravity, prevents column breakage</text>

  <!-- Xylem cell structure -->
  <rect x="130" y="320" width="440" height="110" rx="6" fill="#fafafa" stroke="#333" stroke-width="1"/>
  <text x="350" y="343" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Xylem Cell Types</text>
  <text x="145" y="365" font-family="Arial" font-size="10" fill="#333">Tracheids: long, tapered, dead at maturity, lignified, water moves between via pits</text>
  <text x="145" y="385" font-family="Arial" font-size="10" fill="#333">Vessel elements: wider, shorter, end walls broken down (perforation plates) → continuous tubes</text>
  <text x="145" y="405" font-family="Arial" font-size="10" fill="#333">Both: dead, hollow, lignified → Lignin provides rigidity and waterproofing</text>

  <!-- Evidence box -->
  <rect x="130" y="440" width="440" height="130" rx="6" fill="#f5f5f5" stroke="#333" stroke-width="1"/>
  <text x="350" y="462" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">Evidence for Cohesion-Tension</text>
  <text x="145" y="482" font-family="Arial" font-size="9" fill="#333">1. Diurnal trunk diameter changes: trunk shrinks during day (high tension), expands at night (low tension)</text>
  <text x="145" y="498" font-family="Arial" font-size="9" fill="#333">2. Audible cavitation (clicks) when water column breaks under tension</text>
  <text x="145" y="514" font-family="Arial" font-size="9" fill="#333">3. Scholander pressure bomb: measures negative pressure in xylem directly</text>
  <text x="145" y="530" font-family="Arial" font-size="9" fill="#333">4. Dye tracers: colored dyes injected at base are pulled upward through xylem</text>
  <text x="145" y="550" font-family="Arial" font-size="9" fill="#333">5. Water columns can withstand tensions up to -30 MPa — far more than needed for tallest trees</text>
</svg>