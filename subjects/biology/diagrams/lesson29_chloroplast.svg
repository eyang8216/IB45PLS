<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#fff"/>
  <text x="300" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#333">Chloroplast Structure — Cross Section</text>

  <!-- Outer envelope -->
  <ellipse cx="300" cy="210" rx="250" ry="130" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>

  <!-- Inner envelope -->
  <ellipse cx="300" cy="210" rx="235" ry="118" fill="#c8e6c9" stroke="#43a047" stroke-width="2"/>

  <!-- Grana (stacks of thylakoids) -->
  <!-- Granum 1 -->
  <rect x="120" y="140" width="60" height="8" rx="3" fill="#1a6b3c" stroke="#0d3d1e" stroke-width="1"/>
  <rect x="120" y="152" width="60" height="8" rx="3" fill="#1a6b3c" stroke="#0d3d1e" stroke-width="1"/>
  <rect x="120" y="164" width="60" height="8" rx="3" fill="#1a6b3c" stroke="#0d3d1e" stroke-width="1"/>
  <rect x="120" y="176" width="60" height="8" rx="3" fill="#1a6b3c" stroke="#0d3d1e" stroke-width="1"/>
  <rect x="120" y="188" width="60" height="8" rx="3" fill="#1a6b3c" stroke="#0d3d1e" stroke-width="1"/>
  <text x="150" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1a6b3c" font-weight="bold">Granum</text>

  <!-- Granum 2 -->
  <rect x="210" y="130" width="60" height="8" rx="3" fill="#1a6b3c" stroke="#0d3d1e" stroke-width="1"/>
  <rect x="210" y="142" width="60" height="8" rx="3" fill="#1a6b3c" stroke="#0d3d1e" stroke-width="1"/>
  <rect x="210" y="154" width="60" height="8" rx="3" fill="#1a6b3c" stroke="#0d3d1e" stroke-width="1"/>
  <rect x="210" y="166" width="60" height="8" rx="3" fill="#1a6b3c" stroke="#0d3d1e" stroke-width="1"/>
  <rect x="210" y="178" width="60" height="8" rx="3" fill="#1a6b3c" stroke="#0d3d1e" stroke-width="1"/>

  <!-- Granum 3 -->
  <rect x="330" y="140" width="60" height="8" rx="3" fill="#1a6b3c" stroke="#0d3d1e" stroke-width="1"/>
  <rect x="330" y="152" width="60" height="8" rx="3" fill="#1a6b3c" stroke="#0d3d1e" stroke-width="1"/>
  <rect x="330" y="164" width="60" height="8" rx="3" fill="#1a6b3c" stroke="#0d3d1e" stroke-width="1"/>
  <rect x="330" y="176" width="60" height="8" rx="3" fill="#1a6b3c" stroke="#0d3d1e" stroke-width="1"/>
  <rect x="330" y="188" width="60" height="8" rx="3" fill="#1a6b3c" stroke="#0d3d1e" stroke-width="1"/>

  <!-- Stroma thylakoid (lamellae) -->
  <line x1="180" y1="164" x2="210" y2="154" stroke="#43a047" stroke-width="2"/>
  <line x1="270" y1="164" x2="330" y2="164" stroke="#43a047" stroke-width="2"/>

  <!-- Stroma label -->
  <text x="300" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1565c0" font-weight="bold">Stroma</text>
  <text x="300" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1565c0">(Calvin Cycle, DNA, ribosomes 70S, starch grains)</text>

  <!-- Thylakoid lumen -->
  <text x="420" y="230" font-family="Arial, sans-serif" font-size="10" fill="#ff8f00" font-weight="bold">Thylakoid Lumen</text>
  <text x="420" y="244" font-family="Arial, sans-serif" font-size="9" fill="#ff8f00">(small volume → rapid H⁺ gradient)</text>

  <!-- Outer/inner membrane labels -->
  <text x="530" y="120" font-family="Arial, sans-serif" font-size="9" fill="#43a047">Outer membrane</text>
  <text x="530" y="138" font-family="Arial, sans-serif" font-size="9" fill="#43a047">Inner membrane</text>
  <line x1="510" y1="118" x2="470" y2="145" stroke="#43a047" stroke-width="0.5"/>
  <line x1="510" y1="136" x2="480" y2="155" stroke="#43a047" stroke-width="0.5"/>

  <!-- Inset: single thylakoid with PSII/PSI -->
  <rect x="30" y="310" width="540" height="85" rx="6" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333" font-weight="bold">Thylakoid Membrane — Photosystems Embedded</text>

  <rect x="40" y="345" width="500" height="14" rx="3" fill="#1a6b3c" opacity="0.3"/>
  <ellipse cx="120" cy="352" rx="30" ry="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="120" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1565c0">PSII (P680)</text>
  <ellipse cx="300" cy="352" rx="25" ry="10" fill="#fff9c4" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="300" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ff8f00">Cyt b6f</text>
  <ellipse cx="460" cy="352" rx="30" ry="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="460" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1565c0">PSI (P700)</text>
  <ellipse cx="520" cy="352" rx="20" ry="8" fill="#c8e6c9" stroke="#43a047" stroke-width="1.5"/>
  <text x="520" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#43a047">ATPase</text>

  <text x="300" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Photosystems I &amp; II, Cytochrome b6f, and ATP synthase are all embedded in the thylakoid membrane</text>
</svg>
