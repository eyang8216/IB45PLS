<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" width="600" height="480">
  <rect width="600" height="480" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Climate Change Mitigation Strategies</text>

  <!-- Strategy 1: Renewables -->
  <rect x="20" y="40" width="270" height="120" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="155" y="65" text-anchor="middle" font-family="Arial" font-size="14" fill="#1a6b3c" font-weight="bold">⚡ Renewable Energy</text>
  <text x="155" y="85" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• Solar photovoltaic</text>
  <text x="155" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• Wind turbines (onshore/offshore)</text>
  <text x="155" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• Hydroelectric power</text>
  <text x="155" y="130" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• Geothermal energy</text>
  <text x="155" y="145" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• Tidal/wave energy</text>
  <text x="155" y="160" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Replaces fossil fuels → zero emissions</text>

  <!-- Strategy 2: CCS -->
  <rect x="310" y="40" width="270" height="120" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="445" y="65" text-anchor="middle" font-family="Arial" font-size="14" fill="#1565c0" font-weight="bold">🏭 Carbon Capture &amp; Storage</text>
  <text x="445" y="85" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• Capture CO₂ at power plants</text>
  <text x="445" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• Compress &amp; transport</text>
  <text x="445" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• Inject into deep geological</text>
  <text x="445" y="130" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">  formations (depleted oil/gas</text>
  <text x="445" y="145" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">  reservoirs, saline aquifers)</text>
  <text x="445" y="160" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Prevents CO₂ from reaching atmosphere</text>

  <!-- Strategy 3: Reforestation -->
  <rect x="20" y="175" width="270" height="120" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="155" y="200" text-anchor="middle" font-family="Arial" font-size="14" fill="#1a6b3c" font-weight="bold">🌳 Reforestation &amp; Afforestation</text>
  <text x="155" y="222" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• Trees absorb CO₂ via</text>
  <text x="155" y="237" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">  photosynthesis</text>
  <text x="155" y="252" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• Carbon stored in biomass</text>
  <text x="155" y="267" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">  (trunks, roots, soil)</text>
  <text x="155" y="285" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Natural carbon sink — also boosts biodiversity</text>

  <!-- Strategy 4: EVs -->
  <rect x="310" y="175" width="270" height="120" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="445" y="200" text-anchor="middle" font-family="Arial" font-size="14" fill="#1565c0" font-weight="bold">🚗 Electric Vehicles &amp; Transport</text>
  <text x="445" y="222" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• EVs: battery electric (BEV)</text>
  <text x="445" y="237" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• Public transport expansion</text>
  <text x="445" y="252" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• Cycling &amp; walking infrastructure</text>
  <text x="445" y="267" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• Hydrogen fuel cells</text>
  <text x="445" y="285" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Transport = ~15% of global emissions</text>

  <!-- Strategy 5: Energy efficiency -->
  <rect x="20" y="310" width="270" height="110" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="155" y="335" text-anchor="middle" font-family="Arial" font-size="14" fill="#e65100" font-weight="bold">💡 Energy Efficiency</text>
  <text x="155" y="357" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• LED lighting</text>
  <text x="155" y="372" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• Building insulation</text>
  <text x="155" y="387" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• Smart grids</text>
  <text x="155" y="402" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• Industrial process improvements</text>

  <!-- Strategy 6: Agriculture -->
  <rect x="310" y="310" width="270" height="110" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="445" y="335" text-anchor="middle" font-family="Arial" font-size="14" fill="#6a1b9a" font-weight="bold">🌾 Sustainable Agriculture</text>
  <text x="445" y="357" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• Reduce livestock methane</text>
  <text x="445" y="372" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• No-till farming (soil carbon)</text>
  <text x="445" y="387" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• Reduce food waste (~8% of GHG)</text>
  <text x="445" y="402" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• Plant-based diets</text>

  <!-- Bottom note -->
  <rect x="20" y="435" width="560" height="35" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="300" y="458" text-anchor="middle" font-family="Arial" font-size="11" fill="#333" font-weight="bold">Mitigation = reducing GHG emissions (vs. Adaptation = adjusting to impacts). Both needed for climate action.</text>
</svg>