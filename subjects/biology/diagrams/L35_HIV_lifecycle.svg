<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" width="600" height="480">
  <rect width="600" height="480" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">HIV Life Cycle in Host Cell</text>

  <!-- Central: Host Cell (CD4+ T cell) -->
  <rect x="130" y="55" width="340" height="240" rx="15" fill="#e3f2fd" stroke="#1565c0" stroke-width="2.5"/>
  <text x="300" y="72" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">CD4⁺ T Helper Cell</text>

  <!-- Nucleus -->
  <ellipse cx="300" cy="190" rx="50" ry="40" fill="#bbdefb" stroke="#1565c0" stroke-width="2"/>
  <text x="300" y="188" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Nucleus</text>
  <text x="300" y="202" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">(Host DNA)</text>

  <!-- Step 1: HIV binding -->
  <ellipse cx="60" cy="120" rx="25" ry="18" fill="#e53935" stroke="#b71c1c" stroke-width="2"/>
  <text x="60" y="116" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff" font-weight="bold">HIV</text>
  <text x="60" y="128" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">vRNA</text>

  <!-- CD4 + CCR5 -->
  <text x="130" y="100" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">① Binding</text>
  <!-- Receptor symbols on cell membrane -->
  <text x="145" y="118" font-family="Arial" font-size="8" fill="#1565c0">CD4</text>
  <text x="145" y="130" font-family="Arial" font-size="8" fill="#1565c0">CCR5</text>
  <line x1="85" y1="112" x2="142" y2="115" stroke="#e53935" stroke-width="1.5" marker-end="url(#arH)"/>

  <defs>
    <marker id="arH" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#e53935"/></marker>
    <marker id="arB" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#1565c0"/></marker>
  </defs>

  <!-- Step 2: Reverse Transcription -->
  <text x="180" y="100" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">② Reverse</text>
  <text x="180" y="112" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">Transcriptase</text>
  <text x="175" y="105" font-family="Arial" font-size="7" fill="#333">RNA → DNA</text>

  <!-- Step 3: Integration -->
  <text x="230" y="145" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">③ Integrase</text>
  <line x1="260" y1="155" x2="275" y2="170" stroke="#333" stroke-width="1.5" marker-end="url(#ar1)"/>
  <defs><marker id="ar1" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#333"/></marker></defs>

  <!-- Provirus DNA integrated -->
  <text x="260" y="235" font-family="Arial" font-size="8" fill="#6a1b9a">Proviral DNA integrated</text>

  <!-- Step 4: Transcription -->
  <text x="370" y="145" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">④ Transcription</text>
  <text x="372" y="157" font-family="Arial" font-size="7" fill="#333">Host RNA pol</text>
  <line x1="350" y1="175" x2="370" y2="165" stroke="#333" stroke-width="1.5"/>

  <!-- Step 5: Translation -->
  <text x="390" y="200" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">⑤ Translation</text>
  <text x="392" y="212" font-family="Arial" font-size="7" fill="#333">Polyproteins</text>

  <!-- Ribosomes -->
  <circle cx="405" cy="180" r="6" fill="none" stroke="#333" stroke-width="1"/>
  <text x="405" y="183" text-anchor="middle" font-family="Arial" font-size="6" fill="#333">Rib</text>

  <!-- Step 6: Protease -->
  <text x="460" y="95" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">⑥ Protease</text>
  <text x="462" y="107" font-family="Arial" font-size="7" fill="#333">cleaves</text>
  <text x="462" y="117" font-family="Arial" font-size="7" fill="#333">polyproteins</text>

  <!-- Step 7: Assembly -->
  <text x="470" y="155" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">⑦ Assembly</text>

  <!-- Step 8: Budding -->
  <text x="500" y="200" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">⑧ Budding</text>
  <ellipse cx="530" cy="195" rx="20" ry="14" fill="#e53935" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="530" y="192" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">HIV</text>
  <text x="530" y="203" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">particle</text>
  <line x1="480" y1="195" x2="510" y2="195" stroke="#333" stroke-width="1.5" marker-end="url(#ar1)"/>

  <!-- New HIV particles at bottom -->
  <text x="300" y="325" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e53935">New infectious HIV particles</text>

  <ellipse cx="180" cy="380" rx="22" ry="15" fill="#e53935" stroke="#b71c1c" stroke-width="2"/>
  <text x="180" y="378" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">HIV</text>

  <ellipse cx="260" cy="395" rx="22" ry="15" fill="#e53935" stroke="#b71c1c" stroke-width="2"/>
  <text x="260" y="393" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">HIV</text>

  <ellipse cx="340" cy="380" rx="22" ry="15" fill="#e53935" stroke="#b71c1c" stroke-width="2"/>
  <text x="340" y="378" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">HIV</text>

  <ellipse cx="420" cy="395" rx="22" ry="15" fill="#e53935" stroke="#b71c1c" stroke-width="2"/>
  <text x="420" y="393" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">HIV</text>

  <!-- Infect new cells arrow -->
  <text x="300" y="435" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">→ Infect new CD4⁺ T cells → immune deficiency → AIDS</text>

  <!-- Key enzymes box -->
  <rect x="15" y="310" width="185" height="155" rx="6" fill="#fff3e0" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="107" y="330" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ff8f00">Key Viral Enzymes</text>
  <text x="25" y="350" font-family="Arial" font-size="10" fill="#333">• Reverse Transcriptase</text>
  <text x="35" y="368" font-family="Arial" font-size="9" fill="#555">RNA → DNA conversion</text>
  <text x="25" y="388" font-family="Arial" font-size="10" fill="#333">• Integrase</text>
  <text x="35" y="406" font-family="Arial" font-size="9" fill="#555">Inserts DNA into host genome</text>
  <text x="25" y="426" font-family="Arial" font-size="10" fill="#333">• Protease</text>
  <text x="35" y="444" font-family="Arial" font-size="9" fill="#555">Cleaves polyproteins to mature</text>
</svg>
