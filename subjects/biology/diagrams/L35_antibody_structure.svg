<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420">
  <rect width="600" height="420" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Antibody (Immunoglobulin) Structure</text>

  <!-- Heavy chains (blue) -->
  <!-- Left heavy chain -->
  <path d="M300,330 L300,280 Q300,200 260,160 L260,120 Q260,90 240,90 Q220,90 220,120 L220,160" fill="none" stroke="#1565c0" stroke-width="7" stroke-linecap="round"/>
  <!-- Right heavy chain -->
  <path d="M300,330 L300,280 Q300,200 340,160 L340,120 Q340,90 360,90 Q380,90 380,120 L380,160" fill="none" stroke="#1565c0" stroke-width="7" stroke-linecap="round"/>

  <!-- Light chains (green) -->
  <!-- Left light chain -->
  <path d="M260,160 Q240,150 240,120 Q240,90 220,90 Q200,90 200,120 L200,160" fill="none" stroke="#43a047" stroke-width="5" stroke-linecap="round"/>
  <!-- Right light chain -->
  <path d="M340,160 Q360,150 360,120 Q360,90 380,90 Q400,90 400,120 L400,160" fill="none" stroke="#43a047" stroke-width="5" stroke-linecap="round"/>

  <!-- Disulfide bonds (yellow dashes) -->
  <!-- Hinge region -->
  <line x1="290" y1="270" x2="310" y2="270" stroke="#ff8f00" stroke-width="3" stroke-dasharray="4 3"/>
  <line x1="275" y1="280" x2="325" y2="280" stroke="#ff8f00" stroke-width="3" stroke-dasharray="4 3"/>
  <!-- Between heavy and light -->
  <line x1="248" y1="148" x2="260" y2="148" stroke="#ff8f00" stroke-width="2" stroke-dasharray="3 3"/>
  <line x1="340" y1="148" x2="352" y2="148" stroke="#ff8f00" stroke-width="2" stroke-dasharray="3 3"/>
  <!-- Lower hinge -->
  <line x1="292" y1="310" x2="308" y2="310" stroke="#ff8f00" stroke-width="3" stroke-dasharray="4 3"/>

  <!-- Fab regions shaded -->
  <rect x="195" y="70" width="210" height="120" rx="10" fill="none" stroke="#6a1b9a" stroke-width="2" stroke-dasharray="6 3" opacity="0.6"/>
  <text x="300" y="78" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">Fab Region (Variable)</text>

  <!-- Antigen binding sites -->
  <ellipse cx="220" cy="85" rx="10" ry="7" fill="#e53935" opacity="0.6" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="220" y="68" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Antigen</text>
  <line x1="220" y1="78" x2="220" y2="82" stroke="#e53935" stroke-width="1"/>

  <ellipse cx="380" cy="85" rx="10" ry="7" fill="#e53935" opacity="0.6" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="380" y="68" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Antigen</text>
  <line x1="380" y1="78" x2="380" y2="82" stroke="#e53935" stroke-width="1"/>

  <!-- Fc region -->
  <rect x="275" y="300" width="50" height="70" rx="8" fill="none" stroke="#1565c0" stroke-width="2" stroke-dasharray="6 3" opacity="0.6"/>
  <text x="300" y="390" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">Fc Region (Constant)</text>

  <!-- Complement binding -->
  <text x="300" y="406" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Complement-binding site / Macrophage receptor</text>

  <!-- Legend -->
  <rect x="420" y="40" width="165" height="115" rx="5" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="430" y="58" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Legend</text>
  <line x1="430" y1="72" x2="460" y2="72" stroke="#1565c0" stroke-width="5"/>
  <text x="465" y="76" font-family="Arial" font-size="11" fill="#333">Heavy Chain</text>
  <line x1="430" y1="92" x2="460" y2="92" stroke="#43a047" stroke-width="4"/>
  <text x="465" y="96" font-family="Arial" font-size="11" fill="#333">Light Chain</text>
  <line x1="430" y1="112" x2="460" y2="112" stroke="#ff8f00" stroke-width="3" stroke-dasharray="4 3"/>
  <text x="465" y="116" font-family="Arial" font-size="11" fill="#333">Disulfide Bond</text>

  <!-- Labels -->
  <text x="230" y="260" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Hinge</text>
  <text x="145" y="165" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">VL</text>
  <text x="455" y="165" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">VL</text>
  <text x="268" y="145" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">VH</text>
  <text x="332" y="145" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">VH</text>
  <text x="160" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">CL</text>
  <text x="440" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">CL</text>
</svg>
