<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520">
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#e53935"/></marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1565c0"/></marker>
  </defs>
  <rect width="600" height="520" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Meselson–Stahl Experiment: Semiconservative DNA Replication</text>

  <!-- Three Models row -->
  <text x="300" y="56" text-anchor="middle" font-family="Arial" font-size="13" fill="#333" font-style="italic">Three Hypothesized Models of DNA Replication (Watson &amp; Crick, 1953)</text>

  <!-- Conservative -->
  <text x="100" y="78" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Conservative</text>
  <rect x="40" y="84" width="120" height="55" rx="4" fill="#e53935" opacity="0.15" stroke="#e53935" stroke-width="1.5"/>
  <text x="100" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Old</text>
  <text x="100" y="122" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">↓ Replication ↓</text>
  <text x="100" y="134" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">1 old-old +</text>
  <text x="100" y="144" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">1 new-new</text>
  <text x="100" y="158" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">❌ Ruled out Step 2</text>

  <!-- Semiconservative -->
  <text x="300" y="78" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Semiconservative ✓</text>
  <rect x="240" y="84" width="120" height="55" rx="4" fill="#1a6b3c" opacity="0.12" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="300" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Old + New</text>
  <text x="300" y="122" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">↓ Replication ↓</text>
  <text x="300" y="134" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">2 old-new hybrids</text>
  <text x="300" y="158" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c" font-weight="bold">✅ Confirmed</text>

  <!-- Dispersive -->
  <text x="500" y="78" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Dispersive</text>
  <rect x="440" y="84" width="120" height="55" rx="4" fill="#ff8f00" opacity="0.12" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="500" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Patchwork</text>
  <text x="500" y="122" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">↓ Replication ↓</text>
  <text x="500" y="134" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00">All mixed molecules</text>
  <text x="500" y="158" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">❌ Ruled out Step 3</text>

  <!-- Gradient tubes -->
  <line x1="30" y1="220" x2="570" y2="220" stroke="#ddd" stroke-width="1"/>

  <text x="300" y="242" text-anchor="middle" font-family="Arial" font-size="13" fill="#333" font-weight="bold">CsCl Density Gradient Centrifugation Results</text>

  <!-- Tube labels -->
  <text x="150" y="268" text-anchor="middle" font-family="Arial" font-size="11" fill="#333" font-weight="bold">Generation 0</text>
  <text x="300" y="268" text-anchor="middle" font-family="Arial" font-size="11" fill="#333" font-weight="bold">Generation 1</text>
  <text x="450" y="268" text-anchor="middle" font-family="Arial" font-size="11" fill="#333" font-weight="bold">Generation 2</text>

  <text x="150" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">All ¹⁵N-¹⁵N</text>
  <text x="300" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">After 1 round in ¹⁴N</text>
  <text x="450" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">After 2 rounds in ¹⁴N</text>

  <!-- Tube 0 -->
  <rect x="125" y="294" width="50" height="130" rx="2" fill="none" stroke="#555" stroke-width="2"/>
  <rect x="125" y="294" width="50" height="130" rx="2" fill="url(#gradHeavy)" opacity="0.3"/>
  <rect x="131" y="400" width="38" height="6" rx="2" fill="#e53935" opacity="0.9"/>
  <text x="150" y="416" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Heavy</text>

  <!-- Tube 1 -->
  <rect x="275" y="294" width="50" height="130" rx="2" fill="none" stroke="#555" stroke-width="2"/>
  <rect x="281" y="363" width="38" height="6" rx="2" fill="#ff8f00" opacity="0.9"/>
  <text x="300" y="416" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff8f00">Intermediate</text>

  <!-- Tube 2 -->
  <rect x="425" y="294" width="50" height="130" rx="2" fill="none" stroke="#555" stroke-width="2"/>
  <rect x="431" y="331" width="38" height="6" rx="2" fill="#1565c0" opacity="0.9"/>
  <rect x="431" y="363" width="38" height="6" rx="2" fill="#ff8f00" opacity="0.9"/>
  <text x="450" y="416" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Light</text>
  <text x="450" y="428" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff8f00">Intermediate</text>

  <!-- Density arrow -->
  <line x1="570" y1="300" x2="570" y2="424" stroke="#333" stroke-width="2"/>
  <polygon points="566,424 570,430 574,424" fill="#333"/>
  <polygon points="566,300 570,294 574,300" fill="#333"/>
  <text x="590" y="320" font-family="Arial" font-size="9" fill="#666">Light</text>
  <text x="590" y="395" font-family="Arial" font-size="9" fill="#666">Heavy</text>

  <!-- Molecular diagrams below -->
  <text x="300" y="455" text-anchor="middle" font-family="Arial" font-size="11" fill="#333" font-weight="bold">Molecular Interpretation</text>

  <!-- Gen0: two red lines -->
  <text x="100" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">¹⁵N-¹⁵N</text>
  <line x1="50" y1="484" x2="150" y2="484" stroke="#e53935" stroke-width="3"/>
  <line x1="50" y1="490" x2="150" y2="490" stroke="#e53935" stroke-width="3"/>

  <!-- Gen1: red + blue -->
  <text x="300" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">¹⁵N-¹⁴N (×2)</text>
  <line x1="250" y1="484" x2="350" y2="484" stroke="#e53935" stroke-width="3"/>
  <line x1="250" y1="490" x2="350" y2="490" stroke="#1565c0" stroke-width="3"/>

  <!-- Gen2: red+blue + blue+blue -->
  <text x="500" y="478" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">¹⁵N-¹⁴N + ¹⁴N-¹⁴N</text>
  <line x1="450" y1="484" x2="550" y2="484" stroke="#e53935" stroke-width="3"/>
  <line x1="450" y1="490" x2="550" y2="490" stroke="#1565c0" stroke-width="3"/>
  <line x1="465" y1="498" x2="550" y2="498" stroke="#1565c0" stroke-width="3"/>
  <line x1="465" y1="504" x2="550" y2="504" stroke="#1565c0" stroke-width="3"/>

  <!-- Legend -->
  <line x1="50" y1="503" x2="80" y2="503" stroke="#e53935" stroke-width="3"/>
  <text x="86" y="506" font-family="Arial" font-size="9" fill="#333">¹⁵N (heavy)</text>
  <line x1="160" y1="503" x2="190" y2="503" stroke="#1565c0" stroke-width="3"/>
  <text x="196" y="506" font-family="Arial" font-size="9" fill="#333">¹⁴N (light)</text>
</svg>
