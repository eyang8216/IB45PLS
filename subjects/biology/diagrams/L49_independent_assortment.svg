<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect width="600" height="360" fill="#fff"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Law of Independent Assortment — Metaphase I</text>

  <!-- Orientation 1 -->
  <text x="170" y="60" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">Orientation 1</text>

  <!-- Metaphase plate -->
  <line x1="40" y1="145" x2="300" y2="145" stroke="#ddd" stroke-width="6" stroke-dasharray="8,4"/>

  <!-- Chr 1 pair -->
  <rect x="70" y="100" width="30" height="10" rx="3" fill="#e53935"/>
  <circle cx="83" cy="105" r="2.5" fill="#333"/>
  <text x="85" y="98" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">A</text>
  <rect x="70" y="130" width="30" height="10" rx="3" fill="#e53935"/>
  <circle cx="83" cy="135" r="2.5" fill="#333"/>
  <text x="85" y="155" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">a</text>

  <!-- Chr 2 pair -->
  <rect x="190" y="100" width="30" height="10" rx="3" fill="#1565c0"/>
  <circle cx="203" cy="105" r="2.5" fill="#333"/>
  <text x="205" y="98" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">B</text>
  <rect x="190" y="130" width="30" height="10" rx="3" fill="#1565c0"/>
  <circle cx="203" cy="135" r="2.5" fill="#333"/>
  <text x="205" y="155" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">b</text>

  <text x="170" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Both maternal on same side</text>

  <!-- Resulting gametes for Orientation 1 -->
  <text x="170" y="205" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">→ Gametes: AB, ab</text>

  <!-- Orientation 2 -->
  <text x="430" y="60" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#6a1b9a">Orientation 2</text>

  <line x1="300" y1="145" x2="560" y2="145" stroke="#ddd" stroke-width="6" stroke-dasharray="8,4"/>

  <rect x="330" y="100" width="30" height="10" rx="3" fill="#e53935"/>
  <circle cx="343" cy="105" r="2.5" fill="#333"/>
  <text x="345" y="98" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">A</text>
  <rect x="330" y="130" width="30" height="10" rx="3" fill="#e53935"/>
  <circle cx="343" cy="135" r="2.5" fill="#333"/>
  <text x="345" y="155" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">a</text>

  <rect x="450" y="100" width="30" height="10" rx="3" fill="#1565c0"/>
  <circle cx="463" cy="105" r="2.5" fill="#333"/>
  <text x="465" y="98" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">b</text>
  <rect x="450" y="130" width="30" height="10" rx="3" fill="#1565c0"/>
  <circle cx="463" cy="135" r="2.5" fill="#333"/>
  <text x="465" y="155" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">B</text>

  <text x="430" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Maternal 1 &amp; paternal 2 on same side</text>

  <text x="430" y="205" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">→ Gametes: Ab, aB</text>

  <!-- Key insight -->
  <rect x="40" y="235" width="520" height="110" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1"/>
  <text x="300" y="260" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#6a1b9a">Key Insight: 2ⁿ possible gamete combinations</text>
  <text x="300" y="285" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">where n = number of chromosome pairs (humans: 2²³ ≈ 8.4 million)</text>
  <text x="300" y="310" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">Each bivalent aligns randomly — orientation of one pair is</text>
  <text x="300" y="332" text-anchor="middle" font-family="Arial" font-size="13" fill="#333"><tspan font-weight="bold">independent</tspan> of all others → 4 equally probable gamete types (AB, Ab, aB, ab)</text>
</svg>
