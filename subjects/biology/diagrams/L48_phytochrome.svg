<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" width="600" height="440">
  <rect width="600" height="440" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Phytochrome System — Pr ⇄ Pfr Photoreceptor</text>

  <!-- Pr box -->
  <rect x="60" y="80" width="180" height="120" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
  <text x="150" y="108" text-anchor="middle" font-family="Arial" font-size="16" fill="#1565c0" font-weight="bold">P<sub>r</sub></text>
  <text x="150" y="128" text-anchor="middle" font-family="Arial" font-size="11" fill="#1565c0">Phytochrome Red</text>
  <text x="150" y="148" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Inactive form</text>
  <text x="150" y="165" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Absorbs RED (660 nm)</text>
  <text x="150" y="185" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Accumulates in dark</text>

  <!-- Pfr box -->
  <rect x="360" y="80" width="180" height="120" rx="10" fill="#fce4ec" stroke="#e53935" stroke-width="3"/>
  <text x="450" y="108" text-anchor="middle" font-family="Arial" font-size="16" fill="#e53935" font-weight="bold">P<sub>fr</sub></text>
  <text x="450" y="128" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935">Phytochrome Far-Red</text>
  <text x="450" y="148" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Active form</text>
  <text x="450" y="165" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Absorbs FAR-RED (730 nm)</text>
  <text x="450" y="185" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Triggers flowering in LDP</text>

  <!-- RED arrow Pr → Pfr -->
  <line x1="240" y1="110" x2="355" y2="110" stroke="#e53935" stroke-width="3" marker-end="url(#arrowR)"/>
  <text x="297" y="100" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935" font-weight="bold">RED LIGHT</text>
  <text x="297" y="88" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">660 nm</text>
  <text x="297" y="76" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">→ Conversion →</text>

  <!-- FAR-RED arrow Pfr → Pr -->
  <line x1="355" y1="155" x2="240" y2="155" stroke="#9c27b0" stroke-width="3" marker-end="url(#arrowFR)"/>
  <text x="297" y="172" text-anchor="middle" font-family="Arial" font-size="11" fill="#9c27b0" font-weight="bold">FAR-RED LIGHT</text>
  <text x="297" y="184" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0">730 nm</text>
  <text x="297" y="196" text-anchor="middle" font-family="Arial" font-size="10" fill="#9c27b0" font-weight="bold">← Conversion ←</text>

  <!-- Dark reversion -->
  <path d="M360,200 Q297,230 240,205" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowD)"/>
  <text x="297" y="235" text-anchor="middle" font-family="Arial" font-size="10" fill="#666" font-weight="bold">DARK REVERSION</text>
  <text x="297" y="248" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Pfr → Pr (slow, spontaneous)</text>

  <!-- Spectrum visualization -->
  <rect x="60" y="280" width="480" height="110" rx="6" fill="#fafafa" stroke="#ccc" stroke-width="1.5"/>
  <text x="300" y="300" text-anchor="middle" font-family="Arial" font-size="12" fill="#333" font-weight="bold">Absorption Spectrum</text>

  <!-- Spectrum bar -->
  <rect x="80" y="315" width="440" height="20" rx="3" fill="url(#spectrumGrad)"/>

  <!-- Pr absorption peak -->
  <path d="M200,315 Q200,290 200,315" fill="none" stroke="#1565c0" stroke-width="3"/>
  <text x="200" y="352" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0" font-weight="bold">Pr peak</text>
  <text x="200" y="365" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">660 nm (red)</text>

  <!-- Pfr absorption peak -->
  <path d="M400,315 Q400,290 400,315" fill="none" stroke="#e53935" stroke-width="3"/>
  <text x="400" y="352" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">Pfr peak</text>
  <text x="400" y="365" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">730 nm (far-red)</text>

  <!-- Wavelength labels -->
  <text x="100" y="340" font-family="Arial" font-size="8" fill="#555">400</text>
  <text x="200" y="340" font-family="Arial" font-size="8" fill="#555">500</text>
  <text x="300" y="340" font-family="Arial" font-size="8" fill="#555">600</text>
  <text x="400" y="340" font-family="Arial" font-size="8" fill="#555">700</text>
  <text x="500" y="340" font-family="Arial" font-size="8" fill="#555">800</text>

  <!-- Summary -->
  <rect x="50" y="395" width="500" height="35" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="300" y="417" text-anchor="middle" font-family="Arial" font-size="11" fill="#333" font-weight="bold">Pr ⇄ Pfr is a reversible switch: Red converts Pr→Pfr; Far-red converts Pfr→Pr; Dark slowly reverts Pfr→Pr</text>

  <defs>
    <marker id="arrowR" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#e53935"/></marker>
    <marker id="arrowFR" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#9c27b0"/></marker>
    <marker id="arrowD" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#666"/></marker>
    <linearGradient id="spectrumGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="25%" stop-color="#1565c0"/>
      <stop offset="50%" stop-color="#43a047"/>
      <stop offset="70%" stop-color="#ff8f00"/>
      <stop offset="100%" stop-color="#e53935"/>
    </linearGradient>
  </defs>
</svg>