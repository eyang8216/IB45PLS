<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" width="600" height="520">
  <rect width="600" height="520" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Spermatogenesis in the Seminiferous Tubule</text>

  <!-- Spermatogonium -->
  <circle cx="60" cy="290" r="18" fill="#81c784" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="60" y="324" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Spermatogonium</text>
  <text x="60" y="338" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(2n)</text>

  <!-- Mitosis arrow -->
  <line x1="78" y1="290" x2="112" y2="290" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="95" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c" font-weight="bold">Mitosis</text>

  <!-- Primary Spermatocyte -->
  <circle cx="140" cy="290" r="18" fill="#43a047" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="140" y="324" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Primary</text>
  <text x="140" y="338" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Spermatocyte</text>

  <!-- Meiosis I arrow -->
  <line x1="158" y1="290" x2="197" y2="265" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="158" y1="290" x2="197" y2="315" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="185" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">Meiosis I</text>

  <!-- 2 Secondary Spermatocytes -->
  <circle cx="225" cy="250" r="16" fill="#81c784" stroke="#1565c0" stroke-width="2.5"/>
  <circle cx="225" cy="330" r="16" fill="#81c784" stroke="#1565c0" stroke-width="2.5"/>
  <text x="225" y="220" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">2 Secondary</text>
  <text x="225" y="232" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Spermatocytes</text>
  <text x="225" y="245" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(n)</text>

  <!-- Meiosis II arrows -->
  <line x1="241" y1="240" x2="280" y2="225" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="241" y1="260" x2="280" y2="240" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="241" y1="320" x2="280" y2="310" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="241" y1="340" x2="280" y2="325" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="268" y="282" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">Meiosis II</text>

  <!-- 4 Spermatids -->
  <circle cx="310" cy="210" r="12" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="2"/>
  <circle cx="310" cy="238" r="12" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="2"/>
  <circle cx="310" cy="298" r="12" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="2"/>
  <circle cx="310" cy="326" r="12" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="310" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">4 Spermatids</text>
  <text x="310" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(n)</text>

  <!-- Differentiation arrow -->
  <line x1="322" y1="255" x2="362" y2="255" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="342" y="248" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00" font-weight="bold">Differentiation</text>

  <!-- 4 Spermatozoa -->
  <g transform="translate(390,210)">
    <ellipse cx="0" cy="6" rx="6" ry="4" fill="#43a047" stroke="#1a6b3c" stroke-width="1.5"/>
    <line x1="-14" y1="6" x2="0" y2="6" stroke="#1a6b3c" stroke-width="1.5"/>
    <line x1="-14" y1="6" x2="-18" y2="1" stroke="#1a6b3c" stroke-width="0.8"/>
    <line x1="-14" y1="6" x2="-18" y2="11" stroke="#1a6b3c" stroke-width="0.8"/>
  </g>
  <g transform="translate(390,238)">
    <ellipse cx="0" cy="6" rx="6" ry="4" fill="#43a047" stroke="#1a6b3c" stroke-width="1.5"/>
    <line x1="-14" y1="6" x2="0" y2="6" stroke="#1a6b3c" stroke-width="1.5"/>
    <line x1="-14" y1="6" x2="-18" y2="1" stroke="#1a6b3c" stroke-width="0.8"/>
    <line x1="-14" y1="6" x2="-18" y2="11" stroke="#1a6b3c" stroke-width="0.8"/>
  </g>
  <g transform="translate(390,298)">
    <ellipse cx="0" cy="6" rx="6" ry="4" fill="#43a047" stroke="#1a6b3c" stroke-width="1.5"/>
    <line x1="-14" y1="6" x2="0" y2="6" stroke="#1a6b3c" stroke-width="1.5"/>
    <line x1="-14" y1="6" x2="-18" y2="1" stroke="#1a6b3c" stroke-width="0.8"/>
    <line x1="-14" y1="6" x2="-18" y2="11" stroke="#1a6b3c" stroke-width="0.8"/>
  </g>
  <g transform="translate(390,326)">
    <ellipse cx="0" cy="6" rx="6" ry="4" fill="#43a047" stroke="#1a6b3c" stroke-width="1.5"/>
    <line x1="-14" y1="6" x2="0" y2="6" stroke="#1a6b3c" stroke-width="1.5"/>
    <line x1="-14" y1="6" x2="-18" y2="1" stroke="#1a6b3c" stroke-width="0.8"/>
    <line x1="-14" y1="6" x2="-18" y2="11" stroke="#1a6b3c" stroke-width="0.8"/>
  </g>
  <text x="440" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">4 Spermatozoa</text>
  <text x="440" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(n) Mature sperm</text>

  <!-- Seminiferous tubule wall -->
  <rect x="20" y="360" width="560" height="150" rx="10" fill="none" stroke="#1565c0" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="300" y="380" text-anchor="middle" font-family="Arial" font-size="12" fill="#1565c0" font-weight="bold">Cross-section of Seminiferous Tubule</text>

  <!-- Sertoli cell -->
  <ellipse cx="180" cy="435" rx="50" ry="18" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="180" y="438" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Sertoli (nurse) cell</text>

  <!-- Leydig cells -->
  <ellipse cx="80" cy="488" rx="22" ry="10" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="80" y="491" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff8f00">Leydig cell</text>
  <ellipse cx="140" cy="488" rx="22" ry="10" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="140" y="491" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff8f00">Leydig cell</text>
  <text x="110" y="505" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff8f00">(produces testosterone)</text>

  <!-- Lumen -->
  <rect x="310" y="420" width="240" height="60" rx="8" fill="#f1f8e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="430" y="448" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a6b3c">Lumen</text>
  <text x="430" y="463" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">(mature sperm released)</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>
</svg>