<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect width="600" height="360" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Countercurrent Heat Exchange — Conserving Core Temperature</text>

  <!-- Limb outline -->
  <rect x="180" y="50" width="240" height="280" rx="15" fill="none" stroke="#ddd" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="300" y="340" text-anchor="end" font-family="Arial" font-size="10" fill="#888">Body core →</text>
  <text x="300" y="340" text-anchor="start" font-family="Arial" font-size="10" fill="#888">Extremity →</text>

  <!-- Artery -->
  <path d="M220,60 C220,160 200,220 220,300" fill="none" stroke="#e53935" stroke-width="8" stroke-linecap="round"/>
  <text x="180" y="105" text-anchor="end" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">Artery</text>
  <text x="180" y="120" text-anchor="end" font-family="Arial" font-size="9" fill="#888">(warm blood</text>
  <text x="180" y="133" text-anchor="end" font-family="Arial" font-size="9" fill="#888">from core)</text>

  <!-- Vein -->
  <path d="M260,60 C260,160 280,220 260,300" fill="none" stroke="#1565c0" stroke-width="8" stroke-linecap="round"/>
  <text x="340" y="105" text-anchor="start" font-family="Arial" font-size="10" fill="#1565c0" font-weight="bold">Vein</text>
  <text x="340" y="120" text-anchor="start" font-family="Arial" font-size="9" fill="#888">(cool blood</text>
  <text x="340" y="133" text-anchor="start" font-family="Arial" font-size="9" fill="#888">to core)</text>

  <!-- Heat transfer arrows -->
  <g transform="translate(0,0)">
    <line x1="228" y1="100" x2="248" y2="100" stroke="#ff8f00" stroke-width="2"/>
    <polygon points="248,100 242,95 242,105" fill="#ff8f00"/>
    <text x="238" y="95" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff8f00">heat</text>

    <line x1="228" y1="135" x2="248" y2="135" stroke="#ff8f00" stroke-width="2"/>
    <polygon points="248,135 242,130 242,140" fill="#ff8f00"/>
    <text x="238" y="130" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff8f00">heat</text>

    <line x1="228" y1="170" x2="248" y2="170" stroke="#ff8f00" stroke-width="2"/>
    <polygon points="248,170 242,165 242,175" fill="#ff8f00"/>
    <text x="238" y="165" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff8f00">heat</text>

    <line x1="228" y1="205" x2="248" y2="205" stroke="#ff8f00" stroke-width="2"/>
    <polygon points="248,205 242,200 242,210" fill="#ff8f00"/>

    <line x1="228" y1="240" x2="248" y2="240" stroke="#ff8f00" stroke-width="2"/>
    <polygon points="248,240 242,235 242,245" fill="#ff8f00"/>
  </g>

  <!-- Temperature gradient labels -->
  <text x="195" y="75" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">37°C</text>
  <text x="195" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#b71c1c">~15°C</text>
  <text x="275" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">~20°C</text>
  <text x="275" y="75" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">~35°C</text>

  <!-- Key point -->
  <rect x="30" y="55" width="135" height="135" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="97" y="75" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Key Point:</text>
  <text x="97" y="95" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Arterial blood warms</text>
  <text x="97" y="110" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">venous return before</text>
  <text x="97" y="125" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">reaching extremity</text>
  <text x="97" y="145" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">→ Extremity can be</text>
  <text x="97" y="160" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">much cooler than core</text>
  <text x="97" y="180" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">→ Less heat loss</text>

  <rect x="420" y="55" width="150" height="135" rx="8" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="1"/>
  <text x="495" y="75" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">Examples:</text>
  <text x="495" y="95" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Arctic fox legs</text>
  <text x="495" y="112" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Penguin feet/flippers</text>
  <text x="495" y="129" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Whale flippers/tail</text>
  <text x="495" y="146" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Dolphin dorsal fin</text>
  <text x="495" y="170" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">All endotherms in</text>
  <text x="495" y="185" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">cold environments</text>
</svg>
