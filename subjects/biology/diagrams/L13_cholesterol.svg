<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" width="600" height="480">
  <defs><style>text { font-family: Arial, sans-serif; } .title { font-size: 18px; font-weight: bold; fill: #1a6b3c; text-anchor: middle; } .lab { font-size: 13px; fill: #333; text-anchor: middle; } .sm { font-size: 11px; fill: #555; text-anchor: middle; }</style></defs>
  <rect width="600" height="480" fill="#fff"/>
  <text x="300" y="28" class="title">Cholesterol — Steroid Structure &amp; Dual Roles</text>

  <!-- Cholesterol molecule - 4 fused rings -->
  <g transform="translate(80, 50)">
    <!-- Ring A -->
    <polygon points="60,100 60,40 120,40 120,100" fill="#fff9c4" stroke="#333" stroke-width="2.5"/>
    <text x="90" y="75" class="sm" font-weight="bold">A</text>
    <!-- Ring B -->
    <polygon points="120,100 120,55 175,55 175,100" fill="#fff9c4" stroke="#333" stroke-width="2.5"/>
    <text x="147" y="82" class="sm" font-weight="bold">B</text>
    <!-- Ring C -->
    <polygon points="175,100 175,70 225,70 225,100" fill="#fff9c4" stroke="#333" stroke-width="2.5"/>
    <text x="200" y="90" class="sm" font-weight="bold">C</text>
    <!-- Ring D (5-membered) -->
    <polygon points="225,100 225,85 255,70 270,85 270,100" fill="#fff9c4" stroke="#333" stroke-width="2.5"/>
    <text x="250" y="93" class="sm" font-weight="bold">D</text>

    <!-- -OH on ring A -->
    <line x1="60" y1="70" x2="35" y2="70" stroke="#333" stroke-width="2"/>
    <text x="20" y="70" class="sm" fill="#e53935" font-weight="bold">—OH</text>
    <text x="20" y="83" class="sm" fill="#e53935">(polar)</text>

    <!-- Hydrocarbon tail -->
    <polyline points="270,85 290,75 305,90 320,80 335,95 350,85" fill="none" stroke="#333" stroke-width="2"/>
    <text x="330" y="115" class="sm">Hydrocarbon tail</text>
    <text x="330" y="128" class="sm">(hydrophobic)</text>
  </g>

  <!-- Roles -->
  <text x="300" y="240" class="lab" fill="#1565c0" font-weight="bold">Dual Roles of Cholesterol</text>

  <!-- Role 1 -->
  <rect x="20" y="258" width="270" height="80" rx="6" fill="#e8f5e9" stroke="#81c784" stroke-width="2"/>
  <text x="155" y="278" class="lab" fill="#1a6b3c" font-weight="bold">Role 1: Membrane Fluidity Buffer</text>
  <text x="155" y="297" class="sm">At HIGH temp: restrains phospholipid</text>
  <text x="155" y="312" class="sm">movement → ↓ fluidity</text>
  <text x="155" y="327" class="sm">At LOW temp: prevents tight packing → ↑ fluidity</text>

  <!-- Role 2 -->
  <rect x="310" y="258" width="270" height="80" rx="6" fill="#e3f2fd" stroke="#64b5f6" stroke-width="2"/>
  <text x="445" y="278" class="lab" fill="#1565c0" font-weight="bold">Role 2: Hormone Precursor</text>
  <text x="445" y="297" class="sm">All steroid hormones synthesized</text>
  <text x="445" y="312" class="sm">from cholesterol: testosterone,</text>
  <text x="445" y="327" class="sm">estrogen, cortisol, aldosterone, Vit D</text>

  <!-- Hormone arrows -->
  <g transform="translate(0, 355)">
    <text x="120" y="15" class="sm" font-weight="bold" fill="#1a6b3c">Tesosterone</text>
    <text x="120" y="30" class="sm">♂ androgen</text>

    <text x="300" y="15" class="sm" font-weight="bold" fill="#1565c0">Estrogen</text>
    <text x="300" y="30" class="sm">♀ female hormone</text>

    <text x="500" y="15" class="sm" font-weight="bold" fill="#e53935">Cortisol</text>
    <text x="500" y="30" class="sm">stress response</text>

    <!-- arrows from center -->
    <line x1="210" y1="10" x2="260" y2="10" stroke="#999" stroke-width="1.5"/>
    <line x1="380" y1="10" x2="440" y2="10" stroke="#999" stroke-width="1.5"/>
  </g>

  <text x="300" y="450" class="sm" fill="#333">Cholesterol structure: 4 fused rings (3×6-membered + 1×5-membered), polar –OH on ring A, hydrocarbon tail</text>
</svg>
