<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect width="600" height="360" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Pancreas — Islets of Langerhans &amp; Blood Glucose Regulation</text>

  <!-- Pancreas cross-section -->
  <g transform="translate(30, 48)">
    <!-- Overall pancreas shape -->
    <path d="M20,150 Q20,40 140,40 Q260,40 260,150 Q260,260 140,260 Q20,260 20,150Z" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
    <text x="140" y="275" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff8f00" font-weight="bold">Pancreas</text>

    <!-- Exocrine acinar cells -->
    <circle cx="80" cy="95" r="6" fill="#ffcc80"/>
    <circle cx="90" cy="85" r="6" fill="#ffcc80"/>
    <circle cx="75" cy="80" r="6" fill="#ffcc80"/>
    <circle cx="85" cy="105" r="6" fill="#ffcc80"/>
    <circle cx="180" cy="130" r="6" fill="#ffcc80"/>
    <circle cx="195" cy="120" r="6" fill="#ffcc80"/>
    <circle cx="190" cy="140" r="6" fill="#ffcc80"/>
    <circle cx="100" cy="180" r="6" fill="#ffcc80"/>
    <circle cx="160" cy="70" r="6" fill="#ffcc80"/>
    <circle cx="200" cy="185" r="6" fill="#ffcc80"/>

    <!-- Islet of Langerhans -->
    <circle cx="140" cy="140" r="50" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>

    <!-- Alpha cells (periphery) -->
    <circle cx="110" cy="130" r="8" fill="#e53935"/>
    <text x="110" y="134" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff" font-weight="bold">α</text>
    <circle cx="115" cy="155" r="8" fill="#e53935"/>
    <text x="115" y="159" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff" font-weight="bold">α</text>
    <circle cx="160" cy="130" r="8" fill="#e53935"/>
    <text x="160" y="134" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">α</text>
    <circle cx="170" cy="150" r="8" fill="#e53935"/>
    <text x="170" y="154" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">α</text>

    <!-- Beta cells (centre) -->
    <circle cx="135" cy="140" r="10" fill="#1565c0"/>
    <text x="135" y="144" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff" font-weight="bold">β</text>
    <circle cx="150" cy="145" r="10" fill="#1565c0"/>
    <text x="150" y="149" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff" font-weight="bold">β</text>
    <circle cx="140" cy="155" r="10" fill="#1565c0"/>
    <text x="140" y="159" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff" font-weight="bold">β</text>

    <!-- Blood capillary -->
    <path d="M95,160 Q140,180 180,155" fill="none" stroke="#e53935" stroke-width="2" stroke-dasharray="3,3"/>
  </g>

  <!-- Regulation diagram -->
  <rect x="300" y="48" width="270" height="300" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="72" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">Regulation Mechanism</text>

  <!-- High glucose → insulin -->
  <rect x="315" y="85" width="240" height="110" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1"/>
  <text x="435" y="105" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">🡅 High Blood Glucose</text>
  <text x="325" y="124" font-family="Arial" font-size="10" fill="#555">→ β-cells detect high glucose</text>
  <text x="325" y="140" font-family="Arial" font-size="10" fill="#555">→ Release <tspan font-weight="bold" fill="#1565c0">INSULIN</tspan></text>
  <text x="325" y="156" font-family="Arial" font-size="10" fill="#555">→ Cells take up glucose (GLUT4)</text>
  <text x="325" y="172" font-family="Arial" font-size="10" fill="#555">→ Liver: Glycogenesis (glucose→glycogen)</text>
  <text x="325" y="188" font-family="Arial" font-size="10" fill="#555">→ Blood glucose <tspan font-weight="bold" fill="#1a6b3c">DECREASES</tspan></text>

  <!-- Low glucose → glucagon -->
  <rect x="315" y="205" width="240" height="110" rx="6" fill="#ffebee" stroke="#e53935" stroke-width="1"/>
  <text x="435" y="225" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">🡇 Low Blood Glucose</text>
  <text x="325" y="244" font-family="Arial" font-size="10" fill="#555">→ α-cells detect low glucose</text>
  <text x="325" y="260" font-family="Arial" font-size="10" fill="#555">→ Release <tspan font-weight="bold" fill="#e53935">GLUCAGON</tspan></text>
  <text x="325" y="276" font-family="Arial" font-size="10" fill="#555">→ Liver: Glycogenolysis (glycogen→glucose)</text>
  <text x="325" y="292" font-family="Arial" font-size="10" fill="#555">→ Liver: Gluconeogenesis (new glucose)</text>
  <text x="325" y="308" font-family="Arial" font-size="10" fill="#555">→ Blood glucose <tspan font-weight="bold" fill="#e53935">INCREASES</tspan></text>

  <text x="435" y="340" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Set point: ~90 mg/100 mL (~5 mM)</text>
</svg>
