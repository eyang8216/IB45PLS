### L04_a: Miller-Urey Apparatus ###
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" style="background:#fff">
  <defs><linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a6b3c"/><stop offset="100%" stop-color="#43a047"/></linearGradient></defs>
  <rect width="600" height="500" fill="#fff"/>
  <rect x="0" y="0" width="600" height="42" fill="url(#hdr)"/>
  <text x="300" y="28" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="16">Miller-Urey Experiment (1953) — Abiotic Synthesis of Organic Molecules</text>

  <!-- Boiling flask (ocean) bottom left -->
  <ellipse cx="140" cy="420" rx="65" ry="20" fill="#e0f7fa" stroke="#00838f" stroke-width="2.5"/>
  <ellipse cx="140" cy="405" rx="60" ry="18" fill="#b2ebf2" stroke="#00838f" stroke-width="2"/>
  <rect x="80" y="310" width="120" height="95" fill="#e0f7fa" stroke="#00838f" stroke-width="2.5" rx="5"/>
  <ellipse cx="140" cy="310" rx="60" ry="15" fill="#b2ebf2" stroke="#00838f" stroke-width="2"/>
  <text x="140" y="365" text-anchor="middle" fill="#00695c" font-family="Arial" font-weight="bold" font-size="13">Boiling Water</text>
  <text x="140" y="382" text-anchor="middle" fill="#00695c" font-family="Arial" font-size="11">("Early Ocean")</text>
  <!-- flame -->
  <polygon points="130,420 120,448 160,448 150,420" fill="#ffcc00" stroke="#ff8f00" stroke-width="1.5"/>
  <polygon points="135,420 128,440 152,440 145,420" fill="#ff6600"/>
  <text x="140" y="468" text-anchor="middle" fill="#e53935" font-family="Arial" font-size="10">Heat source</text>

  <!-- Tube from boiling flask up to gas flask -->
  <line x1="140" y1="310" x2="140" y2="160" stroke="#555" stroke-width="3"/>
  <line x1="140" y1="160" x2="300" y2="160" stroke="#555" stroke-width="3"/>

  <!-- Gas flask (atmosphere + electrodes) -->
  <ellipse cx="400" cy="200" rx="110" ry="70" fill="#f5f5f5" stroke="#333" stroke-width="2.5"/>
  <text x="400" y="170" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="13">Gas Mixture:</text>
  <text x="400" y="188" text-anchor="middle" fill="#666" font-family="Arial" font-size="11">CH₄, NH₃, H₂, H₂O vapor</text>
  <text x="400" y="204" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">("Reducing Atmosphere")</text>

  <!-- Electrodes -->
  <line x1="370" y1="110" x2="370" y2="170" stroke="#333" stroke-width="3"/>
  <line x1="430" y1="110" x2="430" y2="170" stroke="#333" stroke-width="3"/>
  <!-- Spark -->
  <path d="M370,150 L380,140 L375,150 L390,135" stroke="#ffeb3b" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M375,155 L385,145 L380,155 L395,140" stroke="#fff59d" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M378,160 L388,150 L383,160 L398,145" stroke="#ffeb3b" stroke-width="4" fill="none" stroke-linecap="round"/>
  <text x="400" y="125" text-anchor="middle" fill="#e53935" font-family="Arial" font-weight="bold" font-size="12">Electrodes</text>
  <text x="400" y="140" text-anchor="middle" fill="#e53935" font-family="Arial" font-size="10">(Simulate Lightning)</text>

  <!-- Tube from gas flask to condenser -->
  <line x1="400" y1="270" x2="400" y2="300" stroke="#555" stroke-width="3"/>
  <line x1="400" y1="300" x2="500" y2="300" stroke="#555" stroke-width="3"/>

  <!-- Condenser -->
  <rect x="490" y="260" width="25" height="120" rx="4" fill="#90caf9" stroke="#1565c0" stroke-width="2"/>
  <rect x="455" y="285" width="60" height="40" rx="3" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <rect x="455" y="335" width="60" height="40" rx="3" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="485" y="310" text-anchor="middle" fill="#1565c0" font-family="Arial" font-size="10" font-weight="bold">CONDENSER</text>
  <text x="485" y="325" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Cooling water</text>

  <!-- U-tube / trap -->
  <path d="M515,380 L515,420 L350,420" stroke="#555" stroke-width="3" fill="none"/>
  <line x1="350" y1="420" x2="350" y2="350" stroke="#555" stroke-width="3"/>
  <!-- Connection to flask -->
  <line x1="350" y1="350" x2="200" y2="310" stroke="#555" stroke-width="3"/>

  <!-- Sample collection port -->
  <rect x="490" y="400" width="50" height="60" rx="5" fill="#fff9c4" stroke="#ff8f00" stroke-width="2.5"/>
  <text x="515" y="425" text-anchor="middle" fill="#e65100" font-family="Arial" font-weight="bold" font-size="10">SAMPLE</text>
  <text x="515" y="440" text-anchor="middle" fill="#e65100" font-family="Arial" font-size="9">COLLECTION</text>
  <text x="515" y="455" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">(Amino acids)</text>

  <!-- Circulation arrow -->
  <text x="300" y="440" text-anchor="middle" fill="#1a6b3c" font-family="Arial" font-weight="bold" font-size="11">⟲ Continuous Circulation ⟳</text>

  <!-- Results box -->
  <rect x="30" y="60" width="230" height="100" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="145" y="82" text-anchor="middle" fill="#1a6b3c" font-family="Arial" font-weight="bold" font-size="13">RESULTS (After ~1 week):</text>
  <text x="40" y="102" fill="#333" font-family="Arial" font-size="11">✅ Amino acids (glycine, alanine, etc.)</text>
  <text x="40" y="120" fill="#333" font-family="Arial" font-size="11">✅ Simple sugars</text>
  <text x="40" y="138" fill="#333" font-family="Arial" font-size="11">✅ Lipid precursors</text>
  <text x="40" y="155" fill="#333" font-family="Arial" font-size="11">✅ Nucleotide precursors</text>

  <!-- Limitations -->
  <rect x="30" y="172" width="230" height="72" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="145" y="194" text-anchor="middle" fill="#e65100" font-family="Arial" font-weight="bold" font-size="12">LIMITATIONS:</text>
  <text x="40" y="212" fill="#666" font-family="Arial" font-size="10">Atmospheric composition debated</text>
  <text x="40" y="228" fill="#666" font-family="Arial" font-size="10">Continuous spark ≠ real lightning</text>
  <text x="40" y="244" fill="#666" font-family="Arial" font-size="10">Only produced monomers, not life</text>
</svg>