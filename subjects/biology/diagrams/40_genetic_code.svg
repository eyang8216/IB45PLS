<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 560">
  <rect width="600" height="560" fill="#fff"/>
  <text x="300" y="24" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#1a6b3c">The Genetic Code</text>
  <text x="300" y="40" text-anchor="middle" font-family="Arial" font-size="10" fill="#666" font-style="italic">Standard genetic code — 64 codons, 61 sense + 3 stop</text>

  <!-- Genetic code table as a grid -->
  <g transform="translate(40,52)">
    <!-- Column headers -->
    <rect x="40" y="0" width="50" height="18" fill="#333"/>
    <text x="65" y="13" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff" font-weight="bold">U</text>
    <rect x="92" y="0" width="50" height="18" fill="#333"/>
    <text x="117" y="13" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff" font-weight="bold">C</text>
    <rect x="144" y="0" width="50" height="18" fill="#333"/>
    <text x="169" y="13" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff" font-weight="bold">A</text>
    <rect x="196" y="0" width="50" height="18" fill="#333"/>
    <text x="221" y="13" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff" font-weight="bold">G</text>
    <text x="275" y="13" font-family="Arial" font-size="9" fill="#333" font-weight="bold">3rd base →</text>

    <!-- Row label top -->
    <text x="20" y="13" font-family="Arial" font-size="9" fill="#333" font-weight="bold">2nd →</text>
    <text x="13" y="28" font-family="Arial" font-size="8" fill="#666">1st↓</text>

    <!-- Row: U -->
    <rect x="0" y="20" width="37" height="36" fill="#e8eaf6"/>
    <text x="18" y="43" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">U</text>

    <!-- UUU UUC UUA UUG -->
    <rect x="40" y="20" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="65" y="33" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">UUU Phe</text>
    <rect x="40" y="38" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="65" y="51" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">UUC Phe</text>
    <rect x="92" y="20" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="117" y="33" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">UCU Ser</text>
    <rect x="92" y="38" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="117" y="51" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">UCC Ser</text>
    <rect x="144" y="20" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="169" y="33" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">UAU Tyr</text>
    <rect x="144" y="38" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="169" y="51" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">UAC Tyr</text>
    <rect x="196" y="20" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="221" y="33" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">UGU Cys</text>
    <rect x="196" y="38" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="221" y="51" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">UGC Cys</text>

    <!-- Row: C -->
    <rect x="0" y="58" width="37" height="36" fill="#e8eaf6"/>
    <text x="18" y="81" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">C</text>

    <rect x="40" y="58" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="65" y="71" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">CUU Leu</text>
    <rect x="40" y="76" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="65" y="89" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">CUC Leu</text>
    <rect x="92" y="58" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="117" y="71" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">CCU Pro</text>
    <rect x="92" y="76" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="117" y="89" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">CCC Pro</text>
    <rect x="144" y="58" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="169" y="71" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">CAU His</text>
    <rect x="144" y="76" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="169" y="89" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">CAC His</text>
    <rect x="196" y="58" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="221" y="71" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">CGU Arg</text>
    <rect x="196" y="76" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="221" y="89" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">CGC Arg</text>

    <!-- Row: A -->
    <rect x="0" y="96" width="37" height="36" fill="#e8eaf6"/>
    <text x="18" y="119" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">A</text>

    <rect x="40" y="96" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="65" y="109" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">AUU Ile</text>
    <rect x="40" y="114" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="65" y="127" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">AUC Ile</text>
    <rect x="92" y="96" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="117" y="109" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">ACU Thr</text>
    <rect x="92" y="114" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="117" y="127" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">ACC Thr</text>
    <rect x="144" y="96" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="169" y="109" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">AAU Asn</text>
    <rect x="144" y="114" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="169" y="127" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">AAC Asn</text>
    <rect x="196" y="96" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="221" y="109" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">AGU Ser</text>
    <rect x="196" y="114" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="221" y="127" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">AGC Ser</text>

    <!-- Row: G -->
    <rect x="0" y="134" width="37" height="36" fill="#e8eaf6"/>
    <text x="18" y="157" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">G</text>

    <rect x="40" y="134" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="65" y="147" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">GUU Val</text>
    <rect x="40" y="152" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="65" y="165" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">GUC Val</text>
    <rect x="92" y="134" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="117" y="147" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">GCU Ala</text>
    <rect x="92" y="152" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="117" y="165" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">GCC Ala</text>
    <rect x="144" y="134" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="169" y="147" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">GAU Asp</text>
    <rect x="144" y="152" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="169" y="165" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">GAC Asp</text>
    <rect x="196" y="134" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="221" y="147" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">GGU Gly</text>
    <rect x="196" y="152" width="50" height="18" rx="2" fill="#e8eaf6" stroke="#c5cae9" stroke-width="0.5"/>
    <text x="221" y="165" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">GGC Gly</text>

    <!-- Special highlights -->
    <rect x="40" y="20" width="50" height="36" rx="2" fill="none" stroke="#1a6b3c" stroke-width="2" stroke-dasharray="3,2"/>
    <rect x="144" y="96" width="50" height="18" rx="2" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="1.5"/>
    <rect x="196" y="96" width="50" height="18" rx="2" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="1.5"/>
    <rect x="196" y="114" width="50" height="18" rx="2" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="1.5"/>

    <!-- STOP codons -->
    <rect x="144" y="38" width="50" height="18" rx="2" fill="#ffcdd2" stroke="#e53935" stroke-width="1"/>
    <text x="169" y="51" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935" font-weight="bold">UAA STOP</text>
    <rect x="144" y="20" width="50" height="18" rx="2" fill="#ffcdd2" stroke="#e53935" stroke-width="1"/>
    <text x="169" y="33" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935" font-weight="bold">UAG STOP</text>
    <rect x="196" y="20" width="50" height="18" rx="2" fill="#ffcdd2" stroke="#e53935" stroke-width="1"/>
    <text x="221" y="33" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935" font-weight="bold">UGA STOP</text>

    <!-- Start codon AUG highlight -->
    <rect x="40" y="114" width="50" height="18" rx="2" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="1.5"/>
    <text x="65" y="127" text-anchor="middle" font-family="Arial" font-size="8" fill="#1a6b3c" font-weight="bold">AUG Met (START)</text>

    <!-- Leucine highlight -->
    <text x="70" y="178" font-family="Arial" font-size="7" fill="#6a1b9a">Leucine = 6 codons (degeneracy)</text>
  </g>

  <!-- Properties panel -->
  <rect x="30" y="240" width="540" height="310" rx="6" fill="none" stroke="#ccc" stroke-width="1"/>
  <text x="300" y="262" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Properties of the Genetic Code</text>

  <!-- Grid of properties -->
  <!-- Row 1 -->
  <rect x="45" y="275" width="250" height="55" rx="4" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="55" y="294" font-family="Arial" font-size="10" fill="#1a6b3c" font-weight="bold">Triplet Code</text>
  <text x="55" y="310" font-family="Arial" font-size="9" fill="#555">3 nucleotides = 1 codon = 1 amino acid</text>
  <text x="55" y="324" font-family="Arial" font-size="8" fill="#888">e.g., AUG = Met, UUU = Phe</text>

  <rect x="305" y="275" width="250" height="55" rx="4" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="315" y="294" font-family="Arial" font-size="10" fill="#1a6b3c" font-weight="bold">Non-overlapping</text>
  <text x="315" y="310" font-family="Arial" font-size="9" fill="#555">Each nucleotide belongs to exactly one codon</text>
  <text x="315" y="324" font-family="Arial" font-size="8" fill="#888">Read sequentially: AUG|UUU|GGC</text>

  <!-- Row 2 -->
  <rect x="45" y="338" width="250" height="55" rx="4" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="55" y="357" font-family="Arial" font-size="10" fill="#1a6b3c" font-weight="bold">Comma-less</text>
  <text x="55" y="373" font-family="Arial" font-size="9" fill="#555">No gaps or punctuation between codons</text>
  <text x="55" y="387" font-family="Arial" font-size="8" fill="#888">Continuous reading frame</text>

  <rect x="305" y="338" width="250" height="55" rx="4" fill="#fff3e0" stroke="#ffcc80" stroke-width="1"/>
  <text x="315" y="357" font-family="Arial" font-size="10" fill="#ff8f00" font-weight="bold">Degenerate (Redundant)</text>
  <text x="315" y="373" font-family="Arial" font-size="9" fill="#555">Most amino acids coded by >1 codon (wobble)</text>
  <text x="315" y="387" font-family="Arial" font-size="8" fill="#888">Leu: 6 codons; only Met &amp; Trp have 1 codon</text>

  <!-- Row 3 -->
  <rect x="45" y="401" width="250" height="55" rx="4" fill="#e3f2fd" stroke="#90caf9" stroke-width="1"/>
  <text x="55" y="420" font-family="Arial" font-size="10" fill="#1565c0" font-weight="bold">Universal</text>
  <text x="55" y="436" font-family="Arial" font-size="9" fill="#555">Same code in nearly all organisms</text>
  <text x="55" y="450" font-family="Arial" font-size="8" fill="#888">Minor exceptions: mitochondria, some protists</text>

  <rect x="305" y="401" width="250" height="55" rx="4" fill="#e3f2fd" stroke="#90caf9" stroke-width="1"/>
  <text x="315" y="420" font-family="Arial" font-size="10" fill="#1565c0" font-weight="bold">Unambiguous</text>
  <text x="315" y="436" font-family="Arial" font-size="9" fill="#555">Each codon specifies exactly ONE amino acid</text>
  <text x="315" y="450" font-family="Arial" font-size="8" fill="#888">No codon codes for two different amino acids</text>

  <!-- Start/Stop highlight -->
  <rect x="45" y="464" width="510" height="40" rx="4" fill="#e8eaf6" stroke="#c5cae9" stroke-width="1"/>
  <text x="55" y="484" font-family="Arial" font-size="10" fill="#1a6b3c" font-weight="bold">START codon: AUG (Met)</text>
  <text x="250" y="484" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">STOP codons: UAA, UAG, UGA</text>
  <text x="55" y="498" font-family="Arial" font-size="8" fill="#555">Every polypeptide begins with methionine (may be cleaved later)</text>
  <text x="250" y="498" font-family="Arial" font-size="8" fill="#555">No tRNA — release factors bind instead</text>

  <!-- Wobble note -->
  <rect x="45" y="512" width="510" height="30" rx="4" fill="#fff3e0" stroke="#ffcc80" stroke-width="1"/>
  <text x="300" y="531" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00" font-weight="bold">Wobble Hypothesis (Crick, 1966): First two codon bases pair strictly; third base can "wobble" — allows fewer tRNAs (∼45) to decode all 61 codons</text>

</svg>
