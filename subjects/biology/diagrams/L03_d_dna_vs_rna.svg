### L03_d: DNA vs RNA Comparison ###
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 620" style="background:#fff">
  <defs><linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a6b3c"/><stop offset="100%" stop-color="#43a047"/></linearGradient></defs>
  <rect width="600" height="620" fill="#fff"/>
  <rect x="0" y="0" width="600" height="42" fill="url(#hdr)"/>
  <text x="300" y="28" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="16">DNA vs. RNA — Complete Comparison</text>

  <!-- DNA column header -->
  <rect x="20" y="55" width="265" height="32" fill="#1565c0" rx="5"/>
  <text x="152" y="76" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="15">DNA (Deoxyribonucleic Acid)</text>
  <!-- RNA column header -->
  <rect x="315" y="55" width="265" height="32" fill="#e53935" rx="5"/>
  <text x="447" y="76" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="15">RNA (Ribonucleic Acid)</text>

  <!-- Row template: y increments of 32 -->
  <g font-family="Arial" font-size="11">
    <!-- Sugar -->
    <rect x="20" y="92" width="265" height="28" fill="#e3f2fd"/><text x="30" y="110" fill="#333">Sugar: Deoxyribose (H at 2′)</text>
    <rect x="315" y="92" width="265" height="28" fill="#ffebee"/><text x="325" y="110" fill="#333">Sugar: Ribose (OH at 2′)</text>
    <!-- Bases -->
    <rect x="20" y="120" width="265" height="28" fill="#e3f2fd"/><text x="30" y="138" fill="#333">Bases: A, T, C, G</text>
    <rect x="315" y="120" width="265" height="28" fill="#ffebee"/><text x="325" y="138" fill="#333">Bases: A, U, C, G (U replaces T)</text>
    <!-- Strands -->
    <rect x="20" y="148" width="265" height="28" fill="#e3f2fd"/><text x="30" y="166" fill="#333">Double-stranded (usually)</text>
    <rect x="315" y="148" width="265" height="28" fill="#ffebee"/><text x="325" y="166" fill="#333">Single-stranded (usually)</text>
    <!-- Structure -->
    <rect x="20" y="176" width="265" height="28" fill="#e3f2fd"/><text x="30" y="194" fill="#333">Structure: Double helix</text>
    <rect x="315" y="176" width="265" height="28" fill="#ffebee"/><text x="325" y="194" fill="#333">Structure: Various (linear, folded)</text>
    <!-- Location -->
    <rect x="20" y="204" width="265" height="28" fill="#e3f2fd"/><text x="30" y="222" fill="#333">Location: Nucleus, mt, chloroplast</text>
    <rect x="315" y="204" width="265" height="28" fill="#ffebee"/><text x="325" y="222" fill="#333">Location: Nucleus→cytoplasm</text>
    <!-- Stability -->
    <rect x="20" y="232" width="265" height="28" fill="#e3f2fd"/><text x="30" y="250" fill="#333">Stability: High (long-term archive)</text>
    <rect x="315" y="232" width="265" height="28" fill="#ffebee"/><text x="325" y="250" fill="#333">Stability: Low (temporary; hydrolyzes)</text>
    <!-- Function -->
    <rect x="20" y="260" width="265" height="28" fill="#e3f2fd"/><text x="30" y="278" fill="#333">Function: Permanent information storage</text>
    <rect x="315" y="260" width="265" height="28" fill="#ffebee"/><text x="325" y="278" fill="#333">Function: Carrier (mRNA), adaptor (tRNA)</text>
    <!-- Length -->
    <rect x="20" y="288" width="265" height="28" fill="#e3f2fd"/><text x="30" y="306" fill="#333">Length: Very long (millions of bp)</text>
    <rect x="315" y="288" width="265" height="28" fill="#ffebee"/><text x="325" y="306" fill="#333">Length: Variable (tRNA ~75 nt)</text>
    <!-- Pairing -->
    <rect x="20" y="316" width="265" height="28" fill="#e3f2fd"/><text x="30" y="334" fill="#333">Base pairing: A=T, C≡G</text>
    <rect x="315" y="316" width="265" height="28" fill="#ffebee"/><text x="325" y="334" fill="#333">Base pairing: A=U, C≡G</text>
  </g>

  <!-- Visual comparison: sugar molecules -->
  <rect x="20" y="365" width="560" height="32" fill="#f5f5f5" rx="5"/>
  <text x="300" y="386" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="13">Sugar Comparison: Deoxyribose vs. Ribose</text>

  <!-- Deoxyribose (furanose ring) -->
  <polygon points="150,430 180,420 190,450 170,475 140,465" fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
  <text x="165" y="460" text-anchor="middle" fill="#1565c0" font-family="Arial" font-weight="bold" font-size="12">Deoxyribose</text>
  <text x="155" y="420" text-anchor="middle" fill="#e53935" font-family="Arial" font-size="10">O</text>
  <!-- H at 2′ -->
  <text x="192" y="436" fill="#333" font-family="Arial" font-weight="bold" font-size="12">H</text>
  <text x="208" y="436" fill="#666" font-family="Arial" font-size="10">2′</text>

  <!-- Ribose -->
  <polygon points="370,430 400,420 410,450 390,475 360,465" fill="#ffebee" stroke="#e53935" stroke-width="3"/>
  <text x="385" y="460" text-anchor="middle" fill="#e53935" font-family="Arial" font-weight="bold" font-size="12">Ribose</text>
  <text x="380" y="420" text-anchor="middle" fill="#e53935" font-family="Arial" font-size="10">O</text>
  <!-- OH at 2′ -->
  <text x="412" y="436" fill="#333" font-family="Arial" font-weight="bold" font-size="12">OH</text>
  <text x="435" y="436" fill="#666" font-family="Arial" font-size="10">2′</text>

  <!-- Three RNA types summary -->
  <rect x="20" y="490" width="560" height="32" fill="#f5f5f5" rx="5"/>
  <text x="300" y="511" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="13">Three Types of RNA — Functions</text>

  <rect x="25" y="530" width="170" height="75" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="110" y="552" text-anchor="middle" fill="#1565c0" font-family="Arial" font-weight="bold" font-size="13">mRNA</text>
  <text x="110" y="570" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Messenger RNA</text>
  <text x="110" y="588" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Carries genetic code</text>
  <text x="110" y="600" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">DNA → ribosome</text>

  <rect x="215" y="530" width="170" height="75" rx="6" fill="#fff9c4" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="300" y="552" text-anchor="middle" fill="#e65100" font-family="Arial" font-weight="bold" font-size="13">tRNA</text>
  <text x="300" y="570" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Transfer RNA</text>
  <text x="300" y="588" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Delivers amino acids</text>
  <text x="300" y="600" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Anticodon pairs w/ codon</text>

  <rect x="405" y="530" width="170" height="75" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="490" y="552" text-anchor="middle" fill="#6a1b9a" font-family="Arial" font-weight="bold" font-size="13">rRNA</text>
  <text x="490" y="570" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Ribosomal RNA</text>
  <text x="490" y="588" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Structural + catalytic</text>
  <text x="490" y="600" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Ribozyme (peptidyl transferase)</text>
</svg>