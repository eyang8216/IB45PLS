<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 470" width="600" height="470">
  <rect width="600" height="470" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Inflammatory Response to Tissue Injury</text>

  <!-- Step 1: Tissue Injury -->
  <rect x="20" y="35" width="130" height="100" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="85" y="55" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">1. Tissue Injury</text>
  <text x="85" y="75" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Cut, burn,</text>
  <text x="85" y="90" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">infection,</text>
  <text x="85" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">trauma</text>
  <!-- Arrow -->
  <line x1="150" y1="85" x2="190" y2="85" stroke="#333" stroke-width="2" marker-end="url(#arI)"/>
  <defs><marker id="arI" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#333"/></marker></defs>

  <!-- Step 2: Mast cells -->
  <rect x="200" y="35" width="140" height="100" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="270" y="55" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#ff8f00">2. Mast Cells</text>
  <text x="270" y="75" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Release histamine</text>
  <text x="270" y="90" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">&amp; prostaglandins</text>
  <text x="270" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(chemical signals)</text>
  <!-- Arrow -->
  <line x1="340" y1="85" x2="380" y2="85" stroke="#333" stroke-width="2" marker-end="url(#arI)"/>

  <!-- Step 3: Vasodilation -->
  <rect x="390" y="35" width="130" height="100" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="455" y="55" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">3. Vasodilation</text>
  <text x="455" y="75" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Capillaries widen</text>
  <text x="455" y="90" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Increased blood flow</text>
  <!-- Effects -->
  <text x="455" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">→ Redness &amp; Heat</text>

  <!-- Curved arrow to bottom row -->
  <path d="M520,135 Q520,160 550,175 Q580,190 550,220 Q520,250 500,240" fill="none" stroke="#333" stroke-width="1.5"/>

  <!-- Bottom row: Steps 4-6 -->
  <!-- Step 4: Permeability -->
  <rect x="20" y="200" width="140" height="110" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="90" y="220" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">4. ↑ Permeability</text>
  <text x="90" y="240" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Capillaries leak</text>
  <text x="90" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Fluid enters tissues</text>
  <text x="90" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">→ Swelling (Edema)</text>
  <text x="90" y="288" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">→ Pain (pressure)</text>
  <line x1="160" y1="255" x2="200" y2="255" stroke="#333" stroke-width="2" marker-end="url(#arI)"/>

  <!-- Step 5: Phagocyte Migration -->
  <rect x="210" y="200" width="170" height="110" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="295" y="220" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">5. Phagocyte Migration</text>
  <text x="295" y="240" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Neutrophils arrive first</text>
  <text x="295" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Macrophages follow</text>
  <text x="295" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Diapedesis: squeeze</text>
  <text x="295" y="285" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">through capillary walls</text>
  <text x="295" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">→ Pus formation</text>
  <line x1="380" y1="255" x2="420" y2="255" stroke="#333" stroke-width="2" marker-end="url(#arI)"/>

  <!-- Step 6: Resolution -->
  <rect x="430" y="200" width="150" height="110" rx="8" fill="#e0f7fa" stroke="#00acc1" stroke-width="2"/>
  <text x="505" y="220" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#00838f">6. Resolution</text>
  <text x="505" y="240" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Phagocytes engulf</text>
  <text x="505" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">pathogens &amp; debris</text>
  <text x="505" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Tissue repair begins</text>
  <text x="505" y="288" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Healing &amp; regeneration</text>

  <!-- Bottom summary bar -->
  <rect x="20" y="330" width="560" height="120" rx="8" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>

  <!-- Cardinal signs -->
  <text x="300" y="355" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Cardinal Signs of Inflammation</text>

  <text x="100" y="380" text-anchor="middle" font-family="Arial" font-size="12" fill="#e53935" font-weight="bold">Rubor</text>
  <text x="100" y="398" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Redness</text>

  <text x="200" y="380" text-anchor="middle" font-family="Arial" font-size="12" fill="#e53935" font-weight="bold">Calor</text>
  <text x="200" y="398" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Heat</text>

  <text x="300" y="380" text-anchor="middle" font-family="Arial" font-size="12" fill="#e53935" font-weight="bold">Tumor</text>
  <text x="300" y="398" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Swelling</text>

  <text x="400" y="380" text-anchor="middle" font-family="Arial" font-size="12" fill="#e53935" font-weight="bold">Dolor</text>
  <text x="400" y="398" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Pain</text>

  <text x="500" y="380" text-anchor="middle" font-family="Arial" font-size="12" fill="#e53935" font-weight="bold">Functio Laesa</text>
  <text x="500" y="398" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Loss of Function</text>

  <text x="300" y="430" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">All triggered by histamine from mast cells → vasodilation &amp; increased permeability</text>
</svg>
