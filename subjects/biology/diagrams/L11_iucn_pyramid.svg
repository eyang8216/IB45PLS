<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480">
  <rect width="600" height="480" fill="#fff"/>
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#333">IUCN Red List Categories (Pyramid of Extinction Risk)</text>
  <polygon points="300,60 120,240 480,240" fill="#e8f5e9" stroke="#333" stroke-width="2"/>
  <text x="300" y="80" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">LEAST CONCERN (LC)</text>
  <text x="300" y="95" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Widespread, abundant</text>
  <polygon points="192,130 300,96 300,240 192,240" fill="#81c784" stroke="#333" stroke-width="1.5"/>
  <text x="246" y="118" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">NEAR</text>
  <text x="246" y="132" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#2e7d32">THREATENED (NT)</text>
  <polygon points="228,170 300,130 300,240 228,240" fill="#fff176" stroke="#333" stroke-width="1.5"/>
  <text x="264" y="158" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#f57f17">VULNERABLE (VU)</text>
  <polygon points="264,195 300,170 300,240 264,240" fill="#ffb74d" stroke="#333" stroke-width="1.5"/>
  <text x="282" y="185" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#e65100">ENDANGERED (EN)</text>
  <polygon points="282,215 300,195 300,240 282,240" fill="#ef5350" stroke="#333" stroke-width="1.5"/>
  <text x="291" y="208" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#fff">CRITICALLY</text>
  <text x="291" y="220" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#fff">ENDANGERED (CR)</text>
  <polygon points="294,228 300,215 300,240 294,240" fill="#bdbdbd" stroke="#333" stroke-width="1.5"/>
  <text x="297" y="235" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">EW</text>
  <polygon points="297,235 300,228 300,240 297,240" fill="#333"/>
  <text x="299" y="244" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">EX</text>
  <text x="490" y="90" font-family="Arial" font-size="10" fill="#333">Not evaluated (NE)</text>
  <text x="490" y="108" font-family="Arial" font-size="10" fill="#333">Data Deficient (DD)</text>
  <text x="490" y="145" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Not threatened</text>
  <text x="490" y="175" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">THREATENED ↑</text>
  <text x="490" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Increasing risk</text>
  <text x="490" y="225" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">of extinction</text>
  <text x="490" y="248" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">EX = Extinct</text>
  <text x="300" y="280" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">IUCN Criteria for Listing</text>
  <rect x="25" y="295" width="170" height="55" rx="6" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="110" y="315" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">A: Population reduction</text>
  <text x="110" y="335" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Rate of decline over time</text>
  <rect x="205" y="295" width="170" height="55" rx="6" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="290" y="315" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">B: Geographic range</text>
  <text x="290" y="335" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Extent of occurrence</text>
  <rect x="385" y="295" width="170" height="55" rx="6" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="470" y="315" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">C+D: Population size</text>
  <text x="470" y="335" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Small + declining</text>
  <rect x="100" y="360" width="380" height="40" rx="6" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="290" y="378" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">E: Quantitative analysis</text>
  <text x="290" y="395" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Probability of extinction (PVA — Population Viability Analysis)</text>
  <rect x="80" y="420" width="440" height="30" rx="6" fill="#ff8f00" opacity="0.15"/>
  <text x="300" y="440" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Quantitative criteria — not subjective. Categories based on population data, not guesswork.</text>
</svg>