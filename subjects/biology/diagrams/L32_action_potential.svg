<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 650" width="600" height="650">
  <rect width="600" height="650" fill="#fff" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#e53935">Action Potential — Phases, Ion Movements &amp; Refractory Periods</text>

  <!-- Axes -->
  <line x1="70" y1="470" x2="560" y2="470" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="70" x2="70" y2="470" stroke="#333" stroke-width="2"/>

  <text x="315" y="495" text-anchor="middle" font-family="Arial" font-size="12" fill="#333" font-weight="bold">Time (ms)</text>
  <text x="25" y="275" text-anchor="middle" font-family="Arial" font-size="12" fill="#333" font-weight="bold" transform="rotate(-90,25,275)">Membrane Potential (mV)</text>

  <!-- Y-axis ticks -->
  <line x1="62" y1="105" x2="70" y2="105" stroke="#333" stroke-width="1.5"/>
  <text x="56" y="109" text-anchor="end" font-family="Arial" font-size="10" fill="#333">+50</text>
  <line x1="62" y1="180" x2="70" y2="180" stroke="#333" stroke-width="1.5"/>
  <text x="56" y="184" text-anchor="end" font-family="Arial" font-size="10" fill="#333">0</text>
  <line x1="62" y1="255" x2="70" y2="255" stroke="#333" stroke-width="1.5"/>
  <text x="56" y="259" text-anchor="end" font-family="Arial" font-size="10" fill="#333">−55</text>
  <line x1="62" y1="300" x2="70" y2="300" stroke="#333" stroke-width="1.5"/>
  <text x="56" y="304" text-anchor="end" font-family="Arial" font-size="10" fill="#333">−70</text>
  <line x1="62" y1="370" x2="70" y2="370" stroke="#333" stroke-width="1.5"/>
  <text x="56" y="374" text-anchor="end" font-family="Arial" font-size="10" fill="#333">−90</text>

  <!-- Action potential curve -->
  <polyline points="
    90,300 120,300 135,290 150,255
    160,210 170,170 180,130 200,110 220,120
    240,170 260,230 270,290 285,350
    300,370 320,360 340,330 360,310 400,302 480,300
  " fill="none" stroke="#e53935" stroke-width="3.5"/>

  <!-- Phase labels -->
  <text x="100" y="288" font-family="Arial" font-size="9" fill="#333">①</text>
  <text x="110" y="285" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Resting</text>

  <text x="148" y="240" font-family="Arial" font-size="9" fill="#333">②</text>
  <text x="160" y="237" font-family="Arial" font-size="8" fill="#ff8f00">Threshold</text>

  <text x="185" y="140" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">③ Depolarization</text>
  <text x="185" y="153" font-family="Arial" font-size="8" fill="#e53935">Na⁺ INFLUX</text>

  <text x="240" y="155" font-family="Arial" font-size="10" fill="#1565c0" font-weight="bold">④ Repolarization</text>
  <text x="240" y="168" font-family="Arial" font-size="8" fill="#1565c0">K⁺ EFFLUX</text>

  <text x="290" y="380" font-family="Arial" font-size="9" fill="#6a1b9a">⑤</text>
  <text x="300" y="385" font-family="Arial" font-size="8" fill="#6a1b9a">Hyperpolarization</text>

  <text x="350" y="318" font-family="Arial" font-size="8" fill="#555">⑥ Return to resting</text>

  <!-- Refractory period shading -->
  <rect x="150" y="430" width="100" height="30" rx="4" fill="#ffcdd2" opacity="0.6"/>
  <text x="200" y="450" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Absolute</text>

  <rect x="250" y="430" width="100" height="30" rx="4" fill="#fff3e0" opacity="0.6"/>
  <text x="300" y="450" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff8f00">Relative</text>

  <!-- Ion channel states table -->
  <rect x="70" y="505" width="480" height="135" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="310" y="525" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">Ion Channel States During Action Potential</text>

  <line x1="70" y1="533" x2="550" y2="533" stroke="#bbb" stroke-width="1"/>
  <text x="100" y="553" font-family="Arial" font-size="8" font-weight="bold" fill="#333">Phase</text>
  <text x="250" y="553" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#e53935">Voltage-Gated Na⁺</text>
  <text x="450" y="553" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#1565c0">Voltage-Gated K⁺</text>

  <text x="100" y="572" font-family="Arial" font-size="8" fill="#555">Rest</text>
  <text x="250" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Closed (ready)</text>
  <text x="450" y="572" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Closed</text>

  <text x="100" y="590" font-family="Arial" font-size="8" fill="#555">Depolarization</text>
  <text x="250" y="590" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">OPEN → Na⁺ enters</text>
  <text x="450" y="590" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Opening slowly</text>

  <text x="100" y="608" font-family="Arial" font-size="8" fill="#555">Peak</text>
  <text x="250" y="608" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">INACTIVATED</text>
  <text x="450" y="608" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">OPEN → K⁺ leaves</text>

  <text x="100" y="626" font-family="Arial" font-size="8" fill="#555">Hyperpolarization</text>
  <text x="250" y="626" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Closed (reset)</text>
  <text x="450" y="626" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Closing slowly</text>
</svg>
