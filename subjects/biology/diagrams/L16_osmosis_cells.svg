<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420">
  <rect width="600" height="420" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Osmosis — Effects of Tonicity on Animal &amp; Plant Cells</text>
  <!-- Animal cells -->
  <text x="175" y="52" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">ANIMAL CELLS (no cell wall)</text>
  <!-- Hypotonic -->
  <rect x="15" y="65" width="110" height="130" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="70" y="82" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Hypotonic</text>
  <circle cx="70" cy="125" r="22" fill="#ffcdd2" stroke="#e53935" stroke-width="2.5"/>
  <text x="70" y="128" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">LYSIS</text>
  <text x="70" y="160" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Cell swells</text>
  <text x="70" y="173" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">and bursts</text>
  <!-- Isotonic -->
  <rect x="135" y="65" width="110" height="130" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="190" y="82" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">Isotonic</text>
  <circle cx="190" cy="125" r="18" fill="#c8e6c9" stroke="#333" stroke-width="2"/>
  <text x="190" y="128" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Normal</text>
  <text x="190" y="160" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">No net water</text>
  <text x="190" y="173" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">movement</text>
  <!-- Hypertonic -->
  <rect x="255" y="65" width="110" height="130" rx="6" fill="#ffebee" stroke="#e53935" stroke-width="1.5"/>
  <text x="310" y="82" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Hypertonic</text>
  <circle cx="310" cy="125" r="13" fill="#ffcdd2" stroke="#e53935" stroke-width="2.5"/>
  <text x="310" y="128" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#c62828">CRENATION</text>
  <text x="310" y="160" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Cell shrinks</text>
  <text x="310" y="173" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">spiky shape</text>
  <!-- Water arrows -->
  <text x="70" y="190" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Water IN</text>
  <text x="310" y="190" text-anchor="middle" font-family="Arial" font-size="8" fill="#c62828">Water OUT</text>
  <!-- Plant cells -->
  <text x="475" y="52" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">PLANT CELLS (with cell wall)</text>
  <!-- Hypotonic plant -->
  <rect x="385" y="65" width="100" height="130" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="435" y="82" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Hypotonic</text>
  <rect x="417" y="95" width="36" height="55" rx="3" fill="#a5d6a7" stroke="#333" stroke-width="2"/>
  <circle cx="435" cy="122" r="14" fill="#81c784" stroke="#333" stroke-width="1.5"/>
  <text x="435" y="162" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#1a6b3c">TURGID</text>
  <text x="435" y="175" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Membrane</text>
  <text x="435" y="186" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">presses wall</text>
  <!-- Isotonic plant -->
  <rect x="490" y="65" width="100" height="130" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="540" y="82" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">Isotonic</text>
  <rect x="522" y="95" width="36" height="55" rx="3" fill="#a5d6a7" stroke="#333" stroke-width="2"/>
  <circle cx="540" cy="125" r="12" fill="#c8e6c9" stroke="#333" stroke-width="1.5"/>
  <text x="540" y="162" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Flaccid</text>
  <text x="540" y="175" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Limp</text>
  <!-- Hypertonic plant -->
  <rect x="385" y="205" width="205" height="115" rx="6" fill="#ffebee" stroke="#e53935" stroke-width="1.5"/>
  <text x="487" y="222" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">Hypertonic → PLASMOLYSIS</text>
  <rect x="452" y="235" width="36" height="55" rx="3" fill="#a5d6a7" stroke="#333" stroke-width="2"/>
  <circle cx="470" cy="265" r="8" fill="#ffcdd2" stroke="#e53935" stroke-width="2"/>
  <text x="487" y="290" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">Membrane pulls away from cell wall</text>
  <text x="487" y="305" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Vacuole shrinks → cell wilts</text>
  <!-- Key -->
  <rect x="30" y="335" width="540" height="55" rx="6" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="300" y="355" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">KEY: Plant cells DON'T burst in hypotonic solutions — cell wall provides counter-pressure (turgor)</text>
  <text x="300" y="375" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Turgid = normal healthy state for plants | Plasmolysis = irreversible damage | Animal cells: lysis or crenation</text>
</svg>