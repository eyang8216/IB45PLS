<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 620" width="600" height="620">
  <rect width="600" height="620" fill="#fff" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#e53935">Photorespiration — The Salvage Pathway (PCO / C₂ Cycle)</text>

  <!-- Three organelles -->
  <!-- Chloroplast -->
  <rect x="30" y="100" width="150" height="120" rx="12" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="105" y="125" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">Chloroplast</text>
  <text x="105" y="143" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(stroma)</text>

  <!-- Peroxisome 1 -->
  <rect x="230" y="100" width="150" height="120" rx="12" fill="#fff3e0" stroke="#ff8f00" stroke-width="2.5"/>
  <text x="305" y="125" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#ff8f00">Peroxisome</text>

  <!-- Mitochondrion -->
  <rect x="230" y="270" width="150" height="100" rx="12" fill="#fce4ec" stroke="#e53935" stroke-width="2.5"/>
  <text x="305" y="295" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">Mitochondrion</text>

  <!-- Peroxisome 2 -->
  <rect x="230" y="420" width="150" height="100" rx="12" fill="#fff3e0" stroke="#ff8f00" stroke-width="2.5"/>
  <text x="305" y="445" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#ff8f00">Peroxisome</text>

  <!-- Chloroplast 2 -->
  <rect x="30" y="470" width="150" height="80" rx="12" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="105" y="495" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">Chloroplast</text>

  <!-- Step 1: RuBisCO oxygenase -->
  <rect x="50" y="155" width="110" height="40" rx="6" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="105" y="170" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">RuBP + O₂ →</text>
  <text x="105" y="185" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">3-PGA + 2-PG</text>

  <!-- Step 2: Dephosphorylation -->
  <text x="105" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">2-PG → glycolate</text>

  <!-- Arrow C→P1 -->
  <line x1="180" y1="190" x2="230" y2="170" stroke="#333" stroke-width="2.5" marker-end="url(#arrowDark)"/>
  <text x="195" y="170" font-family="Arial" font-size="8" fill="#666">①</text>

  <!-- Peroxisome Step 1 -->
  <rect x="250" y="155" width="110" height="40" rx="6" fill="#fff9c4" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="305" y="170" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Glycolate → Glyoxylate</text>
  <text x="305" y="185" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">(+ H₂O₂ → catalase)</text>

  <!-- Arrow inside P1 -->
  <line x1="305" y1="195" x2="305" y2="270" stroke="#333" stroke-width="2.5" marker-end="url(#arrowDark)"/>

  <rect x="250" y="310" width="110" height="40" rx="6" fill="#fce4ec" stroke="#e53935" stroke-width="1.5"/>
  <text x="305" y="325" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">2 Glycine → Serine</text>
  <text x="305" y="342" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">+ CO₂ + NH₃</text>

  <!-- CO2 lost arrow -->
  <line x1="380" y1="330" x2="430" y2="330" stroke="#e53935" stroke-width="3" marker-end="url(#arrowRed)"/>
  <text x="410" y="322" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">CO₂ lost!</text>

  <!-- Arrow M→P2 -->
  <line x1="305" y1="370" x2="305" y2="420" stroke="#333" stroke-width="2.5" marker-end="url(#arrowDark)"/>
  <text x="315" y="400" font-family="Arial" font-size="8" fill="#666">③</text>

  <rect x="250" y="455" width="110" height="40" rx="6" fill="#fff9c4" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="305" y="470" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Serine → Glycerate</text>

  <!-- Arrow P2→C2 -->
  <line x1="230" y1="475" x2="180" y2="510" stroke="#333" stroke-width="2.5" marker-end="url(#arrowDark)"/>
  <text x="195" y="498" font-family="Arial" font-size="8" fill="#666">④</text>

  <rect x="50" y="485" width="110" height="35" rx="6" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="105" y="500" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Glycerate → 3-PGA</text>
  <text x="105" y="514" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">(costs 1 ATP)</text>

  <!-- Summary -->
  <rect x="420" y="100" width="160" height="450" rx="8" fill="#fff3e0" stroke="#e53935" stroke-width="2"/>
  <text x="500" y="130" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">Cost of</text>
  <text x="500" y="148" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">Photorespiration</text>

  <line x1="440" y1="165" x2="560" y2="165" stroke="#ccc" stroke-width="1"/>

  <text x="440" y="190" font-family="Arial" font-size="10" fill="#333">• 1 CO₂ lost per</text>
  <text x="440" y="208" font-family="Arial" font-size="10" fill="#333">  2 × 2-PG salvaged</text>

  <text x="440" y="240" font-family="Arial" font-size="10" fill="#333">• ATP consumed</text>
  <text x="440" y="258" font-family="Arial" font-size="10" fill="#333">  (glycerate kinase)</text>

  <text x="440" y="290" font-family="Arial" font-size="10" fill="#333">• Reducing power</text>
  <text x="440" y="308" font-family="Arial" font-size="10" fill="#333">  consumed</text>

  <text x="440" y="340" font-family="Arial" font-size="10" fill="#333">• NH₃ released →</text>
  <text x="440" y="358" font-family="Arial" font-size="10" fill="#333">  re-assimilation</text>
  <text x="440" y="376" font-family="Arial" font-size="10" fill="#333">  costs more ATP</text>

  <line x1="440" y1="400" x2="560" y2="400" stroke="#ccc" stroke-width="1"/>

  <text x="500" y="425" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e53935">25–50% loss</text>
  <text x="500" y="443" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">of efficiency</text>
  <text x="500" y="461" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">at 25°C in C3</text>

  <text x="500" y="500" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">Gets worse at</text>
  <text x="500" y="518" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">higher temp</text>

  <!-- ATP box -->
  <rect x="430" y="535" width="140" height="30" rx="6" fill="#ffcdd2" stroke="#e53935" stroke-width="1"/>
  <text x="500" y="555" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">NET ATP cost per CO₂</text>

  <!-- Bottom note -->
  <text x="300" y="595" text-anchor="middle" font-family="Arial" font-size="10" fill="#888" font-style="italic">Three-organelle salvage: Chloroplast → Peroxisome → Mitochondrion → Peroxisome → Chloroplast</text>
</svg>
