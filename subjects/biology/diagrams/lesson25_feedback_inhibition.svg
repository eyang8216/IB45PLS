<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <rect width="600" height="340" fill="#fff"/>
  <text x="300" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#333">End-Product Feedback Inhibition — Isoleucine Synthesis</text>

  <!-- Pathway: Threonine → Intermediate 1 → ... → Isoleucine -->
  <!-- Enzyme 1 -->
  <rect x="60" y="60" width="70" height="30" rx="6" fill="#ffcdd2" stroke="#e53935" stroke-width="2"/>
  <text x="95" y="73" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Threonine</text>
  <text x="95" y="83" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Deaminase</text>
  <text x="95" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e53935" font-weight="bold">(Enzyme 1)</text>

  <line x1="130" y1="75" x2="160" y2="75" stroke="#333" stroke-width="2" marker-end="url(#arrowBlack)"/>
  <defs><marker id="arrowBlack" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#333"/></marker></defs>

  <!-- Intermediate 1 -->
  <rect x="165" y="63" width="60" height="24" rx="4" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="195" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Intermediate A</text>

  <line x1="225" y1="75" x2="255" y2="75" stroke="#333" stroke-width="2" marker-end="url(#arrowBlack)"/>

  <!-- Enzyme 2 -->
  <rect x="255" y="60" width="60" height="30" rx="6" fill="#c8e6c9" stroke="#43a047" stroke-width="2"/>
  <text x="285" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Enzyme 2</text>

  <line x1="315" y1="75" x2="345" y2="75" stroke="#333" stroke-width="2" marker-end="url(#arrowBlack)"/>

  <!-- Intermediate 2 -->
  <rect x="350" y="63" width="60" height="24" rx="4" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="380" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Intermediate B</text>

  <line x1="410" y1="75" x2="440" y2="75" stroke="#333" stroke-width="2" marker-end="url(#arrowBlack)"/>

  <!-- Enzyme 3 -->
  <rect x="440" y="60" width="60" height="30" rx="6" fill="#c8e6c9" stroke="#43a047" stroke-width="2"/>
  <text x="470" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Enzyme 3</text>

  <line x1="500" y1="75" x2="530" y2="75" stroke="#333" stroke-width="2" marker-end="url(#arrowBlack)"/>

  <!-- Isoleucine end product -->
  <rect x="535" y="58" width="55" height="34" rx="6" fill="#1a6b3c" stroke="#0d3d1e" stroke-width="2"/>
  <text x="562" y="73" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">Isoleucine</text>
  <text x="562" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#c8e6c9">End Product</text>

  <!-- Feedback inhibition arrow - curving back from Isoleucine to Enzyme 1 -->
  <path d="M530,100 Q530,160 400,185 Q300,200 130,185 Q95,180 95,140" fill="none" stroke="#e53935" stroke-width="2.5" stroke-dasharray="6,3"/>
  <defs>
    <marker id="arrowRed2" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#e53935"/>
    </marker>
  </defs>

  <!-- Label on feedback arrow -->
  <rect x="240" y="185" width="180" height="36" rx="6" fill="#fff" fill-opacity="0.9"/>
  <text x="330" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e53935" font-weight="bold">Negative Feedback</text>
  <text x="330" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e53935">End product inhibits the first</text>
  <text x="330" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e53935" dy="0"> first committed step</text>

  <!-- Allosteric site label -->
  <text x="95" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e53935">Allosteric site</text>

  <!-- Advantages box -->
  <rect x="45" y="260" width="510" height="70" rx="6" fill="none" stroke="#43a047" stroke-width="1.5"/>
  <text x="300" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#43a047" font-weight="bold">Advantages of Feedback Inhibition</text>
  <text x="70" y="300" font-family="Arial, sans-serif" font-size="10" fill="#333">✓ Prevents wasteful overproduction of end products when supply exceeds demand</text>
  <text x="70" y="318" font-family="Arial, sans-serif" font-size="10" fill="#333">✓ Prevents buildup of toxic intermediates  |  Saves ATP and metabolic resources  |  Self-regulating</text>
</svg>
