<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 470">
  <rect width="600" height="470" fill="#fff"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">X-Linked Recessive Inheritance — Carrier ♀ × Affected ♂</text>
  <text x="300" y="52" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Xᴺ = Normal allele (dominant) | Xⁿ = Color-blind allele (recessive) | Y chromosome carries NO allele for this trait</text>

  <!-- Parents -->
  <text x="300" y="82" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">Parental Genotypes</text>

  <!-- Mother -->
  <rect x="100" y="95" width="180" height="55" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="190" y="115" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">♀ Mother: XᴺXⁿ</text>
  <text x="190" y="135" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Carrier — normal vision</text>
  <text x="190" y="165" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Gametes: Xᴺ, Xⁿ</text>

  <!-- Father -->
  <rect x="320" y="95" width="180" height="55" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="410" y="115" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">♂ Father: XⁿY</text>
  <text x="410" y="135" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Affected — color-blind</text>
  <text x="410" y="165" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Gametes: Xⁿ, Y</text>

  <!-- Cross symbol -->
  <text x="300" y="138" text-anchor="middle" font-family="Arial" font-size="20" fill="#333">×</text>

  <!-- Arrow -->
  <line x1="300" y1="175" x2="300" y2="200" stroke="#333" stroke-width="2"/>
  <polygon points="300,200 294,193 306,193" fill="#333"/>

  <!-- Punnett square -->
  <text x="300" y="218" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Offspring Genotypes</text>

  <g transform="translate(140, 228)">
    <rect x="0" y="0" width="320" height="120" fill="none" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="35" x2="320" y2="35" stroke="#333" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="120" stroke="#333" stroke-width="1"/>

    <!-- Column headers -->
    <text x="80" y="22" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">Xᴺ ♀</text>
    <text x="240" y="22" text-anchor="middle" font-family="Arial" font-size="13" fill="#6a1b9a">Xⁿ ♀</text>

    <!-- Row headers -->
    <text x="140" y="55" text-anchor="end" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">Xⁿ ♂</text>
    <text x="140" y="95" text-anchor="end" font-family="Arial" font-size="13" fill="#e53935">Y ♂</text>

    <!-- Cells -->
    <rect x="164" y="39" width="152" height="39" rx="4" fill="#f3e5f5"/>
    <text x="240" y="65" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">XᴺXⁿ Carrier ♀</text>
    <text x="240" y="75" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">Normal vision</text>

    <rect x="4" y="39" width="152" height="39" rx="4" fill="#ffcdd2"/>
    <text x="80" y="65" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">XⁿXⁿ Affected ♀</text>
    <text x="80" y="75" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">Color-blind</text>

    <rect x="164" y="82" width="152" height="35" rx="4" fill="#c8e6c9"/>
    <text x="240" y="104" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">XᴺY Normal ♂</text>

    <rect x="4" y="82" width="152" height="35" rx="4" fill="#ffcdd2"/>
    <text x="80" y="104" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">XⁿY Affected ♂</text>
  </g>

  <!-- Key patterns -->
  <rect x="30" y="370" width="540" height="85" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="300" y="395" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#ff8f00">X-Linked Recessive Key Patterns:</text>
  <text x="300" y="416" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">
    ① More males affected than females (♂ only need 1 recessive allele)
  </text>
  <text x="300" y="436" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">
    ② NO father-to-son transmission (father gives Y to sons, not X)
  </text>
  <text x="300" y="456" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">
    ③ Affected father → ALL daughters are carriers | Carrier mother → 50% of sons affected
  </text>
</svg>
