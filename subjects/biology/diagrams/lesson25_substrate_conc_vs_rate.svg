<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <rect width="600" height="380" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#333">Effect of Substrate Concentration on Enzyme Activity</text>

  <!-- Axes -->
  <line x1="70" y1="330" x2="540" y2="330" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="330" x2="70" y2="40" stroke="#333" stroke-width="2"/>
  <text x="300" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">Substrate Concentration →</text>
  <text x="20" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333" transform="rotate(-90,20,190)">Rate of Reaction (v) →</text>

  <!-- Rectangular hyperbola -->
  <path d="M80,325 Q120,320 150,280 Q230,180 300,116 Q380,72 480,52 Q530,46 540,45" fill="none" stroke="#1a6b3c" stroke-width="3"/>

  <!-- Vmax line -->
  <line x1="70" y1="43" x2="540" y2="43" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="545" y="47" font-family="Arial, sans-serif" font-size="13" fill="#ff8f00" font-weight="bold">Vmax</text>

  <!-- ½ Vmax line -->
  <line x1="70" y1="186" x2="540" y2="186" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="545" y="190" font-family="Arial, sans-serif" font-size="12" fill="#1565c0" font-weight="bold">½ Vmax</text>

  <!-- Km line -->
  <line x1="170" y1="186" x2="170" y2="330" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="170" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1565c0" font-weight="bold">Km</text>

  <!-- Phases -->
  <!-- First order -->
  <rect x="75" y="170" width="110" height="160" rx="6" fill="#c8e6c9" opacity="0.4"/>
  <text x="130" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a6b3c" font-weight="bold">1st Order</text>
  <text x="130" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a6b3c">Rate ∝ [S]</text>

  <!-- Mixed order -->
  <rect x="185" y="100" width="100" height="230" rx="6" fill="#fff9c4" opacity="0.4"/>
  <text x="235" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ff8f00" font-weight="bold">Mixed</text>
  <text x="235" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ff8f00">Order</text>

  <!-- Zero order -->
  <rect x="285" y="35" width="255" height="295" rx="6" fill="#ffcdd2" opacity="0.3"/>
  <text x="410" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e53935" font-weight="bold">Zero Order</text>
  <text x="410" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e53935">All active sites saturated</text>

  <!-- Enzyme saturation diagram (inset) -->
  <circle cx="440" cy="115" r="22" fill="#81c784" stroke="#1a6b3c" stroke-width="2"/>
  <circle cx="460" cy="105" r="6" fill="#ff8f00"/><circle cx="455" cy="125" r="6" fill="#ff8f00"/>
  <circle cx="432" cy="95" r="6" fill="#ff8f00"/><circle cx="468" cy="120" r="6" fill="#ff8f00"/>

  <circle cx="440" cy="170" r="22" fill="#81c784" stroke="#1a6b3c" stroke-width="2"/>
  <circle cx="460" cy="170" r="6" fill="#ff8f00"/>

  <text x="440" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">High [S] → All sites full</text>
  <text x="440" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">→ Rate = Vmax (constant)</text>

  <!-- Rate limiting -->
  <text x="300" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333" font-style="italic">At Vmax, enzyme concentration becomes rate-limiting</text>
</svg>
