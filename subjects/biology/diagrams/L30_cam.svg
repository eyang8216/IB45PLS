<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 650" width="600" height="650">
  <defs><marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#333"/></marker></defs>
  <rect width="600" height="650" fill="#fff" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#6a1b9a">CAM Photosynthesis — Temporal CO₂ Concentration</text>

  <!-- Night Side -->
  <rect x="25" y="55" width="265" height="290" rx="12" fill="#e8eaf6" stroke="#6a1b9a" stroke-width="2.5"/>
  <rect x="25" y="55" width="265" height="32" rx="12" fill="#6a1b9a"/>
  <text x="157" y="77" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#fff">NIGHT (Stomata OPEN)</text>

  <text x="45" y="115" font-family="Arial" font-size="11" fill="#333">🌙 Stomata open → CO₂ enters</text>
  <line x1="45" y1="125" x2="45" y2="155" stroke="#e53935" stroke-width="2" marker-end="url(#a)"/>

  <rect x="45" y="155" width="225" height="32" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="157" y="169" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">PEP Carboxylase fixes HCO₃⁻</text>
  <text x="157" y="183" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">PEP + HCO₃⁻ → OAA → Malate</text>

  <line x1="157" y1="187" x2="157" y2="210" stroke="#333" stroke-width="2" marker-end="url(#a)"/>

  <!-- Vacuole storage -->
  <rect x="70" y="212" width="175" height="50" rx="10" fill="#fff9c4" stroke="#ff8f00" stroke-width="2.5"/>
  <text x="157" y="232" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff8f00">Malate → Vacuole</text>
  <text x="157" y="248" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Stored as malic acid</text>
  <text x="157" y="260" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">vacuolar pH drops to ~3–4</text>

  <text x="45" y="300" font-family="Arial" font-size="9" fill="#555">Starch → PEP (glycolysis)</text>
  <text x="45" y="315" font-family="Arial" font-size="9" fill="#555">Water loss minimal (cooler, humid)</text>

  <!-- Day Side -->
  <rect x="310" y="55" width="265" height="290" rx="12" fill="#fff3e0" stroke="#ff8f00" stroke-width="2.5"/>
  <rect x="310" y="55" width="265" height="32" rx="12" fill="#ff8f00"/>
  <text x="442" y="77" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#fff">DAY (Stomata CLOSED)</text>

  <text x="330" y="115" font-family="Arial" font-size="11" fill="#333">☀️ Stomata closed — no gas exchange</text>

  <line x1="330" y1="125" x2="330" y2="155" stroke="#333" stroke-width="2" marker-end="url(#a)"/>

  <rect x="330" y="155" width="225" height="32" rx="6" fill="#ffcdd2" stroke="#e53935" stroke-width="2"/>
  <text x="442" y="169" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e53935">Malate → Cytosol (from vacuole)</text>
  <text x="442" y="183" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Decarboxylation → CO₂ + Pyruvate</text>

  <line x1="442" y1="187" x2="442" y2="210" stroke="#333" stroke-width="2" marker-end="url(#a)"/>

  <rect x="355" y="212" width="175" height="50" rx="10" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="442" y="232" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">Calvin Cycle</text>
  <text x="442" y="248" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">RuBisCO fixes CO₂</text>
  <text x="442" y="260" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">ATP + NADPH from light rxns</text>

  <text x="330" y="300" font-family="Arial" font-size="9" fill="#555">Pyruvate → Starch (for next night)</text>
  <text x="330" y="315" font-family="Arial" font-size="9" fill="#555">Stomata closed → conserve H₂O</text>

  <!-- Same Cell annotation -->
  <rect x="120" y="360" width="360" height="28" rx="6" fill="#e8eaf6" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="300" y="380" text-anchor="middle" font-family="Arial" font-size="12" fill="#6a1b9a" font-weight="bold">Both processes occur in the SAME mesophyll cell — separated in time!</text>

  <!-- Comparison table -->
  <rect x="25" y="408" width="550" height="85" rx="8" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
  <text x="300" y="428" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">CAM vs C4 vs C3</text>

  <line x1="25" y1="435" x2="575" y2="435" stroke="#ccc" stroke-width="1"/>

  <text x="55" y="455" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Feature</text>
  <text x="170" y="455" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">C3</text>
  <text x="305" y="455" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">C4</text>
  <text x="470" y="455" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">CAM</text>

  <line x1="25" y1="463" x2="575" y2="463" stroke="#ccc" stroke-width="1"/>

  <text x="55" y="480" font-family="Arial" font-size="8" fill="#555">CO₂ mechanism</text>
  <text x="170" y="480" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">None (direct)</text>
  <text x="305" y="480" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Spatial (Kranz)</text>
  <text x="470" y="480" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Temporal (day/night)</text>

  <text x="55" y="493" font-family="Arial" font-size="8" fill="#555">WUE</text>
  <text x="170" y="493" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Low</text>
  <text x="305" y="493" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Medium</text>
  <text x="470" y="493" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">High</text>

  <!-- Features box -->
  <rect x="25" y="505" width="550" height="60" rx="6" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="300" y="525" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1a6b3c">CAM Key Features</text>
  <text x="55" y="545" font-family="Arial" font-size="9" fill="#333">• Highest water use efficiency: CAM > C4 > C3 | Stomata open at night when it's cool &amp; humid</text>
  <text x="55" y="560" font-family="Arial" font-size="9" fill="#333">• Examples: Cactus, pineapple, agave, jade plant, orchids (~7% of plant species)</text>

  <!-- Cycling arrow -->
  <path d="M300,380 Q300,420 300,430" fill="none" stroke="#6a1b9a" stroke-width="2"/>
  <text x="320" y="405" font-family="Arial" font-size="8" fill="#6a1b9a">daily cycle repeats</text>
</svg>
