<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Membrane Transport — Simple Diffusion, Facilitated Diffusion, Na⁺/K⁺ Pump</text>
  <!-- Simple Diffusion -->
  <rect x="15" y="40" width="185" height="180" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="107" y="60" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1a6b3c">Simple Diffusion</text>
  <rect x="25" y="70" width="165" height="30" rx="4" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
  <text x="107" y="90" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">HIGH concentration</text>
  <line x1="107" y1="100" x2="107" y2="115" stroke="#333" stroke-width="1.5"/>
  <text x="107" y="112" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">↓ gradient</text>
  <rect x="25" y="130" width="165" height="30" rx="4" fill="#c8e6c9" stroke="#333" stroke-width="1.5"/>
  <text x="107" y="150" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">LOW concentration</text>
  <circle cx="60" cy="78" r="3" fill="#e53935"/><circle cx="80" cy="78" r="3" fill="#e53935"/>
  <circle cx="100" cy="78" r="3" fill="#e53935"/><circle cx="120" cy="78" r="3" fill="#e53935"/>
  <circle cx="70" cy="140" r="3" fill="#e53935"/><circle cx="90" cy="140" r="3" fill="#e53935"/>
  <circle cx="110" cy="140" r="3" fill="#e53935"/>
  <text x="107" y="175" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">No protein | No ATP</text>
  <text x="107" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">O₂, CO₂, small nonpolar</text>
  <text x="107" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Not saturable</text>
  <!-- Facilitated Diffusion -->
  <rect x="208" y="40" width="185" height="180" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="300" y="60" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">Facilitated Diffusion</text>
  <rect x="218" y="70" width="165" height="25" rx="4" fill="#bbdefb" stroke="#333" stroke-width="1.5"/>
  <text x="300" y="87" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">HIGH concentration</text>
  <rect x="260" y="95" width="80" height="35" rx="5" fill="#64b5f6" stroke="#1565c0" stroke-width="2"/>
  <line x1="290" y1="105" x2="300" y2="105" stroke="#fff" stroke-width="2"/>
  <line x1="290" y1="115" x2="300" y2="115" stroke="#fff" stroke-width="2"/>
  <text x="300" y="112" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Channel</text>
  <rect x="218" y="145" width="165" height="25" rx="4" fill="#e3f2fd" stroke="#333" stroke-width="1.5"/>
  <text x="300" y="162" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">LOW concentration</text>
  <text x="300" y="180" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Channel OR Carrier protein</text>
  <text x="300" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">No ATP required</text>
  <text x="300" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Saturable (carrier), gated</text>
  <!-- Na+/K+ Pump -->
  <rect x="401" y="40" width="185" height="180" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="493" y="60" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#c62828">Active Transport</text>
  <text x="493" y="75" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Na⁺/K⁺ Pump</text>
  <rect x="411" y="85" width="165" height="25" rx="4" fill="#ffcdd2" stroke="#333" stroke-width="1.5"/>
  <text x="493" y="102" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">LOW concentration</text>
  <rect x="445" y="108" width="95" height="35" rx="5" fill="#ef9a9a" stroke="#e53935" stroke-width="2"/>
  <text x="493" y="125" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#fff">PUMP</text>
  <text x="493" y="138" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">ATP→ADP+Pi</text>
  <rect x="411" y="150" width="165" height="25" rx="4" fill="#ffebee" stroke="#333" stroke-width="1.5"/>
  <text x="493" y="167" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">HIGH concentration</text>
  <text x="493" y="185" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">3 Na⁺ OUT | 2 K⁺ IN</text>
  <text x="493" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">ATP required</text>
  <text x="493" y="215" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Against gradient</text>
  <!-- Comparison table -->
  <rect x="20" y="235" width="560" height="60" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1.5"/>
  <text x="110" y="255" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">Simple Diffusion</text>
  <text x="110" y="272" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">No protein | No ATP | Down gradient | Not saturable</text>
  <text x="300" y="255" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Facilitated Diffusion</text>
  <text x="300" y="272" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Channel/Carrier | No ATP | Down gradient | Saturable</text>
  <text x="490" y="255" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e53935">Active Transport</text>
  <text x="490" y="272" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Pump | ATP required | Against gradient | Saturable</text>
  <!-- NaK pump detail -->
  <rect x="50" y="310" width="500" height="60" rx="6" fill="#fff3e0" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="300" y="330" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e65100">Na⁺/K⁺-ATPase Cycle (per ATP): 3 Na⁺ bind (cytosol) → ATP hydrolyzed → phosphorylation → 3 Na⁺ out → 2 K⁺ bind (extracellular) → dephosphorylation → 2 K⁺ in</text>
  <text x="300" y="350" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Electrogenic: net +1 out per cycle. Maintains resting membrane potential (~−70 mV). Creates gradients for secondary active transport.</text>
</svg>