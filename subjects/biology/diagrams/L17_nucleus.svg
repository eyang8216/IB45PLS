<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Nucleus — Structure &amp; Function</text>

  <!-- Outer membrane -->
  <ellipse cx="300" cy="200" rx="210" ry="140" fill="#f5f5f5" stroke="#1565c0" stroke-width="3"/>
  <!-- Inner membrane -->
  <ellipse cx="300" cy="200" rx="200" ry="132" fill="#fafafa" stroke="#1a6b3c" stroke-width="2.5"/>

  <!-- Nuclear pores -->
  <g fill="#1565c0">
    <circle cx="140" cy="140" r="8" opacity="0.7"/><circle cx="140" cy="140" r="3" fill="#fff"/>
    <circle cx="200" cy="100" r="8" opacity="0.7"/><circle cx="200" cy="100" r="3" fill="#fff"/>
    <circle cx="400" cy="100" r="8" opacity="0.7"/><circle cx="400" cy="100" r="3" fill="#fff"/>
    <circle cx="460" cy="140" r="8" opacity="0.7"/><circle cx="460" cy="140" r="3" fill="#fff"/>
    <circle cx="140" cy="260" r="8" opacity="0.7"/><circle cx="140" cy="260" r="3" fill="#fff"/>
    <circle cx="460" cy="260" r="8" opacity="0.7"/><circle cx="460" cy="260" r="3" fill="#fff"/>
    <circle cx="200" cy="300" r="8" opacity="0.7"/><circle cx="200" cy="300" r="3" fill="#fff"/>
    <circle cx="400" cy="300" r="8" opacity="0.7"/><circle cx="400" cy="300" r="3" fill="#fff"/>
  </g>
  <text x="140" y="280" font-family="Arial" font-size="8" fill="#1565c0">Nuclear pore</text>

  <!-- Nucleolus -->
  <circle cx="300" cy="200" r="50" fill="#e53935" opacity="0.6"/>
  <text x="300" y="195" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#fff">Nucleolus</text>
  <text x="300" y="215" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">rRNA synthesis</text>

  <!-- Chromatin -->
  <g stroke="#6a1b9a" stroke-width="2" fill="none" opacity="0.6">
    <path d="M180,160 Q200,170 190,190 Q220,180 230,210 Q210,230 240,240"/>
    <path d="M350,150 Q370,170 360,190 Q390,180 380,210 Q400,200 410,230"/>
    <path d="M250,250 Q270,260 260,280 Q290,270 300,290"/>
    <path d="M170,220 Q160,240 180,250"/>
    <path d="M420,240 Q440,250 430,270"/>
  </g>
  <text x="410" y="160" font-family="Arial" font-size="10" fill="#6a1b9a">Chromatin</text>

  <!-- Labels -->
  <text x="150" y="100" font-family="Arial" font-size="10" fill="#1565c0">Outer membrane</text>
  <line x1="195" y1="100" x2="245" y2="115" stroke="#1565c0" stroke-width="1"/>
  <text x="430" y="110" font-family="Arial" font-size="10" fill="#1a6b3c">Inner membrane</text>
  <line x1="435" y1="115" x2="380" y2="130" stroke="#1a6b3c" stroke-width="1"/>

  <text x="300" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Nuclear envelope = double membrane</text>

  <!-- Side annotations -->
  <text x="520" y="185" font-family="Arial" font-size="10" fill="#333">Pores:</text>
  <text x="520" y="200" font-family="Arial" font-size="10" fill="#333">mRNA export</text>
  <text x="520" y="215" font-family="Arial" font-size="10" fill="#333">Protein import</text>
  <text x="520" y="230" font-family="Arial" font-size="10" fill="#333">~9 nm diameter</text>

  <text x="520" y="270" font-family="Arial" font-size="10" fill="#333">Nucleolus:</text>
  <text x="520" y="285" font-family="Arial" font-size="10" fill="#333">rRNA + proteins</text>
  <text x="520" y="300" font-family="Arial" font-size="10" fill="#333">→ ribosome subunits</text>

  <text x="50" y="340" font-family="Arial" font-size="10" fill="#333">Chromatin: DNA + histones</text>
  <text x="50" y="355" font-family="Arial" font-size="10" fill="#333">Euchromatin (active) / Heterochromatin (condensed)</text>
</svg>