<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 540" width="600" height="540">
  <rect width="600" height="540" fill="#fff"/>
  <text x="300" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#333">ATP Synthase — Molecular Turbine (Complex V)</text>

  <!-- F0 in membrane -->
  <rect x="150" y="280" width="300" height="70" rx="6" fill="#fff9c4" stroke="#ff8f00" stroke-width="2"/>
  <text x="300" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ff8f00" font-weight="bold">Inner Mitochondrial Membrane</text>

  <!-- F0 subunit -->
  <rect x="240" y="270" width="120" height="40" rx="8" fill="#ffcc80" stroke="#ff8f00" stroke-width="2"/>
  <text x="300" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333" font-weight="bold">F₀ (rotor)</text>

  <!-- c-ring - circle of small circles -->
  <circle cx="260" cy="288" r="6" fill="none" stroke="#ff8f00" stroke-width="1.5"/>
  <circle cx="278" cy="283" r="6" fill="none" stroke="#ff8f00" stroke-width="1.5"/>
  <circle cx="296" cy="283" r="6" fill="none" stroke="#ff8f00" stroke-width="1.5"/>
  <circle cx="314" cy="283" r="6" fill="none" stroke="#ff8f00" stroke-width="1.5"/>
  <circle cx="332" cy="288" r="6" fill="none" stroke="#ff8f00" stroke-width="1.5"/>

  <!-- a subunit -->
  <rect x="345" y="275" width="15" height="30" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="370" y="295" font-family="Arial, sans-serif" font-size="8" fill="#555">a</text>

  <!-- Stalk (γ subunit) -->
  <line x1="300" y1="270" x2="300" y2="230" stroke="#333" stroke-width="3"/>
  <text x="310" y="252" font-family="Arial, sans-serif" font-size="9" fill="#333">γ-stalk</text>

  <!-- F1 head -->
  <ellipse cx="300" cy="200" rx="70" ry="40" fill="#81c784" stroke="#43a047" stroke-width="2"/>
  <text x="300" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#333" font-weight="bold">F₁ (catalytic head)</text>
  <text x="300" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">3 αβ dimers (hexamer)</text>

  <!-- β subunits -->
  <ellipse cx="270" cy="195" rx="18" ry="12" fill="#a5d6a7" stroke="#43a047" stroke-width="1.5"/>
  <text x="270" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">β-ATP</text>
  <ellipse cx="300" cy="185" rx="18" ry="12" fill="#c8e6c9" stroke="#43a047" stroke-width="1.5"/>
  <text x="300" y="189" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">β-ADP</text>
  <ellipse cx="330" cy="195" rx="18" ry="12" fill="#a5d6a7" stroke="#43a047" stroke-width="1.5"/>
  <text x="330" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">β-empty</text>

  <!-- Rotation info -->
  <path d="M450,220 Q500,220 520,240 Q540,260 520,280 Q500,300 450,300" fill="none" stroke="#e53935" stroke-width="2"/>
  <text x="530" y="265" font-family="Arial, sans-serif" font-size="10" fill="#e53935" font-weight="bold">H⁺ flow</text>
  <text x="530" y="280" font-family="Arial, sans-serif" font-size="9" fill="#e53935">drives</text>
  <text x="530" y="295" font-family="Arial, sans-serif" font-size="9" fill="#e53935">rotation</text>

  <!-- H+ flow through F0 -->
  <path d="M370,290 Q390,290 390,280" stroke="#43a047" stroke-width="2" marker-end="url(#ag2)"/>
  <defs><marker id="ag2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#43a047"/></marker></defs>

  <!-- Binding change mechanism -->
  <rect x="40" y="370" width="520" height="60" rx="6" fill="none" stroke="#43a047" stroke-width="1.5"/>
  <text x="300" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#43a047" font-weight="bold">Boyer's Binding Change Mechanism</text>
  <text x="60" y="412" font-family="Arial, sans-serif" font-size="10" fill="#333">Each of the 3 β-subunits cycles through 3 conformations: <tspan font-weight="bold">Open</tspan> (ADP+Pi bind) → <tspan font-weight="bold">Loose</tspan> (substrates held) → <tspan font-weight="bold">Tight</tspan> (ATP formed spontaneously)</text>
  <text x="60" y="425" font-family="Arial, sans-serif" font-size="9" fill="#555">The γ-stalk rotates 120° per H⁺ passing through F₀; energy is used for conformational change, not ATP synthesis directly</text>

  <!-- Summary stats -->
  <rect x="120" y="450" width="360" height="80" rx="6" fill="none" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="300" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333" font-weight="bold">Key Numbers</text>
  <text x="300" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">~10-14 c-subunits in c-ring → ~3-4 H⁺ per rotation → ~1 ATP per ~3-4 H⁺</text>
  <text x="300" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">~100 ATP molecules synthesized per second per ATP synthase molecule</text>
  <text x="300" y="524" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Rotational speed: ~6,000-8,000 rpm</text>
</svg>
