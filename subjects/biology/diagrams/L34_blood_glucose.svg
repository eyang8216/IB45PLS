<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Blood Glucose Regulation — Negative Feedback</text>

  <!-- HIGH glucose -->
  <rect x="20" y="45" width="250" height="145" rx="8" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
  <text x="145" y="65" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">↑ Blood Glucose (after meal)</text>

  <text x="40" y="85" font-family="Arial" font-size="10" fill="#333">Pancreas (β-cells) detects</text>
  <text x="40" y="100" font-family="Arial" font-size="10" fill="#333">high glucose → releases</text>
  <text x="40" y="115" font-family="Arial" font-size="10" font-weight="bold" fill="#e53935">INSULIN</text>

  <text x="40" y="135" font-family="Arial" font-size="10" fill="#333">Insulin effects:</text>
  <text x="50" y="150" font-family="Arial" font-size="9" fill="#555">• GLUT4 translocation to membrane</text>
  <text x="50" y="163" font-family="Arial" font-size="9" fill="#555">• Glucose uptake by cells</text>
  <text x="50" y="176" font-family="Arial" font-size="9" fill="#555">• Glycogenesis (glucose→glycogen) in liver</text>

  <!-- LOW glucose -->
  <rect x="330" y="45" width="250" height="145" rx="8" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="455" y="65" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">↓ Blood Glucose (fasting)</text>

  <text x="350" y="85" font-family="Arial" font-size="10" fill="#333">Pancreas (α-cells) detects</text>
  <text x="350" y="100" font-family="Arial" font-size="10" fill="#333">low glucose → releases</text>
  <text x="350" y="115" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">GLUCAGON</text>

  <text x="350" y="135" font-family="Arial" font-size="10" fill="#333">Glucagon effects:</text>
  <text x="360" y="150" font-family="Arial" font-size="9" fill="#555">• Glycogenolysis (glycogen→glucose)</text>
  <text x="360" y="163" font-family="Arial" font-size="9" fill="#555">• Gluconeogenesis (new glucose)</text>
  <text x="360" y="176" font-family="Arial" font-size="9" fill="#555">• Liver releases glucose into blood</text>

  <!-- FEEDBACK LOOP -->
  <rect x="80" y="210" width="440" height="150" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="230" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Negative Feedback Loop</text>

  <!-- Set point -->
  <ellipse cx="300" cy="290" rx="55" ry="25" fill="#ff8f00" opacity="0.7"/>
  <text x="300" y="287" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">Set Point</text>
  <text x="300" y="302" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">~5 mM glucose</text>

  <!-- High pathway -->
  <path d="M160,290 Q160,260 200,250" fill="none" stroke="#e53935" stroke-width="2"/>
  <polygon points="200,245 208,256 196,252" fill="#e53935"/>
  <text x="125" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">↑ glucose</text>
  <text x="125" y="268" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">→ insulin</text>

  <!-- Low pathway -->
  <path d="M440,290 Q440,260 400,250" fill="none" stroke="#1a6b3c" stroke-width="2"/>
  <polygon points="400,245 396,256 408,252" fill="#1a6b3c"/>
  <text x="475" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">↓ glucose</text>
  <text x="475" y="268" text-anchor="middle" font-family="Arial" font-size="8" fill="#1a6b3c">→ glucagon</text>

  <!-- Return arrows -->
  <path d="M200,330 Q300,340 300,315" fill="none" stroke="#e53935" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M400,330 Q300,340 300,315" fill="none" stroke="#1a6b3c" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="300" y="348" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Both bring glucose back to set point</text>
</svg>