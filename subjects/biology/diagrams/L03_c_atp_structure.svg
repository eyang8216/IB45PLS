### L03_c: ATP Structure ###
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" style="background:#fff">
  <defs><linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a6b3c"/><stop offset="100%" stop-color="#43a047"/></linearGradient></defs>
  <rect width="600" height="520" fill="#fff"/>
  <rect x="0" y="0" width="600" height="42" fill="url(#hdr)"/>
  <text x="300" y="28" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="16">ATP (Adenosine Triphosphate) — The Energy Currency</text>

  <!-- Adenine base — purine -->
  <polygon points="180,80 220,80 230,120 220,160 180,160 170,120" fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
  <polygon points="220,80 260,80 270,115 260,150 230,120 220,80" fill="#bbdefb" stroke="#1565c0" stroke-width="3"/>
  <text x="200" y="128" text-anchor="middle" fill="#1565c0" font-family="Arial" font-weight="bold" font-size="12">Adenine</text>
  <text x="235" y="115" text-anchor="middle" fill="#1565c0" font-family="Arial" font-size="9">purine</text>

  <!-- Ribose sugar -->
  <polygon points="180,170 220,170 235,200 220,230 180,230 165,200" fill="#fff9c4" stroke="#ff8f00" stroke-width="3"/>
  <text x="200" y="205" text-anchor="middle" fill="#e65100" font-family="Arial" font-weight="bold" font-size="12">Ribose</text>

  <!-- Connection adenine to ribose (1′ bond) -->
  <line x1="200" y1="160" x2="200" y2="170" stroke="#333" stroke-width="2.5"/>
  <text x="215" y="168" fill="#666" font-family="Arial" font-size="9">1′</text>

  <!-- Phosphate chain from 5′ carbon -->
  <text x="156" y="232" fill="#666" font-family="Arial" font-size="10">5′</text>
  <line x1="165" y1="200" x2="100" y2="200" stroke="#333" stroke-width="2.5"/>

  <!-- Alpha phosphate -->
  <circle cx="85" cy="200" r="18" fill="#ffcdd2" stroke="#e53935" stroke-width="2.5"/>
  <text x="85" y="196" text-anchor="middle" fill="#c62828" font-family="Arial" font-weight="bold" font-size="11">Pα</text>
  <text x="85" y="228" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">α</text>

  <!-- Beta phosphate -->
  <line x1="67" y1="200" x2="45" y2="200" stroke="#333" stroke-width="2"/>
  <circle cx="30" cy="200" r="18" fill="#ffcdd2" stroke="#e53935" stroke-width="2.5"/>
  <text x="30" y="196" text-anchor="middle" fill="#c62828" font-family="Arial" font-weight="bold" font-size="11">Pβ</text>
  <text x="30" y="228" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">β</text>

  <!-- Gamma phosphate -->
  <line x1="12" y1="200" x2="5" y2="162" stroke="#333" stroke-width="2"/>
  <circle cx="5" cy="148" r="18" fill="#ffcdd2" stroke="#e53935" stroke-width="2.5"/>
  <text x="5" y="144" text-anchor="middle" fill="#c62828" font-family="Arial" font-weight="bold" font-size="11">Pγ</text>
  <text x="5" y="176" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">γ</text>

  <!-- High-energy bond indicator -->
  <line x1="12" y1="184" x2="48" y2="184" stroke="#e53935" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="60" y="178" fill="#e53935" font-family="Arial" font-size="10" font-weight="bold">~ high-energy bond</text>

  <!-- Hydrolysis arrow -->
  <path d="M50,260 L50,300" stroke="#e53935" stroke-width="3" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#e53935"/></marker></defs>
  <text x="60" y="285" fill="#e53935" font-family="Arial" font-size="12" font-weight="bold">ATP → ADP + Pi</text>
  <text x="65" y="302" fill="#c62828" font-family="Arial" font-size="11">ΔG = −30.5 kJ mol⁻¹</text>

  <!-- Right side: summary -->
  <rect x="320" y="65" width="260" height="200" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="450" y="90" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="13">ATP — Nucleotide Derivative</text>
  <text x="340" y="115" fill="#333" font-family="Arial" font-size="11">• Adenine (nitrogenous base)</text>
  <text x="340" y="135" fill="#333" font-family="Arial" font-size="11">• Ribose (pentose sugar, NOT deoxyribose)</text>
  <text x="340" y="155" fill="#333" font-family="Arial" font-size="11">• Three phosphate groups (α, β, γ)</text>
  <line x1="340" y1="165" x2="560" y2="165" stroke="#ddd" stroke-width="1"/>
  <text x="340" y="185" fill="#1a6b3c" font-family="Arial" font-size="11" font-weight="bold">Why so much energy?</text>
  <text x="340" y="205" fill="#666" font-family="Arial" font-size="11">Three phosphate groups repel each</text>
  <text x="340" y="222" fill="#666" font-family="Arial" font-size="11">other (all negative charges). Breaking</text>
  <text x="340" y="239" fill="#666" font-family="Arial" font-size="11">off one releases electrostatic repulsion.</text>

  <!-- ATP cycle -->
  <rect x="50" y="330" width="500" height="170" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="300" y="355" text-anchor="middle" fill="#1a6b3c" font-family="Arial" font-weight="bold" font-size="14">ATP ↔ ADP + Pi Cycle</text>

  <text x="120" y="390" text-anchor="middle" fill="#e53935" font-family="Arial" font-weight="bold" font-size="13">HYDROLYSIS</text>
  <text x="120" y="410" text-anchor="middle" fill="#666" font-family="Arial" font-size="11">ATP + H₂O → ADP + Pi</text>
  <text x="120" y="428" text-anchor="middle" fill="#666" font-family="Arial" font-size="11">Releases ~30.5 kJ/mol</text>
  <text x="120" y="446" text-anchor="middle" fill="#666" font-family="Arial" font-size="11">Powers: synthesis, transport, movement</text>

  <text x="300" y="400" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="18">⟷</text>

  <text x="470" y="390" text-anchor="middle" fill="#1a6b3c" font-family="Arial" font-weight="bold" font-size="13">PHOSPHORYLATION</text>
  <text x="470" y="410" text-anchor="middle" fill="#666" font-family="Arial" font-size="11">ADP + Pi → ATP + H₂O</text>
  <text x="470" y="428" text-anchor="middle" fill="#666" font-family="Arial" font-size="11">Catalyzed by ATP synthase</text>
  <text x="470" y="446" text-anchor="middle" fill="#666" font-family="Arial" font-size="11">Energy from respiration/photosynthesis</text>
</svg>