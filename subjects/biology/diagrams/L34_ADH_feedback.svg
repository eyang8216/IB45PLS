<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <rect width="600" height="340" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">ADH Feedback — Osmoregulation (Negative Feedback)</text>

  <!-- Boxes in a cycle -->
  <!-- 1. Stimulus: high osmolarity -->
  <rect x="185" y="50" width="230" height="50" rx="8" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
  <text x="300" y="72" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Stimulus: ↑ Blood Osmolarity</text>
  <text x="300" y="88" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(dehydration, high salt intake)</text>

  <!-- Down arrow -->
  <line x1="300" y1="100" x2="300" y2="125" stroke="#333" stroke-width="2"/>
  <polygon points="296,125 300,132 304,125" fill="#333"/>

  <!-- 2. Osmoreceptors -->
  <rect x="185" y="130" width="230" height="45" rx="8" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="300" y="150" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Hypothalamus Osmoreceptors</text>
  <text x="300" y="165" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Detect high osmolarity → signal to pituitary</text>

  <!-- Down arrow -->
  <line x1="300" y1="175" x2="300" y2="200" stroke="#333" stroke-width="2"/>
  <polygon points="296,200 300,207 304,200" fill="#333"/>

  <!-- 3. ADH release -->
  <rect x="185" y="205" width="230" height="45" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="300" y="225" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Posterior Pituitary Releases</text>
  <text x="300" y="240" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">ADH (vasopressin) into blood</text>

  <!-- Down arrow -->
  <line x1="300" y1="250" x2="300" y2="275" stroke="#333" stroke-width="2"/>
  <polygon points="296,275 300,282 304,275" fill="#333"/>

  <!-- 4. Effect -->
  <rect x="185" y="278" width="230" height="45" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="300" y="298" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Collecting Duct: Aquaporins</text>
  <text x="300" y="313" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Inserted → H₂O reabsorbed → urine concentrated</text>

  <!-- Return arrow (feedback) -->
  <path d="M420,300 Q550,300 550,180 Q550,75 420,75" fill="none" stroke="#1a6b3c" stroke-width="2.5" stroke-dasharray="6,3"/>

  <text x="530" y="185" font-family="Arial" font-size="10" fill="#1a6b3c">↓ Blood</text>
  <text x="530" y="200" font-family="Arial" font-size="10" fill="#1a6b3c">Osmolarity</text>
  <text x="530" y="215" font-family="Arial" font-size="9" fill="#555">(return to</text>
  <text x="530" y="228" font-family="Arial" font-size="9" fill="#555">normal)</text>

  <!-- Left side: LOW osmolarity -->
  <rect x="20" y="50" width="145" height="150" rx="8" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="92" y="72" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1a6b3c">↓ Low Osmolarity</text>
  <text x="92" y="92" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">(over-hydration)</text>
  <text x="92" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Osmoreceptors</text>
  <text x="92" y="130" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">detect → inhibit</text>
  <text x="92" y="145" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">ADH release</text>
  <text x="92" y="165" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">→ Less aquaporins</text>
  <text x="92" y="180" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">→ Dilute urine</text>
  <text x="92" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">→ Water excreted</text>

  <!-- Aquaporin diagram (right) -->
  <rect x="420" y="50" width="140" height="150" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="490" y="70" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Aquaporin</text>

  <!-- Membrane -->
  <rect x="440" y="85" width="100" height="10" rx="2" fill="#43a047" opacity="0.7"/>
  <text x="490" y="80" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Membrane</text>

  <!-- Aquaporin channel -->
  <rect x="475" y="70" width="10" height="40" rx="3" fill="#1565c0" opacity="0.7"/>
  <rect x="476" y="71" width="8" height="38" rx="2" fill="#fff" opacity="0.5"/>

  <!-- Water molecules -->
  <g fill="#1565c0">
    <circle cx="480" cy="60" r="4"/><circle cx="480" cy="55" r="4"/>
    <circle cx="480" cy="115" r="4"/><circle cx="480" cy="122" r="4"/>
  </g>
  <line x1="480" y1="64" x2="480" y2="70" stroke="#1565c0" stroke-width="1"/>
  <line x1="480" y1="110" x2="480" y2="111" stroke="#1565c0" stroke-width="1"/>

  <text x="490" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">ADH triggers</text>
  <text x="490" y="155" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">vesicle fusion</text>
  <text x="490" y="170" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">→ aquaporins</text>
  <text x="490" y="185" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">insert into membrane</text>
</svg>