<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <rect width="600" height="300" fill="#fff"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Sturtevant's First Genetic Map (1913) — Drosophila X Chromosome</text>

  <!-- Chromosome line -->
  <line x1="80" y1="140" x2="530" y2="140" stroke="#333" stroke-width="5" stroke-linecap="round"/>

  <!-- Centromere -->
  <ellipse cx="480" cy="140" rx="8" ry="14" fill="#999"/>
  <text x="480" y="160" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Centromere</text>

  <!-- Marker genes with arrows -->
  <!-- yellow (0.0) -->
  <line x1="80" y1="120" x2="80" y2="160" stroke="#e53935" stroke-width="2"/>
  <circle cx="80" cy="120" r="5" fill="#e53935"/>
  <text x="80" y="108" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">yellow</text>
  <text x="80" y="175" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">0.0</text>

  <!-- white (1.5) -->
  <line x1="120" y1="120" x2="120" y2="160" stroke="#1565c0" stroke-width="2"/>
  <circle cx="120" cy="120" r="5" fill="#1565c0"/>
  <text x="120" y="108" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">white</text>
  <text x="120" y="175" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">1.5</text>

  <!-- vermilion (33.0) -->
  <line x1="320" y1="120" x2="320" y2="160" stroke="#e53935" stroke-width="2"/>
  <circle cx="320" cy="120" r="5" fill="#e53935"/>
  <text x="320" y="108" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">vermilion</text>
  <text x="320" y="175" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">33.0</text>

  <!-- miniature (36.1) -->
  <line x1="380" y1="120" x2="380" y2="160" stroke="#ff8f00" stroke-width="2"/>
  <circle cx="380" cy="120" r="5" fill="#ff8f00"/>
  <text x="380" y="108" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#ff8f00">miniature</text>
  <text x="380" y="175" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">36.1</text>

  <!-- rudimentary (54.5) -->
  <line x1="510" y1="120" x2="510" y2="160" stroke="#6a1b9a" stroke-width="2"/>
  <circle cx="510" cy="120" r="5" fill="#6a1b9a"/>
  <text x="510" y="108" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">rudimentary</text>
  <text x="510" y="175" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">54.5</text>

  <!-- Distance brackets -->
  <line x1="82" y1="185" x2="118" y2="185" stroke="#888" stroke-width="1"/>
  <line x1="82" y1="182" x2="82" y2="188" stroke="#888" stroke-width="1"/>
  <line x1="118" y1="182" x2="118" y2="188" stroke="#888" stroke-width="1"/>
  <text x="100" y="196" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">1.5 cM</text>

  <line x1="122" y1="185" x2="318" y2="185" stroke="#888" stroke-width="1"/>
  <text x="220" y="196" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">31.5 cM</text>

  <!-- Axis label -->
  <text x="300" y="230" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">Map Distance in centiMorgans (cM)</text>

  <!-- Key -->
  <rect x="30" y="248" width="540" height="42" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="265" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">1% recombination frequency = 1 map unit = 1 cM | Max RF = 50% | Map distances are additive (mostly)</text>
  <text x="300" y="282" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Sturtevant (Morgan's student, age 19) — first to map genes using RF data → founded the field of genetic mapping.</text>
</svg>
