<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" width="600" height="440">
  <rect width="600" height="440" fill="#fff"/>
  <text x="300" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#333">Mitochondrion Structure — Cross Section</text>

  <!-- Outer membrane -->
  <ellipse cx="300" cy="255" rx="200" ry="140" fill="#e8f5e9" stroke="#43a047" stroke-width="3"/>
  <text x="500" y="150" font-family="Arial, sans-serif" font-size="11" fill="#43a047" font-weight="bold">Outer Membrane</text>
  <line x1="480" y1="155" x2="440" y2="180" stroke="#43a047" stroke-width="1"/>

  <!-- Inner membrane -->
  <ellipse cx="300" cy="255" rx="170" ry="115" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="3"/>

  <!-- Cristae -->
  <path d="M170,255 Q190,230 210,255 Q230,235 250,255 Q270,225 290,255 Q310,235 330,255 Q350,225 370,255 Q390,235 410,255 Q430,230 460,255" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="520" y="215" font-family="Arial, sans-serif" font-size="11" fill="#1a6b3c" font-weight="bold">Inner Membrane</text>
  <line x1="500" y1="220" x2="430" y2="240" stroke="#1a6b3c" stroke-width="1"/>
  <text x="525" y="232" font-family="Arial, sans-serif" font-size="10" fill="#1a6b3c">with Cristae</text>

  <!-- Matrix label -->
  <text x="300" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1565c0" font-weight="bold">Matrix</text>
  <text x="300" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1565c0">Krebs Cycle enzymes</text>
  <text x="300" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1565c0">DNA, ribosomes (70S)</text>

  <!-- Intermembrane space -->
  <text x="140" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ff8f00" font-weight="bold">Intermembrane</text>
  <text x="140" y="209" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ff8f00">Space</text>
  <text x="140" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ff8f00">[H⁺] high</text>

  <!-- ETC complexes on cristae -->
  <circle cx="260" cy="245" r="5" fill="#e53935"/>
  <text x="260" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#e53935">I</text>
  <circle cx="300" cy="242" r="5" fill="#e53935"/>
  <text x="300" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#e53935">II</text>
  <circle cx="340" cy="245" r="5" fill="#e53935"/>
  <text x="340" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#e53935">III</text>
  <circle cx="380" cy="248" r="5" fill="#e53935"/>
  <text x="380" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#e53935">IV</text>

  <!-- ATP synthase -->
  <ellipse cx="220" cy="250" rx="8" ry="5" fill="#ff8f00"/>
  <text x="220" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ff8f00">ATP synthase</text>

  <!-- H+ arrows -->
  <path d="M370,248 Q380,235 385,220" fill="none" stroke="#e53935" stroke-width="1.5" marker-end="url(#ah)"/>
  <path d="M340,245 Q345,230 350,218" fill="none" stroke="#e53935" stroke-width="1.5" marker-end="url(#ah)"/>
  <defs><marker id="ah" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#e53935"/></marker></defs>
  <text x="395" y="215" font-family="Arial, sans-serif" font-size="8" fill="#e53935">H⁺ pumped out</text>

  <!-- Structure-function table -->
  <rect x="30" y="360" width="540" height="72" rx="6" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333" font-weight="bold">Structure–Function Relationships</text>
  <line x1="145" y1="388" x2="145" y2="425" stroke="#ddd" stroke-width="1"/>
  <line x1="340" y1="388" x2="340" y2="425" stroke="#ddd" stroke-width="1"/>
  <text x="85" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a6b3c" font-weight="bold">Cristae</text>
  <text x="85" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">↑ SA for ETC/ATP synthase</text>
  <text x="240" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1565c0" font-weight="bold">Matrix</text>
  <text x="240" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Contains Krebs cycle / TCA</text>
  <text x="440" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ff8f00" font-weight="bold">Small IMS Volume</text>
  <text x="440" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Rapid H⁺ gradient buildup</text>
</svg>
