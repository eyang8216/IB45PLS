<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Facilitated Diffusion: Channel &amp; Carrier Proteins</text>

  <!-- Membrane -->
  <g fill="#1a6b3c"><circle cx="40" cy="150" r="7"/><circle cx="80" cy="150" r="7"/><circle cx="120" cy="150" r="7"/><circle cx="160" cy="150" r="7"/><circle cx="200" cy="150" r="7"/><circle cx="280" cy="150" r="7"/><circle cx="320" cy="150" r="7"/><circle cx="360" cy="150" r="7"/><circle cx="440" cy="150" r="7"/><circle cx="480" cy="150" r="7"/><circle cx="520" cy="150" r="7"/><circle cx="560" cy="150" r="7"/></g>
  <g stroke="#1a6b3c" stroke-width="2" fill="none"><line x1="40" y1="150" x2="40" y2="185"/><line x1="80" y1="150" x2="80" y2="185"/><line x1="120" y1="150" x2="120" y2="185"/><line x1="160" y1="150" x2="160" y2="185"/><line x1="200" y1="150" x2="200" y2="185"/><line x1="280" y1="150" x2="280" y2="185"/><line x1="320" y1="150" x2="320" y2="185"/><line x1="360" y1="150" x2="360" y2="185"/><line x1="440" y1="150" x2="440" y2="185"/><line x1="480" y1="150" x2="480" y2="185"/><line x1="520" y1="150" x2="520" y2="185"/><line x1="560" y1="150" x2="560" y2="185"/></g>
  <g stroke="#43a047" stroke-width="2" fill="none"><line x1="40" y1="185" x2="40" y2="220"/><line x1="80" y1="185" x2="80" y2="220"/><line x1="120" y1="185" x2="120" y2="220"/><line x1="160" y1="185" x2="160" y2="220"/><line x1="200" y1="185" x2="200" y2="220"/><line x1="280" y1="185" x2="280" y2="220"/><line x1="320" y1="185" x2="320" y2="220"/><line x1="360" y1="185" x2="360" y2="220"/><line x1="440" y1="185" x2="440" y2="220"/><line x1="480" y1="185" x2="480" y2="220"/><line x1="520" y1="185" x2="520" y2="220"/><line x1="560" y1="185" x2="560" y2="220"/></g>
  <g fill="#43a047"><circle cx="40" cy="220" r="7"/><circle cx="80" cy="220" r="7"/><circle cx="120" cy="220" r="7"/><circle cx="160" cy="220" r="7"/><circle cx="200" cy="220" r="7"/><circle cx="280" cy="220" r="7"/><circle cx="320" cy="220" r="7"/><circle cx="360" cy="220" r="7"/><circle cx="440" cy="220" r="7"/><circle cx="480" cy="220" r="7"/><circle cx="520" cy="220" r="7"/><circle cx="560" cy="220" r="7"/></g>

  <!-- CHANNEL PROTEIN (left side) -->
  <g fill="#1565c0" stroke="#1565c0" stroke-width="2">
    <rect x="93" y="146" width="54" height="78" rx="5" fill-opacity="0.85"/>
    <rect x="103" y="146" width="34" height="78" rx="3" fill="#fff" fill-opacity="0.9"/>
    <text x="120" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Channel</text>
    <text x="120" y="234" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Protein</text>
  </g>

  <!-- Aquaporin style: molecule going through -->
  <g fill="#e53935">
    <circle cx="120" cy="80" r="7"/><circle cx="120" cy="100" r="7"/>
    <circle cx="120" cy="170" r="7"/><circle cx="120" cy="195" r="7"/>
    <circle cx="120" cy="250" r="7"/><circle cx="120" cy="270" r="7"/>
  </g>
  <g fill="#fff" font-family="Arial" font-size="8" text-anchor="middle">
    <text x="120" y="83">Glc</text><text x="120" y="103">Glc</text>
    <text x="120" y="173">Glc</text><text x="120" y="198">Glc</text>
    <text x="120" y="253">Glc</text><text x="120" y="273">Glc</text>
  </g>
  <g stroke="#e53935" stroke-width="1.5" fill="none">
    <line x1="120" y1="107" x2="120" y2="163"/><line x1="120" y1="202" x2="120" y2="243"/>
  </g>

  <!-- CARRIER PROTEIN (right side) -->
  <g fill="#6a1b9a" fill-opacity="0.85" stroke="#6a1b9a" stroke-width="2">
    <rect x="410" y="146" width="65" height="78" rx="5"/>
    <text x="442" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Carrier</text>
    <text x="442" y="234" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Protein</text>
  </g>

  <!-- Carrier shape change depiction -->
  <path d="M420,185 Q442,165 464,185" fill="none" stroke="#fff" stroke-width="2"/>
  <path d="M420,200 Q442,230 464,200" fill="none" stroke="#fff" stroke-width="2"/>

  <!-- Molecules for carrier -->
  <circle cx="442" cy="85" r="8" fill="#ff8f00"/><text x="442" y="88" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Na⁺</text>
  <circle cx="442" cy="260" r="8" fill="#ff8f00"/><text x="442" y="263" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Na⁺</text>
  <line x1="442" y1="93" x2="442" y2="170" stroke="#ff8f00" stroke-width="1.5"/>
  <line x1="442" y1="205" x2="442" y2="252" stroke="#ff8f00" stroke-width="1.5"/>

  <!-- Arrows -->
  <defs><marker id="cd" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#333"/></marker></defs>
  <text x="120" y="62" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Channel-mediated</text>
  <text x="442" y="62" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">Carrier-mediated</text>
  <text x="300" y="62" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">PASSIVE: No ATP required · Follows concentration gradient</text>

  <!-- Key comparison -->
  <text x="120" y="310" text-anchor="middle" font-family="Arial" font-size="11" fill="#1565c0">Pore provides hydrophilic</text>
  <text x="120" y="328" text-anchor="middle" font-family="Arial" font-size="11" fill="#1565c0">pathway; faster rate</text>
  <text x="120" y="346" text-anchor="middle" font-family="Arial" font-size="11" fill="#1565c0">(e.g. aquaporins, ion channels)</text>

  <text x="442" y="310" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a">Protein changes shape</text>
  <text x="442" y="328" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a">Conformational change</text>
  <text x="442" y="346" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a">(e.g. GLUT, ion carriers)</text>
</svg>