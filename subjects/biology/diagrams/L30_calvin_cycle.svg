<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" width="600" height="750">
  <rect width="600" height="750" fill="#fff" rx="8"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1a6b3c">The Calvin Cycle — Complete Detail (per 3 CO₂)</text>

  <!-- Phase labels -->
  <rect x="30" y="55" width="160" height="24" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="110" y="72" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">Phase 1: Carboxylation</text>

  <rect x="210" y="55" width="160" height="24" rx="4" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="290" y="72" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1a6b3c">Phase 2: Reduction</text>

  <rect x="390" y="55" width="180" height="24" rx="4" fill="#fff3e0" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="480" y="72" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ff8f00">Phase 3: Regeneration</text>

  <!-- Main cycle background -->
  <circle cx="300" cy="420" r="200" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="6,3"/>

  <!-- CO2 entry -->
  <text x="300" y="105" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">3 CO₂</text>
  <line x1="300" y1="112" x2="300" y2="155" stroke="#e53935" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- RuBP -->
  <rect x="235" y="160" width="130" height="42" rx="8" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="300" y="177" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1a6b3c">3 × RuBP</text>
  <text x="300" y="194" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">(5C, 15C total)</text>

  <text x="400" y="180" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">RuBisCO</text>

  <!-- Arrow from RuBP to 3-PGA -->
  <path d="M300,202 Q300,230 240,260" fill="none" stroke="#333" stroke-width="2.5"/>

  <!-- 3-PGA -->
  <rect x="150" y="260" width="140" height="42" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="220" y="277" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">6 × 3-PGA</text>
  <text x="220" y="294" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">(3C, 18C total)</text>

  <!-- ATP input -->
  <text x="120" y="310" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">6 ATP → 6 ADP</text>
  <line x1="160" y1="308" x2="190" y2="330" stroke="#e53935" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- 1,3-BPG -->
  <rect x="150" y="340" width="140" height="42" rx="8" fill="#fff9c4" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="220" y="357" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">6 × 1,3-BPG</text>
  <text x="220" y="374" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(phosphoglycerate kinase)</text>

  <!-- NADPH input -->
  <text x="120" y="400" font-family="Arial" font-size="10" fill="#1565c0" font-weight="bold">6 NADPH → 6 NADP⁺</text>
  <line x1="160" y1="398" x2="220" y2="415" stroke="#1565c0" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- G3P -->
  <rect x="195" y="425" width="130" height="42" rx="8" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="260" y="442" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1a6b3c">6 × G3P</text>
  <text x="260" y="459" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">(3C, 18C total)</text>

  <!-- G3P export -->
  <line x1="325" y1="446" x2="400" y2="446" stroke="#e53935" stroke-width="3"/>
  <text x="365" y="438" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">1 G3P →</text>
  <rect x="400" y="428" width="95" height="36" rx="6" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
  <text x="447" y="444" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">EXITS CYCLE</text>
  <text x="447" y="458" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">→ glucose, starch</text>

  <!-- Remaining 5 G3P -->
  <text x="350" y="480" font-family="Arial" font-size="10" fill="#555">5 G3P (15C) continue</text>

  <path d="M310,467 Q360,480 340,540" fill="none" stroke="#333" stroke-width="2.5"/>

  <!-- Regeneration box -->
  <rect x="230" y="545" width="140" height="60" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="300" y="563" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Carbon Shuffling</text>
  <text x="300" y="579" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Transketolase +</text>
  <text x="300" y="593" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Transaldolase</text>

  <text x="380" y="575" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">3 ATP → 3 ADP</text>
  <line x1="370" y1="575" x2="370" y2="570" stroke="#e53935" stroke-width="2"/>

  <!-- arrow to RuBP -->
  <path d="M300,605 Q300,640 300,650 L300,160" fill="none" stroke="#333" stroke-width="2.5"/>

  <!-- Return arrow label -->
  <text x="300" y="635" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">phosphoribulokinase</text>

  <!-- Stroma label -->
  <text x="500" y="640" font-family="Arial" font-size="12" fill="#666" font-style="italic">STROMA</text>

  <!-- Summary box -->
  <rect x="25" y="660" width="550" height="80" rx="8" fill="#e8eaf6" stroke="#6a1b9a" stroke-width="2"/>
  <text x="300" y="682" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">Energy Accounting per 3 CO₂ Fixed</text>
  <text x="300" y="702" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Carboxylation: 0 ATP + 0 NADPH | Reduction: 6 ATP + 6 NADPH | Regeneration: 3 ATP</text>
  <text x="300" y="722" text-anchor="middle" font-family="Arial" font-size="12" fill="#e53935" font-weight="bold">TOTAL: 9 ATP + 6 NADPH → 1 G3P (3C) exported</text>
  <text x="300" y="737" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Per CO₂: 3 ATP + 2 NADPH</text>
</svg>
