<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" font-family="Arial, sans-serif">
  <rect width="600" height="520" fill="#fff"/>
  <text x="300" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Pressure-Flow Hypothesis: Phloem Translocation</text>

  <!-- Source (leaf) -->
  <rect x="30" y="45" width="240" height="200" rx="8" fill="#43a047" opacity="0.08" stroke="#43a047" stroke-width="1.5"/>
  <text x="150" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a6b3c">SOURCE (Leaf)</text>

  <!-- Sieve tube source -->
  <rect x="130" y="85" width="40" height="120" rx="4" fill="#81c784" opacity="0.4" stroke="#1a6b3c" stroke-width="2"/>

  <!-- Sugar loading -->
  <g transform="translate(110,100)">
    <circle cx="0" cy="0" r="10" fill="#ff8f00"/>
    <text x="0" y="4" text-anchor="middle" font-size="8" fill="#fff">Suc</text>
  </g>
  <g transform="translate(110,120)">
    <circle cx="0" cy="0" r="10" fill="#ff8f00"/>
    <text x="0" y="4" text-anchor="middle" font-size="8" fill="#fff">Suc</text>
  </g>
  <g transform="translate(110,140)">
    <circle cx="0" cy="0" r="10" fill="#ff8f00"/>
    <text x="0" y="4" text-anchor="middle" font-size="8" fill="#fff">Suc</text>
  </g>

  <text x="80" y="108" text-anchor="middle" font-size="8" fill="#ff8f00">Active</text>
  <text x="80" y="120" text-anchor="middle" font-size="8" fill="#ff8f00">loading</text>
  <text x="80" y="132" text-anchor="middle" font-size="8" fill="#ff8f00">(ATP)</text>

  <!-- Water entry from xylem -->
  <g transform="translate(180,110)">
    <circle cx="0" cy="0" r="8" fill="#1565c0" opacity="0.5"/>
    <text x="0" y="3" text-anchor="middle" font-size="6" fill="#333">H₂O</text>
  </g>
  <g transform="translate(180,135)">
    <circle cx="0" cy="0" r="8" fill="#1565c0" opacity="0.5"/>
    <text x="0" y="3" text-anchor="middle" font-size="6" fill="#333">H₂O</text>
  </g>

  <text x="200" y="108" text-anchor="middle" font-size="8" fill="#1565c0">Water enters</text>
  <text x="200" y="120" text-anchor="middle" font-size="8" fill="#1565c0">from xylem</text>
  <text x="200" y="132" text-anchor="middle" font-size="8" fill="#1565c0">(osmosis)</text>

  <text x="150" y="220" text-anchor="middle" font-size="10" fill="#1a6b3c" font-weight="bold">High ψs (very negative)</text>
  <text x="150" y="237" text-anchor="middle" font-size="10" fill="#e53935" font-weight="bold">High ψp (positive pressure)</text>

  <!-- Flow arrow -->
  <defs><marker id="flowArrow" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#ff8f00"/></marker></defs>

  <!-- Horizontal connecting sieve tube -->
  <rect x="170" y="142" width="260" height="20" rx="4" fill="#81c784" opacity="0.3" stroke="#1a6b3c" stroke-width="2"/>

  <!-- Flow arrow -->
  <line x1="210" y1="152" x2="380" y2="152" stroke="#ff8f00" stroke-width="3" marker-end="url(#flowArrow)"/>
  <text x="300" y="135" text-anchor="middle" font-size="11" fill="#ff8f00" font-weight="bold">BULK FLOW</text>
  <text x="300" y="148" text-anchor="middle" font-size="9" fill="#ff8f00">from high ψp → low ψp</text>

  <!-- Sink (root) -->
  <rect x="330" y="45" width="240" height="200" rx="8" fill="#e53935" opacity="0.08" stroke="#e53935" stroke-width="1.5"/>
  <text x="450" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#e53935">SINK (Root / Fruit)</text>

  <rect x="430" y="85" width="40" height="120" rx="4" fill="#81c784" opacity="0.4" stroke="#e53935" stroke-width="2"/>

  <!-- Sugar unloading -->
  <g transform="translate(490, 100)">
    <circle cx="0" cy="0" r="10" fill="#ff8f00" opacity="0.5"/>
    <text x="0" y="4" text-anchor="middle" font-size="7" fill="#333">Suc</text>
  </g>
  <g transform="translate(490, 130)">
    <circle cx="0" cy="0" r="10" fill="#ff8f00" opacity="0.5"/>
    <text x="0" y="4" text-anchor="middle" font-size="7" fill="#333">Suc</text>
  </g>

  <text x="510" y="110" text-anchor="middle" font-size="8" fill="#e53935">Stored or</text>
  <text x="510" y="122" text-anchor="middle" font-size="8" fill="#e53935">respired</text>

  <!-- Water leaving -->
  <g transform="translate(420, 110)">
    <circle cx="0" cy="0" r="8" fill="#1565c0" opacity="0.5"/>
    <text x="0" y="3" text-anchor="middle" font-size="6" fill="#333">H₂O</text>
  </g>
  <g transform="translate(420, 135)">
    <circle cx="0" cy="0" r="8" fill="#1565c0" opacity="0.5"/>
    <text x="0" y="3" text-anchor="middle" font-size="6" fill="#333">H₂O</text>
  </g>

  <text x="400" y="108" text-anchor="middle" font-size="8" fill="#1565c0">Water returns</text>
  <text x="400" y="120" text-anchor="middle" font-size="8" fill="#1565c0">to xylem</text>

  <text x="450" y="220" text-anchor="middle" font-size="10" fill="#e53935" font-weight="bold">Low ψs (less negative)</text>
  <text x="450" y="237" text-anchor="middle" font-size="10" fill="#1a6b3c" font-weight="bold">Low ψp (lower pressure)</text>

  <!-- Mechanism steps -->
  <rect x="30" y="270" width="540" height="240" rx="8" fill="none" stroke="#ddd" stroke-width="2"/>
  <text x="300" y="295" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Mechanism — Step by Step</text>

  <g font-size="10" fill="#333">
    <text x="55" y="320">1. At the <tspan font-weight="bold" fill="#1a6b3c">source</tspan>: Sucrose is actively loaded into sieve tubes (companion cells use ATP → H⁺ gradient → co-transport)</text>
    <text x="55" y="342">2. High [sucrose] → very <tspan font-weight="bold" fill="#e53935">negative ψs</tspan> → water enters phloem from adjacent xylem by osmosis</text>
    <text x="55" y="364">3. Water entry increases phloem sap volume → <tspan font-weight="bold" fill="#e53935">high positive ψp</tspan> builds up (like squeezing a balloon)</text>
    <text x="55" y="386">4. At the <tspan font-weight="bold" fill="#e53935">sink</tspan>: Sucrose is unloaded (used or stored) → [sucrose] decreases → ψs less negative</text>
    <text x="55" y="408">5. Water leaves phloem and returns to xylem → <tspan font-weight="bold" fill="#1a6b3c">ψp drops</tspan> at sink</text>
    <text x="55" y="430">6. <tspan font-weight="bold">Pressure gradient:</tspan> ψp(source) &gt; ψp(sink) → drives bulk flow of phloem sap from source to sink</text>
  </g>

  <text x="300" y="465" text-anchor="middle" font-size="9" fill="#666" font-style="italic">Like squeezing toothpaste from one end — pressure at source pushes sap toward the sink</text>

  <text x="300" y="495" text-anchor="middle" font-size="10" fill="#6a1b9a" font-weight="bold">Remember: ψ = ψs + ψp. At source: ψs very negative, ψp very positive. At sink: both less extreme.</text>
</svg>