### L07_a: Karyogram + Polyploidy + Sex Determination ###
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" style="background:#fff">
  <defs><linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a6b3c"/><stop offset="100%" stop-color="#43a047"/></linearGradient></defs>
  <rect width="600" height="700" fill="#fff"/>
  <rect x="0" y="0" width="600" height="42" fill="url(#hdr)"/>
  <text x="300" y="28" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="16">Karyogram, Polyploidy &amp; Sex Determination Systems</text>

  <!-- Karyogram -->
  <text x="300" y="68" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="14">Human Male Karyogram — 46,XY</text>
  <text x="300" y="85" text-anchor="middle" fill="#666" font-family="Arial" font-size="11">22 pairs of autosomes (1–22) + 1 pair of sex chromosomes (XY)</text>

  <!-- Simplified karyogram rows -->
  <g stroke="#333" stroke-width="1.5" fill="#e3f2fd">
    <!-- Row 1: pairs 1-5 -->
    <rect x="30" y="95" width="12" height="40" rx="2"/><rect x="48" y="95" width="12" height="40" rx="2"/>
    <rect x="75" y="98" width="12" height="38" rx="2"/><rect x="93" y="98" width="12" height="38" rx="2"/>
    <rect x="120" y="100" width="12" height="36" rx="2"/><rect x="138" y="100" width="12" height="36" rx="2"/>
    <rect x="165" y="103" width="12" height="34" rx="2"/><rect x="183" y="103" width="12" height="34" rx="2"/>
    <rect x="210" y="105" width="12" height="32" rx="2"/><rect x="228" y="105" width="12" height="32" rx="2"/>
    <text x="36" y="150" fill="#333" font-family="Arial" font-size="7">1</text><text x="81" y="150" fill="#333" font-family="Arial" font-size="7">2</text><text x="126" y="150" fill="#333" font-family="Arial" font-size="7">3</text><text x="171" y="150" fill="#333" font-family="Arial" font-size="7">4</text><text x="216" y="150" fill="#333" font-family="Arial" font-size="7">5</text>
  </g>
  <g stroke="#333" stroke-width="1.5" fill="#e3f2fd">
    <rect x="260" y="97" width="12" height="38" rx="2"/><rect x="278" y="97" width="12" height="38" rx="2"/>
    <rect x="305" y="100" width="12" height="36" rx="2"/><rect x="323" y="100" width="12" height="36" rx="2"/>
    <rect x="350" y="103" width="12" height="34" rx="2"/><rect x="368" y="103" width="12" height="34" rx="2"/>
    <rect x="395" y="105" width="12" height="32" rx="2"/><rect x="413" y="105" width="12" height="32" rx="2"/>
    <rect x="440" y="108" width="12" height="30" rx="2"/><rect x="458" y="108" width="12" height="30" rx="2"/>
    <text x="266" y="150" fill="#333" font-family="Arial" font-size="7">6</text><text x="311" y="150" fill="#333" font-family="Arial" font-size="7">7</text><text x="356" y="150" fill="#333" font-family="Arial" font-size="7">8</text><text x="401" y="150" fill="#333" font-family="Arial" font-size="7">9</text><text x="446" y="150" fill="#333" font-family="Arial" font-size="7">10</text>
  </g>
  <g stroke="#333" stroke-width="1.5" fill="#e3f2fd">
    <rect x="30" y="160" width="12" height="30" rx="2"/><rect x="48" y="160" width="12" height="30" rx="2"/>
    <rect x="75" y="162" width="12" height="28" rx="2"/><rect x="93" y="162" width="12" height="28" rx="2"/>
    <rect x="120" y="165" width="12" height="26" rx="2"/><rect x="138" y="165" width="12" height="26" rx="2"/>
    <text x="36" y="205" fill="#333" font-family="Arial" font-size="7">11</text><text x="81" y="205" fill="#333" font-family="Arial" font-size="7">12</text><text x="126" y="205" fill="#333" font-family="Arial" font-size="7">13</text>
  </g>
  <g stroke="#333" stroke-width="1.5" fill="#e3f2fd">
    <rect x="260" y="162" width="12" height="28" rx="2"/><rect x="278" y="162" width="12" height="28" rx="2"/>
    <rect x="305" y="165" width="12" height="26" rx="2"/><rect x="323" y="165" width="12" height="26" rx="2"/>
    <rect x="350" y="168" width="12" height="24" rx="2"/><rect x="368" y="168" width="12" height="24" rx="2"/>
    <text x="266" y="205" fill="#333" font-family="Arial" font-size="7">14</text><text x="311" y="205" fill="#333" font-family="Arial" font-size="7">15</text><text x="356" y="205" fill="#333" font-family="Arial" font-size="7">16</text>
  </g>
  <g stroke="#333" stroke-width="1.5" fill="#e3f2fd">
    <rect x="395" y="165" width="12" height="26" rx="2"/><rect x="413" y="165" width="12" height="26" rx="2"/>
    <rect x="440" y="168" width="12" height="24" rx="2"/><rect x="458" y="168" width="12" height="24" rx="2"/>
    <rect x="485" y="170" width="12" height="22" rx="2"/><rect x="503" y="170" width="12" height="22" rx="2"/>
    <text x="401" y="205" fill="#333" font-family="Arial" font-size="7">17</text><text x="446" y="205" fill="#333" font-family="Arial" font-size="7">18</text><text x="491" y="205" fill="#333" font-family="Arial" font-size="7">19</text>
  </g>
  <g stroke="#333" stroke-width="1.5" fill="#e3f2fd">
    <rect x="30" y="220" width="12" height="22" rx="2"/><rect x="48" y="220" width="12" height="22" rx="2"/>
    <rect x="75" y="222" width="12" height="20" rx="2"/><rect x="93" y="222" width="12" height="20" rx="2"/>
    <rect x="120" y="224" width="12" height="18" rx="2"/><rect x="138" y="224" width="12" height="18" rx="2"/>
    <text x="36" y="260" fill="#333" font-family="Arial" font-size="7">20</text><text x="81" y="260" fill="#333" font-family="Arial" font-size="7">21</text><text x="126" y="260" fill="#333" font-family="Arial" font-size="7">22</text>
  </g>
  <!-- Sex chromosomes -->
  <g stroke="#e53935" stroke-width="2" fill="#ffcdd2">
    <rect x="260" y="220" width="12" height="24" rx="2"/><text x="266" y="260" fill="#e53935" font-family="Arial" font-weight="bold" font-size="8">X</text>
    <rect x="300" y="230" width="10" height="14" rx="2"/><text x="305" y="260" fill="#e53935" font-family="Arial" font-weight="bold" font-size="8">Y</text>
  </g>

  <!-- Polyploidy -->
  <text x="300" y="295" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="14">Polyploidy — Extra Chromosome Sets</text>

  <rect x="20" y="310" width="180" height="130" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="110" y="335" text-anchor="middle" fill="#1a6b3c" font-family="Arial" font-weight="bold" font-size="12">Diploid (2n)</text>
  <text x="110" y="355" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">Normal</text>
  <circle cx="80" cy="390" r="8" fill="#81c784"/><circle cx="110" cy="390" r="8" fill="#81c784"/>
  <text x="110" y="420" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">2 sets = 2n</text>

  <rect x="210" y="310" width="180" height="130" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="1.5"/>
  <text x="300" y="335" text-anchor="middle" fill="#e65100" font-family="Arial" font-weight="bold" font-size="12">Tetraploid (4n)</text>
  <text x="300" y="355" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">Autopolyploidy</text>
  <circle cx="270" cy="385" r="8" fill="#ffb74d"/><circle cx="300" cy="385" r="8" fill="#ffb74d"/><circle cx="285" cy="405" r="8" fill="#ffb74d"/><circle cx="315" cy="405" r="8" fill="#ffb74d"/>
  <text x="300" y="430" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">4 sets = 4n</text>

  <rect x="400" y="310" width="180" height="130" rx="8" fill="#fce4ec" stroke="#f48fb1" stroke-width="1.5"/>
  <text x="490" y="335" text-anchor="middle" fill="#c62828" font-family="Arial" font-weight="bold" font-size="12">Octoploid (8n)</text>
  <text x="490" y="355" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">Strawberry!</text>
  <circle cx="460" cy="380" r="7" fill="#ef9a9a"/><circle cx="485" cy="380" r="7" fill="#ef9a9a"/><circle cx="510" cy="380" r="7" fill="#ef9a9a"/>
  <circle cx="472" cy="398" r="7" fill="#ef9a9a"/><circle cx="497" cy="398" r="7" fill="#ef9a9a"/>
  <circle cx="460" cy="416" r="7" fill="#ef9a9a"/><circle cx="485" cy="416" r="7" fill="#ef9a9a"/><circle cx="510" cy="416" r="7" fill="#ef9a9a"/>
  <text x="490" y="440" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">8 sets = 8n</text>

  <!-- Sex Determination -->
  <text x="300" y="475" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="14">Sex Determination Systems</text>

  <rect x="20" y="488" width="180" height="150" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5"/>
  <text x="110" y="512" text-anchor="middle" fill="#1565c0" font-family="Arial" font-weight="bold" font-size="13">XX/XY System</text>
  <text x="110" y="530" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">Mammals, Drosophila</text>
  <text x="110" y="555" text-anchor="middle" fill="#333" font-family="Arial" font-size="11">♀ XX (homogametic)</text>
  <text x="110" y="575" text-anchor="middle" fill="#333" font-family="Arial" font-size="11">♂ XY (heterogametic)</text>
  <text x="110" y="600" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">SRY gene on Y → male</text>
  <text x="110" y="620" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Without SRY → female</text>

  <rect x="210" y="488" width="180" height="150" rx="8" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="300" y="512" text-anchor="middle" fill="#6a1b9a" font-family="Arial" font-weight="bold" font-size="13">ZZ/ZW System</text>
  <text x="300" y="530" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">Birds, Some Reptiles</text>
  <text x="300" y="555" text-anchor="middle" fill="#333" font-family="Arial" font-size="11">♀ ZW (heterogametic)</text>
  <text x="300" y="575" text-anchor="middle" fill="#333" font-family="Arial" font-size="11">♂ ZZ (homogametic)</text>
  <text x="300" y="600" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">DMRT1 gene on Z</text>
  <text x="300" y="620" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Double dose in males</text>

  <rect x="400" y="488" width="180" height="150" rx="8" fill="#fff9c4" stroke="#ffcc80" stroke-width="1.5"/>
  <text x="490" y="512" text-anchor="middle" fill="#e65100" font-family="Arial" font-weight="bold" font-size="13">Haplodiploidy</text>
  <text x="490" y="530" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">Bees, Wasps, Ants</text>
  <text x="490" y="555" text-anchor="middle" fill="#333" font-family="Arial" font-size="11">♀ Diploid (2n)</text>
  <text x="490" y="575" text-anchor="middle" fill="#333" font-family="Arial" font-size="11">♂ Haploid (n)</text>
  <text x="490" y="600" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Fertilized eggs → ♀</text>
  <text x="490" y="620" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Unfertilized → ♂ (n=16)</text>

  <text x="300" y="665" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">Common in plants (>70% flowering plants polyploid); rare in animals (disrupts sex determination)</text>
</svg>