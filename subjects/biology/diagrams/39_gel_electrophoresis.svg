<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 550">
  <rect width="600" height="550" fill="#fff"/>
  <text x="300" y="26" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Gel Electrophoresis</text>
  <text x="300" y="44" text-anchor="middle" font-family="Arial" font-size="11" fill="#666" font-style="italic">Separation of DNA fragments by size</text>

  <!-- Gel tank -->
  <rect x="40" y="60" width="520" height="140" rx="8" fill="#e8f5e9" stroke="#333" stroke-width="2"/>
  <rect x="60" y="70" width="480" height="120" rx="4" fill="#c8e6c9" stroke="#81c784" stroke-width="1.5"/>

  <!-- Buffer -->
  <text x="300" y="110" text-anchor="middle" font-family="Arial" font-size="11" fill="#2e7d32">Buffer solution (TAE/TBE)</text>

  <!-- Electrode - negative -->
  <rect x="35" y="90" width="30" height="10" rx="2" fill="#e53935"/>
  <text x="50" y="82" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">– Cathode</text>

  <!-- Electrode + positive -->
  <rect x="535" y="90" width="30" height="10" rx="2" fill="#1565c0"/>
  <text x="550" y="82" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0" font-weight="bold">+ Anode</text>

  <!-- Wells at top -->
  <rect x="110" y="72" width="12" height="20" rx="2" fill="#fff" stroke="#333" stroke-width="1"/>
  <rect x="170" y="72" width="12" height="20" rx="2" fill="#fff" stroke="#333" stroke-width="1"/>
  <rect x="230" y="72" width="12" height="20" rx="2" fill="#fff" stroke="#333" stroke-width="1"/>
  <rect x="290" y="72" width="12" height="20" rx="2" fill="#fff" stroke="#333" stroke-width="1"/>
  <rect x="350" y="72" width="12" height="20" rx="2" fill="#fff" stroke="#333" stroke-width="1"/>
  <rect x="410" y="72" width="12" height="20" rx="2" fill="#fff" stroke="#333" stroke-width="1"/>
  <text x="300" y="65" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Sample Wells</text>

  <!-- Ladder bands (larger near top = slower migration) -->
  <!-- Lane 1: Ladder -->
  <text x="116" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Ladder</text>
  <rect x="111" y="95" width="10" height="3" rx="1" fill="#333"/>
  <text x="128" y="98" font-family="Arial" font-size="7" fill="#666">1000 bp</text>
  <rect x="111" y="107" width="10" height="3" rx="1" fill="#333"/>
  <text x="128" y="110" font-family="Arial" font-size="7" fill="#666">500 bp</text>
  <rect x="111" y="119" width="10" height="3" rx="1" fill="#333"/>
  <text x="128" y="122" font-family="Arial" font-size="7" fill="#666">400 bp</text>
  <rect x="111" y="131" width="10" height="3" rx="1" fill="#333"/>
  <text x="128" y="134" font-family="Arial" font-size="7" fill="#666">300 bp</text>
  <rect x="111" y="143" width="10" height="3" rx="1" fill="#333"/>
  <text x="128" y="146" font-family="Arial" font-size="7" fill="#666">200 bp</text>
  <rect x="111" y="155" width="10" height="3" rx="1" fill="#333"/>
  <text x="128" y="158" font-family="Arial" font-size="7" fill="#666">100 bp</text>

  <!-- Lane 2: Sample A (e.g. 300 bp) -->
  <text x="176" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Sample A</text>
  <rect x="171" y="131" width="10" height="3" rx="1" fill="#1a6b3c"/>

  <!-- Lane 3: Sample B (e.g. 200 + 400 bp) -->
  <text x="236" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Sample B</text>
  <rect x="231" y="119" width="10" height="3" rx="1" fill="#1565c0"/>
  <rect x="231" y="143" width="10" height="3" rx="1" fill="#1565c0"/>

  <!-- Lane 4: PCR product -->
  <text x="296" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">PCR Product</text>
  <rect x="291" y="107" width="10" height="3" rx="1" fill="#e53935"/>

  <!-- Lane 5: Restriction digest -->
  <text x="356" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Digest</text>
  <rect x="351" y="107" width="10" height="3" rx="1" fill="#ff8f00"/>
  <rect x="351" y="131" width="10" height="3" rx="1" fill="#ff8f00"/>
  <rect x="351" y="155" width="10" height="3" rx="1" fill="#ff8f00"/>

  <!-- Lane 6: Uncut -->
  <text x="416" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Uncut</text>
  <rect x="411" y="95" width="10" height="3" rx="1" fill="#6a1b9a"/>

  <!-- Migration direction -->
  <text x="35" y="165" font-family="Arial" font-size="9" fill="#666">DNA moves</text>
  <text x="35" y="177" font-family="Arial" font-size="9" fill="#666">— → +</text>

  <!-- Size indicator -->
  <line x1="540" y1="95" x2="540" y2="160" stroke="#333" stroke-width="1.5"/>
  <polygon points="540,95 544,100 536,100" fill="#333"/>
  <polygon points="540,160 544,155 536,155" fill="#333"/>
  <text x="550" y="110" font-family="Arial" font-size="8" fill="#666">Smaller</text>
  <text x="550" y="125" font-family="Arial" font-size="8" fill="#666">fragments</text>
  <text x="550" y="140" font-family="Arial" font-size="8" fill="#666">(faster)</text>
  <text x="548" y="155" font-family="Arial" font-size="8" fill="#666">Larger</text>
  <text x="550" y="168" font-family="Arial" font-size="8" fill="#666">fragments</text>

  <!-- Explanation panel -->
  <rect x="40" y="220" width="520" height="140" rx="6" fill="none" stroke="#ccc" stroke-width="1"/>
  <text x="300" y="242" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">How Gel Electrophoresis Works</text>

  <circle cx="65" cy="260" r="10" fill="#e53935" opacity="0.2" stroke="#e53935" stroke-width="1.5"/>
  <text x="78" y="264" font-family="Arial" font-size="10" fill="#333" font-weight="bold">1</text>
  <text x="93" y="264" font-family="Arial" font-size="10" fill="#555">DNA is negatively charged (phosphate backbone). It migrates toward the positive electrode.</text>

  <circle cx="65" cy="285" r="10" fill="#43a047" opacity="0.2" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="78" y="289" font-family="Arial" font-size="10" fill="#333" font-weight="bold">2</text>
  <text x="93" y="289" font-family="Arial" font-size="10" fill="#555">Agarose gel acts as a molecular sieve — smaller fragments move through the pores faster.</text>

  <circle cx="65" cy="310" r="10" fill="#1565c0" opacity="0.2" stroke="#1565c0" stroke-width="1.5"/>
  <text x="78" y="314" font-family="Arial" font-size="10" fill="#333" font-weight="bold">3</text>
  <text x="93" y="314" font-family="Arial" font-size="10" fill="#555">DNA ladder (known sizes) used as reference. Fragment size determined by comparison.</text>

  <circle cx="65" cy="335" r="10" fill="#ff8f00" opacity="0.2" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="78" y="339" font-family="Arial" font-size="10" fill="#333" font-weight="bold">4</text>
  <text x="93" y="339" font-family="Arial" font-size="10" fill="#555">Stained with ethidium bromide or SYBR Safe → visualize under UV light.</text>

  <!-- Application examples -->
  <text x="300" y="385" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Applications</text>

  <rect x="40" y="396" width="160" height="65" rx="6" fill="#e3f2fd" stroke="#90caf9" stroke-width="1"/>
  <text x="120" y="416" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">DNA Fingerprinting</text>
  <text x="120" y="432" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Forensics, paternity tests</text>
  <text x="120" y="446" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">STR analysis</text>

  <rect x="220" y="396" width="160" height="65" rx="6" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="300" y="416" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">Genetic Screening</text>
  <text x="300" y="432" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Detect mutations (e.g.,</text>
  <text x="300" y="446" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">sickle cell, CFTR)</text>

  <rect x="400" y="396" width="160" height="65" rx="6" fill="#fff3e0" stroke="#ffcc80" stroke-width="1"/>
  <text x="480" y="416" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff8f00">PCR Verification</text>
  <text x="480" y="432" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Confirm amplification</text>
  <text x="480" y="446" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Check product size</text>

  <!-- Standard curve -->
  <text x="300" y="490" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">Size Determination</text>
  <line x1="80" y1="535" x2="520" y2="535" stroke="#333" stroke-width="1"/>
  <line x1="80" y1="535" x2="80" y2="495" stroke="#333" stroke-width="1"/>
  <text x="300" y="548" font-family="Arial" font-size="9" fill="#555">log(size) vs. distance migrated = linear relationship</text>

  <!-- Points -->
  <circle cx="150" cy="510" r="3" fill="#e53935"/>
  <circle cx="220" cy="515" r="3" fill="#e53935"/>
  <circle cx="290" cy="518" r="3" fill="#e53935"/>
  <circle cx="360" cy="522" r="3" fill="#e53935"/>
  <circle cx="430" cy="527" r="3" fill="#e53935"/>
  <line x1="150" y1="510" x2="430" y2="527" stroke="#e53935" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
