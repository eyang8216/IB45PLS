<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <rect width="600" height="500" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Ocean Acidification — Chemistry &amp; Biological Impact</text>

  <!-- Chemical reactions -->
  <rect x="20" y="40" width="560" height="200" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>

  <text x="300" y="65" text-anchor="middle" font-family="Arial" font-size="13" fill="#1565c0" font-weight="bold">Chemical Reactions</text>

  <!-- Step 1 -->
  <text x="50" y="90" font-family="Arial" font-size="11" fill="#333">①</text>
  <text x="70" y="90" font-family="Arial" font-size="12" fill="#333">Atmospheric CO₂ dissolves in seawater:</text>
  <text x="300" y="110" text-anchor="middle" font-family="Arial" font-size="14" fill="#e53935" font-weight="bold">CO₂  +  H₂O  →  H₂CO₃</text>
  <text x="300" y="128" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">(carbon dioxide + water → carbonic acid)</text>

  <!-- Step 2 -->
  <text x="50" y="152" font-family="Arial" font-size="11" fill="#333">②</text>
  <text x="70" y="152" font-family="Arial" font-size="12" fill="#333">Carbonic acid dissociates:</text>
  <text x="300" y="172" text-anchor="middle" font-family="Arial" font-size="14" fill="#e53935" font-weight="bold">H₂CO₃  →  H⁺  +  HCO₃⁻</text>
  <text x="300" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">(carbonic acid → hydrogen ion + bicarbonate)</text>

  <!-- Step 3 -->
  <text x="50" y="214" font-family="Arial" font-size="11" fill="#333">③</text>
  <text x="70" y="214" font-family="Arial" font-size="12" fill="#333">Additional H⁺ reacts with carbonate:</text>
  <text x="300" y="234" text-anchor="middle" font-family="Arial" font-size="14" fill="#e53935" font-weight="bold">H⁺  +  CO₃²⁻  →  HCO₃⁻</text>
  <text x="300" y="252" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">(hydrogen ion + carbonate → bicarbonate)</text>

  <!-- Effect -->
  <rect x="50" y="265" width="500" height="35" rx="6" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="300" y="278" text-anchor="middle" font-family="Arial" font-size="12" fill="#e53935" font-weight="bold">RESULT: ↓ pH (more acidic)  +  ↓ [CO₃²⁻] (less carbonate available)</text>
  <text x="300" y="295" text-anchor="middle" font-family="Arial" font-size="10" fill="#c62828">Ocean pH has dropped from ~8.2 to ~8.1 since pre-industrial era (~30% increase in acidity)</text>

  <!-- Biological impact -->
  <rect x="20" y="310" width="560" height="180" rx="8" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="300" y="335" text-anchor="middle" font-family="Arial" font-size="13" fill="#6a1b9a" font-weight="bold">Biological Consequences of Reduced Carbonate (CO₃²⁻)</text>

  <!-- Shell dissolution -->
  <rect x="35" y="348" width="160" height="55" rx="5" fill="#fff3e0" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="115" y="368" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100" font-weight="bold">🐚 Shell Dissolution</text>
  <text x="115" y="385" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">CaCO₃ shells &amp;</text>
  <text x="115" y="398" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">skeletons dissolve</text>

  <rect x="210" y="348" width="160" height="55" rx="5" fill="#fff3e0" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="290" y="368" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100" font-weight="bold">🦪 Calcification ↓</text>
  <text x="290" y="385" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Molluscs, corals,</text>
  <text x="290" y="398" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">echinoderms struggle</text>

  <rect x="385" y="348" width="180" height="55" rx="5" fill="#fff3e0" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="475" y="368" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100" font-weight="bold">🦐 Pteropods</text>
  <text x="475" y="385" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">"Sea butterflies" —</text>
  <text x="475" y="398" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">base of food web</text>

  <!-- Affected organisms -->
  <text x="300" y="425" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Affected: corals, molluscs (oysters, clams), crustaceans, echinoderms (sea urchins), foraminifera, coccolithophores</text>

  <!-- Coral reef -->
  <text x="300" y="448" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">By 2100: 70% of cold-water corals may be in corrosive waters. Coral reef growth may stop entirely.</text>

  <!-- pH arrow visual -->
  <rect x="35" y="460" width="530" height="22" rx="4" fill="url(#phGrad)"/>
  <text x="40" y="475" font-family="Arial" font-size="8" fill="#fff" font-weight="bold">pH 7.8</text>
  <text x="535" y="475" text-anchor="end" font-family="Arial" font-size="8" fill="#fff" font-weight="bold">pH 8.2</text>
  <text x="300" y="475" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff" font-weight="bold">More acidic ← → Less acidic</text>

  <defs>
    <linearGradient id="phGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e53935"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
  </defs>
</svg>