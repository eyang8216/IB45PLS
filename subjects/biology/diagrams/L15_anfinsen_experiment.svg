<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs><style>text { font-family: Arial, sans-serif; } .title { font-size: 18px; font-weight: bold; fill: #1a6b3c; text-anchor: middle; } .lab { font-size: 13px; fill: #333; text-anchor: middle; } .sm { font-size: 11px; fill: #555; text-anchor: middle; }</style></defs>
  <rect width="600" height="400" fill="#fff"/>
  <text x="300" y="28" class="title">Anfinsen's Ribonuclease Experiment — Proof: 1° Structure Determines 3° Folding</text>

  <!-- Step 1 -->
  <rect x="30" y="45" width="120" height="70" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="90" y="70" class="sm" fill="#1a6b3c" font-weight="bold">① Native RNase A</text>
  <text x="90" y="87" class="sm">124 a.a., 4 S–S</text>
  <text x="90" y="102" class="sm" fill="#1a6b3c">100% activity</text>

  <!-- Arrow -->
  <polygon points="160,80 175,70 175,90" fill="#e53935"/>
  <text x="175" y="110" class="sm" fill="#e53935">+ urea</text>
  <text x="175" y="123" class="sm" fill="#e53935">+ β-ME</text>

  <!-- Step 2 -->
  <rect x="190" y="45" width="130" height="70" rx="6" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="255" y="70" class="sm" fill="#c62828" font-weight="bold">② Denatured</text>
  <text x="255" y="87" class="sm">Unfolded, S–S broken</text>
  <text x="255" y="102" class="sm" fill="#c62828">0% activity</text>

  <!-- Arrow -->
  <polygon points="330,80 345,70 345,90" fill="#1565c0"/>
  <text x="350" y="110" class="sm" fill="#1565c0">remove urea</text>
  <text x="350" y="123" class="sm" fill="#1565c0">&amp; β-ME</text>

  <!-- Step 3 -->
  <rect x="370" y="45" width="130" height="70" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="435" y="70" class="sm" fill="#1a6b3c" font-weight="bold">③ Refolded!</text>
  <text x="435" y="87" class="sm">Native S–S reform</text>
  <text x="435" y="102" class="sm" fill="#1a6b3c">100% activity!</text>

  <!-- Key conclusion -->
  <rect x="30" y="145" width="540" height="45" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="300" y="165" class="lab" fill="#1565c0" font-weight="bold">Conclusion: The 1° amino acid sequence contains ALL information needed to specify 3D folding</text>
  <text x="300" y="182" class="sm" fill="#1565c0">The native conformation is the thermodynamically most stable state (lowest free energy)</text>

  <!-- Disulfide scrambling -->
  <rect x="30" y="205" width="540" height="80" rx="6" fill="#fff3e0" stroke="#ffb74d" stroke-width="2"/>
  <text x="300" y="225" class="lab" fill="#e65100" font-weight="bold">Control Experiment: If β-ME is present during denaturation but NOT removed before re-oxidation...</text>
  <text x="300" y="245" class="sm">Random S–S pairing: with 8 Cys, there are 105 possible pairings but only 1 native → ~1% activity</text>
  <text x="300" y="262" class="sm">This proves disulfide bonds guide folding but don't encode the folded state — the sequence does!</text>

  <!-- Chaperone note -->
  <rect x="30" y="295" width="540" height="55" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="300" y="315" class="lab" fill="#666" font-weight="bold">Limitation: RNase A is small (124 a.a.). Large proteins often require CHAPERONES to prevent aggregation.</text>
  <text x="300" y="335" class="sm" fill="#666">Chaperones (Hsp60, Hsp70) do NOT specify structure — they prevent incorrect interactions during folding.</text>

  <!-- Nobel note -->
  <text x="300" y="380" class="lab" fill="#6a1b9a">Nobel Prize in Chemistry 1972 — Christian Anfinsen</text>
</svg>
