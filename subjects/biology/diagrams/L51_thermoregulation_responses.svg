<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520">
  <rect width="600" height="520" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Thermoregulation — Responses to Heat and Cold</text>

  <!-- Hot response -->
  <rect x="20" y="45" width="270" height="220" rx="10" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="155" y="70" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#e53935">🌡️ Response to HEAT</text>
  <text x="155" y="88" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">(Hypothalamus detects >37°C)</text>

  <g transform="translate(35, 100)">
    <circle cx="12" cy="8" r="10" fill="#e53935"/>
    <text x="12" y="13" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">1</text>
    <text x="30" y="12" font-family="Arial" font-size="12" fill="#333"><tspan font-weight="bold">Vasodilation</tspan> — skin arterioles dilate</text>
    <text x="30" y="28" font-family="Arial" font-size="10" fill="#555">More blood flow near skin surface → heat loss</text>

    <circle cx="12" cy="52" r="10" fill="#e53935"/>
    <text x="12" y="57" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">2</text>
    <text x="30" y="56" font-family="Arial" font-size="12" fill="#333"><tspan font-weight="bold">Sweating</tspan> — sweat glands secrete</text>
    <text x="30" y="72" font-family="Arial" font-size="10" fill="#555">Evaporation of sweat → cooling</text>

    <circle cx="12" cy="96" r="10" fill="#e53935"/>
    <text x="12" y="101" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">3</text>
    <text x="30" y="100" font-family="Arial" font-size="12" fill="#333"><tspan font-weight="bold">Piloerection reduced</tspan> — hair lies flat</text>
    <text x="30" y="116" font-family="Arial" font-size="10" fill="#555">Less trapped air → less insulation</text>

    <circle cx="12" cy="140" r="10" fill="#e53935"/>
    <text x="12" y="145" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">4</text>
    <text x="30" y="144" font-family="Arial" font-size="12" fill="#333"><tspan font-weight="bold">Behavioural</tspan> — seek shade, stretch out</text>
    <text x="30" y="160" font-family="Arial" font-size="10" fill="#555">Increase surface area for heat loss</text>
  </g>

  <!-- Cold response -->
  <rect x="310" y="45" width="270" height="220" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="445" y="70" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#1565c0">❄️ Response to COLD</text>
  <text x="445" y="88" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">(Hypothalamus detects &lt;37°C)</text>

  <g transform="translate(325, 100)">
    <circle cx="12" cy="8" r="10" fill="#1565c0"/>
    <text x="12" y="13" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">1</text>
    <text x="30" y="12" font-family="Arial" font-size="12" fill="#333"><tspan font-weight="bold">Vasoconstriction</tspan> — skin arterioles narrow</text>
    <text x="30" y="28" font-family="Arial" font-size="10" fill="#555">Blood shunted from skin → core heat conserved</text>

    <circle cx="12" cy="52" r="10" fill="#1565c0"/>
    <text x="12" y="57" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">2</text>
    <text x="30" y="56" font-family="Arial" font-size="12" fill="#333"><tspan font-weight="bold">Shivering</tspan> — rapid muscle contraction</text>
    <text x="30" y="72" font-family="Arial" font-size="10" fill="#555">Generates heat (up to 5× more)</text>

    <circle cx="12" cy="96" r="10" fill="#1565c0"/>
    <text x="12" y="101" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">3</text>
    <text x="30" y="100" font-family="Arial" font-size="12" fill="#333"><tspan font-weight="bold">Non-shivering thermogenesis</tspan></text>
    <text x="30" y="116" font-family="Arial" font-size="10" fill="#555">Brown adipose → UCP1 uncoupling → heat</text>

    <circle cx="12" cy="140" r="10" fill="#1565c0"/>
    <text x="12" y="145" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff" font-weight="bold">4</text>
    <text x="30" y="144" font-family="Arial" font-size="12" fill="#333"><tspan font-weight="bold">Piloerection</tspan> — hair stands up</text>
    <text x="30" y="160" font-family="Arial" font-size="10" fill="#555">Traps insulating layer of air ("goosebumps")</text>
  </g>

  <!-- Thermoreceptors -->
  <rect x="20" y="280" width="560" height="80" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="300" y="303" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">Temperature Receptors</text>
  <text x="300" y="325" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">
    <tspan font-weight="bold" fill="#e53935">Peripheral thermoreceptors:</tspan> In skin — detect environmental temperature
  </text>
  <text x="300" y="347" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">
    <tspan font-weight="bold" fill="#1565c0">Central thermoreceptors:</tspan> In hypothalamus — detect core blood temperature
  </text>

  <!-- Endotherm vs Ectotherm -->
  <rect x="20" y="375" width="560" height="130" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="300" y="400" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#ff8f00">Endotherms vs Ectotherms</text>
  <text x="150" y="425" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">Endotherms (mammals, birds)</text>
  <text x="450" y="425" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Ectotherms (reptiles, amphibians)</text>
  <text x="150" y="445" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Internal metabolic heat; high MR; BAT</text>
  <text x="450" y="445" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">External heat from environment; low MR</text>
  <text x="150" y="465" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Can be active in cold; high energy cost</text>
  <text x="450" y="465" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Behavioural thermoregulation primary</text>
  <text x="150" y="488" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Maintain constant body temperature</text>
  <text x="450" y="488" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Body temp varies with environment</text>
</svg>
