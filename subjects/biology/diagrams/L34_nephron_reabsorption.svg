<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <rect width="600" height="340" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Nephron — Reabsorption &amp; Secretion Details</text>

  <!-- PCT -->
  <rect x="20" y="40" width="170" height="280" rx="8" fill="#f5f5f5" stroke="#ff8f00" stroke-width="2"/>
  <text x="105" y="60" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#ff8f00">Proximal Convoluted</text>
  <text x="105" y="75" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#ff8f00">Tubule (PCT)</text>

  <text x="105" y="95" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Bulk reabsorption</text>
  <text x="40" y="115" font-family="Arial" font-size="10" fill="#333">✅ 100% glucose</text>
  <text x="40" y="132" font-family="Arial" font-size="10" fill="#333">✅ 100% amino acids</text>
  <text x="40" y="149" font-family="Arial" font-size="10" fill="#333">✅ ~65% Na⁺ (active)</text>
  <text x="40" y="166" font-family="Arial" font-size="10" fill="#333">✅ ~65% H₂O (osmosis)</text>
  <text x="40" y="183" font-family="Arial" font-size="10" fill="#333">✅ K⁺, Cl⁻, HCO₃⁻</text>

  <text x="105" y="205" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Microvilli (brush border)</text>
  <text x="105" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">↑ surface area</text>

  <text x="105" y="240" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Many mitochondria</text>
  <text x="105" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">for active transport</text>

  <text x="40" y="278" font-family="Arial" font-size="9" fill="#e53935">❌ Urea stays in filtrate</text>
  <text x="40" y="293" font-family="Arial" font-size="9" fill="#e53935">(not reabsorbed)</text>

  <!-- Loop of Henle -->
  <rect x="210" y="40" width="170" height="280" rx="8" fill="#f5f5f5" stroke="#1565c0" stroke-width="2"/>
  <text x="295" y="60" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">Loop of Henle</text>

  <text x="295" y="85" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Descending limb</text>
  <text x="230" y="105" font-family="Arial" font-size="10" fill="#333">• Permeable to H₂O</text>
  <text x="230" y="120" font-family="Arial" font-size="10" fill="#333">• Impermeable to NaCl</text>
  <text x="230" y="135" font-family="Arial" font-size="10" fill="#333">• H₂O leaves by osmosis</text>
  <text x="230" y="150" font-family="Arial" font-size="10" fill="#333">• Filtrate becomes</text>
  <text x="233" y="165" font-family="Arial" font-size="10" fill="#333">hyperosmotic</text>

  <text x="295" y="195" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">Ascending limb</text>
  <text x="230" y="215" font-family="Arial" font-size="10" fill="#333">• Impermeable to H₂O</text>
  <text x="230" y="230" font-family="Arial" font-size="10" fill="#333">• Active transport of NaCl</text>
  <text x="230" y="245" font-family="Arial" font-size="10" fill="#333">• Creates medullary</text>
  <text x="233" y="260" font-family="Arial" font-size="10" fill="#333">osmotic gradient</text>
  <text x="230" y="275" font-family="Arial" font-size="10" fill="#333">• Filtrate becomes</text>
  <text x="233" y="290" font-family="Arial" font-size="10" fill="#333">hypoosmotic</text>

  <!-- DCT + Collecting duct -->
  <rect x="400" y="40" width="180" height="280" rx="8" fill="#f5f5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="490" y="60" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">DCT + Collecting</text>
  <text x="490" y="75" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">Duct</text>

  <text x="490" y="100" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">DCT</text>
  <text x="415" y="118" font-family="Arial" font-size="10" fill="#333">• Fine-tuning of Na⁺, K⁺</text>
  <text x="415" y="135" font-family="Arial" font-size="10" fill="#333">• Aldosterone:</text>
  <text x="418" y="150" font-family="Arial" font-size="10" fill="#333">Na⁺ reabsorption</text>
  <text x="418" y="165" font-family="Arial" font-size="10" fill="#333">K⁺ secretion</text>

  <text x="490" y="190" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Collecting Duct</text>
  <text x="415" y="208" font-family="Arial" font-size="10" fill="#333">• ADH (vasopressin):</text>
  <text x="418" y="223" font-family="Arial" font-size="10" fill="#333">inserts aquaporins</text>
  <text x="418" y="238" font-family="Arial" font-size="10" fill="#333">→ H₂O reabsorption</text>
  <text x="415" y="255" font-family="Arial" font-size="10" fill="#333">• Concentrates urine</text>
  <text x="415" y="275" font-family="Arial" font-size="10" fill="#333">• Final urine volume</text>
  <text x="418" y="290" font-family="Arial" font-size="10" fill="#333">determined here</text>
</svg>