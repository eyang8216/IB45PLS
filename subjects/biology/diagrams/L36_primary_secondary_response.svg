<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Primary vs Secondary Immune Response</text>

  <!-- Axes -->
  <line x1="60" y1="340" x2="580" y2="340" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="340" x2="60" y2="40" stroke="#333" stroke-width="2"/>

  <text x="300" y="375" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">Time (days)</text>
  <text x="18" y="195" text-anchor="middle" font-family="Arial" font-size="13" fill="#333" transform="rotate(-90, 18, 195)">Antibody Concentration</text>

  <!-- X ticks -->
  <line x1="60" y1="340" x2="60" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="60" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">0</text>
  <line x1="110" y1="340" x2="110" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="110" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">7</text>
  <line x1="160" y1="340" x2="160" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="160" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">14</text>
  <line x1="210" y1="340" x2="210" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="210" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">21</text>
  <line x1="260" y1="340" x2="260" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="260" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">28</text>
  <line x1="310" y1="340" x2="310" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="310" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">35</text>
  <line x1="360" y1="340" x2="360" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="360" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">42</text>
  <line x1="410" y1="340" x2="410" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="410" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">49</text>
  <line x1="460" y1="340" x2="460" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="460" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">56</text>
  <line x1="510" y1="340" x2="510" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="510" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">63</text>

  <text x="50" y="45" font-family="Arial" font-size="9" fill="#555">High</text>
  <text x="50" y="200" font-family="Arial" font-size="9" fill="#555">Mid</text>
  <text x="50" y="335" font-family="Arial" font-size="9" fill="#555">Low</text>

  <!-- Primary exposure -->
  <line x1="65" y1="55" x2="65" y2="340" stroke="#e53935" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="65" y="48" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e53935">1° Exposure</text>
  <text x="65" y="393" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">(Day 0)</text>

  <!-- Secondary exposure -->
  <line x1="360" y1="55" x2="360" y2="340" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="360" y="48" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">2° Exposure</text>
  <text x="360" y="393" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">(Day 42)</text>

  <!-- Primary IgM curve -->
  <path d="M65,335 L115,330 Q130,305 145,250 Q160,200 180,190 Q200,205 220,235 Q240,265 260,285 Q280,300 310,305 Q340,305 360,305"
        fill="none" stroke="#ff8f00" stroke-width="2.5"/>
  <text x="195" y="182" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff8f00">IgM</text>

  <!-- Primary IgG curve -->
  <path d="M65,335 L115,330 Q140,305 160,235 Q180,185 210,200 Q240,230 270,270 Q300,300 340,305"
        fill="none" stroke="#43a047" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="165" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#43a047">IgG</text>

  <!-- Secondary IgG - very high, very fast -->
  <path d="M360,305 Q365,180 375,110 Q385,60 400,48 Q420,48 440,65 Q470,105 500,155 Q530,210 560,255"
        fill="none" stroke="#1565c0" stroke-width="3"/>
  <text x="405" y="38" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">IgG (very high)</text>

  <!-- Secondary IgM (small) -->
  <path d="M360,305 Q370,270 385,250 Q400,245 420,255 Q450,280 490,300"
        fill="none" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="430" y="250" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff8f00">IgM</text>

  <!-- Lag indicators -->
  <line x1="66" y1="315" x2="115" y2="315" stroke="#333" stroke-width="1.5"/>
  <line x1="66" y1="312" x2="66" y2="318" stroke="#333" stroke-width="1.5"/>
  <line x1="115" y1="312" x2="115" y2="318" stroke="#333" stroke-width="1.5"/>
  <text x="90" y="328" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Lag ~7d</text>

  <line x1="360" y1="315" x2="385" y2="315" stroke="#333" stroke-width="1.5"/>
  <line x1="360" y1="312" x2="360" y2="318" stroke="#333" stroke-width="1.5"/>
  <line x1="385" y1="312" x2="385" y2="318" stroke="#333" stroke-width="1.5"/>
  <text x="372" y="328" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">1-2d</text>

  <!-- Annotation box -->
  <rect x="15" y="300" width="1" height="1" fill="none"/>

  <!-- Memory cell activation box -->
  <rect x="395" y="70" width="190" height="75" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="490" y="90" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Memory Cells Activated</text>
  <text x="490" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Rapid proliferation &amp; differentiation</text>
  <text x="490" y="124" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">→ IgG dominates (class switch)</text>
  <text x="490" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">→ Much higher titre</text>

  <!-- Legend -->
  <rect x="15" y="55" width="175" height="105" rx="5" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="25" y="72" font-family="Arial" font-size="11" font-weight="bold" fill="#333">Legend</text>
  <line x1="25" y1="88" x2="55" y2="88" stroke="#ff8f00" stroke-width="2.5"/>
  <text x="60" y="92" font-family="Arial" font-size="10" fill="#333">Primary IgM</text>
  <line x1="25" y1="108" x2="55" y2="108" stroke="#43a047" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="60" y="112" font-family="Arial" font-size="10" fill="#333">Primary IgG</text>
  <line x1="25" y1="128" x2="55" y2="128" stroke="#1565c0" stroke-width="3"/>
  <text x="60" y="132" font-family="Arial" font-size="10" fill="#333">Secondary IgG</text>
  <line x1="25" y1="148" x2="55" y2="148" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="60" y="152" font-family="Arial" font-size="10" fill="#333">Secondary IgM</text>
</svg>