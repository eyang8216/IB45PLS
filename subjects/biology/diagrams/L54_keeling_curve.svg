<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" width="600" height="440">
  <rect width="600" height="440" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Keeling Curve — Atmospheric CO₂ at Mauna Loa (1958–2024)</text>

  <!-- Axes -->
  <line x1="60" y1="60" x2="60" y2="380" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="380" x2="570" y2="380" stroke="#333" stroke-width="2"/>

  <!-- Y axis label -->
  <text x="50" y="70" text-anchor="end" font-family="Arial" font-size="10" fill="#333">420</text>
  <text x="50" y="130" text-anchor="end" font-family="Arial" font-size="10" fill="#333">400</text>
  <text x="50" y="190" text-anchor="end" font-family="Arial" font-size="10" fill="#333">380</text>
  <text x="50" y="250" text-anchor="end" font-family="Arial" font-size="10" fill="#333">360</text>
  <text x="50" y="310" text-anchor="end" font-family="Arial" font-size="10" fill="#333">340</text>
  <text x="50" y="370" text-anchor="end" font-family="Arial" font-size="10" fill="#333">315</text>
  <text x="30" y="220" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" transform="rotate(-90,30,220)">CO₂ (ppm)</text>

  <!-- Grid lines -->
  <line x1="60" y1="70" x2="570" y2="70" stroke="#eee" stroke-width="0.5"/>
  <line x1="60" y1="130" x2="570" y2="130" stroke="#eee" stroke-width="0.5"/>
  <line x1="60" y1="190" x2="570" y2="190" stroke="#eee" stroke-width="0.5"/>
  <line x1="60" y1="250" x2="570" y2="250" stroke="#eee" stroke-width="0.5"/>
  <line x1="60" y1="310" x2="570" y2="310" stroke="#eee" stroke-width="0.5"/>
  <line x1="60" y1="370" x2="570" y2="370" stroke="#eee" stroke-width="0.5"/>

  <!-- X axis labels -->
  <text x="60" y="398" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">1958</text>
  <text x="188" y="398" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">1975</text>
  <text x="315" y="398" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">1990</text>
  <text x="443" y="398" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">2005</text>
  <text x="570" y="398" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">2024</text>

  <!-- Sawtooth curve -->
  <!-- Each year has a peak (May) and trough (Sep), with overall upward trend -->
  <polyline fill="none" stroke="#e53935" stroke-width="2.5"
    points="60,365 70,360 77,368 80,355 87,363 90,350 97,358 100,345 107,353 110,340 117,348 120,335 127,343 130,330 137,338 140,325 147,333 150,320 157,328 160,315 167,323 170,310 177,318 180,305 187,313 190,300 197,308 200,295 207,303 210,290 217,298 220,285 227,293 230,280 237,288 240,275 247,283 250,270 257,278 260,265 267,273 270,260 277,268 280,255 287,263 290,250 297,258 300,245 307,253 310,240 317,248 320,235 327,243 330,230 337,238 340,225 347,233 350,220 357,228 360,215 367,223 370,210 377,218 380,205 387,213 390,200 397,208 400,195 407,203 410,190 417,198 420,185 427,193 430,180 437,188 440,175 447,183 450,170 457,178 460,165 467,173 470,160 477,168 480,155 487,163 490,150 497,158 500,145 507,153 510,140 517,148 520,135 527,143 530,130 537,138 540,125 547,133 550,120 557,128 560,115 567,123 570,110"
    stroke-linejoin="round"/>

  <!-- Sawtooth annotation -->
  <text x="120" y="290" font-family="Arial" font-size="9" fill="#e53935" font-style="italic">Annual sawtooth:</text>
  <text x="120" y="302" font-family="Arial" font-size="9" fill="#e53935" font-style="italic">May peak (NH spring)</text>
  <text x="120" y="314" font-family="Arial" font-size="9" fill="#e53935" font-style="italic">Sep trough (NH autumn)</text>

  <!-- Trend arrow -->
  <line x1="570" y1="110" x2="570" y2="350" stroke="#1565c0" stroke-width="2" marker-end="url(#arrowB)"/>
  <text x="555" y="230" text-anchor="end" font-family="Arial" font-size="10" fill="#1565c0" font-weight="bold" transform="rotate(-90,555,230)">Steady rise</text>

  <!-- 315 level -->
  <text x="55" y="365" text-anchor="end" font-family="Arial" font-size="9" fill="#666">~315</text>

  <!-- 420+ level -->
  <text x="55" y="110" text-anchor="end" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">~420+</text>

  <!-- Key insight -->
  <rect x="60" y="408" width="510" height="25" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="315" y="425" text-anchor="middle" font-family="Arial" font-size="11" fill="#333" font-weight="bold">Sawtooth pattern: CO₂ drops in NH summer (photosynthesis) and rises in winter (respiration). Overall trend: relentlessly ↑.</text>

  <defs>
    <marker id="arrowB" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#1565c0"/></marker>
  </defs>
</svg>