<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350">
  <rect width="600" height="350" fill="#fff"/>
  <text x="300" y="24" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#1a6b3c">Polysome (Polyribosome)</text>
  <text x="300" y="42" text-anchor="middle" font-family="Arial" font-size="11" fill="#666" font-style="italic">Multiple ribosomes translating a single mRNA simultaneously</text>

  <!-- mRNA strand -->
  <line x1="40" y1="160" x2="560" y2="160" stroke="#333" stroke-width="2.5"/>
  <text x="30" y="155" font-family="Arial" font-size="9" fill="#333">5'</text>
  <text x="560" y="155" font-family="Arial" font-size="9" fill="#333">3'</text>

  <!-- Codon marks on mRNA -->
  <line x1="100" y1="156" x2="100" y2="164" stroke="#ccc" stroke-width="1"/>
  <line x1="160" y1="156" x2="160" y2="164" stroke="#ccc" stroke-width="1"/>
  <line x1="220" y1="156" x2="220" y2="164" stroke="#ccc" stroke-width="1"/>
  <line x1="280" y1="156" x2="280" y2="164" stroke="#ccc" stroke-width="1"/>
  <line x1="340" y1="156" x2="340" y2="164" stroke="#ccc" stroke-width="1"/>
  <line x1="400" y1="156" x2="400" y2="164" stroke="#ccc" stroke-width="1"/>
  <line x1="460" y1="156" x2="460" y2="164" stroke="#ccc" stroke-width="1"/>

  <!-- Ribosome 1 (near 5', just started) -->
  <g transform="translate(100,150)">
    <rect x="-18" y="-38" width="36" height="20" rx="6" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="1.5"/>
    <rect x="-25" y="-16" width="50" height="16" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
    <!-- Short polypeptide -->
    <path d="M0,-38 L0,-55 L5,-60 L-5,-70" fill="none" stroke="#6a1b9a" stroke-width="2"/>
  </g>

  <!-- Ribosome 2 -->
  <g transform="translate(190,150)">
    <rect x="-18" y="-38" width="36" height="20" rx="6" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="1.5"/>
    <rect x="-25" y="-16" width="50" height="16" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
    <path d="M0,-38 L0,-65 L5,-72 L0,-80 L-5,-88" fill="none" stroke="#6a1b9a" stroke-width="2"/>
  </g>

  <!-- Ribosome 3 -->
  <g transform="translate(280,150)">
    <rect x="-18" y="-38" width="36" height="20" rx="6" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="1.5"/>
    <rect x="-25" y="-16" width="50" height="16" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
    <path d="M0,-38 L0,-70 L5,-80 L-2,-90 L3,-100 L-5,-108" fill="none" stroke="#6a1b9a" stroke-width="2"/>
  </g>

  <!-- Ribosome 4 -->
  <g transform="translate(370,150)">
    <rect x="-18" y="-38" width="36" height="20" rx="6" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="1.5"/>
    <rect x="-25" y="-16" width="50" height="16" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
    <path d="M0,-38 L0,-75 L5,-85 L-3,-95 L3,-105 L-5,-115 L5,-122" fill="none" stroke="#6a1b9a" stroke-width="2"/>
  </g>

  <!-- Ribosome 5 -->
  <g transform="translate(460,150)">
    <rect x="-18" y="-38" width="36" height="20" rx="6" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="1.5"/>
    <rect x="-25" y="-16" width="50" height="16" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
    <path d="M0,-38 L0,-80 L5,-92 L-3,-102 L3,-112 L-5,-122 L5,-132 L-3,-142" fill="none" stroke="#6a1b9a" stroke-width="2"/>
    <!-- fold -->
    <path d="M-3,-142 Q5,-138 8,-142 Q10,-135 5,-130" fill="none" stroke="#6a1b9a" stroke-width="1.5"/>
  </g>

  <!-- Labels below -->
  <text x="100" y="180" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Short polypeptide</text>
  <text x="460" y="180" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Nearly complete</text>
  <text x="280" y="180" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Growing chain</text>

  <!-- Key info -->
  <line x1="30" y1="195" x2="570" y2="195" stroke="#ddd" stroke-width="1"/>

  <rect x="30" y="208" width="540" height="130" rx="6" fill="none" stroke="#ccc" stroke-width="1"/>

  <text x="300" y="230" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Polysome Features</text>

  <circle cx="55" cy="250" r="8" fill="#1a6b3c" opacity="0.2" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="68" y="254" font-family="Arial" font-size="10" fill="#1a6b3c" font-weight="bold">Efficiency</text>
  <text x="145" y="254" font-family="Arial" font-size="10" fill="#555">Multiple protein copies produced from one mRNA simultaneously</text>

  <circle cx="55" cy="275" r="8" fill="#1565c0" opacity="0.2" stroke="#1565c0" stroke-width="1.5"/>
  <text x="68" y="279" font-family="Arial" font-size="10" fill="#1565c0" font-weight="bold">Economy</text>
  <text x="145" y="279" font-family="Arial" font-size="10" fill="#555">Only one mRNA needs to be transcribed — serves many ribosomes</text>

  <circle cx="55" cy="300" r="8" fill="#ff8f00" opacity="0.2" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="68" y="304" font-family="Arial" font-size="10" fill="#ff8f00" font-weight="bold">Directionality</text>
  <text x="145" y="304" font-family="Arial" font-size="10" fill="#555">Ribosomes near 5' = just started (short peptide); near 3' = almost done (long peptide)</text>

  <circle cx="55" cy="325" r="8" fill="#6a1b9a" opacity="0.2" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="68" y="329" font-family="Arial" font-size="10" fill="#6a1b9a" font-weight="bold">Coupling</text>
  <text x="145" y="329" font-family="Arial" font-size="10" fill="#555">Prokaryotes: transcription &amp; translation can occur simultaneously on same mRNA</text>
</svg>
