<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#333">Lock-and-Key vs Induced-Fit Models</text>

  <!-- LOCK-AND-KEY LEFT -->
  <text x="155" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1565c0">Lock-and-Key Model</text>

  <!-- Enzyme (lock) -->
  <path d="M60,160 Q60,100 100,90 Q140,80 160,110 Q180,140 200,140 L220,180 Q200,220 160,230 Q100,240 80,200 Q60,180 60,160Z" fill="#81c784" stroke="#1a6b3c" stroke-width="2.5"/>
  <!-- Active site pocket -->
  <path d="M110,140 Q130,120 150,130 Q160,140 145,165 Q130,180 110,140Z" fill="#fff" stroke="#1a6b3c" stroke-width="2"/>

  <!-- Substrate (key) - complementary shape -->
  <path d="M230,130 Q250,120 265,135 Q280,150 275,165 Q270,175 255,175 Q240,170 230,160" fill="#ffcc80" stroke="#ff8f00" stroke-width="2"/>
  <!-- Arrow -->
  <line x1="285" y1="148" x2="340" y2="148" stroke="#333" stroke-width="2" marker-end="url(#arrowBack)"/>
  <!-- Enzyme-substrate complex -->
  <path d="M340,160 Q340,100 380,90 Q420,80 440,110 Q460,140 480,140 L500,180 Q480,220 440,230 Q400,240 360,200 Q340,180 340,160Z" fill="#81c784" stroke="#1a6b3c" stroke-width="2.5"/>
  <path d="M370,130 Q390,115 410,120 Q420,130 410,150 L370,130Z" fill="#ffcc80" stroke="#ff8f00" stroke-width="2"/>

  <defs><marker id="arrowBack" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#333"/></marker></defs>
  <text x="340" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e53935" font-style="italic">Perfect pre-formed complementarity</text>

  <!-- INDUCED-FIT RIGHT -->
  <text x="435" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#6a1b9a">Induced-Fit Model</text>

  <!-- Enzyme relaxed -->
  <path d="M300,340 Q300,300 330,295 Q360,290 380,310 Q400,330 410,340 L425,370 Q410,395 380,400 Q340,405 320,380 Q300,365 300,340Z" fill="#ce93d8" stroke="#6a1b9a" stroke-width="2.5"/>
  <path d="M330,330 Q350,320 365,330 Q370,340 355,355 Q340,365 330,330Z" fill="#fff" stroke="#6a1b9a" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Substrate approaching -->
  <path d="M440,310 Q455,305 465,315 Q470,325 460,335" fill="#ffcc80" stroke="#ff8f00" stroke-width="2"/>
  <line x1="475" y1="325" x2="515" y2="325" stroke="#333" stroke-width="2" marker-end="url(#arrowBack)"/>

  <!-- Enzyme after induced fit - shape changed -->
  <path d="M520,340 Q520,295 555,285 Q590,275 610,300 Q630,325 640,340 L650,375 Q630,405 600,410 Q555,415 535,390 Q520,370 520,340Z" fill="#ce93d8" stroke="#6a1b9a" stroke-width="2.5"/>
  <path d="M545,315 Q570,295 595,310 Q610,325 590,355 Q570,370 545,315Z" fill="#fff" stroke="#6a1b9a" stroke-width="2"/>
  <path d="M555,320 Q575,308 585,318 Q590,328 578,338" fill="#ffcc80" stroke="#ff8f00" stroke-width="2"/>

  <text x="440" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6a1b9a" font-style="italic">Active site changes shape to fit</text>

  <!-- Key takeaway -->
  <rect x="100" y="378" width="400" height="20" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="300" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">X-ray crystallography supports Induced-Fit: many active sites change shape upon substrate binding</text>
</svg>
