<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <rect width="600" height="450" fill="#fff"/>
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#333">In Situ vs. Ex Situ Conservation</text>
  <rect x="25" y="45" width="265" height="280" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="157" y="70" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">IN SITU (On-site)</text>
  <text x="157" y="90" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Conservation within natural habitat</text>
  <text x="157" y="110" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">National Parks &amp; Reserves</text>
  <text x="157" y="125" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Protected areas (e.g., Yellowstone)</text>
  <text x="157" y="142" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Marine Protected Areas (MPAs)</text>
  <text x="157" y="162" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">Advantages</text>
  <text x="157" y="178" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">✓ Protects entire ecosystem</text>
  <text x="157" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">✓ Maintains natural selection</text>
  <text x="157" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">✓ Large populations possible</text>
  <text x="157" y="229" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">✓ Long-term sustainability</text>
  <text x="157" y="249" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e53935">Limitations</text>
  <text x="157" y="265" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">✗ Poaching still possible</text>
  <text x="157" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">✗ Climate change threatens all</text>
  <text x="157" y="299" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">✗ Needs large land area</text>
  <rect x="310" y="45" width="265" height="280" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="442" y="70" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#6a1b9a">EX SITU (Off-site)</text>
  <text x="442" y="90" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Conservation outside natural habitat</text>
  <text x="442" y="110" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Zoos &amp; Captive Breeding</text>
  <text x="442" y="125" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Breeding programs for endangered sp.</text>
  <text x="442" y="142" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Seed banks &amp; gene banks</text>
  <text x="442" y="162" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Advantages</text>
  <text x="442" y="178" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">✓ Prevents immediate extinction</text>
  <text x="442" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">✓ Controlled breeding (max diversity)</text>
  <text x="442" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">✓ Research &amp; public education</text>
  <text x="442" y="229" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">✓ Backup against catastrophe</text>
  <text x="442" y="249" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e53935">Limitations</text>
  <text x="442" y="265" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">✗ Very expensive per individual</text>
  <text x="442" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">✗ Loses genetic diversity</text>
  <text x="442" y="299" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">✗ Reintroduction often fails</text>
  <!-- Summary -->
  <rect x="50" y="340" width="500" height="55" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="300" y="360" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Complementary Strategies</text>
  <text x="300" y="380" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">In situ = preferred primary strategy (protects ecosystem) | Ex situ = critical backup for species facing</text>
  <text x="300" y="395" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">imminent extinction. Ideal: combine both with habitat restoration + reintroduction.</text>
  <rect x="60" y="410" width="480" height="30" rx="6" fill="#e0f2f1"/>
  <text x="300" y="430" text-anchor="middle" font-family="Arial" font-size="10" fill="#00695c">CITES (Convention on International Trade in Endangered Species) regulates trade across borders.</text>
</svg>