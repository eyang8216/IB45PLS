<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 620">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#333"/></marker>
  </defs>
  <rect width="600" height="620" fill="#fff"/>
  <text x="300" y="26" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Polymerase Chain Reaction (PCR)</text>
  <text x="300" y="44" text-anchor="middle" font-family="Arial" font-size="11" fill="#666" font-style="italic">Amplification of DNA in vitro — 3 cycles shown</text>

  <!-- Cycle 1 -->
  <text x="60" y="72" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">Cycle 1</text>
  <text x="60" y="86" font-family="Arial" font-size="9" fill="#666">1 → 2 copies</text>

  <!-- Denaturation -->
  <text x="55" y="112" font-family="Arial" font-size="9" fill="#e53935">① Denaturation</text>
  <text x="55" y="124" font-family="Arial" font-size="8" fill="#888">94-98°C</text>
  <!-- dsDNA -->
  <line x1="30" y1="130" x2="90" y2="130" stroke="#e53935" stroke-width="2.5"/>
  <line x1="30" y1="136" x2="90" y2="136" stroke="#1565c0" stroke-width="2.5"/>
  <line x1="60" y1="140" x2="60" y2="155" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- separated -->
  <line x1="30" y1="160" x2="90" y2="160" stroke="#e53935" stroke-width="2.5"/>
  <line x1="30" y1="175" x2="90" y2="175" stroke="#1565c0" stroke-width="2.5"/>

  <!-- Annealing -->
  <text x="55" y="200" font-family="Arial" font-size="9" fill="#ff8f00">② Annealing</text>
  <text x="55" y="212" font-family="Arial" font-size="8" fill="#888">50-65°C</text>
  <line x1="30" y1="220" x2="90" y2="220" stroke="#e53935" stroke-width="2.5"/>
  <rect x="34" y="222" width="20" height="4" rx="1" fill="#43a047"/>
  <line x1="30" y1="232" x2="90" y2="232" stroke="#1565c0" stroke-width="2.5"/>
  <rect x="58" y="234" width="20" height="4" rx="1" fill="#43a047"/>

  <!-- Extension -->
  <text x="55" y="258" font-family="Arial" font-size="9" fill="#1565c0">③ Extension</text>
  <text x="55" y="270" font-family="Arial" font-size="8" fill="#888">72°C (Taq pol)</text>
  <line x1="30" y1="278" x2="90" y2="278" stroke="#e53935" stroke-width="2.5"/>
  <line x1="30" y1="284" x2="90" y2="284" stroke="#1a6b3c" stroke-width="2.5" stroke-dasharray="4,2"/>
  <line x1="30" y1="295" x2="90" y2="295" stroke="#1565c0" stroke-width="2.5"/>
  <line x1="30" y1="301" x2="90" y2="301" stroke="#1a6b3c" stroke-width="2.5" stroke-dasharray="4,2"/>

  <!-- Result Cycle 1 -->
  <text x="60" y="316" font-family="Arial" font-size="8" fill="#333">2 hybrid molecules</text>

  <!-- Cycle 2 -->
  <rect x="110" y="58" width="2" height="270" fill="#ddd"/>
  <text x="155" y="72" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">Cycle 2</text>
  <text x="155" y="86" font-family="Arial" font-size="9" fill="#666">2 → 4 copies</text>

  <text x="150" y="112" font-family="Arial" font-size="8" fill="#e53935">Denature</text>
  <text x="150" y="200" font-family="Arial" font-size="8" fill="#ff8f00">Anneal</text>
  <text x="150" y="258" font-family="Arial" font-size="8" fill="#1565c0">Extend</text>

  <!-- 4 DNA molecules -->
  <line x1="130" y1="278" x2="190" y2="278" stroke="#e53935" stroke-width="2"/>
  <line x1="130" y1="284" x2="190" y2="284" stroke="#1a6b3c" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="130" y1="295" x2="190" y2="295" stroke="#1565c0" stroke-width="2"/>
  <line x1="130" y1="301" x2="190" y2="301" stroke="#1a6b3c" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- + another pair -->
  <line x1="145" y1="310" x2="205" y2="310" stroke="#e53935" stroke-width="1.5"/>
  <line x1="145" y1="316" x2="205" y2="316" stroke="#1a6b3c" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="145" y1="325" x2="205" y2="325" stroke="#1a6b3c" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="145" y1="331" x2="205" y2="331" stroke="#1565c0" stroke-width="1.5"/>

  <text x="160" y="316" font-family="Arial" font-size="8" fill="#333">4 molecules</text>

  <!-- Cycle 3 -->
  <rect x="220" y="58" width="2" height="290" fill="#ddd"/>
  <text x="270" y="72" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">Cycle 3</text>
  <text x="270" y="86" font-family="Arial" font-size="9" fill="#666">4 → 8 copies</text>
  <text x="270" y="316" font-family="Arial" font-size="8" fill="#333">8 molecules (2 of which are</text>
  <text x="270" y="328" font-family="Arial" font-size="8" fill="#333">the target length)</text>

  <!-- Exponential growth chart -->
  <line x1="130" y1="360" x2="540" y2="360" stroke="#ddd" stroke-width="1"/>

  <text x="300" y="355" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Exponential Amplification (2ⁿ)</text>

  <!-- Chart -->
  <line x1="150" y1="540" x2="550" y2="540" stroke="#333" stroke-width="1.5"/>
  <line x1="150" y1="540" x2="150" y2="370" stroke="#333" stroke-width="1.5"/>
  <text x="350" y="555" font-family="Arial" font-size="10" fill="#333">Cycle Number</text>
  <text x="130" y="455" font-family="Arial" font-size="10" fill="#333" transform="rotate(-90,130,455)">DNA Copies</text>

  <!-- Y axis labels -->
  <text x="140" y="535" font-family="Arial" font-size="8" fill="#666">1</text>
  <text x="140" y="510" font-family="Arial" font-size="8" fill="#666">2</text>
  <text x="140" y="485" font-family="Arial" font-size="8" fill="#666">4</text>
  <text x="140" y="460" font-family="Arial" font-size="8" fill="#666">8</text>
  <text x="138" y="435" font-family="Arial" font-size="8" fill="#666">16</text>
  <text x="138" y="410" font-family="Arial" font-size="8" fill="#666">32</text>

  <!-- Bars -->
  <rect x="170" y="535" width="20" height="5" fill="#43a047"/>
  <text x="180" y="520" font-family="Arial" font-size="7" fill="#666">0</text>

  <rect x="220" y="510" width="20" height="30" fill="#43a047"/>
  <text x="230" y="520" font-family="Arial" font-size="7" fill="#666">1</text>

  <rect x="270" y="485" width="20" height="55" fill="#43a047"/>
  <text x="280" y="520" font-family="Arial" font-size="7" fill="#666">2</text>

  <rect x="320" y="460" width="20" height="80" fill="#1a6b3c"/>
  <text x="330" y="520" font-family="Arial" font-size="7" fill="#666">3</text>

  <rect x="370" y="435" width="20" height="105" fill="#1a6b3c"/>
  <text x="380" y="520" font-family="Arial" font-size="7" fill="#666">4</text>

  <rect x="420" y="410" width="20" height="130" fill="#1a6b3c"/>
  <text x="430" y="520" font-family="Arial" font-size="7" fill="#666">5</text>

  <!-- Exponential curve -->
  <polyline points="180,537 230,507 280,482 330,457 380,432 430,407" fill="none" stroke="#e53935" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- PCR components box -->
  <rect x="460" y="380" width="125" height="150" rx="6" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
  <text x="522" y="398" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">PCR Mix</text>
  <text x="470" y="416" font-family="Arial" font-size="8" fill="#555">• Template DNA</text>
  <text x="470" y="432" font-family="Arial" font-size="8" fill="#555">• Forward primer</text>
  <text x="470" y="448" font-family="Arial" font-size="8" fill="#555">• Reverse primer</text>
  <text x="470" y="464" font-family="Arial" font-size="8" fill="#555">• dNTPs (dATP,dTTP,</text>
  <text x="474" y="476" font-family="Arial" font-size="8" fill="#555">dGTP,dCTP)</text>
  <text x="470" y="494" font-family="Arial" font-size="8" fill="#555">• Taq polymerase</text>
  <text x="470" y="510" font-family="Arial" font-size="8" fill="#555">• Mg²⁺ buffer</text>

  <!-- Legend -->
  <line x1="460" y="548" x2="480" y="548" stroke="#e53935" stroke-width="2"/>
  <text x="484" y="551" font-family="Arial" font-size="8" fill="#333">Template strand</text>
  <line x1="530" y="548" x2="550" y="548" stroke="#1a6b3c" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="554" y="551" font-family="Arial" font-size="8" fill="#333">New strand</text>

  <text x="300" y="595" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c" font-weight="bold">After n cycles: 2ⁿ copies of target sequence</text>
</svg>
