<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <rect width="600" height="450" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Bohr Effect — O₂ Dissociation Curve Shifts</text>

  <!-- Axes -->
  <line x1="70" y1="350" x2="530" y2="350" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="350" x2="70" y2="60" stroke="#333" stroke-width="2"/>
  <text x="300" y="380" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">pO₂ (kPa)</text>
  <text x="30" y="205" text-anchor="middle" font-family="Arial" font-size="12" fill="#333" transform="rotate(-90,30,205)">% Hb Saturation</text>

  <!-- Normal curve (center) -->
  <path d="M70,345 Q170,310 220,250 Q270,180 320,120 Q370,85 440,70 Q500,62 525,60" fill="none" stroke="#333" stroke-width="3"/>
  <text x="400" y="145" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Normal</text>

  <!-- Left-shifted -->
  <path d="M70,340 Q160,290 200,220 Q240,145 280,100 Q330,66 420,58 Q500,52 525,50" fill="none" stroke="#1565c0" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="230" y="135" font-family="Arial" font-size="10" fill="#1565c0">Left-shifted</text>
  <text x="230" y="148" font-family="Arial" font-size="9" fill="#1565c0">↑ affinity</text>

  <!-- Right-shifted -->
  <path d="M70,350 Q170,330 230,275 Q280,220 340,170 Q400,125 470,100 Q515,85 525,82" fill="none" stroke="#e53935" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="360" y="240" font-family="Arial" font-size="10" fill="#e53935">Right-shifted</text>
  <text x="360" y="253" font-family="Arial" font-size="9" fill="#e53935">↓ affinity</text>

  <!-- Left shift factors -->
  <rect x="40" y="70" width="240" height="110" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="160" y="90" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">LEFT SHIFT (↑ Affinity)</text>
  <text x="55" y="110" font-family="Arial" font-size="10" fill="#333">• ↓ CO₂</text>
  <text x="55" y="126" font-family="Arial" font-size="10" fill="#333">• ↑ pH (more alkaline)</text>
  <text x="55" y="142" font-family="Arial" font-size="10" fill="#333">• ↓ Temperature</text>
  <text x="55" y="158" font-family="Arial" font-size="10" fill="#333">• ↓ 2,3-BPG</text>
  <text x="55" y="174" font-family="Arial" font-size="10" fill="#333">• Fetal Hb (HbF vs HbA)</text>

  <!-- Right shift factors -->
  <rect x="320" y="70" width="240" height="110" rx="4" fill="#fce4ec" stroke="#e53935" stroke-width="1.5"/>
  <text x="440" y="90" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e53935">RIGHT SHIFT (↓ Affinity)</text>
  <text x="335" y="110" font-family="Arial" font-size="10" fill="#333">• ↑ CO₂ (Bohr effect)</text>
  <text x="335" y="126" font-family="Arial" font-size="10" fill="#333">• ↓ pH (more acidic)</text>
  <text x="335" y="142" font-family="Arial" font-size="10" fill="#333">• ↑ Temperature</text>
  <text x="335" y="158" font-family="Arial" font-size="10" fill="#333">• ↑ 2,3-BPG</text>
  <text x="335" y="174" font-family="Arial" font-size="10" fill="#333">• Exercising muscle</text>

  <!-- Physiology -->
  <rect x="40" y="195" width="520" height="145" rx="4" fill="#fafafa" stroke="#333" stroke-width="1"/>
  <text x="300" y="218" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Physiological Significance</text>
  <text x="55" y="240" font-family="Arial" font-size="10" fill="#333">In exercising muscle: ↑ CO₂ + ↑ lactic acid → ↓ pH + ↑ temp → right shift</text>
  <text x="55" y="258" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">At any given pO₂, Hb releases MORE O₂ — precisely where it's needed most!</text>
  <text x="55" y="280" font-family="Arial" font-size="10" fill="#333">In lungs: ↑ pO₂ + ↓ CO₂ → left shift → Hb loads O₂ efficiently</text>
  <text x="55" y="302" font-family="Arial" font-size="10" fill="#1565c0">Fetal Hb (HbF): γ chains instead of β → binds 2,3-BPG less → left-shifted</text>
  <text x="55" y="322" font-family="Arial" font-size="10" fill="#1565c0">→ Higher O₂ affinity than maternal Hb → O₂ transfers from mother to fetus at placenta</text>

  <!-- Bohr mechanism -->
  <text x="300" y="400" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Bohr Effect: ↑CO₂ → carbonic anhydrase → H₂CO₃ → H⁺ + HCO₃⁻</text>
  <text x="300" y="416" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">H⁺ binds Hb (stabilizes T state) + CO₂ binds as carbaminohemoglobin → RIGHT SHIFT</text>
  <text x="300" y="440" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">2,3-BPG: binds deoxyHb central cavity → stabilizes T state → right shift</text>
</svg>
