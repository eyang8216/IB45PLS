<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <rect width="600" height="500" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Archaeopteryx lithographica — Transitional Fossil (~150 mya)</text>
  <!-- Dinosaur side (left) -->
  <rect x="30" y="45" width="250" height="40" rx="6" fill="#1565c0" opacity="0.9"/>
  <text x="155" y="70" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">Ancestral: Theropod Dinosaur</text>
  <!-- Bird side (right) -->
  <rect x="320" y="45" width="250" height="40" rx="6" fill="#1a6b3c" opacity="0.9"/>
  <text x="445" y="70" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">Descendant: Modern Birds</text>
  <!-- Arrow -->
  <polygon points="285,65 315,65 305,55 305,50 295,50 295,55" fill="#333"/>
  <text x="300" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="#e53935" font-weight="bold">ARCHAEOPTERYX</text>
  <!-- Archaeopteryx outline -->
  <ellipse cx="300" cy="210" rx="28" ry="22" fill="#81c784" stroke="#333" stroke-width="2"/>
  <ellipse cx="300" cy="195" rx="22" ry="18" fill="#81c784" stroke="#333" stroke-width="2"/>
  <circle cx="300" cy="185" r="5" fill="#333"/>
  <!-- Beak area - teeth -->
  <polygon points="320,190 340,188 320,198" fill="#81c784" stroke="#333" stroke-width="2"/>
  <!-- Teeth -->
  <line x1="335" y1="188" x2="337" y2="194" stroke="#333" stroke-width="1.5"/>
  <line x1="340" y1="189" x2="343" y2="195" stroke="#333" stroke-width="1.5"/>
  <!-- Wings with feathers -->
  <path d="M280,200 Q220,180 200,240 Q230,230 270,220" fill="#81c784" stroke="#333" stroke-width="2"/>
  <line x1="270" y1="200" x2="210" y2="235" stroke="#333" stroke-width="1.5"/>
  <line x1="275" y1="205" x2="215" y2="240" stroke="#333" stroke-width="1.5"/>
  <line x1="278" y1="210" x2="220" y2="245" stroke="#333" stroke-width="1.5"/>
  <path d="M320,200 Q380,180 400,240 Q370,230 330,220" fill="#81c784" stroke="#333" stroke-width="2"/>
  <line x1="330" y1="200" x2="390" y2="235" stroke="#333" stroke-width="1.5"/>
  <line x1="325" y1="205" x2="385" y2="240" stroke="#333" stroke-width="1.5"/>
  <!-- Bony tail -->
  <path d="M300,230 Q290,280 270,310" fill="none" stroke="#333" stroke-width="3"/>
  <line x1="290" y1="250" x2="295" y2="255" stroke="#333" stroke-width="1.5"/>
  <line x1="285" y1="265" x2="290" y2="270" stroke="#333" stroke-width="1.5"/>
  <line x1="280" y1="280" x2="285" y2="285" stroke="#333" stroke-width="1.5"/>
  <line x1="276" y1="295" x2="281" y2="300" stroke="#333" stroke-width="1.5"/>
  <!-- Claws -->
  <line x1="210" y1="240" x2="200" y2="250" stroke="#333" stroke-width="2"/>
  <line x1="210" y1="240" x2="205" y2="252" stroke="#333" stroke-width="2"/>
  <line x1="390" y1="240" x2="400" y2="250" stroke="#333" stroke-width="2"/>
  <line x1="390" y1="240" x2="395" y2="252" stroke="#333" stroke-width="2"/>
  <!-- Legs -->
  <line x1="290" y1="230" x2="285" y2="275" stroke="#333" stroke-width="2.5"/>
  <line x1="310" y1="230" x2="315" y2="275" stroke="#333" stroke-width="2.5"/>
  <!-- Feature labels -->
  <!-- Dino features -->
  <line x1="270" y1="310" x2="100" y2="350" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="100" y="365" text-anchor="middle" font-family="Arial" font-size="12" fill="#1565c0" font-weight="bold">Teeth in jaw (no beak)</text>
  <line x1="270" y1="310" x2="100" y2="390" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="100" y="405" text-anchor="middle" font-family="Arial" font-size="12" fill="#1565c0" font-weight="bold">Long bony tail (unfused vertebrae)</text>
  <line x1="200" y1="250" x2="70" y2="430" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="70" y="445" text-anchor="middle" font-family="Arial" font-size="12" fill="#1565c0" font-weight="bold">Clawed fingers</text>
  <!-- Bird features -->
  <line x1="330" y1="200" x2="500" y2="350" stroke="#1a6b3c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="500" y="365" text-anchor="middle" font-family="Arial" font-size="12" fill="#1a6b3c" font-weight="bold">Feathers (asymmetric flight feathers)</text>
  <line x1="300" y1="195" x2="480" y2="390" stroke="#1a6b3c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="480" y="405" text-anchor="middle" font-family="Arial" font-size="12" fill="#1a6b3c" font-weight="bold">Furcula (wishbone)</text>
  <!-- Mosaic label -->
  <rect x="170" y="460" width="260" height="30" rx="5" fill="#ff8f00" opacity="0.8"/>
  <text x="300" y="480" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">MOSAIC: Reptilian + Avian traits = Transitional</text>
</svg>