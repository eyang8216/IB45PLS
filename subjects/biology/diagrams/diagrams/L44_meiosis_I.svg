<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 550" width="600" height="550">
  <rect width="600" height="550" fill="white"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">L44a — Meiosis I: Reductional Division (2n→n)</text>

  <!-- Prophase I -->
  <rect x="15" y="50" width="175" height="210" rx="6" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="102" y="73" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">Prophase I</text>
  <circle cx="102" cy="155" r="42" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Bivalent/tetrad -->
  <g fill="#1565c0"><rect x="72" y="140" width="5" height="30" rx="1"/></g>
  <g fill="#e53935"><rect x="82" y="138" width="5" height="30" rx="1"/></g>
  <g fill="#1565c0" opacity="0.7"><rect x="72" y="170" width="5" height="30" rx="1"/></g>
  <g fill="#e53935" opacity="0.7"><rect x="82" y="168" width="5" height="30" rx="1"/></g>
  <text x="72" y="215" font-family="Arial" font-size="8" fill="#333">M</text><text x="82" y="215" font-family="Arial" font-size="8" fill="#333">P</text>
  <text x="102" y="235" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Synapsis → Bivalent</text>
  <text x="102" y="250" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Crossing over (chiasmata)</text>

  <!-- Metaphase I -->
  <rect x="210" y="50" width="175" height="210" rx="6" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="297" y="73" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#ff8f00">Metaphase I</text>
  <circle cx="297" cy="155" r="42" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="262" cy="155" r="3" fill="#1565c0"/><circle cx="332" cy="155" r="3" fill="#1565c0"/>
  <line x1="262" y1="155" x2="332" y2="155" stroke="#ddd" stroke-width="0.8" stroke-dasharray="4,3"/>
  <!-- Bivalents at equator -->
  <g fill="#1565c0"><rect x="280" y="140" width="5" height="28" rx="1"/></g>
  <g fill="#e53935"><rect x="288" y="138" width="5" height="28" rx="1"/></g>
  <g fill="#1565c0" opacity="0.6"><rect x="280" y="168" width="5" height="28" rx="1"/></g>
  <g fill="#e53935" opacity="0.6"><rect x="288" y="166" width="5" height="28" rx="1"/></g>
  <text x="297" y="235" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Bivalents align randomly</text>
  <text x="297" y="250" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Independent assortment</text>

  <!-- Anaphase I -->
  <rect x="405" y="50" width="180" height="210" rx="6" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="495" y="73" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">Anaphase I</text>
  <circle cx="495" cy="155" r="42" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="462" cy="155" r="3" fill="#1565c0"/><circle cx="528" cy="155" r="3" fill="#1565c0"/>
  <!-- Homologues separating -->
  <g fill="#1565c0"><rect x="470" y="140" width="5" height="28" rx="1"/><rect x="470" y="170" width="5" height="28" rx="1"/></g>
  <g fill="#e53935"><rect x="515" y="138" width="5" height="28" rx="1"/><rect x="515" y="166" width="5" height="28" rx="1"/></g>
  <text x="495" y="235" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Homologous chromosomes</text>
  <text x="495" y="250" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">separate (centromeres intact!)</text>

  <!-- Telophase I result -->
  <rect x="15" y="280" width="565" height="55" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="297" y="303" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">Telophase I + Cytokinesis → 2 Haploid Cells (n chromosomes, each with 2 chromatids)</text>
  <text x="297" y="325" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Chromosome number halved (2n→n) but DNA content still 2C (sister chromatids attached). No DNA replication before Meiosis II.</text>

  <!-- Key features box -->
  <rect x="15" y="355" width="565" height="130" rx="6" fill="#fafafa" stroke="#333" stroke-width="1.5"/>
  <text x="297" y="378" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#6a1b9a">Meiosis I — Key Features</text>
  <g font-family="Arial" font-size="12" fill="#333">
    <text x="30" y="402">• Prophase I: Synapsis → bivalent/tetrad formation. Crossing over at chiasmata between non-sister chromatids → recombinant chromosomes.</text>
    <text x="30" y="422">• Metaphase I: Bivalents align randomly at equator. Independent assortment creates 2²³ ≈ 8.4 million chromosome combinations.</text>
    <text x="30" y="442">• Anaphase I: Homologous chromosomes separate (centromeres do NOT split — sister chromatids stay together).</text>
    <text x="30" y="462">• Result: 2 haploid cells, each with n chromosomes × 2 chromatids. Reductional division.</text>
  </g>
</svg>