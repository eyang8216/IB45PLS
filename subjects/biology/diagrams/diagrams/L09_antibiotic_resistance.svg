<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <rect width="600" height="500" fill="#fff"/>
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#333">Antibiotic Resistance — Evolution in Real Time</text>
  <text x="300" y="45" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Natural selection in bacteria: antibiotics do NOT cause resistance — they SELECT for it</text>
  <!-- Step 1 -->
  <rect x="15" y="65" width="180" height="120" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="105" y="85" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">Step 1: Variation Pre-exists</text>
  <text x="105" y="103" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Population of bacteria</text>
  <text x="105" y="117" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Random mutations → a few</text>
  <text x="105" y="131" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">cells already have</text>
  <text x="105" y="145" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">resistance alleles</text>
  <!-- Bacteria in step 1 -->
  <ellipse cx="60" cy="165" rx="10" ry="6" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="90" cy="168" rx="10" ry="6" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="120" cy="163" rx="10" ry="6" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="145" cy="170" rx="10" ry="6" fill="#e53935" stroke="#333" stroke-width="2"/>
  <ellipse cx="75" cy="175" rx="10" ry="6" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
  <text x="145" y="185" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935" font-weight="bold">Resistant</text>
  <!-- Arrow -->
  <polygon points="200,125 220,125 220,115 235,130 220,145 220,135 200,135" fill="#333"/>
  <!-- Step 2 -->
  <rect x="240" y="65" width="180" height="120" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="330" y="85" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">Step 2: Selection Pressure</text>
  <text x="330" y="103" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Antibiotic applied</text>
  <text x="330" y="117" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Susceptible bacteria</text>
  <text x="330" y="131" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">DIE</text>
  <text x="330" y="145" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Resistant bacteria SURVIVE</text>
  <ellipse cx="290" cy="165" rx="10" ry="6" fill="#ddd" stroke="#999" stroke-width="1.5" stroke-dasharray="3,2"/>
  <ellipse cx="315" cy="170" rx="10" ry="6" fill="#ddd" stroke="#999" stroke-width="1.5" stroke-dasharray="3,2"/>
  <ellipse cx="345" cy="163" rx="10" ry="6" fill="#e53935" stroke="#333" stroke-width="2"/>
  <ellipse cx="370" cy="168" rx="10" ry="6" fill="#ddd" stroke="#999" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="320" y="185" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935" font-weight="bold">SURVIVES</text>
  <!-- Arrow -->
  <polygon points="425,125 445,125 445,115 460,130 445,145 445,135 425,135" fill="#333"/>
  <!-- Step 3 -->
  <rect x="465" y="65" width="120" height="120" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="525" y="85" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">Step 3: Reproduction</text>
  <text x="525" y="103" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Resistant bacteria</text>
  <text x="525" y="117" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">reproduce rapidly</text>
  <text x="525" y="131" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">No competition</text>
  <ellipse cx="505" cy="155" rx="10" ry="6" fill="#e53935" stroke="#333" stroke-width="2"/>
  <ellipse cx="530" cy="158" rx="10" ry="6" fill="#e53935" stroke="#333" stroke-width="2"/>
  <ellipse cx="550" cy="153" rx="10" ry="6" fill="#e53935" stroke="#333" stroke-width="2"/>
  <ellipse cx="518" cy="168" rx="10" ry="6" fill="#e53935" stroke="#333" stroke-width="2"/>
  <ellipse cx="542" cy="165" rx="10" ry="6" fill="#e53935" stroke="#333" stroke-width="2"/>
  <!-- Bottom section -->
  <rect x="50" y="210" width="500" height="100" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="300" y="235" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">Step 4: Population Evolves — Resistance is now dominant</text>
  <text x="300" y="258" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">The entire population is now resistant to the antibiotic</text>
  <text x="300" y="278" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">A second course of the same antibiotic is useless</text>
  <!-- HGT section -->
  <rect x="50" y="325" width="500" height="85" rx="8" fill="#e0f2f1" stroke="#00838f" stroke-width="2"/>
  <text x="300" y="348" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#00695c">Horizontal Gene Transfer Accelerates Spread</text>
  <text x="300" y="368" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Conjugation (plasmid transfer via pilus) | Transformation (uptake of free DNA)</text>
  <text x="300" y="388" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Transduction (bacteriophage-mediated) | Resistance spreads across species boundaries</text>
  <!-- Key message -->
  <rect x="80" y="430" width="440" height="35" rx="6" fill="#ff8f00" opacity="0.2"/>
  <text x="300" y="452" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">KEY: Antibiotics do NOT cause resistance mutations — they SELECT for pre-existing resistant variants</text>
</svg>