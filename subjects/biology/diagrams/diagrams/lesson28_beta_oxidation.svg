<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420">
  <rect width="600" height="420" fill="#fff"/>
  <text x="300" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#333">β-Oxidation — Fatty Acid Catabolism</text>
  <text x="300" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Mitochondrial Matrix — Each cycle shortens fatty acid by 2 carbons</text>

  <!-- Triglyceride breakdown -->
  <rect x="200" y="60" width="140" height="28" rx="6" fill="#ffcc80" stroke="#ff8f00" stroke-width="2"/>
  <text x="270" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">Triglyceride (Fat)</text>

  <line x1="270" y1="88" x2="270" y2="108" stroke="#333" stroke-width="2" marker-end="url(#ar6)"/>
  <defs><marker id="ar6" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#333"/></marker></defs>

  <!-- Glycerol -->
  <rect x="195" y="111" width="70" height="20" rx="3" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="230" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1565c0">Glycerol → G3P</text>

  <rect x="280" y="111" width="70" height="20" rx="3" fill="#ffcdd2" stroke="#e53935" stroke-width="1"/>
  <text x="315" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e53935">3 Fatty Acids</text>

  <!-- Fatty acid chain -->
  <line x1="315" y1="131" x2="315" y2="155" stroke="#333" stroke-width="1.5" marker-end="url(#ar6)"/>

  <rect x="240" y="158" width="150" height="20" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="315" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Fatty acyl-CoA (C₁₆ shown)</text>

  <line x1="315" y1="178" x2="315" y2="200" stroke="#333" stroke-width="1.5" marker-end="url(#ar6)"/>

  <!-- Beta-oxidation cycle -->
  <rect x="240" y="203" width="150" height="22" rx="5" fill="#c8e6c9" stroke="#43a047" stroke-width="1.5"/>
  <text x="315" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#43a047" font-weight="bold">ONE β-Oxidation Cycle</text>

  <!-- Cycle steps -->
  <rect x="30" y="240" width="540" height="95" rx="6" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">4 Steps per cycle — each produces: 1 FADH₂ + 1 NADH + 1 Acetyl-CoA + (fatty acid shortened by C₂)</text>

  <!-- Step boxes -->
  <rect x="50" y="275" width="110" height="22" rx="3" fill="#fff9c4" stroke="#ff8f00" stroke-width="1"/>
  <text x="105" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">1. Oxidation (FAD → FADH₂)</text>
  <line x1="160" y1="286" x2="185" y2="286" stroke="#333" stroke-width="1.5" marker-end="url(#ar6)"/>

  <rect x="190" y="275" width="110" height="22" rx="3" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="245" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">2. Hydration (H₂O)</text>
  <line x1="300" y1="286" x2="325" y2="286" stroke="#333" stroke-width="1.5" marker-end="url(#ar6)"/>

  <rect x="330" y="275" width="110" height="22" rx="3" fill="#ede7f6" stroke="#6a1b9a" stroke-width="1"/>
  <text x="385" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">3. Oxidation (NAD⁺ → NADH)</text>
  <line x1="440" y1="286" x2="465" y2="286" stroke="#333" stroke-width="1.5" marker-end="url(#ar6)"/>

  <rect x="470" y="275" width="100" height="22" rx="3" fill="#ffcdd2" stroke="#e53935" stroke-width="1"/>
  <text x="520" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">4. Thiolysis (CoA)</text>

  <!-- Products -->
  <text x="300" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Produces: <tspan fill="#ff8f00">Acetyl-CoA (C₂)</tspan> + <tspan fill="#6a1b9a">NADH</tspan> + <tspan fill="#ff8f00">FADH₂</tspan> + Acyl-CoA (Cₙ₋₂)</text>

  <!-- Yield -->
  <rect x="30" y="348" width="540" height="65" rx="6" fill="none" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="300" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a6b3c" font-weight="bold">Yield from one Palmitic Acid (C₁₆): 7 cycles</text>
  <text x="50" y="390" font-family="Arial, sans-serif" font-size="10" fill="#333">→ 8 Acetyl-CoA enter Krebs → 8 GTP + 24 NADH + 8 FADH₂</text>
  <text x="50" y="405" font-family="Arial, sans-serif" font-size="10" fill="#333">→ From β-oxidation directly: 7 NADH + 7 FADH₂</text>

  <text x="300" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Total: ~106-108 ATP per palmitate (vs. ~30-32 per glucose) — fat is a dense energy store!</text>
</svg>
