<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" width="600" height="520">
  <rect width="600" height="520" fill="white"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">L38a — Energy Pyramid &amp; 10% Rule</text>

  <!-- Pyramid tiers -->
  <!-- TL4 -->
  <polygon points="300,85 380,150 220,150" fill="#e53935" stroke="#333" stroke-width="2"/>
  <text x="300" y="125" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">TL4: Tertiary</text>
  <text x="300" y="142" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Consumers 10 kJ</text>

  <!-- TL3 -->
  <polygon points="300,160 430,240 170,240" fill="#ff8f00" stroke="#333" stroke-width="2"/>
  <text x="300" y="200" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">TL3: Secondary</text>
  <text x="300" y="217" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Consumers 100 kJ</text>

  <!-- TL2 -->
  <polygon points="300,250 480,330 120,330" fill="#43a047" stroke="#333" stroke-width="2"/>
  <text x="300" y="285" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">TL2: Primary Consumers</text>
  <text x="300" y="302" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Herbivores 1,000 kJ</text>

  <!-- TL1 -->
  <polygon points="300,340 530,430 70,430" fill="#1a6b3c" stroke="#333" stroke-width="2"/>
  <text x="300" y="385" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">TL1: Producers</text>
  <text x="300" y="405" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Plants, Algae 10,000 kJ m⁻² yr⁻¹</text>

  <!-- Heat loss arrows -->
  <g fill="#e53935" font-family="Arial" font-size="10">
    <!-- Between TL1-TL2 -->
    <path d="M500,340 Q530,330 540,310" fill="none" stroke="#e53935" stroke-width="1.8"/>
    <text x="550" y="320" fill="#e53935">90% lost</text>
    <text x="550" y="333" fill="#e53935">as heat</text>

    <!-- Between TL2-TL3 -->
    <path d="M460,250 Q490,240 500,220" fill="none" stroke="#e53935" stroke-width="1.8"/>
    <text x="510" y="228" fill="#e53935">90% lost</text>
    <text x="510" y="241" fill="#e53935">as heat</text>

    <!-- Between TL3-TL4 -->
    <path d="M400,160 Q430,150 440,130" fill="none" stroke="#e53935" stroke-width="1.8"/>
    <text x="450" y="135" fill="#e53935">90% lost</text>
    <text x="450" y="148" fill="#e53935">as heat</text>
  </g>

  <!-- Energy flow arrow on side -->
  <path d="M555,430 L555,85" stroke="#1565c0" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs><marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#1565c0"/></marker></defs>
  <text x="570" y="270" font-family="Arial" font-size="11" fill="#1565c0" transform="rotate(90,570,270)">Energy flow direction</text>

  <!-- Bottom info -->
  <rect x="30" y="450" width="540" height="55" rx="4" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
  <text x="300" y="472" text-anchor="middle" font-family="Arial" font-size="12" fill="#333" font-weight="bold">Why only ~10% transfer?</text>
  <text x="300" y="490" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Not all consumed + not all digested (faeces) + most absorbed energy lost as heat from respiration (2nd Law of Thermodynamics)</text>
  <text x="300" y="503" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">"Energy flows one way; matter cycles"</text>
</svg>