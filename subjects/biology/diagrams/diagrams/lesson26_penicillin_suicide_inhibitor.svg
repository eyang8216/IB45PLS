<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <rect width="600" height="360" fill="#fff"/>
  <text x="300" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#333">Penicillin — Suicide Inhibitor of Bacterial Transpeptidase</text>

  <!-- Normal pathway -->
  <text x="145" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a6b3c">Normal Cell Wall Synthesis</text>

  <!-- Transpeptidase -->
  <ellipse cx="145" cy="110" rx="50" ry="22" fill="#81c784" stroke="#1a6b3c" stroke-width="2"/>
  <text x="145" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Transpeptidase</text>
  <text x="145" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">(active)</text>

  <!-- Active site shown -->
  <path d="M130,115 L140,125 L150,115" fill="none" stroke="#1a6b3c" stroke-width="1.5"/>

  <!-- Substrate -->
  <rect x="220" y="100" width="45" height="20" rx="3" fill="#ffcc80" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="242" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ff8f00">D-Ala-D-Ala</text>
  <line x1="220" y1="110" x2="195" y2="110" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Product -->
  <line x1="90" y1="130" x2="200" y2="130" stroke="#333" stroke-width="2" marker-end="url(#a4)"/>
  <rect x="50" y="135" width="40" height="18" rx="3" fill="#c8e6c9" stroke="#43a047" stroke-width="1.5"/>
  <text x="70" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#43a047">Cross-link</text>

  <text x="145" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a6b3c">Normal peptidoglycan cross-linking</text>

  <!-- Divider -->
  <line x1="30" y1="190" x2="570" y2="190" stroke="#ddd" stroke-width="1"/>

  <!-- Penicillin mechanism -->
  <text x="145" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e53935">With Penicillin Present</text>

  <!-- Penicillin structure -->
  <rect x="50" y="240" width="60" height="30" rx="6" fill="#ffcdd2" stroke="#e53935" stroke-width="2"/>
  <text x="80" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e53935" font-weight="bold">Penicillin</text>
  <text x="80" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e53935">β-lactam ring</text>

  <!-- Binds -->
  <line x1="110" y1="255" x2="155" y2="255" stroke="#e53935" stroke-width="2" marker-end="url(#a4)"/>

  <defs><marker id="a4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#333"/></marker></defs>

  <!-- Transpeptidase bound -->
  <ellipse cx="200" cy="255" rx="50" ry="22" fill="#ffcdd2" stroke="#e53935" stroke-width="2"/>
  <text x="200" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e53935" font-weight="bold">Transpeptidase</text>
  <text x="200" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e53935">(permanently inactivated)</text>

  <!-- Blocked pathway -->
  <line x1="270" y1="255" x2="320" y2="255" stroke="#e53935" stroke-width="3"/>
  <rect x="330" y="248" width="55" height="16" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="357" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#999">No cross-links</text>

  <!-- Result -->
  <text x="450" y="255" font-family="Arial, sans-serif" font-size="11" fill="#e53935" font-weight="bold">→ Cell lysis</text>

  <!-- Mechanism details box -->
  <rect x="30" y="290" width="540" height="60" rx="6" fill="none" stroke="#e53935" stroke-width="1.5"/>
  <text x="300" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e53935" font-weight="bold">Suicide (Irreversible) Inhibition Mechanism</text>
  <text x="300" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">β-lactam ring mimics D-Ala-D-Ala → binds active site → ring opens → covalently links to enzyme Ser residue</text>
  <text x="300" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Enzyme is permanently disabled. Selective toxicity: human cells lack peptidoglycan cell walls.</text>
</svg>
