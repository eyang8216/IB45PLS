<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Brassica oleracea — Artificial Selection as Evidence</text>

  <!-- Center: wild mustard -->
  <ellipse cx="300" cy="200" rx="65" ry="50" fill="#81c784" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="300" y="193" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">Wild Mustard</text>
  <text x="300" y="210" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">Brassica oleracea</text>
  <text x="300" y="225" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(original species)</text>

  <!-- Rays going out -->
  <!-- Kale (left) -->
  <line x1="235" y1="200" x2="130" y2="100" stroke="#43a047" stroke-width="2"/>
  <rect x="80" y="50" width="100" height="55" rx="8" fill="#c8e6c9" stroke="#43a047" stroke-width="2"/>
  <text x="130" y="73" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">Kale</text>
  <text x="130" y="93" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Large leaves selected</text>

  <!-- Brussels sprouts (bottom-left) -->
  <line x1="250" y1="250" x2="150" y2="350" stroke="#43a047" stroke-width="2"/>
  <rect x="80" y="330" width="140" height="55" rx="8" fill="#c8e6c9" stroke="#43a047" stroke-width="2"/>
  <text x="150" y="353" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">Brussels Sprouts</text>
  <text x="150" y="373" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Lateral buds selected</text>

  <!-- Cabbage (right) -->
  <line x1="365" y1="200" x2="470" y2="100" stroke="#43a047" stroke-width="2"/>
  <rect x="420" y="50" width="100" height="55" rx="8" fill="#c8e6c9" stroke="#43a047" stroke-width="2"/>
  <text x="470" y="73" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">Cabbage</text>
  <text x="470" y="93" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Terminal bud selected</text>

  <!-- Broccoli (top-right) -->
  <line x1="350" y1="150" x2="470" y2="250" stroke="#43a047" stroke-width="2"/>
  <rect x="420" y="310" width="100" height="55" rx="8" fill="#c8e6c9" stroke="#43a047" stroke-width="2"/>
  <text x="470" y="333" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">Broccoli</text>
  <text x="470" y="353" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Flower buds selected</text>

  <!-- Kohlrabi (top-left) -->
  <line x1="250" y1="150" x2="130" y2="280" stroke="#43a047" stroke-width="2"/>
  <rect x="30" y="310" width="100" height="55" rx="8" fill="#c8e6c9" stroke="#43a047" stroke-width="2"/>
  <text x="80" y="333" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">Kohlrabi</text>
  <text x="80" y="353" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Stem selected</text>

  <!-- Title note -->
  <text x="300" y="395" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">
    One species → radically different forms through selective breeding for different plant parts
  </text>
</svg>
