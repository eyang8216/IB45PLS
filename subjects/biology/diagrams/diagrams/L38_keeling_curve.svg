  <!-- Labels -->
  <text x="250" y="195" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Anthropogenic increase</text>
  <text x="250" y="210" font-family="Arial" font-size="11" fill="#555">from fossil fuel burning</text>

  <text x="150" y="360" font-family="Arial" font-size="11" fill="#e53935">↑ Northern winter</text>
  <text x="140" y="330" font-family="Arial" font-size="11" fill="#e53935">↓ Northern summer</text>

  <!-- Labels on curve -->
  <text x="410" y="140" font-family="Arial" font-size="11" fill="#e53935" transform="rotate(-38,410,140)">~420 ppm (2024)</text>

  <!-- Seasonal note -->
  <rect x="65" y="390" width="495" height="45" rx="6" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
  <text x="300" y="410" text-anchor="middle" font-family="Arial" font-size="12" fill="#333" font-weight="bold">Seasonal sawtooth: May peak (winter respiration) → September trough (summer photosynthesis)</text>
  <text x="300" y="428" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Amplitude ~5-6 ppm. Dominated by Northern Hemisphere forests (more land mass). Mauna Loa Observatory, Hawaii.</text>
</svg>