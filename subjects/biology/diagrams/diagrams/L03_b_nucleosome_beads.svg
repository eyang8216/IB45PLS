### L03_b: DNA Nucleosome — Beads on a String ###
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 550" style="background:#fff">
  <defs><linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a6b3c"/><stop offset="100%" stop-color="#43a047"/></linearGradient></defs>
  <rect width="600" height="550" fill="#fff"/>
  <rect x="0" y="0" width="600" height="42" fill="url(#hdr)"/>
  <text x="300" y="28" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="16">Nucleosome Structure — DNA Packaging in Eukaryotes</text>

  <!-- Central nucleosome — large detailed -->
  <ellipse cx="300" cy="160" rx="70" ry="55" fill="#81c784" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="300" y="150" text-anchor="middle" fill="#1a6b3c" font-family="Arial" font-weight="bold" font-size="13">HISTONE OCTAMER</text>
  <text x="300" y="168" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">2×(H2A + H2B + H3 + H4)</text>

  <!-- DNA wrapping around octamer — 1.65 turns -->
  <path d="M220,160 C220,100 260,80 300,80 C340,80 380,100 380,160 C380,220 340,240 300,240 C260,240 220,220 220,160" stroke="#1565c0" stroke-width="3.5" fill="none"/>
  <path d="M210,160 C210,90 250,68 300,68 C350,68 390,90 390,160 C390,230 350,252 300,252 C250,252 210,230 210,160" stroke="#1565c0" stroke-width="3.5" fill="none" stroke-dasharray="8,3" opacity="0.5"/>

  <text x="410" y="145" fill="#1565c0" font-family="Arial" font-size="12" font-weight="bold">DNA</text>
  <text x="410" y="162" fill="#1565c0" font-family="Arial" font-size="11">~146 bp</text>
  <text x="410" y="178" fill="#1565c0" font-family="Arial" font-size="11">1.65 turns</text>

  <!-- H1 linker histone -->
  <rect x="285" y="235" width="30" height="22" rx="3" fill="#e53935" stroke="#b71c1c" stroke-width="2"/>
  <text x="300" y="250" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="10">H1</text>
  <text x="355" y="252" fill="#e53935" font-family="Arial" font-size="11">Linker histone H1</text>

  <!-- Left linker DNA -->
  <line x1="100" y1="160" x2="210" y2="160" stroke="#1565c0" stroke-width="3"/>
  <text x="150" y="150" text-anchor="middle" fill="#1565c0" font-family="Arial" font-size="11">Linker DNA</text>
  <text x="150" y="175" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">(20–80 bp)</text>

  <!-- Right linker DNA -->
  <line x1="390" y1="160" x2="500" y2="160" stroke="#1565c0" stroke-width="3"/>
  <text x="450" y="150" text-anchor="middle" fill="#1565c0" font-family="Arial" font-size="11">Linker DNA</text>

  <!-- Beads-on-a-string below showing multiple nucleosomes -->
  <text x="300" y="310" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="14">"Beads-on-a-String" — 10 nm Fibre</text>

  <!-- Multiple nucleosomes in a row -->
  <ellipse cx="80" cy="370" rx="32" ry="24" fill="#a5d6a7" stroke="#2e7d32" stroke-width="2"/>
  <ellipse cx="190" cy="370" rx="32" ry="24" fill="#a5d6a7" stroke="#2e7d32" stroke-width="2"/>
  <ellipse cx="300" cy="370" rx="32" ry="24" fill="#a5d6a7" stroke="#2e7d32" stroke-width="2"/>
  <ellipse cx="410" cy="370" rx="32" ry="24" fill="#a5d6a7" stroke="#2e7d32" stroke-width="2"/>
  <ellipse cx="520" cy="370" rx="32" ry="24" fill="#a5d6a7" stroke="#2e7d32" stroke-width="2"/>

  <!-- DNA string connecting them -->
  <line x1="48" y1="370" x2="112" y2="370" stroke="#1565c0" stroke-width="2"/>
  <line x1="112" y1="370" x2="158" y2="370" stroke="#1565c0" stroke-width="2"/>
  <line x1="158" y1="370" x2="222" y2="370" stroke="#1565c0" stroke-width="2"/>
  <line x1="222" y1="370" x2="268" y2="370" stroke="#1565c0" stroke-width="2"/>
  <line x1="268" y1="370" x2="332" y2="370" stroke="#1565c0" stroke-width="2"/>
  <line x1="332" y1="370" x2="378" y2="370" stroke="#1565c0" stroke-width="2"/>
  <line x1="378" y1="370" x2="442" y2="370" stroke="#1565c0" stroke-width="2"/>
  <line x1="442" y1="370" x2="488" y2="370" stroke="#1565c0" stroke-width="2"/>
  <line x1="488" y1="370" x2="552" y2="370" stroke="#1565c0" stroke-width="2"/>

  <!-- Compaction levels -->
  <text x="300" y="420" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="14">Hierarchical DNA Compaction</text>

  <!-- Arrow progression -->
  <text x="80" y="455" text-anchor="middle" fill="#1565c0" font-family="Arial" font-size="11">DNA double helix</text>
  <text x="80" y="470" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">(2 nm)</text>
  <text x="200" y="455" text-anchor="middle" fill="#1a6b3c" font-family="Arial" font-size="11">Beads-on-a-string</text>
  <text x="200" y="470" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">10 nm (7× compaction)</text>
  <text x="350" y="455" text-anchor="middle" fill="#e53935" font-family="Arial" font-size="11">30 nm solenoid</text>
  <text x="350" y="470" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">(50× compaction)</text>
  <text x="500" y="455" text-anchor="middle" fill="#6a1b9a" font-family="Arial" font-size="11">Metaphase chromosome</text>
  <text x="500" y="470" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">(10,000× compaction)</text>

  <!-- Arrows -->
  <line x1="130" y1="462" x2="170" y2="462" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="170,458 178,462 170,466" fill="#333"/>
  <line x1="260" y1="462" x2="300" y2="462" stroke="#333" stroke-width="2"/>
  <polygon points="300,458 308,462 300,466" fill="#333"/>
  <line x1="400" y1="462" x2="440" y2="462" stroke="#333" stroke-width="2"/>
  <polygon points="440,458 448,462 440,466" fill="#333"/>

  <rect x="30" y="490" width="540" height="50" rx="8" fill="#f5f5f5"/>
  <text x="300" y="510" text-anchor="middle" fill="#333" font-family="Arial" font-size="11">Euchromatin (less condensed, active) ↔ Heterochromatin (condensed, inactive)</text>
  <text x="300" y="528" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">Histone acetylation loosens chromatin → gene activation | Methylation patterns regulate accessibility</text>
</svg>