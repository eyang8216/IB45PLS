<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" width="600" height="520">
  <rect width="600" height="520" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Photoperiodism — Critical Night Length</text>

  <!-- Short-day plant (cocklebur) -->
  <text x="200" y="52" text-anchor="middle" font-family="Arial" font-size="14" fill="#e53935" font-weight="bold">Short-Day Plant (Cocklebur)</text>
  <text x="200" y="68" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Flowers when NIGHT &gt; 8.5 hours</text>

  <!-- Long night = flowers -->
  <rect x="50" y="80" width="300" height="80" rx="5" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="200" y="100" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a6b3c" font-weight="bold">Long Night → FLOWERS ✓</text>
  <!-- Day bar -->
  <rect x="70" y="110" width="100" height="20" rx="3" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="120" y="124" text-anchor="middle" font-family="Arial" font-size="9" fill="#f57f17">Day 10h</text>
  <!-- Night bar -->
  <rect x="170" y="110" width="140" height="20" rx="3" fill="#37474f" stroke="#263238" stroke-width="1.5"/>
  <text x="240" y="124" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Night 14h</text>
  <text x="310" y="135" font-family="Arial" font-size="14" fill="#e53935">🌼</text>

  <!-- Short night = no flowers -->
  <rect x="50" y="170" width="300" height="80" rx="5" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="200" y="190" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935" font-weight="bold">Short Night → NO Flowers ✕</text>
  <rect x="70" y="200" width="150" height="20" rx="3" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="145" y="214" text-anchor="middle" font-family="Arial" font-size="9" fill="#f57f17">Day 16h</text>
  <rect x="220" y="200" width="90" height="20" rx="3" fill="#37474f" stroke="#263238" stroke-width="1.5"/>
  <text x="265" y="214" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Night 8h</text>

  <!-- Long-day plant (spinach) -->
  <text x="440" y="52" text-anchor="middle" font-family="Arial" font-size="14" fill="#1565c0" font-weight="bold">Long-Day Plant (Spinach)</text>
  <text x="440" y="68" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Flowers when NIGHT &lt; 8.5 hours</text>

  <!-- Short night = flowers -->
  <rect x="350" y="80" width="230" height="80" rx="5" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="465" y="100" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a6b3c" font-weight="bold">Short Night → FLOWERS ✓</text>
  <rect x="370" y="110" width="120" height="20" rx="3" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="430" y="124" text-anchor="middle" font-family="Arial" font-size="9" fill="#f57f17">Day 16h</text>
  <rect x="490" y="110" width="70" height="20" rx="3" fill="#37474f" stroke="#263238" stroke-width="1.5"/>
  <text x="525" y="124" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Night 8h</text>
  <text x="340" y="135" font-family="Arial" font-size="14" fill="#43a047">🌿</text>

  <!-- Long night = no flowers -->
  <rect x="350" y="170" width="230" height="80" rx="5" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="465" y="190" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935" font-weight="bold">Long Night → NO Flowers ✕</text>
  <rect x="370" y="200" width="80" height="20" rx="3" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="410" y="214" text-anchor="middle" font-family="Arial" font-size="9" fill="#f57f17">Day 10h</text>
  <rect x="450" y="200" width="110" height="20" rx="3" fill="#37474f" stroke="#263238" stroke-width="1.5"/>
  <text x="505" y="214" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Night 14h</text>

  <!-- Night-break experiments -->
  <line x1="300" y1="270" x2="300" y2="285" stroke="#999" stroke-width="1"/>
  <text x="300" y="295" text-anchor="middle" font-family="Arial" font-size="14" fill="#6a1b9a" font-weight="bold">Night-Break Experiment</text>

  <!-- Short-day with night break -->
  <rect x="50" y="310" width="500" height="50" rx="5" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="80" y="330" font-family="Arial" font-size="11" fill="#e65100" font-weight="bold">Short-Day Plant:</text>
  <rect x="200" y="318" width="80" height="15" rx="3" fill="#fff9c4" stroke="#f9a825" stroke-width="1"/>
  <text x="240" y="329" text-anchor="middle" font-family="Arial" font-size="8" fill="#f57f17">Day</text>
  <rect x="280" y="318" width="60" height="15" rx="3" fill="#37474f" stroke="#263238" stroke-width="1"/>
  <text x="310" y="329" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Night</text>
  <rect x="340" y="314" width="8" height="22" rx="2" fill="#e53935"/>
  <text x="344" y="345" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Red</text>
  <text x="344" y="355" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">flash</text>
  <rect x="352" y="318" width="60" height="15" rx="3" fill="#37474f" stroke="#263238" stroke-width="1"/>
  <text x="382" y="329" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Night</text>
  <text x="430" y="345" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">→ NO FLOWERS ✕</text>

  <!-- Long-day with night break -->
  <rect x="50" y="370" width="500" height="50" rx="5" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="80" y="390" font-family="Arial" font-size="11" fill="#2e7d32" font-weight="bold">Long-Day Plant:</text>
  <rect x="200" y="378" width="80" height="15" rx="3" fill="#fff9c4" stroke="#f9a825" stroke-width="1"/>
  <text x="240" y="389" text-anchor="middle" font-family="Arial" font-size="8" fill="#f57f17">Day</text>
  <rect x="280" y="378" width="60" height="15" rx="3" fill="#37474f" stroke="#263238" stroke-width="1"/>
  <text x="310" y="389" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Night</text>
  <rect x="340" y="374" width="8" height="22" rx="2" fill="#e53935"/>
  <text x="344" y="405" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Red</text>
  <text x="344" y="415" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">flash</text>
  <rect x="352" y="378" width="60" height="15" rx="3" fill="#37474f" stroke="#263238" stroke-width="1"/>
  <text x="382" y="389" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Night</text>
  <text x="430" y="405" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c" font-weight="bold">→ FLOWERS ✓</text>

  <!-- Far-red follow-up -->
  <rect x="50" y="430" width="500" height="50" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="80" y="450" font-family="Arial" font-size="10" fill="#1565c0">Red then Far-Red:</text>
  <rect x="200" y="438" width="80" height="15" rx="3" fill="#fff9c4" stroke="#f9a825" stroke-width="1"/>
  <rect x="280" y="438" width="30" height="15" rx="3" fill="#37474f" stroke="#263238" stroke-width="1"/>
  <rect x="313" y="434" width="8" height="22" rx="2" fill="#e53935"/>
  <text x="317" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">R</text>
  <rect x="325" y="434" width="8" height="22" rx="2" fill="#9c27b0"/>
  <text x="329" y="470" text-anchor="middle" font-family="Arial" font-size="8" fill="#9c27b0">FR</text>
  <rect x="337" y="438" width="50" height="15" rx="3" fill="#37474f" stroke="#263238" stroke-width="1"/>
  <text x="420" y="465" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">→ Restores short-day flowering</text>

  <text x="300" y="500" text-anchor="middle" font-family="Arial" font-size="9" fill="#999" font-style="italic">Key: Plants measure NIGHT length, not day length. Phytochrome is the photoreceptor.</text>
</svg>