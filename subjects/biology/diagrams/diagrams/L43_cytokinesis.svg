<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460" width="600" height="460">
  <rect width="600" height="460" fill="white"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">L43c — Cytokinesis: Animal vs Plant Cell</text>

  <!-- Animal Cytokinesis -->
  <rect x="20" y="50" width="265" height="340" rx="6" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="152" y="78" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#ff8f00">Animal Cell — Cleavage Furrow</text>

  <!-- Series of 3 stages -->
  <!-- Stage 1: begin -->
  <circle cx="95" cy="140" r="30" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="95" y1="123" x2="95" y2="157" stroke="#e53935" stroke-width="2"/>
  <text x="95" y="185" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Contractile ring forms</text>

  <text x="152" y="140" font-size="18">→</text>

  <!-- Stage 2: pinching -->
  <path d="M158,110 Q152,130 152,140 Q152,150 158,170" fill="none" stroke="#333" stroke-width="2"/>
  <path d="M238,110 Q244,130 244,140 Q244,150 238,170" fill="none" stroke="#333" stroke-width="2"/>
  <path d="M158,110 Q200,130 238,110" fill="none" stroke="#333" stroke-width="2"/>
  <path d="M158,170 Q200,150 238,170" fill="none" stroke="#333" stroke-width="2"/>
  <text x="198" y="185" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Deepening furrow</text>

  <!-- Stage 3: nearly separated -->
  <circle cx="265" cy="255" r="25" fill="#fafafa" stroke="#333" stroke-width="2"/>
  <circle cx="310" cy="255" r="25" fill="#fafafa" stroke="#333" stroke-width="2"/>
  <text x="152" y="305" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Two daughter cells</text>

  <!-- Mechanism box -->
  <rect x="35" y="325" width="235" height="55" rx="4" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="152" y="345" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935" font-weight="bold">Actin-Myosin Contractile Ring</text>
  <text x="152" y="363" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Actin+myosin microfilaments form ring</text>
  <text x="152" y="377" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Ring contracts → membrane pinches inward</text>

  <!-- Plant Cytokinesis -->
  <rect x="310" y="50" width="270" height="340" rx="6" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="445" y="78" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#1a6b3c">Plant Cell — Cell Plate Formation</text>

  <!-- Stage 1 -->
  <rect x="350" y="105" width="80" height="50" rx="3" fill="none" stroke="#333" stroke-width="2"/>
  <g fill="#ff8f00">
    <circle cx="375" cy="130" r="3"/><circle cx="390" cy="128" r="3"/><circle cx="405" cy="130" r="3"/>
  </g>
  <text x="390" y="170" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Golgi vesicles accumulate</text>
  <text x="390" y="183" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">at equator</text>

  <!-- Stage 2 -->
  <rect x="450" y="220" width="80" height="50" rx="3" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="470" y1="245" x2="510" y2="245" stroke="#1a6b3c" stroke-width="3"/>
  <text x="490" y="285" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Vesicles fuse → cell plate</text>

  <!-- Stage 3 -->
  <rect x="355" y="310" width="80" height="50" rx="3" fill="none" stroke="#333" stroke-width="2"/>
  <rect x="355" y="310" width="80" height="25" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="355" y1="335" x2="435" y2="335" stroke="#1a6b3c" stroke-width="3"/>
  <text x="395" y="378" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">New cell wall + membrane</text>

  <!-- Mechanism box -->
  <rect x="325" y="390" width="240" height="50" rx="4" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="445" y="410" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a6b3c" font-weight="bold">Golgi Vesicle Fusion</text>
  <text x="445" y="427" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Vesicles (pectin, cellulose) → cell plate → middle lamella + 1° walls</text>

  <!-- Summary -->
  <rect x="20" y="405" width="560" height="42" rx="6" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="300" y="425" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Animal: cleavage furrow (actin-myosin) pinches inward | Plant: cell plate (Golgi vesicles) grows outward — rigid cell wall prevents pinching</text>
  <text x="300" y="442" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Cytokinesis is part of M phase but NOT part of mitosis (mitosis = nuclear division only)</text>
</svg>