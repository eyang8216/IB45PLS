<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320">
  <rect width="600" height="320" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Peroxisome — Structure &amp; Function</text>

  <!-- Peroxisome -->
  <circle cx="220" cy="170" r="75" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="220" y="130" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">Peroxisome</text>
  <text x="220" y="145" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Single membrane</text>

  <!-- Oxidase reaction -->
  <text x="220" y="175" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Oxidase</text>
  <text x="170" y="190" font-family="Arial" font-size="8" fill="#e53935">RH₂ + O₂</text>
  <text x="220" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">→ R + H₂O₂</text>

  <text x="220" y="225" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Catalase</text>
  <text x="170" y="240" font-family="Arial" font-size="8" fill="#1565c0">2H₂O₂</text>
  <text x="220" y="255" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">→ 2H₂O + O₂</text>

  <!-- H2O2 toxic intermediate -->
  <text x="370" y="175" font-family="Arial" font-size="11" font-weight="bold" fill="#e53935">H₂O₂</text>
  <text x="370" y="190" font-family="Arial" font-size="9" fill="#e53935">(toxic)</text>

  <!-- Arrow to catalase -->
  <line x1="300" y1="195" x2="340" y2="195" stroke="#e53935" stroke-width="2"/>
  <polygon points="340,190 350,195 340,200" fill="#e53935"/>

  <!-- Safe products -->
  <text x="370" y="230" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">H₂O + O₂</text>
  <text x="370" y="245" font-family="Arial" font-size="9" fill="#1565c0">(safe)</text>

  <!-- Functions box -->
  <rect x="20" y="40" width="280" height="100" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="160" y="60" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">Functions</text>
  <text x="35" y="78" font-family="Arial" font-size="10" fill="#333">• Fatty acid β-oxidation</text>
  <text x="35" y="93" font-family="Arial" font-size="10" fill="#333">• Detoxify alcohol in liver</text>
  <text x="35" y="108" font-family="Arial" font-size="10" fill="#333">• Breakdown of very long chain</text>
  <text x="38" y="121" font-family="Arial" font-size="10" fill="#333">fatty acids</text>
  <text x="35" y="136" font-family="Arial" font-size="10" fill="#333">• Glyoxylate cycle (plants)</text>

  <rect x="350" y="40" width="230" height="100" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="465" y="60" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">Key Features</text>
  <text x="365" y="78" font-family="Arial" font-size="10" fill="#333">• Single membrane (not from</text>
  <text x="368" y="91" font-family="Arial" font-size="10" fill="#333">endomembrane system)</text>
  <text x="365" y="108" font-family="Arial" font-size="10" fill="#333">• Self-replicating (divide by</text>
  <text x="368" y="121" font-family="Arial" font-size="10" fill="#333">fission)</text>
  <text x="365" y="136" font-family="Arial" font-size="10" fill="#333">• Contains oxidative enzymes</text>

  <text x="300" y="300" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Oxidase creates H₂O₂ (toxic) → Catalase breaks it down → H₂O + O₂ (safe)</text>
</svg>