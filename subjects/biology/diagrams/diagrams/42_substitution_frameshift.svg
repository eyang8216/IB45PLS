<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <rect width="600" height="500" fill="#fff"/>
  <text x="300" y="24" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#1a6b3c">Types of Mutations: Substitution &amp; Frameshift</text>
  <text x="300" y="42" text-anchor="middle" font-family="Arial" font-size="10" fill="#666" font-style="italic">Point mutations, insertions, and deletions</text>

  <!-- Substitution types -->
  <text x="300" y="68" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Substitution (Point) Mutations</text>

  <!-- Original -->
  <rect x="30" y="80" width="540" height="45" rx="5" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="50" y="98" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Original:</text>
  <text x="130" y="98" font-family="Arial" font-size="10" fill="#333">DNA: TTC → mRNA: AAG →</text>
  <rect x="310" y="86" width="60" height="18" rx="3" fill="#1a6b3c" opacity="0.2" stroke="#1a6b3c" stroke-width="1"/>
  <text x="340" y="99" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c" font-weight="bold">Lysine</text>
  <text x="390" y="99" font-family="Arial" font-size="10" fill="#555">(normal protein function)</text>

  <!-- Silent -->
  <rect x="30" y="133" width="540" height="42" rx="5" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5"/>
  <text x="50" y="150" font-family="Arial" font-size="10" fill="#1565c0" font-weight="bold">Silent:</text>
  <text x="130" y="150" font-family="Arial" font-size="10" fill="#333">TTC → TTT | mRNA: AAG → AAA →</text>
  <rect x="350" y="138" width="60" height="18" rx="3" fill="#1565c0" opacity="0.2" stroke="#1565c0" stroke-width="1"/>
  <text x="380" y="150" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0" font-weight="bold">Lysine</text>
  <text x="430" y="151" font-family="Arial" font-size="9" fill="#555">Same amino acid (degeneracy) — NO effect ✓</text>

  <!-- Missense -->
  <rect x="30" y="183" width="540" height="42" rx="5" fill="#fff3e0" stroke="#ffcc80" stroke-width="1.5"/>
  <text x="50" y="200" font-family="Arial" font-size="10" fill="#ff8f00" font-weight="bold">Missense:</text>
  <text x="130" y="200" font-family="Arial" font-size="10" fill="#333">GAG → GTG | mRNA: GAG → GUG →</text>
  <rect x="350" y="188" width="60" height="18" rx="3" fill="#ff8f00" opacity="0.2" stroke="#ff8f00" stroke-width="1"/>
  <text x="380" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00" font-weight="bold">Valine</text>
  <text x="430" y="201" font-family="Arial" font-size="9" fill="#555">Glu→Val — Sickle cell disease ⚠</text>

  <!-- Nonsense -->
  <rect x="30" y="233" width="540" height="42" rx="5" fill="#ffebee" stroke="#ef9a9a" stroke-width="1.5"/>
  <text x="50" y="250" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">Nonsense:</text>
  <text x="130" y="250" font-family="Arial" font-size="10" fill="#333">TAC → TAA | mRNA: UAC → UAA →</text>
  <rect x="350" y="238" width="60" height="18" rx="3" fill="#e53935" opacity="0.2" stroke="#e53935" stroke-width="1"/>
  <text x="380" y="250" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">STOP</text>
  <text x="430" y="251" font-family="Arial" font-size="9" fill="#555">Premature termination → truncated protein ✗</text>

  <!-- Frameshift section -->
  <line x1="30" y1="295" x2="570" y2="295" stroke="#ddd" stroke-width="1"/>

  <text x="300" y="318" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Frameshift Mutations: Insertion / Deletion (Indels)</text>

  <!-- The sentence analogy -->
  <text x="50" y="342" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Analogy:</text>

  <rect x="30" y="352" width="540" height="32" rx="4" fill="#e8f5e9" stroke="#81c784" stroke-width="1"/>
  <text x="50" y="372" font-family="Arial" font-size="10" fill="#1a6b3c" font-weight="bold">Original:</text>
  <text x="140" y="372" font-family="Arial" font-size="11" fill="#333">THE | FAT | CAT | ATE | THE | RAT → Meaningful sentence ✓</text>

  <rect x="30" y="388" width="540" height="32" rx="4" fill="#ffebee" stroke="#ef9a9a" stroke-width="1"/>
  <text x="50" y="408" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">Delete E:</text>
  <text x="140" y="408" font-family="Arial" font-size="11" fill="#e53935">THF | ATC | ATA | TET | HER | AT → Nonsense! Frameshift ✗</text>

  <rect x="30" y="424" width="540" height="32" rx="4" fill="#fff3e0" stroke="#ffcc80" stroke-width="1"/>
  <text x="50" y="444" font-family="Arial" font-size="10" fill="#ff8f00" font-weight="bold">Delete FAT (3 letters):</text>
  <text x="190" y="444" font-family="Arial" font-size="11" fill="#ff8f00">THE | CAT | ATE | THE | RAT → One word lost, rest preserved ~</text>

  <!-- DNA example -->
  <rect x="30" y="462" width="540" height="30" rx="4" fill="#e8eaf6" stroke="#c5cae9" stroke-width="1"/>
  <text x="300" y="482" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Insertion/deletion NOT a multiple of 3 → reading frame shifts → ALL downstream codons changed → usually non-functional protein</text>
</svg>
