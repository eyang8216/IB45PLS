<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <rect width="600" height="500" fill="#fff"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Crossing Over &amp; Recombination — Prophase I of Meiosis</text>

  <!-- Step 1: Homologous pairing -->
  <text x="300" y="58" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">① Homologous Chromosomes Pair (Synapsis)</text>

  <!-- Maternal chromosome -->
  <rect x="130" y="72" width="60" height="14" rx="5" fill="#e53935"/>
  <circle cx="157" cy="79" r="3.5" fill="#fff"/>
  <text x="160" y="68" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">Maternal</text>
  <text x="110" y="85" text-anchor="end" font-family="Arial" font-size="9" fill="#555">A</text>
  <text x="220" y="85" text-anchor="start" font-family="Arial" font-size="9" fill="#555">B</text>

  <!-- Paternal chromosome -->
  <rect x="130" y="100" width="60" height="14" rx="5" fill="#1565c0"/>
  <circle cx="157" cy="107" r="3.5" fill="#fff"/>
  <text x="160" y="120" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0" font-weight="bold">Paternal</text>
  <text x="110" y="113" text-anchor="end" font-family="Arial" font-size="9" fill="#555">a</text>
  <text x="220" y="113" text-anchor="start" font-family="Arial" font-size="9" fill="#555">b</text>

  <!-- Synaptonemal complex bracket -->
  <rect x="185" y="86" width="6" height="28" fill="#ff8f00" rx="2"/>
  <text x="230" y="102" text-anchor="start" font-family="Arial" font-size="9" fill="#ff8f00">Synaptonemal</text>
  <text x="230" y="114" text-anchor="start" font-family="Arial" font-size="9" fill="#ff8f00">complex</text>

  <!-- Down arrow -->
  <line x1="300" y1="132" x2="300" y2="155" stroke="#333" stroke-width="1.5"/>
  <polygon points="300,155 294,148 306,148" fill="#333"/>

  <!-- Step 2: Chiasma formation -->
  <text x="300" y="173" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">② Chiasma Formation — Crossing Over</text>

  <!-- Two chromatids crossing -->
  <rect x="110" y="188" width="80" height="10" rx="4" fill="#e53935"/>
  <rect x="110" y="212" width="80" height="10" rx="4" fill="#1565c0"/>

  <!-- The cross-over point -->
  <rect x="170" y="188" width="5" height="34" fill="#ff8f00"/>
  <text x="215" y="208" text-anchor="start" font-family="Arial" font-size="11" font-weight="bold" fill="#ff8f00">Chiasma</text>

  <!-- Down arrow -->
  <line x1="300" y1="235" x2="300" y2="258" stroke="#333" stroke-width="1.5"/>
  <polygon points="300,258 294,251 306,251" fill="#333"/>

  <!-- Step 3: Recombinant chromatids -->
  <text x="300" y="278" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">③ Result: Recombinant &amp; Parental Chromatids</text>

  <!-- Chromatid 1: Parental (maternal) -->
  <rect x="60" y="295" width="140" height="14" rx="5" fill="#e53935"/>
  <text x="130" y="306" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">A — B <tspan font-size="9">(Parental — maternal)</tspan></text>

  <!-- Chromatid 2: Recombinant -->
  <rect x="60" y="322" width="80" height="14" rx="5" fill="#e53935"/>
  <rect x="140" y="322" width="60" height="14" rx="5" fill="#1565c0"/>
  <text x="130" y="333" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">A — b <tspan font-size="9">(Recombinant)</tspan></text>

  <!-- Chromatid 3: Recombinant -->
  <rect x="270" y="295" width="80" height="14" rx="5" fill="#1565c0"/>
  <rect x="350" y="295" width="60" height="14" rx="5" fill="#e53935"/>
  <text x="340" y="306" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">a — B <tspan font-size="9">(Recombinant)</tspan></text>

  <!-- Chromatid 4: Parental (paternal) -->
  <rect x="270" y="322" width="140" height="14" rx="5" fill="#1565c0"/>
  <text x="340" y="333" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">a — b <tspan font-size="9">(Parental — paternal)</tspan></text>

  <!-- Key result box -->
  <rect x="40" y="360" width="520" height="125" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="300" y="385" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#6a1b9a">Key Concepts:</text>
  <text x="300" y="408" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">
    • Crossing over occurs between <tspan font-weight="bold">non-sister chromatids</tspan> of homologous chromosomes
  </text>
  <text x="300" y="430" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">
    • Recombinant chromatids have <tspan font-weight="bold">mixed maternal and paternal</tspan> segments
  </text>
  <text x="300" y="452" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">
    • <tspan font-weight="bold" fill="#e53935">Recombination Frequency (RF)</tspan> = (Recombinants / Total) × 100% = map distance in cM
  </text>
  <text x="300" y="474" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">
    • Probability of crossing over ∝ distance between genes (farther apart → more crossovers)
  </text>
</svg>
