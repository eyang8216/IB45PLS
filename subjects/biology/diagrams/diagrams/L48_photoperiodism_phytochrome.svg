<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" font-family="Arial, sans-serif">
  <rect width="600" height="500" fill="#fff"/>
  <text x="300" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Seed Structure &amp; Photoperiodism</text>

  <!-- Seed structure -->
  <text x="150" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Seed Structure (Bean)</text>

  <g transform="translate(80,70)">
    <!-- Testa -->
    <ellipse cx="70" cy="0" rx="65" ry="45" fill="#81c784" opacity="0.15" stroke="#333" stroke-width="2.5"/>
    <text x="140" y="-30" font-size="8" fill="#333">Testa</text>
    <text x="140" y="-20" font-size="8" fill="#333">(seed coat)</text>

    <!-- Hilum -->
    <ellipse cx="10" cy="0" rx="3" ry="6" fill="#333"/>
    <text x="-10" y="4" text-anchor="middle" font-size="7" fill="#333">Hilum</text>

    <!-- Micropyle -->
    <circle cx="5" cy="-5" r="1.5" fill="#333"/>
    <text x="-15" y="-8" font-size="6" fill="#333">Micropyle</text>

    <!-- Cotyledons -->
    <path d="M30 0 Q60 -35 90 -20 Q120 -5 100 20 Q80 40 50 25 Q20 10 30 0" fill="#43a047" opacity="0.25" stroke="#43a047" stroke-width="1.5"/>
    <text x="65" y="5" text-anchor="middle" font-size="8" fill="#1a6b3c">Cotyledons</text>
    <text x="65" y="16" text-anchor="middle" font-size="7" fill="#1a6b3c">(2 — dicot)</text>

    <!-- Embryo -->
    <path d="M70 -10 L70 -30" stroke="#e53935" stroke-width="2"/>
    <text x="80" y="-25" font-size="7" fill="#e53935">Plumule</text>
    <text x="80" y="-17" font-size="7" fill="#e53935">(shoot)</text>

    <path d="M70 10 L70 35" stroke="#1565c0" stroke-width="2"/>
    <text x="80" y="30" font-size="7" fill="#1565c0">Radicle</text>
    <text x="80" y="38" font-size="7" fill="#1565c0">(root)</text>
  </g>

  <!-- Photoperiodism -->
  <text x="450" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Photoperiodism</text>

  <g transform="translate(330,70)">
    <!-- Light-Dark bars -->
    <text x="0" y="12" font-size="9" fill="#333" font-weight="bold">Short-Day Plant (SDP)</text>
    <text x="0" y="24" font-size="8" fill="#333">Needs LONG night to flower</text>

    <rect x="0" y="32" width="80" height="20" fill="#ff8f00"/>
    <text x="40" y="46" text-anchor="middle" font-size="8" fill="#fff">Light</text>
    <rect x="80" y="32" width="80" height="20" fill="#333"/>
    <text x="120" y="46" text-anchor="middle" font-size="8" fill="#fff">Dark</text>
    <text x="170" y="46" font-size="10" fill="#1a6b3c">✓ FLOWERS</text>

    <rect x="0" y="58" width="120" height="20" fill="#ff8f00"/>
    <text x="60" y="72" text-anchor="middle" font-size="8" fill="#fff">Light</text>
    <rect x="120" y="58" width="40" height="20" fill="#333"/>
    <text x="140" y="72" text-anchor="middle" font-size="8" fill="#fff">Dark</text>
    <text x="170" y="72" font-size="10" fill="#e53935">✗ NO flowers</text>

    <text x="0" y="98" font-size="9" fill="#333" font-weight="bold">Night-Break Experiment</text>
    <rect x="0" y="106" width="70" height="20" fill="#333"/>
    <rect x="70" y="106" width="6" height="20" fill="#e53935"/>
    <rect x="76" y="106" width="80" height="20" fill="#333"/>
    <text x="36" y="120" text-anchor="middle" font-size="7" fill="#fff">Dark</text>
    <text x="116" y="120" text-anchor="middle" font-size="7" fill="#fff">Dark</text>
    <text x="50" y="136" text-anchor="middle" font-size="7" fill="#e53935">Red flash</text>
    <text x="170" y="120" font-size="10" fill="#e53935">✗ NO flowers</text>

    <text x="0" y="150" font-size="8" fill="#333" font-style="italic">Red flash → Pr→Pfr → "short night"</text>

    <rect x="0" y="160" width="70" height="20" fill="#333"/>
    <rect x="70" y="160" width="6" height="20" fill="#e53935"/>
    <rect x="76" y="160" width="6" height="20" fill="#1565c0"/>
    <rect x="82" y="160" width="74" height="20" fill="#333"/>
    <text x="36" y="174" text-anchor="middle" font-size="7" fill="#fff">Dark</text>
    <text x="120" y="174" text-anchor="middle" font-size="7" fill="#fff">Dark</text>
    <text x="50" y="190" text-anchor="middle" font-size="7" fill="#e53935">Red</text>
    <text x="78" y="190" text-anchor="middle" font-size="7" fill="#1565c0">FR</text>
    <text x="170" y="174" font-size="10" fill="#1a6b3c">✓ FLOWERS</text>

    <text x="0" y="204" font-size="8" fill="#333" font-style="italic">Red + FR → Pfr→Pr → "long night"</text>
  </g>

  <!-- Phytochrome -->
  <rect x="30" y="280" width="540" height="210" rx="8" fill="none" stroke="#ddd" stroke-width="2"/>
  <text x="300" y="305" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Phytochrome System: Pr ↔ Pfr</text>

  <g transform="translate(20,315)">
    <!-- Pr -->
    <ellipse cx="120" cy="0" rx="50" ry="35" fill="#e53935" opacity="0.15" stroke="#e53935" stroke-width="2"/>
    <text x="120" y="-15" text-anchor="middle" font-size="14" font-weight="bold" fill="#e53935">Pr</text>
    <text x="120" y="4" text-anchor="middle" font-size="10" fill="#333">Inactive form</text>
    <text x="120" y="18" text-anchor="middle" font-size="9" fill="#333">Absorbs red (660 nm)</text>

    <!-- Pfr -->
    <ellipse cx="440" cy="0" rx="50" ry="35" fill="#1a6b3c" opacity="0.15" stroke="#1a6b3c" stroke-width="2"/>
    <text x="440" y="-15" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a6b3c">Pfr</text>
    <text x="440" y="4" text-anchor="middle" font-size="10" fill="#333">Active form</text>
    <text x="440" y="18" text-anchor="middle" font-size="9" fill="#333">Absorbs far-red (730 nm)</text>

    <!-- Red light arrow -->
    <path d="M180 0 L380 0" stroke="#e53935" stroke-width="3" marker-end="url(#arrRed)"/>
    <defs><marker id="arrRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#e53935"/></marker></defs>
    <text x="280" y="-12" text-anchor="middle" font-size="10" fill="#e53935" font-weight="bold">Red light (660 nm)</text>

    <!-- Far-red light arrow -->
    <path d="M380 20 L180 20" stroke="#1a6b3c" stroke-width="3" marker-end="url(#arrFR)"/>
    <defs><marker id="arrFR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1a6b3c"/></marker></defs>
    <text x="280" y="38" text-anchor="middle" font-size="10" fill="#1a6b3c" font-weight="bold">Far-red light (730 nm)</text>

    <!-- Dark reversion -->
    <path d="M410 30 Q280 60 150 30" fill="none" stroke="#ff8f00" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="280" y="68" text-anchor="middle" font-size="10" fill="#ff8f00">Dark reversion (slow, hours)</text>
  </g>

  <!-- Flowering response -->
  <g transform="translate(30,195)">
    <rect x="340" y="0" width="200" height="70" rx="6" fill="#f5f5f5"/>
    <text x="440" y="15" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">Flowering Response</text>
    <text x="440" y="32" text-anchor="middle" font-size="8" fill="#e53935">SDP: Pfr INHIBITS flowering</text>
    <text x="440" y="46" text-anchor="middle" font-size="8" fill="#e53935">→ need low Pfr (long night)</text>
    <text x="440" y="60" text-anchor="middle" font-size="8" fill="#1a6b3c">LDP: Pfr PROMOTES flowering</text>
    <text x="440" y="74" text-anchor="middle" font-size="8" fill="#1a6b3c">→ need high Pfr (short night)</text>
  </g>
</svg>