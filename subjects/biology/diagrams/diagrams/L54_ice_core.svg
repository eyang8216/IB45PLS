<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460" width="600" height="460">
  <rect width="600" height="460" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Vostok Ice Core — CO₂ &amp; Temperature over 400,000 Years</text>

  <!-- Axes -->
  <line x1="60" y1="60" x2="60" y2="360" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="360" x2="570" y2="360" stroke="#333" stroke-width="2"/>

  <!-- Y axis CO₂ -->
  <text x="50" y="70" text-anchor="end" font-family="Arial" font-size="9" fill="#e53935">300</text>
  <text x="50" y="145" text-anchor="end" font-family="Arial" font-size="9" fill="#e53935">250</text>
  <text x="50" y="220" text-anchor="end" font-family="Arial" font-size="9" fill="#e53935">200</text>
  <text x="50" y="295" text-anchor="end" font-family="Arial" font-size="9" fill="#e53935">150</text>
  <text x="50" y="370" text-anchor="end" font-family="Arial" font-size="9" fill="#e53935">100</text>
  <text x="30" y="210" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" transform="rotate(-90,30,210)">CO₂ (ppm)</text>

  <!-- CO₂ curve -->
  <polyline fill="none" stroke="#e53935" stroke-width="2.5"
    points="60,260 80,200 95,170 110,240 130,280 140,210 155,175 170,235 185,280 195,215 210,180 225,240 240,280 250,215 265,180 280,235 295,280 300,220 310,180 325,235 340,280 350,215 365,180 380,235 395,280 400,225 410,185 425,240 440,275 450,220 460,180 475,240 490,280 500,225 510,185 525,240 540,275 550,225 560,185 570,240"
    stroke-linejoin="round"/>

  <!-- Temperature curve (pale blue) -->
  <polyline fill="none" stroke="#81d4fa" stroke-width="2"
    points="60,280 80,230 95,200 110,260 130,300 140,240 155,205 170,255 185,300 195,245 210,210 225,255 240,300 250,245 265,210 280,255 295,300 300,250 310,210 325,255 340,300 350,245 365,210 380,255 395,295 400,255 410,215 425,260 440,295 450,250 460,210 475,260 490,300 500,255 510,215 525,260 540,295 550,255 560,215 570,260"
    stroke-linejoin="round"/>

  <!-- Y axis temperature -->
  <text x="580" y="70" font-family="Arial" font-size="9" fill="#81d4fa">Warm</text>
  <text x="580" y="370" font-family="Arial" font-size="9" fill="#81d4fa">Cold</text>

  <!-- X axis -->
  <text x="60" y="380" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">400,000</text>
  <text x="187" y="380" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">300,000</text>
  <text x="315" y="380" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">200,000</text>
  <text x="443" y="380" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">100,000</text>
  <text x="570" y="380" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">0</text>
  <text x="315" y="398" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Years Before Present →</text>

  <!-- Glacial/Interglacial labels -->
  <text x="210" y="50" font-family="Arial" font-size="9" fill="#1565c0">Interglacial</text>
  <text x="380" y="50" font-family="Arial" font-size="9" fill="#1565c0">Interglacial</text>
  <text x="555" y="50" font-family="Arial" font-size="9" fill="#1565c0">Interglacial</text>

  <text x="120" y="340" font-family="Arial" font-size="9" fill="#81d4fa">Glacial</text>
  <text x="290" y="340" font-family="Arial" font-size="9" fill="#81d4fa">Glacial</text>
  <text x="460" y="340" font-family="Arial" font-size="9" fill="#81d4fa">Glacial</text>

  <!-- Current CO₂ arrow -->
  <line x1="575" y1="55" x2="575" y2="240" stroke="#e53935" stroke-width="3" marker-end="url(#arrowR)"/>
  <text x="580" y="100" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">2024:</text>
  <text x="580" y="115" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">~420 ppm</text>
  <text x="580" y="130" font-family="Arial" font-size="9" fill="#e53935">far exceeds</text>
  <text x="580" y="145" font-family="Arial" font-size="9" fill="#e53935">natural range</text>

  <!-- Range indicator -->
  <line x1="570" y1="160" x2="585" y2="160" stroke="#e53935" stroke-width="2"/>
  <line x1="570" y1="240" x2="585" y2="240" stroke="#e53935" stroke-width="2"/>
  <text x="590" y="200" font-family="Arial" font-size="9" fill="#e53935">Natural</text>
  <text x="590" y="214" font-family="Arial" font-size="9" fill="#e53935">range:</text>
  <text x="590" y="228" font-family="Arial" font-size="9" fill="#e53935">180-280</text>

  <!-- Legend -->
  <rect x="60" y="405" width="500" height="45" rx="5" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <line x1="75" y1="420" x2="105" y2="420" stroke="#e53935" stroke-width="2.5"/>
  <text x="115" y="424" font-family="Arial" font-size="10" fill="#333">CO₂ (ppm) — oscillates 180–280 ppm in glacial–interglacial cycles</text>
  <line x1="75" y1="438" x2="105" y2="438" stroke="#81d4fa" stroke-width="2"/>
  <text x="115" y="442" font-family="Arial" font-size="10" fill="#333">Temperature (δD) — tightly correlated with CO₂</text>

  <defs>
    <marker id="arrowR" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#e53935"/></marker>
  </defs>
</svg>