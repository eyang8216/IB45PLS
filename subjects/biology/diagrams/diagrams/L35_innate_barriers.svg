<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460" width="600" height="460">
  <rect width="600" height="460" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Innate (Non-Specific) Barriers to Infection</text>

  <!-- Barrier 1: Skin -->
  <rect x="20" y="40" width="560" height="95" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="35" y="60" font-family="Arial" font-size="14" font-weight="bold" fill="#e53935">1. Skin — Physical Barrier</text>

  <!-- Keratin layer -->
  <rect x="35" y="70" width="160" height="50" rx="5" fill="#ffe0b2" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="115" y="90" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Keratin layer</text>
  <text x="115" y="105" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">(dead, dry, tough)</text>

  <!-- Pathogen blocked -->
  <ellipse cx="220" cy="82" rx="12" ry="8" fill="#e53935" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="220" y="85" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">Pathogen</text>
  <line x1="195" y1="90" x2="200" y2="82" stroke="#e53935" stroke-width="1.5"/>
  <text x="225" y="110" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">✘ Blocked —</text>
  <text x="225" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">can't penetrate</text>

  <!-- Sweat/sebum -->
  <text x="310" y="85" font-family="Arial" font-size="9" fill="#555">Sebum = fatty acids</text>
  <text x="310" y="100" font-family="Arial" font-size="9" fill="#555">Sweat = salt, lysozyme</text>
  <text x="310" y="118" font-family="Arial" font-size="9" fill="#555">Low pH inhibits growth</text>

  <!-- Barrier 2: Mucous membranes -->
  <rect x="20" y="145" width="560" height="95" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="35" y="165" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">2. Mucous Membranes — Sticky Trap</text>

  <!-- Goblet cell -->
  <ellipse cx="80" cy="205" rx="20" ry="14" fill="#81c784" stroke="#43a047" stroke-width="1.5"/>
  <text x="80" y="208" text-anchor="middle" font-family="Arial" font-size="8" fill="#1a6b3c">Goblet</text>

  <!-- Mucus layer -->
  <path d="M70,195 Q100,180 130,190 Q160,180 190,195 Q220,182 260,190 Q300,178 340,192" fill="none" stroke="#43a047" stroke-width="3"/>
  <text x="200" y="178" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Mucus layer (sticky)</text>

  <!-- Pathogen trapped -->
  <ellipse cx="160" cy="187" rx="8" ry="5" fill="#e53935" stroke="#b71c1c" stroke-width="1"/>
  <text x="160" y="210" text-anchor="middle" font-family="Arial" font-size="7" fill="#e53935">Pathogen trapped</text>

  <!-- Cilia -->
  <line x1="100" y1="220" x2="105" y2="208" stroke="#333" stroke-width="1.5"/>
  <line x1="110" y1="220" x2="115" y2="208" stroke="#333" stroke-width="1.5"/>
  <line x1="120" y1="220" x2="125" y2="208" stroke="#333" stroke-width="1.5"/>
  <line x1="130" y1="220" x2="135" y2="208" stroke="#333" stroke-width="1.5"/>
  <line x1="140" y1="220" x2="145" y2="208" stroke="#333" stroke-width="1.5"/>
  <text x="80" y="232" font-family="Arial" font-size="8" fill="#555">Cilia sweep mucus</text>
  <text x="80" y="242" font-family="Arial" font-size="8" fill="#555">out of airways</text>

  <!-- Arrow -->
  <text x="380" y="190" font-family="Arial" font-size="9" fill="#555">Mucus swallowed →</text>
  <text x="380" y="204" font-family="Arial" font-size="9" fill="#555">stomach acid destroys</text>
  <line x1="500" y1="200" x2="545" y2="200" stroke="#333" stroke-width="1.5" marker-end="url(#aM)"/>
  <defs><marker id="aM" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#333"/></marker></defs>

  <!-- Barrier 3: Lysozyme -->
  <rect x="20" y="250" width="280" height="90" rx="8" fill="#e1f5fe" stroke="#1565c0" stroke-width="2"/>
  <text x="35" y="270" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">3. Lysozyme — Enzyme Defense</text>

  <!-- Eye tear drop -->
  <ellipse cx="60" cy="310" rx="15" ry="20" fill="#b3e5fc" stroke="#1565c0" stroke-width="1.5"/>
  <text x="60" y="306" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Tears</text>
  <text x="60" y="318" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Lysozyme</text>

  <!-- Bacteria -->
  <ellipse cx="130" cy="300" rx="18" ry="10" fill="#e53935" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="130" y="303" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Bact.</text>

  <!-- Lysozyme action -->
  <text x="100" y="330" font-family="Arial" font-size="8" fill="#555">Lysozyme</text>
  <text x="95" y="340" font-family="Arial" font-size="8" fill="#555">digests cell wall</text>

  <text x="200" y="295" font-family="Arial" font-size="9" fill="#555">Also in: saliva,</text>
  <text x="200" y="310" font-family="Arial" font-size="9" fill="#555">nasal secretions,</text>
  <text x="200" y="325" font-family="Arial" font-size="9" fill="#555">breast milk</text>

  <!-- Barrier 4: Stomach acid -->
  <rect x="310" y="250" width="270" height="90" rx="8" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
  <text x="325" y="270" font-family="Arial" font-size="14" font-weight="bold" fill="#e53935">4. Stomach Acid — Chemical Barrier</text>

  <!-- Stomach -->
  <ellipse cx="360" cy="310" rx="35" ry="20" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
  <text x="360" y="305" text-anchor="middle" font-family="Arial" font-size="8" fill="#b71c1c">HCl pH 1.5</text>
  <text x="360" y="318" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">denatures proteins</text>

  <!-- Pathogen destroyed -->
  <ellipse cx="435" cy="305" rx="12" ry="8" fill="#e53935" stroke="#b71c1c" stroke-width="1" opacity="0.5"/>
  <text x="435" y="300" text-anchor="middle" font-family="Arial" font-size="7" fill="#e53935">✘ Destroyed</text>
  <line x1="395" y1="310" x2="423" y2="308" stroke="#333" stroke-width="1.5" marker-end="url(#aM)"/>

  <text x="445" y="335" font-family="Arial" font-size="8" fill="#555">Most ingested</text>
  <text x="445" y="345" font-family="Arial" font-size="8" fill="#555">pathogens killed</text>

  <!-- Summary at bottom -->
  <rect x="20" y="355" width="560" height="90" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="300" y="375" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Innate Defences = First Line of Defence</text>
  <text x="300" y="395" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Non-specific • Present at birth • No memory • Immediate response</text>
  <text x="300" y="415" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Physical · Chemical · Mechanical barriers prevent pathogen entry</text>
</svg>
