<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Chloroplast — Structure &amp; Function</text>

  <!-- Outer membrane -->
  <ellipse cx="300" cy="200" rx="230" ry="110" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="60" y="100" font-family="Arial" font-size="10" fill="#1a6b3c">Outer membrane</text>

  <!-- Inner membrane -->
  <ellipse cx="300" cy="200" rx="222" ry="104" fill="none" stroke="#43a047" stroke-width="2.5"/>

  <!-- Thylakoid disks (granum stacks) -->
  <!-- Granum 1 (left) -->
  <g>
    <ellipse cx="180" cy="150" rx="35" ry="10" fill="#1a6b3c" stroke="#0d4a28" stroke-width="1.5" opacity="0.8"/>
    <ellipse cx="180" cy="160" rx="35" ry="10" fill="#1a6b3c" stroke="#0d4a28" stroke-width="1.5" opacity="0.8"/>
    <ellipse cx="180" cy="170" rx="35" ry="10" fill="#1a6b3c" stroke="#0d4a28" stroke-width="1.5" opacity="0.8"/>
    <ellipse cx="180" cy="180" rx="35" ry="10" fill="#1a6b3c" stroke="#0d4a28" stroke-width="1.5" opacity="0.8"/>
    <text x="180" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Granum</text>
  </g>

  <!-- Granum 2 (right) -->
  <g>
    <ellipse cx="400" cy="140" rx="40" ry="12" fill="#1a6b3c" stroke="#0d4a28" stroke-width="1.5" opacity="0.8"/>
    <ellipse cx="400" cy="152" rx="40" ry="12" fill="#1a6b3c" stroke="#0d4a28" stroke-width="1.5" opacity="0.8"/>
    <ellipse cx="400" cy="164" rx="40" ry="12" fill="#1a6b3c" stroke="#0d4a28" stroke-width="1.5" opacity="0.8"/>
    <ellipse cx="400" cy="176" rx="40" ry="12" fill="#1a6b3c" stroke="#0d4a28" stroke-width="1.5" opacity="0.8"/>
    <ellipse cx="400" cy="188" rx="40" ry="12" fill="#1a6b3c" stroke="#0d4a28" stroke-width="1.5" opacity="0.8"/>
    <text x="400" y="208" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Granum</text>
  </g>

  <!-- Granum 3 (center-bottom) -->
  <g>
    <ellipse cx="280" cy="240" rx="35" ry="10" fill="#1a6b3c" stroke="#0d4a28" stroke-width="1.5" opacity="0.8"/>
    <ellipse cx="280" cy="250" rx="35" ry="10" fill="#1a6b3c" stroke="#0d4a28" stroke-width="1.5" opacity="0.8"/>
    <ellipse cx="280" cy="260" rx="35" ry="10" fill="#1a6b3c" stroke="#0d4a28" stroke-width="1.5" opacity="0.8"/>
  </g>

  <!-- Thylakoid label -->
  <text x="145" y="225" font-family="Arial" font-size="9" fill="#333">Thylakoid disks</text>
  <line x1="145" y1="228" x2="180" y2="180" stroke="#333" stroke-width="1"/>

  <!-- Stroma -->
  <text x="450" y="250" font-family="Arial" font-size="12" fill="#43a047">Stroma</text>
  <text x="450" y="265" font-family="Arial" font-size="9" fill="#555">Calvin cycle</text>

  <!-- Starch grain -->
  <circle cx="450" cy="290" r="18" fill="#ff8f00" opacity="0.5" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="450" y="293" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Starch</text>
  <text x="450" y="306" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">grain</text>

  <!-- Stroma thylakoid (lamellae) -->
  <g stroke="#43a047" stroke-width="1.5" fill="none">
    <line x1="215" y1="165" x2="260" y2="165"/>
    <line x1="260" y1="165" x2="360" y2="152"/>
    <line x1="215" y1="175" x2="280" y2="250"/>
    <line x1="360" y1="176" x2="280" y2="250"/>
  </g>
  <text x="260" y="155" font-family="Arial" font-size="8" fill="#43a047">Stroma lamellae</text>

  <!-- Key info -->
  <rect x="20" y="300" width="560" height="65" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="318" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">Structure &amp; Function</text>
  <text x="40" y="338" font-family="Arial" font-size="10" fill="#333">• Double membrane envelope · Thylakoid = single disk · Granum = stack of thylakoids · Stroma lamellae connect grana</text>
  <text x="40" y="355" font-family="Arial" font-size="10" fill="#333">• Light reactions: thylakoid membrane (chlorophyll + ETC + ATP synthase) · Calvin cycle: stroma (Rubisco, CO₂ fixation)</text>
</svg>