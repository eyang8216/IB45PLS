<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420">
  <rect width="600" height="420" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Tipping Points &amp; Hysteresis — Ball-in-Valley Model</text>

  <!-- Landscape: two valleys -->
  <path d="M30,340 Q100,340 130,260 Q160,150 200,180 Q240,210 260,280 Q280,350 300,350 Q320,350 340,280 Q360,210 400,180 Q440,150 470,260 Q500,340 570,340"
    fill="none" stroke="#333" stroke-width="3" stroke-linejoin="round"/>

  <!-- Valley 1 label -->
  <text x="160" y="370" text-anchor="middle" font-family="Arial" font-size="12" fill="#1a6b3c" font-weight="bold">Stable State 1</text>
  <text x="160" y="384" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(e.g., clear lake,</text>
  <text x="160" y="396" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">coral-dominated reef)</text>

  <!-- Valley 2 label -->
  <text x="440" y="370" text-anchor="middle" font-family="Arial" font-size="12" fill="#e53935" font-weight="bold">Stable State 2</text>
  <text x="440" y="384" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(e.g., turbid lake,</text>
  <text x="440" y="396" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">algae-dominated reef)</text>

  <!-- Threshold/hump -->
  <line x1="300" y1="280" x2="300" y2="350" stroke="#ff8f00" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="300" y="270" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00" font-weight="bold">Tipping Point</text>
  <text x="300" y="258" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff8f00">(Threshold)</text>

  <!-- Ball in valley 1 -->
  <circle cx="170" cy="222" r="14" fill="#43a047" stroke="#1a6b3c" stroke-width="2"/>
  <text x="170" y="226" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff" font-weight="bold">Ball</text>

  <!-- Arrow showing disturbance -->
  <line x1="190" y1="222" x2="240" y2="222" stroke="#e53935" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="215" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Disturbance</text>

  <!-- Ball pushed up -->
  <circle cx="260" cy="255" r="14" fill="#ff8f00" stroke="#e65100" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="260" y="242" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">Ball pushed</text>

  <!-- Arrow to valley 2 -->
  <path d="M285,280 Q320,300 350,245" fill="none" stroke="#e53935" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="310" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Crosses</text>
  <text x="320" y="322" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">threshold!</text>

  <!-- Ball in valley 2 -->
  <circle cx="420" cy="215" r="14" fill="#e53935" stroke="#b71c1c" stroke-width="2"/>
  <text x="420" y="219" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff" font-weight="bold">Ball</text>

  <!-- Hysteresis arrow -->
  <path d="M430,200 Q400,120 170,210" fill="none" stroke="#1565c0" stroke-width="2.5" stroke-dasharray="8,5" marker-end="url(#arrowB)"/>
  <text x="370" y="100" text-anchor="middle" font-family="Arial" font-size="11" fill="#1565c0" font-weight="bold">HYSTERESIS</text>
  <text x="370" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Much harder to reverse</text>
  <text x="370" y="128" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">(requires more energy)</text>

  <!-- Hysteresis explanation -->
  <rect x="30" y="40" width="160" height="80" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="110" y="60" text-anchor="middle" font-family="Arial" font-size="11" fill="#1565c0" font-weight="bold">Hysteresis</text>
  <text x="110" y="76" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">The path back is</text>
  <text x="110" y="90" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">NOT the same as</text>
  <text x="110" y="104" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">the path forward.</text>

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#e53935"/></marker>
    <marker id="arrowB" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#1565c0"/></marker>
  </defs>
</svg>