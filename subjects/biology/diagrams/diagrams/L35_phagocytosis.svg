<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" width="600" height="520">
  <rect width="600" height="520" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Phagocytosis — Stages of Engulfment &amp; Digestion</text>

  <!-- Stage boxes -->
  <!-- Stage 1: Chemotaxis / Approach -->
  <rect x="15" y="35" width="105" height="460" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="67" y="55" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">1. Approach</text>
  <!-- Bacterium -->
  <ellipse cx="67" cy="95" rx="18" ry="8" fill="#e53935" stroke="#b71c1c" stroke-width="2"/>
  <text x="67" y="99" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Bact.</text>
  <!-- Macrophage -->
  <ellipse cx="67" cy="130" rx="30" ry="22" fill="#43a047" stroke="#1a6b3c" stroke-width="2" opacity="0.8"/>
  <text x="67" y="133" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Macro.</text>
  <!-- Arrow -->
  <line x1="67" y1="103" x2="67" y2="108" stroke="#333" stroke-width="2" marker-end="url(#arrow1)"/>
  <defs><marker id="arrow1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#333"/></marker></defs>
  <text x="67" y="158" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Bacterium</text>
  <text x="67" y="168" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">approaches</text>

  <!-- Stage 2: Pseudopodia -->
  <rect x="130" y="35" width="95" height="460" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="177" y="55" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">2. Extend</text>
  <ellipse cx="177" cy="130" rx="32" ry="24" fill="#43a047" stroke="#1a6b3c" stroke-width="2" opacity="0.8"/>
  <ellipse cx="177" cy="95" rx="12" ry="6" fill="#e53935" stroke="#b71c1c" stroke-width="2"/>
  <path d="M145,120 Q140,100 155,95" fill="none" stroke="#1a6b3c" stroke-width="2"/>
  <path d="M209,120 Q214,100 199,95" fill="none" stroke="#1a6b3c" stroke-width="2"/>
  <text x="177" y="158" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Pseudopodia</text>
  <text x="177" y="168" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">extend around</text>

  <!-- Stage 3: Engulfment -->
  <rect x="235" y="35" width="95" height="460" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="282" y="55" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">3. Engulf</text>
  <ellipse cx="282" cy="130" rx="34" ry="26" fill="#43a047" stroke="#1a6b3c" stroke-width="2" opacity="0.8"/>
  <ellipse cx="282" cy="120" rx="14" ry="8" fill="#e53935" stroke="#b71c1c" stroke-width="2"/>
  <path d="M250,125 Q245,105 265,105" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>
  <path d="M314,125 Q319,105 299,105" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="282" y="168" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Engulfment</text>

  <!-- Stage 4: Phagosome -->
  <rect x="340" y="35" width="85" height="460" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="382" y="55" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">4. Phagosome</text>
  <circle cx="382" cy="125" r="28" fill="none" stroke="#1a6b3c" stroke-width="2.5" stroke-dasharray="4 2"/>
  <ellipse cx="382" cy="125" rx="12" ry="6" fill="#e53935" stroke="#b71c1c" stroke-width="2"/>
  <text x="382" y="105" text-anchor="middle" font-family="Arial" font-size="8" fill="#1a6b3c">Phagosome</text>
  <text x="382" y="168" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Vesicle formed</text>

  <!-- Stage 5: Lysosome fusion -->
  <rect x="435" y="35" width="80" height="460" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="475" y="55" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">5. Fusion</text>
  <!-- Lysosome approaching -->
  <circle cx="455" cy="150" r="10" fill="#81c784" stroke="#43a047" stroke-width="2"/>
  <text x="455" y="152" text-anchor="middle" font-family="Arial" font-size="7" fill="#1a6b3c">Lyso-</text>
  <text x="455" y="162" text-anchor="middle" font-family="Arial" font-size="7" fill="#1a6b3c">some</text>
  <!-- Phagosome -->
  <circle cx="490" cy="150" r="20" fill="none" stroke="#1a6b3c" stroke-width="2.5" stroke-dasharray="4 2"/>
  <ellipse cx="490" cy="150" rx="10" ry="5" fill="#e53935" stroke="#b71c1c" stroke-width="2"/>
  <!-- fusion arrow -->
  <line x1="465" y1="150" x2="470" y2="150" stroke="#333" stroke-width="2" marker-end="url(#arrow1)"/>
  <text x="475" y="185" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Lysosome fuses</text>
  <text x="475" y="195" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">with phagosome</text>

  <!-- Stage 6: Phagolysosome / Digestion -->
  <rect x="525" y="35" width="65" height="460" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="557" y="55" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">6. Digest</text>
  <circle cx="557" cy="125" r="24" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>
  <!-- Enzyme dots -->
  <circle cx="547" cy="118" r="2" fill="#e53935"/>
  <circle cx="557" cy="122" r="2" fill="#e53935"/>
  <circle cx="550" cy="130" r="2" fill="#e53935"/>
  <circle cx="562" cy="128" r="2" fill="#e53935"/>
  <circle cx="555" cy="115" r="2" fill="#e53935"/>
  <!-- Digested bacterium fragments -->
  <circle cx="552" cy="125" r="3" fill="#ff8f00" opacity="0.5"/>
  <circle cx="560" cy="120" r="2.5" fill="#ff8f00" opacity="0.5"/>
  <circle cx="548" cy="135" r="2" fill="#ff8f00" opacity="0.5"/>
  <text x="557" y="105" text-anchor="middle" font-family="Arial" font-size="8" fill="#1a6b3c">Phagolyso.</text>
  <text x="557" y="170" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Enzymes</text>
  <text x="557" y="180" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">digest</text>

  <!-- Big arrow going across all stages -->
  <line x1="15" y1="475" x2="585" y2="475" stroke="#333" stroke-width="3" marker-end="url(#arrow2)"/>
  <defs><marker id="arrow2" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="0 0, 10 4, 0 8" fill="#333"/></marker></defs>
  <text x="300" y="495" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">TIME</text>
</svg>
