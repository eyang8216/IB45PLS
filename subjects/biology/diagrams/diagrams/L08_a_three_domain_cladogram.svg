### L08_a: Three Domain Tree + Classification Pyramid + Cladogram ###
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" style="background:#fff">
  <defs><linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a6b3c"/><stop offset="100%" stop-color="#43a047"/></linearGradient></defs>
  <rect width="600" height="750" fill="#fff"/>
  <rect x="0" y="0" width="600" height="42" fill="url(#hdr)"/>
  <text x="300" y="28" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="16">Three-Domain Tree, Classification Hierarchy &amp; Cladogram</text>

  <!-- Three Domain Tree -->
  <text x="300" y="65" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="15">Three-Domain Tree of Life (Carl Woese, 1977)</text>

  <!-- Tree -->
  <line x1="300" y1="230" x2="300" y2="170" stroke="#333" stroke-width="2"/>
  <line x1="300" y1="170" x2="100" y2="120" stroke="#333" stroke-width="2"/>
  <line x1="300" y1="170" x2="300" y2="120" stroke="#333" stroke-width="2"/>
  <line x1="300" y1="170" x2="500" y2="120" stroke="#333" stroke-width="2"/>

  <!-- Domain Archaea -->
  <rect x="30" y="80" width="140" height="55" rx="8" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
  <text x="100" y="100" text-anchor="middle" fill="#c62828" font-family="Arial" font-weight="bold" font-size="13">ARCHAEA</text>
  <text x="100" y="118" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Ether-linked lipids</text>
  <text x="100" y="132" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">No peptidoglycan</text>

  <!-- Domain Bacteria -->
  <rect x="230" y="80" width="140" height="55" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="300" y="100" text-anchor="middle" fill="#1565c0" font-family="Arial" font-weight="bold" font-size="13">BACTERIA</text>
  <text x="300" y="118" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Ester-linked lipids</text>
  <text x="300" y="132" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Peptidoglycan wall</text>

  <!-- Domain Eukarya -->
  <rect x="430" y="80" width="140" height="55" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="500" y="100" text-anchor="middle" fill="#1a6b3c" font-family="Arial" font-weight="bold" font-size="13">EUKARYA</text>
  <text x="500" y="118" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Ester-linked lipids</text>
  <text x="500" y="132" text-anchor="middle" fill="#666" font-family="Arial" font-size="9">Organelles</text>

  <text x="300" y="165" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">LUCA (Last Universal Common Ancestor)</text>
  <text x="300" y="250" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">Based on 16S/18S rRNA sequence comparison</text>

  <!-- Classification Pyramid -->
  <text x="300" y="285" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="15">Hierarchical Classification — 8 Levels</text>

  <!-- Pyramid -->
  <polygon points="300,300 100,310 120,340 480,340 500,310" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="300" y="322" text-anchor="middle" fill="#1565c0" font-family="Arial" font-weight="bold" font-size="12">Domain: Eukarya</text>

  <polygon points="120,340 100,370 500,370 480,340" fill="#bbdefb" stroke="#1565c0" stroke-width="2"/>
  <text x="300" y="358" text-anchor="middle" fill="#1565c0" font-family="Arial" font-weight="bold" font-size="12">Kingdom: Animalia</text>

  <polygon points="100,370 80,402 520,402 500,370" fill="#90caf9" stroke="#1565c0" stroke-width="2"/>
  <text x="300" y="390" text-anchor="middle" fill="#1565c0" font-family="Arial" font-weight="bold" font-size="12">Phylum: Chordata</text>

  <polygon points="80,402 65,435 535,435 520,402" fill="#64b5f6" stroke="#1565c0" stroke-width="2"/>
  <text x="300" y="423" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="12">Class: Mammalia</text>

  <polygon points="65,435 50,468 550,468 535,435" fill="#42a5f5" stroke="#1565c0" stroke-width="2"/>
  <text x="300" y="456" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="12">Order: Primates</text>

  <polygon points="50,468 35,500 565,500 550,468" fill="#1e88e5" stroke="#1565c0" stroke-width="2"/>
  <text x="300" y="489" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="12">Family: Hominidae</text>

  <polygon points="35,500 25,530 575,530 565,500" fill="#1976d2" stroke="#1565c0" stroke-width="2"/>
  <text x="300" y="520" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="12">Genus: Homo</text>

  <polygon points="25,530 15,558 585,558 575,530" fill="#1565c0" stroke="#0d47a1" stroke-width="2"/>
  <text x="300" y="549" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="12">Species: Homo sapiens</text>

  <text x="300" y="575" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">Mnemonic: Dear King Philip Came Over For Good Soup</text>

  <!-- Cladogram -->
  <text x="300" y="610" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="15">Cladogram — Shared Derived Traits</text>

  <!-- Simple cladogram -->
  <line x1="50" y1="730" x2="580" y2="730" stroke="#333" stroke-width="2"/>
  <line x1="100" y1="730" x2="100" y2="680" stroke="#333" stroke-width="2"/>
  <text x="100" y="675" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Lancelet</text>
  <text x="100" y="690" text-anchor="middle" fill="#666" font-family="Arial" font-size="8">(Outgroup)</text>

  <line x1="180" y1="730" x2="180" y2="650" stroke="#333" stroke-width="2"/>
  <text x="180" y="645" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Tuna</text>
  <text x="180" y="660" text-anchor="middle" fill="#e53935" font-family="Arial" font-size="8">Jaws</text>

  <line x1="260" y1="730" x2="260" y2="640" stroke="#333" stroke-width="2"/>
  <text x="260" y="635" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Salamander</text>
  <text x="260" y="650" text-anchor="middle" fill="#e53935" font-family="Arial" font-size="8">Lungs</text>

  <line x1="340" y1="730" x2="340" y2="630" stroke="#333" stroke-width="2"/>
  <text x="340" y="625" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Lizard</text>
  <text x="340" y="640" text-anchor="middle" fill="#e53935" font-family="Arial" font-size="8">Amniotic egg</text>

  <line x1="420" y1="730" x2="420" y2="620" stroke="#333" stroke-width="2"/>
  <text x="420" y="615" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Pigeon</text>
  <text x="420" y="630" text-anchor="middle" fill="#e53935" font-family="Arial" font-size="8">Feathers</text>

  <line x1="500" y1="730" x2="500" y2="615" stroke="#333" stroke-width="2"/>
  <text x="500" y="610" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Mouse</text>
  <text x="500" y="625" text-anchor="middle" fill="#e53935" font-family="Arial" font-size="8">Hair/Fur</text>

  <line x1="560" y1="730" x2="560" y2="610" stroke="#333" stroke-width="2"/>
  <text x="560" y="605" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Chimp</text>
  <text x="560" y="620" text-anchor="middle" fill="#e53935" font-family="Arial" font-size="8">Large brain</text>

  <!-- Derived traits at nodes -->
  <circle cx="100" cy="730" r="5" fill="#e53935"/>
  <circle cx="180" cy="730" r="5" fill="#e53935"/>
  <circle cx="260" cy="730" r="5" fill="#e53935"/>
  <circle cx="340" cy="730" r="5" fill="#e53935"/>
  <circle cx="420" cy="730" r="5" fill="#e53935"/>
  <circle cx="500" cy="730" r="5" fill="#e53935"/>
  <circle cx="560" cy="730" r="5" fill="#e53935"/>
</svg>