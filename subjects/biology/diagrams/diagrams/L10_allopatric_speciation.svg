<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480">
  <rect width="600" height="480" fill="#fff"/>
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#333">Allopatric Speciation — Geographic Barrier → Reproductive Isolation</text>
  <rect x="30" y="45" width="170" height="110" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="115" y="68" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">1. Single Population</text>
  <text x="115" y="86" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Interbreeding population</text>
  <text x="115" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">occupies continuous range</text>
  <ellipse cx="115" cy="142" rx="55" ry="18" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
  <circle cx="100" cy="138" r="3" fill="#333"/><circle cx="115" cy="133" r="3" fill="#333"/>
  <circle cx="130" cy="138" r="3" fill="#333"/><circle cx="110" cy="145" r="3" fill="#333"/>
  <polygon points="205,100 225,100 225,92 238,107 225,122 225,114 205,114" fill="#333"/>
  <rect x="242" y="45" width="170" height="110" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="327" y="68" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">2. Geographic Barrier</text>
  <text x="327" y="86" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Mountain, river, ocean</text>
  <text x="327" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">divides population</text>
  <ellipse cx="297" cy="138" rx="28" ry="16" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="357" cy="138" rx="28" ry="16" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
  <rect x="324" y="120" width="6" height="38" fill="#e53935" stroke="#c62828" stroke-width="1.5"/>
  <text x="327" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828" font-weight="bold">NO GENE FLOW</text>
  <polygon points="417,100 437,100 437,92 450,107 437,122 437,114 417,114" fill="#333"/>
  <rect x="454" y="45" width="130" height="110" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="519" y="68" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">3. Divergence</text>
  <text x="519" y="86" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Different selection</text>
  <text x="519" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">+ mutation + drift</text>
  <ellipse cx="499" cy="138" rx="18" ry="12" fill="#81c784" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="539" cy="138" rx="18" ry="12" fill="#66bb6a" stroke="#333" stroke-width="1.5"/>
  <rect x="80" y="180" width="440" height="70" rx="8" fill="#e8eaf6" stroke="#3949ab" stroke-width="2"/>
  <text x="300" y="203" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#283593">4. Reproductive Isolation → Two Species</text>
  <text x="300" y="225" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Even if barrier removed, populations can no longer interbreed</text>
  <text x="300" y="243" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Prezygotic + postzygotic barriers evolved → ALLOPATRIC SPECIATION COMPLETE</text>
  <text x="300" y="285" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">Classic Examples</text>
  <rect x="35" y="300" width="170" height="60" rx="6" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="120" y="320" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">Darwin's Finches</text>
  <text x="120" y="340" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Galápagos Islands — ocean barriers → 14 species</text>
  <rect x="215" y="300" width="170" height="60" rx="6" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="300" y="320" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">Grand Canyon Squirrels</text>
  <text x="300" y="340" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Kaibab vs Abert's — canyon split</text>
  <rect x="395" y="300" width="170" height="60" rx="6" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="480" y="320" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">Isthmus of Panama</text>
  <text x="480" y="340" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Snapping shrimp — land bridge divide</text>
  <rect x="35" y="380" width="530" height="50" rx="6" fill="#e0f2f1" stroke="#4db6ac" stroke-width="1.5"/>
  <text x="300" y="400" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#00695c">Geographic Barriers: Mountains | Rivers | Oceans | Glaciers | Deserts | Land Bridges | Habitat Fragmentation</text>
  <text x="300" y="420" text-anchor="middle" font-family="Arial" font-size="10" fill="#00695c">Isolation → Divergence → Reproductive Isolation → New Species</text>
</svg>