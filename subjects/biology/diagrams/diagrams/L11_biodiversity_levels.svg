<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <rect width="600" height="450" fill="#fff"/>
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#333">Three Levels of Biodiversity</text>
  <text x="300" y="46" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Interdependent levels: genetic → species → ecosystem</text>
  <!-- Genetic -->
  <rect x="25" y="65" width="170" height="200" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="110" y="90" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">Genetic Diversity</text>
  <text x="110" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Variety of alleles</text>
  <text x="110" y="126" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">within a species</text>
  <circle cx="80" cy="155" r="12" fill="#a5d6a7" stroke="#333" stroke-width="1.5"/>
  <text x="80" y="159" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">AA</text>
  <circle cx="110" cy="155" r="12" fill="#81c784" stroke="#333" stroke-width="1.5"/>
  <text x="110" y="159" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Aa</text>
  <circle cx="140" cy="155" r="12" fill="#66bb6a" stroke="#333" stroke-width="1.5"/>
  <text x="140" y="159" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">aa</text>
  <text x="110" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Different alleles in</text>
  <text x="110" y="205" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">gene pool</text>
  <text x="110" y="230" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">High genetic diversity →</text>
  <text x="110" y="245" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">resilience to change</text>
  <!-- Species -->
  <rect x="215" y="65" width="170" height="200" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="300" y="90" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">Species Diversity</text>
  <text x="300" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Number of species</text>
  <text x="300" y="126" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">(richness) + relative</text>
  <text x="300" y="140" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">abundance (evenness)</text>
  <text x="300" y="160" text-anchor="middle" font-family="Arial" font-size="30" fill="#1565c0">🐟🐠🐡🦈🐋</text>
  <text x="300" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Measured by Simpson's</text>
  <text x="300" y="205" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Diversity Index</text>
  <text x="300" y="230" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Richness: how many species</text>
  <text x="300" y="245" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Evenness: how equally abundant</text>
  <!-- Ecosystem -->
  <rect x="405" y="65" width="170" height="200" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="490" y="90" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e65100">Ecosystem Diversity</text>
  <text x="490" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Variety of habitats,</text>
  <text x="490" y="126" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">communities, and</text>
  <text x="490" y="140" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">ecological processes</text>
  <rect x="445" y="155" width="85" height="40" rx="5" fill="#81c784" stroke="#333" stroke-width="1.5"/>
  <text x="487" y="180" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Forest</text>
  <rect x="445" y="200" width="85" height="25" rx="5" fill="#64b5f6" stroke="#333" stroke-width="1.5"/>
  <text x="487" y="217" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Coral Reef</text>
  <text x="490" y="250" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Includes biotic + abiotic</text>
  <text x="490" y="265" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">interactions</text>
  <!-- Arrows between levels -->
  <polygon points="195,180 210,180 210,170 218,185 210,200 210,190 195,190" fill="#333"/>
  <polygon points="385,180 400,180 400,170 408,185 400,200 400,190 385,190" fill="#333"/>
  <!-- Threats -->
  <text x="300" y="300" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">Threats to Biodiversity: HIPCO</text>
  <rect x="30" y="315" width="100" height="40" rx="5" fill="#ffebee" stroke="#e53935" stroke-width="1.5"/>
  <text x="80" y="333" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">H</text>
  <text x="80" y="348" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Habitat Loss</text>
  <rect x="140" y="315" width="100" height="40" rx="5" fill="#ffebee" stroke="#e53935" stroke-width="1.5"/>
  <text x="190" y="333" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">I</text>
  <text x="190" y="348" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Invasive Species</text>
  <rect x="250" y="315" width="100" height="40" rx="5" fill="#ffebee" stroke="#e53935" stroke-width="1.5"/>
  <text x="300" y="333" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">P</text>
  <text x="300" y="348" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Pollution</text>
  <rect x="360" y="315" width="100" height="40" rx="5" fill="#ffebee" stroke="#e53935" stroke-width="1.5"/>
  <text x="410" y="333" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">C</text>
  <text x="410" y="348" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Climate Change</text>
  <rect x="470" y="315" width="100" height="40" rx="5" fill="#ffebee" stroke="#e53935" stroke-width="1.5"/>
  <text x="520" y="333" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#c62828">O</text>
  <text x="520" y="348" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Overexploitation</text>
  <rect x="80" y="375" width="440" height="35" rx="6" fill="#ff8f00" opacity="0.15"/>
  <text x="300" y="395" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">All three levels are interdependent — loss at one level cascades to others</text>
</svg>