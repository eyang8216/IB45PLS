<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 720" width="600" height="720">
  <rect width="600" height="720" fill="#fff"/>
  <text x="300" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Fick's Law of Diffusion</text>
  <text x="300" y="55" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Rate = (SA × ΔP × D) / d</text>

  <!-- Section 1: Surface Area -->
  <rect x="30" y="75" width="250" height="290" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="155" y="100" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">SMALL Surface Area</text>
  <rect x="60" y="115" width="80" height="60" rx="3" fill="none" stroke="#e53935" stroke-width="2.5"/>
  <text x="60" y="210" font-family="Arial" font-size="10" fill="#e53935">Few exchange</text>
  <text x="60" y="224" font-family="Arial" font-size="10" fill="#e53935">sites</text>
  <!-- Slow arrows -->
  <text x="70" y="250" font-family="Arial" font-size="13" fill="#e53935" font-weight="bold">Slow Diffusion</text>
  <line x1="130" y1="190" x2="190" y2="190" stroke="#e53935" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- SA Large -->
  <rect x="310" y="75" width="260" height="290" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="440" y="100" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">LARGE Surface Area</text>
  <rect x="330" y="115" width="50" height="26" rx="3" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>
  <rect x="385" y="115" width="50" height="26" rx="3" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>
  <rect x="440" y="115" width="50" height="26" rx="3" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>
  <rect x="330" y="148" width="50" height="26" rx="3" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>
  <rect x="385" y="148" width="50" height="26" rx="3" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>
  <rect x="440" y="148" width="50" height="26" rx="3" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="440" y="210" font-family="Arial" font-size="10" fill="#1a6b3c">Many exchange sites</text>
  <text x="440" y="224" font-family="Arial" font-size="10" fill="#1a6b3c">(e.g. 70 m² alveoli)</text>
  <text x="440" y="260" font-family="Arial" font-size="13" fill="#1a6b3c" font-weight="bold">Fast Diffusion</text>

  <!-- Section 2: Concentration Gradient -->
  <rect x="30" y="380" width="250" height="145" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="155" y="405" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">SHALLOW Gradient</text>
  <rect x="55" y="420" width="200" height="22" rx="2" fill="#bbdefb"/>
  <rect x="55" y="445" width="200" height="22" rx="2" fill="#90caf9"/>
  <text x="155" y="500" font-family="Arial" font-size="11" fill="#1565c0">Small ΔP → Slow diffusion</text>

  <rect x="310" y="380" width="260" height="145" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="440" y="405" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">STEEP Gradient</text>
  <rect x="330" y="420" width="220" height="10" rx="2" fill="#1565c0"/>
  <rect x="330" y="435" width="220" height="10" rx="2" fill="#42a5f5"/>
  <rect x="330" y="450" width="220" height="10" rx="2" fill="#90caf9"/>
  <rect x="330" y="465" width="220" height="10" rx="2" fill="#bbdefb"/>
  <text x="440" y="500" font-family="Arial" font-size="11" fill="#1565c0">Large ΔP → Fast diffusion</text>

  <!-- Section 3: Membrane Thickness -->
  <rect x="30" y="540" width="250" height="160" rx="8" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
  <text x="155" y="565" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">THICK Membrane</text>
  <rect x="60" y="580" width="40" height="60" rx="2" fill="none" stroke="#e53935" stroke-width="3"/>
  <text x="80" y="620" font-family="Arial" font-size="11" fill="#e53935">↑d</text>
  <text x="120" y="615" font-family="Arial" font-size="12" fill="#e53935">Slow</text>
  <text x="120" y="632" font-family="Arial" font-size="12" fill="#e53935">Diffusion</text>

  <rect x="310" y="540" width="260" height="160" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="440" y="565" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">THIN Membrane</text>
  <rect x="340" y="580" width="20" height="60" rx="2" fill="none" stroke="#1a6b3c" stroke-width="2"/>
  <text x="350" y="665" font-family="Arial" font-size="10" fill="#1a6b3c">↓d</text>
  <text x="400" y="615" font-family="Arial" font-size="13" fill="#1a6b3c" font-weight="bold">Fast</text>
  <text x="400" y="634" font-family="Arial" font-size="13" fill="#1a6b3c" font-weight="bold">Diffusion</text>
  <text x="440" y="665" font-family="Arial" font-size="10" fill="#1a6b3c">(0.2–0.5 μm alveolar)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e53935"/>
    </marker>
  </defs>
</svg>
