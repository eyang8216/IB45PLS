<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440">
  <rect width="600" height="440" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">ADH &amp; Aquaporins — Control of Water Reabsorption</text>

  <!-- Osmoreceptor feedback loop -->
  <text x="300" y="55" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">Osmoregulation Feedback Loop</text>

  <g transform="translate(30, 70)">
    <!-- Dehydration path -->
    <rect x="0" y="5" width="250" height="155" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="1.5"/>
    <text x="125" y="25" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">Dehydration</text>
    <text x="125" y="42" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Blood osmolality ↑ (too concentrated)</text>
    <text x="15" y="62" font-family="Arial" font-size="10" fill="#333">① Osmoreceptors in hypothalamus detect ↑</text>
    <text x="15" y="78" font-family="Arial" font-size="10" fill="#333">② Posterior pituitary releases <tspan font-weight="bold" fill="#1565c0">ADH</tspan></text>
    <text x="15" y="94" font-family="Arial" font-size="10" fill="#333">③ Collecting duct: Aquaporin-2 inserted</text>
    <text x="15" y="110" font-family="Arial" font-size="10" fill="#333">④ Water reabsorbed into medulla</text>
    <text x="15" y="126" font-family="Arial" font-size="10" fill="#333">⑤ <tspan font-weight="bold">Small volume concentrated urine</tspan></text>
    <text x="15" y="146" font-family="Arial" font-size="9" fill="#888">→ Blood osmolality returns to normal</text>

    <!-- Overhydration path -->
    <rect x="270" y="5" width="250" height="155" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
    <text x="395" y="25" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Overhydration</text>
    <text x="395" y="42" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Blood osmolality ↓ (too dilute)</text>
    <text x="285" y="62" font-family="Arial" font-size="10" fill="#333">① Osmoreceptors detect ↓ osmolality</text>
    <text x="285" y="78" font-family="Arial" font-size="10" fill="#333">② ADH secretion <tspan font-weight="bold" fill="#e53935">SUPPRESSED</tspan></text>
    <text x="285" y="94" font-family="Arial" font-size="10" fill="#333">③ Aquaporin-2 removed from membrane</text>
    <text x="285" y="110" font-family="Arial" font-size="10" fill="#333">④ Water stays in filtrate</text>
    <text x="285" y="126" font-family="Arial" font-size="10" fill="#333">⑤ <tspan font-weight="bold">Large volume dilute urine</tspan></text>
    <text x="285" y="146" font-family="Arial" font-size="9" fill="#888">→ Blood osmolality returns to normal</text>
  </g>

  <!-- Aquaporin cell mechanism -->
  <rect x="30" y="240" width="540" height="185" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="263" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#6a1b9a">Aquaporin Mechanism in Collecting Duct Cells</text>

  <!-- WITHOUT ADH -->
  <rect x="45" y="275" width="235" height="135" rx="6" fill="#ffebee"/>
  <text x="162" y="295" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">Without ADH</text>

  <!-- Cell -->
  <rect x="65" y="305" width="190" height="95" rx="4" fill="none" stroke="#333" stroke-width="1.5"/>

  <!-- Apical membrane (top) -->
  <text x="160" y="318" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">Apical membrane</text>

  <!-- Vesicles in cytoplasm -->
  <circle cx="120" cy="345" r="10" fill="none" stroke="#1565c0" stroke-width="1.5"/>
  <text x="120" y="348" text-anchor="middle" font-family="Arial" font-size="6" fill="#1565c0">AQP2</text>
  <circle cx="160" cy="355" r="10" fill="none" stroke="#1565c0" stroke-width="1.5"/>
  <text x="160" y="358" text-anchor="middle" font-family="Arial" font-size="6" fill="#1565c0">AQP2</text>
  <circle cx="190" cy="348" r="10" fill="none" stroke="#1565c0" stroke-width="1.5"/>
  <text x="190" y="351" text-anchor="middle" font-family="Arial" font-size="6" fill="#1565c0">AQP2</text>
  <text x="160" y="390" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Aquaporins stored in vesicles</text>

  <!-- Basolateral AQPs -->
  <rect x="100" y="385" width="8" height="12" rx="2" fill="#43a047"/>
  <rect x="140" y="385" width="8" height="12" rx="2" fill="#43a047"/>
  <rect x="180" y="385" width="8" height="12" rx="2" fill="#43a047"/>

  <!-- ARROW -->
  <text x="295" y="345" text-anchor="middle" font-family="Arial" font-size="20" fill="#555">→</text>

  <!-- WITH ADH -->
  <rect x="320" y="275" width="235" height="135" rx="6" fill="#e8f5e9"/>
  <text x="437" y="295" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">With ADH</text>

  <rect x="340" y="305" width="190" height="95" rx="4" fill="none" stroke="#333" stroke-width="1.5"/>

  <!-- ADH receptor -->
  <rect x="355" y="308" width="8" height="12" rx="2" fill="#6a1b9a"/>
  <text x="365" y="314" font-family="Arial" font-size="7" fill="#6a1b9a">ADH</text>

  <!-- AQP2 in membrane -->
  <rect x="380" y="302" width="8" height="12" rx="2" fill="#1565c0"/>
  <rect x="400" y="302" width="8" height="12" rx="2" fill="#1565c0"/>
  <rect x="420" y="302" width="8" height="12" rx="2" fill="#1565c0"/>
  <rect x="440" y="302" width="8" height="12" rx="2" fill="#1565c0"/>
  <rect x="460" y="302" width="8" height="12" rx="2" fill="#1565c0"/>

  <text x="437" y="330" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0" font-weight="bold">AQP2 channels inserted</text>

  <!-- Water flow arrows -->
  <line x1="437" y1="338" x2="437" y2="370" stroke="#1565c0" stroke-width="1.5"/>
  <polygon points="437,370 433,363 441,363" fill="#1565c0"/>
  <text x="437" y="378" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">H₂O reabsorbed</text>

  <!-- Basolateral AQPs -->
  <rect x="375" y="385" width="8" height="12" rx="2" fill="#43a047"/>
  <rect x="415" y="385" width="8" height="12" rx="2" fill="#43a047"/>
  <rect x="455" y="385" width="8" height="12" rx="2" fill="#43a047"/>
  <text x="437" y="408" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">To blood</text>
</svg>
