<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 430" width="600" height="430">
  <defs><style>text { font-family: Arial, sans-serif; } .title { font-size: 18px; font-weight: bold; fill: #1a6b3c; text-anchor: middle; } .lab { font-size: 13px; fill: #333; text-anchor: middle; } .sm { font-size: 11px; fill: #555; text-anchor: middle; }</style></defs>
  <rect width="600" height="430" fill="#fff"/>
  <text x="300" y="30" class="title">Cis vs Trans Unsaturated Fatty Acids</text>

  <!-- CIS -->
  <text x="175" y="65" class="lab" fill="#1565c0" font-weight="bold">CIS Configuration</text>
  <polyline points="60,95 80,115 65,135 85,155 70,175" fill="none" stroke="#333" stroke-width="2"/>
  <polyline points="70,175 85,195 70,215 85,235 70,255 85,275 70,295" fill="none" stroke="#333" stroke-width="2"/>
  <!-- H atoms on same side -->
  <circle cx="80" cy="195" r="5" fill="#e53935"/><text x="55" y="198" class="sm" fill="#e53935">H</text>
  <circle cx="92" cy="175" r="5" fill="#e53935"/><text x="100" y="165" class="sm" fill="#e53935">H</text>
  <!-- double bond -->
  <line x1="67" y1="187" x2="87" y2="195" stroke="#333" stroke-width="3"/>
  <line x1="67" y1="193" x2="87" y2="201" stroke="#333" stroke-width="3"/>
  <text x="175" y="325" class="lab" fill="#1565c0">Both H on SAME side → KINKED</text>
  <text x="175" y="342" class="lab">Naturally occurring</text>
  <text x="175" y="359" class="lab" fill="#1565c0">Liquid at room temperature</text>

  <!-- TRANS -->
  <text x="425" y="65" class="lab" fill="#e53935" font-weight="bold">TRANS Configuration</text>
  <polyline points="310,95 330,115 315,135 335,155 320,175" fill="none" stroke="#333" stroke-width="2"/>
  <polyline points="320,175 335,195 320,215 335,235 320,255 335,275 320,295" fill="none" stroke="#333" stroke-width="2"/>
  <!-- H atoms on opposite sides -->
  <circle cx="328" cy="175" r="5" fill="#e53935"/><text x="310" y="170" class="sm" fill="#e53935">H</text>
  <circle cx="340" cy="198" r="5" fill="#e53935"/><text x="348" y="200" class="sm" fill="#e53935">H</text>
  <line x1="317" y1="187" x2="337" y2="195" stroke="#333" stroke-width="3"/>
  <line x1="317" y1="193" x2="337" y2="201" stroke="#333" stroke-width="3"/>
  <text x="425" y="325" class="lab" fill="#e53935">H on OPPOSITE sides → STRAIGHT</text>
  <text x="425" y="342" class="lab">Industrially produced (partial hydrogenation)</text>
  <text x="425" y="359" class="lab" fill="#e53935">Solid/semi-solid; RAISES LDL, LOWERS HDL</text>

  <!-- divider -->
  <line x1="300" y1="80" x2="300" y2="380" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Warning box -->
  <rect x="100" y="375" width="400" height="45" rx="5" fill="#ffebee" stroke="#ef9a9a" stroke-width="1"/>
  <text x="300" y="394" class="sm" fill="#c62828" font-weight="bold">⚠ Trans fats: ↑ LDL cholesterol &amp; ↓ HDL cholesterol → increased CVD risk</text>
  <text x="300" y="410" class="sm" fill="#c62828">Cis fats are natural/healthy; trans fats are industrial/harmful</text>
</svg>
