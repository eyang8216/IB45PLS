<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420">
  <defs><style>text { font-family: Arial, sans-serif; } .title { font-size: 18px; font-weight: bold; fill: #1a6b3c; text-anchor: middle; } .lab { font-size: 13px; fill: #333; text-anchor: middle; } .sm { font-size: 11px; fill: #555; text-anchor: middle; }</style></defs>
  <rect width="600" height="420" fill="#fff"/>
  <text x="300" y="28" class="title">Secondary Structure: α-Helix &amp; β-Pleated Sheet</text>

  <!-- α-Helix (left) -->
  <text x="170" y="55" class="lab" fill="#1565c0" font-weight="bold">α-Helix</text>
  <!-- Spiral representation -->
  <g transform="translate(100, 75)">
    <ellipse cx="70" cy="30" rx="50" ry="22" fill="none" stroke="#1565c0" stroke-width="2.5"/>
    <ellipse cx="70" cy="60" rx="50" ry="22" fill="none" stroke="#1565c0" stroke-width="2.5"/>
    <ellipse cx="70" cy="90" rx="50" ry="22" fill="none" stroke="#1565c0" stroke-width="2.5"/>
    <ellipse cx="70" cy="120" rx="50" ry="22" fill="none" stroke="#1565c0" stroke-width="2.5"/>
    <ellipse cx="70" cy="150" rx="50" ry="22" fill="none" stroke="#1565c0" stroke-width="2.5"/>
    <!-- H-bonds -->
    <line x1="30" y1="30" x2="30" y2="90" stroke="#e53935" stroke-width="1.5" stroke-dasharray="5,3"/>
    <line x1="30" y1="60" x2="30" y2="120" stroke="#e53935" stroke-width="1.5" stroke-dasharray="5,3"/>
    <line x1="30" y1="90" x2="30" y2="150" stroke="#e53935" stroke-width="1.5" stroke-dasharray="5,3"/>
    <!-- R-groups -->
    <line x1="110" y1="75" x2="130" y2="60" stroke="#6a1b9a" stroke-width="2"/>
    <line x1="110" y1="105" x2="130" y2="90" stroke="#6a1b9a" stroke-width="2"/>
    <line x1="110" y1="135" x2="130" y2="120" stroke="#6a1b9a" stroke-width="2"/>
    <text x="135" y="60" class="sm" fill="#6a1b9a">R</text>
    <text x="135" y="90" class="sm" fill="#6a1b9a">R</text>
    <text x="135" y="120" class="sm" fill="#6a1b9a">R</text>
  </g>

  <text x="170" y="260" class="sm" fill="#1565c0">Right-handed</text>
  <text x="170" y="275" class="sm" fill="#1565c0">3.6 residues/turn</text>
  <text x="170" y="290" class="sm" fill="#e53935">H-bonds: C=O(n)···H–N(n+4)</text>
  <text x="170" y="305" class="sm" fill="#1565c0">R-groups project outward</text>

  <!-- β-Sheet (right) -->
  <text x="430" y="55" class="lab" fill="#43a047" font-weight="bold">β-Pleated Sheet</text>
  <g transform="translate(330, 75)">
    <!-- 3 zigzag strands -->
    <polyline points="20,20 50,40 20,60 50,80 20,100 50,120 20,140 50,160" fill="none" stroke="#43a047" stroke-width="2.5"/>
    <polyline points="60,20 90,40 60,60 90,80 60,100 90,120 60,140 90,160" fill="none" stroke="#43a047" stroke-width="2.5"/>
    <polyline points="100,20 130,40 100,60 130,80 100,100 130,120 100,140 130,160" fill="none" stroke="#43a047" stroke-width="2.5"/>
    <!-- H-bonds between strands -->
    <line x1="45" y1="40" x2="65" y2="40" stroke="#e53935" stroke-width="1.5" stroke-dasharray="5,3"/>
    <line x1="45" y1="60" x2="65" y2="60" stroke="#e53935" stroke-width="1.5" stroke-dasharray="5,3"/>
    <line x1="85" y1="40" x2="105" y2="40" stroke="#e53935" stroke-width="1.5" stroke-dasharray="5,3"/>
    <line x1="85" y1="60" x2="105" y2="60" stroke="#e53935" stroke-width="1.5" stroke-dasharray="5,3"/>
    <!-- N→C arrows -->
    <text x="35" y="180" class="sm" fill="#333">N→C</text>
    <text x="75" y="180" class="sm" fill="#333">N→C</text>
    <text x="115" y="180" class="sm" fill="#333">N→C</text>
    <!-- R-group alternation -->
    <text x="18" y="30" class="sm" fill="#6a1b9a">R</text>
    <text x="48" y="50" class="sm" fill="#6a1b9a">R</text>
  </g>

  <text x="430" y="260" class="sm" fill="#43a047">Extended zigzag</text>
  <text x="430" y="275" class="sm" fill="#43a047">R-groups alternate ↑↓</text>
  <text x="430" y="290" class="sm" fill="#e53935">H-bonds: inter-strand</text>
  <text x="430" y="305" class="sm" fill="#43a047">C=O···H–N between strands</text>

  <!-- Comparison footer -->
  <rect x="30" y="325" width="540" height="85" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="300" y="345" class="lab" fill="#333" font-weight="bold">Key Difference: α-Helix H-bonds are INTRA-chain (within same chain, n→n+4)</text>
  <text x="300" y="363" class="lab" fill="#333">β-Sheet H-bonds are INTER-chain (between adjacent strands)</text>
  <text x="300" y="383" class="sm" fill="#555">Both stabilized by H-bonds between backbone C=O and N-H (not R-groups!)</text>
  <text x="300" y="398" class="sm" fill="#555">Parallel: strands N→C same direction; Antiparallel: opposite directions (more stable)</text>
</svg>
