<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <rect width="600" height="340" fill="#fff"/>
  <text x="300" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#333">Link Reaction — Pyruvate → Acetyl-CoA</text>
  <text x="300" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#555">Mitochondrial Matrix — Per pyruvate (occurs twice per glucose)</text>

  <!-- Pyruvate -->
  <rect x="50" y="75" width="85" height="36" rx="6" fill="#ffcc80" stroke="#ff8f00" stroke-width="2"/>
  <text x="92" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#333" font-weight="bold">Pyruvate</text>
  <text x="92" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">CH₃-CO-COO⁻ (C₃)</text>

  <!-- Arrow to decarboxylation -->
  <line x1="135" y1="93" x2="175" y2="93" stroke="#333" stroke-width="2" marker-end="url(#arb)"/>
  <defs><marker id="arb" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#333"/></marker></defs>

  <!-- Step 1: Decarboxylation -->
  <rect x="180" y="68" width="140" height="50" rx="6" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
  <text x="250" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e53935" font-weight="bold">Step 1: Decarboxylation</text>
  <text x="250" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">C₃ → C₂ + CO₂</text>
  <text x="250" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e53935">CO₂ released</text>

  <!-- CO₂ off -->
  <path d="M270,50 L280,36 L270,30" fill="none" stroke="#e53935" stroke-width="1.5"/>
  <text x="295" y="38" font-family="Arial, sans-serif" font-size="10" fill="#e53935">CO₂</text>

  <line x1="320" y1="93" x2="355" y2="93" stroke="#333" stroke-width="2" marker-end="url(#arb)"/>

  <!-- Step 2: Oxidation -->
  <rect x="360" y="68" width="120" height="50" rx="6" fill="#ede7f6" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="420" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6a1b9a" font-weight="bold">Step 2: Oxidation</text>
  <text x="420" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">NAD⁺ → NADH</text>
  <text x="420" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6a1b9a">Electrons removed</text>

  <line x1="480" y1="93" x2="515" y2="93" stroke="#333" stroke-width="2" marker-end="url(#arb)"/>

  <!-- Acetyl-CoA -->
  <rect x="520" y="70" width="75" height="46" rx="6" fill="#1a6b3c" stroke="#0d3d1e" stroke-width="2"/>
  <text x="557" y="89" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff" font-weight="bold">Acetyl-CoA</text>
  <text x="557" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c8e6c9">CH₃CO-CoA</text>
  <text x="557" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#c8e6c9">(C₂, enters Krebs)</text>

  <!-- NADH arrow -->
  <path d="M405,120 L405,145 L250,145 L250,120" fill="none" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="378" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6a1b9a">NADH → ETC</text>

  <!-- Summary box -->
  <rect x="50" y="170" width="500" height="60" rx="6" fill="none" stroke="#43a047" stroke-width="1.5"/>
  <text x="300" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#43a047" font-weight="bold">Link Reaction Summary (per pyruvate)</text>
  <text x="300" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">Pyruvate + CoA + NAD⁺ → Acetyl-CoA + CO₂ + NADH</text>

  <!-- Per glucose note -->
  <rect x="150" y="245" width="300" height="24" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Per glucose: 2 pyruvate → 2 Acetyl-CoA + 2 CO₂ + 2 NADH</text>

  <!-- Interconnections -->
  <text x="300" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Acetyl-CoA also from: β-oxidation of fatty acids, ketogenic amino acid degradation</text>

  <!-- Enzyme -->
  <text x="300" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1565c0" font-weight="bold">Enzyme: Pyruvate Dehydrogenase Complex (PDC) — 3 enzymes, 5 coenzymes</text>
</svg>
