<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#fff"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Polygenic Inheritance — Continuous Variation (Bell Curve)</text>

  <!-- Mendelian vs Polygenic -->
  <rect x="20" y="48" width="270" height="155" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="155" y="72" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">Mendelian (Discrete)</text>
  <!-- Bar chart -->
  <rect x="50" y="85" width="50" height="90" rx="3" fill="#e53935"/>
  <text x="75" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Tall</text>
  <rect x="115" y="130" width="50" height="45" rx="3" fill="#ff8f00"/>
  <text x="140" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Med</text>
  <rect x="180" y="155" width="50" height="20" rx="3" fill="#1565c0"/>
  <text x="205" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Dwarf</text>
  <text x="155" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">1 gene → 3 genotypes</text>

  <rect x="310" y="48" width="270" height="155" rx="8" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="445" y="72" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">Polygenic (Continuous)</text>

  <!-- Bell curve -->
  <path d="M340,175 Q370,85 445,90 Q520,95 550,175Z" fill="#81c784" stroke="#43a047" stroke-width="2"/>
  <text x="445" y="130" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#1a6b3c">~</text>
  <text x="445" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Many genes → smooth distribution</text>

  <!-- Complete bell curve -->
  <text x="300" y="228" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#6a1b9a">The Normal (Bell-Shaped) Distribution</text>

  <!-- Main bell curve -->
  <path d="M40,370 Q40,240 300,240 Q560,240 560,370Z" fill="#c8e6c9" stroke="#43a047" stroke-width="2.5"/>
  <path d="M40,370 Q40,240 300,240 Q560,240 560,370" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>

  <!-- Labels on the curve -->
  <text x="90" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Extreme</text>
  <text x="90" y="295" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">phenotype</text>
  <text x="300" y="258" text-anchor="middle" font-family="Arial" font-size="12" fill="#1a6b3c" font-weight="bold">Mean (average)</text>
  <text x="500" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Extreme</text>
  <text x="500" y="295" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">phenotype</text>

  <!-- Gene contribution graphic -->
  <text x="160" y="320" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">↓ cumulative effect of polygenes</text>
  <text x="440" y="320" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">↓ cumulative effect of polygenes</text>

  <!-- Axis -->
  <line x1="40" y1="370" x2="560" y2="370" stroke="#333" stroke-width="2"/>
  <text x="300" y="392" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Phenotype → (e.g., human height 140–210 cm)</text>
</svg>
