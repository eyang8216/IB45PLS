<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460" width="600" height="460">
  <rect width="600" height="460" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#333">Glycolysis Overview — Glucose → 2 Pyruvate</text>
  <text x="300" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#555">Cytoplasm — Anaerobic process — 10 enzyme-catalyzed steps</text>

  <!-- Glucose -->
  <rect x="220" y="65" width="80" height="28" rx="6" fill="#ffcc80" stroke="#ff8f00" stroke-width="2"/>
  <text x="260" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#333" font-weight="bold">Glucose (C₆)</text>

  <line x1="260" y1="93" x2="260" y2="115" stroke="#333" stroke-width="2" marker-end="url(#a6)"/>
  <defs><marker id="a6" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#333"/></marker></defs>

  <!-- ATP investment -->
  <rect x="190" y="118" width="140" height="22" rx="4" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
  <text x="260" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e53935" font-weight="bold">2 ATP invested → 2 ADP</text>

  <line x1="260" y1="140" x2="260" y2="165" stroke="#333" stroke-width="2" marker-end="url(#a6)"/>

  <!-- Hexose bisphosphate -->
  <rect x="205" y="168" width="110" height="24" rx="5" fill="#c8e6c9" stroke="#43a047" stroke-width="1.5"/>
  <text x="260" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Fructose-1,6-bisP (C₆)</text>

  <line x1="260" y1="192" x2="260" y2="215" stroke="#333" stroke-width="2"/>

  <!-- Lysis -->
  <text x="260" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e53935">Lysis (splitting)</text>
  <line x1="260" y1="220" x2="200" y2="245" stroke="#333" stroke-width="1.5"/>
  <line x1="260" y1="220" x2="320" y2="245" stroke="#333" stroke-width="1.5"/>

  <!-- Two triose phosphates -->
  <rect x="145" y="248" width="100" height="22" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="195" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">G3P (C₃)</text>
  <rect x="275" y="248" width="100" height="22" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="325" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">DHAP → G3P (C₃)</text>

  <!-- NADH production -->
  <line x1="195" y1="270" x2="195" y2="295" stroke="#333" stroke-width="1.5" marker-end="url(#a6)"/>
  <line x1="325" y1="270" x2="325" y2="295" stroke="#333" stroke-width="1.5" marker-end="url(#a6)"/>

  <rect x="145" y="298" width="260" height="24" rx="4" fill="#ede7f6" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="275" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6a1b9a" font-weight="bold">2 NAD⁺ → 2 NADH (×2 G3P oxidized)</text>

  <line x1="195" y1="322" x2="195" y2="345" stroke="#333" stroke-width="1.5" marker-end="url(#a6)"/>
  <line x1="325" y1="322" x2="325" y2="345" stroke="#333" stroke-width="1.5" marker-end="url(#a6)"/>

  <!-- ATP production (substrate-level) -->
  <rect x="145" y="348" width="260" height="24" rx="4" fill="#c8e6c9" stroke="#43a047" stroke-width="1.5"/>
  <text x="275" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#43a047" font-weight="bold">4 ADP → 4 ATP (substrate-level phosphorylation)</text>

  <line x1="195" y1="372" x2="195" y2="395" stroke="#333" stroke-width="1.5" marker-end="url(#a6)"/>
  <line x1="325" y1="372" x2="325" y2="395" stroke="#333" stroke-width="1.5" marker-end="url(#a6)"/>

  <!-- 2 Pyruvate -->
  <rect x="155" y="398" width="80" height="26" rx="6" fill="#ff8f00" stroke="#e65100" stroke-width="2"/>
  <text x="195" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff" font-weight="bold">Pyruvate (C₃)</text>
  <rect x="290" y="398" width="80" height="26" rx="6" fill="#ff8f00" stroke="#e65100" stroke-width="2"/>
  <text x="330" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff" font-weight="bold">Pyruvate (C₃)</text>

  <!-- Summary box -->
  <rect x="130" y="435" width="340" height="22" rx="5" fill="none" stroke="#1a6b3c" stroke-width="2"/>
  <text x="300" y="451" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a6b3c" font-weight="bold">Net: Glucose + 2 NAD⁺ + 2 ADP + 2 Pi → 2 Pyruvate + 2 NADH + 2 ATP</text>
</svg>
