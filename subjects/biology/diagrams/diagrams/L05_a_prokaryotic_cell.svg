### L05_a: Prokaryotic Cell ###
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" style="background:#fff">
  <defs><linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a6b3c"/><stop offset="100%" stop-color="#43a047"/></linearGradient></defs>
  <rect width="600" height="600" fill="#fff"/>
  <rect x="0" y="0" width="600" height="42" fill="url(#hdr)"/>
  <text x="300" y="28" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="16">Prokaryotic Cell Structure — Bacteria (Domain Bacteria)</text>

  <!-- Capsule (outermost fuzzy layer) -->
  <rect x="65" y="60" width="430" height="230" rx="30" fill="#c8e6c9" stroke="#81c784" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Cell wall (peptidoglycan) -->
  <rect x="75" y="70" width="410" height="210" rx="25" fill="#fff9c4" stroke="#ff8f00" stroke-width="3"/>

  <!-- Plasma membrane -->
  <rect x="85" y="80" width="390" height="190" rx="22" fill="#e3f2fd" stroke="#1565c0" stroke-width="2.5" stroke-dasharray="4,2"/>

  <!-- Cytoplasm -->
  <rect x="95" y="90" width="370" height="170" rx="18" fill="#fafafa" stroke="#ddd" stroke-width="1"/>

  <!-- Nucleoid region (tangled DNA) -->
  <path d="M180,130 C190,110 220,115 210,135 C230,120 240,145 225,155 C245,150 240,170 220,168 C230,180 210,185 200,172 C190,185 170,180 175,165 C160,170 155,150 165,140 C150,135 160,115 175,125 Z" stroke="#1565c0" stroke-width="2.5" fill="none"/>
  <text x="200" y="203" text-anchor="middle" fill="#1565c0" font-family="Arial" font-weight="bold" font-size="12">Nucleoid Region</text>
  <text x="200" y="218" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">(circular DNA, no membrane)</text>

  <!-- Plasmids -->
  <circle cx="320" cy="120" r="15" fill="none" stroke="#e53935" stroke-width="2"/>
  <text x="320" y="124" text-anchor="middle" fill="#e53935" font-family="Arial" font-weight="bold" font-size="9">Plasmid</text>
  <circle cx="380" cy="170" r="10" fill="none" stroke="#e53935" stroke-width="2"/>
  <text x="380" y="174" text-anchor="middle" fill="#e53935" font-family="Arial" font-weight="bold" font-size="8">Plasmid</text>

  <!-- 70S Ribosomes -->
  <circle cx="220" cy="140" r="4" fill="#6a1b9a"/>
  <circle cx="240" cy="160" r="4" fill="#6a1b9a"/>
  <circle cx="260" cy="135" r="4" fill="#6a1b9a"/>
  <circle cx="280" cy="155" r="4" fill="#6a1b9a"/>
  <circle cx="300" cy="140" r="4" fill="#6a1b9a"/>
  <circle cx="250" cy="180" r="4" fill="#6a1b9a"/>
  <circle cx="340" cy="145" r="4" fill="#6a1b9a"/>
  <circle cx="360" cy="130" r="4" fill="#6a1b9a"/>
  <circle cx="270" cy="170" r="4" fill="#6a1b9a"/>
  <text x="290" y="240" text-anchor="middle" fill="#6a1b9a" font-family="Arial" font-size="11" font-weight="bold">70S Ribosomes (50S+30S)</text>

  <!-- Storage granule -->
  <circle cx="360" cy="215" r="14" fill="#bdbdbd" stroke="#757575" stroke-width="2"/>
  <text x="360" y="219" text-anchor="middle" fill="#333" font-family="Arial" font-size="8">Storage</text>
  <text x="360" y="229" text-anchor="middle" fill="#333" font-family="Arial" font-size="7">Granule</text>

  <!-- Pili -->
  <line x1="480" y1="120" x2="530" y2="105" stroke="#333" stroke-width="2"/>
  <line x1="480" y1="145" x2="535" y2="140" stroke="#333" stroke-width="2"/>
  <line x1="480" y1="170" x2="530" y2="180" stroke="#333" stroke-width="2"/>
  <text x="540" y="148" fill="#333" font-family="Arial" font-weight="bold" font-size="11">Pili/Fimbriae</text>

  <!-- Flagellum -->
  <path d="M65,180 C30,180 10,160 25,140 C40,120 50,130 45,150" stroke="#333" stroke-width="3" fill="none"/>
  <text x="15" y="210" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="11">Flagellum</text>

  <!-- Legend box -->
  <rect x="20" y="310" width="560" height="280" rx="8" fill="#f5f5f5"/>
  <text x="300" y="335" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="14">Component Functions</text>

  <text x="40" y="360" fill="#333" font-family="Arial" font-size="12" font-weight="bold">Capsule:</text>
  <text x="120" y="360" fill="#555" font-family="Arial" font-size="11">Polysaccharide layer outside cell wall — protection from desiccation, phagocytosis, attachment</text>
  <text x="40" y="382" fill="#333" font-family="Arial" font-size="12" font-weight="bold">Cell Wall:</text>
  <text x="120" y="382" fill="#555" font-family="Arial" font-size="11">Rigid peptidoglycan (murein) layer — maintains shape, prevents osmotic lysis</text>
  <text x="40" y="404" fill="#333" font-family="Arial" font-size="12" font-weight="bold">Plasma Membrane:</text>
  <text x="120" y="404" fill="#555" font-family="Arial" font-size="11">Phospholipid bilayer — selective permeability; site of ETC (no mitochondria)</text>
  <text x="40" y="426" fill="#333" font-family="Arial" font-size="12" font-weight="bold">Nucleoid:</text>
  <text x="120" y="426" fill="#555" font-family="Arial" font-size="11">Region containing single circular DNA chromosome — NOT membrane-bound</text>
  <text x="40" y="448" fill="#333" font-family="Arial" font-size="12" font-weight="bold">Plasmids:</text>
  <text x="120" y="448" fill="#555" font-family="Arial" font-size="11">Small, circular, independently replicating DNA — antibiotic resistance genes</text>
  <text x="40" y="470" fill="#333" font-family="Arial" font-size="12" font-weight="bold">70S Ribosomes:</text>
  <text x="120" y="470" fill="#555" font-family="Arial" font-size="11">Site of protein synthesis (50S + 30S subunits); target of many antibiotics</text>
  <text x="40" y="492" fill="#333" font-family="Arial" font-size="12" font-weight="bold">Pili:</text>
  <text x="120" y="492" fill="#555" font-family="Arial" font-size="11">Hair-like protein filaments — adhesion to surfaces; sex pilus for conjugation</text>
  <text x="40" y="514" fill="#333" font-family="Arial" font-size="12" font-weight="bold">Flagellum:</text>
  <text x="120" y="514" fill="#555" font-family="Arial" font-size="11">Rotary motor powered by H⁺ gradient — motility (chemotaxis)</text>
  <text x="40" y="536" fill="#333" font-family="Arial" font-size="12" font-weight="bold">Storage Granules:</text>
  <text x="120" y="536" fill="#555" font-family="Arial" font-size="11">Aggregates (glycogen, polyphosphate, lipids) — nutrient reserves</text>

  <text x="300" y="570" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">Key: No membrane-bound nucleus | No membrane-bound organelles | 0.5–5 µm | Binary fission</text>
</svg>