<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 540" width="600" height="540">
  <rect width="600" height="540" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Oogenesis</text>

  <!-- Oogonium -->
  <circle cx="70" cy="55" r="20" fill="#81c784" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="70" y="58" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Oogonium</text>
  <text x="70" y="72" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(2n)</text>

  <!-- Mitosis arrow -->
  <line x1="90" y1="55" x2="130" y2="55" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="110" y="45" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Mitosis</text>

  <!-- Primary Oocyte -->
  <circle cx="165" cy="55" r="22" fill="#43a047" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="165" y="53" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">Primary</text>
  <text x="165" y="67" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">Oocyte</text>
  <text x="165" y="82" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(2n)</text>

  <!-- Arrested box -->
  <rect x="100" y="90" width="130" height="30" rx="5" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="165" y="109" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00" font-weight="bold">ARRESTED Prophase I</text>
  <line x1="165" y1="77" x2="165" y2="90" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Puberty label -->
  <text x="300" y="60" font-family="Arial" font-size="12" fill="#e53935" font-weight="bold">→ Puberty: each month one completes Meiosis I →</text>

  <!-- Meiosis I -->
  <text x="440" y="100" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935" font-weight="bold">Meiosis I</text>
  <line x1="385" y1="110" x2="385" y2="155" stroke="#333" stroke-width="2"/>
  <line x1="450" y1="110" x2="450" y2="155" stroke="#333" stroke-width="2"/>

  <!-- Secondary Oocyte + Polar Body -->
  <circle cx="385" cy="175" r="24" fill="#81c784" stroke="#1565c0" stroke-width="2.5"/>
  <text x="385" y="173" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Secondary</text>
  <text x="385" y="187" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Oocyte</text>
  <text x="385" y="202" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(n, large)</text>

  <circle cx="460" cy="175" r="9" fill="#c8e6c9" stroke="#e53935" stroke-width="2"/>
  <text x="460" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">1st Polar</text>
  <text x="460" y="207" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Body (n)</text>

  <!-- Ovulation -->
  <rect x="340" y="220" width="175" height="28" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="427" y="238" text-anchor="middle" font-family="Arial" font-size="11" fill="#1565c0" font-weight="bold">OVULATION (released)</text>
  <line x1="427" y1="199" x2="427" y2="220" stroke="#1565c0" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Meiosis II arrest -->
  <rect x="350" y="258" width="155" height="30" rx="5" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="427" y="277" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00" font-weight="bold">ARRESTED Metaphase II</text>
  <line x1="427" y1="248" x2="427" y2="258" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Fertilization trigger -->
  <text x="427" y="310" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935" font-weight="bold">↓ Fertilization triggers ↓</text>
  <line x1="427" y1="316" x2="427" y2="345" stroke="#e53935" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- Meiosis II result -->
  <text x="310" y="365" font-family="Arial" font-size="11" fill="#e53935" font-weight="bold">Meiosis II completes →</text>

  <!-- Ovum + Polar Bodies -->
  <circle cx="350" cy="400" r="26" fill="#43a047" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="350" y="395" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff" font-weight="bold">Ovum</text>
  <text x="350" y="412" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">(n, ~100μm)</text>

  <circle cx="460" cy="385" r="9" fill="#ffcdd2" stroke="#e53935" stroke-width="2"/>
  <text x="460" y="404" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">1st PB</text>

  <circle cx="460" cy="420" r="9" fill="#ffcdd2" stroke="#e53935" stroke-width="2"/>
  <text x="460" y="439" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">2nd PB</text>

  <!-- Zygote -->
  <text x="350" y="455" text-anchor="middle" font-family="Arial" font-size="12" fill="#6a1b9a" font-weight="bold">+ Sperm nucleus (n) = Zygote (2n)</text>

  <!-- Comparison note -->
  <rect x="25" y="480" width="550" height="48" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="300" y="498" text-anchor="middle" font-family="Arial" font-size="11" fill="#555" font-style="italic">Key: Oogenesis produces 1 viable ovum + 3 polar bodies (degenerate);</text>
  <text x="300" y="515" text-anchor="middle" font-family="Arial" font-size="11" fill="#555" font-style="italic">unequal cytokinesis conserves cytoplasm for the developing embryo.</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#333"/></marker>
    <marker id="arrow2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1565c0"/></marker>
    <marker id="arrow3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#e53935"/></marker>
  </defs>
</svg>