<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" width="600" height="750">
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#e53935"/></marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#1565c0"/></marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#1a6b3c"/></marker>
    <marker id="arrowDark" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#333"/></marker>
    <linearGradient id="photon1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff8f00"/><stop offset="100%" stop-color="#fff176"/></linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="750" fill="#fff" rx="8"/>

  <!-- Title -->
  <text x="300" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Z-Scheme of Photosynthesis — Redox Potential Diagram</text>

  <!-- Y-axis: Redox Potential -->
  <line x1="70" y1="50" x2="70" y2="680" stroke="#333" stroke-width="2"/>
  <text x="20" y="370" text-anchor="middle" font-family="Arial" font-size="13" fill="#333" transform="rotate(-90,20,370)">Redox Potential (E°, volts)</text>

  <!-- Y-axis ticks and labels -->
  <line x1="62" y1="65" x2="70" y2="65" stroke="#333" stroke-width="1.5"/>
  <text x="56" y="66" text-anchor="end" font-family="Arial" font-size="11" fill="#e53935">−1.2</text>
  <text x="56" y="72" text-anchor="end" font-family="Arial" font-size="9" fill="#666">(more reducing)</text>

  <line x1="62" y1="170" x2="70" y2="170" stroke="#333" stroke-width="1.5"/>
  <text x="56" y="174" text-anchor="end" font-family="Arial" font-size="11" fill="#333">−0.8</text>

  <line x1="62" y1="275" x2="70" y2="275" stroke="#333" stroke-width="1.5"/>
  <text x="56" y="279" text-anchor="end" font-family="Arial" font-size="11" fill="#333">−0.4</text>

  <line x1="62" y1="380" x2="70" y2="380" stroke="#333" stroke-width="1.5"/>
  <text x="56" y="384" text-anchor="end" font-family="Arial" font-size="11" fill="#333">0.0</text>

  <line x1="62" y1="485" x2="70" y2="485" stroke="#333" stroke-width="1.5"/>
  <text x="56" y="489" text-anchor="end" font-family="Arial" font-size="11" fill="#333">+0.4</text>

  <line x1="62" y1="590" x2="70" y2="590" stroke="#333" stroke-width="1.5"/>
  <text x="56" y="594" text-anchor="end" font-family="Arial" font-size="11" fill="#333">+0.8</text>

  <text x="56" y="680" text-anchor="end" font-family="Arial" font-size="9" fill="#666">(more oxidising)</text>

  <!-- Z-scheme path: PSII path -->
  <!-- P680 ground: +1.0V → y ~ 540 -->
  <!-- P680* excited: -0.7V → y ~ 155 -->
  <!-- Electron path down through ETC -->
  <!-- PC: +0.37 → y ~ 490 -->
  <!-- P700 ground: +0.4 → y ~ 485 -->
  <!-- P700* excited: -1.0 → y ~ 100 -->
  <!-- Fd: -0.43 → y ~ 280 -->
  <!-- NADP+/NADPH: -0.32 → y ~ 295 -->

  <!-- H2O point -->
  <circle cx="120" cy="590" r="5" fill="#43a047"/>
  <text x="120" y="615" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a6b3c" font-weight="bold">H₂O → ½O₂</text>
  <text x="120" y="630" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">+0.82 V</text>

  <!-- Arrow from H2O to P680 -->
  <line x1="120" y1="590" x2="200" y2="540" stroke="#333" stroke-width="2.5" marker-end="url(#arrowDark)"/>

  <!-- P680 -->
  <circle cx="205" cy="540" r="7" fill="#1565c0" stroke="#333" stroke-width="2"/>
  <text x="205" y="555" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0" font-weight="bold">P680</text>

  <!-- Photon 1 -->
  <path d="M170,540 L155,155" stroke="#ff8f00" stroke-width="6" stroke-dasharray="8,4" opacity="0.8"/>
  <text x="150" y="340" font-family="Arial" font-size="9" fill="#ff8f00" transform="rotate(-70,150,340)">photon 1 (680 nm)</text>
  <text x="148" y="355" font-family="Arial" font-size="9" fill="#ff8f00" transform="rotate(-70,148,355)">~1.8 eV</text>

  <!-- P680* -->
  <circle cx="270" cy="155" r="8" fill="#e53935" stroke="#333" stroke-width="2"/>
  <text x="270" y="138" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935" font-weight="bold">P680*</text>
  <text x="270" y="175" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">−0.7 V</text>

  <!-- Electron path: P680* → Pheo → QA → QB ... down ETC -->
  <line x1="270" y1="155" x2="330" y2="230" stroke="#e53935" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="320" y="195" font-family="Arial" font-size="8" fill="#888">e⁻</text>

  <!-- Pheo -->
  <circle cx="335" cy="235" r="4" fill="#ccc" stroke="#333" stroke-width="1.5"/>
  <text x="335" y="250" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Pheo</text>

  <line x1="335" y1="235" x2="370" y2="330" stroke="#e53935" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <circle cx="375" cy="335" r="4" fill="#ccc" stroke="#333" stroke-width="1.5"/>
  <text x="375" y="350" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">QA/QB</text>

  <line x1="375" y1="335" x2="400" y2="410" stroke="#e53935" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- Cyt b6f -->
  <rect x="388" y="405" width="55" height="28" rx="4" fill="#81c784" stroke="#333" stroke-width="1.5"/>
  <text x="415" y="423" text-anchor="middle" font-family="Arial" font-size="9" fill="#333" font-weight="bold">Cyt b₆f</text>
  <text x="415" y="450" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">H⁺ pumped</text>

  <line x1="415" y1="433" x2="415" y2="470" stroke="#e53935" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- PC -->
  <circle cx="415" cy="485" r="4" fill="#80cbc4" stroke="#333" stroke-width="1.5"/>
  <text x="435" y="490" font-family="Arial" font-size="9" fill="#666">PC (Cu)</text>
  <text x="435" y="502" font-family="Arial" font-size="8" fill="#888">+0.37 V</text>

  <!-- Arrow to P700 -->
  <line x1="415" y1="485" x2="470" y2="485" stroke="#333" stroke-width="2.5" marker-end="url(#arrowDark)"/>

  <!-- P700 -->
  <circle cx="480" cy="485" r="7" fill="#1565c0" stroke="#333" stroke-width="2"/>
  <text x="480" y="505" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0" font-weight="bold">P700</text>

  <!-- Photon 2 -->
  <path d="M445,485 L420,100" stroke="#ff8f00" stroke-width="6" stroke-dasharray="8,4" opacity="0.8"/>
  <text x="410" y="290" font-family="Arial" font-size="9" fill="#ff8f00" transform="rotate(-86,410,290)">photon 2 (700 nm)</text>

  <!-- P700* -->
  <circle cx="520" cy="100" r="8" fill="#e53935" stroke="#333" stroke-width="2"/>
  <text x="520" y="85" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935" font-weight="bold">P700*</text>
  <text x="520" y="120" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">−1.0 V</text>

  <!-- Electron path down PSI side -->
  <line x1="520" y1="100" x2="545" y2="280" stroke="#e53935" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- Fd -->
  <circle cx="550" cy="288" r="5" fill="#ffcc80" stroke="#333" stroke-width="1.5"/>
  <text x="550" y="305" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Fd</text>
  <text x="550" y="318" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">−0.43 V</text>

  <line x1="550" y1="288" x2="560" y2="300" stroke="#1a6b3c" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- NADP+ -->
  <rect x="530" y="300" width="65" height="28" rx="4" fill="#c8e6c9" stroke="#333" stroke-width="1.5"/>
  <text x="562" y="318" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c" font-weight="bold">NADP⁺→NADPH</text>
  <text x="562" y="342" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">−0.32 V</text>

  <!-- PSII and PSI labels -->
  <rect x="160" y="650" width="150" height="65" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="235" y="672" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Photosystem II</text>
  <text x="235" y="690" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">P680 → H₂O splitting</text>
  <text x="235" y="706" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">OEC (Mn₄CaO₅)</text>

  <rect x="380" y="650" width="150" height="65" rx="6" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="455" y="672" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">Photosystem I</text>
  <text x="455" y="690" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">P700 → NADP⁺ reduction</text>
  <text x="455" y="706" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Ferredoxin + FNR</text>

  <!-- Key insight box -->
  <rect x="80" y="725" width="440" height="20" rx="4" fill="#fff3e0" stroke="#ff8f00" stroke-width="1"/>
  <text x="300" y="739" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Two photosystems in series bridge the ~1.1 V gap between H₂O (+0.82 V) and NADP⁺ (−0.32 V)</text>
</svg>
