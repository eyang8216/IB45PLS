<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#1a6b3c">Nucleotide Structure — The Universal Monomer</text>

  <!-- Box 1: Phosphate -->
  <rect x="40" y="100" width="140" height="80" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2.5"/>
  <text x="110" y="136" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#1565c0">Phosphate</text>
  <text x="110" y="156" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">(PO₄³⁻ group)</text>

  <!-- Arrow 1 -->
  <polygon points="190,140 220,125 220,135 245,135 245,145 220,145 220,155" fill="#43a047"/>

  <!-- Box 2: Sugar -->
  <rect x="250" y="100" width="100" height="80" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2.5"/>
  <text x="300" y="136" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#43a047">Sugar</text>
  <text x="300" y="156" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">(Ribose / Deoxyribose)</text>

  <!-- Arrow 2 -->
  <polygon points="360,140 390,125 390,135 415,135 415,145 390,145 390,155" fill="#43a047"/>

  <!-- Box 3: Base -->
  <rect x="420" y="100" width="140" height="80" rx="8" fill="#fce4ec" stroke="#e53935" stroke-width="2.5"/>
  <text x="490" y="136" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#e53935">Nitrogenous Base</text>
  <text x="490" y="156" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">(A, T/U, C, G)</text>

  <!-- Bottom annotation -->
  <rect x="120" y="220" width="360" height="50" rx="6" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="300" y="245" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ff8f00">These three components = ONE nucleotide</text>
  <text x="300" y="262" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555">Universal building block of DNA and RNA</text>
</svg>
