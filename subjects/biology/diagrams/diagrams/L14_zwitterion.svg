<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420">
  <defs><style>text { font-family: Arial, sans-serif; } .title { font-size: 18px; font-weight: bold; fill: #1a6b3c; text-anchor: middle; } .lab { font-size: 14px; fill: #333; text-anchor: middle; } .sm { font-size: 12px; fill: #555; text-anchor: middle; }</style></defs>
  <rect width="600" height="420" fill="#fff"/>
  <text x="300" y="28" class="title">Zwitterion — Amino Acid at Physiological pH (~7.4)</text>

  <!-- Main structure -->
  <!-- α-carbon -->
  <circle cx="300" cy="160" r="28" fill="#e3f2fd" stroke="#1565c0" stroke-width="2.5"/>
  <text x="300" y="155" class="lab" fill="#1565c0" font-weight="bold">C</text>
  <text x="300" y="172" class="sm" fill="#1565c0">α</text>

  <!-- Protonated amino group (left) -->
  <line x1="272" y1="160" x2="120" y2="160" stroke="#43a047" stroke-width="3"/>
  <text x="70" y="155" class="lab" fill="#43a047" font-weight="bold">⁺H₃N—</text>
  <text x="70" y="172" class="sm" fill="#43a047">protonated</text>

  <!-- Deprotonated carboxyl (right) -->
  <line x1="328" y1="160" x2="470" y2="160" stroke="#e53935" stroke-width="3"/>
  <text x="500" y="155" class="lab" fill="#e53935" font-weight="bold">—COO⁻</text>
  <text x="500" y="172" class="sm" fill="#e53935">deprotonated</text>

  <!-- H top -->
  <line x1="300" y1="132" x2="300" y2="70" stroke="#999" stroke-width="3"/>
  <text x="300" y="60" class="lab" fill="#999">H</text>

  <!-- R bottom -->
  <line x1="300" y1="188" x2="300" y2="250" stroke="#6a1b9a" stroke-width="3"/>
  <text x="300" y="270" class="lab" fill="#6a1b9a" font-weight="bold">R</text>

  <!-- Explanation boxes -->
  <rect x="20" y="300" width="260" height="55" rx="6" fill="#e8f5e9" stroke="#81c784" stroke-width="2"/>
  <text x="150" y="320" class="sm" fill="#1a6b3c" font-weight="bold">Amino group (–NH₂ + H⁺ → –NH₃⁺)</text>
  <text x="150" y="340" class="sm" fill="#1a6b3c">Acts as a base: accepts H⁺ → + charged</text>

  <rect x="320" y="300" width="260" height="55" rx="6" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="450" y="320" class="sm" fill="#c62828" font-weight="bold">Carboxyl group (–COOH → –COO⁻ + H⁺)</text>
  <text x="450" y="340" class="sm" fill="#c62828">Acts as an acid: donates H⁺ → − charged</text>

  <rect x="100" y="367" width="400" height="45" rx="6" fill="#e3f2fd" stroke="#64b5f6" stroke-width="2"/>
  <text x="300" y="386" class="lab" fill="#1565c0" font-weight="bold">Net charge = 0, but has separated + and − charges</text>
  <text x="300" y="403" class="sm">Zwitterion = "hybrid ion" — both + and − charges simultaneously</text>
</svg>
