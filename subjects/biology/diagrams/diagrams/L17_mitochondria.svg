<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Mitochondrion — Structure &amp; Function</text>

  <!-- Outer membrane -->
  <ellipse cx="250" cy="200" rx="180" ry="95" fill="none" stroke="#e53935" stroke-width="2.5"/>
  <text x="90" y="105" font-family="Arial" font-size="10" fill="#e53935">Outer membrane</text>
  <line x1="135" y1="105" x2="180" y2="130" stroke="#e53935" stroke-width="1"/>

  <!-- Inner membrane -->
  <ellipse cx="250" cy="200" rx="170" ry="87" fill="none" stroke="#ff8f00" stroke-width="2.5"/>

  <!-- Cristae (folds) -->
  <g stroke="#ff8f00" stroke-width="2" fill="none">
    <path d="M120,200 Q140,160 160,180 Q180,200 200,170"/>
    <path d="M200,170 Q220,140 240,160 Q260,180 280,155"/>
    <path d="M280,155 Q300,130 320,150 Q340,170 360,140"/>
    <path d="M160,220 Q180,240 200,230 Q220,220 240,240"/>
    <path d="M240,240 Q260,260 280,245 Q300,230 320,250"/>
    <path d="M320,250 Q340,270 360,250"/>
    <path d="M140,180 Q155,200 170,195"/>
    <path d="M340,180 Q355,200 370,190"/>
  </g>
  <text x="420" y="155" font-family="Arial" font-size="10" fill="#ff8f00">Cristae (folded</text>
  <text x="420" y="168" font-family="Arial" font-size="10" fill="#ff8f00">inner membrane)</text>

  <!-- Matrix -->
  <text x="250" y="250" text-anchor="middle" font-family="Arial" font-size="12" fill="#1a6b3c">Matrix</text>
  <text x="250" y="265" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Krebs cycle enzymes</text>

  <!-- DNA -->
  <circle cx="250" cy="280" r="15" fill="none" stroke="#1565c0" stroke-width="2" stroke-dasharray="4,2"/>
  <circle cx="250" cy="280" r="8" fill="none" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="250" y="302" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">mtDNA (circular)</text>

  <!-- Ribosomes in matrix -->
  <circle cx="200" cy="270" r="3" fill="#333"/><circle cx="215" cy="275" r="3" fill="#333"/>
  <circle cx="310" cy="265" r="3" fill="#333"/><circle cx="295" cy="278" r="3" fill="#333"/>
  <text x="250" y="315" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">70S ribosomes</text>

  <!-- Intermembrane space -->
  <text x="420" y="195" font-family="Arial" font-size="10" fill="#1565c0">Intermembrane</text>
  <text x="420" y="208" font-family="Arial" font-size="10" fill="#1565c0">space</text>

  <!-- ATP synthase -->
  <rect x="80" y="175" width="20" height="12" rx="2" fill="#e53935" stroke="#e53935" stroke-width="1.5"/>
  <circle cx="90" cy="170" r="6" fill="none" stroke="#e53935" stroke-width="1.5"/>
  <text x="90" y="198" text-anchor="middle" font-family="Arial" font-size="7" fill="#e53935">ATP</text>
  <text x="90" y="207" text-anchor="middle" font-family="Arial" font-size="7" fill="#e53935">synthase</text>

  <!-- Key info -->
  <rect x="420" y="240" width="160" height="125" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="500" y="258" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">Key Facts</text>
  <text x="435" y="275" font-family="Arial" font-size="9" fill="#333">• Outer membrane: smooth,</text>
  <text x="438" y="288" font-family="Arial" font-size="9" fill="#333">permeable (porins)</text>
  <text x="435" y="303" font-family="Arial" font-size="9" fill="#333">• Inner membrane: folded into</text>
  <text x="438" y="316" font-family="Arial" font-size="9" fill="#333">cristae (↑ surface area)</text>
  <text x="435" y="331" font-family="Arial" font-size="9" fill="#333">• ETC + ATP synthase on</text>
  <text x="438" y="344" font-family="Arial" font-size="9" fill="#333">inner membrane</text>
  <text x="435" y="359" font-family="Arial" font-size="9" fill="#333">• Matrix: Krebs, mtDNA, 70S</text>
</svg>