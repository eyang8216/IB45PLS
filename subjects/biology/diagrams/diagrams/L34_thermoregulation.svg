<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect width="600" height="360" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Thermoregulation — Hypothalamus &amp; Responses</text>

  <!-- Hypothalamus -->
  <ellipse cx="300" cy="80" rx="70" ry="30" fill="#6a1b9a" opacity="0.7"/>
  <text x="300" y="75" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">Hypothalamus</text>
  <text x="300" y="90" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Set point: ~37°C</text>

  <!-- Cold branch -->
  <line x1="230" y1="100" x2="140" y2="135" stroke="#1565c0" stroke-width="2"/>
  <polygon points="140,130 135,143 148,138" fill="#1565c0"/>
  <text x="160" y="115" font-family="Arial" font-size="10" fill="#1565c0">COLD detected</text>

  <!-- Hot branch -->
  <line x1="370" y1="100" x2="460" y2="135" stroke="#e53935" stroke-width="2"/>
  <polygon points="460,130 465,143 452,138" fill="#e53935"/>
  <text x="430" y="115" font-family="Arial" font-size="10" fill="#e53935">HOT detected</text>

  <!-- COLD RESPONSES -->
  <rect x="20" y="145" width="260" height="195" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="150" y="165" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">COLD Response — Conserve Heat</text>

  <g fill="#1565c0">
    <rect x="35" y="180" width="230" height="22" rx="4" opacity="0.15"/>
    <text x="45" y="195" font-family="Arial" font-size="10" fill="#333">① Vasoconstriction: arterioles narrow</text>
    <text x="50" y="210" font-family="Arial" font-size="9" fill="#555">→ less blood to skin, reduces heat loss</text>

    <rect x="35" y="222" width="230" height="22" rx="4" opacity="0.15"/>
    <text x="45" y="237" font-family="Arial" font-size="10" fill="#333">② Shivering: rapid muscle contractions</text>
    <text x="50" y="252" font-family="Arial" font-size="9" fill="#555">→ generates heat via ATP hydrolysis</text>

    <rect x="35" y="264" width="230" height="22" rx="4" opacity="0.15"/>
    <text x="45" y="279" font-family="Arial" font-size="10" fill="#333">③ Piloerection: hair stands up</text>
    <text x="50" y="294" font-family="Arial" font-size="9" fill="#555">→ traps insulating air layer (less in humans)</text>

    <rect x="35" y="306" width="230" height="22" rx="4" opacity="0.15"/>
    <text x="45" y="321" font-family="Arial" font-size="10" fill="#333">④ Brown fat (UCP1): uncouples ETC</text>
    <text x="50" y="336" font-family="Arial" font-size="9" fill="#555">→ generates heat directly (thermogenin)</text>
  </g>

  <!-- HOT RESPONSES -->
  <rect x="320" y="145" width="260" height="195" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="450" y="165" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">HOT Response — Lose Heat</text>

  <g fill="#e53935">
    <rect x="335" y="180" width="230" height="25" rx="4" opacity="0.1"/>
    <text x="345" y="196" font-family="Arial" font-size="10" fill="#333">① Vasodilation: arterioles widen</text>
    <text x="350" y="211" font-family="Arial" font-size="9" fill="#555">→ more blood to skin, increases heat loss</text>

    <rect x="335" y="225" width="230" height="25" rx="4" opacity="0.1"/>
    <text x="345" y="241" font-family="Arial" font-size="10" fill="#333">② Sweating: sweat glands secrete</text>
    <text x="350" y="256" font-family="Arial" font-size="9" fill="#555">→ evaporation absorbs heat (cooling)</text>

    <rect x="335" y="270" width="230" height="25" rx="4" opacity="0.1"/>
    <text x="345" y="286" font-family="Arial" font-size="10" fill="#333">③ Behavioral: seek shade, inactivity</text>

    <rect x="335" y="300" width="230" height="25" rx="4" opacity="0.1"/>
    <text x="345" y="316" font-family="Arial" font-size="10" fill="#333">④ Flat hair (no piloerection)</text>
  </g>

  <text x="300" y="353" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">All mechanisms return body temperature to 37°C set point</text>
</svg>