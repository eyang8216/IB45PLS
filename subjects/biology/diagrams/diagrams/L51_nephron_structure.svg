<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 510">
  <rect width="600" height="510" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">The Nephron — Functional Unit of the Kidney</text>

  <!-- Nephron diagram -->
  <g transform="translate(15, 45)">
    <!-- Renal corpuscle -->
    <circle cx="130" cy="50" r="28" fill="none" stroke="#333" stroke-width="2"/>
    <circle cx="130" cy="50" r="20" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
    <text x="130" y="54" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">Glomerulus</text>
    <text x="130" y="90" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Renal Corpuscle</text>

    <!-- Afferent arteriole -->
    <line x1="70" y1="50" x2="102" y2="50" stroke="#e53935" stroke-width="3"/>
    <text x="55" y="42" text-anchor="end" font-family="Arial" font-size="9" fill="#e53935">Afferent</text>
    <text x="55" y="54" text-anchor="end" font-family="Arial" font-size="9" fill="#e53935">arteriole</text>

    <!-- Efferent arteriole -->
    <line x1="158" y1="50" x2="200" y2="50" stroke="#1565c0" stroke-width="2"/>
    <text x="210" y="42" text-anchor="start" font-family="Arial" font-size="9" fill="#1565c0">Efferent</text>
    <text x="210" y="54" text-anchor="start" font-family="Arial" font-size="9" fill="#1565c0">arteriole</text>

    <!-- PCT -->
    <path d="M155,72 Q220,72 240,95 Q260,118 240,145 Q220,170 180,175" fill="none" stroke="#43a047" stroke-width="4"/>
    <text x="220" y="115" text-anchor="start" font-family="Arial" font-size="10" font-weight="bold" fill="#43a047">PCT</text>
    <text x="220" y="128" text-anchor="start" font-family="Arial" font-size="8" fill="#888">(Proximal Convoluted Tubule)</text>
    <text x="220" y="140" text-anchor="start" font-family="Arial" font-size="8" fill="#555">~70% reabsorption</text>

    <!-- Loop of Henle -->
    <path d="M180,175 Q180,200 170,230 L170,270 Q170,290 155,290 L155,250 Q155,235 170,225 Q180,218 180,200" fill="none" stroke="#1565c0" stroke-width="4"/>
    <text x="120" y="260" text-anchor="end" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Loop of</text>
    <text x="120" y="273" text-anchor="end" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Henle</text>
    <text x="140" y="300" text-anchor="end" font-family="Arial" font-size="8" fill="#888">Descending: water-permeable</text>
    <text x="140" y="312" text-anchor="end" font-family="Arial" font-size="8" fill="#888">Ascending: ion-pumping</text>

    <!-- DCT -->
    <path d="M170,225 Q195,218 220,225 Q245,232 240,250 Q235,268 250,275" fill="none" stroke="#ff8f00" stroke-width="4"/>
    <text x="255" y="248" text-anchor="start" font-family="Arial" font-size="10" font-weight="bold" fill="#ff8f00">DCT</text>
    <text x="255" y="261" text-anchor="start" font-family="Arial" font-size="8" fill="#888">(Distal Convoluted</text>
    <text x="255" y="273" text-anchor="start" font-family="Arial" font-size="8" fill="#888">Tubule)</text>

    <!-- Collecting duct -->
    <line x1="250" y1="275" x2="250" y2="340" stroke="#6a1b9a" stroke-width="5"/>
    <text x="265" y="310" text-anchor="start" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Collecting</text>
    <text x="265" y="323" text-anchor="start" font-family="Arial" font-size="10" font-weight="bold" fill="#6a1b9a">Duct</text>
    <text x="265" y="336" text-anchor="start" font-family="Arial" font-size="8" fill="#888">ADH controls</text>
    <text x="265" y="348" text-anchor="start" font-family="Arial" font-size="8" fill="#888">water permeability</text>

    <!-- Peritubular capillaries -->
    <path d="M170,60 Q250,60 260,220 Q265,280 250,340" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="4,4"/>
  </g>

  <!-- Function summary -->
  <rect x="300" y="48" width="270" height="85" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="68" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Nephron Functions</text>
  <text x="315" y="88" font-family="Arial" font-size="10" fill="#555">① <tspan font-weight="bold">Filtration:</tspan> Glomerulus → Bowman's capsule</text>
  <text x="315" y="105" font-family="Arial" font-size="10" fill="#555">② <tspan font-weight="bold">Reabsorption:</tspan> PCT + Loop + DCT → blood</text>
  <text x="315" y="122" font-family="Arial" font-size="10" fill="#555">③ <tspan font-weight="bold">Secretion:</tspan> DCT — waste from blood → filtrate</text>

  <!-- Diabetes comparison -->
  <rect x="20" y="380" width="560" height="115" rx="8" fill="#fce4ec" stroke="#e53935" stroke-width="1.5"/>
  <text x="300" y="403" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e53935">Diabetes Mellitus — Type I vs Type II</text>

  <g transform="translate(40, 415)">
    <text x="80" y="12" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">Type I</text>
    <text x="80" y="30" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Autoimmune β-cell destruction</text>
    <text x="80" y="47" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Little/no insulin produced</text>
    <text x="80" y="64" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Treatment: Insulin injections</text>

    <text x="320" y="12" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Type II</text>
    <text x="320" y="30" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Insulin resistance → β-cell exhaustion</text>
    <text x="320" y="47" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Initially high insulin (compensatory)</text>
    <text x="320" y="64" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Treatment: Diet → Metformin → Insulin</text>
  </g>
</svg>
