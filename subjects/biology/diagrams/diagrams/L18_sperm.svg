<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <rect width="600" height="340" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Sperm Cell — Structure &amp; Adaptations</text>

  <!-- Head -->
  <ellipse cx="120" cy="150" rx="40" ry="30" fill="#1565c0" opacity="0.7" stroke="#0d47a1" stroke-width="2.5"/>
  <!-- Acrosome -->
  <path d="M80,150 Q80,120 120,120 Q140,120 140,150" fill="#e53935" opacity="0.7" stroke="#c62828" stroke-width="2"/>
  <text x="105" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Acrosome</text>

  <!-- Nucleus -->
  <ellipse cx="125" cy="150" rx="20" ry="18" fill="none" stroke="#fff" stroke-width="1.5"/>
  <text x="125" y="153" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Nucleus</text>
  <text x="125" y="165" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">(haploid n)</text>

  <!-- Midpiece -->
  <rect x="155" y="135" width="60" height="30" rx="5" fill="#ff8f00" opacity="0.7" stroke="#e65100" stroke-width="2"/>
  <text x="185" y="155" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Midpiece</text>

  <!-- Mitochondria -->
  <g fill="none" stroke="#e53935" stroke-width="1.5" opacity="0.8">
    <ellipse cx="170" cy="140" rx="8" ry="5"/><ellipse cx="190" cy="140" rx="8" ry="5"/>
    <ellipse cx="170" cy="160" rx="8" ry="5"/><ellipse cx="190" cy="160" rx="8" ry="5"/>
  </g>
  <text x="185" y="178" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Mitochondria</text>

  <!-- Flagellum -->
  <path d="M215,150 Q300,130 400,150 Q500,170 570,140" fill="none" stroke="#1a6b3c" stroke-width="3"/>
  <text x="380" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">Flagellum</text>
  <text x="380" y="193" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">(9+2 microtubule axoneme)</text>

  <!-- Labels with lines -->
  <line x1="80" y1="100" x2="105" y2="120" stroke="#e53935" stroke-width="1"/>
  <text x="60" y="95" font-family="Arial" font-size="9" fill="#e53935">Acrosome: enzymes</text>
  <text x="60" y="108" font-family="Arial" font-size="9" fill="#e53935">(hyaluronidase)</text>
  <text x="60" y="121" font-family="Arial" font-size="9" fill="#e53935">digest zona pellucida</text>

  <line x1="125" y1="175" x2="125" y2="200" stroke="#1565c0" stroke-width="1"/>
  <text x="95" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Haploid nucleus</text>
  <text x="95" y="228" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">(23 chromosomes)</text>

  <line x1="185" y1="165" x2="185" y2="200" stroke="#ff8f00" stroke-width="1"/>
  <text x="185" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff8f00">ATP for</text>
  <text x="185" y="228" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff8f00">movement</text>

  <line x1="400" y1="150" x2="400" y2="200" stroke="#1a6b3c" stroke-width="1"/>
  <text x="350" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Flagellum: propels</text>
  <text x="350" y="228" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">sperm to egg</text>

  <!-- Summary -->
  <rect x="30" y="255" width="540" height="70" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="275" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Adaptations for Fertilization</text>
  <text x="50" y="295" font-family="Arial" font-size="10" fill="#333">• Acrosome: contains hydrolytic enzymes to penetrate egg's zona pellucida</text>
  <text x="50" y="312" font-family="Arial" font-size="10" fill="#333">• Haploid nucleus: delivers paternal DNA (n=23) · Flagellum: 9+2 microtubule arrangement for swimming motility</text>
</svg>