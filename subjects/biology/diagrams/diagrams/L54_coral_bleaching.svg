<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" width="600" height="480">
  <rect width="600" height="480" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Coral Bleaching — Mechanism &amp; Consequences</text>

  <!-- Step 1: Healthy coral -->
  <text x="160" y="52" text-anchor="middle" font-family="Arial" font-size="13" fill="#1a6b3c" font-weight="bold">① Healthy Coral</text>
  <rect x="30" y="65" width="260" height="180" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>

  <!-- Coral polyp -->
  <path d="M100,200 Q100,170 130,160 Q160,150 160,160 Q160,170 180,180 Q200,190 200,200 Q200,220 180,230 Q160,240 140,235 Q120,230 100,200 Z" fill="#ffccbc" stroke="#e64a19" stroke-width="2"/>

  <!-- Tentacles -->
  <path d="M115,175 Q110,155 115,145" fill="none" stroke="#e64a19" stroke-width="2"/>
  <path d="M130,165 Q130,145 135,135" fill="none" stroke="#e64a19" stroke-width="2"/>
  <path d="M145,160 Q150,140 155,130" fill="none" stroke="#e64a19" stroke-width="2"/>
  <path d="M160,165 Q165,145 170,135" fill="none" stroke="#e64a19" stroke-width="2"/>
  <path d="M175,178 Q180,158 185,148" fill="none" stroke="#e64a19" stroke-width="2"/>

  <!-- Zooxanthellae dots -->
  <circle cx="130" cy="185" r="3" fill="#81c784"/>
  <circle cx="145" cy="190" r="3" fill="#81c784"/>
  <circle cx="155" cy="195" r="3" fill="#81c784"/>
  <circle cx="140" cy="200" r="3" fill="#81c784"/>
  <circle cx="160" cy="205" r="3" fill="#81c784"/>
  <circle cx="150" cy="210" r="3" fill="#81c784"/>
  <circle cx="135" cy="195" r="3" fill="#81c784"/>
  <circle cx="165" cy="190" r="3" fill="#81c784"/>

  <text x="200" y="150" font-family="Arial" font-size="9" fill="#1a6b3c">Zooxanthellae</text>
  <text x="200" y="162" font-family="Arial" font-size="9" fill="#1a6b3c">(symbiotic algae)</text>
  <text x="200" y="174" font-family="Arial" font-size="9" fill="#1a6b3c">in coral tissue</text>

  <text x="160" y="235" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c" font-weight="bold">Mutualistic symbiosis</text>
  <text x="160" y="250" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Algae provide 90% of energy</text>
  <text x="160" y="262" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Coral provides shelter + nutrients</text>

  <!-- Arrow -->
  <text x="310" y="145" text-anchor="middle" font-family="Arial" font-size="14" fill="#e53935" font-weight="bold">🌡️→</text>
  <text x="310" y="162" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Warm stress</text>

  <!-- Step 2: Bleaching -->
  <text x="460" y="52" text-anchor="middle" font-family="Arial" font-size="13" fill="#e53935" font-weight="bold">② Bleaching</text>
  <rect x="310" y="65" width="260" height="180" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="2"/>

  <!-- Coral polyp (white) -->
  <path d="M380,200 Q380,170 410,160 Q440,150 440,160 Q440,170 460,180 Q480,190 480,200 Q480,220 460,230 Q440,240 420,235 Q400,230 380,200 Z" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="2"/>

  <!-- Tentacles -->
  <path d="M395,175 Q390,155 395,145" fill="none" stroke="#bdbdbd" stroke-width="2"/>
  <path d="M410,165 Q410,145 415,135" fill="none" stroke="#bdbdbd" stroke-width="2"/>
  <path d="M425,160 Q430,140 435,130" fill="none" stroke="#bdbdbd" stroke-width="2"/>
  <path d="M440,165 Q445,145 450,135" fill="none" stroke="#bdbdbd" stroke-width="2"/>
  <path d="M455,178 Q460,158 465,148" fill="none" stroke="#bdbdbd" stroke-width="2"/>

  <!-- Expelled algae -->
  <circle cx="395" cy="130" r="3" fill="#81c784" opacity="0.5"/>
  <circle cx="410" cy="120" r="3" fill="#81c784" opacity="0.5"/>
  <circle cx="430" cy="125" r="3" fill="#81c784" opacity="0.5"/>
  <circle cx="450" cy="130" r="3" fill="#81c784" opacity="0.5"/>
  <text x="500" y="130" font-family="Arial" font-size="9" fill="#e53935">Algae</text>
  <text x="500" y="142" font-family="Arial" font-size="9" fill="#e53935">expelled!</text>

  <text x="440" y="235" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">White skeleton visible</text>
  <text x="440" y="250" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Coral is still alive</text>
  <text x="440" y="262" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">but starved</text>

  <!-- Step 3 & 4 -->
  <text x="160" y="288" text-anchor="middle" font-family="Arial" font-size="13" fill="#6a1b9a" font-weight="bold">③ Prolonged Stress</text>
  <rect x="30" y="300" width="260" height="80" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="160" y="325" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Coral starves → dies</text>
  <text x="160" y="342" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Skeleton remains</text>
  <text x="160" y="359" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">(if temp returns to normal</text>
  <text x="160" y="374" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">zooxanthellae can return)</text>

  <text x="460" y="288" text-anchor="middle" font-family="Arial" font-size="13" fill="#e53935" font-weight="bold">④ Ecosystem Collapse</text>
  <rect x="310" y="300" width="260" height="80" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="1.5"/>
  <text x="440" y="325" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Algae overgrowth on dead coral</text>
  <text x="440" y="342" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Fish habitat lost</text>
  <text x="440" y="359" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Biodiversity crashes</text>
  <text x="440" y="374" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Fisheries collapse</text>

  <!-- Bottom summary -->
  <rect x="30" y="395" width="540" height="75" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="300" y="415" text-anchor="middle" font-family="Arial" font-size="12" fill="#e53935" font-weight="bold">Coral Bleaching Mechanism</text>
  <text x="300" y="435" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Coral polyps host zooxanthellae (symbiotic dinoflagellates). Under thermal stress (1–2°C above normal),</text>
  <text x="300" y="452" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">algae are expelled → coral turns white (bleached). If stress persists → coral starves → dies → reef degrades.</text>
  <text x="300" y="469" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Major bleaching events: 1998, 2002, 2016, 2017, 2020 (Great Barrier Reef).</text>
</svg>