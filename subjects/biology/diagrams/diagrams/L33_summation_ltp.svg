<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 650" width="600" height="650">
  <rect width="600" height="650" fill="#fff" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#6a1b9a">EPSP/IPSP Summation — Postsynaptic Integration</text>

  <!-- Spatial Summation -->
  <rect x="20" y="55" width="270" height="280" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="155" y="80" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">Spatial Summation</text>

  <text x="35" y="105" font-family="Arial" font-size="9" fill="#333">Multiple synapses activated</text>
  <text x="35" y="120" font-family="Arial" font-size="9" fill="#333">at the SAME TIME</text>

  <!-- Neuron -->
  <circle cx="80" cy="220" r="30" fill="#e8eaf6" stroke="#333" stroke-width="1.5"/>
  <text x="80" y="223" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Soma</text>

  <line x1="110" y1="220" x2="220" y2="220" stroke="#333" stroke-width="3"/>

  <circle cx="240" cy="220" r="12" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="240" y="223" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Hillock</text>

  <!-- Synapses A B C -->
  <circle cx="55" cy="160" r="8" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
  <text x="55" y="163" text-anchor="middle" font-family="Arial" font-size="7" fill="#e53935">A</text>
  <line x1="55" y1="168" x2="75" y2="200" stroke="#e53935" stroke-width="1.5"/>

  <circle cx="40" cy="240" r="8" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
  <text x="40" y="243" text-anchor="middle" font-family="Arial" font-size="7" fill="#e53935">B</text>
  <line x1="40" y1="248" x2="65" y2="230" stroke="#e53935" stroke-width="1.5"/>

  <circle cx="50" cy="280" r="8" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
  <text x="50" y="283" text-anchor="middle" font-family="Arial" font-size="7" fill="#e53935">C</text>
  <line x1="50" y1="272" x2="68" y2="245" stroke="#e53935" stroke-width="1.5"/>

  <text x="155" y="310" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">EPSP A + B + C = combined</text>
  <text x="155" y="325" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">→ may reach threshold!</text>

  <!-- Temporal Summation -->
  <rect x="310" y="55" width="270" height="280" rx="8" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="445" y="80" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">Temporal Summation</text>

  <text x="325" y="105" font-family="Arial" font-size="9" fill="#333">Same synapse fires</text>
  <text x="325" y="120" font-family="Arial" font-size="9" fill="#333">repeatedly in QUICK SUCCESSION</text>

  <!-- Same setup -->
  <circle cx="370" cy="220" r="30" fill="#e8eaf6" stroke="#333" stroke-width="1.5"/>
  <circle cx="400" y1="220" r="30" fill="#e8eaf6"/>
  <circle cx="330" cy="160" r="8" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="330" y="163" text-anchor="middle" font-family="Arial" font-size="7" fill="#1a6b3c">1</text>
  <line x1="330" y1="168" x2="358" y2="200" stroke="#1a6b3c" stroke-width="1.5"/>

  <text x="330" y="178" font-family="Arial" font-size="7" fill="#555">firing</text>
  <text x="330" y="190" font-family="Arial" font-size="7" fill="#555">3× fast</text>

  <!-- EPSP graphs -->
  <rect x="330" y="260" width="230" height="55" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <line x1="340" y1="305" x2="550" y2="305" stroke="#888" stroke-width="0.5"/>
  <line x1="340" y1="280" x2="550" y2="280" stroke="#888" stroke-width="0.5"/>

  <path d="M350,305 Q360,275 370,305" fill="none" stroke="#1a6b3c" stroke-width="1.5"/>
  <path d="M370,305 Q380,273 390,305" fill="none" stroke="#1a6b3c" stroke-width="1.5"/>
  <path d="M390,305 Q400,270 410,305" fill="none" stroke="#1a6b3c" stroke-width="1.5"/>

  <text x="380" y="265" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Overlapping EPSPs → sum</text>

  <!-- Bottom: LTP -->
  <rect x="20" y="360" width="560" height="280" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="300" y="388" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#ff8f00">Long-Term Potentiation (LTP) — NMDA &amp; AMPA Receptors</text>

  <text x="40" y="415" font-family="Arial" font-size="10" font-weight="bold" fill="#333">① Resting state:</text>
  <text x="40" y="432" font-family="Arial" font-size="9" fill="#555">Glutamate released → binds AMPA receptors → Na⁺ enters → depolarization</text>
  <text x="40" y="449" font-family="Arial" font-size="9" fill="#555">NMDA receptors blocked by Mg²⁺ — no Ca²⁺ entry</text>

  <text x="40" y="478" font-family="Arial" font-size="10" font-weight="bold" fill="#333">② Strong/high-frequency stimulation:</text>
  <text x="40" y="495" font-family="Arial" font-size="9" fill="#555">Strong depolarization → Mg²⁺ expelled from NMDA receptor</text>
  <text x="40" y="512" font-family="Arial" font-size="9" fill="#555">NMDA opens → Ca²⁺ influx → activates CaMKII</text>

  <text x="40" y="541" font-family="Arial" font-size="10" font-weight="bold" fill="#333">③ LTP established:</text>
  <text x="40" y="558" font-family="Arial" font-size="9" fill="#555">CaMKII → phosphorylates AMPA receptors → ↑ conductance</text>
  <text x="40" y="575" font-family="Arial" font-size="9" fill="#555">More AMPA receptors inserted into post-synaptic membrane</text>
  <text x="40" y="592" font-family="Arial" font-size="9" fill="#555">Synapse STRENGTHENED — same presynaptic input → larger EPSP</text>

  <text x="40" y="625" font-family="Arial" font-size="9" fill="#888">LTP = cellular basis of learning and memory (hippocampus) | LTD = opposite — weakens synapse</text>
</svg>
