<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" width="600" height="520">
  <rect width="600" height="520" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Immune Cell Lineage — Hematopoiesis</text>

  <!-- Hematopoietic Stem Cell -->
  <ellipse cx="300" cy="55" rx="40" ry="20" fill="#6a1b9a" stroke="#4a148c" stroke-width="2.5"/>
  <text x="300" y="53" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#fff">Hematopoietic</text>
  <text x="300" y="67" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#fff">Stem Cell</text>
  <text x="300" y="48" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">(Bone Marrow)</text>

  <!-- Branch lines -->
  <line x1="300" y1="75" x2="215" y2="100" stroke="#6a1b9a" stroke-width="2"/>
  <line x1="300" y1="75" x2="385" y2="100" stroke="#6a1b9a" stroke-width="2"/>

  <!-- Myeloid Progenitor -->
  <ellipse cx="215" cy="115" rx="30" ry="16" fill="#e53935" stroke="#b71c1c" stroke-width="2"/>
  <text x="215" y="113" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#fff">Myeloid</text>
  <text x="215" y="126" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#fff">Progenitor</text>

  <!-- Lymphoid Progenitor -->
  <ellipse cx="385" cy="115" rx="30" ry="16" fill="#1565c0" stroke="#0d47a1" stroke-width="2"/>
  <text x="385" y="113" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#fff">Lymphoid</text>
  <text x="385" y="126" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#fff">Progenitor</text>

  <!-- ===== MYELOID BRANCH ===== -->
  <rect x="18" y="145" width="270" height="360" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="1.5"/>
  <text x="153" y="163" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">Myeloid Lineage — Innate Immunity</text>

  <!-- Neutrophil -->
  <line x1="215" y1="131" x2="70" y2="175" stroke="#e53935" stroke-width="1.5"/>
  <ellipse cx="70" cy="190" rx="28" ry="18" fill="#ffcdd2" stroke="#e53935" stroke-width="2"/>
  <text x="70" y="188" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e53935">Neutrophil</text>
  <text x="70" y="202" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Phagocytosis</text>
  <text x="70" y="213" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">First responder</text>
  <text x="70" y="224" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Most abundant WBC</text>

  <!-- Macrophage / Dendritic cell -->
  <line x1="215" y1="131" x2="215" y2="175" stroke="#e53935" stroke-width="1.5"/>
  <ellipse cx="215" cy="192" rx="30" ry="18" fill="#ffcdd2" stroke="#e53935" stroke-width="2"/>
  <text x="215" y="188" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e53935">Macrophage</text>
  <text x="215" y="202" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Phagocytosis</text>
  <text x="215" y="213" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Antigen presentation</text>
  <text x="215" y="224" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Cytokine secretion</text>
  <!-- Dendritic cell -->
  <line x1="215" y1="210" x2="215" y2="235" stroke="#e53935" stroke-width="1"/>
  <ellipse cx="215" cy="250" rx="24" ry="14" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
  <text x="215" y="249" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#e53935">Dendritic Cell</text>
  <text x="215" y="263" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Best APC</text>

  <!-- Mast cell -->
  <line x1="215" y1="131" x2="240" y2="175" stroke="#ff8f00" stroke-width="1.5"/>
  <ellipse cx="248" cy="190" rx="24" ry="14" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="248" y="189" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#ff8f00">Mast Cell</text>
  <text x="248" y="203" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Histamine release</text>
  <text x="248" y="214" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Allergy response</text>

  <!-- Basophil, Eosinophil -->
  <line x1="215" y1="131" x2="150" y2="175" stroke="#e53935" stroke-width="1"/>
  <ellipse cx="150" cy="285" rx="22" ry="13" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
  <text x="150" y="284" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#e53935">Basophil</text>
  <text x="150" y="298" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Histamine</text>

  <ellipse cx="220" cy="310" rx="22" ry="13" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
  <text x="220" y="309" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#e53935">Eosinophil</text>
  <text x="220" y="323" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Parasites</text>

  <!-- ===== LYMPHOID BRANCH ===== -->
  <rect x="312" y="145" width="270" height="360" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="447" y="163" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Lymphoid Lineage — Adaptive Immunity</text>

  <!-- B cell -->
  <line x1="385" y1="131" x2="370" y2="175" stroke="#1565c0" stroke-width="1.5"/>
  <ellipse cx="365" cy="192" rx="26" ry="16" fill="#bbdefb" stroke="#1565c0" stroke-width="2"/>
  <text x="365" y="190" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">B Cell</text>
  <text x="365" y="204" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Humoral immunity</text>

  <!-- Plasma cell (from B) -->
  <line x1="365" y1="208" x2="330" y2="230" stroke="#1565c0" stroke-width="1"/>
  <ellipse cx="330" cy="245" rx="24" ry="14" fill="#90caf9" stroke="#1565c0" stroke-width="2"/>
  <text x="330" y="243" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Plasma Cell</text>
  <text x="330" y="257" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Antibody factory</text>
  <text x="330" y="268" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">~2000 Ab/sec</text>

  <!-- Memory B cell (from B) -->
  <line x1="365" y1="208" x2="395" y2="230" stroke="#1565c0" stroke-width="1"/>
  <ellipse cx="400" cy="245" rx="24" ry="14" fill="#90caf9" stroke="#1565c0" stroke-width="2"/>
  <text x="400" y="243" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">Memory B</text>
  <text x="400" y="257" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Long-lived</text>
  <text x="400" y="268" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Rapid 2° response</text>

  <!-- T cell -->
  <line x1="385" y1="131" x2="460" y2="175" stroke="#1565c0" stroke-width="1.5"/>
  <ellipse cx="465" cy="192" rx="26" ry="16" fill="#bbdefb" stroke="#1565c0" stroke-width="2"/>
  <text x="465" y="190" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">T Cell</text>
  <text x="465" y="204" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Cell-mediated</text>

  <!-- CD4+ Helper -->
  <line x1="465" y1="208" x2="440" y2="230" stroke="#1565c0" stroke-width="1"/>
  <ellipse cx="435" cy="245" rx="24" ry="14" fill="#90caf9" stroke="#1565c0" stroke-width="2"/>
  <text x="435" y="243" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">CD4⁺ Helper T</text>
  <text x="435" y="257" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Activates B cells</text>
  <text x="435" y="268" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Cytokine release</text>

  <!-- CD8+ Cytotoxic -->
  <line x1="465" y1="208" x2="500" y2="230" stroke="#1565c0" stroke-width="1"/>
  <ellipse cx="505" cy="245" rx="24" ry="14" fill="#90caf9" stroke="#1565c0" stroke-width="2"/>
  <text x="505" y="243" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">CD8⁺ Cytotoxic T</text>
  <text x="505" y="257" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Kills infected cells</text>
  <text x="505" y="268" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Perforin/granzyme</text>

  <!-- NK cell -->
  <line x1="385" y1="131" x2="520" y2="175" stroke="#6a1b9a" stroke-width="1.5"/>
  <ellipse cx="520" cy="190" rx="24" ry="14" fill="#e1bee7" stroke="#6a1b9a" stroke-width="2"/>
  <text x="520" y="188" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">NK Cell</text>
  <text x="520" y="202" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Natural Killer</text>
  <text x="520" y="213" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Innate lymphoid</text>

  <!-- Bottom note -->
  <rect x="50" y="470" width="500" height="40" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="300" y="490" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">All cells originate from hematopoietic stem cells in bone marrow — differentiate in response to cytokines</text>
</svg>