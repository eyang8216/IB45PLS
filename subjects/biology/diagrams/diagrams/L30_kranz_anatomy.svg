<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 620" width="600" height="620">
  <rect width="600" height="620" fill="#fff" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1a6b3c">Kranz Anatomy — C4 Leaf Transverse Section</text>

  <!-- Leaf shape -->
  <rect x="60" y="70" width="480" height="420" rx="8" fill="#f5f5f5" stroke="#333" stroke-width="2"/>

  <!-- Upper epidermis -->
  <rect x="60" y="70" width="480" height="22" rx="3" fill="#c8e6c9" stroke="#333" stroke-width="1.5"/>
  <text x="300" y="86" text-anchor="middle" font-family="Arial" font-size="11" fill="#333" font-weight="bold">Upper Epidermis</text>

  <!-- Cuticle -->
  <rect x="60" y="68" width="480" height="5" fill="#a5d6a7" stroke="#888" stroke-width="0.5"/>
  <text x="300" y="65" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">Cuticle</text>

  <!-- Vascular bundles with concentric rings -->
  <!-- Bundle 1 -->
  <circle cx="150" cy="280" r="8" fill="#e53935" stroke="#333" stroke-width="1.5"/>
  <text x="150" y="283" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff" font-weight="bold">VB</text>

  <!-- Bundle Sheath 1 -->
  <circle cx="150" cy="280" r="35" fill="none" stroke="#1a6b3c" stroke-width="3"/>

  <!-- Mesophyll ring 1 -->
  <circle cx="150" cy="280" r="70" fill="none" stroke="#81c784" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Bundle 2 -->
  <circle cx="300" cy="280" r="8" fill="#e53935" stroke="#333" stroke-width="1.5"/>
  <text x="300" y="283" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff" font-weight="bold">VB</text>

  <circle cx="300" cy="280" r="35" fill="none" stroke="#1a6b3c" stroke-width="3"/>
  <circle cx="300" cy="280" r="70" fill="none" stroke="#81c784" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Bundle 3 -->
  <circle cx="450" cy="280" r="8" fill="#e53935" stroke="#333" stroke-width="1.5"/>
  <text x="450" y="283" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff" font-weight="bold">VB</text>

  <circle cx="450" cy="280" r="35" fill="none" stroke="#1a6b3c" stroke-width="3"/>
  <circle cx="450" cy="280" r="70" fill="none" stroke="#81c784" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- BS chloroplast labels -->
  <circle cx="140" cy="265" r="4" fill="#43a047"/>
  <circle cx="160" cy="270" r="4" fill="#43a047"/>
  <circle cx="145" cy="295" r="4" fill="#43a047"/>
  <circle cx="290" cy="265" r="4" fill="#43a047"/>
  <circle cx="310" cy="270" r="4" fill="#43a047"/>
  <circle cx="295" cy="295" r="4" fill="#43a047"/>
  <circle cx="440" cy="265" r="4" fill="#43a047"/>
  <circle cx="460" cy="270" r="4" fill="#43a047"/>
  <circle cx="445" cy="295" r="4" fill="#43a047"/>

  <!-- Mesophyll cell representations -->
  <circle cx="120" cy="230" r="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <circle cx="185" cy="235" r="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <circle cx="110" cy="330" r="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <circle cx="190" cy="325" r="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>

  <!-- Lower epidermis -->
  <rect x="60" y="468" width="480" height="22" rx="3" fill="#c8e6c9" stroke="#333" stroke-width="1.5"/>
  <text x="300" y="484" text-anchor="middle" font-family="Arial" font-size="11" fill="#333" font-weight="bold">Lower Epidermis — Stomata</text>

  <!-- Stoma -->
  <ellipse cx="300" cy="468" rx="8" ry="4" fill="#fff" stroke="#333" stroke-width="1"/>

  <!-- Labels -->
  <!-- Mesophyll label -->
  <line x1="200" y1="210" x2="520" y2="145" stroke="#1565c0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="525" y="148" font-family="Arial" font-size="11" fill="#1565c0" font-weight="bold">Mesophyll Cells</text>
  <text x="525" y="163" font-family="Arial" font-size="10" fill="#555">• PEP carboxylase</text>
  <text x="525" y="178" font-family="Arial" font-size="10" fill="#555">• CO₂ → HCO₃⁻ → OAA</text>
  <text x="525" y="193" font-family="Arial" font-size="10" fill="#555">• Well-developed grana</text>

  <!-- BS label -->
  <line x1="320" y1="310" x2="520" y2="310" stroke="#1a6b3c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="525" y="313" font-family="Arial" font-size="11" fill="#1a6b3c" font-weight="bold">Bundle Sheath Cells</text>
  <text x="525" y="328" font-family="Arial" font-size="10" fill="#555">• RuBisCO + Calvin Cycle</text>
  <text x="525" y="343" font-family="Arial" font-size="10" fill="#555">• Suberised walls</text>
  <text x="525" y="358" font-family="Arial" font-size="10" fill="#555">• Reduced grana (PSI-rich)</text>
  <text x="525" y="373" font-family="Arial" font-size="10" fill="#555">• Large starch grains</text>

  <!-- Wreath annotation -->
  <text x="130" y="195" font-family="Arial" font-size="9" fill="#888" font-style="italic">"Kranz" = wreath (German)</text>

  <!-- Suberised wall annotation -->
  <text x="100" y="380" font-family="Arial" font-size="8" fill="#888" font-style="italic">Suberised walls prevent CO₂ leakage</text>

  <!-- Bottom box -->
  <rect x="60" y="510" width="480" height="30" rx="6" fill="#e8eaf6" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="300" y="530" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a" font-weight="bold">Concentric arrangement: Mesophyll → Bundle Sheath → Vascular Bundle</text>

  <rect x="60" y="550" width="480" height="50" rx="6" fill="#fff3e0" stroke="#ff8f00" stroke-width="1"/>
  <text x="300" y="568" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">The suberised bundle sheath wall is a diffusion barrier — it traps CO₂ after</text>
  <text x="300" y="585" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">decarboxylation, building up concentrations 10–100× atmospheric around RuBisCO.</text>
</svg>
