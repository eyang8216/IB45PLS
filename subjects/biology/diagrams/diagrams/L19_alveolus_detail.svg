<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <rect width="600" height="500" fill="#fff"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Alveolus — Cellular Structure</text>

  <!-- Alveolar sac cross-section -->
  <!-- Air space -->
  <circle cx="200" cy="220" r="100" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="200" y="180" text-anchor="middle" font-family="Arial" font-size="12" fill="#1565c0">Alveolar Air Space</text>

  <!-- Type I pneumocyte -->
  <path d="M110,220 Q150,180 200,190 Q250,200 290,210" fill="none" stroke="#1a6b3c" stroke-width="3"/>
  <rect x="130" y="155" width="120" height="18" rx="3" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="190" y="168" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Type I Pneumocyte</text>
  <text x="190" y="200" text-anchor="middle" font-family="Arial" font-size="8" fill="#1a6b3c">(thin, squamous — 0.1-0.5 μm)</text>

  <!-- Type II pneumocyte -->
  <rect x="160" y="225" width="40" height="30" rx="4" fill="#a5d6a7" stroke="#1a6b3c" stroke-width="2"/>
  <text x="180" y="243" text-anchor="middle" font-family="Arial" font-size="8" fill="#1a6b3c">Type II</text>
  <text x="180" y="263" text-anchor="middle" font-family="Arial" font-size="7" fill="#1a6b3c">Pneumocyte</text>
  <!-- Lamellar bodies -->
  <circle cx="170" cy="237" r="4" fill="#81c784" stroke="none"/>
  <circle cx="186" cy="240" r="3" fill="#81c784" stroke="none"/>

  <!-- Basement membrane -->
  <line x1="105" y1="275" x2="295" y2="275" stroke="#ff8f00" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="200" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff8f00">Fused Basement Membrane</text>

  <!-- Capillary endothelial cell -->
  <path d="M108,305 L150,290 L190,300 L230,288 L270,300 L292,302" fill="none" stroke="#e53935" stroke-width="2.5"/>
  <text x="200" y="325" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Capillary Endothelial Cell</text>

  <!-- Capillary lumen -->
  <path d="M110,320 L150,305 L190,315 L230,303 L270,315 L290,317" fill="none" stroke="#e53935" stroke-width="1.5"/>
  <text x="200" y="345" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Capillary Lumen</text>
  <!-- RBCs -->
  <ellipse cx="155" cy="313" rx="8" ry="5" fill="#e57373" stroke="#c62828" stroke-width="1"/>
  <ellipse cx="250" cy="310" rx="8" ry="5" fill="#e57373" stroke="#c62828" stroke-width="1"/>

  <!-- Surfactant layer -->
  <text x="115" y="145" font-family="Arial" font-size="8" fill="#6a1b9a">Surfactant</text>
  <text x="115" y="155" font-family="Arial" font-size="8" fill="#6a1b9a">layer (Type II)</text>
  <path d="M105,210 Q200,175 295,213" fill="none" stroke="#6a1b9a" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Legend box -->
  <rect x="330" y="70" width="250" height="400" rx="6" fill="#fafafa" stroke="#333" stroke-width="1"/>
  <text x="455" y="95" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Cell Types</text>

  <rect x="345" y="110" width="220" height="90" rx="4" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="455" y="130" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1a6b3c">Type I Pneumocytes</text>
  <text x="350" y="148" font-family="Arial" font-size="9" fill="#333">• Flat, squamous epithelium</text>
  <text x="350" y="163" font-family="Arial" font-size="9" fill="#333">• Cover ~95% of alveolar surface</text>
  <text x="350" y="178" font-family="Arial" font-size="9" fill="#333">• Extremely thin (0.1-0.5 μm)</text>
  <text x="350" y="193" font-family="Arial" font-size="9" fill="#333">• Primary site of gas exchange</text>

  <rect x="345" y="210" width="220" height="110" rx="4" fill="#a5d6a7" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="455" y="230" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1a6b3c">Type II Pneumocytes</text>
  <text x="350" y="248" font-family="Arial" font-size="9" fill="#333">• Cuboidal shape</text>
  <text x="350" y="263" font-family="Arial" font-size="9" fill="#333">• Secrete pulmonary surfactant</text>
  <text x="350" y="278" font-family="Arial" font-size="9" fill="#333">• Surfactant reduces surface tension</text>
  <text x="350" y="293" font-family="Arial" font-size="9" fill="#333">• Act as stem cells — divide to</text>
  <text x="350" y="308" font-family="Arial" font-size="9" fill="#333">  replace damaged Type I cells</text>

  <rect x="345" y="330" width="220" height="55" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="455" y="350" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">Blood-Gas Barrier</text>
  <text x="350" y="366" font-family="Arial" font-size="9" fill="#333">• Total thickness: 0.5-0.6 μm</text>
  <text x="350" y="380" font-family="Arial" font-size="9" fill="#333">• Minimizes diffusion distance</text>

  <text x="455" y="410" font-family="Arial" font-size="9" fill="#e53935">Fused BM = 1 shared basement</text>
  <text x="455" y="425" font-family="Arial" font-size="9" fill="#e53935">membrane, not 2 separate ones</text>
  <text x="455" y="448" font-family="Arial" font-size="9" fill="#6a1b9a">Surfactant: DPPC phospholipid</text>
  <text x="455" y="463" font-family="Arial" font-size="9" fill="#6a1b9a">Prevents alveolar collapse</text>
</svg>
