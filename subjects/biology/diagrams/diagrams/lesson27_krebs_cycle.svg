<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" width="600" height="440">
  <rect width="600" height="440" fill="#fff"/>
  <text x="300" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#333">Krebs Cycle (TCA Cycle) Overview — Mitochondrial Matrix</text>
  <text x="300" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">One turn per acetyl-CoA | Each glucose = 2 turns</text>

  <!-- Main circle -->
  <circle cx="300" cy="260" r="135" fill="none" stroke="#ddd" stroke-width="2"/>

  <!-- Step 1: Citrate synthase -->
  <rect x="360" y="138" width="95" height="30" rx="5" fill="#c8e6c9" stroke="#43a047" stroke-width="2"/>
  <text x="407" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333" font-weight="bold">Citrate (C₆)</text>

  <!-- Acetyl-CoA entry -->
  <rect x="480" y="170" width="80" height="18" rx="3" fill="#ffcc80" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="520" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Acetyl-CoA (C₂)</text>
  <line x1="480" y1="179" x2="460" y2="160" stroke="#ff8f00" stroke-width="2" marker-end="url(#ar3)"/>
  <defs><marker id="ar3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#333"/></marker></defs>

  <!-- Cycle arrows -->
  <path d="M440,170 Q480,210 460,260 Q440,310 395,340 Q340,370 280,375 Q220,370 180,340 Q140,310 140,260 Q140,210 180,180 Q210,158 260,150 Q310,145 360,138" fill="none" stroke="#333" stroke-width="2"/>

  <!-- Step 2: Isocitrate -->
  <text x="490" y="265" font-family="Arial, sans-serif" font-size="10" fill="#333" font-weight="bold">Isocitrate (C₆)</text>

  <!-- CO₂/NADH at isocitrate DH -->
  <rect x="510" y="275" width="70" height="24" rx="3" fill="#ffcdd2" stroke="#e53935" stroke-width="1"/>
  <text x="545" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e53935">→ CO₂ + NADH</text>

  <!-- Step 3: α-Ketoglutarate -->
  <text x="460" y="345" font-family="Arial, sans-serif" font-size="10" fill="#333" font-weight="bold">α-Ketoglutarate (C₅)</text>
  <rect x="480" y="352" width="70" height="24" rx="3" fill="#ffcdd2" stroke="#e53935" stroke-width="1"/>
  <text x="515" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e53935">→ CO₂ + NADH</text>

  <!-- Step 4: Succinyl-CoA -->
  <text x="340" y="390" font-family="Arial, sans-serif" font-size="10" fill="#333" font-weight="bold">Succinyl-CoA (C₄)</text>
  <rect x="320" y="395" width="70" height="24" rx="3" fill="#c8e6c9" stroke="#43a047" stroke-width="1"/>
  <text x="355" y="409" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#43a047">→ GTP (ATP)</text>

  <!-- Step 5: Succinate -->
  <text x="210" y="395" font-family="Arial, sans-serif" font-size="10" fill="#333" font-weight="bold">Succinate (C₄)</text>
  <rect x="190" y="395" width="70" height="24" rx="3" fill="#ede7f6" stroke="#6a1b9a" stroke-width="1"/>
  <text x="225" y="409" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6a1b9a">→ FADH₂</text>

  <!-- Step 6: Fumarate -->
  <text x="130" y="345" font-family="Arial, sans-serif" font-size="10" fill="#333" font-weight="bold">Fumarate (C₄)</text>

  <!-- Step 7: Malate -->
  <text x="115" y="265" font-family="Arial, sans-serif" font-size="10" fill="#333" font-weight="bold">Malate (C₄)</text>

  <!-- Step 8: Oxaloacetate -->
  <rect x="130" y="170" width="95" height="30" rx="5" fill="#81c784" stroke="#1a6b3c" stroke-width="2"/>
  <text x="177" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333" font-weight="bold">Oxaloacetate (C₄)</text>

  <!-- NADH at malate DH -->
  <rect x="90" y="275" width="65" height="24" rx="3" fill="#ede7f6" stroke="#6a1b9a" stroke-width="1"/>
  <text x="122" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6a1b9a">→ NADH</text>

  <!-- Summary box -->
  <rect x="70" y="430" width="460" height="10" rx="0" fill="none"/>
  <text x="300" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a6b3c" font-weight="bold" dy="-28">Per turn: 3 NADH + 1 FADH₂ + 1 GTP + 2 CO₂ | Per glucose (×2): 6 NADH + 2 FADH₂ + 2 GTP + 4 CO₂</text>

  <text x="300" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Each turn: C₂ enters (acetyl-CoA), 2 C leave as CO₂</text>
</svg>
