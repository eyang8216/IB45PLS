<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <rect width="600" height="300" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Erythrocyte (Red Blood Cell)</text>

  <!-- Erythrocyte - biconcave disc -->
  <ellipse cx="200" cy="150" rx="80" ry="30" fill="#e53935" opacity="0.7" stroke="#c62828" stroke-width="2.5"/>
  <ellipse cx="200" cy="150" rx="80" ry="15" fill="none" stroke="#c62828" stroke-width="1.5"/>
  <ellipse cx="200" cy="150" rx="80" ry="8" fill="none" stroke="#c62828" stroke-width="1"/>
  <text x="200" y="145" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">Biconcave disc</text>
  <text x="200" y="160" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">~7.5 μm diameter</text>

  <!-- Hemoglobin -->
  <g fill="#800000">
    <circle cx="165" cy="140" r="4"/><circle cx="185" cy="135" r="4"/>
    <circle cx="210" cy="138" r="4"/><circle cx="230" cy="143" r="4"/>
    <circle cx="175" cy="155" r="4"/><circle cx="200" cy="160" r="4"/>
    <circle cx="220" cy="155" r="4"/>
  </g>
  <text x="200" y="178" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Hemoglobin (Hb)</text>

  <!-- Features -->
  <rect x="320" y="50" width="250" height="200" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="445" y="72" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Special Features</text>

  <text x="340" y="95" font-family="Arial" font-size="11" fill="#333">❌ No nucleus</text>
  <text x="340" y="115" font-family="Arial" font-size="11" fill="#333">❌ No mitochondria</text>
  <text x="340" y="135" font-family="Arial" font-size="11" fill="#333">❌ No ribosomes/ER</text>
  <text x="340" y="155" font-family="Arial" font-size="11" fill="#333">✅ Biconcave shape</text>
  <text x="340" y="175" font-family="Arial" font-size="11" fill="#333">✅ Flexible membrane</text>
  <text x="340" y="195" font-family="Arial" font-size="11" fill="#333">✅ Hemoglobin</text>

  <text x="445" y="220" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">No nucleus = more space for Hb</text>
  <text x="445" y="235" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">No mitochondria = relies on anaerobic</text>
  <text x="445" y="250" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">respiration (doesn't use O₂ it carries)</text>

  <!-- Side view -->
  <text x="200" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Biconcave → ↑ surface area for gas exchange</text>
  <text x="200" y="225" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Flexible → can squeeze through capillaries</text>
</svg>