<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 370">
  <rect width="600" height="370" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Endomembrane Pathway — Protein Secretion</text>

  <!-- 1. Nucleus -->
  <ellipse cx="110" cy="130" rx="45" ry="35" fill="none" stroke="#1565c0" stroke-width="2.5"/>
  <text x="110" y="125" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Nucleus</text>
  <text x="110" y="140" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">DNA → mRNA</text>

  <!-- 2. RER -->
  <g>
    <path d="M170,100 Q190,90 210,100 Q230,110 250,100" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>
    <path d="M170,115 Q190,105 210,115 Q230,125 250,115" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>
    <path d="M170,130 Q190,120 210,130 Q230,140 250,130" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>
    <path d="M170,145 Q190,135 210,145 Q230,155 250,145" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>
    <!-- Ribosomes -->
    <circle cx="180" cy="95" r="4" fill="#333"/><circle cx="200" cy="103" r="4" fill="#333"/>
    <circle cx="230" cy="107" r="4" fill="#333"/><circle cx="195" cy="118" r="4" fill="#333"/>
    <circle cx="220" cy="128" r="4" fill="#333"/><circle cx="185" cy="138" r="4" fill="#333"/>
    <text x="210" y="170" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">Rough ER</text>
    <text x="210" y="183" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">protein synthesis</text>
  </g>

  <!-- Arrow RER→COPII -->
  <g stroke="#333" stroke-width="2" fill="none">
    <line x1="260" y1="130" x2="300" y2="130"/>
    <polygon points="300,125 310,130 300,135" fill="#333"/>
  </g>
  <text x="270" y="120" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff8f00">COPII</text>

  <!-- 3. Cis Golgi -->
  <g>
    <path d="M310,95 Q340,88 370,95" fill="none" stroke="#e53935" stroke-width="2.5"/>
    <path d="M310,110 Q340,103 370,110" fill="none" stroke="#e53935" stroke-width="2.5"/>
    <path d="M310,125 Q340,118 370,125" fill="none" stroke="#e53935" stroke-width="2.5"/>
    <text x="340" y="85" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">cis Golgi</text>
  </g>

  <!-- Arrow cis→medial -->
  <line x1="380" y1="110" x2="410" y2="110" stroke="#333" stroke-width="2"/>
  <polygon points="410,105 420,110 410,115" fill="#333"/>

  <!-- 4. Medial Golgi -->
  <g>
    <path d="M420,95 Q450,88 480,95" fill="none" stroke="#ff8f00" stroke-width="2.5"/>
    <path d="M420,110 Q450,103 480,110" fill="none" stroke="#ff8f00" stroke-width="2.5"/>
    <path d="M420,125 Q450,118 480,125" fill="none" stroke="#ff8f00" stroke-width="2.5"/>
    <text x="450" y="85" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff8f00">medial</text>
  </g>

  <!-- Arrow medial→trans -->
  <line x1="490" y1="110" x2="520" y2="110" stroke="#333" stroke-width="2"/>
  <polygon points="520,105 530,110 520,115" fill="#333"/>

  <!-- 5. Trans Golgi -->
  <g>
    <path d="M530,95 Q560,88 590,95" fill="none" stroke="#6a1b9a" stroke-width="2.5"/>
    <path d="M530,110 Q560,103 590,110" fill="none" stroke="#6a1b9a" stroke-width="2.5"/>
    <path d="M530,125 Q560,118 590,125" fill="none" stroke="#6a1b9a" stroke-width="2.5"/>
    <text x="560" y="85" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">trans Golgi</text>
  </g>

  <!-- Arrow trans→secretion -->
  <g stroke="#333" stroke-width="2" fill="none">
    <line x1="560" y1="135" x2="560" y2="180"/>
    <polygon points="555,180 560,190 565,180" fill="#333"/>
  </g>
  <text x="570" y="160" font-family="Arial" font-size="8" fill="#1565c0">Clathrin</text>

  <!-- 6. Plasma membrane -->
  <line x1="520" y1="195" x2="600" y2="195" stroke="#1a6b3c" stroke-width="3"/>
  <text x="560" y="215" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">Plasma membrane</text>

  <!-- Secretion -->
  <text x="560" y="245" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Exocytosis</text>
  <g fill="#e53935">
    <circle cx="530" cy="260" r="5"/><circle cx="550" cy="270" r="5"/><circle cx="570" cy="260" r="5"/>
  </g>

  <!-- Summary timeline -->
  <rect x="20" y="280" width="560" height="75" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="300" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Sequence Summary</text>
  <text x="40" y="320" font-family="Arial" font-size="10" fill="#333">DNA → mRNA →</text>
  <text x="150" y="320" font-family="Arial" font-size="10" fill="#1a6b3c">RER (ribosomes, protein into lumen) →</text>
  <text x="370" y="320" font-family="Arial" font-size="10" fill="#ff8f00">COPII vesicle →</text>
  <text x="490" y="320" font-family="Arial" font-size="10" fill="#e53935">cis→medial→trans Golgi</text>
  <text x="40" y="340" font-family="Arial" font-size="10" fill="#6a1b9a">trans Golgi → clathrin vesicle → plasma membrane → exocytosis (secretion)</text>
</svg>