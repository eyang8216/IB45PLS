<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440">
  <rect width="600" height="440" fill="#fff"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Law of Segregation — Meiosis Connection</text>

  <!-- Parent cell - before meiosis -->
  <text x="300" y="62" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">Parent Cell (before Meiosis I)</text>

  <!-- Chromosome pair -->
  <rect x="150" y="80" width="40" height="12" rx="4" fill="#e53935"/>
  <text x="170" y="106" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935" font-weight="bold">A</text>
  <text x="170" y="75" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">from mother</text>

  <rect x="410" y="80" width="40" height="12" rx="4" fill="#1565c0"/>
  <text x="430" y="106" text-anchor="middle" font-family="Arial" font-size="11" fill="#1565c0" font-weight="bold">a</text>
  <text x="430" y="75" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">from father</text>

  <!-- Homologous pair label -->
  <text x="300" y="80" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Homologous chromosomes</text>

  <!-- Centromeres -->
  <circle cx="165" cy="86" r="3" fill="#333"/>
  <circle cx="425" cy="86" r="3" fill="#333"/>

  <!-- Down arrows -->
  <line x1="170" y1="118" x2="170" y2="145" stroke="#333" stroke-width="1.5"/>
  <polygon points="170,145 164,138 176,138" fill="#333"/>
  <line x1="430" y1="118" x2="430" y2="145" stroke="#333" stroke-width="1.5"/>
  <polygon points="430,145 424,138 436,138" fill="#333"/>

  <text x="300" y="135" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">Meiosis I: Anaphase I</text>

  <!-- Two daughter cells -->
  <rect x="80" y="160" width="185" height="100" rx="10" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <rect x="70" y="155" width="185" height="100" rx="10" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>

  <rect x="335" y="160" width="185" height="100" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <rect x="325" y="155" width="185" height="100" rx="10" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>

  <rect x="150" y="200" width="40" height="12" rx="4" fill="#e53935"/>
  <text x="170" y="230" text-anchor="middle" font-family="Arial" font-size="13" fill="#e53935" font-weight="bold">A</text>
  <text x="170" y="245" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Daughter cell 1</text>

  <rect x="410" y="200" width="40" height="12" rx="4" fill="#1565c0"/>
  <text x="430" y="230" text-anchor="middle" font-family="Arial" font-size="13" fill="#1565c0" font-weight="bold">a</text>
  <text x="430" y="245" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Daughter cell 2</text>

  <!-- Down arrows to gametes -->
  <line x1="170" y1="270" x2="170" y2="300" stroke="#333" stroke-width="1"/>
  <line x1="430" y1="270" x2="430" y2="300" stroke="#333" stroke-width="1"/>

  <text x="300" y="295" text-anchor="middle" font-family="Arial" font-size="12" fill="#6a1b9a">Meiosis II → 4 gametes</text>

  <!-- Gametes -->
  <ellipse cx="120" cy="330" rx="42" ry="28" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="120" y="335" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e53935">A</text>

  <ellipse cx="220" cy="330" rx="42" ry="28" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="220" y="335" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e53935">A</text>

  <ellipse cx="380" cy="330" rx="42" ry="28" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="380" y="335" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">a</text>

  <ellipse cx="480" cy="330" rx="42" ry="28" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="480" y="335" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">a</text>

  <!-- Fertilisation -->
  <text x="300" y="390" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">Fertilisation restores pairs — offspring: AA, Aa, or aa</text>
  <text x="300" y="410" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Each gamete carries ONE allele. Segregation = the physical basis of Mendel's Law.</text>

  <text x="300" y="435" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">"Anaphase I — segregation of alleles"</text>
</svg>
