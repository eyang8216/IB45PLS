<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Nephron — Kidney Structure &amp; Function</text>

  <!-- Bowman's capsule -->
  <path d="M80,80 Q60,110 80,140 Q110,160 140,140 Q160,110 140,80 Q110,60 80,80Z" fill="none" stroke="#e53935" stroke-width="2.5"/>
  <text x="115" y="100" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Bowman's</text>
  <text x="115" y="112" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">capsule</text>

  <!-- Glomerulus -->
  <g stroke="#e53935" stroke-width="1.5" fill="none">
    <path d="M95,90 Q105,80 115,90 Q120,100 110,105"/>
    <path d="M100,100 Q110,95 108,108"/>
  </g>
  <text x="115" y="125" text-anchor="middle" font-family="Arial" font-size="7" fill="#e53935">Glomerulus</text>

  <!-- Afferent/Efferent -->
  <line x1="50" y1="105" x2="80" y2="105" stroke="#e53935" stroke-width="2"/>
  <text x="35" y="95" font-family="Arial" font-size="7" fill="#e53935">Afferent</text>
  <line x1="140" y1="95" x2="160" y2="95" stroke="#e53935" stroke-width="2"/>
  <text x="155" y="88" font-family="Arial" font-size="7" fill="#e53935">Efferent</text>

  <!-- PCT -->
  <path d="M140,140 Q160,160 180,180 Q200,200 220,220 Q240,240 260,260" fill="none" stroke="#ff8f00" stroke-width="3"/>
  <text x="185" y="195" font-family="Arial" font-size="9" fill="#ff8f00">PCT</text>
  <text x="175" y="210" font-family="Arial" font-size="7" fill="#555">Reabsorption</text>

  <!-- Loop of Henle descending -->
  <path d="M260,260 Q270,280 280,300 Q290,320 300,340" fill="none" stroke="#1565c0" stroke-width="3"/>
  <text x="275" y="300" font-family="Arial" font-size="8" fill="#1565c0">Descending</text>
  <text x="275" y="312" font-family="Arial" font-size="7" fill="#555">H₂O out</text>

  <!-- Loop of Henle ascending -->
  <path d="M300,340 Q320,320 330,290 Q340,260 350,230" fill="none" stroke="#1a6b3c" stroke-width="3"/>
  <text x="355" y="290" font-family="Arial" font-size="8" fill="#1a6b3c">Ascending</text>
  <text x="355" y="302" font-family="Arial" font-size="7" fill="#555">NaCl pumped</text>

  <!-- DCT -->
  <path d="M350,230 Q380,200 400,180 Q420,160 440,140" fill="none" stroke="#6a1b9a" stroke-width="2.5"/>
  <text x="400" y="190" font-family="Arial" font-size="9" fill="#6a1b9a">DCT</text>
  <text x="390" y="205" font-family="Arial" font-size="7" fill="#555">Fine-tuning</text>

  <!-- Collecting duct -->
  <path d="M440,140 Q460,160 470,180 Q480,200 475,220 Q470,240 480,260 Q490,280 500,310" fill="none" stroke="#333" stroke-width="3"/>
  <text x="500" y="230" font-family="Arial" font-size="9" fill="#333">Collecting</text>
  <text x="500" y="243" font-family="Arial" font-size="7" fill="#555">duct</text>
  <text x="500" y="255" font-family="Arial" font-size="7" fill="#555">ADH</text>

  <!-- Urine -->
  <text x="500" y="335" font-family="Arial" font-size="8" fill="#ff8f00">→ Urine</text>

  <!-- Key -->
  <rect x="20" y="295" width="500" height="70" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="270" y="315" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">Nephron Segments &amp; Functions</text>
  <text x="35" y="333" font-family="Arial" font-size="9" fill="#e53935">Bowman's: filtration</text>
  <text x="170" y="333" font-family="Arial" font-size="9" fill="#ff8f00">PCT: reabsorption (glucose, AA, Na⁺)</text>
  <text x="350" y="333" font-family="Arial" font-size="9" fill="#1565c0">Desc: H₂O out</text>
  <text x="35" y="350" font-family="Arial" font-size="9" fill="#1a6b3c">Asc: NaCl pumped out</text>
  <text x="210" y="350" font-family="Arial" font-size="9" fill="#6a1b9a">DCT: fine-tuning</text>
  <text x="320" y="350" font-family="Arial" font-size="9" fill="#333">Collecting duct: ADH-controlled water reabsorption</text>
</svg>