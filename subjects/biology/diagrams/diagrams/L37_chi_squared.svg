<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" width="600" height="480">
  <rect width="600" height="480" fill="white"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">L37e — Chi-Squared (χ²) Test for Species Association</text>

  <!-- Observed table -->
  <rect x="30" y="50" width="255" height="155" rx="4" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="157" y="75" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">Observed (O)</text>
  <!-- Table -->
  <g stroke="#333" stroke-width="1.5">
    <line x1="40" y1="95" x2="275" y2="95"/>
    <line x1="40" y1="130" x2="275" y2="130"/>
    <line x1="40" y1="165" x2="275" y2="165"/>
    <line x1="130" y1="85" x2="130" y2="195"/>
    <line x1="220" y1="85" x2="220" y2="195"/>
  </g>
  <text x="85" y="90" text-anchor="middle" font-family="Arial" font-size="10" fill="#666"></text>
  <text x="175" y="90" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Y present</text>
  <text x="248" y="90" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Y absent</text>
  <text x="70" y="118" text-anchor="start" font-family="Arial" font-size="11" fill="#333">X present</text>
  <text x="152" y="118" text-anchor="middle" font-family="Arial" font-size="14" fill="#1565c0" font-weight="bold">18</text>
  <text x="238" y="118" text-anchor="middle" font-family="Arial" font-size="14" fill="#1565c0" font-weight="bold">7</text>
  <text x="70" y="153" text-anchor="start" font-family="Arial" font-size="11" fill="#333">X absent</text>
  <text x="152" y="153" text-anchor="middle" font-family="Arial" font-size="14" fill="#1565c0" font-weight="bold">5</text>
  <text x="238" y="153" text-anchor="middle" font-family="Arial" font-size="14" fill="#1565c0" font-weight="bold">20</text>
  <text x="85" y="185" font-family="Arial" font-size="10" fill="#666">N = 50 quadrats</text>

  <!-- Expected table -->
  <rect x="315" y="50" width="255" height="155" rx="4" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="442" y="75" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#ff8f00">Expected (E)</text>
  <g stroke="#333" stroke-width="1.5">
    <line x1="325" y1="95" x2="560" y2="95"/>
    <line x1="325" y1="130" x2="560" y2="130"/>
    <line x1="325" y1="165" x2="560" y2="165"/>
    <line x1="410" y1="85" x2="410" y2="195"/>
    <line x1="495" y1="85" x2="495" y2="195"/>
  </g>
  <text x="368" y="90" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Y present</text>
  <text x="528" y="90" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Y absent</text>
  <text x="355" y="118" text-anchor="start" font-family="Arial" font-size="11" fill="#333">X present</text>
  <text x="432" y="118" text-anchor="middle" font-family="Arial" font-size="14" fill="#ff8f00" font-weight="bold">11.5</text>
  <text x="518" y="118" text-anchor="middle" font-family="Arial" font-size="14" fill="#ff8f00" font-weight="bold">13.5</text>
  <text x="355" y="153" text-anchor="start" font-family="Arial" font-size="11" fill="#333">X absent</text>
  <text x="432" y="153" text-anchor="middle" font-family="Arial" font-size="14" fill="#ff8f00" font-weight="bold">11.5</text>
  <text x="518" y="153" text-anchor="middle" font-family="Arial" font-size="14" fill="#ff8f00" font-weight="bold">13.5</text>
  <text x="370" y="185" font-family="Arial" font-size="10" fill="#666">E = row×col / total</text>

  <!-- Formula -->
  <rect x="30" y="220" width="540" height="70" rx="6" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <text x="300" y="245" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#6a1b9a">χ² = Σ (O − E)² / E</text>
  <text x="300" y="268" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">χ² = (18−11.5)²/11.5 + (7−13.5)²/13.5 + (5−11.5)²/11.5 + (20−13.5)²/13.5</text>
  <text x="300" y="285" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">χ² = 3.674 + 3.130 + 3.674 + 3.130 = 13.61</text>

  <!-- Critical values -->
  <rect x="30" y="305" width="260" height="100" rx="4" fill="#f0e6f6" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="160" y="328" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">Critical Values (p = 0.05)</text>
  <g font-family="Arial" font-size="12" fill="#333">
    <text x="45" y="352">df = 1 →</text><text x="120" y="352" font-weight="bold" fill="#e53935">3.841</text>
    <text x="45" y="372">df = 2 →</text><text x="120" y="372">5.991</text>
    <text x="45" y="392">df = 3 →</text><text x="120" y="392">7.815</text>
  </g>

  <!-- Decision -->
  <rect x="320" y="305" width="250" height="100" rx="4" fill="#ffebee" stroke="#e53935" stroke-width="1.5"/>
  <text x="445" y="328" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">Decision</text>
  <text x="445" y="352" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">χ² = 13.61 vs Critical = 3.841</text>
  <text x="445" y="375" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e53935">13.61 > 3.841</text>
  <text x="445" y="395" text-anchor="middle" font-family="Arial" font-size="13" fill="#e53935">→ Reject H₀ → Significant association</text>

  <!-- Bottom note -->
  <rect x="30" y="415" width="540" height="50" rx="4" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="1"/>
  <text x="300" y="437" text-anchor="middle" font-family="Arial" font-size="12" fill="#1a6b3c">H₀: No association between species (independent). H₁: Association exists.</text>
  <text x="300" y="458" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">df = (rows−1)(cols−1) = 1. If χ² > critical → reject H₀ → significant.</text>
</svg>