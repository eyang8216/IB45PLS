<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520">
  <rect width="600" height="520" fill="#fff"/>
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#333">Adaptive Radiation — Darwin's Finches (Galápagos Islands)</text>
  <text x="300" y="46" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Single ancestral finch (~2-3 mya) → ~14 species: divergent beak morphology for different niches</text>
  <!-- Ancestral -->
  <ellipse cx="300" cy="80" rx="40" ry="18" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <text x="300" y="84" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Ancestral</text>
  <text x="300" y="96" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Seed-eating Finch</text>
  <!-- Radiating lines -->
  <line x1="300" y1="98" x2="70" y2="150" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="300" y1="98" x2="170" y2="150" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="300" y1="98" x2="300" y2="150" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="300" y1="98" x2="430" y2="150" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="300" y1="98" x2="530" y2="150" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Species 1: Large ground finch -->
  <rect x="20" y="155" width="100" height="150" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="70" y="175" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">Large Ground</text>
  <text x="70" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Finch</text>
  <path d="M50,220 L90,220 L85,235 L55,235 Z" fill="#81c784" stroke="#333" stroke-width="2"/>
  <text x="70" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Large, hard seeds</text>
  <text x="70" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Deep, powerful beak</text>
  <!-- Species 2: Medium ground -->
  <rect x="130" y="155" width="100" height="150" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="180" y="175" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">Medium Ground</text>
  <text x="180" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Finch</text>
  <path d="M165,220 L195,220 L192,230 L168,230 Z" fill="#81c784" stroke="#333" stroke-width="2"/>
  <text x="180" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Medium seeds</text>
  <text x="180" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Medium beak</text>
  <!-- Species 3: Cactus finch -->
  <rect x="240" y="155" width="100" height="150" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="290" y="175" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">Cactus</text>
  <text x="290" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Finch</text>
  <path d="M275,220 L305,220 L310,235 L270,235 Z" fill="#81c784" stroke="#333" stroke-width="2"/>
  <text x="290" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Cactus nectar/pollen</text>
  <text x="290" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Long, curved beak</text>
  <!-- Species 4: Woodpecker finch -->
  <rect x="350" y="155" width="100" height="150" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="400" y="175" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">Woodpecker</text>
  <text x="400" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Finch</text>
  <path d="M385,220 L415,220 L410,235 L390,235 Z" fill="#81c784" stroke="#333" stroke-width="2"/>
  <text x="400" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Insect larvae in wood</text>
  <text x="400" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Sharp, probing beak</text>
  <text x="400" y="285" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Uses cactus spine as tool!</text>
  <!-- Species 5: Vegetarian -->
  <rect x="460" y="155" width="100" height="150" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="510" y="175" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">Vegetarian</text>
  <text x="510" y="190" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Finch</text>
  <path d="M498,220 L522,220 L520,232 L500,232 Z" fill="#81c784" stroke="#333" stroke-width="2"/>
  <text x="510" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Fruit and buds</text>
  <text x="510" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Parrot-like beak</text>
  <!-- Bottom section -->
  <rect x="30" y="320" width="540" height="90" rx="8" fill="#e0f2f1" stroke="#00838f" stroke-width="2"/>
  <text x="300" y="345" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#00695c">Why Adaptive Radiation Occurred</text>
  <text x="300" y="365" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">1. Ecological opportunity: Remote islands with few competing bird species → many vacant niches</text>
  <text x="300" y="383" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">2. Divergent selection: Different food sources (seeds, insects, nectar, buds) → different beak morphologies favored</text>
  <text x="300" y="401" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">3. Heritable variation in beak depth/shape + geographic isolation between islands → allopatric speciation</text>
  <rect x="80" y="425" width="440" height="45" rx="6" fill="#ff8f00" opacity="0.15"/>
  <text x="300" y="443" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100">KEY: Adaptive radiation = rapid speciation from common ancestor, each adapted to different niche</text>
  <text x="300" y="463" text-anchor="middle" font-family="Arial" font-size="10" fill="#e65100">Other examples: Hawaiian honeycreepers (~50 species), cichlid fish in African Great Lakes (~1500+ species)</text>
</svg>