<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 620" width="600" height="620">
  <rect width="600" height="620" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Blood Vessels — Artery, Capillary, Vein</text>

  <!-- ARTERY -->
  <text x="100" y="60" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e53935">ARTERY</text>
  <text x="100" y="78" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">(Away from heart)</text>

  <!-- Artery cross-section -->
  <ellipse cx="100" cy="200" rx="50" ry="110" fill="#fff" stroke="#333" stroke-width="2"/>
  <!-- Lumen (narrow) -->
  <ellipse cx="100" cy="200" rx="18" ry="80" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
  <!-- Tunica intima -->
  <ellipse cx="100" cy="200" rx="22" ry="90" fill="none" stroke="#e53935" stroke-width="1"/>
  <!-- Tunica media (thick) -->
  <ellipse cx="100" cy="200" rx="38" ry="105" fill="none" stroke="#e53935" stroke-width="2.5"/>
  <!-- Tunica externa -->
  <ellipse cx="100" cy="200" rx="50" ry="110" fill="none" stroke="#333" stroke-width="2"/>

  <text x="100" y="135" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Thick Tunica Media</text>
  <text x="100" y="148" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">(smooth muscle + elastin)</text>
  <text x="100" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Narrow Lumen</text>
  <text x="100" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">No valves</text>
  <text x="100" y="312" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">High pressure (80-120 mmHg)</text>

  <!-- CAPILLARY -->
  <text x="300" y="60" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">CAPILLARY</text>
  <text x="300" y="78" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">(Exchange site)</text>

  <!-- Capillary cross-section -->
  <circle cx="300" cy="200" r="60" fill="#fff" stroke="#333" stroke-width="2"/>
  <!-- Single cell wall -->
  <circle cx="300" cy="200" r="55" fill="none" stroke="#1a6b3c" stroke-width="2.5"/>
  <circle cx="300" cy="200" r="15" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="1.5"/>
  <!-- Endothelial cell nucleus -->
  <ellipse cx="325" cy="155" rx="8" ry="5" fill="#1a6b3c" stroke="none"/>

  <text x="300" y="135" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Single endothelial cell thick</text>
  <text x="300" y="148" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">(～1 μm diffusion distance)</text>
  <text x="300" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Diameter: 7-10 μm</text>
  <text x="300" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">RBCs pass single file</text>
  <text x="300" y="320" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">No smooth muscle or elastin</text>

  <!-- VEIN -->
  <text x="500" y="60" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">VEIN</text>
  <text x="500" y="78" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">(Toward heart)</text>

  <!-- Vein cross-section -->
  <ellipse cx="500" cy="200" rx="55" ry="105" fill="#fff" stroke="#333" stroke-width="2"/>
  <!-- Wide lumen -->
  <ellipse cx="500" cy="200" rx="35" ry="80" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <!-- Thin wall -->
  <ellipse cx="500" cy="200" rx="55" ry="105" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Valve -->
  <path d="M500,135 L490,180 L500,175 L510,180 Z" fill="#fff" stroke="#1565c0" stroke-width="2"/>

  <text x="500" y="135" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Thin wall</text>
  <text x="500" y="148" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">(little muscle/elastin)</text>
  <text x="500" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Wide Lumen</text>
  <text x="500" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">VALVES present</text>
  <text x="500" y="312" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Low pressure (5-15 mmHg)</text>

  <!-- Summary comparison table -->
  <rect x="30" y="350" width="540" height="260" rx="6" fill="#fafafa" stroke="#333" stroke-width="1"/>
  <text x="300" y="375" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Comparison Table</text>

  <line x1="30" y1="388" x2="570" y2="388" stroke="#ccc" stroke-width="1"/>
  <text x="70" y="408" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Feature</text>
  <text x="200" y="408" font-family="Arial" font-size="10" font-weight="bold" fill="#e53935">Artery</text>
  <text x="335" y="408" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">Capillary</text>
  <text x="470" y="408" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">Vein</text>

  <text x="70" y="428" font-family="Arial" font-size="9" fill="#333">Wall thickness</text>
  <text x="200" y="428" font-family="Arial" font-size="9" fill="#333">Thick</text>
  <text x="335" y="428" font-family="Arial" font-size="9" fill="#333">1 cell (very thin)</text>
  <text x="470" y="428" font-family="Arial" font-size="9" fill="#333">Thin</text>

  <text x="70" y="448" font-family="Arial" font-size="9" fill="#333">Lumen</text>
  <text x="200" y="448" font-family="Arial" font-size="9" fill="#333">Narrow</text>
  <text x="335" y="448" font-family="Arial" font-size="9" fill="#333">Very narrow (7-10 μm)</text>
  <text x="470" y="448" font-family="Arial" font-size="9" fill="#333">Wide</text>

  <text x="70" y="468" font-family="Arial" font-size="9" fill="#333">Smooth muscle/elastin</text>
  <text x="200" y="468" font-family="Arial" font-size="9" fill="#333">Abundant (tunica media)</text>
  <text x="335" y="468" font-family="Arial" font-size="9" fill="#333">None</text>
  <text x="470" y="468" font-family="Arial" font-size="9" fill="#333">Little</text>

  <text x="70" y="488" font-family="Arial" font-size="9" fill="#333">Valves</text>
  <text x="200" y="488" font-family="Arial" font-size="9" fill="#333">None</text>
  <text x="335" y="488" font-family="Arial" font-size="9" fill="#333">None</text>
  <text x="470" y="488" font-family="Arial" font-size="9" fill="#333">Present (prevent backflow)</text>

  <text x="70" y="508" font-family="Arial" font-size="9" fill="#333">Pressure</text>
  <text x="200" y="508" font-family="Arial" font-size="9" fill="#333">High (80-120 mmHg)</text>
  <text x="335" y="508" font-family="Arial" font-size="9" fill="#333">Declining (~35→15)</text>
  <text x="470" y="508" font-family="Arial" font-size="9" fill="#333">Low (5-15 mmHg)</text>

  <text x="70" y="528" font-family="Arial" font-size="9" fill="#333">Function</text>
  <text x="200" y="528" font-family="Arial" font-size="9" fill="#333">Conduct under pressure</text>
  <text x="335" y="528" font-family="Arial" font-size="9" fill="#333">Exchange (diffusion)</text>
  <text x="470" y="528" font-family="Arial" font-size="9" fill="#333">Return blood (reservoir)</text>

  <text x="300" y="580" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Arteriole: smooth muscle → vasoconstriction/vasodilation regulates blood flow distribution</text>
  <text x="300" y="598" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Venule: thin-walled; collect from capillaries → drain into veins</text>
</svg>
