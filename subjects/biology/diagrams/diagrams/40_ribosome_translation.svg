<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 540">
  <rect width="600" height="540" fill="#fff"/>
  <text x="300" y="24" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#1a6b3c">The Ribosome &amp; Translation</text>
  <text x="300" y="40" text-anchor="middle" font-family="Arial" font-size="10" fill="#666" font-style="italic">Eukaryotic 80S ribosome — A, P, and E sites</text>

  <!-- Ribosome structure -->
  <!-- Large subunit (60S) -->
  <rect x="140" y="60" width="320" height="70" rx="15" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="300" y="90" text-anchor="middle" font-family="Arial" font-size="12" fill="#1a6b3c" font-weight="bold">Large Subunit (60S)</text>
  <text x="300" y="105" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Contains 28S, 5.8S, 5S rRNAs + 49 proteins</text>

  <!-- Small subunit (40S) -->
  <rect x="140" y="132" width="320" height="50" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="2.5"/>
  <text x="300" y="162" text-anchor="middle" font-family="Arial" font-size="12" fill="#1565c0" font-weight="bold">Small Subunit (40S)</text>
  <text x="300" y="175" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Contains 18S rRNA + 33 proteins</text>

  <!-- A, P, E sites -->
  <!-- Dividing lines -->
  <line x1="250" y1="132" x2="250" y2="182" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="360" y1="132" x2="360" y2="182" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Labels -->
  <text x="200" y="200" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935" font-weight="bold">E site</text>
  <text x="305" y="200" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff8f00" font-weight="bold">P site</text>
  <text x="420" y="200" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a6b3c" font-weight="bold">A site</text>
  <text x="200" y="213" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">Exit</text>
  <text x="305" y="213" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">Peptidyl</text>
  <text x="420" y="213" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">Aminoacyl</text>

  <!-- mRNA -->
  <line x1="100" y1="170" x2="520" y2="170" stroke="#333" stroke-width="2"/>
  <text x="530" y="173" font-family="Arial" font-size="9" fill="#333">mRNA</text>

  <!-- Codons on mRNA -->
  <text x="195" y="165" font-family="Arial" font-size="9" fill="#333">C U G</text>
  <text x="300" y="165" font-family="Arial" font-size="9" fill="#333">A U G</text>
  <text x="415" y="165" font-family="Arial" font-size="9" fill="#333">U U C</text>

  <!-- tRNA in E site -->
  <line x1="195" y1="170" x2="180" y2="110" stroke="#e53935" stroke-width="1.5"/>
  <circle cx="180" cy="105" r="6" fill="none" stroke="#e53935" stroke-width="1.5"/>
  <text x="180" y="108" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">GAC</text>
  <rect x="175" y="92" width="10" height="10" rx="2" fill="#e53935" opacity="0.5"/>

  <!-- tRNA in P site -->
  <line x1="305" y1="170" x2="290" y2="105" stroke="#ff8f00" stroke-width="1.5"/>
  <circle cx="290" cy="100" r="6" fill="none" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="290" y="103" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff8f00">UAC</text>
  <!-- Growing polypeptide -->
  <path d="M290,92 L290,70 L295,65 L285,55" fill="none" stroke="#6a1b9a" stroke-width="2.5"/>
  <text x="275" y="52" font-family="Arial" font-size="8" fill="#6a1b9a" font-weight="bold">Polypeptide</text>
  <text x="275" y="42" font-family="Arial" font-size="7" fill="#888">(Met-Arg-Gly-...)</text>

  <!-- tRNA in A site -->
  <line x1="415" y1="170" x2="400" y2="105" stroke="#1a6b3c" stroke-width="1.5"/>
  <circle cx="400" cy="100" r="6" fill="none" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="400" y="103" text-anchor="middle" font-family="Arial" font-size="8" fill="#1a6b3c">AAG</text>
  <!-- Incoming amino acid -->
  <ellipse cx="400" cy="88" rx="10" ry="8" fill="#1a6b3c" opacity="0.3" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="400" y="91" text-anchor="middle" font-family="Arial" font-size="8" fill="#1a6b3c">Phe</text>

  <!-- Direction arrow -->
  <line x1="100" y1="195" x2="130" y2="195" stroke="#333" stroke-width="1.5"/>
  <text x="140" y="198" font-family="Arial" font-size="8" fill="#333">mRNA: 5' → 3'</text>
  <text x="250" y="198" font-family="Arial" font-size="8" fill="#333">Ribosome moves this way →</text>

  <!-- tRNA structure inset -->
  <line x1="30" y1="230" x2="570" y2="230" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="250" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">tRNA Structure: The Adaptor Molecule</text>

  <!-- Cloverleaf -->
  <g transform="translate(40,260)">
    <!-- Acceptor stem -->
    <line x1="60" y1="0" x2="60" y2="25" stroke="#333" stroke-width="1.5"/>
    <text x="62" y="12" font-family="Arial" font-size="7" fill="#333">3'</text>
    <text x="55" y="30" font-family="Arial" font-size="7" fill="#333">Acceptor</text>
    <text x="50" y="40" font-family="Arial" font-size="7" fill="#333">stem</text>
    <text x="70" y="12" font-family="Arial" font-size="7" fill="#ff8f00">CCA—OH</text>

    <!-- Amino acid -->
    <ellipse cx="60" cy="-12" rx="14" ry="9" fill="#ff8f00" opacity="0.3" stroke="#ff8f00" stroke-width="1.5"/>
    <text x="60" y="-9" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff8f00">Amino Acid</text>

    <!-- D loop -->
    <path d="M60,25 Q20,30 25,55 Q30,70 50,75 Q40,60 45,50 Q50,40 60,45" fill="none" stroke="#333" stroke-width="1.5"/>
    <text x="20" y="58" font-family="Arial" font-size="7" fill="#333">D loop</text>

    <!-- Anticodon loop -->
    <path d="M60,45 Q85,50 90,75 Q93,95 75,100 Q55,105 50,90 Q48,75 60,80" fill="none" stroke="#333" stroke-width="1.5"/>
    <circle cx="68" cy="90" r="5" fill="none" stroke="#e53935" stroke-width="2"/>
    <text x="68" y="93" text-anchor="middle" font-family="Arial" font-size="7" fill="#e53935">Anticodon</text>

    <!-- TψC loop -->
    <path d="M60,80 Q35,75 30,55 Q25,40 40,35 Q50,30 60,45" fill="none" stroke="#333" stroke-width="1.5"/>
    <text x="22" y="50" font-family="Arial" font-size="7" fill="#333">TψC loop</text>
  </g>

  <!-- Peptidyl transferase -->
  <rect x="280" y="265" width="280" height="90" rx="6" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="420" y="285" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a6b3c" font-weight="bold">Peptidyl Transferase</text>
  <text x="295" y="302" font-family="Arial" font-size="9" fill="#555">Catalyzes peptide bond formation</text>
  <text x="295" y="318" font-family="Arial" font-size="9" fill="#555">NOT a protein enzyme — it's a</text>
  <text x="295" y="334" font-family="Arial" font-size="9" fill="#555">RIBOZYME (catalytic rRNA: 28S in</text>
  <text x="295" y="350" font-family="Arial" font-size="9" fill="#555">eukaryotes, 23S in prokaryotes)</text>

  <!-- Elongation cycle box -->
  <text x="300" y="378" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">One Elongation Cycle (3 steps, each costs GTP)</text>

  <rect x="30" y="388" width="170" height="65" rx="5" fill="#e3f2fd" stroke="#90caf9" stroke-width="1"/>
  <text x="115" y="408" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0" font-weight="bold">① Codon Recognition</text>
  <text x="115" y="424" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Charged tRNA enters A site</text>
  <text x="115" y="438" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Anticodon pairs with codon</text>
  <text x="115" y="450" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">EF-Tu/eEF1 + GTP</text>

  <rect x="215" y="388" width="170" height="65" rx="5" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="300" y="408" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c" font-weight="bold">② Peptide Bond Formation</text>
  <text x="300" y="424" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">P-site aa transferred to A-site aa</text>
  <text x="300" y="438" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Peptidyl transferase (rRNA)</text>
  <text x="300" y="450" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">Condensation rxn → H₂O released</text>

  <rect x="400" y="388" width="170" height="65" rx="5" fill="#fff3e0" stroke="#ffcc80" stroke-width="1"/>
  <text x="485" y="408" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff8f00" font-weight="bold">③ Translocation</text>
  <text x="485" y="424" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Ribosome moves 1 codon (3 nt)</text>
  <text x="485" y="438" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">tRNA→E site, pep-tRNA→P site</text>
  <text x="485" y="450" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">EF-G/eEF2 + GTP</text>

  <!-- Ribosome size comparison -->
  <line x1="30" y1="470" x2="570" y2="470" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="490" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">Ribosome Sizes</text>

  <rect x="80" y="498" width="200" height="32" rx="4" fill="#e8f5e9" stroke="#81c784" stroke-width="1"/>
  <text x="180" y="515" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Prokaryotes: 70S = 50S + 30S</text>
  <text x="180" y="527" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">23S rRNA catalyses peptide bond</text>

  <rect x="320" y="498" width="200" height="32" rx="4" fill="#e3f2fd" stroke="#90caf9" stroke-width="1"/>
  <text x="420" y="515" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Eukaryotes: 80S = 60S + 40S</text>
  <text x="420" y="527" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">28S rRNA catalyses peptide bond</text>
</svg>
