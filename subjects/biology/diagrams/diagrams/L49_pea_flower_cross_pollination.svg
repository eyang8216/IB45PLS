<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480">
  <rect width="600" height="480" fill="#fff"/>
  <text x="300" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Pea Flower Structure &amp; Cross-Pollination</text>

  <!-- Stem -->
  <rect x="140" y="50" width="8" height="80" rx="3" fill="#43a047"/>
  <!-- Receptacle -->
  <ellipse cx="144" cy="130" rx="18" ry="10" fill="#81c784"/>

  <!-- Sepals -->
  <path d="M126,125 Q100,105 110,95 Q122,105 132,115Z" fill="#66bb6a"/>
  <path d="M162,125 Q188,105 178,95 Q166,105 156,115Z" fill="#66bb6a"/>

  <!-- Petals -->
  <ellipse cx="110" cy="95" rx="22" ry="28" fill="#e8a0bf" stroke="#c48ba8" stroke-width="1.5"/>
  <ellipse cx="178" cy="95" rx="22" ry="28" fill="#e8a0bf" stroke="#c48ba8" stroke-width="1.5"/>
  <ellipse cx="144" cy="80" rx="26" ry="22" fill="#f0c0d8" stroke="#c48ba8" stroke-width="1.5"/>

  <!-- Stamens -->
  <line x1="144" y1="60" x2="125" y2="75" stroke="#ff8f00" stroke-width="2"/>
  <ellipse cx="123" cy="73" rx="6" ry="4" fill="#ffab40"/>
  <line x1="144" y1="62" x2="163" y2="75" stroke="#ff8f00" stroke-width="2"/>
  <ellipse cx="165" cy="73" rx="6" ry="4" fill="#ffab40"/>
  <line x1="144" y1="58" x2="144" y2="72" stroke="#ff8f00" stroke-width="2"/>
  <ellipse cx="144" cy="70" rx="6" ry="4" fill="#ffab40"/>

  <!-- Pistil/Carpel -->
  <rect x="142" y="38" width="4" height="25" fill="#6a1b9a"/>
  <ellipse cx="144" cy="38" rx="8" ry="5" fill="#9c4dcc"/>

  <!-- Labels for flower parts -->
  <line x1="125" y1="73" x2="60" y2="55" stroke="#333" stroke-width="1"/>
  <text x="30" y="55" text-anchor="end" font-family="Arial" font-size="13" font-weight="bold" fill="#ff8f00">Stamen (male)</text>
  <text x="30" y="70" text-anchor="end" font-family="Arial" font-size="11" fill="#555">produces pollen</text>

  <line x1="144" y1="38" x2="70" y2="118" stroke="#333" stroke-width="1"/>
  <text x="30" y="128" text-anchor="end" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">Carpel/Pistil</text>
  <text x="30" y="143" text-anchor="end" font-family="Arial" font-size="11" fill="#555">(female, contains ovules)</text>

  <line x1="120" y1="95" x2="30" y2="95" stroke="#333" stroke-width="1"/>
  <text x="30" y="98" text-anchor="end" font-family="Arial" font-size="12" fill="#c2185b">Petals</text>

  <!-- Divider -->
  <line x1="240" y1="40" x2="240" y2="140" stroke="#ddd" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Cross-pollination diagram -->
  <text x="440" y="60" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Cross-Pollination Process</text>

  <!-- Plant 1 -->
  <rect x="280" y="75" width="5" height="40" rx="2" fill="#43a047"/>
  <circle cx="282" cy="72" r="14" fill="#e8a0bf" stroke="#c48ba8" stroke-width="1"/>
  <text x="282" y="130" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Plant A</text>
  <text x="282" y="142" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(emasculated)</text>
  <text x="282" y="154" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">✂ stamens removed</text>

  <!-- Plant 2 -->
  <rect x="530" y="75" width="5" height="40" rx="2" fill="#43a047"/>
  <circle cx="532" cy="72" r="14" fill="#e8a0bf" stroke="#c48ba8" stroke-width="1"/>
  <text x="532" y="130" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Plant B</text>
  <text x="532" y="142" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(pollen donor)</text>
  <line x1="532" y1="60" x2="532" y2="55" stroke="#ff8f00" stroke-width="2"/>
  <text x="532" y="52" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff8f00">stamens intact</text>

  <!-- Arrow from Plant B stamen to Plant A carpel -->
  <path d="M520,68 Q400,45 298,68" fill="none" stroke="#e53935" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="410" y="42" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e53935">pollen transfer</text>
  <polygon points="298,68 306,63 306,73" fill="#e53935"/>

  <!-- Step-by-step below -->
  <rect x="60" y="200" width="480" height="260" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="225" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#1a6b3c">Mendel's Cross-Pollination Method</text>

  <circle cx="100" cy="250" r="12" fill="#1a6b3c"/><text x="100" y="255" text-anchor="middle" font-family="Arial" font-size="12" fill="#fff" font-weight="bold">1</text>
  <text x="120" y="255" font-family="Arial" font-size="13" fill="#333">Remove stamens from recipient flower (emasculation)</text>

  <circle cx="100" cy="285" r="12" fill="#1a6b3c"/><text x="100" y="290" text-anchor="middle" font-family="Arial" font-size="12" fill="#fff" font-weight="bold">2</text>
  <text x="120" y="290" font-family="Arial" font-size="13" fill="#333">Collect pollen from donor flower's stamens with a brush</text>

  <circle cx="100" cy="320" r="12" fill="#1a6b3c"/><text x="100" y="325" text-anchor="middle" font-family="Arial" font-size="12" fill="#fff" font-weight="bold">3</text>
  <text x="120" y="325" font-family="Arial" font-size="13" fill="#333">Transfer pollen to carpel/stigma of recipient flower</text>

  <circle cx="100" cy="355" r="12" fill="#1a6b3c"/><text x="100" y="360" text-anchor="middle" font-family="Arial" font-size="12" fill="#fff" font-weight="bold">4</text>
  <text x="120" y="360" font-family="Arial" font-size="13" fill="#333">Cover flower to prevent other pollen contamination</text>

  <circle cx="100" cy="390" r="12" fill="#1a6b3c"/><text x="100" y="395" text-anchor="middle" font-family="Arial" font-size="12" fill="#fff" font-weight="bold">5</text>
  <text x="120" y="395" font-family="Arial" font-size="13" fill="#333">Seeds develop → plant them → observe offspring (F₁ generation)</text>

  <circle cx="100" cy="425" r="12" fill="#1a6b3c"/><text x="100" y="430" text-anchor="middle" font-family="Arial" font-size="12" fill="#fff" font-weight="bold">6</text>
  <text x="120" y="430" font-family="Arial" font-size="13" fill="#333">Self-pollinate F₁ → observe F₂ for 3:1 ratio</text>
</svg>
