<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#fff"/>
  <text x="300" y="24" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#1a6b3c">mRNA Processing in Eukaryotes</text>
  <text x="300" y="42" text-anchor="middle" font-family="Arial" font-size="10" fill="#666" font-style="italic">Pre-mRNA → mature mRNA: Capping, Polyadenylation, Splicing</text>

  <!-- Gene structure -->
  <text x="80" y="66" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Gene (DNA):</text>
  <rect x="180" y="56" width="80" height="16" rx="3" fill="#1565c0" opacity="0.7"/>
  <text x="220" y="68" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Exon 1</text>
  <line x1="260" y1="64" x2="290" y2="64" stroke="#333" stroke-width="2"/>
  <text x="275" y="58" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Intron</text>
  <rect x="290" y="56" width="70" height="16" rx="3" fill="#1565c0" opacity="0.7"/>
  <text x="325" y="68" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Exon 2</text>
  <line x1="360" y1="64" x2="390" y2="64" stroke="#333" stroke-width="2"/>
  <text x="375" y="58" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Intron</text>
  <rect x="390" y="56" width="60" height="16" rx="3" fill="#1565c0" opacity="0.7"/>
  <text x="420" y="68" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Exon 3</text>

  <!-- (a) Primary transcript -->
  <text x="300" y="96" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">(a) Primary transcript (pre-mRNA)</text>

  <rect x="180" y="104" width="80" height="16" rx="3" fill="#42a5f5" opacity="0.6"/>
  <text x="220" y="116" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Exon 1</text>
  <rect x="260" y="104" width="30" height="16" rx="2" fill="#ccc" opacity="0.6"/>
  <text x="275" y="116" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Int</text>
  <rect x="290" y="104" width="70" height="16" rx="3" fill="#42a5f5" opacity="0.6"/>
  <text x="325" y="116" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Exon 2</text>
  <rect x="360" y="104" width="30" height="16" rx="2" fill="#ccc" opacity="0.6"/>
  <text x="375" y="116" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Int</text>
  <rect x="390" y="104" width="60" height="16" rx="3" fill="#42a5f5" opacity="0.6"/>
  <text x="420" y="116" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Exon 3</text>

  <!-- 5' cap -->
  <rect x="160" y="104" width="18" height="16" rx="2" fill="#e53935" opacity="0.7"/>
  <text x="169" y="116" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">Cap</text>

  <!-- Poly-A -->
  <rect x="452" y="104" width="40" height="16" rx="2" fill="#ff8f00" opacity="0.6"/>
  <text x="472" y="116" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">AAA...</text>

  <!-- (b) Splicing -->
  <text x="300" y="148" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">(b) Splicing — Spliceosome removes introns</text>

  <!-- Spliceosome -->
  <ellipse cx="305" cy="190" rx="55" ry="30" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="305" y="186" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c" font-weight="bold">Spliceosome</text>
  <text x="305" y="198" text-anchor="middle" font-family="Arial" font-size="7" fill="#1a6b3c">(snRNPs + snRNAs)</text>

  <!-- Intron forming lariat -->
  <path d="M260,160 Q280,170 275,190 Q270,210 290,200" fill="none" stroke="#e53935" stroke-width="2"/>
  <path d="M360,160 Q350,170 355,190 Q360,210 340,200" fill="none" stroke="#e53935" stroke-width="2"/>
  <text x="305" y="170" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Introns removed</text>
  <text x="305" y="220" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">as lariat — degraded</text>

  <!-- (c) Mature mRNA -->
  <text x="300" y="248" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">(c) Mature mRNA (ready for export)</text>

  <rect x="160" y="256" width="18" height="16" rx="2" fill="#e53935" opacity="0.7"/>
  <text x="169" y="268" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">Cap</text>

  <rect x="180" y="256" width="80" height="16" rx="3" fill="#42a5f5" opacity="0.7"/>
  <text x="220" y="268" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Exon 1</text>
  <rect x="262" y="256" width="70" height="16" rx="3" fill="#42a5f5" opacity="0.7"/>
  <text x="297" y="268" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Exon 2</text>
  <rect x="334" y="256" width="60" height="16" rx="3" fill="#42a5f5" opacity="0.7"/>
  <text x="364" y="268" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Exon 3</text>

  <rect x="396" y="256" width="40" height="16" rx="2" fill="#ff8f00" opacity="0.6"/>
  <text x="416" y="268" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">AAAA</text>

  <!-- Big arrow -->
  <text x="300" y="290" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">→ Exported through nuclear pore → Cytoplasm → Translation</text>

  <!-- Alternative splicing section -->
  <line x1="30" y1="310" x2="570" y2="310" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="330" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Alternative Splicing: One Gene → Multiple Proteins</text>

  <!-- Pre-mRNA -->
  <text x="60" y="356" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Pre-mRNA:</text>
  <rect x="140" y="348" width="60" height="16" rx="3" fill="#1565c0" opacity="0.6"/>
  <text x="170" y="360" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Exon 1</text>
  <rect x="202" y="348" width="60" height="16" rx="3" fill="#43a047" opacity="0.6"/>
  <text x="232" y="360" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Exon 2</text>
  <rect x="264" y="348" width="60" height="16" rx="3" fill="#ff8f00" opacity="0.6"/>
  <text x="294" y="360" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Exon 3</text>
  <rect x="326" y="348" width="60" height="16" rx="3" fill="#6a1b9a" opacity="0.6"/>
  <text x="356" y="360" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Exon 4</text>

  <!-- Arrow down -->
  <line x1="250" y1="368" x2="250" y2="388" stroke="#333" stroke-width="1.5"/>
  <text x="235" y="382" font-family="Arial" font-size="8" fill="#333">Splicing</text>

  <!-- Protein A -->
  <text x="60" y="402" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Protein A:</text>
  <rect x="140" y="394" width="60" height="16" rx="3" fill="#1565c0" opacity="0.7"/>
  <rect x="202" y="394" width="60" height="16" rx="3" fill="#43a047" opacity="0.7"/>
  <rect x="264" y="394" width="60" height="16" rx="3" fill="#ff8f00" opacity="0.7"/>
  <rect x="326" y="394" width="60" height="16" rx="3" fill="#6a1b9a" opacity="0.7"/>
  <text x="420" y="406" font-family="Arial" font-size="9" fill="#555">All 4 exons</text>

  <!-- Protein B -->
  <text x="60" y="428" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Protein B:</text>
  <rect x="140" y="420" width="60" height="16" rx="3" fill="#1565c0" opacity="0.7"/>
  <rect x="202" y="420" width="60" height="16" rx="3" fill="#43a047" opacity="0.7"/>
  <rect x="326" y="420" width="60" height="16" rx="3" fill="#6a1b9a" opacity="0.7"/>
  <text x="420" y="432" font-family="Arial" font-size="9" fill="#e53935">Exon 3 skipped</text>

  <!-- Protein C -->
  <text x="60" y="454" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Protein C:</text>
  <rect x="140" y="446" width="60" height="16" rx="3" fill="#1565c0" opacity="0.7"/>
  <rect x="264" y="446" width="60" height="16" rx="3" fill="#ff8f00" opacity="0.7"/>
  <rect x="326" y="446" width="60" height="16" rx="3" fill="#6a1b9a" opacity="0.7"/>
  <text x="420" y="458" font-family="Arial" font-size="9" fill="#e53935">Exon 2 skipped</text>

  <!-- Info box -->
  <rect x="30" y="475" width="540" height="55" rx="6" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="300" y="495" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">In humans: ~20,000 genes → >100,000 proteins. ~95% of multi-exon genes undergo alternative splicing.</text>
  <text x="300" y="515" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Key to proteomic diversity! The Dscam gene in Drosophila can produce 38,016 variants.</text>

  <!-- Splicing signals -->
  <rect x="30" y="540" width="540" height="50" rx="4" fill="none" stroke="#ccc" stroke-width="1"/>
  <text x="300" y="558" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Splicing signals: 5' splice site = GU (start of intron) | 3' splice site = AG (end of intron)</text>
  <text x="300" y="576" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Branch point A (within intron) attacks 5' splice site → lariat formation → exon joining</text>
</svg>
