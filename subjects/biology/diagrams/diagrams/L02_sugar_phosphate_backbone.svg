<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420">
  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#1a6b3c">Sugar-Phosphate Backbone &amp; Phosphodiester Bonds</text>

  <!-- Backbone (vertical) -->
  <rect x="100" y="60" width="40" height="60" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="120" y="96" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#1565c0">P</text>

  <rect x="105" y="140" width="30" height="50" rx="4" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="120" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#43a047">S</text>

  <!-- Phosphodiester bond -->
  <line x1="120" y1="120" x2="120" y2="140" stroke="#ff8f00" stroke-width="3"/>
  <text x="65" y="134" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ff8f00">phosphodiester</text>

  <rect x="100" y="210" width="40" height="60" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="120" y="246" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#1565c0">P</text>

  <rect x="105" y="290" width="30" height="50" rx="4" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="120" y="320" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#43a047">S</text>

  <line x1="120" y1="270" x2="120" y2="290" stroke="#ff8f00" stroke-width="3"/>

  <rect x="100" y="360" width="40" height="40" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="120" y="385" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#1565c0">P</text>

  <line x1="120" y1="340" x2="120" y2="360" stroke="#ff8f00" stroke-width="3"/>

  <!-- Bases projecting right -->
  <!-- Base 1 -->
  <rect x="135" y="145" width="80" height="40" rx="4" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
  <text x="175" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#e53935">Base 1</text>

  <!-- Base 2 -->
  <rect x="135" y="295" width="80" height="40" rx="4" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
  <text x="175" y="320" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#e53935">Base 2</text>

  <!-- Vertical line connecting P-S-P-S -->
  <line x1="120" y1="80" x2="120" y2="190" stroke="#1a6b3c" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="120" y1="230" x2="120" y2="380" stroke="#1a6b3c" stroke-width="1.5" stroke-dasharray="2,2"/>

  <!-- Labels on right -->
  <text x="260" y="110" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#1a6b3c">Sugar-phosphate</text>
  <text x="260" y="128" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#1a6b3c">backbone</text>
  <line x1="250" y1="112" x2="140" y2="80" stroke="#555" stroke-width="1"/>

  <text x="260" y="170" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#6a1b9a">Bases projecting</text>
  <text x="260" y="188" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#6a1b9a">outward</text>
  <line x1="250" y1="175" x2="215" y2="165" stroke="#555" stroke-width="1"/>

  <!-- Key -->
  <rect x="370" y="100" width="16" height="16" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="392" y="113" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#333">P = Phosphate</text>
  <rect x="370" y="122" width="16" height="16" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="392" y="135" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#333">S = Sugar</text>

  <text x="300" y="405" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#555">Phosphodiester bonds link 5′ phosphate of one nucleotide to 3′ OH of the next</text>
</svg>
