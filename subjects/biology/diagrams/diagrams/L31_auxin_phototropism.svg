<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 630" width="600" height="630">
  <defs><marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#333"/></marker></defs>
  <rect width="600" height="630" fill="#fff" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1a6b3c">Auxin Phototropism — Cholodny-Went &amp; Acid Growth Hypothesis</text>

  <!-- Darwin experiment -->
  <rect x="20" y="55" width="170" height="170" rx="8" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="105" y="76" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1a6b3c">Darwin (1880)</text>
  <text x="105" y="93" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Coleoptile experiment</text>

  <!-- Plant with tip -->
  <rect x="70" y="105" width="10" height="60" fill="#81c784"/>
  <ellipse cx="75" cy="105" rx="15" ry="8" fill="#43a047"/>
  <!-- Light -->
  <text x="55" y="115" font-family="Arial" font-size="12" fill="#ff8f00">☀</text>
  <line x1="60" y1="110" x2="70" y2="108" stroke="#ff8f00" stroke-width="2"/>
  <!-- Bending -->
  <path d="M75,165 Q75,180 85,190" fill="none" stroke="#333" stroke-width="2"/>
  <text x="90" y="200" font-family="Arial" font-size="7" fill="#555">Tip detects light</text>
  <text x="90" y="212" font-family="Arial" font-size="7" fill="#555">Signal travels down</text>

  <!-- Cholodny-Went -->
  <rect x="210" y="55" width="370" height="170" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="395" y="76" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">Cholodny-Went Hypothesis</text>
  <text x="395" y="93" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Auxin (IAA) redistributes to shaded side</text>

  <!-- Shoot tip diagram -->
  <ellipse cx="395" cy="140" rx="80" ry="30" fill="#c8e6c9" stroke="#333" stroke-width="1.5"/>
  <rect x="375" y="140" width="40" height="70" fill="#a5d6a7" stroke="#333" stroke-width="1"/>

  <!-- Light from left -->
  <text x="305" y="135" font-family="Arial" font-size="14" fill="#ff8f00">☀</text>
  <line x1="312" y1="130" x2="335" y2="135" stroke="#ff8f00" stroke-width="2"/>
  <line x1="312" y1="140" x2="335" y2="140" stroke="#ff8f00" stroke-width="2"/>

  <!-- Auxin on shaded side (right) -->
  <circle cx="430" cy="150" r="3" fill="#1565c0"/>
  <circle cx="440" cy="155" r="3" fill="#1565c0"/>
  <circle cx="442" cy="145" r="3" fill="#1565c0"/>
  <circle cx="435" cy="160" r="3" fill="#1565c0"/>
  <circle cx="448" cy="150" r="3" fill="#1565c0"/>

  <!-- Auxin on illuminated side (left) - fewer -->
  <circle cx="365" cy="148" r="3" fill="#90caf9"/>
  <circle cx="358" cy="155" r="3" fill="#90caf9"/>

  <text x="430" y="178" font-family="Arial" font-size="8" fill="#1565c0" font-weight="bold">↑ Auxin</text>
  <text x="358" y="178" font-family="Arial" font-size="8" fill="#90caf9">↓ Auxin</text>

  <text x="395" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Shaded side: cells elongate MORE → bends toward light</text>

  <!-- Acid Growth -->
  <rect x="20" y="250" width="560" height="180" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="300" y="275" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#ff8f00">Acid Growth Hypothesis — Mechanism of Auxin Action</text>

  <!-- Cell wall sub-diagram -->
  <rect x="50" y="295" width="500" height="120" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>

  <!-- Step numbers -->
  <text x="65" y="315" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">①</text>
  <text x="85" y="315" font-family="Arial" font-size="9" fill="#333">Auxin (IAA) binds TIR1/AFB receptor</text>

  <text x="65" y="335" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">②</text>
  <text x="85" y="335" font-family="Arial" font-size="9" fill="#333">Activates H⁺-ATPase proton pumps in PM</text>

  <text x="65" y="355" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">③</text>
  <text x="85" y="355" font-family="Arial" font-size="9" fill="#333">H⁺ pumped into cell wall → pH drops (acidifies apoplast)</text>

  <text x="65" y="375" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">④</text>
  <text x="85" y="375" font-family="Arial" font-size="9" fill="#333">Low pH activates EXPANSIN proteins → break H-bonds (cellulose-hemicellulose)</text>

  <text x="65" y="395" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">⑤</text>
  <text x="85" y="395" font-family="Arial" font-size="9" fill="#333">Cell wall loosens → turgor pressure expands cell → ELONGATION</text>

  <!-- Bottom comparison -->
  <rect x="20" y="455" width="560" height="80" rx="8" fill="#e8eaf6" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="300" y="478" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">Shoot vs Root Response to Auxin</text>
  <text x="160" y="500" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">Shoots: High auxin → ↑ elongation</text>
  <text x="430" y="500" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Roots: High auxin → ↓ elongation (inhibits)</text>
  <text x="300" y="522" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">Shoots: positive phototropism (grow toward light) | Roots: negative phototropism (grow away)</text>

  <!-- Exam tip -->
  <rect x="20" y="550" width="560" height="30" rx="6" fill="#ffcdd2" stroke="#e53935" stroke-width="1"/>
  <text x="300" y="570" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">⚠ IB Trick: Phototropism question may ask about ROOTS — opposite response to auxin!</text>
</svg>
