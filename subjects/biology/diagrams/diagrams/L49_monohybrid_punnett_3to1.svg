<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480">
  <rect width="600" height="480" fill="#fff"/>
  <text x="300" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Monohybrid Cross — P → F₁ → F₂ (3:1 Ratio)</text>

  <!-- P generation -->
  <text x="300" y="60" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e53935">P Generation: True-breeding</text>
  <rect x="130" y="72" width="80" height="50" rx="8" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="170" y="95" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1a6b3c">TT</text>
  <text x="170" y="113" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Tall</text>
  <text x="170" y="145" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">Gametes: all T</text>

  <text x="300" y="97" text-anchor="middle" font-family="Arial" font-size="20">×</text>

  <rect x="390" y="72" width="80" height="50" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#e53935">tt</text>
  <text x="430" y="113" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Dwarf</text>
  <text x="430" y="145" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">Gametes: all t</text>

  <!-- Arrow -->
  <line x1="300" y1="160" x2="300" y2="185" stroke="#333" stroke-width="2"/>
  <polygon points="300,185 294,178 306,178" fill="#333"/>

  <!-- F1 -->
  <text x="300" y="205" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">F₁ Generation: All heterozygous</text>
  <rect x="230" y="215" width="140" height="50" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="300" y="238" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1565c0">Tt (all Tall)</text>
  <text x="300" y="256" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Gametes: T and t (1:1)</text>

  <!-- Arrow -->
  <line x1="300" y1="275" x2="300" y2="300" stroke="#333" stroke-width="2"/>
  <polygon points="300,300 294,293 306,293" fill="#333"/>
  <text x="300" y="295" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">Self-pollinate</text>

  <!-- F2 Punnett square -->
  <text x="300" y="322" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#6a1b9a">F₂ Generation: Tt × Tt</text>

  <!-- Punnett grid -->
  <rect x="200" y="335" width="200" height="135" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="200" y1="370" x2="400" y2="370" stroke="#333" stroke-width="1"/>
  <line x1="200" y1="405" x2="400" y2="405" stroke="#333" stroke-width="1"/>
  <line x1="270" y1="335" x2="270" y2="470" stroke="#333" stroke-width="1"/>
  <line x1="335" y1="335" x2="335" y2="470" stroke="#333" stroke-width="1"/>

  <text x="235" y="360" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">T</text>
  <text x="300" y="360" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">t</text>
  <text x="185" y="392" text-anchor="end" font-family="Arial" font-size="13" fill="#333">T</text>
  <text x="185" y="427" text-anchor="end" font-family="Arial" font-size="13" fill="#333">t</text>

  <rect x="275" y="373" width="55" height="30" rx="4" fill="#a5d6a7"/>
  <text x="302" y="393" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#1a6b3c">TT</text>

  <rect x="340" y="373" width="55" height="30" rx="4" fill="#c8e6c9"/>
  <text x="367" y="393" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#43a047">Tt</text>

  <rect x="275" y="408" width="55" height="30" rx="4" fill="#c8e6c9"/>
  <text x="302" y="428" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#43a047">Tt</text>

  <rect x="340" y="408" width="55" height="30" rx="4" fill="#ffcdd2"/>
  <text x="367" y="428" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#e53935">tt</text>

  <!-- Ratio summary -->
  <rect x="50" y="335" width="130" height="135" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="115" y="358" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Results:</text>
  <text x="115" y="380" text-anchor="middle" font-family="Arial" font-size="12" fill="#1a6b3c"><tspan font-weight="bold">Genotypic ratio:</tspan></text>
  <text x="115" y="400" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">1 TT : 2 Tt : 1 tt</text>
  <text x="115" y="422" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935"><tspan font-weight="bold">Phenotypic ratio:</tspan></text>
  <text x="115" y="442" text-anchor="middle" font-family="Arial" font-size="12" fill="#e53935" font-weight="bold">3 Tall : 1 Dwarf</text>

  <rect x="420" y="335" width="155" height="135" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="1"/>
  <text x="497" y="355" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ff8f00">Key Points:</text>
  <text x="497" y="376" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• ¾ Tall (TT or Tt)</text>
  <text x="497" y="394" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• ¼ Dwarf (tt)</text>
  <text x="497" y="412" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• Dominant trait appears in</text>
  <text x="497" y="428" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">  ¾ of F₂ offspring</text>
  <text x="497" y="448" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">• Recessive reappears in ¼</text>
</svg>
