<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs><style>text { font-family: Arial, sans-serif; } .title { font-size: 18px; font-weight: bold; fill: #1a6b3c; text-anchor: middle; } .lab { font-size: 13px; fill: #333; text-anchor: middle; } .sm { font-size: 11px; fill: #555; text-anchor: middle; }</style></defs>
  <rect width="600" height="500" fill="#fff"/>
  <text x="300" y="28" class="title">Peptide Bond Formation — Condensation Reaction</text>

  <!-- Amino Acid 1 -->
  <text x="140" y="60" class="lab" fill="#1565c0" font-weight="bold">Amino Acid 1 (N-terminus)</text>
  <circle cx="140" cy="110" r="18" fill="#e3f2fd" stroke="#1565c0" stroke-width="2.5"/>
  <text x="140" y="114" class="sm" fill="#1565c0">Cα</text>
  <!-- AA1 groups -->
  <text x="60" y="105" class="sm" fill="#43a047">⁺H₃N</text>
  <line x1="122" y1="110" x2="80" y2="110" stroke="#43a047" stroke-width="2"/>
  <text x="120" y="85" class="sm" fill="#999">H</text>
  <line x1="140" y1="92" x2="140" y2="50" stroke="#999" stroke-width="2"/>
  <text x="158" y="128" class="sm" fill="#6a1b9a">R₁</text>
  <line x1="140" y1="128" x2="140" y2="160" stroke="#6a1b9a" stroke-width="2"/>

  <!-- Carboxyl highlighted -->
  <text x="160" y="155" class="sm" fill="#e53935">— C — OH</text>
  <line x1="155" y1="148" x2="155" y2="165" stroke="#e53935" stroke-width="2"/>
  <text x="180" y="160" class="sm" fill="#e53935">║</text>
  <text x="180" y="157" class="sm" fill="#e53935">O</text>
  <line x1="140" y1="110" x2="195" y2="148" stroke="#333" stroke-width="2"/>

  <!-- + symbol -->
  <text x="290" y="140" class="lab" fill="#333" font-size="20">+</text>

  <!-- Amino Acid 2 -->
  <text x="430" y="60" class="lab" fill="#1565c0" font-weight="bold">Amino Acid 2 (C-terminus)</text>
  <circle cx="430" cy="110" r="18" fill="#e3f2fd" stroke="#1565c0" stroke-width="2.5"/>
  <text x="430" y="114" class="sm" fill="#1565c0">Cα</text>
  <!-- AA2 groups -->
  <text x="370" y="105" class="sm" fill="#43a047">H — N</text>
  <line x1="412" y1="110" x2="355" y2="110" stroke="#43a047" stroke-width="2"/>
  <text x="410" y="85" class="sm" fill="#999">H</text>
  <line x1="430" y1="92" x2="430" y2="50" stroke="#999" stroke-width="2"/>
  <text x="450" y="128" class="sm" fill="#6a1b9a">R₂</text>
  <line x1="430" y1="128" x2="430" y2="160" stroke="#6a1b9a" stroke-width="2"/>
  <text x="455" y="155" class="sm" fill="#e53935">— COO⁻</text>
  <line x1="430" y1="110" x2="490" y2="148" stroke="#333" stroke-width="2"/>

  <!-- Arrow -->
  <polygon points="300,190 310,200 300,210 310,200 300,190" fill="#1a6b3c"/>
  <line x1="290" y1="200" x2="310" y2="200" stroke="#1a6b3c" stroke-width="2"/>
  <text x="300" y="215" class="sm" fill="#1a6b3c">condensation</text>

  <!-- Water removed -->
  <text x="200" y="240" class="lab" fill="#e53935" font-weight="bold">H₂O removed</text>
  <circle cx="200" cy="270" r="22" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="200" y="275" class="sm" fill="#e53935" font-weight="bold">H₂O</text>
  <text x="200" y="310" class="sm">–OH from carboxyl</text>
  <text x="200" y="325" class="sm">+ –H from amino group</text>

  <!-- Product -->
  <text x="300" y="365" class="lab" fill="#1a6b3c" font-weight="bold">Result: Dipeptide with Peptide Bond</text>
  <rect x="60" y="380" width="480" height="80" rx="8" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="300" y="400" class="lab" fill="#1a6b3c">⁺H₃N—CHR₁—CO—NH—CHR₂—COO⁻</text>
  <line x1="280" y1="406" x2="320" y2="406" stroke="#e53935" stroke-width="3"/>
  <text x="300" y="420" class="sm" fill="#e53935" font-weight="bold">↑ Peptide bond (amide linkage)</text>
  <text x="300" y="442" class="sm">N-terminus → C-terminus directionality</text>
</svg>
