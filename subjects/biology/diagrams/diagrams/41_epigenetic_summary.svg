<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460">
  <rect width="600" height="460" fill="#fff"/>
  <text x="300" y="24" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#1a6b3c">Epigenetic Modifications &amp; Post-Translational Control</text>
  <text x="300" y="42" text-anchor="middle" font-family="Arial" font-size="10" fill="#666" font-style="italic">Layers of gene regulation beyond the DNA sequence</text>

  <!-- Epigenetic marks summary -->
  <text x="300" y="68" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Epigenetic Modifications Overview</text>

  <!-- DNA methylation -->
  <rect x="25" y="78" width="170" height="100" rx="6" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5"/>
  <text x="110" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0" font-weight="bold">DNA Methylation</text>
  <circle cx="110" cy="125" r="10" fill="#e53935" opacity="0.3" stroke="#e53935" stroke-width="1.5"/>
  <text x="110" y="128" text-anchor="middle" font-family="Arial" font-size="7" fill="#e53935">CH₃</text>
  <text x="110" y="148" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">At CpG islands</text>
  <text x="110" y="162" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">→ Gene repression</text>
  <text x="110" y="174" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">Stable, heritable</text>

  <!-- Histone acetylation -->
  <rect x="215" y="78" width="170" height="100" rx="6" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="300" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c" font-weight="bold">Histone Acetylation</text>
  <rect x="280" y="115" width="16" height="10" rx="2" fill="#43a047" opacity="0.5"/>
  <text x="288" y="123" text-anchor="middle" font-family="Arial" font-size="6" fill="#fff">Ac</text>
  <text x="300" y="148" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">On lysine tails</text>
  <text x="300" y="162" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">→ Gene activation</text>
  <text x="300" y="174" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">Dynamic, reversible</text>

  <!-- Histone methylation -->
  <rect x="405" y="78" width="170" height="100" rx="6" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="490" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a" font-weight="bold">Histone Methylation</text>
  <circle cx="490" cy="125" r="10" fill="#6a1b9a" opacity="0.3" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="490" y="128" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Me</text>
  <text x="490" y="148" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Arginine or lysine</text>
  <text x="490" y="162" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Activation OR repression</text>
  <text x="490" y="174" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">Context-dependent</text>

  <!-- Post-translational modifications -->
  <text x="300" y="205" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Post-Translational Modifications of Proteins</text>
  <text x="300" y="218" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">After translation, proteins may be chemically modified to control activity/localization</text>

  <!-- PTM types -->
  <rect x="25" y="228" width="130" height="65" rx="5" fill="#fff3e0" stroke="#ffcc80" stroke-width="1"/>
  <text x="90" y="248" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff8f00" font-weight="bold">Phosphorylation</text>
  <text x="90" y="264" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Add PO₄ (kinase)</text>
  <text x="90" y="278" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Remove PO₄ (phosphatase)</text>
  <text x="90" y="290" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">Activates/deactivates</text>

  <rect x="165" y="228" width="130" height="65" rx="5" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="230" y="248" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c" font-weight="bold">Glycosylation</text>
  <text x="230" y="264" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Add sugar chains</text>
  <text x="230" y="278" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">ER/Golgi</text>
  <text x="230" y="290" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">Folding, signaling</text>

  <rect x="305" y="228" width="130" height="65" rx="5" fill="#e3f2fd" stroke="#90caf9" stroke-width="1"/>
  <text x="370" y="248" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0" font-weight="bold">Ubiquitination</text>
  <text x="370" y="264" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Add ubiquitin tag</text>
  <text x="370" y="278" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Targets for proteasome</text>
  <text x="370" y="290" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">Protein degradation</text>

  <rect x="445" y="228" width="130" height="65" rx="5" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1"/>
  <text x="510" y="248" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a" font-weight="bold">Proteolysis</text>
  <text x="510" y="264" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Cleavage of protein</text>
  <text x="510" y="278" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">e.g. proinsulin→insulin</text>
  <text x="510" y="290" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">Activation</text>

  <!-- Cell differentiation -->
  <text x="300" y="320" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Cell Differentiation: Same DNA, Different Expression</text>

  <!-- Stem cell dividing -->
  <rect x="60" y="338" width="60" height="50" rx="25" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="90" y="368" text-anchor="middle" font-family="Arial" font-size="8" fill="#1a6b3c" font-weight="bold">Stem</text>
  <text x="90" y="380" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Cell</text>

  <!-- Branches -->
  <line x1="120" y1="363" x2="180" y2="340" stroke="#333" stroke-width="1.5"/>
  <line x1="120" y1="363" x2="180" y2="375" stroke="#333" stroke-width="1.5"/>
  <line x1="120" y1="363" x2="180" y2="410" stroke="#333" stroke-width="1.5"/>

  <!-- Neuron -->
  <rect x="182" y="325" width="120" height="30" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="242" y="340" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0" font-weight="bold">Neuron</text>
  <text x="242" y="352" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Expresses: neurofilaments,</text>
  <text x="242" y="354" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">ion channels, synapsin</text>

  <!-- Muscle -->
  <rect x="182" y="360" width="120" height="30" rx="5" fill="#ffebee" stroke="#e53935" stroke-width="1.5"/>
  <text x="242" y="375" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">Myocyte</text>
  <text x="242" y="387" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Expresses: myosin, actin,</text>
  <text x="242" y="389" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">creatine kinase</text>

  <!-- Liver -->
  <rect x="182" y="395" width="120" height="30" rx="5" fill="#fff3e0" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="242" y="410" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff8f00" font-weight="bold">Hepatocyte</text>
  <text x="242" y="422" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Expresses: albumin,</text>
  <text x="242" y="424" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">cytochrome P450</text>

  <!-- Same DNA note -->
  <rect x="345" y="335" width="220" height="90" rx="6" fill="#e8eaf6" stroke="#c5cae9" stroke-width="1.5"/>
  <text x="455" y="358" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a" font-weight="bold">ALL cells have same genome</text>
  <text x="455" y="378" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Differentiation = selective</text>
  <text x="455" y="394" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">expression of different gene sets</text>
  <text x="455" y="412" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">~30-40% of genes expressed</text>
  <text x="455" y="424" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">Same DNA, different epigenome</text>

  <!-- Bottom principle -->
  <rect x="25" y="435" width="550" height="18" rx="3" fill="#1a6b3c" opacity="0.12" stroke="#81c784" stroke-width="1"/>
  <text x="300" y="449" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c" font-weight="bold">Genome = all cells identical | Transcriptome/Proteome = cell-type specific | Epigenome = key to differentiation</text>
</svg>
