<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 630" width="600" height="630">
  <defs><marker id="ar" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#333"/></marker></defs>
  <rect width="600" height="630" fill="#fff" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1a6b3c">C4 Pathway — Spatial CO₂ Concentration (Hatch-Slack)</text>

  <!-- Mesophyll Cell -->
  <rect x="30" y="70" width="250" height="300" rx="14" fill="#e3f2fd" stroke="#1565c0" stroke-width="2.5"/>
  <text x="155" y="95" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">Mesophyll Cell</text>

  <!-- Bundle Sheath Cell -->
  <rect x="320" y="70" width="250" height="300" rx="14" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="445" y="95" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">Bundle Sheath Cell</text>

  <!-- Plasmodesmata -->
  <text x="300" y="180" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">plasmodesmata</text>
  <line x1="280" y1="185" x2="320" y2="185" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="280" y1="288" x2="320" y2="288" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="280" y1="350" x2="320" y2="350" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- CO2 entry -->
  <text x="60" y="115" font-family="Arial" font-size="11" fill="#e53935" font-weight="bold">CO₂</text>
  <line x1="55" y1="120" x2="55" y2="150" stroke="#e53935" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Carbonic anhydrase -->
  <rect x="50" y="150" width="100" height="30" rx="5" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="100" y="163" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">CO₂ → HCO₃⁻</text>
  <text x="100" y="176" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">(carbonic anhydrase)</text>

  <!-- PEP carboxylase -->
  <line x1="100" y1="180" x2="100" y2="210" stroke="#333" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="40" y="210" width="120" height="40" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="100" y="226" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1565c0">PEP + HCO₃⁻ → OAA</text>
  <text x="100" y="242" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">PEP carboxylase</text>

  <text x="185" y="235" font-family="Arial" font-size="8" fill="#888">3C→4C</text>

  <!-- OAA → Malate -->
  <line x1="100" y1="250" x2="100" y2="280" stroke="#333" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="55" y="280" width="90" height="25" rx="5" fill="#fff9c4" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="100" y="296" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">OAA → Malate</text>

  <!-- Malate transport to BS -->
  <line x1="155" y1="292" x2="320" y2="240" stroke="#333" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="240" y="258" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">Malate →</text>

  <!-- Bundle Sheath: decarboxylation -->
  <rect x="350" y="220" width="190" height="45" rx="6" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="445" y="237" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1a6b3c">Malate → Pyruvate + CO₂</text>
  <text x="445" y="255" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">(decarboxylation: NADP-ME)</text>

  <!-- CO2 to Calvin -->
  <line x1="445" y1="265" x2="445" y2="310" stroke="#e53935" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="465" y="290" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">HIGH [CO₂]</text>

  <!-- Calvin Cycle -->
  <rect x="370" y="310" width="150" height="50" rx="8" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="445" y="328" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">Calvin Cycle</text>
  <text x="445" y="344" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">RuBisCO fixes CO₂</text>
  <text x="445" y="356" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">(no photorespiration!)</text>

  <!-- Pyruvate return -->
  <line x1="320" y1="290" x2="250" y2="340" stroke="#333" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="270" y="318" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">← Pyruvate</text>

  <!-- PEP regeneration -->
  <rect x="35" y="330" width="130" height="30" rx="6" fill="#fff9c4" stroke="#ff8f00" stroke-width="2"/>
  <text x="100" y="349" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#333">Pyruvate → PEP</text>
  <text x="100" y="358" text-anchor="middle" font-family="Arial" font-size="7" fill="#e53935">(+ ATP → AMP + PPᵢ)</text>

  <!-- Bottom section -->
  <!-- Energy cost -->
  <rect x="30" y="400" width="540" height="65" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="300" y="422" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#ff8f00">Energy Cost Comparison</text>
  <text x="200" y="445" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">C3: 3 ATP + 2 NADPH / CO₂</text>
  <text x="400" y="445" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935">C4: 5 ATP + 2 NADPH / CO₂</text>
  <text x="300" y="460" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Extra 2 ATP for pyruvate phosphate dikinase (PEP regeneration)</text>

  <!-- Key Points -->
  <rect x="30" y="480" width="540" height="140" rx="6" fill="#e8eaf6" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="300" y="502" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">Key Features of C4</text>
  <text x="55" y="525" font-family="Arial" font-size="10" fill="#333">• PEP carboxylase fixes HCO₃⁻ → OAA (4C) in mesophyll — NO oxygenase activity</text>
  <text x="55" y="545" font-family="Arial" font-size="10" fill="#333">• Malate transported to bundle sheath → decarboxylated → CO₂ concentrated 10–100×</text>
  <text x="55" y="565" font-family="Arial" font-size="10" fill="#333">• High [CO₂] saturates RuBisCO → virtually no photorespiration</text>
  <text x="55" y="585" font-family="Arial" font-size="10" fill="#333">• Higher ATP cost but net advantage in hot/dry conditions (30–45°C optimum)</text>
  <text x="55" y="605" font-family="Arial" font-size="10" fill="#333">• Examples: Maize, sugarcane, sorghum (~3% of plant species, ~25% of global productivity)</text>
</svg>
