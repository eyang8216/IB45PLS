<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 680" width="600" height="680">
  <defs><marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#333"/></marker></defs>
  <rect width="600" height="680" fill="#fff" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#6a1b9a">Chemical Synapse — Step-by-Step Transmission</text>

  <!-- Presynaptic terminal -->
  <path d="M40,80 L200,80 L180,200 L40,220 Z" fill="#e3f2fd" stroke="#1565c0" stroke-width="2.5"/>
  <text x="115" y="105" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Presynaptic</text>
  <text x="115" y="122" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Terminal</text>

  <!-- AP arriving -->
  <text x="115" y="65" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">AP arrives ①</text>
  <line x1="115" y1="72" x2="115" y2="80" stroke="#e53935" stroke-width="2"/>

  <!-- Ca2+ channels -->
  <rect x="160" y="95" width="25" height="45" rx="4" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="172" y="115" text-anchor="middle" font-family="Arial" font-size="6" fill="#ff8f00">Ca²⁺</text>
  <text x="172" y="125" text-anchor="middle" font-family="Arial" font-size="6" fill="#ff8f00">ch</text>

  <!-- Ca2+ entering -->
  <line x1="195" y1="118" x2="170" y2="118" stroke="#ff8f00" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="195" y="112" font-family="Arial" font-size="8" fill="#ff8f00">② Ca²⁺</text>
  <text x="195" y="124" font-family="Arial" font-size="8" fill="#ff8f00">influx</text>

  <!-- Vesicles -->
  <circle cx="100" cy="140" r="12" fill="#fff9c4" stroke="#ff8f00" stroke-width="2"/>
  <text x="100" y="137" text-anchor="middle" font-family="Arial" font-size="6" fill="#333">NT</text>

  <circle cx="130" cy="155" r="12" fill="#fff9c4" stroke="#ff8f00" stroke-width="2"/>
  <text x="130" y="152" text-anchor="middle" font-family="Arial" font-size="6" fill="#333">NT</text>

  <circle cx="85" cy="165" r="12" fill="#fff9c4" stroke="#ff8f00" stroke-width="2"/>
  <text x="85" y="162" text-anchor="middle" font-family="Arial" font-size="6" fill="#333">NT</text>

  <circle cx="110" cy="180" r="12" fill="#fff9c4" stroke="#ff8f00" stroke-width="2"/>
  <text x="110" y="177" text-anchor="middle" font-family="Arial" font-size="6" fill="#333">NT</text>

  <!-- Mitochondria -->
  <ellipse cx="130" cy="95" rx="18" ry="10" fill="#fce4ec" stroke="#e53935" stroke-width="1.5"/>
  <text x="130" y="98" text-anchor="middle" font-family="Arial" font-size="7" fill="#e53935">ATP</text>

  <!-- Exocytosis -->
  <text x="115" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#333" font-weight="bold">③ Exocytosis</text>
  <text x="115" y="218" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">(SNARE proteins)</text>

  <!-- Synaptic cleft -->
  <rect x="200" y="180" width="80" height="55" fill="#f5f5f5" stroke="#ccc" stroke-width="1" rx="3"/>
  <text x="240" y="205" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">Synaptic Cleft</text>
  <text x="240" y="218" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">~20-30 nm</text>

  <!-- NT diffusing -->
  <circle cx="210" cy="195" r="4" fill="#ff8f00"/>
  <circle cx="220" cy="200" r="4" fill="#ff8f00"/>
  <circle cx="230" cy="198" r="4" fill="#ff8f00"/>
  <circle cx="240" cy="205" r="4" fill="#ff8f00"/>
  <circle cx="250" cy="202" r="4" fill="#ff8f00"/>
  <circle cx="260" cy="210" r="4" fill="#ff8f00"/>
  <text x="240" y="230" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">④ Diffusion</text>

  <!-- Postsynaptic membrane -->
  <path d="M280,80 L440,80 L460,200 L300,220 Z" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="375" y="105" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">Postsynaptic</text>
  <text x="375" y="122" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">Membrane</text>

  <!-- Receptors -->
  <rect x="300" y="140" width="20" height="40" rx="3" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="2"/>
  <rect x="340" y="150" width="20" height="40" rx="3" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="2"/>
  <rect x="380" y="135" width="20" height="40" rx="3" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="2"/>

  <text x="310" y="168" text-anchor="middle" font-family="Arial" font-size="6" fill="#333">Ligand-gated</text>
  <text x="390" y="168" text-anchor="middle" font-family="Arial" font-size="6" fill="#333">ion channels</text>

  <!-- NT binding -->
  <text x="360" y="200" font-family="Arial" font-size="8" fill="#333" font-weight="bold">⑤ NT binds receptor</text>

  <!-- Ion entry -->
  <text x="430" y="155" font-family="Arial" font-size="8" fill="#e53935">⑥ Na⁺ (EPSP)</text>
  <text x="430" y="168" font-family="Arial" font-size="8" fill="#1565c0">or Cl⁻ (IPSP)</text>

  <!-- Bottom: Steps summary -->
  <rect x="25" y="260" width="550" height="200" rx="8" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
  <text x="300" y="285" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Step-by-Step Mechanism</text>

  <line x1="25" y1="293" x2="575" y2="293" stroke="#ccc" stroke-width="1"/>

  <text x="40" y="313" font-family="Arial" font-size="9" font-weight="bold" fill="#e53935">①</text>
  <text x="58" y="313" font-family="Arial" font-size="9" fill="#333">AP depolarizes presynaptic terminal</text>
  <text x="40" y="330" font-family="Arial" font-size="9" font-weight="bold" fill="#ff8f00">②</text>
  <text x="58" y="330" font-family="Arial" font-size="9" fill="#333">Voltage-gated Ca²⁺ channels open → Ca²⁺ influx</text>
  <text x="40" y="347" font-family="Arial" font-size="9" font-weight="bold" fill="#333">③</text>
  <text x="58" y="347" font-family="Arial" font-size="9" fill="#333">Ca²⁺ triggers vesicle fusion → NT released by exocytosis (SNARE proteins)</text>
  <text x="40" y="364" font-family="Arial" font-size="9" font-weight="bold" fill="#333">④</text>
  <text x="58" y="364" font-family="Arial" font-size="9" fill="#333">NT diffuses across synaptic cleft (~20-30 nm, <1 ms)</text>
  <text x="40" y="381" font-family="Arial" font-size="9" font-weight="bold" fill="#333">⑤</text>
  <text x="58" y="381" font-family="Arial" font-size="9" fill="#333">NT binds to ligand-gated ion channels on postsynaptic membrane</text>
  <text x="40" y="398" font-family="Arial" font-size="9" font-weight="bold" fill="#333">⑥</text>
  <text x="58" y="398" font-family="Arial" font-size="9" fill="#333">Ion channels open → Na⁺ (EPSP/depolarization) or Cl⁻ (IPSP/hyperpolarization)</text>
  <text x="40" y="415" font-family="Arial" font-size="9" font-weight="bold" fill="#333">⑦</text>
  <text x="58" y="415" font-family="Arial" font-size="9" fill="#333">NT removed: enzyme degradation (AChE), reuptake, or diffusion</text>
  <text x="40" y="440" font-family="Arial" font-size="9" fill="#888">→ ACh at NMJ: acetylcholinesterase → acetate + choline | Reuptake for serotonin, dopamine, NE</text>

  <!-- EPSP vs IPSP -->
  <rect x="25" y="475" width="270" height="55" rx="6" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
  <text x="160" y="495" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e53935">EPSP (Excitatory)</text>
  <text x="160" y="512" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Na⁺ influx → depolarization → closer to threshold</text>
  <text x="160" y="526" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">Glutamate, ACh (nicotinic)</text>

  <rect x="305" y="475" width="270" height="55" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="440" y="495" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1565c0">IPSP (Inhibitory)</text>
  <text x="440" y="512" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Cl⁻ influx / K⁺ efflux → hyperpolarization</text>
  <text x="440" y="526" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">GABA, Glycine</text>

  <!-- Neonicotinoids -->
  <rect x="25" y="545" width="550" height="38" rx="6" fill="#fff3e0" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="300" y="562" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00" font-weight="bold">Neonicotinoids: Irreversibly bind insect nAChRs → persistent activation → paralysis</text>
  <text x="300" y="578" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">NOT degraded by AChE → depolarization block → bees: impaired navigation, colony collapse</text>
</svg>
