<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Fluid Mosaic Model of Cell Membrane</text>

  <!-- Phospholipid bilayer - top heads -->
  <g fill="#1a6b3c">
    <circle cx="40" cy="60" r="8"/><circle cx="80" cy="60" r="8"/><circle cx="120" cy="60" r="8"/>
    <circle cx="160" cy="60" r="8"/><circle cx="200" cy="60" r="8"/><circle cx="240" cy="60" r="8"/>
    <circle cx="280" cy="60" r="8"/><circle cx="320" cy="60" r="8"/><circle cx="360" cy="60" r="8"/>
    <circle cx="400" cy="60" r="8"/><circle cx="440" cy="60" r="8"/><circle cx="480" cy="60" r="8"/>
    <circle cx="520" cy="60" r="8"/><circle cx="560" cy="60" r="8"/>
  </g>
  <!-- Top tails -->
  <g stroke="#1a6b3c" stroke-width="2" fill="none">
    <line x1="40" y1="60" x2="40" y2="100"/><line x1="80" y1="60" x2="80" y2="100"/>
    <line x1="120" y1="60" x2="120" y2="100"/><line x1="160" y1="60" x2="160" y2="100"/>
    <line x1="200" y1="60" x2="200" y2="100"/><line x1="240" y1="60" x2="240" y2="100"/>
    <line x1="280" y1="60" x2="280" y2="100"/><line x1="320" y1="60" x2="320" y2="100"/>
    <line x1="360" y1="60" x2="360" y2="100"/><line x1="400" y1="60" x2="400" y2="100"/>
    <line x1="440" y1="60" x2="440" y2="100"/><line x1="480" y1="60" x2="480" y2="100"/>
    <line x1="520" y1="60" x2="520" y2="100"/><line x1="560" y1="60" x2="560" y2="100"/>
  </g>
  <!-- Bottom tails -->
  <g stroke="#43a047" stroke-width="2" fill="none">
    <line x1="40" y1="100" x2="40" y2="140"/><line x1="80" y1="100" x2="80" y2="140"/>
    <line x1="120" y1="100" x2="120" y2="140"/><line x1="160" y1="100" x2="160" y2="140"/>
    <line x1="200" y1="100" x2="200" y2="140"/><line x1="240" y1="100" x2="240" y2="140"/>
    <line x1="280" y1="100" x2="280" y2="140"/><line x1="320" y1="100" x2="320" y2="140"/>
    <line x1="360" y1="100" x2="360" y2="140"/><line x1="400" y1="100" x2="400" y2="140"/>
    <line x1="440" y1="100" x2="440" y2="140"/><line x1="480" y1="100" x2="480" y2="140"/>
    <line x1="520" y1="100" x2="520" y2="140"/><line x1="560" y1="100" x2="560" y2="140"/>
  </g>
  <!-- Bottom heads -->
  <g fill="#43a047">
    <circle cx="40" cy="140" r="8"/><circle cx="80" cy="140" r="8"/><circle cx="120" cy="140" r="8"/>
    <circle cx="160" cy="140" r="8"/><circle cx="200" cy="140" r="8"/><circle cx="240" cy="140" r="8"/>
    <circle cx="280" cy="140" r="8"/><circle cx="320" cy="140" r="8"/><circle cx="360" cy="140" r="8"/>
    <circle cx="400" cy="140" r="8"/><circle cx="440" cy="140" r="8"/><circle cx="480" cy="140" r="8"/>
    <circle cx="520" cy="140" r="8"/><circle cx="560" cy="140" r="8"/>
  </g>

  <!-- Cholesterol -->
  <g fill="none" stroke="#ff8f00" stroke-width="2.5">
    <polygon points="100,70 110,55 120,55 130,70 130,85 100,85"/>
    <polygon points="340,70 350,55 360,55 370,70 370,85 340,85"/>
    <polygon points="460,70 470,55 480,55 490,70 490,85 460,85"/>
  </g>

  <!-- Integral protein (transmembrane) -->
  <rect x="200" y="56" width="50" height="88" rx="4" fill="#1565c0" opacity="0.8"/>
  <text x="225" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Integral</text>

  <!-- Peripheral protein (top) -->
  <rect x="300" y="40" width="55" height="18" rx="3" fill="#e53935" opacity="0.8"/>
  <text x="327" y="53" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Peripheral</text>

  <!-- Peripheral protein (bottom) -->
  <rect x="420" y="142" width="55" height="18" rx="3" fill="#e53935" opacity="0.8"/>
  <text x="447" y="155" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">Peripheral</text>

  <!-- Glycoprotein -->
  <g stroke="#6a1b9a" stroke-width="2.5" fill="none">
    <path d="M140,60 Q130,40 145,30 Q155,20 160,30"/>
    <path d="M160,30 Q170,20 180,28"/>
  </g>
  <circle cx="145" cy="30" r="4" fill="#6a1b9a"/>
  <circle cx="160" cy="30" r="4" fill="#6a1b9a"/>
  <circle cx="180" cy="28" r="4" fill="#6a1b9a"/>
  <text x="160" y="44" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Glycoprotein</text>

  <!-- Glycolipid -->
  <g stroke="#6a1b9a" stroke-width="2" fill="none">
    <path d="M500,60 Q495,45 505,35 Q515,30 520,38"/>
  </g>
  <circle cx="505" cy="35" r="4" fill="#6a1b9a"/>
  <text x="510" y="44" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">Glycolipid</text>

  <!-- Labels -->
  <text x="60" y="175" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Phospholipid</text>
  <text x="60" y="190" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">bilayer</text>
  <line x1="60" y1="192" x2="60" y2="148" stroke="#555" stroke-width="1"/>

  <text x="115" y="200" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff8f00">Cholesterol</text>
  <line x1="115" y1="202" x2="115" y2="90" stroke="#ff8f00" stroke-width="1"/>

  <!-- Legend -->
  <rect x="20" y="230" width="560" height="135" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="252" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Key Features</text>
  <text x="40" y="275" font-family="Arial" font-size="11" fill="#333">• Phospholipid bilayer: hydrophilic heads (phosphate), hydrophobic tails (fatty acid)</text>
  <text x="40" y="295" font-family="Arial" font-size="11" fill="#333">• Cholesterol: regulates membrane fluidity (restrains at high temp, prevents packing at low temp)</text>
  <text x="40" y="315" font-family="Arial" font-size="11" fill="#333">• Integral proteins: span the bilayer (channels, carriers, pumps)</text>
  <text x="40" y="335" font-family="Arial" font-size="11" fill="#333">• Peripheral proteins: attached to surface (signaling, structural support)</text>
  <text x="40" y="355" font-family="Arial" font-size="11" fill="#333">• Glycoprotein/Glycolipid: carbohydrate chains for cell recognition (glycocalyx)</text>
</svg>