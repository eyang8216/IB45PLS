<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 580" font-family="Arial, sans-serif">
  <rect width="600" height="580" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Lac Operon: Structure &amp; Regulation</text>

  <!-- DNA backbone -->
  <rect x="30" y="55" width="540" height="6" rx="3" fill="#1565c0"/>
  <text x="30" y="48" font-size="11" fill="#333">lacI</text>

  <!-- Promoter P -->
  <rect x="135" y="52" width="30" height="12" rx="2" fill="#43a047"/>
  <text x="150" y="80" text-anchor="middle" font-size="11" fill="#333">P</text>

  <!-- Operator O -->
  <rect x="185" y="52" width="30" height="12" rx="2" fill="#e53935"/>
  <text x="200" y="80" text-anchor="middle" font-size="11" fill="#333">O</text>

  <!-- Structural genes -->
  <rect x="245" y="50" width="80" height="16" rx="2" fill="#81c784"/>
  <text x="285" y="62" text-anchor="middle" font-size="11" fill="#333">lacZ</text>

  <rect x="340" y="50" width="80" height="16" rx="2" fill="#81c784"/>
  <text x="380" y="62" text-anchor="middle" font-size="11" fill="#333">lacY</text>

  <rect x="435" y="50" width="80" height="16" rx="2" fill="#81c784"/>
  <text x="475" y="62" text-anchor="middle" font-size="11" fill="#333">lacA</text>

  <!-- Gene products -->
  <text x="285" y="88" text-anchor="middle" font-size="9" fill="#333">β-galactosidase</text>
  <text x="380" y="88" text-anchor="middle" font-size="9" fill="#333">Permease</text>
  <text x="475" y="88" text-anchor="middle" font-size="9" fill="#333">Transacetylase</text>

  <!-- Operon bracket -->
  <path d="M220 96 L220 108 L490 108 L490 96" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="355" y="120" text-anchor="middle" font-size="10" fill="#333" font-style="italic">Operon</text>

  <!-- Scenario 1: No Lactose -->
  <text x="300" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">Scenario 1: No Lactose — Operon OFF</text>

  <rect x="30" y="170" width="540" height="6" rx="3" fill="#1565c0"/>
  <rect x="135" y="167" width="30" height="12" rx="2" fill="#43a047"/>
  <text x="185" y="167" font-size="9" fill="#fff" font-weight="bold">P</text>
  <rect x="185" y="167" width="30" height="12" rx="2" fill="#e53935"/>

  <!-- Repressor bound -->
  <ellipse cx="200" cy="158" rx="22" ry="14" fill="#e53935" opacity="0.9"/>
  <text x="200" y="155" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">REP</text>

  <!-- RNA Pol blocked -->
  <g transform="translate(150,145)">
    <ellipse cx="0" cy="0" rx="28" ry="16" fill="#bbb" opacity="0.6"/>
    <text x="0" y="-10" text-anchor="middle" font-size="7" fill="#333">RNAP</text>
    <text x="0" y="2" text-anchor="middle" font-size="7" fill="#e53935">BLOCKED</text>
  </g>

  <!-- Block arrow -->
  <line x1="245" y1="173" x2="500" y2="173" stroke="#ddd" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="370" y="195" text-anchor="middle" font-size="10" fill="#e53935">No transcription → No enzymes</text>

  <!-- Scenario 2: Lactose Present -->
  <text x="300" y="235" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">Scenario 2: Lactose Present + Low Glucose — Operon ON</text>

  <rect x="30" y="250" width="540" height="6" rx="3" fill="#1565c0"/>
  <rect x="135" y="247" width="30" height="12" rx="2" fill="#43a047"/>
  <rect x="185" y="247" width="30" height="12" rx="2" fill="#e53935"/>

  <!-- Allolactose binding repressor -->
  <ellipse cx="200" cy="238" rx="22" ry="14" fill="#e53935" opacity="0.5" stroke="#e53935" stroke-width="1.5" stroke-dasharray="5,3"/>
  <ellipse cx="215" cy="230" rx="8" ry="6" fill="#ff8f00"/>
  <text x="215" y="233" text-anchor="middle" font-size="6" fill="#fff">AL</text>
  <text x="255" y="234" font-size="7" fill="#e53935">Repressor</text>
  <text x="255" y="243" font-size="7" fill="#e53935">released</text>

  <!-- RNA Pol transcribing -->
  <g transform="translate(150,235)">
    <ellipse cx="0" cy="0" rx="28" ry="16" fill="#43a047" opacity="0.7"/>
    <text x="0" y="-7" text-anchor="middle" font-size="7" fill="#fff">RNAP</text>
    <text x="0" y="5" text-anchor="middle" font-size="7" fill="#fff">ACTIVE</text>
  </g>

  <!-- Transcription arrow -->
  <defs><marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1a6b3c"/></marker></defs>
  <line x1="235" y1="253" x2="525" y2="253" stroke="#1a6b3c" stroke-width="2.5" marker-end="url(#arrowG)"/>

  <!-- mRNA product -->
  <path d="M250 258 Q400 280 520 258" fill="none" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="385" y="293" text-anchor="middle" font-size="9" fill="#1a6b3c">Polycistronic mRNA → all 3 enzymes</text>

  <!-- Scenario 3: CAP enhancement -->
  <text x="300" y="320" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565c0">Scenario 3: Low Glucose — cAMP-CAP Enhancement</text>

  <rect x="30" y="338" width="540" height="6" rx="3" fill="#1565c0"/>

  <!-- CAP binding site -->
  <rect x="95" y="335" width="35" height="12" rx="2" fill="#ff8f00"/>
  <text x="112" y="344" text-anchor="middle" font-size="8" fill="#fff">CAP site</text>

  <rect x="145" y="335" width="25" height="12" rx="2" fill="#43a047"/>
  <rect x="185" y="335" width="30" height="12" rx="2" fill="#e53935"/>

  <!-- cAMP-CAP complex -->
  <g transform="translate(112,320)">
    <ellipse cx="0" cy="0" rx="22" ry="14" fill="#ff8f00" opacity="0.85"/>
    <text x="0" y="-2" text-anchor="middle" font-size="7" fill="#fff">cAMP</text>
    <text x="0" y="6" text-anchor="middle" font-size="7" fill="#fff">-CAP</text>
  </g>

  <!-- DNA bending -->
  <path d="M100 341 Q130 385 160 341" fill="none" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="148" y="375" text-anchor="middle" font-size="8" fill="#ff8f00">DNA bending → RNAP recruited</text>

  <!-- RNAP -->
  <g transform="translate(180,325)">
    <ellipse cx="0" cy="0" rx="26" ry="14" fill="#43a047" opacity="0.8"/>
    <text x="0" y="-5" text-anchor="middle" font-size="7" fill="#fff">RNAP</text>
    <text x="0" y="6" text-anchor="middle" font-size="7" fill="#fff">enhanced</text>
  </g>

  <!-- Bold transcription -->
  <line x1="235" y1="341" x2="525" y2="341" stroke="#1a6b3c" stroke-width="3" marker-end="url(#arrowG)"/>
  <text x="380" y="365" text-anchor="middle" font-size="9" fill="#1a6b3c" font-weight="bold">HIGH transcription — fully induced</text>

  <!-- Summary table -->
  <text x="300" y="400" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Summary: Lac Operon States</text>

  <line x1="50" y1="410" x2="550" y2="410" stroke="#ddd" stroke-width="1"/>

  <g font-size="9" fill="#333">
    <text x="50" y="430" font-weight="bold">Glucose</text>
    <text x="160" y="430" font-weight="bold">Lactose</text>
    <text x="260" y="430" font-weight="bold">Repressor?</text>
    <text x="370" y="430" font-weight="bold">CAP?</text>
    <text x="455" y="430" font-weight="bold">Transcription</text>

    <line x1="50" y1="436" x2="550" y2="436" stroke="#ddd" stroke-width="0.5"/>

    <text x="50" y="450">Present</text>  <text x="160" y="450">Absent</text>
    <text x="260" y="450">Bound (blocks)</text> <text x="370" y="450">No (low cAMP)</text>
    <text x="455" y="450" fill="#e53935" font-weight="bold">OFF</text>

    <text x="50" y="467">Present</text>  <text x="160" y="467">Present</text>
    <text x="260" y="467">Released</text>  <text x="370" y="467">No (low cAMP)</text>
    <text x="455" y="467" fill="#ff8f00" font-weight="bold">Low</text>

    <text x="50" y="484">Absent</text>   <text x="160" y="484">Absent</text>
    <text x="260" y="484">Bound (blocks)</text>  <text x="370" y="484">Yes (high cAMP)</text>
    <text x="455" y="484" fill="#e53935" font-weight="bold">OFF</text>

    <text x="50" y="501">Absent</text>   <text x="160" y="501">Present</text>
    <text x="260" y="501">Released</text>  <text x="370" y="501">Yes (high cAMP)</text>
    <text x="455" y="501" fill="#1a6b3c" font-weight="bold">HIGH</text>
  </g>

  <!-- Key -->
  <g transform="translate(30,535)">
    <rect x="0" y="0" width="14" height="10" rx="2" fill="#e53935"/>
    <text x="18" y="9" font-size="9" fill="#333">Negative regulation (repressor)</text>
    <rect x="200" y="0" width="14" height="10" rx="2" fill="#ff8f00"/>
    <text x="218" y="9" font-size="9" fill="#333">Positive regulation (cAMP-CAP)</text>
    <rect x="390" y="0" width="14" height="10" rx="2" fill="#43a047"/>
    <text x="408" y="9" font-size="9" fill="#333">RNA Polymerase</text>
  </g>
</svg>