<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" width="600" height="480">
  <rect width="600" height="480" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Sarcomere — The Functional Unit of Contraction</text>

  <!-- RELAXED SARCOMERE -->
  <text x="150" y="60" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">RELAXED</text>

  <rect x="30" y="75" width="240" height="170" rx="4" fill="#fafafa" stroke="#333" stroke-width="1.5"/>

  <!-- Z-lines -->
  <line x1="40" y1="90" x2="40" y2="230" stroke="#333" stroke-width="3"/>
  <text x="40" y="248" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Z-line</text>

  <line x1="260" y1="90" x2="260" y2="230" stroke="#333" stroke-width="3"/>
  <text x="260" y="248" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Z-line</text>

  <!-- Actin filaments (thin) -->
  <line x1="40" y1="130" x2="150" y2="130" stroke="#e53935" stroke-width="2.5"/>
  <line x1="40" y1="160" x2="150" y2="160" stroke="#e53935" stroke-width="2.5"/>
  <line x1="40" y1="190" x2="150" y2="190" stroke="#e53935" stroke-width="2.5"/>
  <line x1="260" y1="130" x2="150" y2="130" stroke="#e53935" stroke-width="2.5"/>
  <line x1="260" y1="160" x2="150" y2="160" stroke="#e53935" stroke-width="2.5"/>
  <line x1="260" y1="190" x2="150" y2="190" stroke="#e53935" stroke-width="2.5"/>

  <!-- Myosin filaments (thick) -->
  <line x1="80" y1="140" x2="220" y2="140" stroke="#1565c0" stroke-width="4"/>
  <line x1="80" y1="170" x2="220" y2="170" stroke="#1565c0" stroke-width="4"/>

  <!-- M-line -->
  <line x1="150" y1="90" x2="150" y2="230" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="150" y="248" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">M-line</text>

  <!-- Band labels -->
  <line x1="70" y1="255" x2="70" y2="270" stroke="#555" stroke-width="1"/>
  <text x="70" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">I-band</text>
  <line x1="110" y1="255" x2="110" y2="270" stroke="#555" stroke-width="1"/>
  <text x="150" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">A-band</text>
  <line x1="190" y1="255" x2="190" y2="270" stroke="#555" stroke-width="1"/>
  <text x="150" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">H-zone</text>

  <!-- CONTRACTED SARCOMERE -->
  <text x="450" y="60" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">CONTRACTED</text>

  <rect x="330" y="75" width="240" height="170" rx="4" fill="#fafafa" stroke="#333" stroke-width="1.5"/>

  <!-- Z-lines closer -->
  <line x1="340" y1="90" x2="340" y2="230" stroke="#333" stroke-width="3"/>
  <text x="340" y="248" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Z-line</text>
  <line x1="560" y1="90" x2="560" y2="230" stroke="#333" stroke-width="3"/>
  <text x="560" y="248" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Z-line</text>

  <!-- Actin pulled in -->
  <line x1="340" y1="130" x2="450" y2="130" stroke="#e53935" stroke-width="2.5"/>
  <line x1="340" y1="160" x2="450" y2="160" stroke="#e53935" stroke-width="2.5"/>
  <line x1="560" y1="130" x2="450" y2="130" stroke="#e53935" stroke-width="2.5"/>
  <line x1="560" y1="160" x2="450" y2="160" stroke="#e53935" stroke-width="2.5"/>

  <!-- Myosin same length -->
  <line x1="380" y1="140" x2="520" y2="140" stroke="#1565c0" stroke-width="4"/>
  <line x1="380" y1="170" x2="520" y2="170" stroke="#1565c0" stroke-width="4"/>

  <line x1="450" y1="90" x2="450" y2="230" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Band labels -->
  <text x="370" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">I-band (shorter)</text>
  <text x="450" y="282" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">A-band (same)</text>
  <text x="450" y="295" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">H-zone (gone)</text>

  <!-- Legend -->
  <rect x="30" y="320" width="540" height="75" rx="6" fill="#fafafa" stroke="#333" stroke-width="1"/>
  <text x="300" y="342" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">What Changes During Contraction</text>
  <text x="60" y="362" font-family="Arial" font-size="10" fill="#e53935">Z-lines move closer together (sarcomere shortens). I-band SHORTENS. H-zone NARROWS/DISAPPEARS.</text>
  <text x="60" y="380" font-family="Arial" font-size="10" fill="#1565c0">A-band length STAYS THE SAME — myosin filaments don't change length. Filaments SLIDE, don't shrink.</text>

  <!-- Key -->
  <rect x="30" y="405" width="540" height="65" rx="6" fill="#f5f5f5" stroke="#333" stroke-width="1"/>
  <line x1="50" y1="425" x2="90" y2="425" stroke="#e53935" stroke-width="3"/>
  <text x="100" y="429" font-family="Arial" font-size="10" fill="#333">Actin (thin filament) — anchored at Z-lines</text>
  <line x1="50" y1="445" x2="90" y2="445" stroke="#1565c0" stroke-width="4"/>
  <text x="100" y="449" font-family="Arial" font-size="10" fill="#333">Myosin (thick filament) — anchored at M-line, heads project toward Z-lines</text>
  <text x="50" y="465" font-family="Arial" font-size="10" fill="#333">I-band = actin only. A-band = myosin length. H-zone = myosin only (no actin overlap).</text>
</svg>