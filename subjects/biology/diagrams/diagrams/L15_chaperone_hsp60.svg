<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420">
  <defs><style>text { font-family: Arial, sans-serif; } .title { font-size: 18px; font-weight: bold; fill: #1a6b3c; text-anchor: middle; } .lab { font-size: 13px; fill: #333; text-anchor: middle; } .sm { font-size: 11px; fill: #555; text-anchor: middle; }</style></defs>
  <rect width="600" height="420" fill="#fff"/>
  <text x="300" y="28" class="title">Hsp60 Chaperonin — Assisted Protein Folding</text>

  <!-- Hsp60 barrel -->
  <g transform="translate(60, 55)">
    <!-- Barrel body -->
    <rect x="50" y="40" width="120" height="120" rx="10" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="3"/>
    <text x="110" y="60" class="sm" fill="#283593" font-weight="bold">Hsp60</text>
    <text x="110" y="75" class="sm" fill="#283593">barrel</text>

    <!-- Inside cavity -->
    <rect x="65" y="85" width="90" height="60" rx="5" fill="#c5cae9" stroke="#7986cb" stroke-width="1.5"/>

    <!-- Cap (GroES) -->
    <rect x="55" y="25" width="110" height="20" rx="6" fill="#e53935" stroke="#c62828" stroke-width="2"/>
    <text x="110" y="39" class="sm" fill="#fff" font-weight="bold">GroES cap</text>

    <!-- Unfolded protein entering -->
    <path d="M10,110 C20,90 30,70 50,100" fill="none" stroke="#ff8f00" stroke-width="3"/>
    <text x="5" y="100" class="sm" fill="#ff8f00">Unfolded</text>
    <text x="5" y="113" class="sm" fill="#ff8f00">polypeptide</text>
  </g>

  <!-- Arrows -->
  <text x="260" y="130" class="lab" fill="#333" font-size="20">→</text>
  <text x="245" y="155" class="sm" fill="#1565c0">Cap closes,</text>
  <text x="245" y="168" class="sm" fill="#1565c0">ATP→ADP</text>

  <!-- Folding inside -->
  <g transform="translate(280, 55)">
    <rect x="50" y="40" width="120" height="120" rx="10" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="3"/>
    <rect x="65" y="85" width="90" height="60" rx="5" fill="#c5cae9" stroke="#7986cb" stroke-width="1.5"/>
    <rect x="55" y="25" width="110" height="20" rx="6" fill="#e53935" stroke="#c62828" stroke-width="2"/>
    <text x="110" y="60" class="sm" fill="#283593" font-weight="bold">Folding</text>
    <!-- Folded protein -->
    <ellipse cx="110" cy="120" rx="25" ry="18" fill="#43a047" stroke="#1a6b3c" stroke-width="2"/>
    <text x="110" y="115" class="sm" fill="#fff" font-weight="bold">Folded</text>
  </g>

  <!-- Arrow 2 -->
  <text x="440" y="130" class="lab" fill="#333" font-size="20">→</text>
  <text x="435" y="155" class="sm" fill="#43a047">Cap opens,</text>
  <text x="435" y="168" class="sm" fill="#43a047">protein released</text>

  <!-- Released protein -->
  <g transform="translate(470, 55)">
    <ellipse cx="40" cy="100" rx="28" height="20" fill="#43a047" stroke="#1a6b3c" stroke-width="2.5"/>
    <text x="40" y="95" class="sm" fill="#fff" font-weight="bold">Folded</text>
    <text x="40" y="110" class="sm" fill="#fff" font-size="9">protein</text>
  </g>

  <!-- Mechanism details -->
  <rect x="20" y="240" width="560" height="170" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="300" y="262" class="lab" fill="#333" font-weight="bold">How Hsp60 (Chaperonin) Works</text>
  <text x="300" y="285" class="sm">1. Unfolded protein enters the Hsp60 barrel (large central cavity, ~5 nm diameter)</text>
  <text x="300" y="302" class="sm">2. GroES cap binds, sealing the chamber — provides isolated folding environment</text>
  <text x="300" y="319" class="sm">3. Inside the chamber, protein folds without interference from other proteins (no aggregation)</text>
  <text x="300" y="336" class="sm">4. ATP hydrolysis (7 ATP → 7 ADP + 7 Pi per cycle) drives conformational changes</text>
  <text x="300" y="353" class="sm">5. After ~10-15 seconds, cap opens → folded protein exits</text>
  <text x="300" y="375" class="sm" fill="#e65100" font-weight="bold">Key: Chaperones do NOT specify structure — the amino acid sequence does!</text>
  <text x="300" y="392" class="sm" fill="#e65100">They prevent aggregation and provide an isolated environment for correct folding.</text>
</svg>
