<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460" width="600" height="460">
  <rect width="600" height="460" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Greenhouse Effect</text>

  <!-- Sun -->
  <circle cx="80" cy="50" r="30" fill="#fff9c4" stroke="#f9a825" stroke-width="2"/>
  <text x="80" y="54" text-anchor="middle" font-family="Arial" font-size="9" fill="#f57f17">☀️ SUN</text>

  <!-- Incoming shortwave -->
  <line x1="110" y1="50" x2="280" y2="50" stroke="#ff8f00" stroke-width="2.5" marker-end="url(#arrowO)"/>
  <text x="195" y="42" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00" font-weight="bold">Shortwave radiation</text>
  <text x="195" y="30" text-anchor="middle" font-family="Arial" font-size="9" fill="#e65100">(UV + visible light)</text>

  <!-- Atmosphere top -->
  <line x1="30" y1="100" x2="570" y2="100" stroke="#81c784" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="580" y="95" font-family="Arial" font-size="9" fill="#81c784">Atmosphere</text>

  <!-- Atmosphere layer -->
  <rect x="30" y="100" width="540" height="40" rx="5" fill="#e8f5e9" opacity="0.5" stroke="#81c784" stroke-width="1.5"/>

  <!-- GHG molecules in atmosphere -->
  <circle cx="100" cy="120" r="8" fill="#e53935" opacity="0.7"/>
  <text x="100" y="123" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">CO₂</text>
  <circle cx="200" cy="115" r="8" fill="#ff8f00" opacity="0.7"/>
  <text x="200" y="118" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">CH₄</text>
  <circle cx="350" cy="125" r="8" fill="#1565c0" opacity="0.7"/>
  <text x="350" y="128" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">H₂O</text>
  <circle cx="450" cy="118" r="8" fill="#e53935" opacity="0.7"/>
  <text x="450" y="121" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">CO₂</text>
  <circle cx="500" cy="122" r="8" fill="#ff8f00" opacity="0.7"/>
  <text x="500" y="125" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">CH₄</text>

  <text x="300" y="155" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c" font-weight="bold">GHG molecules: CO₂, CH₄, H₂O, N₂O</text>

  <!-- Earth surface -->
  <rect x="30" y="180" width="540" height="60" rx="6" fill="#8d6e63" stroke="#5d4037" stroke-width="2"/>
  <text x="300" y="210" text-anchor="middle" font-family="Arial" font-size="12" fill="#fff" font-weight="bold">EARTH'S SURFACE</text>
  <text x="300" y="228" text-anchor="middle" font-family="Arial" font-size="9" fill="#d7ccc8">Absorbs shortwave radiation → heats up</text>

  <!-- Outgoing longwave -->
  <path d="M100,180 Q100,150 80,130" fill="none" stroke="#e53935" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <path d="M200,180 Q200,150 220,130" fill="none" stroke="#e53935" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <path d="M400,180 Q400,150 380,130" fill="none" stroke="#e53935" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <path d="M500,180 Q500,150 520,130" fill="none" stroke="#e53935" stroke-width="2.5" marker-end="url(#arrowR)"/>

  <text x="300" y="178" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">Longwave IR radiation re-radiated ↑</text>

  <!-- Re-radiated back down -->
  <path d="M80,130 Q100,160 120,180" fill="none" stroke="#e53935" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowR)"/>
  <path d="M220,130 Q200,160 180,180" fill="none" stroke="#e53935" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowR)"/>
  <path d="M380,130 Q400,160 420,180" fill="none" stroke="#e53935" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowR)"/>
  <path d="M520,130 Q500,160 480,180" fill="none" stroke="#e53935" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowR)"/>

  <text x="300" y="250" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-style="italic">Some IR absorbed by GHGs → re-radiated in all directions → some back to Earth</text>

  <!-- Explanation boxes -->
  <rect x="30" y="270" width="540" height="180" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="300" y="295" text-anchor="middle" font-family="Arial" font-size="13" fill="#333" font-weight="bold">How the Greenhouse Effect Works</text>

  <text x="45" y="318" font-family="Arial" font-size="11" fill="#333">1. Sun emits shortwave radiation (UV, visible) → passes through atmosphere</text>
  <text x="45" y="340" font-family="Arial" font-size="11" fill="#333">2. Earth's surface absorbs shortwave → warms up → re-emits as longwave infrared (IR)</text>
  <text x="45" y="362" font-family="Arial" font-size="11" fill="#333">3. Greenhouse gas molecules (CO₂, CH₄, H₂O) absorb IR radiation</text>
  <text x="45" y="384" font-family="Arial" font-size="11" fill="#333">4. GHGs re-radiate IR in all directions — some escapes to space, some returns to Earth</text>
  <text x="45" y="406" font-family="Arial" font-size="11" fill="#333">5. More GHGs → more IR trapped → enhanced warming (enhanced greenhouse effect)</text>
  <text x="45" y="432" font-family="Arial" font-size="11" fill="#e53935" font-weight="bold">Natural greenhouse effect is essential for life (Earth would be ~33°C colder without it).</text>
  <text x="45" y="452" font-family="Arial" font-size="11" fill="#e53935" font-weight="bold">Problem: human activities enhance it → rapid climate change.</text>

  <defs>
    <marker id="arrowO" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#ff8f00"/></marker>
    <marker id="arrowR" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#e53935"/></marker>
  </defs>
</svg>