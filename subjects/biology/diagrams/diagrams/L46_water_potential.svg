<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" font-family="Arial, sans-serif">
  <rect width="600" height="520" fill="#fff"/>
  <text x="300" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Water Potential: ψ = ψs + ψp</text>

  <!-- Formula -->
  <rect x="120" y="38" width="360" height="42" rx="8" fill="#1565c0" opacity="0.1" stroke="#1565c0" stroke-width="1.5"/>
  <text x="300" y="65" text-anchor="middle" font-size="18" fill="#1565c0" font-weight="bold">ψ = ψs + ψp</text>

  <!-- Components -->
  <g transform="translate(0,0)">
    <!-- ψs -->
    <rect x="30" y="100" width="255" height="150" rx="8" fill="#e53935" opacity="0.07" stroke="#e53935" stroke-width="1.5"/>
    <text x="157" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#e53935">ψs — Solute Potential</text>
    <text x="157" y="145" text-anchor="middle" font-size="10" fill="#333">Effect of dissolved solutes</text>
    <text x="157" y="162" text-anchor="middle" font-size="10" fill="#e53935" font-weight="bold">ALWAYS ≤ 0 (negative or zero)</text>

    <text x="157" y="185" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">ψs = −iCRT</text>
    <text x="157" y="202" text-anchor="middle" font-size="9" fill="#333">i = ionization constant</text>
    <text x="157" y="218" text-anchor="middle" font-size="9" fill="#333">C = molar concentration (M)</text>
    <text x="157" y="234" text-anchor="middle" font-size="9" fill="#333">R = 0.00831 L MPa mol⁻¹ K⁻¹</text>
    <text x="157" y="250" text-anchor="middle" font-size="9" fill="#333">T = temperature (K)</text>

    <!-- ψp -->
    <rect x="315" y="100" width="255" height="150" rx="8" fill="#1a6b3c" opacity="0.07" stroke="#1a6b3c" stroke-width="1.5"/>
    <text x="442" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a6b3c">ψp — Pressure Potential</text>
    <text x="442" y="145" text-anchor="middle" font-size="10" fill="#333">Effect of physical pressure</text>
    <text x="442" y="162" text-anchor="middle" font-size="10" fill="#1a6b3c" font-weight="bold">Can be +, 0, or −</text>

    <text x="442" y="190" text-anchor="middle" font-size="10" fill="#1a6b3c">Positive: turgor pressure</text>
    <text x="442" y="208" text-anchor="middle" font-size="10" fill="#1a6b3c">(plant cell presses against wall)</text>
    <text x="442" y="230" text-anchor="middle" font-size="10" fill="#1a6b3c">Zero: flaccid cell / open container</text>
    <text x="442" y="252" text-anchor="middle" font-size="10" fill="#1a6b3c">Negative: tension in xylem</text>
  </g>

  <!-- Water movement direction -->
  <rect x="30" y="270" width="540" height="50" rx="8" fill="#ff8f00" opacity="0.1" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="300" y="292" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff8f00">Water ALWAYS moves from HIGH ψ → LOW ψ</text>
  <text x="300" y="310" text-anchor="middle" font-size="11" fill="#333">(less negative → more negative)</text>

  <!-- Worked example -->
  <text x="300" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Worked Example: 0.15 M Sucrose at 20°C</text>

  <rect x="80" y="358" width="440" height="80" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <g font-size="11" fill="#333">
    <text x="100" y="380">i = 1 (sucrose does not dissociate)  |  C = 0.15 M  |  T = 20 + 273 = 293 K</text>
    <text x="100" y="400">ψs = −(1) × (0.15) × (0.00831) × (293)</text>
    <text x="100" y="420">ψs = −0.365 MPa = −365 kPa</text>
  </g>

  <!-- Reference -->
  <text x="300" y="470" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">The Reference Point: Pure Water</text>
  <rect x="130" y="480" width="340" height="30" rx="6" fill="#1565c0" opacity="0.1" stroke="#1565c0" stroke-width="1"/>
  <text x="300" y="500" text-anchor="middle" font-size="11" fill="#1565c0">Pure water at 25°C and atmospheric pressure: ψ = 0 kPa (maximum)</text>
</svg>