<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 370">
  <rect width="600" height="370" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Lysosome — Structure &amp; Functions</text>

  <!-- Lysosome structure -->
  <circle cx="150" cy="200" r="70" fill="#81c784" stroke="#1a6b3c" stroke-width="3" opacity="0.6"/>
  <text x="150" y="165" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">Lysosome</text>
  <text x="150" y="185" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Single membrane</text>
  <text x="150" y="200" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">pH ≈ 5.0</text>

  <!-- H+ pump -->
  <rect x="120" y="140" width="60" height="20" rx="3" fill="#e53935" opacity="0.8"/>
  <text x="150" y="154" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">H⁺ Pump</text>
  <text x="220" y="154" font-family="Arial" font-size="8" fill="#e53935">ATP→ADP</text>

  <!-- Enzymes inside -->
  <g fill="#6a1b9a" opacity="0.7">
    <circle cx="130" cy="220" r="8"/><circle cx="160" cy="210" r="8"/>
    <circle cx="145" cy="240" r="8"/><circle cx="175" cy="235" r="8"/>
  </g>
  <text x="150" y="262" text-anchor="middle" font-family="Arial" font-size="9" fill="#6a1b9a">Hydrolytic enzymes</text>

  <!-- ARROW to phagolysosome -->
  <line x1="230" y1="200" x2="300" y2="200" stroke="#333" stroke-width="2"/>
  <polygon points="300,195 310,200 300,205" fill="#333"/>

  <!-- PHAGOLYSOSOME -->
  <g>
    <text x="350" y="165" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">Phagolysosome</text>
    <circle cx="350" cy="200" r="60" fill="none" stroke="#e53935" stroke-width="2.5"/>
    <!-- Bacterium inside -->
    <ellipse cx="340" cy="200" rx="20" ry="12" fill="#e53935" opacity="0.5"/>
    <text x="340" y="203" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">bacterium</text>
    <!-- Lysosome fusing -->
    <circle cx="370" cy="215" r="20" fill="#81c784" stroke="#1a6b3c" stroke-width="2" opacity="0.7"/>
    <text x="370" y="218" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">lysosome</text>

    <text x="350" y="280" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Phagosome + lysosome fuse</text>
    <text x="350" y="293" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Enzymes digest engulfed material</text>
  </g>

  <!-- AUTOPHAGY -->
  <g>
    <text x="350" y="310" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">Autophagy</text>

    <rect x="280" y="320" width="140" height="40" rx="8" fill="#f5f5f5" stroke="#6a1b9a" stroke-width="1.5"/>
    <!-- Mitochondrion -->
    <ellipse cx="310" cy="340" rx="18" ry="12" fill="none" stroke="#e53935" stroke-width="2"/>
    <path d="M298,335 Q310,345 322,335" fill="none" stroke="#e53935" stroke-width="1.5"/>
    <text x="310" y="344" text-anchor="middle" font-family="Arial" font-size="7" fill="#e53935">mito</text>
    <!-- Arrow -->
    <text x="335" y="343" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">→</text>
    <!-- Lysosome -->
    <circle cx="370" cy="340" r="16" fill="#81c784" stroke="#1a6b3c" stroke-width="2" opacity="0.8"/>
    <text x="370" y="343" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">lyso</text>

    <text x="350" y="372" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Damaged organelles recycled</text>
  </g>

  <!-- Key info box -->
  <rect x="20" y="48" width="200" height="105" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="120" y="68" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">Key Features</text>
  <text x="40" y="85" font-family="Arial" font-size="10" fill="#333">• Contains ~40 hydrolytic enzymes</text>
  <text x="40" y="100" font-family="Arial" font-size="10" fill="#333">• Optimal pH 5 (acidic)</text>
  <text x="40" y="115" font-family="Arial" font-size="10" fill="#333">• H⁺-ATPase pumps H⁺ inward</text>
  <text x="40" y="130" font-family="Arial" font-size="10" fill="#333">• Proteases, lipases, nucleases</text>
  <text x="40" y="145" font-family="Arial" font-size="10" fill="#333">• Membrane protects cell from</text>
  <text x="43" y="158" font-family="Arial" font-size="10" fill="#333">self-digestion</text>
</svg>