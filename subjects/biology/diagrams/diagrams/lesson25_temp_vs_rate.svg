<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" width="600" height="440">
  <rect width="600" height="440" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#333">Effect of Temperature on Enzyme Activity</text>

  <!-- Axes -->
  <line x1="70" y1="370" x2="540" y2="370" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="370" x2="70" y2="40" stroke="#333" stroke-width="2"/>
  <text x="300" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">Temperature (°C) →</text>
  <text x="20" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333" transform="rotate(-90,20,210)">Rate of Reaction →</text>

  <!-- Axis ticks & labels -->
  <line x1="100" y1="370" x2="100" y2="376" stroke="#333" stroke-width="2"/>
  <text x="100" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">0</text>
  <line x1="160" y1="370" x2="160" y2="376" stroke="#333" stroke-width="2"/>
  <text x="160" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">10</text>
  <line x1="220" y1="370" x2="220" y2="376" stroke="#333" stroke-width="2"/>
  <text x="220" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">20</text>
  <line x1="280" y1="370" x2="280" y2="376" stroke="#333" stroke-width="2"/>
  <text x="280" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">30</text>
  <line x1="340" y1="370" x2="340" y2="376" stroke="#333" stroke-width="2"/>
  <text x="340" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">40</text>
  <line x1="400" y1="370" x2="400" y2="376" stroke="#333" stroke-width="2"/>
  <text x="400" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">50</text>
  <line x1="460" y1="370" x2="460" y2="376" stroke="#333" stroke-width="2"/>
  <text x="460" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">60</text>

  <!-- Bell curve -->
  <path d="M100,365 Q160,365 220,300 Q280,180 340,120 Q370,105 400,130 Q460,220 500,360 Q520,365 530,365" fill="none" stroke="#1a6b3c" stroke-width="3"/>

  <!-- Optimum line -->
  <line x1="340" y1="120" x2="340" y2="370" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="340" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ff8f00" font-weight="bold">Optimum (~40°C)</text>

  <!-- Denaturation zone -->
  <rect x="400" y="130" width="135" height="240" rx="6" fill="#ffcdd2" opacity="0.4"/>
  <text x="467" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e53935" font-weight="bold">Denaturation</text>
  <text x="467" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e53935">Tertiary structure</text>
  <text x="467" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e53935">disrupted</text>

  <!-- Phase 1 label -->
  <text x="225" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1565c0" font-weight="bold">Kinetic energy ↑</text>
  <text x="225" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1565c0">More collisions</text>

  <!-- Annotation: Q10 -->
  <text x="560" y="250" font-family="Arial, sans-serif" font-size="11" fill="#333">Q₁₀ ≈ 2</text>
  <text x="560" y="265" font-family="Arial, sans-serif" font-size="10" fill="#555">Rate doubles per ~10°C rise</text>

  <!-- Key point -->
  <text x="300" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333" font-style="italic">Enzymes are NOT killed — they are denatured (permanent loss of tertiary structure)</text>
</svg>
