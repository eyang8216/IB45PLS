<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480">
  <rect width="600" height="480" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Lamarck vs Darwin — Giraffe Neck Evolution</text>

  <!-- Lamarck (LEFT) -->
  <rect x="20" y="48" width="270" height="420" rx="10" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="155" y="75" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#e53935">Lamarck (WRONG)</text>
  <text x="155" y="95" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935">Inheritance of Acquired Characteristics</text>

  <!-- Giraffe 1: short neck -->
  <text x="155" y="122" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">① Original: Short neck</text>
  <rect x="115" y="130" width="14" height="35" rx="4" fill="#ff8f00"/>
  <rect x="140" y="165" width="8" height="70" rx="3" fill="#ff8f00"/>
  <text x="165" y="160" font-family="Arial" font-size="9" fill="#555">short</text>
  <text x="165" y="172" font-family="Arial" font-size="9" fill="#555">neck</text>

  <line x1="155" y1="240" x2="155" y2="260" stroke="#333" stroke-width="1.5"/>
  <polygon points="155,260 149,254 161,254" fill="#333"/>

  <!-- Giraffe 2: stretching -->
  <text x="155" y="278" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">② Stretches to reach leaves</text>
  <rect x="115" y="286" width="14" height="35" rx="4" fill="#ff8f00"/>
  <rect x="140" y="321" width="8" height="95" rx="3" fill="#ff8f00"/>
  <text x="165" y="325" font-family="Arial" font-size="9" fill="#555">neck</text>
  <text x="165" y="340" font-family="Arial" font-size="9" fill="#555">stretches</text>

  <line x1="155" y1="425" x2="155" y2="445" stroke="#333" stroke-width="1.5"/>
  <polygon points="155,445 149,439 161,439" fill="#333"/>

  <!-- Giraffe 3: offspring long neck -->
  <text x="155" y="460" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e53935">③ Offspring inherit long neck</text>
  <rect x="115" y="468" width="14" height="35" rx="4" fill="#ff8f00"/>
  <rect x="140" y="503" width="8" height="100" rx="3" fill="#ff8f00"/>

  <text x="155" y="530" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">✗ Acquired traits NOT heritable!</text>

  <!-- Darwin (RIGHT) -->
  <rect x="310" y="48" width="270" height="420" rx="10" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="445" y="75" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1a6b3c">Darwin (CORRECT)</text>
  <text x="445" y="95" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a6b3c">Natural Selection on Existing Variation</text>

  <!-- Population with variation -->
  <text x="445" y="122" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">① Population has variation in neck length</text>
  <rect x="340" y="132" width="10" height="28" rx="3" fill="#ff8f00"/>
  <rect x="360" y="160" width="7" height="55" rx="2.5" fill="#ff8f00"/>
  <text x="385" y="190" font-family="Arial" font-size="8" fill="#555">short</text>

  <rect x="420" y="132" width="12" height="35" rx="4" fill="#ff8f00"/>
  <rect x="445" y="167" width="8" height="70" rx="3" fill="#ff8f00"/>
  <text x="470" y="205" font-family="Arial" font-size="8" fill="#555">long</text>

  <line x1="445" y1="235" x2="445" y2="255" stroke="#333" stroke-width="1.5"/>
  <polygon points="445,255 439,249 451,249" fill="#333"/>

  <!-- Selection event -->
  <text x="445" y="278" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">② Short-necked starve; long survive</text>

  <!-- X marks short -->
  <rect x="340" y="290" width="10" height="28" rx="3" fill="#ff8f00" opacity="0.4"/>
  <line x1="338" y1="288" x2="352" y2="320" stroke="#e53935" stroke-width="3"/>
  <line x1="352" y1="288" x2="338" y2="320" stroke="#e53935" stroke-width="3"/>
  <text x="345" y="340" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Dies</text>

  <rect x="420" y="290" width="12" height="35" rx="4" fill="#ff8f00"/>
  <rect x="445" y="325" width="8" height="75" rx="3" fill="#ff8f00"/>
  <text x="470" y="360" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Survives</text>
  <text x="470" y="375" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">&amp; reproduces</text>

  <line x1="445" y1="400" x2="445" y2="420" stroke="#333" stroke-width="1.5"/>
  <polygon points="445,420 439,414 451,414" fill="#333"/>

  <!-- Next generation -->
  <text x="445" y="440" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1a6b3c">③ Population shifts to longer necks</text>
  <rect x="415" y="450" width="12" height="35" rx="4" fill="#ff8f00"/>
  <rect x="440" y="485" width="8" height="80" rx="3" fill="#ff8f00"/>
  <rect x="465" y="450" width="12" height="35" rx="4" fill="#ff8f00"/>
  <rect x="490" y="485" width="8" height="80" rx="3" fill="#ff8f00"/>
  <text x="445" y="530" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">✓ Variation was already in the DNA!</text>

  <!-- Weismann barrier note -->
  <rect x="20" y="5" width="560" height="32" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">
    Key: The Weismann Barrier separates somatic cells from germ-line cells — acquired somatic changes cannot be inherited.
  </text>
</svg>
