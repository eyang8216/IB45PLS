<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460" width="600" height="460">
  <rect width="600" height="460" fill="white"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">L43d — Cyclin-CDK Regulation &amp; Cancer</text>

  <!-- Top: Cyclin-CDK Graph -->
  <text x="300" y="55" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#6a1b9a">Cyclin-CDK Oscillation</text>

  <!-- Axes -->
  <line x1="50" y1="170" x2="350" y2="170" stroke="#333" stroke-width="2"/>
  <line x1="50" y1="170" x2="50" y2="70" stroke="#333" stroke-width="2"/>
  <text x="200" y="195" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Cell Cycle Progression →</text>
  <text x="55" y="80" font-family="Arial" font-size="10" fill="#333">Concentration</text>

  <!-- Phase labels -->
  <g font-family="Arial" font-size="10" fill="#666" text-anchor="middle">
    <text x="90" y="185">G₁</text><text x="160" y="185">S</text><text x="230" y="185">G₂</text><text x="300" y="185">M</text>
  </g>

  <!-- CDK flat line -->
  <line x1="70" y1="130" x2="330" y2="130" stroke="#1565c0" stroke-width="2.5"/>
  <text x="330" y="125" font-family="Arial" font-size="11" fill="#1565c0" font-weight="bold">CDK (constant)</text>

  <!-- Cyclin oscillating curve -->
  <path d="M70,155 Q85,155 95,120 Q110,90 130,100 Q150,110 140,140 Q135,155 150,160 Q155,145 160,115 Q170,82 190,90 Q210,98 200,130 Q195,148 215,155 Q220,140 225,105 Q235,80 250,90 Q270,100 260,130 Q255,148 275,155 Q290,145 295,115 Q310,85 325,100" fill="none" stroke="#e53935" stroke-width="2.5"/>
  <text x="330" y="95" font-family="Arial" font-size="11" fill="#e53935" font-weight="bold">Cyclin (oscillates)</text>

  <text x="200" y="215" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Active: cyclin+CDK → phosphorylates targets → triggers phase transition</text>

  <!-- Bottom: Cancer -->
  <text x="300" y="255" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e53935">Cancer: When Regulation Fails</text>

  <!-- Normal vs Cancer -->
  <rect x="20" y="275" width="260" height="170" rx="6" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="150" y="300" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">Normal Cell Division</text>
  <g>
    <circle cx="95" cy="340" r="25" fill="none" stroke="#1a6b3c" stroke-width="2"/>
    <circle cx="95" cy="340" r="10" fill="none" stroke="#1a6b3c" stroke-width="1.5"/>
    <text x="95" y="380" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Controlled division</text>
    <text x="95" y="395" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Checkpoints active</text>

    <circle cx="205" cy="340" r="25" fill="none" stroke="#1a6b3c" stroke-width="2"/>
    <circle cx="205" cy="340" r="10" fill="none" stroke="#1a6b3c" stroke-width="1.5"/>
    <text x="205" y="380" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Apoptosis if damaged</text>
    <text x="205" y="395" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Contact inhibition</text>
  </g>
  <text x="150" y="435" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">Proto-oncogenes + tumor suppressors function</text>

  <rect x="310" y="275" width="270" height="170" rx="6" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="445" y="300" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">Cancer Cell Division</text>
  <g>
    <circle cx="380" cy="340" r="18" fill="none" stroke="#e53935" stroke-width="2.5"/>
    <circle cx="420" cy="340" r="22" fill="none" stroke="#e53935" stroke-width="2.5"/>
    <circle cx="460" cy="340" r="16" fill="none" stroke="#e53935" stroke-width="2.5"/>
    <circle cx="500" cy="340" r="20" fill="none" stroke="#e53935" stroke-width="2.5"/>
    <circle cx="440" cy="360" r="14" fill="none" stroke="#e53935" stroke-width="2"/>
  </g>
  <text x="445" y="395" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Uncontrolled, unlimited division</text>
  <text x="445" y="410" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">No contact inhibition → metastasis</text>

  <!-- Oncogene / Tumor Suppressor -->
  <text x="300" y="475" text-anchor="middle" font-family="Arial" font-size="12" fill="#333" font-weight="bold">Oncogene (e.g., Ras): gain of function, dominant, "accelerator stuck" | Tumor Suppressor (e.g., p53): loss of function, recessive, "brakes cut"</text>
</svg>