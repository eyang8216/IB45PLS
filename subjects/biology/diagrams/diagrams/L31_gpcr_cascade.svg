<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 680" width="600" height="680">
  <defs><marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#333"/></marker></defs>
  <rect width="600" height="680" fill="#fff" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1565c0">GPCR → cAMP → PKA Signal Amplification Cascade</text>

  <!-- Cell membrane -->
  <line x1="40" y1="80" x2="560" y2="80" stroke="#333" stroke-width="2.5"/>
  <text x="560" y="75" font-family="Arial" font-size="9" fill="#888">plasma membrane</text>

  <!-- Step 1: Hormone -->
  <circle cx="130" cy="55" r="12" fill="#1565c0" stroke="#333" stroke-width="2"/>
  <text x="130" y="52" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff" font-weight="bold">H</text>
  <text x="130" y="40" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Glucagon</text>
  <text x="130" y="46" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">(1st messenger)</text>

  <line x1="130" y1="67" x2="130" y2="80" stroke="#1565c0" stroke-width="2"/>

  <!-- GPCR -->
  <rect x="100" y="80" width="60" height="55" rx="8" fill="#bbdefb" stroke="#1565c0" stroke-width="2.5"/>
  <text x="130" y="102" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#1565c0">GPCR</text>
  <text x="130" y="116" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">7-TM</text>

  <!-- Step 2: G-protein -->
  <line x1="160" y1="108" x2="200" y2="108" stroke="#ff8f00" stroke-width="2" marker-end="url(#arr)"/>

  <ellipse cx="230" cy="110" rx="32" ry="22" fill="#fff9c4" stroke="#ff8f00" stroke-width="2"/>
  <text x="230" y="107" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">G-protein</text>
  <text x="230" y="120" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">α·GTP active</text>

  <line x1="262" y1="110" x2="300" y2="110" stroke="#ff8f00" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: Adenylyl cyclase -->
  <rect x="300" y="90" width="80" height="40" rx="6" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="340" y="106" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#1a6b3c">Adenylyl</text>
  <text x="340" y="121" text-anchor="middle" font-family="Arial" font-size="8" fill="#1a6b3c">Cyclase</text>

  <!-- Step 4: ATP → cAMP -->
  <text x="390" y="70" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">ATP</text>
  <line x1="385" y1="75" x2="360" y2="90" stroke="#e53935" stroke-width="2"/>

  <line x1="340" y1="130" x2="340" y2="180" stroke="#333" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- cAMP molecules -->
  <rect x="260" y="180" width="160" height="35" rx="6" fill="#ffcdd2" stroke="#e53935" stroke-width="2"/>
  <text x="340" y="196" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e53935">cAMP (2nd Messenger)</text>
  <text x="340" y="210" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">~100 molecules produced</text>

  <!-- Amplification 1 -->
  <text x="420" y="200" font-family="Arial" font-size="9" fill="#ff8f00" font-weight="bold">×100</text>

  <line x1="340" y1="215" x2="340" y2="260" stroke="#333" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- PKA -->
  <rect x="250" y="265" width="180" height="45" rx="8" fill="#fff9c4" stroke="#ff8f00" stroke-width="2.5"/>
  <text x="340" y="285" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">PKA Activated</text>
  <text x="340" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">(catalytic subunits released)</text>

  <line x1="340" y1="310" x2="340" y2="360" stroke="#333" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Amplification 2 -->
  <text x="430" y="340" font-family="Arial" font-size="9" fill="#ff8f00" font-weight="bold">×10</text>

  <!-- Target enzymes -->
  <rect x="220" y="365" width="240" height="55" rx="8" fill="#e8eaf6" stroke="#6a1b9a" stroke-width="2"/>
  <text x="340" y="385" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#6a1b9a">Phosphorylated Target Enzymes</text>
  <text x="340" y="400" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Phosphorylase kinase → Glycogen phosphorylase</text>
  <text x="340" y="414" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Glycogen synthase (inhibited)</text>

  <!-- Amplification 3 -->
  <text x="460" y="395" font-family="Arial" font-size="9" fill="#ff8f00" font-weight="bold">×1000</text>

  <line x1="340" y1="420" x2="340" y2="460" stroke="#333" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Final response -->
  <rect x="230" y="465" width="220" height="45" rx="8" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="3"/>
  <text x="340" y="485" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1a6b3c">Glycogen → Glucose → Blood</text>
  <text x="340" y="500" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">~1,000,000 glucose molecules/sec</text>

  <!-- Amplification summary -->
  <rect x="25" y="530" width="550" height="55" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="300" y="552" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#ff8f00">Signal Amplification: 1 hormone → ~10⁶ product molecules</text>
  <text x="300" y="574" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">1 GPCR → 1 G-protein → 1 AC → ~100 cAMP → ~100 PKA → ~1000 enzymes → ~10⁶ glucose/sec</text>

  <!-- Glucagon specific -->
  <rect x="25" y="600" width="550" height="60" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="300" y="620" text-anchor="middle" font-family="Arial" font-size="11" fill="#1565c0" font-weight="bold">Glucagon → Hepatocyte Response → Glycogenolysis + Gluconeogenesis</text>
  <text x="300" y="640" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Pancreatic α-cells → Blood → Liver GPCR → cAMP → PKA → Glycogen phosphorylation → ↑Blood glucose</text>
  <text x="300" y="656" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">(Note: Insulin uses Receptor Tyrosine Kinase, NOT GPCR-cAMP pathway)</text>
</svg>
