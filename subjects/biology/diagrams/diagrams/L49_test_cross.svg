<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 430">
  <rect width="600" height="430" fill="#fff"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">The Test Cross — Determining Unknown Genotypes</text>

  <text x="300" y="55" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Cross unknown dominant-phenotype individual (TT or Tt?) with homozygous recessive (tt)</text>

  <!-- Scenario A -->
  <rect x="30" y="75" width="260" height="170" rx="8" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="160" y="98" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#1a6b3c">Scenario A: Unknown is TT</text>

  <text x="120" y="125" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">TT × tt</text>

  <rect x="60" y="140" width="190" height="90" fill="none" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="170" x2="250" y2="170" stroke="#333" stroke-width="1"/>
  <line x1="155" y1="140" x2="155" y2="230" stroke="#333" stroke-width="1"/>
  <text x="107" y="162" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">T</text>
  <text x="202" y="162" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">T</text>
  <text x="140" y="192" text-anchor="end" font-family="Arial" font-size="13" fill="#333">t</text>
  <text x="140" y="222" text-anchor="end" font-family="Arial" font-size="13" fill="#333">t</text>

  <rect x="160" y="173" width="86" height="25" rx="3" fill="#a5d6a7"/>
  <text x="203" y="190" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">Tt</text>
  <rect x="160" y="203" width="86" height="25" rx="3" fill="#a5d6a7"/>
  <text x="203" y="220" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">Tt</text>

  <text x="160" y="255" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">All offspring TALL → Unknown = TT</text>

  <!-- Scenario B -->
  <rect x="310" y="75" width="260" height="170" rx="8" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="440" y="98" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#e53935">Scenario B: Unknown is Tt</text>

  <text x="400" y="125" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">Tt × tt</text>

  <rect x="340" y="140" width="190" height="90" fill="none" stroke="#333" stroke-width="1"/>
  <line x1="340" y1="170" x2="530" y2="170" stroke="#333" stroke-width="1"/>
  <line x1="435" y1="140" x2="435" y2="230" stroke="#333" stroke-width="1"/>
  <text x="387" y="162" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">T</text>
  <text x="482" y="162" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">t</text>
  <text x="420" y="192" text-anchor="end" font-family="Arial" font-size="13" fill="#333">t</text>
  <text x="420" y="222" text-anchor="end" font-family="Arial" font-size="13" fill="#333">t</text>

  <rect x="440" y="173" width="86" height="25" rx="3" fill="#c8e6c9"/>
  <text x="483" y="190" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#43a047">Tt (Tall)</text>
  <rect x="440" y="203" width="86" height="25" rx="3" fill="#ffcdd2"/>
  <text x="483" y="220" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">tt (Dwarf)</text>

  <text x="440" y="255" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">1 Tall : 1 Dwarf → Unknown = Tt</text>

  <!-- Golden Rule -->
  <rect x="30" y="270" width="540" height="145" rx="8" fill="#fff8e1" stroke="#ff8f00" stroke-width="2"/>
  <text x="300" y="298" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#ff8f00">⚠ The Golden Rule of Test Crosses</text>

  <text x="300" y="325" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">If <tspan font-weight="bold" fill="#e53935">ANY</tspan> offspring show the recessive phenotype,</text>
  <text x="300" y="348" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">the unknown parent <tspan font-weight="bold">MUST be heterozygous</tspan>.</text>

  <line x1="130" y1="360" x2="470" y2="360" stroke="#ff8f00" stroke-width="1"/>

  <text x="300" y="382" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">Logic: Recessive offspring need one recessive allele from EACH parent.</text>
  <text x="300" y="400" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">If the recessive parent contributes t, the unknown parent must have contributed the other t.</text>
</svg>
