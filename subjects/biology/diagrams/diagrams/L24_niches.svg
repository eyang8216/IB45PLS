<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <rect width="600" height="450" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Fundamental Niche vs. Realized Niche</text>

  <!-- Fundamental niche circle -->
  <circle cx="300" cy="180" r="130" fill="#e3f2fd" stroke="#1565c0" stroke-width="2.5"/>
  <text x="300" y="155" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">FUNDAMENTAL NICHE</text>
  <text x="300" y="175" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">All abiotic conditions</text>
  <text x="300" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">the species could theoretically</text>
  <text x="300" y="205" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">occupy (no competition)</text>

  <!-- Realized niche -->
  <ellipse cx="300" cy="240" rx="90" ry="55" fill="#a5d6a7" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="300" y="255" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">REALIZED</text>
  <text x="300" y="272" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">NICHE</text>

  <!-- Arrow showing compression -->
  <text x="500" y="200" font-family="Arial" font-size="10" fill="#e53935">Competition,</text>
  <text x="500" y="215" font-family="Arial" font-size="10" fill="#e53935">predation,</text>
  <text x="500" y="230" font-family="Arial" font-size="10" fill="#e53935">parasitism</text>
  <text x="500" y="245" font-family="Arial" font-size="10" fill="#e53935">compress the</text>
  <text x="500" y="260" font-family="Arial" font-size="10" fill="#e53935">niche</text>

  <!-- Barnacle example -->
  <rect x="30" y="310" width="540" height="130" rx="6" fill="#fafafa" stroke="#333" stroke-width="1"/>
  <text x="300" y="335" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Example: Barnacles (Connell, 1961)</text>

  <text x="50" y="358" font-family="Arial" font-size="10" fill="#333">Chthamalus (small barnacle):</text>
  <text x="50" y="376" font-family="Arial" font-size="10" fill="#1565c0">Fundamental niche = entire intertidal zone</text>
  <text x="50" y="394" font-family="Arial" font-size="10" fill="#1a6b3c">Realized niche = upper zone only (excluded from lower zone by competition with Semibalanus)</text>

  <text x="50" y="418" font-family="Arial" font-size="10" fill="#333">Semibalanus (large barnacle):</text>
  <text x="50" y="436" font-family="Arial" font-size="10" fill="#e53935">Realized niche = lower intertidal zone (cannot survive in upper zone due to desiccation — abiotic limit)</text>
</svg>