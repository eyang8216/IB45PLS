<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" width="600" height="440">
  <defs><style>text { font-family: Arial, sans-serif; } .title { font-size: 18px; font-weight: bold; fill: #1a6b3c; text-anchor: middle; } .lab { font-size: 13px; fill: #333; text-anchor: middle; } .sm { font-size: 11px; fill: #555; text-anchor: middle; }</style></defs>
  <rect width="600" height="440" fill="#fff"/>
  <text x="300" y="28" class="title">Collagen Triple Helix — Gly-X-Y Repeat</text>

  <!-- Triple helix -->
  <g transform="translate(60, 50)">
    <!-- Three intertwined strands -->
    <path d="M20,280 C60,200 100,80 140,60 C180,40 220,100 260,140 C300,180 340,60 380,40 C420,20 460,120 500,160 C540,200 540,280 540,320" fill="none" stroke="#1565c0" stroke-width="3"/>
    <path d="M30,280 C70,210 110,90 150,50 C190,30 230,90 270,130 C310,170 350,50 390,30 C430,10 470,110 510,150 C530,180 530,280 530,320" fill="none" stroke="#43a047" stroke-width="3"/>
    <path d="M10,280 C50,190 90,70 130,70 C170,50 210,110 250,150 C290,190 330,70 370,50 C410,30 450,130 490,170 C510,200 550,280 550,320" fill="none" stroke="#e53935" stroke-width="3"/>

    <!-- Glycine zoom area -->
    <rect x="220" y="130" width="100" height="50" rx="4" fill="#fff9c4" stroke="#f9a825" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="270" y="145" class="sm" fill="#e65100" font-weight="bold">Gly (−H)</text>
    <text x="270" y="162" class="sm" fill="#e65100">in center</text>
    <!-- arrow from zoom -->
    <line x1="270" y1="180" x2="270" y2="220" stroke="#f9a825" stroke-width="1.5"/>
    <!-- small Gly in center -->
    <circle cx="270" cy="245" r="8" fill="#f9a825" stroke="#e65100" stroke-width="2"/>
    <text x="270" y="248" class="sm" fill="#e65100" font-weight="bold">G</text>
  </g>

  <!-- Labels -->
  <text x="470" y="70" class="lab" fill="#1565c0" font-weight="bold">α₁ chain</text>
  <text x="470" y="90" class="lab" fill="#43a047" font-weight="bold">α₂ chain</text>
  <text x="470" y="110" class="lab" fill="#e53935" font-weight="bold">α₃ chain</text>

  <!-- Structure info -->
  <rect x="20" y="320" width="270" height="110" rx="6" fill="#e8f5e9" stroke="#81c784" stroke-width="2"/>
  <text x="155" y="342" class="lab" fill="#1a6b3c" font-weight="bold">Structure</text>
  <text x="155" y="362" class="sm">• Gly-X-Y repeat: every 3rd AA is Gly</text>
  <text x="155" y="378" class="sm">• Gly's tiny R-group (−H) fits in center</text>
  <text x="155" y="394" class="sm">• X often = Pro; Y often = Hyp</text>
  <text x="155" y="412" class="sm">• ~1000 amino acids per chain</text>

  <rect x="310" y="320" width="270" height="110" rx="6" fill="#e3f2fd" stroke="#64b5f6" stroke-width="2"/>
  <text x="445" y="342" class="lab" fill="#1565c0" font-weight="bold">Post-Translational Mods</text>
  <text x="445" y="362" class="sm">• Prolyl hydroxylase → Hyp (needs Vitamin C!)</text>
  <text x="445" y="378" class="sm">• Lysyl hydroxylase → Hyl (needs Vitamin C)</text>
  <text x="445" y="394" class="sm">• Hyp forms extra H-bonds for stability</text>
  <text x="445" y="412" class="sm">• Without Vit C → scurvy (unstable collagen)</text>
</svg>
