<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs><style>text { font-family: Arial, sans-serif; } .title { font-size: 18px; font-weight: bold; fill: #1a6b3c; text-anchor: middle; } .label { font-size: 13px; fill: #333; text-anchor: middle; } .sub { font-size: 12px; fill: #555; text-anchor: middle; }</style></defs>
  <rect width="600" height="450" fill="#fff"/>
  <text x="300" y="30" class="title">Saturated vs Unsaturated Fatty Acids</text>

  <!-- Saturated -->
  <text x="150" y="65" class="label" fill="#1a6b3c" font-weight="bold">Saturated (Stearic Acid, C18:0)</text>
  <polyline points="40,95 55,110 40,125 55,140 40,155 55,170 40,185 55,200 40,215 55,230 40,245 55,260 40,275 55,290 40,305 55,320 40,335 55,350" fill="none" stroke="#1a6b3c" stroke-width="3"/>
  <text x="150" y="375" class="label">Straight chains → pack tightly</text>
  <text x="150" y="392" class="label" fill="#e53935">→ SOLID at room temp</text>

  <!-- Unsaturated (cis) -->
  <text x="450" y="65" class="label" fill="#1565c0" font-weight="bold">Unsaturated (Oleic Acid, C18:1 cis)</text>
  <polyline points="340,95 355,110 340,125 355,140 340,155 355,170 340,185 355,200" fill="none" stroke="#1565c0" stroke-width="3"/>
  <!-- kink -->
  <polyline points="355,200 340,220 355,240 365,245" fill="none" stroke="#1565c0" stroke-width="3"/>
  <!-- double bond indicator -->
  <line x1="342" y1="215" x2="352" y2="228" stroke="#1565c0" stroke-width="2.5"/>
  <line x1="338" y1="222" x2="348" y2="235" stroke="#1565c0" stroke-width="2.5"/>
  <polyline points="365,245 340,260 355,275 340,290 355,305 340,320 355,335 340,350" fill="none" stroke="#1565c0" stroke-width="3"/>
  <text x="450" y="375" class="label">Kinked chains → cannot pack tightly</text>
  <text x="450" y="392" class="label" fill="#1565c0">→ LIQUID at room temp (oil)</text>

  <!-- Bottom table -->
  <rect x="20" y="405" width="560" height="38" rx="4" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="45" y="428" class="sub" fill="#1a6b3c" font-weight="bold">C=C double bonds cause kinks; saturated = straight; melting point decreases as unsaturation increases</text>
</svg>
