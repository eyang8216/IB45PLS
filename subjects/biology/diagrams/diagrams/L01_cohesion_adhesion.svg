<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <marker id="arrowUp" markerWidth="10" markerHeight="7" refX="5" refY="0" orient="auto">
      <polygon points="0 7, 5 0, 10 7" fill="#1565c0"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#1a6b3c">Cohesion &amp; Adhesion in Xylem Vessels</text>

  <!-- Xylem vessel walls (two vertical lines) -->
  <rect x="140" y="50" width="10" height="340" rx="3" fill="#81c784" stroke="#43a047" stroke-width="2"/>
  <rect x="450" y="50" width="10" height="340" rx="3" fill="#81c784" stroke="#43a047" stroke-width="2"/>

  <!-- Lignin rings (horizontal bands) -->
  <line x1="140" y1="80" x2="460" y2="80" stroke="#1a6b3c" stroke-width="4"/>
  <line x1="140" y1="140" x2="460" y2="140" stroke="#1a6b3c" stroke-width="4"/>
  <line x1="140" y1="200" x2="460" y2="200" stroke="#1a6b3c" stroke-width="4"/>
  <line x1="140" y1="260" x2="460" y2="260" stroke="#1a6b3c" stroke-width="4"/>
  <line x1="140" y1="320" x2="460" y2="320" stroke="#1a6b3c" stroke-width="4"/>
  <line x1="140" y1="380" x2="460" y2="380" stroke="#1a6b3c" stroke-width="4"/>

  <!-- Label: Xylem vessel wall -->
  <text x="40" y="220" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1a6b3c" transform="rotate(-90, 40, 220)">Xylem wall (lignified)</text>

  <!-- Water molecules inside the tube (small circles) -->
  <!-- Row 1 -->
  <circle cx="220" cy="95" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="260" cy="95" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="300" cy="95" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="340" cy="95" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="380" cy="95" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <!-- H-bond dots between molecules -->
  <line x1="234" y1="95" x2="246" y2="95" stroke="#333" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="274" y1="95" x2="286" y2="95" stroke="#333" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="314" y1="95" x2="326" y2="95" stroke="#333" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="354" y1="95" x2="366" y2="95" stroke="#333" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Row 2 -->
  <circle cx="240" cy="130" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="280" cy="130" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="320" cy="130" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="360" cy="130" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>

  <!-- Row 3 -->
  <circle cx="220" cy="170" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="260" cy="170" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="300" cy="170" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="340" cy="170" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="380" cy="170" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>

  <!-- Row 4 -->
  <circle cx="240" cy="215" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="280" cy="215" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="320" cy="215" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="360" cy="215" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>

  <!-- Row 5 -->
  <circle cx="220" cy="260" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="260" cy="260" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="300" cy="260" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="340" cy="260" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>
  <circle cx="380" cy="260" r="14" fill="#1565c0" fill-opacity="0.2" stroke="#1565c0" stroke-width="2"/>

  <!-- Adhesion lines to walls -->
  <line x1="155" y1="95" x2="206" y2="95" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="155" y1="170" x2="206" y2="170" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="155" y1="260" x2="206" y2="260" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="394" y1="95" x2="445" y2="95" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="394" y1="170" x2="445" y2="170" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="394" y1="260" x2="445" y2="260" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Upward arrows (transpiration pull) -->
  <line x1="230" y1="350" x2="230" y2="310" stroke="#1565c0" stroke-width="2.5" marker-end="url(#arrowUp)"/>
  <line x1="370" y1="350" x2="370" y2="310" stroke="#1565c0" stroke-width="2.5" marker-end="url(#arrowUp)"/>

  <!-- Labels -->
  <text x="530" y="100" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ff8f00">Adhesion:</text>
  <text x="530" y="116" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ff8f00">H₂O attracted</text>
  <text x="530" y="132" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ff8f00">to wall</text>

  <text x="530" y="180" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1565c0">Cohesion:</text>
  <text x="530" y="196" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1565c0">H₂O molecules</text>
  <text x="530" y="212" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1565c0">stick together</text>

  <text x="300" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#333">Transpiration pull from leaves drives the continuous water column upward</text>
</svg>
