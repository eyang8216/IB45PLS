<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <rect width="600" height="500" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Production of Monoclonal Antibodies (Hybridoma Method)</text>

  <defs>
    <marker id="aH" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#333"/></marker>
  </defs>

  <!-- Step 1: Immunize mouse -->
  <rect x="20" y="35" width="170" height="80" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="105" y="55" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">1. Immunize Mouse</text>
  <text x="105" y="73" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Inject antigen into mouse</text>
  <text x="105" y="88" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">→ Mouse produces B cells</text>
  <text x="105" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">→ specific to antigen</text>

  <line x1="190" y1="75" x2="215" y2="75" stroke="#333" stroke-width="2" marker-end="url(#aH)"/>

  <!-- Step 2: Harvest spleen B cells -->
  <rect x="225" y="35" width="170" height="80" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="310" y="55" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">2. Harvest Spleen</text>
  <text x="310" y="73" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Remove spleen</text>
  <text x="310" y="88" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Isolate B lymphocytes</text>
  <text x="310" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(producing antibody)</text>

  <line x1="395" y1="75" x2="425" y2="75" stroke="#333" stroke-width="2" marker-end="url(#aH)"/>

  <!-- Step 3: Fusion with myeloma -->
  <rect x="435" y="35" width="150" height="80" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="510" y="55" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">3. Cell Fusion</text>
  <text x="510" y="73" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Mix B cells +</text>
  <text x="510" y="88" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Myeloma cells</text>
  <text x="510" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">+ PEG (fusing agent)</text>

  <!-- Myeloma cells -->
  <ellipse cx="480" cy="140" rx="22" ry="14" fill="#f48fb1" stroke="#c2185b" stroke-width="1.5"/>
  <text x="480" y="143" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">Myeloma</text>
  <ellipse cx="540" cy="140" rx="22" ry="14" fill="#f48fb1" stroke="#c2185b" stroke-width="1.5"/>
  <text x="540" y="143" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">Myeloma</text>

  <!-- B cells -->
  <ellipse cx="450" cy="175" rx="18" ry="12" fill="#a5d6a7" stroke="#43a047" stroke-width="1.5"/>
  <text x="450" y="178" text-anchor="middle" font-family="Arial" font-size="7" fill="#1a6b3c">B cell</text>
  <ellipse cx="510" cy="175" rx="18" ry="12" fill="#a5d6a7" stroke="#43a047" stroke-width="1.5"/>
  <text x="510" y="178" text-anchor="middle" font-family="Arial" font-size="7" fill="#1a6b3c">B cell</text>

  <!-- Fusion result -->
  <line x1="465" y1="152" x2="455" y2="165" stroke="#333" stroke-width="1.5"/>
  <line x1="495" y1="152" x2="455" y2="165" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="455" cy="195" rx="20" ry="13" fill="#ce93d8" stroke="#6a1b9a" stroke-width="2"/>
  <text x="455" y="198" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Hybridoma</text>

  <line x1="525" y1="152" x2="515" y2="165" stroke="#333" stroke-width="1.5"/>
  <line x1="555" y1="152" x2="515" y2="165" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="515" cy="195" rx="20" ry="13" fill="#ce93d8" stroke="#6a1b9a" stroke-width="2"/>
  <text x="515" y="198" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">Hybridoma</text>

  <!-- Step 4: HAT selection -->
  <rect x="20" y="220" width="560" height="75" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="300" y="242" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6a1b9a">4. HAT Medium Selection</text>

  <ellipse cx="80" cy="275" rx="18" ry="12" fill="#a5d6a7" stroke="#43a047" stroke-width="1.5"/>
  <text x="80" y="278" text-anchor="middle" font-family="Arial" font-size="7" fill="#1a6b3c">B cell</text>
  <text x="80" y="295" text-anchor="middle" font-family="Arial" font-size="7" fill="#e53935">✘ Dies</text>

  <ellipse cx="180" cy="275" rx="18" ry="12" fill="#f48fb1" stroke="#c2185b" stroke-width="1.5"/>
  <text x="180" y="278" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">Myeloma</text>
  <text x="180" y="295" text-anchor="middle" font-family="Arial" font-size="7" fill="#e53935">✘ Dies</text>

  <ellipse cx="280" cy="275" rx="22" ry="14" fill="#ce93d8" stroke="#6a1b9a" stroke-width="2"/>
  <text x="280" y="278" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Hybridoma</text>
  <text x="280" y="295" text-anchor="middle" font-family="Arial" font-size="7" fill="#1a6b3c">✓ Survives</text>

  <ellipse cx="380" cy="275" rx="22" ry="14" fill="#ce93d8" stroke="#6a1b9a" stroke-width="2"/>
  <text x="380" y="278" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Hybridoma</text>
  <text x="380" y="295" text-anchor="middle" font-family="Arial" font-size="7" fill="#1a6b3c">✓ Survives</text>

  <ellipse cx="480" cy="275" rx="22" ry="14" fill="#ce93d8" stroke="#6a1b9a" stroke-width="2"/>
  <text x="480" y="278" text-anchor="middle" font-family="Arial" font-size="8" fill="#6a1b9a">Hybridoma</text>
  <text x="480" y="295" text-anchor="middle" font-family="Arial" font-size="7" fill="#1a6b3c">✓ Survives</text>

  <text x="300" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">B cells die (no division) · Myeloma die (HGPRT⁻) · Only hybridomas survive (B cell HGPRT⁺ + Myeloma immortality)</text>

  <line x1="300" y1="320" x2="300" y2="345" stroke="#333" stroke-width="2" marker-end="url(#aH)"/>

  <!-- Step 5: Screen -->
  <rect x="70" y="350" width="200" height="65" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="170" y="370" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">5. Screen for Antibody</text>
  <text x="170" y="388" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">ELISA test — identify</text>
  <text x="170" y="403" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">clones producing desired Ab</text>

  <line x1="270" y1="382" x2="305" y2="382" stroke="#333" stroke-width="2" marker-end="url(#aH)"/>

  <!-- Step 6: Clone -->
  <rect x="310" y="350" width="130" height="65" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="375" y="370" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">6. Clone</text>
  <text x="375" y="388" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Single-cell</text>
  <text x="375" y="403" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">cloning</text>

  <line x1="440" y1="382" x2="475" y2="382" stroke="#333" stroke-width="2" marker-end="url(#aH)"/>

  <!-- Step 7: Mass produce -->
  <rect x="480" y="350" width="100" height="65" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="530" y="370" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">7. Produce</text>
  <text x="530" y="388" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Mass culture</text>
  <text x="530" y="403" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">in bioreactors</text>

  <!-- Final product -->
  <rect x="150" y="435" width="300" height="50" rx="8" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="2.5"/>
  <text x="300" y="458" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">Monoclonal Antibodies</text>
  <text x="300" y="475" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Homogeneous, specific, immortal — used in diagnostics, therapy, pregnancy tests</text>
</svg>