<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 680" width="600" height="680">
  <defs><marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#333"/></marker></defs>
  <rect width="600" height="680" fill="#fff" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#6a1b9a">Hypothalamus-Pituitary Axis — Master Endocrine Control</text>

  <!-- Brain outline -->
  <ellipse cx="300" cy="100" rx="100" ry="50" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="300" y="100" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a">Brain</text>

  <!-- Hypothalamus -->
  <rect x="240" y="130" width="120" height="40" rx="8" fill="#ce93d8" stroke="#6a1b9a" stroke-width="2.5"/>
  <text x="300" y="148" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">Hypothalamus</text>
  <text x="300" y="163" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">Integrates neural + endocrine</text>

  <!-- Infundibulum -->
  <rect x="285" y="170" width="30" height="50" rx="4" fill="#e1bee7" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="300" y="190" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">stalk</text>

  <!-- Portal system arrow -->
  <text x="230" y="195" font-family="Arial" font-size="8" fill="#e53935" font-weight="bold">Portal</text>
  <text x="229" y="208" font-family="Arial" font-size="8" fill="#e53935" font-weight="bold">Veins</text>

  <!-- Anterior pituitary -->
  <rect x="190" y="230" width="120" height="50" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2.5"/>
  <text x="250" y="250" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">Anterior Pituitary</text>
  <text x="250" y="268" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">(Adenohypophysis)</text>
  <text x="250" y="280" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">Glandular tissue</text>

  <!-- Posterior pituitary -->
  <rect x="210" y="300" width="90" height="45" rx="10" fill="#fff9c4" stroke="#ff8f00" stroke-width="2.5"/>
  <text x="255" y="318" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff8f00">Posterior Pituitary</text>
  <text x="255" y="335" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">(Neurohypophysis)</text>

  <!-- Neural connection from hypo to post pit -->
  <line x1="290" y1="170" x2="250" y2="300" stroke="#ff8f00" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Axis table -->
  <rect x="30" y="370" width="540" height="180" rx="8" fill="#f5f5f5" stroke="#bbb" stroke-width="1.5"/>
  <text x="300" y="392" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Hypothalamus → Anterior Pituitary → Target Gland Axis</text>

  <line x1="30" y1="400" x2="570" y2="400" stroke="#ccc" stroke-width="1"/>

  <text x="50" y="420" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Hypothalamic Hormone</text>
  <text x="220" y="420" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Ant. Pit. Hormone</text>
  <text x="370" y="420" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Target Gland</text>
  <text x="500" y="420" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#333">Hormone</text>

  <line x1="30" y1="428" x2="570" y2="428" stroke="#ccc" stroke-width="1"/>

  <text x="50" y="445" font-family="Arial" font-size="8" fill="#555">TRH</text>
  <text x="220" y="445" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">TSH →</text>
  <text x="370" y="445" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Thyroid</text>
  <text x="500" y="445" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">T₃/T₄</text>

  <text x="50" y="462" font-family="Arial" font-size="8" fill="#555">CRH</text>
  <text x="220" y="462" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">ACTH →</text>
  <text x="370" y="462" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Adrenal cortex</text>
  <text x="500" y="462" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Cortisol</text>

  <text x="50" y="479" font-family="Arial" font-size="8" fill="#555">GnRH</text>
  <text x="220" y="479" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">FSH/LH →</text>
  <text x="370" y="479" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Ovaries/Testes</text>
  <text x="500" y="479" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Estrogen/Prog/T</text>

  <text x="50" y="496" font-family="Arial" font-size="8" fill="#555">GHRH</text>
  <text x="220" y="496" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">GH →</text>
  <text x="370" y="496" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Liver/tissues</text>
  <text x="500" y="496" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">IGF-1</text>

  <text x="50" y="513" font-family="Arial" font-size="8" fill="#555">Dopamine (−)</text>
  <text x="220" y="513" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Prolactin ↓</text>
  <text x="370" y="513" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Mammary glands</text>
  <text x="500" y="513" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Milk</text>

  <!-- Negative feedback loop -->
  <rect x="30" y="565" width="540" height="100" rx="8" fill="#ffcdd2" stroke="#e53935" stroke-width="2"/>
  <text x="300" y="588" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">Negative Feedback Control (e.g., Thyroid Axis)</text>

  <text x="80" y="615" font-family="Arial" font-size="10" fill="#333">Hypothalamus</text>
  <text x="185" y="615" font-family="Arial" font-size="10" fill="#333" font-weight="bold">→ TRH →</text>
  <text x="250" y="615" font-family="Arial" font-size="10" fill="#333">Ant. Pituitary</text>
  <text x="355" y="615" font-family="Arial" font-size="10" fill="#333" font-weight="bold">→ TSH →</text>
  <text x="420" y="615" font-family="Arial" font-size="10" fill="#333">Thyroid</text>
  <text x="500" y="615" font-family="Arial" font-size="10" fill="#333" font-weight="bold">→ T₃/T₄</text>

  <path d="M495,625 Q495,655 300,655 Q105,655 105,625" fill="none" stroke="#e53935" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="300" y="653" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">Negative Feedback: T₃/T₄ inhibits TRH &amp; TSH release</text>

  <text x="300" y="640" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">Posterior pituitary (not shown in axis): stores &amp; releases ADH + Oxytocin from hypothalamic neurons</text>
</svg>
