<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <rect width="600" height="500" fill="#fff"/>
  <text x="300" y="24" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#1a6b3c">Histone Acetylation &amp; Chromatin Remodeling</text>
  <text x="300" y="42" text-anchor="middle" font-family="Arial" font-size="10" fill="#666" font-style="italic">Histone modifications control chromatin accessibility</text>

  <!-- Side by side comparison -->
  <!-- Heterochromatin: Deacetylated -->
  <rect x="30" y="58" width="260" height="280" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="160" y="80" text-anchor="middle" font-family="Arial" font-size="13" fill="#e53935" font-weight="bold">Deacetylated Histones</text>
  <text x="160" y="96" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Heterochromatin — Silent</text>

  <!-- Tight nucleosomes -->
  <g transform="translate(60,110)">
    <circle cx="40" cy="50" r="25" fill="#e53935" opacity="0.15" stroke="#e53935" stroke-width="2"/>
    <circle cx="100" cy="50" r="25" fill="#e53935" opacity="0.15" stroke="#e53935" stroke-width="2"/>
    <circle cx="40" cy="110" r="25" fill="#e53935" opacity="0.15" stroke="#e53935" stroke-width="2"/>
    <circle cx="100" cy="110" r="25" fill="#e53935" opacity="0.15" stroke="#e53935" stroke-width="2"/>
    <circle cx="40" cy="170" r="25" fill="#e53935" opacity="0.15" stroke="#e53935" stroke-width="2"/>
    <circle cx="100" cy="170" r="25" fill="#e53935" opacity="0.15" stroke="#e53935" stroke-width="2"/>
    <!-- DNA tight wrap -->
    <path d="M15,50 Q25,25 40,25 Q55,25 65,50 Q75,75 65,100" fill="none" stroke="#333" stroke-width="2"/>
    <path d="M65,100 Q55,125 40,125 Q25,125 15,100" fill="none" stroke="#333" stroke-width="2"/>
  </g>

  <text x="160" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Lysine-NH₃⁺ (positively charged)</text>
  <text x="160" y="330" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Strong attraction to DNA backbone (−)</text>

  <!-- Euchromatin: Acetylated -->
  <rect x="310" y="58" width="260" height="280" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="440" y="80" text-anchor="middle" font-family="Arial" font-size="13" fill="#1a6b3c" font-weight="bold">Acetylated Histones</text>
  <text x="440" y="96" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Euchromatin — Active</text>

  <!-- Loose nucleosomes -->
  <g transform="translate(340,110)">
    <circle cx="40" cy="50" r="25" fill="#43a047" opacity="0.15" stroke="#43a047" stroke-width="2"/>
    <circle cx="100" cy="50" r="25" fill="#43a047" opacity="0.15" stroke="#43a047" stroke-width="2"/>
    <circle cx="40" cy="120" r="25" fill="#43a047" opacity="0.15" stroke="#43a047" stroke-width="2"/>
    <circle cx="100" cy="120" r="25" fill="#43a047" opacity="0.15" stroke="#43a047" stroke-width="2"/>
    <circle cx="40" cy="185" r="25" fill="#43a047" opacity="0.15" stroke="#43a047" stroke-width="2"/>
    <circle cx="100" cy="185" r="25" fill="#43a047" opacity="0.15" stroke="#43a047" stroke-width="2"/>
    <!-- looser DNA -->
    <path d="M12,50 Q22,18 40,18 Q58,18 68,50" fill="none" stroke="#333" stroke-width="2"/>
    <path d="M68,50 Q78,82 68,110" fill="none" stroke="#333" stroke-width="2"/>
  </g>

  <!-- Acetyl groups -->
  <text x="380" y="290" font-family="Arial" font-size="7" fill="#1a6b3c">Ac</text>
  <text x="430" y="282" font-family="Arial" font-size="7" fill="#1a6b3c">Ac</text>
  <text x="400" y="300" font-family="Arial" font-size="7" fill="#1a6b3c">Ac</text>
  <text x="450" y="295" font-family="Arial" font-size="7" fill="#1a6b3c">Ac</text>

  <text x="440" y="315" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Lysine-NH-COCH₃ (neutral)</text>
  <text x="440" y="330" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Weak attraction to DNA → opens chromatin</text>

  <!-- Enzyme arrows -->
  <text x="300" y="140" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">HATs →</text>
  <text x="300" y="155" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">(Acetylases)</text>
  <text x="300" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">← HDACs</text>
  <text x="300" y="195" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">(Deacetylases)</text>

  <!-- Nucleosome detail -->
  <line x1="30" y1="355" x2="570" y2="355" stroke="#ddd" stroke-width="1"/>

  <text x="300" y="378" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Nucleosome Structure (Basic Unit of Chromatin)</text>

  <g transform="translate(160,390)">
    <!-- Histone octamer -->
    <circle cx="70" cy="30" r="22" fill="#6a1b9a" opacity="0.15" stroke="#6a1b9a" stroke-width="2"/>
    <text x="70" y="28" text-anchor="middle" font-family="Arial" font-size="7" fill="#6a1b9a">H2A</text>
    <text x="85" y="30" font-family="Arial" font-size="6" fill="#888">H2B</text>
    <text x="70" y="40" text-anchor="middle" font-family="Arial" font-size="6" fill="#888">H3₂ H4₂</text>

    <!-- DNA wrapped -->
    <path d="M45,40 Q40,10 70,5 Q100,0 100,30 Q100,55 70,55 Q45,55 45,40" fill="none" stroke="#333" stroke-width="2.5"/>
    <path d="M45,40 Q40,60 35,70" fill="none" stroke="#333" stroke-width="2.5"/>

    <!-- Histone tails -->
    <line x1="55" y1="10" x2="50" y2="-5" stroke="#6a1b9a" stroke-width="1.5"/>
    <line x1="75" y1="8" x2="80" y2="-8" stroke="#6a1b9a" stroke-width="1.5"/>
    <text x="43" y="-8" font-family="Arial" font-size="7" fill="#6a1b9a">N-tail</text>
    <text x="72" y="-11" font-family="Arial" font-size="7" fill="#6a1b9a">Modifications:</text>
    <text x="95" y="-2" font-family="Arial" font-size="6" fill="#333">Ac</text>
    <text x="105" y="-2" font-family="Arial" font-size="6" fill="#333">Me</text>
    <text x="95" y="8" font-family="Arial" font-size="6" fill="#333">P</text>
    <text x="105" y="8" font-family="Arial" font-size="6" fill="#333">Ub</text>
  </g>

  <text x="500" y="410" font-family="Arial" font-size="9" fill="#555">~147 bp DNA wrapped</text>
  <text x="500" y="424" font-family="Arial" font-size="9" fill="#555">around histone octamer</text>

  <!-- Summary table -->
  <rect x="30" y="445" width="540" height="45" rx="5" fill="#e8eaf6" stroke="#c5cae9" stroke-width="1"/>
  <text x="300" y="463" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Acetylation = HAT adds -COCH₃ to lysine → neutralizes charge → opens chromatin → ACTIVE transcription</text>
  <text x="300" y="481" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Deacetylation = HDAC removes → restores + charge → closes chromatin → SILENCED transcription</text>
</svg>
