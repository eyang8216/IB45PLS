### L03_a: tRNA Cloverleaf Structure ###
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" style="background:#fff">
  <defs><linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a6b3c"/><stop offset="100%" stop-color="#43a047"/></linearGradient></defs>
  <rect width="600" height="500" fill="#fff"/>
  <rect x="0" y="0" width="600" height="42" fill="url(#hdr)"/>
  <text x="300" y="28" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="16">tRNA Structure — Cloverleaf Model</text>

  <!-- Acceptor stem top -->
  <line x1="300" y1="72" x2="300" y2="120" stroke="#1a6b3c" stroke-width="3"/>
  <line x1="275" y1="72" x2="275" y2="120" stroke="#e53935" stroke-width="3"/>
  <!-- cross lines for base pairs -->
  <line x1="275" y1="80" x2="300" y2="80" stroke="#333" stroke-width="1.5"/>
  <line x1="275" y1="95" x2="300" y2="95" stroke="#333" stroke-width="1.5"/>
  <line x1="275" y1="110" x2="300" y2="110" stroke="#333" stroke-width="1.5"/>
  <text x="286" y="68" text-anchor="middle" fill="#1a6b3c" font-family="Arial" font-weight="bold" font-size="13">Amino acid</text>
  <text x="286" y="78" text-anchor="middle" fill="#1a6b3c" font-family="Arial" font-size="11">attachment site</text>
  <text x="260" y="100" text-anchor="end" fill="#e53935" font-family="Arial" font-size="14" font-weight="bold">3′</text>
  <text x="310" y="100" fill="#e53935" font-family="Arial" font-size="14" font-weight="bold">5′</text>
  <text x="250" y="134" text-anchor="end" fill="#e53935" font-family="Arial" font-size="10">CCA</text>

  <!-- D-loop (top-left) -->
  <path d="M275,120 C200,120 180,160 200,200 C215,230 250,230 275,200" stroke="#1565c0" stroke-width="2.5" fill="none"/>
  <text x="210" y="170" text-anchor="middle" fill="#1565c0" font-family="Arial" font-weight="bold" font-size="13">D-loop</text>
  <text x="210" y="186" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">(dihydrouridine)</text>

  <!-- T-loop (top-right) -->
  <path d="M300,120 C380,120 430,155 400,200 C375,240 325,230 300,200" stroke="#6a1b9a" stroke-width="2.5" fill="none"/>
  <text x="370" y="170" text-anchor="middle" fill="#6a1b9a" font-family="Arial" font-weight="bold" font-size="13">TΨC-loop</text>
  <text x="370" y="186" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">(ribosome binding)</text>

  <!-- Anticodon stem -->
  <line x1="285" y1="200" x2="285" y2="280" stroke="#333" stroke-width="2.5"/>
  <line x1="315" y1="200" x2="315" y2="280" stroke="#333" stroke-width="2.5"/>
  <line x1="285" y1="210" x2="315" y2="210" stroke="#333" stroke-width="1.5"/>
  <line x1="285" y1="225" x2="315" y2="225" stroke="#333" stroke-width="1.5"/>
  <line x1="285" y1="240" x2="315" y2="240" stroke="#333" stroke-width="1.5"/>
  <line x1="285" y1="255" x2="315" y2="255" stroke="#333" stroke-width="1.5"/>
  <line x1="285" y1="270" x2="315" y2="270" stroke="#333" stroke-width="1.5"/>

  <!-- Anticodon loop bottom -->
  <path d="M285,280 C260,280 240,320 260,350 C275,370 300,370 300,370 C300,370 325,370 340,350 C360,320 340,280 315,280" stroke="#e53935" stroke-width="2.5" fill="none"/>

  <text x="300" y="355" text-anchor="middle" fill="#e53935" font-family="Arial" font-weight="bold" font-size="14">Anticodon</text>
  <text x="300" y="370" text-anchor="middle" fill="#666" font-family="Arial" font-size="11">(3 bases complementary</text>
  <text x="300" y="383" text-anchor="middle" fill="#666" font-family="Arial" font-size="11">to mRNA codon)</text>

  <!-- Variable loop side -->
  <path d="M315,200 C360,210 360,250 315,260" stroke="#ff8f00" stroke-width="2" fill="none"/>
  <text x="375" y="235" fill="#ff8f00" font-family="Arial" font-size="10">Variable loop</text>

  <!-- Legend -->
  <rect x="30" y="410" width="540" height="80" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="432" fill="#333" font-family="Arial" font-size="12" font-weight="bold">Key Functions:</text>
  <text x="50" y="450" fill="#333" font-family="Arial" font-size="11">• Acceptor stem (top): carries amino acid at 3′ CCA end</text>
  <text x="50" y="468" fill="#333" font-family="Arial" font-size="11">• Anticodon loop (bottom): base-pairs with mRNA codon during translation</text>
  <text x="330" y="450" fill="#333" font-family="Arial" font-size="11">• D-loop &amp; TΨC-loop: ribosome recognition &amp; binding</text>
  <text x="330" y="468" fill="#333" font-family="Arial" font-size="11">• ~75–90 nucleotides; L-shaped in 3D</text>
</svg>