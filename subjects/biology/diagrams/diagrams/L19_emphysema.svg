<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <rect width="600" height="450" fill="#fff"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Emphysema — Healthy vs. Diseased Alveoli</text>

  <!-- HEALTHY ALVEOLI -->
  <text x="150" y="65" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">HEALTHY</text>

  <rect x="25" y="80" width="250" height="350" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>

  <!-- Many small alveoli -->
  <circle cx="75" cy="140" r="30" fill="none" stroke="#1a6b3c" stroke-width="2"/>
  <circle cx="120" cy="120" r="25" fill="none" stroke="#1a6b3c" stroke-width="2"/>
  <circle cx="160" cy="145" r="28" fill="none" stroke="#1a6b3c" stroke-width="2"/>
  <circle cx="90" cy="185" r="26" fill="none" stroke="#1a6b3c" stroke-width="2"/>
  <circle cx="140" cy="195" r="30" fill="none" stroke="#1a6b3c" stroke-width="2"/>
  <circle cx="185" cy="185" r="24" fill="none" stroke="#1a6b3c" stroke-width="2"/>
  <circle cx="110" cy="240" r="27" fill="none" stroke="#1a6b3c" stroke-width="2"/>
  <circle cx="160" cy="250" r="29" fill="none" stroke="#1a6b3c" stroke-width="2"/>
  <circle cx="80" cy="260" r="22" fill="none" stroke="#1a6b3c" stroke-width="2"/>

  <!-- Labels -->
  <text x="130" y="300" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a6b3c">Many small, clustered</text>
  <text x="130" y="315" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a6b3c">alveoli</text>
  <text x="130" y="335" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">HIGH Surface Area</text>
  <text x="130" y="355" text-anchor="middle" font-family="Arial" font-size="10" fill="#43a047">Elastic recoil intact</text>
  <text x="130" y="375" text-anchor="middle" font-family="Arial" font-size="10" fill="#43a047">Thin alveolar walls</text>
  <text x="130" y="395" text-anchor="middle" font-family="Arial" font-size="10" fill="#43a047">Efficient gas exchange</text>

  <!-- EMPHYSEMA -->
  <text x="450" y="65" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e53935">EMPHYSEMA</text>

  <rect x="325" y="80" width="250" height="350" rx="8" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>

  <!-- Few large merged air spaces -->
  <circle cx="420" cy="150" r="65" fill="none" stroke="#e53935" stroke-width="2" stroke-dasharray="8,3"/>
  <circle cx="470" cy="220" r="55" fill="none" stroke="#e53935" stroke-width="2" stroke-dasharray="8,3"/>
  <circle cx="380" cy="240" r="45" fill="none" stroke="#e53935" stroke-width="2" stroke-dasharray="8,3"/>

  <!-- Broken walls -->
  <line x1="390" y1="140" x2="420" y2="180" stroke="#e53935" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="450" y1="160" x2="440" y2="200" stroke="#e53935" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="420" y1="210" x2="460" y2="200" stroke="#e53935" stroke-width="1.5" stroke-dasharray="4,4"/>

  <text x="450" y="300" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935">Few, large merged</text>
  <text x="450" y="315" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935">air spaces</text>
  <text x="450" y="335" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">LOW Surface Area</text>
  <text x="450" y="355" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Alveolar walls destroyed</text>
  <text x="450" y="375" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Loss of elastic recoil</text>
  <text x="450" y="395" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Air trapping → barrel chest</text>

  <!-- Molecular mechanism -->
  <rect x="50" y="85" width="500" height="0"/> <!-- spacer -->
</svg>
