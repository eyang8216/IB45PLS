<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" width="600" height="520">
  <rect width="600" height="520" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Clonal Selection of B Lymphocytes</text>

  <!-- Naive B cells row -->
  <text x="300" y="50" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">1. Diverse B Cell Pool — Each with Unique Receptor</text>

  <!-- 5 B cells with different receptors -->
  <ellipse cx="80" cy="85" rx="28" ry="18" fill="#bbdefb" stroke="#1565c0" stroke-width="2"/>
  <text x="80" y="88" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">B cell</text>
  <path d="M70,75 L65,60 M75,73 L75,58 M80,73 L80,58 M85,73 L85,58 M90,75 L95,60" stroke="#e53935" stroke-width="1.5"/>

  <ellipse cx="170" cy="85" rx="28" ry="18" fill="#bbdefb" stroke="#1565c0" stroke-width="2"/>
  <text x="170" y="88" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">B cell</text>
  <path d="M160,75 L155,58 M165,73 L165,55 M170,73 L170,55 M175,73 L175,55 M180,75 L185,58" stroke="#43a047" stroke-width="1.5"/>

  <ellipse cx="260" cy="85" rx="28" ry="18" fill="#bbdefb" stroke="#1565c0" stroke-width="2"/>
  <text x="260" y="88" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">B cell</text>
  <path d="M250,75 L245,58 M255,73 L255,55 M260,73 L260,55 M265,73 L265,55 M270,75 L275,58" stroke="#ff8f00" stroke-width="1.5"/>

  <ellipse cx="350" cy="85" rx="28" ry="18" fill="#bbdefb" stroke="#1565c0" stroke-width="2"/>
  <text x="350" y="88" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">B cell</text>
  <path d="M340,75 L335,58 M345,73 L345,55 M350,73 L350,55 M355,73 L355,55 M360,75 L365,58" stroke="#6a1b9a" stroke-width="1.5"/>

  <ellipse cx="440" cy="85" rx="28" ry="18" fill="#bbdefb" stroke="#1565c0" stroke-width="2"/>
  <text x="440" y="88" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">B cell</text>
  <path d="M430,75 L425,58 M435,73 L435,55 M440,73 L440,55 M445,73 L445,55 M450,75 L455,58" stroke="#e53935" stroke-width="1.5"/>

  <!-- Step 2: Antigen binding -->
  <text x="300" y="125" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">2. Antigen Binds to Matching B Cell Receptor</text>

  <!-- Antigen -->
  <ellipse cx="260" cy="155" rx="15" ry="10" fill="#e53935" stroke="#b71c1c" stroke-width="2"/>
  <text x="260" y="158" text-anchor="middle" font-family="Arial" font-size="7" fill="#fff">Antigen</text>
  <line x1="260" y1="145" x2="260" y2="105" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- Highlighted match -->
  <ellipse cx="260" cy="85" rx="32" ry="22" fill="none" stroke="#ff8f00" stroke-width="3" stroke-dasharray="4 2"/>
  <text x="260" y="68" text-anchor="middle" font-family="Arial" font-size="9" fill="#ff8f00" font-weight="bold">MATCH!</text>

  <!-- Other B cells crossed out -->
  <text x="80" y="175" text-anchor="middle" font-family="Arial" font-size="9" fill="#999">✘ No match</text>
  <text x="170" y="175" text-anchor="middle" font-family="Arial" font-size="9" fill="#999">✘ No match</text>
  <text x="350" y="175" text-anchor="middle" font-family="Arial" font-size="9" fill="#999">✘ No match</text>
  <text x="440" y="175" text-anchor="middle" font-family="Arial" font-size="9" fill="#999">✘ No match</text>

  <!-- Step 3: T helper -->
  <text x="300" y="210" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">3. T Helper Cell Activation</text>

  <ellipse cx="260" cy="245" rx="30" ry="18" fill="#c8e6c9" stroke="#43a047" stroke-width="2"/>
  <text x="260" y="248" text-anchor="middle" font-family="Arial" font-size="8" fill="#1a6b3c">Th Cell</text>
  <line x1="260" y1="103" x2="260" y2="227" stroke="#43a047" stroke-width="1.5" stroke-dasharray="4 3"/>

  <text x="340" y="248" font-family="Arial" font-size="9" fill="#555">Th cell releases</text>
  <text x="340" y="262" font-family="Arial" font-size="9" fill="#555">cytokines (IL-2)</text>
  <text x="340" y="276" font-family="Arial" font-size="9" fill="#555">→ stimulates B cell</text>

  <!-- Step 4: Clonal proliferation -->
  <text x="300" y="305" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">4. Selected B Cell Clone Proliferates</text>

  <!-- Clone dividing -->
  <ellipse cx="110" cy="345" rx="25" ry="16" fill="#fff9c4" stroke="#ff8f00" stroke-width="2"/>
  <text x="110" y="348" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Clone</text>
  <ellipse cx="180" cy="345" rx="25" ry="16" fill="#fff9c4" stroke="#ff8f00" stroke-width="2"/>
  <text x="180" y="348" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Clone</text>
  <ellipse cx="250" cy="345" rx="25" ry="16" fill="#fff9c4" stroke="#ff8f00" stroke-width="2"/>
  <text x="250" y="348" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Clone</text>
  <ellipse cx="320" cy="345" rx="25" ry="16" fill="#fff9c4" stroke="#ff8f00" stroke-width="2"/>
  <text x="320" y="348" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Clone</text>
  <ellipse cx="390" cy="345" rx="25" ry="16" fill="#fff9c4" stroke="#ff8f00" stroke-width="2"/>
  <text x="390" y="348" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Clone</text>

  <!-- Step 5: Differentiation -->
  <text x="300" y="385" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">5. Differentiation into Two Cell Types</text>

  <!-- Plasma cells -->
  <rect x="30" y="400" width="250" height="105" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="155" y="420" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">Plasma Cells</text>

  <ellipse cx="70" cy="455" rx="22" ry="14" fill="#a5d6a7" stroke="#43a047" stroke-width="1.5"/>
  <text x="70" y="458" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Plasma</text>
  <ellipse cx="130" cy="455" rx="22" ry="14" fill="#a5d6a7" stroke="#43a047" stroke-width="1.5"/>
  <text x="130" y="458" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Plasma</text>
  <ellipse cx="190" cy="455" rx="22" ry="14" fill="#a5d6a7" stroke="#43a047" stroke-width="1.5"/>
  <text x="190" y="458" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Plasma</text>
  <text x="155" y="485" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Secrete antibodies (short-lived)</text>
  <text x="155" y="498" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">~2000 antibodies/sec</text>

  <!-- Memory cells -->
  <rect x="300" y="400" width="270" height="105" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="435" y="420" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1565c0">Memory B Cells</text>

  <ellipse cx="345" cy="455" rx="20" ry="13" fill="#90caf9" stroke="#1565c0" stroke-width="1.5"/>
  <text x="345" y="458" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Memory</text>
  <ellipse cx="415" cy="455" rx="20" ry="13" fill="#90caf9" stroke="#1565c0" stroke-width="1.5"/>
  <text x="415" y="458" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Memory</text>
  <ellipse cx="485" cy="455" rx="20" ry="13" fill="#90caf9" stroke="#1565c0" stroke-width="1.5"/>
  <text x="485" y="458" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Memory</text>
  <text x="435" y="485" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Long-lived — rapid secondary</text>
  <text x="435" y="498" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">response upon re-exposure</text>
</svg>