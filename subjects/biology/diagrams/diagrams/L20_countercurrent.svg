<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 550" width="600" height="550">
  <rect width="600" height="550" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Fish Gill — Countercurrent Exchange</text>

  <!-- Gill structure -->
  <rect x="30" y="50" width="540" height="230" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>

  <!-- Water flow arrow -->
  <text x="300" y="45" text-anchor="middle" font-family="Arial" font-size="12" fill="#1565c0">Water flow → across gill lamellae</text>

  <!-- Gill arch -->
  <rect x="50" y="70" width="20" height="190" rx="3" fill="#90caf9" stroke="#1565c0" stroke-width="2"/>
  <text x="60" y="178" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0" transform="rotate(-90,60,178)">Gill Arch</text>

  <!-- Filaments -->
  <line x1="70" y1="90" x2="250" y2="75" stroke="#42a5f5" stroke-width="2.5"/>
  <line x1="70" y1="130" x2="250" y2="125" stroke="#42a5f5" stroke-width="2.5"/>
  <line x1="70" y1="170" x2="250" y2="175" stroke="#42a5f5" stroke-width="2.5"/>
  <line x1="70" y1="210" x2="250" y2="225" stroke="#42a5f5" stroke-width="2.5"/>

  <text x="160" y="62" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Gill Filaments (Primary Lamellae)</text>

  <!-- Secondary lamellae on one filament -->
  <text x="380" y="95" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">SECONDARY LAMELLAE</text>
  <line x1="220" y1="130" x2="520" y2="130" stroke="#333" stroke-width="1.5"/>
  <rect x="260" y="116" width="8" height="28" rx="2" fill="#a5d6a7" stroke="#1a6b3c" stroke-width="1"/>
  <rect x="280" y="116" width="8" height="28" rx="2" fill="#a5d6a7" stroke="#1a6b3c" stroke-width="1"/>
  <rect x="300" y="116" width="8" height="28" rx="2" fill="#a5d6a7" stroke="#1a6b3c" stroke-width="1"/>
  <rect x="320" y="116" width="8" height="28" rx="2" fill="#a5d6a7" stroke="#1a6b3c" stroke-width="1"/>
  <rect x="340" y="116" width="8" height="28" rx="2" fill="#a5d6a7" stroke="#1a6b3c" stroke-width="1"/>
  <rect x="360" y="116" width="8" height="28" rx="2" fill="#a5d6a7" stroke="#1a6b3c" stroke-width="1"/>
  <rect x="380" y="116" width="8" height="28" rx="2" fill="#a5d6a7" stroke="#1a6b3c" stroke-width="1"/>
  <rect x="400" y="116" width="8" height="28" rx="2" fill="#a5d6a7" stroke="#1a6b3c" stroke-width="1"/>
  <rect x="420" y="116" width="8" height="28" rx="2" fill="#a5d6a7" stroke="#1a6b3c" stroke-width="1"/>
  <rect x="440" y="116" width="8" height="28" rx="2" fill="#a5d6a7" stroke="#1a6b3c" stroke-width="1"/>

  <!-- Countercurrent exchange diagram -->
  <rect x="30" y="300" width="540" height="235" rx="6" fill="#f5f5f5" stroke="#333" stroke-width="1"/>
  <text x="300" y="322" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">COUNTERCURRENT EXCHANGE (Blood ⇄ Water opposite directions)</text>

  <!-- Water flow bar -->
  <rect x="50" y="340" width="480" height="30" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="290" y="360" text-anchor="middle" font-family="Arial" font-size="11" fill="#1565c0" font-weight="bold">WATER FLOW →</text>

  <!-- Blood flow bar -->
  <rect x="50" y="385" width="480" height="30" rx="4" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
  <text x="290" y="405" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935" font-weight="bold">← BLOOD FLOW (through lamellae)</text>

  <!-- pO2 values -->
  <text x="50" y="338" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Water in: pO₂=100</text>
  <text x="530" y="338" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">Water out: pO₂=20</text>

  <text x="530" y="383" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Blood in: pO₂=10</text>
  <text x="50" y="383" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Blood out: pO₂=90</text>

  <!-- Gradient arrows -->
  <text x="530" y="425" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">At every point: water pO₂ > blood pO₂</text>
  <text x="530" y="442" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">→ Gradient maintained ENTIRE length</text>

  <text x="290" y="465" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1a6b3c">80-90% O₂ Extraction</text>
  <text x="290" y="482" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">(vs ~50% with concurrent flow — equilibrium at midpoint)</text>

  <text x="290" y="510" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Blood leaving gills equilibrates with incoming (high-pO₂) water → near-full saturation</text>
  <text x="290" y="526" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Water leaving equilibrates with incoming (low-pO₂) blood → maximum extraction</text>
</svg>
