<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480">
  <rect width="600" height="480" fill="#fff"/>
  <text x="300" y="25" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#333">Simpson's Diversity Index — D = 1 − Σ(n/N)²</text>
  <text x="300" y="46" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Quantifies species diversity: combines richness + evenness (0 = low diversity, approaching 1 = high)</text>
  <!-- Formula -->
  <rect x="140" y="62" width="320" height="40" rx="8" fill="#e8eaf6" stroke="#3949ab" stroke-width="2"/>
  <text x="300" y="88" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#283593">D = 1 − Σ(n/N)²</text>
  <text x="300" y="116" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">n = number of individuals of ONE species | N = total number of individuals (all species)</text>
  <!-- Worked example -->
  <rect x="30" y="135" width="540" height="185" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="300" y="158" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">Worked Example: Forest Community</text>
  <!-- Table -->
  <rect x="50" y="170" width="100" height="24" fill="#43a047" rx="3"/>
  <text x="100" y="187" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#fff">Species</text>
  <rect x="155" y="170" width="80" height="24" fill="#43a047" rx="3"/>
  <text x="195" y="187" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#fff">Count (n)</text>
  <rect x="240" y="170" width="80" height="24" fill="#43a047" rx="3"/>
  <text x="280" y="187" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#fff">n/N</text>
  <rect x="325" y="170" width="80" height="24" fill="#43a047" rx="3"/>
  <text x="365" y="187" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#fff">(n/N)²</text>
  <rect x="50" y="197" width="100" height="20" fill="#e8f5e9" stroke="#c8e6c9" stroke-width="1"/>
  <text x="100" y="211" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Oak</text>
  <rect x="155" y="197" width="80" height="20" fill="#e8f5e9" stroke="#c8e6c9" stroke-width="1"/>
  <text x="195" y="211" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">35</text>
  <rect x="240" y="197" width="80" height="20" fill="#e8f5e9" stroke="#c8e6c9" stroke-width="1"/>
  <text x="280" y="211" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">0.35</text>
  <rect x="325" y="197" width="80" height="20" fill="#e8f5e9" stroke="#c8e6c9" stroke-width="1"/>
  <text x="365" y="211" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">0.1225</text>
  <rect x="50" y="220" width="100" height="20" fill="#fff" stroke="#c8e6c9" stroke-width="1"/>
  <text x="100" y="234" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Birch</text>
  <rect x="155" y="220" width="80" height="20" fill="#fff" stroke="#c8e6c9" stroke-width="1"/>
  <text x="195" y="234" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">28</text>
  <rect x="240" y="220" width="80" height="20" fill="#fff" stroke="#c8e6c9" stroke-width="1"/>
  <text x="280" y="234" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">0.28</text>
  <rect x="325" y="220" width="80" height="20" fill="#fff" stroke="#c8e6c9" stroke-width="1"/>
  <text x="365" y="234" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">0.0784</text>
  <rect x="50" y="243" width="100" height="20" fill="#e8f5e9" stroke="#c8e6c9" stroke-width="1"/>
  <text x="100" y="257" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Pine</text>
  <rect x="155" y="243" width="80" height="20" fill="#e8f5e9" stroke="#c8e6c9" stroke-width="1"/>
  <text x="195" y="257" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">20</text>
  <rect x="240" y="243" width="80" height="20" fill="#e8f5e9" stroke="#c8e6c9" stroke-width="1"/>
  <text x="280" y="257" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">0.20</text>
  <rect x="325" y="243" width="80" height="20" fill="#e8f5e9" stroke="#c8e6c9" stroke-width="1"/>
  <text x="365" y="257" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">0.0400</text>
  <rect x="50" y="266" width="100" height="20" fill="#fff" stroke="#c8e6c9" stroke-width="1"/>
  <text x="100" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Maple</text>
  <rect x="155" y="266" width="80" height="20" fill="#fff" stroke="#c8e6c9" stroke-width="1"/>
  <text x="195" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">17</text>
  <rect x="240" y="266" width="80" height="20" fill="#fff" stroke="#c8e6c9" stroke-width="1"/>
  <text x="280" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">0.17</text>
  <rect x="325" y="266" width="80" height="20" fill="#fff" stroke="#c8e6c9" stroke-width="1"/>
  <text x="365" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">0.0289</text>
  <rect x="50" y="289" width="100" height="20" fill="#e8f5e9" stroke="#c8e6c9" stroke-width="1"/>
  <text x="100" y="303" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">Total N = 100</text>
  <rect x="155" y="289" width="80" height="20" fill="#e8f5e9" stroke="#c8e6c9" stroke-width="1"/>
  <rect x="240" y="289" width="80" height="20" fill="#e8f5e9" stroke="#c8e6c9" stroke-width="1"/>
  <rect x="325" y="289" width="80" height="20" fill="#e8f5e9" stroke="#c8e6c9" stroke-width="1"/>
  <text x="365" y="303" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e53935">Σ = 0.2698</text>
  <!-- Result -->
  <rect x="45" y="315" width="510" height="40" rx="6" fill="#c8e6c9"/>
  <text x="300" y="335" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">D = 1 − 0.2698 = 0.7302 → High diversity (close to 1)</text>
  <text x="300" y="350" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">4 species, fairly even distribution → high richness + high evenness</text>
  <!-- Interpretation -->
  <rect x="30" y="370" width="540" height="100" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1.5"/>
  <text x="300" y="393" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">How to Interpret D</text>
  <text x="300" y="413" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">D → 0: Low diversity (one species dominates, e.g., monoculture)</text>
  <text x="300" y="433" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">D → 1: High diversity (many species, individuals evenly distributed)</text>
  <text x="300" y="455" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">D increases with more species (richness) AND more even distribution (evenness)</text>
</svg>