<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs><style>text { font-family: Arial, sans-serif; } .title { font-size: 18px; font-weight: bold; fill: #1a6b3c; text-anchor: middle; } .lab { font-size: 13px; fill: #333; text-anchor: middle; } .sm { font-size: 11px; fill: #555; text-anchor: middle; }</style></defs>
  <rect width="600" height="450" fill="#fff"/>
  <text x="300" y="28" class="title">Phospholipid — Amphipathic Structure &amp; Bilayer Formation</text>

  <!-- Single phospholipid -->
  <text x="130" y="55" class="lab" fill="#1565c0" font-weight="bold">Single Phospholipid</text>
  <!-- head -->
  <circle cx="130" cy="85" r="16" fill="#43a047" stroke="#1a6b3c" stroke-width="2"/>
  <text x="130" y="89" class="sm" fill="#fff" font-weight="bold">Head</text>
  <!-- phosphate -->
  <rect x="124" y="101" width="12" height="10" rx="2" fill="#e53935"/>
  <text x="100" y="109" class="sm" fill="#e53935" font-weight="bold">Phosphate</text>
  <!-- glycerol -->
  <line x1="130" y1="111" x2="130" y2="135" stroke="#333" stroke-width="2"/>
  <!-- tails -->
  <line x1="115" y1="135" x2="100" y2="175" stroke="#ff8f00" stroke-width="2.5"/>
  <line x1="115" y1="135" x2="85" y2="175" stroke="#ff8f00" stroke-width="2.5"/>
  <line x1="130" y1="135" x2="155" y2="180" stroke="#ff8f00" stroke-width="2.5"/>
  <!-- labels -->
  <text x="90" y="195" class="sm" fill="#ff8f00">Hydrophobic</text>
  <text x="90" y="208" class="sm" fill="#ff8f00">tails</text>

  <!-- Bilayer -->
  <text x="430" y="55" class="lab" fill="#1565c0" font-weight="bold">Spontaneous Bilayer</text>

  <!-- top row heads -->
  <circle cx="370" cy="80" r="10" fill="#43a047"/><circle cx="400" cy="80" r="10" fill="#43a047"/><circle cx="430" cy="80" r="10" fill="#43a047"/><circle cx="460" cy="80" r="10" fill="#43a047"/><circle cx="490" cy="80" r="10" fill="#43a047"/>
  <!-- top tails -->
  <line x1="370" y1="90" x2="365" y2="125" stroke="#ff8f00" stroke-width="2"/><line x1="370" y1="90" x2="375" y2="125" stroke="#ff8f00" stroke-width="2"/>
  <line x1="400" y1="90" x2="395" y2="125" stroke="#ff8f00" stroke-width="2"/><line x1="400" y1="90" x2="405" y2="125" stroke="#ff8f00" stroke-width="2"/>
  <line x1="430" y1="90" x2="425" y2="125" stroke="#ff8f00" stroke-width="2"/><line x1="430" y1="90" x2="435" y2="125" stroke="#ff8f00" stroke-width="2"/>
  <line x1="460" y1="90" x2="455" y2="125" stroke="#ff8f00" stroke-width="2"/><line x1="460" y1="90" x2="465" y2="125" stroke="#ff8f00" stroke-width="2"/>
  <line x1="490" y1="90" x2="485" y2="125" stroke="#ff8f00" stroke-width="2"/><line x1="490" y1="90" x2="495" y2="125" stroke="#ff8f00" stroke-width="2"/>

  <!-- bottom row tails -->
  <line x1="365" y1="155" x2="370" y2="190" stroke="#ff8f00" stroke-width="2"/><line x1="375" y1="155" x2="370" y2="190" stroke="#ff8f00" stroke-width="2"/>
  <line x1="395" y1="155" x2="400" y2="190" stroke="#ff8f00" stroke-width="2"/><line x1="405" y1="155" x2="400" y2="190" stroke="#ff8f00" stroke-width="2"/>
  <line x1="425" y1="155" x2="430" y2="190" stroke="#ff8f00" stroke-width="2"/><line x1="435" y1="155" x2="430" y2="190" stroke="#ff8f00" stroke-width="2"/>
  <line x1="455" y1="155" x2="460" y2="190" stroke="#ff8f00" stroke-width="2"/><line x1="465" y1="155" x2="460" y2="190" stroke="#ff8f00" stroke-width="2"/>
  <line x1="485" y1="155" x2="490" y2="190" stroke="#ff8f00" stroke-width="2"/><line x1="495" y1="155" x2="490" y2="190" stroke="#ff8f00" stroke-width="2"/>
  <!-- bottom heads -->
  <circle cx="370" cy="190" r="10" fill="#43a047"/><circle cx="400" cy="190" r="10" fill="#43a047"/><circle cx="430" cy="190" r="10" fill="#43a047"/><circle cx="460" cy="190" r="10" fill="#43a047"/><circle cx="490" cy="190" r="10" fill="#43a047"/>

  <!-- Labels for bilayer -->
  <text x="430" y="235" class="sm" fill="#43a047" font-weight="bold">Hydrophilic heads (face water)</text>
  <text x="430" y="250" class="sm" fill="#ff8f00" font-weight="bold">Hydrophobic tails (face interior)</text>

  <!-- water labels -->
  <text x="280" y="78" class="sm" fill="#1565c0">Water</text>
  <text x="280" y="200" class="sm" fill="#1565c0">Water</text>

  <!-- Amphipathic callout -->
  <rect x="30" y="280" width="540" height="55" rx="5" fill="#e8eaf6" stroke="#7986cb" stroke-width="1"/>
  <text x="300" y="300" class="lab" fill="#283593" font-weight="bold">Amphipathic Nature</text>
  <text x="300" y="318" class="sm">Phospholipids are amphipathic: hydrophilic phosphate head + hydrophobic fatty acid tails</text>
  <text x="300" y="333" class="sm">In water, they spontaneously form bilayers (entropically driven — no ATP required)</text>

  <!-- Key functions -->
  <rect x="30" y="350" width="540" height="90" rx="5" fill="#fff8e1" stroke="#ffcc02" stroke-width="1"/>
  <text x="300" y="370" class="lab" fill="#e65100" font-weight="bold">Bilayer Functions</text>
  <text x="300" y="390" class="sm">• Hydrophobic core = barrier to polar/charged molecules (ions, glucose)</text>
  <text x="300" y="407" class="sm">• Allows passage of small nonpolar molecules (O₂, CO₂) by simple diffusion</text>
  <text x="300" y="424" class="sm">• Self-sealing — spontaneously reseals if disrupted</text>
</svg>
