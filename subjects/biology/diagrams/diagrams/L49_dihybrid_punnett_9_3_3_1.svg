<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 550">
  <rect width="600" height="550" fill="#fff"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a6b3c">Dihybrid Cross — RrYy × RrYy → 9:3:3:1</text>
  <text x="300" y="52" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">R = Round (dominant), r = Wrinkled | Y = Yellow (dominant), y = Green</text>

  <!-- Gametes -->
  <text x="300" y="78" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">Gametes (FOIL): RY, Ry, rY, ry — each ¼ probability</text>

  <!-- Punnett square 4x4 -->
  <g transform="translate(70, 92)">
    <!-- Headers -->
    <rect x="30" y="0" width="50" height="24" fill="#e8e8e8" stroke="#333" stroke-width="1"/>
    <text x="55" y="16" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">RY</text>
    <rect x="80" y="0" width="50" height="24" fill="#e8e8e8" stroke="#333" stroke-width="1"/>
    <text x="105" y="16" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Ry</text>
    <rect x="130" y="0" width="50" height="24" fill="#e8e8e8" stroke="#333" stroke-width="1"/>
    <text x="155" y="16" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#ff8f00">rY</text>
    <rect x="180" y="0" width="50" height="24" fill="#e8e8e8" stroke="#333" stroke-width="1"/>
    <text x="205" y="16" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">ry</text>

    <!-- Row labels + cells -->
    <!-- Row 1: RY -->
    <rect x="0" y="24" width="30" height="40" fill="#e8e8e8" stroke="#333" stroke-width="1"/>
    <text x="15" y="49" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">RY</text>
    <rect x="30" y="24" width="50" height="40" fill="#e8f5e9" stroke="#ccc" stroke-width="0.5"/>
    <text x="55" y="42" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">RRYY</text>
    <text x="55" y="56" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">R_Y_</text>
    <rect x="80" y="24" width="50" height="40" fill="#e8f5e9" stroke="#ccc" stroke-width="0.5"/>
    <text x="105" y="42" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">RRYy</text>
    <text x="105" y="56" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">R_Y_</text>
    <rect x="130" y="24" width="50" height="40" fill="#e8f5e9" stroke="#ccc" stroke-width="0.5"/>
    <text x="155" y="42" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">RrYY</text>
    <text x="155" y="56" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">R_Y_</text>
    <rect x="180" y="24" width="50" height="40" fill="#e8f5e9" stroke="#ccc" stroke-width="0.5"/>
    <text x="205" y="42" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">RrYy</text>
    <text x="205" y="56" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">R_Y_</text>

    <!-- Row 2: Ry -->
    <rect x="0" y="64" width="30" height="40" fill="#e8e8e8" stroke="#333" stroke-width="1"/>
    <text x="15" y="89" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">Ry</text>
    <rect x="30" y="64" width="50" height="40" fill="#e8f5e9" stroke="#ccc" stroke-width="0.5"/>
    <text x="55" y="82" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">RRYy</text>
    <text x="55" y="96" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">R_Y_</text>
    <rect x="80" y="64" width="50" height="40" fill="#e3f2fd" stroke="#ccc" stroke-width="0.5"/>
    <text x="105" y="82" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">RRyy</text>
    <text x="105" y="96" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">R_yy</text>
    <rect x="130" y="64" width="50" height="40" fill="#e8f5e9" stroke="#ccc" stroke-width="0.5"/>
    <text x="155" y="82" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">RrYy</text>
    <text x="155" y="96" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">R_Y_</text>
    <rect x="180" y="64" width="50" height="40" fill="#e3f2fd" stroke="#ccc" stroke-width="0.5"/>
    <text x="205" y="82" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Rryy</text>
    <text x="205" y="96" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">R_yy</text>

    <!-- Row 3: rY -->
    <rect x="0" y="104" width="30" height="40" fill="#e8e8e8" stroke="#333" stroke-width="1"/>
    <text x="15" y="129" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#ff8f00">rY</text>
    <rect x="30" y="104" width="50" height="40" fill="#e8f5e9" stroke="#ccc" stroke-width="0.5"/>
    <text x="55" y="122" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">RrYY</text>
    <text x="55" y="136" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">R_Y_</text>
    <rect x="80" y="104" width="50" height="40" fill="#e8f5e9" stroke="#ccc" stroke-width="0.5"/>
    <text x="105" y="122" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">RrYy</text>
    <text x="105" y="136" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">R_Y_</text>
    <rect x="130" y="104" width="50" height="40" fill="#fff3e0" stroke="#ccc" stroke-width="0.5"/>
    <text x="155" y="122" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00">rrYY</text>
    <text x="155" y="136" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">rrY_</text>
    <rect x="180" y="104" width="50" height="40" fill="#fff3e0" stroke="#ccc" stroke-width="0.5"/>
    <text x="205" y="122" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00">rrYy</text>
    <text x="205" y="136" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">rrY_</text>

    <!-- Row 4: ry -->
    <rect x="0" y="144" width="30" height="40" fill="#e8e8e8" stroke="#333" stroke-width="1"/>
    <text x="15" y="169" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#6a1b9a">ry</text>
    <rect x="30" y="144" width="50" height="40" fill="#e8f5e9" stroke="#ccc" stroke-width="0.5"/>
    <text x="55" y="162" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">RrYy</text>
    <text x="55" y="176" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">R_Y_</text>
    <rect x="80" y="144" width="50" height="40" fill="#e3f2fd" stroke="#ccc" stroke-width="0.5"/>
    <text x="105" y="162" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">Rryy</text>
    <text x="105" y="176" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">R_yy</text>
    <rect x="130" y="144" width="50" height="40" fill="#fff3e0" stroke="#ccc" stroke-width="0.5"/>
    <text x="155" y="162" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00">rrYy</text>
    <text x="155" y="176" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">rrY_</text>
    <rect x="180" y="144" width="50" height="40" fill="#fce4ec" stroke="#ccc" stroke-width="0.5"/>
    <text x="205" y="162" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">rryy</text>
    <text x="205" y="176" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">rryy</text>
  </g>

  <!-- Results summary -->
  <rect x="30" y="310" width="540" height="100" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="335" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#1a6b3c">F₂ Phenotypic Ratio: 9 : 3 : 3 : 1</text>

  <rect x="55" y="350" width="110" height="48" rx="6" fill="#c8e6c9" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="110" y="370" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a6b3c">9</text>
  <text x="110" y="388" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Round, Yellow</text>

  <rect x="180" y="350" width="90" height="48" rx="6" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
  <text x="225" y="370" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0">3</text>
  <text x="225" y="388" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Round, Green</text>

  <rect x="285" y="350" width="95" height="48" rx="6" fill="#ffe0b2" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="332" y="370" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#ff8f00">3</text>
  <text x="332" y="388" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Wrinkled,Yellow</text>

  <rect x="395" y="350" width="90" height="48" rx="6" fill="#f8bbd0" stroke="#e53935" stroke-width="1.5"/>
  <text x="440" y="370" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935">1</text>
  <text x="440" y="388" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Wrinkled,Green</text>

  <!-- Conditions -->
  <rect x="30" y="425" width="540" height="55" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="1"/>
  <text x="300" y="448" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">
    9:3:3:1 ratio confirms: (a) complete dominance, (b) both parents heterozygous, (c) genes unlinked
  </text>
  <text x="300" y="470" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">
    Deviation from 9:3:3:1 → possible linkage (see Lesson 50)
  </text>

  <!-- Pea images -->
  <text x="300" y="510" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">
    Each R_Y_ cell = 9/16, R_yy = 3/16, rrY_ = 3/16, rryy = 1/16
  </text>
</svg>
