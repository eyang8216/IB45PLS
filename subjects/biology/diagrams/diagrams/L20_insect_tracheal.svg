<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <rect width="600" height="500" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Insect Tracheal System</text>

  <!-- Body outline -->
  <rect x="50" y="50" width="500" height="140" rx="8" fill="#f5f5f5" stroke="#333" stroke-width="2"/>

  <!-- Spiracles along sides -->
  <circle cx="70" cy="100" r="8" fill="#e53935" stroke="#b71c1c" stroke-width="1.5"/>
  <circle cx="70" cy="130" r="8" fill="#e53935" stroke="#b71c1c" stroke-width="1.5"/>
  <circle cx="530" cy="100" r="8" fill="#e53935" stroke="#b71c1c" stroke-width="1.5"/>
  <circle cx="530" cy="130" r="8" fill="#e53935" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="70" y="155" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Spiracle</text>
  <text x="530" y="155" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Spiracle</text>

  <!-- Tracheae -->
  <line x1="78" y1="100" x2="300" y2="80" stroke="#1565c0" stroke-width="3"/>
  <line x1="78" y1="130" x2="300" y2="150" stroke="#1565c0" stroke-width="3"/>
  <line x1="522" y1="100" x2="300" y2="80" stroke="#1565c0" stroke-width="3"/>
  <line x1="522" y1="130" x2="300" y2="150" stroke="#1565c0" stroke-width="3"/>

  <!-- Chitin rings detail on one trachea -->
  <text x="155" y="72" font-family="Arial" font-size="8" fill="#1565c0">Trachea (with chitin rings)</text>

  <!-- Branching tracheoles -->
  <line x1="300" y1="80" x2="350" y2="50" stroke="#42a5f5" stroke-width="1.5"/>
  <line x1="300" y1="80" x2="360" y2="70" stroke="#42a5f5" stroke-width="1.5"/>
  <line x1="300" y1="150" x2="350" y2="170" stroke="#42a5f5" stroke-width="1.5"/>
  <line x1="300" y1="150" x2="340" y2="190" stroke="#42a5f5" stroke-width="1.5"/>
  <line x1="350" y1="50" x2="390" y2="45" stroke="#90caf9" stroke-width="1"/>
  <line x1="360" y1="70" x2="400" y2="60" stroke="#90caf9" stroke-width="1"/>
  <line x1="355" y1="60" x2="380" y2="55" stroke="#90caf9" stroke-width="1"/>

  <text x="420" y="50" font-family="Arial" font-size="8" fill="#42a5f5">Tracheoles</text>
  <text x="420" y="62" font-family="Arial" font-size="7" fill="#90caf9">(fluid-filled tips</text>
  <text x="420" y="74" font-family="Arial" font-size="7" fill="#90caf9">at cells)</text>

  <!-- Cell detail zoom -->
  <rect x="70" y="210" width="460" height="280" rx="6" fill="#fafafa" stroke="#333" stroke-width="1"/>
  <text x="300" y="232" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Tracheole — Cell Interface (ZOOM)</text>

  <!-- Tracheole ending -->
  <line x1="120" y1="270" x2="300" y2="370" stroke="#42a5f5" stroke-width="2"/>
  <line x1="120" y1="270" x2="250" y2="400" stroke="#42a5f5" stroke-width="2"/>
  <line x1="120" y1="270" x2="340" y2="350" stroke="#42a5f5" stroke-width="2"/>

  <!-- Fluid-filled tip -->
  <ellipse cx="300" cy="370" rx="15" ry="10" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
  <ellipse cx="250" cy="400" rx="12" ry="8" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
  <ellipse cx="340" cy="350" rx="13" ry="9" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
  <text x="300" y="400" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">Fluid-filled tracheole tip</text>

  <!-- Cell -->
  <rect x="200" y="330" width="130" height="90" rx="4" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="265" y="365" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00">Respiration</text>
  <text x="265" y="380" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00">Cell</text>

  <!-- O2 arrow -->
  <text x="340" y="340" font-family="Arial" font-size="8" fill="#333">O₂→</text>
  <text x="350" y="375" font-family="Arial" font-size="8" fill="#333">←CO₂</text>

  <!-- Key features box -->
  <text x="80" y="445" font-family="Arial" font-size="9" font-weight="bold" fill="#1a6b3c">Key Features:</text>
  <text x="80" y="460" font-family="Arial" font-size="9" fill="#333">• Spiracles with valves control opening — balance O₂ intake vs water loss</text>
  <text x="80" y="475" font-family="Arial" font-size="9" fill="#333">• Tracheae reinforced with chitin rings (taenidia) — prevent collapse</text>
  <text x="80" y="490" font-family="Arial" font-size="9" fill="#333">• Tracheole tips fluid-filled — O₂ dissolves before diffusing to cells</text>
</svg>
