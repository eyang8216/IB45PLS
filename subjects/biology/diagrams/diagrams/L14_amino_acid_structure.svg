<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460" width="600" height="460">
  <defs><style>text { font-family: Arial, sans-serif; } .title { font-size: 18px; font-weight: bold; fill: #1a6b3c; text-anchor: middle; } .lab { font-size: 14px; fill: #333; text-anchor: middle; } .sm { font-size: 12px; fill: #555; text-anchor: middle; }</style></defs>
  <rect width="600" height="460" fill="#fff"/>
  <text x="300" y="28" class="title">Amino Acid General Structure</text>

  <!-- Central α-carbon -->
  <circle cx="300" cy="180" r="35" fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
  <text x="300" y="175" class="lab" fill="#1565c0" font-weight="bold">α-carbon</text>
  <text x="300" y="192" class="sm" fill="#1565c0">(chiral center*)</text>

  <!-- Amino group (left) -->
  <line x1="265" y1="180" x2="130" y2="180" stroke="#43a047" stroke-width="3"/>
  <rect x="50" y="162" width="90" height="36" rx="5" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="95" y="185" class="lab" fill="#43a047" font-weight="bold">H₂N —</text>
  <text x="95" y="230" class="sm" fill="#43a047">Amino group</text>
  <text x="95" y="245" class="sm" fill="#43a047">(basic, –NH₂)</text>

  <!-- Carboxyl group (right) -->
  <line x1="335" y1="180" x2="460" y2="180" stroke="#e53935" stroke-width="3"/>
  <rect x="450" y="162" width="100" height="36" rx="5" fill="#ffebee" stroke="#e53935" stroke-width="2"/>
  <text x="500" y="185" class="lab" fill="#e53935" font-weight="bold">— COOH</text>
  <text x="500" y="230" class="sm" fill="#e53935">Carboxyl group</text>
  <text x="500" y="245" class="sm" fill="#e53935">(acidic, –COOH)</text>

  <!-- Hydrogen (top) -->
  <line x1="300" y1="145" x2="300" y2="80" stroke="#555" stroke-width="3"/>
  <rect x="258" y="55" width="84" height="30" rx="5" fill="#f5f5f5" stroke="#999" stroke-width="2"/>
  <text x="300" y="75" class="lab" fill="#555">H</text>
  <text x="300" y="42" class="sm" fill="#999">Hydrogen</text>

  <!-- R-group (bottom) -->
  <line x1="300" y1="215" x2="300" y2="280" stroke="#6a1b9a" stroke-width="3"/>
  <rect x="245" y="275" width="110" height="36" rx="5" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="300" y="298" class="lab" fill="#6a1b9a" font-weight="bold">R — group</text>
  <text x="300" y="330" class="sm" fill="#6a1b9a">Variable side chain</text>
  <text x="300" y="345" class="sm" fill="#6a1b9a">(20 different types)</text>

  <!-- Chirality note -->
  <text x="300" y="390" class="sm" fill="#555">* α-carbon is chiral (except glycine where R=H). Only L-amino acids used in proteins.</text>

  <!-- Classification -->
  <rect x="30" y="405" width="540" height="48" rx="5" fill="#eee" stroke="#ccc" stroke-width="1"/>
  <text x="300" y="423" class="sm" fill="#333">R-group determines chemical properties: hydrophobic, polar, acidic (−), or basic (+)</text>
  <text x="300" y="442" class="sm" fill="#333">All 20 amino acids share this backbone — only the R-group differs</text>
</svg>
