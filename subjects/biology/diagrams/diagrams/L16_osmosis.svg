<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350">
  <rect width="600" height="350" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Osmosis in Plant Cells</text>

  <!-- HYPERTONIC -->
  <g>
    <rect x="20" y="40" width="170" height="290" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
    <text x="105" y="60" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">HYPERTONIC</text>

    <!-- Cell wall -->
    <rect x="50" y="80" width="110" height="140" rx="4" fill="none" stroke="#333" stroke-width="3"/>
    <!-- Plasma membrane (plasmolyzed) -->
    <rect x="60" y="120" width="90" height="70" rx="6" fill="#81c784" stroke="#1a6b3c" stroke-width="2.5" opacity="0.8"/>
    <text x="105" y="160" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Plasma</text>
    <text x="105" y="173" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">membrane</text>

    <!-- Water arrows -->
    <g stroke="#e53935" stroke-width="2" fill="none">
      <line x1="105" y1="95" x2="105" y2="115"/><line x1="80" y1="200" x2="80" y2="220"/>
      <line x1="130" y1="200" x2="130" y2="220"/><line x1="60" y1="160" x2="45" y2="160"/>
      <line x1="150" y1="160" x2="165" y2="160"/>
    </g>
    <text x="105" y="235" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Water leaves</text>
    <text x="105" y="248" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">PLASMOLYZED</text>

    <text x="105" y="275" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Solute conc. higher</text>
    <text x="105" y="290" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">outside cell</text>
    <text x="105" y="305" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Ψ_w outside &lt; inside</text>
    <text x="105" y="320" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Membrane pulls away</text>
  </g>

  <!-- ISOTONIC -->
  <g>
    <rect x="215" y="40" width="170" height="290" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
    <text x="300" y="60" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#ff8f00">ISOTONIC</text>

    <rect x="245" y="80" width="110" height="140" rx="4" fill="none" stroke="#333" stroke-width="3"/>
    <rect x="255" y="90" width="90" height="120" rx="6" fill="#81c784" stroke="#1a6b3c" stroke-width="2.5" opacity="0.8"/>
    <text x="300" y="155" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Cell membrane</text>
    <text x="300" y="168" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">touches wall</text>

    <g stroke="#ff8f00" stroke-width="2" fill="none">
      <line x1="300" y1="95" x2="300" y2="85"/>
      <line x1="300" y1="215" x2="300" y2="225"/>
      <line x1="260" y1="150" x2="248" y2="150"/>
      <line x1="340" y1="150" x2="352" y2="150"/>
    </g>
    <text x="300" y="235" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00">No net water</text>
    <text x="300" y="248" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00">movement</text>
    <text x="300" y="260" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00">FLACCID</text>

    <text x="300" y="287" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Equal solute conc.</text>
    <text x="300" y="302" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Ψ_w equal</text>
    <text x="300" y="317" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Dynamic equilibrium</text>
  </g>

  <!-- HYPOTONIC -->
  <g>
    <rect x="410" y="40" width="170" height="290" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
    <text x="495" y="60" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">HYPOTONIC</text>

    <rect x="440" y="80" width="110" height="140" rx="4" fill="none" stroke="#333" stroke-width="3"/>
    <rect x="448" y="88" width="94" height="124" rx="6" fill="#81c784" stroke="#1a6b3c" stroke-width="2.5" opacity="0.8"/>

    <!-- Pressure arrows -->
    <g stroke="#1a6b3c" stroke-width="2" fill="none">
      <line x1="495" y1="82" x2="495" y2="72"/><line x1="495" y1="215" x2="495" y2="225"/>
      <line x1="452" y1="150" x2="440" y2="150"/><line x1="538" y1="150" x2="550" y2="150"/>
    </g>
    <text x="495" y="235" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">Water enters</text>
    <text x="495" y="248" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">TURGID (normal)</text>

    <text x="495" y="275" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Solute conc. lower</text>
    <text x="495" y="290" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">outside cell</text>
    <text x="495" y="305" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Ψ_w outside &gt; inside</text>
    <text x="495" y="320" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">Cell wall limits swelling</text>
  </g>
</svg>