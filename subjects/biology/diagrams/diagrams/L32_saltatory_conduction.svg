<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" width="600" height="480">
  <defs><marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#333"/></marker></defs>
  <rect width="600" height="480" fill="#fff" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1565c0">Saltatory Conduction — Myelinated Axon</text>

  <!-- Axon -->
  <line x1="40" y1="200" x2="560" y2="200" stroke="#333" stroke-width="3"/>

  <!-- Myelin segments -->
  <rect x="50" y="180" width="80" height="40" rx="16" fill="#bdbdbd" stroke="#666" stroke-width="2"/>
  <rect x="160" y="180" width="80" height="40" rx="16" fill="#bdbdbd" stroke="#666" stroke-width="2"/>
  <rect x="270" y="180" width="80" height="40" rx="16" fill="#bdbdbd" stroke="#666" stroke-width="2"/>
  <rect x="380" y="180" width="80" height="40" rx="16" fill="#bdbdbd" stroke="#666" stroke-width="2"/>
  <rect x="490" y="180" width="60" height="40" rx="16" fill="#bdbdbd" stroke="#666" stroke-width="2"/>

  <!-- Nodes of Ranvier -->
  <rect x="130" y="175" width="8" height="50" rx="3" fill="#e53935" stroke="#333" stroke-width="1"/>
  <rect x="240" y="175" width="8" height="50" rx="3" fill="#e53935" stroke="#333" stroke-width="1"/>
  <rect x="350" y="175" width="8" height="50" rx="3" fill="#e53935" stroke="#333" stroke-width="1"/>
  <rect x="460" y="175" width="8" height="50" rx="3" fill="#e53935" stroke="#333" stroke-width="1"/>

  <text x="134" y="165" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Node 1</text>
  <text x="244" y="165" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Node 2</text>
  <text x="354" y="165" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Node 3</text>
  <text x="464" y="165" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Node 4</text>

  <!-- AP at Node 1 -->
  <circle cx="134" cy="140" r="15" fill="#ffcdd2" stroke="#e53935" stroke-width="2.5"/>
  <text x="134" y="138" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">AP🔥</text>

  <!-- Passive current spread -->
  <path d="M142,190 Q195,205 240,195" fill="none" stroke="#ff8f00" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#a)"/>
  <text x="185" y="218" text-anchor="middle" font-family="Arial" font-size="8" fill="#ff8f00">Passive spread (fast)</text>

  <!-- AP at Node 2 -->
  <circle cx="244" cy="140" r="15" fill="#ffcdd2" stroke="#e53935" stroke-width="2.5"/>
  <text x="244" y="138" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">AP🔥</text>

  <path d="M252,190 Q305,205 350,195" fill="none" stroke="#ff8f00" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#a)"/>

  <!-- AP at Node 3 -->
  <circle cx="354" cy="140" r="15" fill="#ffcdd2" stroke="#e53935" stroke-width="2.5"/>
  <text x="354" y="138" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">AP🔥</text>

  <path d="M362,190 Q415,205 460,195" fill="none" stroke="#ff8f00" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#a)"/>

  <!-- AP at Node 4 -->
  <circle cx="464" cy="140" r="15" fill="#ffcdd2" stroke="#e53935" stroke-width="2.5"/>
  <text x="464" y="138" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">AP🔥</text>

  <!-- Forward propagation -->
  <text x="300" y="128" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935" font-weight="bold">AP "JUMPS" node → node (saltare = to jump)</text>

  <!-- Na+ channel density -->
  <rect x="30" y="250" width="540" height="85" rx="8" fill="#e8eaf6" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="300" y="272" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">Node of Ranvier: Extreme Na⁺ Channel Density</text>
  <text x="300" y="292" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Thousands of voltage-gated Na⁺ channels per μm² at nodes</text>
  <text x="300" y="310" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">Internode (under myelin): almost NO channels — ions cannot cross</text>
  <text x="300" y="328" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">Only ~0.2% of membrane area needs to pump ions → massive ATP savings!</text>

  <!-- Comparison -->
  <rect x="30" y="355" width="540" height="55" rx="8" fill="#fff3e0" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="300" y="378" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ff8f00">Speed Comparison</text>
  <text x="200" y="398" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Continuous (unmyelinated): 0.5–2 m/s</text>
  <text x="420" y="398" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Saltatory (myelinated): up to 120 m/s</text>

  <!-- MS -->
  <rect x="30" y="425" width="540" height="25" rx="6" fill="#ffcdd2" stroke="#e53935" stroke-width="1"/>
  <text x="300" y="442" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Multiple Sclerosis: autoimmune loss of CNS myelin →  conduction failure → muscle weakness, vision loss</text>
</svg>
