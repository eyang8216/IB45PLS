<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460" width="600" height="460">
  <rect width="600" height="460" fill="#fff"/>
  <text x="300" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#333">Electron Transport Chain &amp; Chemiosmosis</text>
  <text x="300" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Inner mitochondrial membrane — Complexes I–V</text>

  <!-- Membrane -->
  <rect x="30" y="180" width="540" height="120" rx="4" fill="#fff9c4" stroke="#ff8f00" stroke-width="2"/>
  <text x="300" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ff8f00" font-weight="bold">Inner Mitochondrial Membrane</text>

  <!-- Matrix label -->
  <text x="300" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1565c0" font-weight="bold">MATRIX (low [H⁺])</text>
  <text x="300" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e53935" font-weight="bold">INTERMEMBRANE SPACE (high [H⁺])</text>

  <!-- Complex I -->
  <rect x="40" y="195" width="60" height="90" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="70" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1565c0" font-weight="bold">I</text>
  <text x="70" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">NADH</text>
  <text x="70" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">Dehydrogenase</text>

  <!-- NADH in -->
  <line x1="30" y1="240" x2="40" y2="240" stroke="#6a1b9a" stroke-width="3" marker-end="url(#a98)"/>
  <text x="25" y="235" font-family="Arial, sans-serif" font-size="9" fill="#6a1b9a">NADH</text>
  <defs><marker id="a98" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#333"/></marker></defs>

  <!-- Complex II -->
  <rect x="140" y="195" width="55" height="90" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="167" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1565c0" font-weight="bold">II</text>
  <text x="167" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#333">Succinate DH</text>
  <text x="167" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#333">(FADH₂)</text>

  <!-- FADH2 in -->
  <line x1="130" y1="270" x2="140" y2="260" stroke="#6a1b9a" stroke-width="2.5" marker-end="url(#a98)"/>
  <text x="128" y="283" font-family="Arial, sans-serif" font-size="8" fill="#6a1b9a">FADH₂</text>

  <!-- Q pool -->
  <path d="M100,240 L140,240" stroke="#333" stroke-width="2" marker-end="url(#a98)"/>
  <text x="120" y="235" font-family="Arial, sans-serif" font-size="8" fill="#333">Q</text>

  <path d="M195,240 L235,240" stroke="#333" stroke-width="2" marker-end="url(#a98)"/>
  <text x="215" y="235" font-family="Arial, sans-serif" font-size="8" fill="#333">Q →</text>

  <!-- Complex III -->
  <rect x="240" y="195" width="60" height="90" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="270" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1565c0" font-weight="bold">III</text>
  <text x="270" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">Cyt bc1</text>
  <text x="270" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#333">Q cycle</text>

  <!-- Cyt c -->
  <path d="M300,240 L350,240" stroke="#333" stroke-width="1.5" marker-end="url(#a98)"/>
  <text x="325" y="233" font-family="Arial, sans-serif" font-size="8" fill="#333">cyt c</text>

  <!-- Complex IV -->
  <rect x="355" y="195" width="60" height="90" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="385" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1565c0" font-weight="bold">IV</text>
  <text x="385" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">Cyt c</text>
  <text x="385" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">Oxidase</text>

  <!-- O₂ to H₂O -->
  <text x="440" y="240" font-family="Arial, sans-serif" font-size="10" fill="#1565c0" font-weight="bold">→ ½O₂ + 2H⁺ → H₂O</text>

  <!-- H+ pumping arrows -->
  <path d="M70,195 Q70,180 70,170" stroke="#e53935" stroke-width="2" marker-end="url(#ah2)"/>
  <path d="M270,195 Q270,175 270,170" stroke="#e53935" stroke-width="2" marker-end="url(#ah2)"/>
  <path d="M385,195 Q385,175 385,170" stroke="#e53935" stroke-width="2" marker-end="url(#ah2)"/>
  <defs><marker id="ah2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#e53935"/></marker></defs>

  <text x="70" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e53935">4H⁺</text>
  <text x="270" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e53935">4H⁺</text>
  <text x="385" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e53935">2H⁺</text>

  <!-- ATP synthase (Complex V) -->
  <rect x="450" y="195" width="70" height="90" rx="6" fill="#fff9c4" stroke="#ff8f00" stroke-width="2"/>
  <text x="485" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ff8f00" font-weight="bold">V</text>
  <text x="485" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">ATP</text>
  <text x="485" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">Synthase</text>
  <text x="485" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#333">F₀F₁</text>

  <!-- H+ flow back through ATP synthase -->
  <path d="M485,170 Q485,180 485,195" stroke="#43a047" stroke-width="2.5" marker-end="url(#ag)"/>
  <defs><marker id="ag" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#43a047"/></marker></defs>
  <text x="485" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#43a047">~3-4 H⁺</text>

  <!-- ATP out -->
  <line x1="485" y1="285" x2="485" y2="305" stroke="#ff8f00" stroke-width="2.5" marker-end="url(#at)"/>
  <defs><marker id="at" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ff8f00"/></marker></defs>
  <text x="485" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ff8f00" font-weight="bold">ATP</text>

  <!-- ADP + Pi in -->
  <text x="540" y="248" font-family="Arial, sans-serif" font-size="10" fill="#555">ADP + Pi</text>
  <line x1="530" y1="255" x2="520" y2="255" stroke="#555" stroke-width="1.5" marker-end="url(#at)"/>

  <!-- Proton gradient -->
  <rect x="30" y="60" width="540" height="30" rx="4" fill="#ffcdd2" opacity="0.5"/>
  <text x="300" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e53935" font-weight="bold">High [H⁺] in intermembrane space → Proton Motive Force (PMF) → H⁺ flows back through ATP synthase</text>

  <!-- Yield box -->
  <rect x="30" y="360" width="540" height="90" rx="6" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#333" font-weight="bold">ATP Yield Summary (Aerobic Respiration, per glucose)</text>
  <text x="50" y="405" font-family="Arial, sans-serif" font-size="11" fill="#333">Glycolysis: 2 ATP + 2 NADH (→ ~3-5 ATP)  |  Link: 2 NADH (→ ~5 ATP)  |  Krebs: 2 GTP + 6 NADH (→ ~15 ATP) + 2 FADH₂ (→ ~3 ATP)</text>
  <text x="300" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a6b3c" font-weight="bold">Theoretical maximum: ~30-32 ATP per glucose (varies with organism and shuttle system)</text>
</svg>
