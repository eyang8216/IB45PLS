<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <rect width="600" height="500" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Menstrual Cycle — Hormone Levels (28 Days)</text>

  <!-- Axes -->
  <line x1="55" y1="60" x2="55" y2="450" stroke="#333" stroke-width="2"/>
  <line x1="55" y1="450" x2="570" y2="450" stroke="#333" stroke-width="2"/>

  <!-- Y axis labels -->
  <text x="48" y="453" text-anchor="end" font-family="Arial" font-size="9" fill="#333">0</text>
  <text x="48" y="70" text-anchor="end" font-family="Arial" font-size="9" fill="#333">HIGH</text>
  <text x="48" y="440" text-anchor="end" font-family="Arial" font-size="9" fill="#333">LOW</text>

  <!-- X axis days -->
  <text x="55" y="468" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">0</text>
  <text x="130" y="468" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">7</text>
  <text x="200" y="468" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">14</text>
  <text x="270" y="468" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">21</text>
  <text x="340" y="468" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">28</text>
  <text x="300" y="488" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Day of cycle →</text>

  <!-- Grid lines -->
  <line x1="130" y1="60" x2="130" y2="450" stroke="#ddd" stroke-width="0.8"/>
  <line x1="200" y1="60" x2="200" y2="450" stroke="#ddd" stroke-width="0.8"/>
  <line x1="270" y1="60" x2="270" y2="450" stroke="#ddd" stroke-width="0.8"/>
  <line x1="340" y1="60" x2="340" y2="450" stroke="#ddd" stroke-width="0.8"/>

  <!-- Ovulation line -->
  <line x1="198" y1="60" x2="198" y2="450" stroke="#e53935" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="198" y="52" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">OVULATION</text>
  <text x="198" y="42" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">Day 14</text>

  <!-- Phase labels -->
  <text x="100" y="85" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">FOLLICULAR</text>
  <text x="100" y="97" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">PHASE</text>
  <text x="270" y="85" text-anchor="middle" font-family="Arial" font-size="10" fill="#6a1b9a">LUTEAL PHASE</text>

  <!-- FSH curve (blue) -->
  <polyline fill="none" stroke="#1565c0" stroke-width="2.5"
    points="58,420 70,380 90,340 115,310 140,300 160,295 175,290 188,285 195,310 200,360 200,380 200,400 200,420 250,430 340,430"
    stroke-linejoin="round"/>
  <text x="160" y="278" font-family="Arial" font-size="11" fill="#1565c0" font-weight="bold">FSH</text>

  <!-- Estrogen curve (green) -->
  <polyline fill="none" stroke="#43a047" stroke-width="2.5"
    points="58,440 70,420 90,390 115,360 140,340 165,310 185,260 192,240 195,250 198,280 200,300 205,310 215,295 230,280 260,270 280,275 300,285 320,330 340,420"
    stroke-linejoin="round"/>
  <text x="190" y="235" font-family="Arial" font-size="11" fill="#43a047" font-weight="bold">Estrogen</text>

  <!-- LH surge (red) -->
  <polyline fill="none" stroke="#e53935" stroke-width="2.5"
    points="58,430 70,430 90,425 115,420 140,418 160,415 175,410 185,395 190,355 192,310 193,280 194,290 194,320 195,370 196,400 200,420 230,425 270,430 340,430"
    stroke-linejoin="round"/>
  <text x="185" y="275" font-family="Arial" font-size="11" fill="#e53935" font-weight="bold">LH SURGE</text>

  <!-- Progesterone curve (orange) -->
  <polyline fill="none" stroke="#ff8f00" stroke-width="2.5"
    points="58,430 100,430 160,428 195,425 200,420 205,390 215,350 230,330 260,320 280,325 300,340 315,365 325,400 330,420 335,430 340,435"
    stroke-linejoin="round"/>
  <text x="290" y="315" font-family="Arial" font-size="11" fill="#ff8f00" font-weight="bold">Progesterone</text>

  <!-- Corpus luteum annotation -->
  <text x="235" y="395" font-family="Arial" font-size="9" fill="#ff8f00" font-style="italic">from corpus luteum</text>

  <!-- Menstruation -->
  <rect x="55" y="435" width="45" height="15" rx="3" fill="#e53935" opacity="0.6"/>
  <text x="77" y="446" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Menses</text>
  <rect x="320" y="435" width="45" height="15" rx="3" fill="#e53935" opacity="0.6"/>
  <text x="342" y="446" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Menses</text>

  <!-- Endometrium thickness strip -->
  <rect x="400" y="100" width="50" height="200" rx="4" fill="#fafafa" stroke="#333" stroke-width="1.5"/>
  <text x="425" y="92" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Endometrium</text>
  <!-- thickening -->
  <polygon points="405,300 405,280 420,260 435,260 445,300" fill="#e91e63" opacity="0.6" stroke="#c2185b" stroke-width="1.5"/>
  <text x="425" y="318" text-anchor="middle" font-family="Arial" font-size="9" fill="#c2185b">thickens</text>
  <text x="425" y="328" text-anchor="middle" font-family="Arial" font-size="9" fill="#c2185b">→ sheds</text>

  <!-- Positive feedback label -->
  <text x="185" y="116" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935" font-style="italic">(Positive feedback:</text>
  <text x="185" y="128" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935" font-style="italic">Estrogen → LH surge)</text>

  <!-- Fertile window -->
  <rect x="170" y="135" width="60" height="15" rx="3" fill="#e6ee9c" stroke="#9e9d24" stroke-width="1"/>
  <text x="200" y="146" text-anchor="middle" font-family="Arial" font-size="8" fill="#827717">fertile window</text>
</svg>