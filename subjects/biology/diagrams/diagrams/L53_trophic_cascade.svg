<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <rect width="600" height="500" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Trophic Cascade — Yellowstone Wolf Reintroduction (1995)</text>

  <!-- BEFORE panel -->
  <rect x="20" y="40" width="265" height="440" rx="6" fill="#fafafa" stroke="#ccc" stroke-width="1.5"/>
  <text x="152" y="65" text-anchor="middle" font-family="Arial" font-size="13" fill="#e53935" font-weight="bold">BEFORE 1995</text>
  <text x="152" y="82" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">No wolves</text>

  <!-- Trophic pyramid -->
  <rect x="55" y="100" width="195" height="35" rx="4" fill="#ffebee" stroke="#e53935" stroke-width="1.5"/>
  <text x="152" y="122" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935">Wolves: ABSENT ✕</text>

  <rect x="40" y="145" width="225" height="35" rx="4" fill="#fff3e0" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="152" y="167" text-anchor="middle" font-family="Arial" font-size="11" fill="#e65100">Elk: OVERPOPULATED</text>
  <text x="152" y="180" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">heavy grazing</text>

  <rect x="55" y="190" width="195" height="35" rx="4" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="152" y="212" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a6b3c">Aspen/Willow: DECLINED</text>

  <rect x="55" y="235" width="195" height="35" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="152" y="257" text-anchor="middle" font-family="Arial" font-size="11" fill="#1565c0">Beavers: FEW</text>

  <rect x="55" y="280" width="195" height="35" rx="4" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="152" y="302" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a">Riparian habitat: DEGRADED</text>

  <rect x="55" y="325" width="195" height="35" rx="4" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="152" y="347" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Biodiversity: LOW</text>

  <!-- Down arrows -->
  <text x="152" y="400" text-anchor="middle" font-family="Arial" font-size="9" fill="#999">Elk browsed saplings</text>
  <text x="152" y="414" text-anchor="middle" font-family="Arial" font-size="9" fill="#999">→ no trees → no beavers</text>
  <text x="152" y="428" text-anchor="middle" font-family="Arial" font-size="9" fill="#999">→ no dams → eroded banks</text>

  <!-- ARROW -->
  <text x="300" y="250" text-anchor="middle" font-family="Arial" font-size="16" fill="#1a6b3c" font-weight="bold">→</text>
  <text x="300" y="268" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">Wolves</text>
  <text x="300" y="282" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">reintroduced</text>
  <text x="300" y="296" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">1995</text>

  <!-- AFTER panel -->
  <rect x="315" y="40" width="265" height="440" rx="6" fill="#fafafa" stroke="#ccc" stroke-width="1.5"/>
  <text x="447" y="65" text-anchor="middle" font-family="Arial" font-size="13" fill="#1a6b3c" font-weight="bold">AFTER 1995</text>
  <text x="447" y="82" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">Wolves returned</text>

  <rect x="350" y="100" width="195" height="35" rx="4" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="447" y="122" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a6b3c">Wolves: PRESENT ✓</text>

  <rect x="335" y="145" width="225" height="35" rx="4" fill="#fff3e0" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="447" y="167" text-anchor="middle" font-family="Arial" font-size="11" fill="#e65100">Elk: REDUCED</text>
  <text x="447" y="180" text-anchor="middle" font-family="Arial" font-size="8" fill="#e65100">behavior changed (avoid valleys)</text>

  <rect x="350" y="190" width="195" height="35" rx="4" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="447" y="212" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a6b3c">Aspen/Willow: RECOVERED</text>

  <rect x="350" y="235" width="195" height="35" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="447" y="257" text-anchor="middle" font-family="Arial" font-size="11" fill="#1565c0">Beavers: RETURNED</text>

  <rect x="350" y="280" width="195" height="35" rx="4" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="447" y="302" text-anchor="middle" font-family="Arial" font-size="11" fill="#6a1b9a">Riparian habitat: RESTORED</text>

  <rect x="350" y="325" width="195" height="35" rx="4" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="447" y="347" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a6b3c">Biodiversity: INCREASED</text>

  <text x="447" y="400" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Trees recovered → beavers</text>
  <text x="447" y="414" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">built dams → ponds formed</text>
  <text x="447" y="428" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">→ fish, birds, amphibians ↑</text>

  <!-- Cascade arrows -->
  <line x1="152" y1="135" x2="152" y2="145" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="152" y1="180" x2="152" y2="190" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="152" y1="225" x2="152" y2="235" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="152" y1="270" x2="152" y2="280" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="447" y1="135" x2="447" y2="145" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="447" y1="180" x2="447" y2="190" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="447" y1="225" x2="447" y2="235" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="447" y1="270" x2="447" y2="280" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="300" y="480" text-anchor="middle" font-family="Arial" font-size="10" fill="#666" font-style="italic">Top-down control: apex predator affects entire ecosystem through trophic cascade</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#999"/></marker>
  </defs>
</svg>