<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <rect width="600" height="450" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Phloem — Pressure-Flow Hypothesis (Münch)</text>

  <!-- Source -->
  <rect x="30" y="60" width="200" height="200" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2.5"/>
  <text x="130" y="85" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a6b3c">SOURCE (Leaf)</text>
  <text x="130" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Sucrose actively loaded</text>
  <text x="130" y="120" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">into sieve tubes</text>
  <text x="130" y="145" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">Solute: HIGH</text>
  <text x="130" y="163" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">Water potential: LOW (ψs↓↓)</text>
  <text x="130" y="185" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">PRESSURE: HIGH</text>

  <!-- Water enters arrow -->
  <text x="130" y="272" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">↑ Water enters from xylem</text>
  <text x="130" y="286" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">  by osmosis</text>

  <!-- Sink -->
  <rect x="370" y="60" width="200" height="200" rx="8" fill="#fce4ec" stroke="#e53935" stroke-width="2.5"/>
  <text x="470" y="85" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">SINK (Root)</text>
  <text x="470" y="105" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Sucrose actively unloaded</text>
  <text x="470" y="120" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">from sieve tubes</text>
  <text x="470" y="145" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Solute: LOW</text>
  <text x="470" y="163" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Water potential: HIGH (ψs↑)</text>
  <text x="470" y="185" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">PRESSURE: LOW</text>

  <text x="470" y="272" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">↓ Water returns to xylem</text>
  <text x="470" y="286" text-anchor="middle" font-family="Arial" font-size="9" fill="#1565c0">  by osmosis</text>

  <!-- Bulk flow arrow -->
  <rect x="230" y="130" width="140" height="40" rx="6" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="300" y="156" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ff8f00">BULK FLOW →</text>

  <!-- Xylem below -->
  <rect x="30" y="320" width="540" height="30" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="300" y="340" text-anchor="middle" font-family="Arial" font-size="10" fill="#1565c0">XYLEM — Water flow: Roots → Leaves (transpiration pull)</text>

  <!-- Details box -->
  <rect x="30" y="365" width="540" height="75" rx="6" fill="#fafafa" stroke="#333" stroke-width="1"/>
  <text x="50" y="385" font-family="Arial" font-size="10" fill="#333" font-weight="bold">Sieve tube elements: living, enucleate, few organelles, sieve plates with pores</text>
  <text x="50" y="402" font-family="Arial" font-size="10" fill="#333">Companion cells: provide ATP + metabolic support via plasmodesmata; H⁺-sucrose co-transport loads sucrose</text>
  <text x="50" y="422" font-family="Arial" font-size="10" fill="#333">Active loading requires ATP (H⁺-ATPase pump). Flow is passive (driven by pressure gradient).</text>
  <text x="50" y="438" font-family="Arial" font-size="10" fill="#333">Evidence: aphid stylets show positive pressure, ¹⁴C tracers, metabolic inhibitors stop flow at source</text>
</svg>