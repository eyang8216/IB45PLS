<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" width="600" height="480">
  <rect width="600" height="480" fill="white"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">L37c — Exponential vs Logistic Population Growth</text>

  <!-- Axes -->
  <line x1="65" y1="380" x2="560" y2="380" stroke="#333" stroke-width="2"/>
  <line x1="65" y1="380" x2="65" y2="55" stroke="#333" stroke-width="2"/>
  <text x="310" y="410" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">Time</text>
  <text x="30" y="220" text-anchor="middle" font-family="Arial" font-size="14" fill="#333" transform="rotate(-90,30,220)">Population Size (N)</text>

  <!-- K line -->
  <line x1="65" y1="135" x2="555" y2="135" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="555" y="130" text-anchor="end" font-family="Arial" font-size="12" fill="#ff8f00" font-weight="bold">K (Carrying Capacity)</text>

  <!-- J-curve (Exponential) - dotted -->
  <path d="M65,375 Q180,365 260,340 Q320,310 380,240 Q420,180 470,90 Q510,35 545,15"
        fill="none" stroke="#e53935" stroke-width="3" stroke-dasharray="7,4"/>
  <!-- Arrowhead -->
  <polygon points="545,15 540,25 550,22" fill="#e53935"/>

  <!-- S-curve (Logistic) -->
  <path d="M65,375 L110,370 L160,355 L210,330 L260,290 L310,245 L360,200 L410,165 L460,148 L500,140 L555,136"
        fill="none" stroke="#1a6b3c" stroke-width="3"/>

  <!-- Phase labels -->
  <text x="110" y="395" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a6b3c" font-weight="bold">Lag</text>
  <text x="175" y="395" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a6b3c" font-weight="bold">Exponential</text>
  <text x="285" y="395" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a6b3c" font-weight="bold">Transitional (decelerating)</text>
  <text x="465" y="395" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a6b3c" font-weight="bold">Plateau (Stationary)</text>

  <!-- Phase bracket marks -->
  <line x1="65" y1="385" x2="65" y2="390" stroke="#1a6b3c" stroke-width="1.5"/>
  <line x1="160" y1="385" x2="160" y2="390" stroke="#1a6b3c" stroke-width="1.5"/>
  <line x1="240" y1="385" x2="240" y2="390" stroke="#1a6b3c" stroke-width="1.5"/>
  <line x1="350" y1="385" x2="350" y2="390" stroke="#1a6b3c" stroke-width="1.5"/>
  <line x1="555" y1="385" x2="555" y2="390" stroke="#1a6b3c" stroke-width="1.5"/>

  <!-- Legend -->
  <rect x="370" y="55" width="210" height="80" rx="4" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
  <line x1="385" y1="72" x2="420" y2="72" stroke="#e53935" stroke-width="3" stroke-dasharray="5,3"/>
  <text x="430" y="76" font-family="Arial" font-size="12" fill="#e53935">Exponential (J-curve)</text>
  <text x="430" y="90" font-family="Arial" font-size="10" fill="#666">dN/dt = rN</text>
  <text x="430" y="102" font-family="Arial" font-size="10" fill="#666">Unlimited resources</text>
  <line x1="385" y1="115" x2="420" y2="115" stroke="#1a6b3c" stroke-width="3"/>
  <text x="430" y="119" font-family="Arial" font-size="12" fill="#1a6b3c">Logistic (S-curve)</text>
  <text x="430" y="133" font-family="Arial" font-size="10" fill="#666">dN/dt = rN(1−N/K)</text>

  <!-- Key insight -->
  <rect x="65" y="430" width="490" height="35" rx="4" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="1"/>
  <text x="310" y="453" text-anchor="middle" font-family="Arial" font-size="12" fill="#1a6b3c">As N→K, (1−N/K)→0, so growth stops. Density-dependent factors cause leveling off.</text>
</svg>