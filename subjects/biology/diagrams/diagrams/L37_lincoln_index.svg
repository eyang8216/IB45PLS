<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <rect width="600" height="500" fill="white"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">L37b — Lincoln Index: Mark-Recapture Method</text>

  <!-- Step 1: Capture -->
  <rect x="40" y="55" width="155" height="170" rx="6" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
  <text x="117" y="80" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">Step 1: Capture</text>
  <text x="117" y="105" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Trap &amp; count n₁ = 40</text>
  <!-- Draw rabbits -->
  <g fill="#8d6e63">
    <ellipse cx="65" cy="130" rx="8" ry="6"/><ellipse cx="85" cy="135" rx="8" ry="6"/>
    <ellipse cx="105" cy="125" rx="8" ry="6"/><ellipse cx="125" cy="140" rx="8" ry="6"/>
    <ellipse cx="145" cy="128" rx="8" ry="6"/><ellipse cx="165" cy="138" rx="8" ry="6"/>
    <circle cx="62" cy="123" r="3"/><circle cx="82" cy="128" r="3"/><circle cx="102" cy="118" r="3"/>
    <circle cx="122" cy="133" r="3"/><circle cx="142" cy="121" r="3"/><circle cx="162" cy="131" r="3"/>
  </g>
  <text x="117" y="170" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">n₁ = 40 captured</text>
  <text x="117" y="188" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Mark all with tag</text>

  <!-- Arrow -->
  <text x="210" y="145" text-anchor="middle" font-family="Arial" font-size="22" fill="#e53935">→</text>

  <!-- Step 2: Release -->
  <rect x="230" y="55" width="130" height="170" rx="6" fill="#fff3e0" stroke="#ff8f00" stroke-width="2"/>
  <text x="295" y="80" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#ff8f00">Step 2: Release</text>
  <text x="295" y="105" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Marked mix with</text>
  <text x="295" y="122" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">unmarked population</text>
  <text x="295" y="148" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Random mixing</text>
  <text x="295" y="170" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">Allow time</text>
  <text x="295" y="188" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">for redistribution</text>

  <!-- Arrow -->
  <text x="375" y="145" text-anchor="middle" font-family="Arial" font-size="22" fill="#e53935">→</text>

  <!-- Step 3: Recapture -->
  <rect x="395" y="55" width="170" height="170" rx="6" fill="#e8f0fe" stroke="#1565c0" stroke-width="2"/>
  <text x="480" y="80" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">Step 3: Recapture</text>
  <text x="480" y="105" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Trap again: n₂ = 35</text>
  <text x="480" y="125" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Count marked: n₃ = 14</text>
  <g fill="#8d6e63">
    <ellipse cx="415" cy="150" rx="7" ry="5"/><ellipse cx="440" cy="155" rx="7" ry="5"/>
    <ellipse cx="465" cy="145" rx="7" ry="5"/><ellipse cx="490" cy="160" rx="7" ry="5"/>
    <ellipse cx="515" cy="148" rx="7" ry="5"/>
  </g>
  <!-- Mark some as tagged -->
  <g fill="#e53935">
    <circle cx="413" cy="143" r="3"/><circle cx="463" cy="138" r="3"/><circle cx="513" cy="141" r="3"/>
  </g>
  <text x="480" y="178" text-anchor="middle" font-family="Arial" font-size="11" fill="#e53935">● = tagged (n₃ = 3 shown)</text>

  <!-- Formula box -->
  <rect x="90" y="255" width="420" height="105" rx="8" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  <text x="300" y="280" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#6a1b9a">Lincoln Index Formula</text>
  <text x="300" y="308" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#333">N = n₁ × n₂ / n₃</text>
  <text x="300" y="332" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">N = 40 × 35 / 14 = 1400/14 = 100</text>
  <text x="300" y="352" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#e53935">Estimated population: 100 organisms</text>

  <!-- Assumptions box -->
  <rect x="40" y="380" width="520" height="105" rx="6" fill="#fefefe" stroke="#ccc" stroke-width="1.5"/>
  <text x="300" y="402" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Critical Assumptions</text>
  <g font-family="Arial" font-size="11" fill="#555">
    <text x="55" y="425">• No migration in/out between samples</text>
    <text x="55" y="442">• No births or deaths between samples</text>
    <text x="55" y="459">• Marks are not lost; marked individuals mix randomly</text>
    <text x="300" y="425">• Mark does not affect survival</text>
    <text x="300" y="442">• Sampling is random (no trap-happy/trap-shy)</text>
    <text x="300" y="459">• Sampling time is short relative to population changes</text>
  </g>
</svg>