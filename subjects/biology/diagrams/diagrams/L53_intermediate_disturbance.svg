<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Intermediate Disturbance Hypothesis (IDH)</text>

  <!-- Axes -->
  <line x1="55" y1="60" x2="55" y2="350" stroke="#333" stroke-width="2"/>
  <line x1="55" y1="350" x2="570" y2="350" stroke="#333" stroke-width="2"/>

  <!-- Y axis label -->
  <text x="48" y="65" text-anchor="end" font-family="Arial" font-size="10" fill="#333">HIGH</text>
  <text x="48" y="345" text-anchor="end" font-family="Arial" font-size="10" fill="#333">LOW</text>
  <text x="30" y="205" text-anchor="middle" font-family="Arial" font-size="10" fill="#333" transform="rotate(-90,30,205)">Biodiversity</text>

  <!-- X axis label -->
  <text x="310" y="380" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">Disturbance Frequency/Intensity →</text>

  <!-- Bell curve -->
  <path d="M58,330 Q100,330 150,280 Q200,200 250,140 Q290,110 310,105 Q330,110 370,140 Q420,200 470,280 Q520,330 560,330"
    fill="none" stroke="#1565c0" stroke-width="3" stroke-linejoin="round"/>

  <!-- Fill under curve -->
  <path d="M58,330 Q100,330 150,280 Q200,200 250,140 Q290,110 310,105 Q330,110 370,140 Q420,200 470,280 Q520,330 560,330 L560,350 L58,350 Z"
    fill="#bbdefb" opacity="0.4"/>

  <!-- Peak -->
  <line x1="310" y1="105" x2="310" y2="350" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="310" y="98" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff8f00" font-weight="bold">PEAK</text>
  <text x="310" y="88" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff8f00">Biodiversity</text>

  <!-- LOW disturbance zone -->
  <rect x="60" y="355" width="140" height="18" rx="3" fill="#ffebee" stroke="#e53935" stroke-width="1"/>
  <text x="130" y="368" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">LOW Disturbance</text>
  <text x="130" y="395" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Competitive exclusion</text>
  <text x="130" y="408" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">(dominant species win)</text>

  <!-- INTERMEDIATE zone -->
  <rect x="230" y="355" width="160" height="18" rx="3" fill="#e8f5e9" stroke="#43a047" stroke-width="1"/>
  <text x="310" y="368" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">INTERMEDIATE Disturbance</text>
  <text x="310" y="395" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">Coexistence of</text>
  <text x="310" y="408" text-anchor="middle" font-family="Arial" font-size="9" fill="#2e7d32">competitors &amp; colonizers</text>

  <!-- HIGH disturbance zone -->
  <rect x="420" y="355" width="140" height="18" rx="3" fill="#ffebee" stroke="#e53935" stroke-width="1"/>
  <text x="490" y="368" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">HIGH Disturbance</text>
  <text x="490" y="395" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">Only tolerant</text>
  <text x="490" y="408" text-anchor="middle" font-family="Arial" font-size="9" fill="#c62828">species survive</text>

  <!-- Species illustrations -->
  <!-- Low: 1 big tree -->
  <rect x="90" y="260" width="60" height="80" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <rect x="105" y="290" width="30" height="45" rx="3" fill="#81c784" stroke="#1a6b3c" stroke-width="1.5"/>
  <text x="120" y="332" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">1 dominant</text>
  <text x="120" y="342" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">species</text>

  <!-- Intermediate: many species -->
  <rect x="260" y="260" width="100" height="80" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <rect x="268" y="300" width="10" height="35" rx="2" fill="#81c784"/>
  <rect x="282" y="295" width="10" height="40" rx="2" fill="#43a047"/>
  <rect x="296" y="305" width="10" height="30" rx="2" fill="#66bb6a"/>
  <rect x="310" y="290" width="10" height="45" rx="2" fill="#a5d6a7"/>
  <rect x="324" y="298" width="10" height="37" rx="2" fill="#81c784"/>
  <rect x="338" y="310" width="10" height="25" rx="2" fill="#c8e6c9"/>
  <text x="310" y="345" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Many species</text>

  <!-- High: only grass -->
  <rect x="440" y="290" width="100" height="50" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <line x1="450" y1="335" x2="458" y2="310" stroke="#81c784" stroke-width="2"/>
  <line x1="460" y1="335" x2="468" y2="305" stroke="#43a047" stroke-width="2"/>
  <line x1="470" y1="335" x2="478" y2="312" stroke="#81c784" stroke-width="2"/>
  <line x1="480" y1="335" x2="488" y2="308" stroke="#66bb6a" stroke-width="2"/>
  <line x1="490" y1="335" x2="498" y2="315" stroke="#a5d6a7" stroke-width="2"/>
  <line x1="500" y1="335" x2="508" y2="310" stroke="#81c784" stroke-width="2"/>
  <line x1="510" y1="335" x2="518" y2="305" stroke="#43a047" stroke-width="2"/>
  <line x1="520" y1="335" x2="528" y2="312" stroke="#81c784" stroke-width="2"/>
  <text x="490" y="345" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Only tolerant spp.</text>
</svg>