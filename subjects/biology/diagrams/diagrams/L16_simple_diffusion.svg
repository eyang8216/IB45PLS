<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320">
  <rect width="600" height="320" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Simple Diffusion Across Membrane</text>

  <!-- Membrane -->
  <g fill="#1a6b3c">
    <circle cx="40" cy="130" r="7"/><circle cx="80" cy="130" r="7"/><circle cx="120" cy="130" r="7"/>
    <circle cx="160" cy="130" r="7"/><circle cx="200" cy="130" r="7"/><circle cx="240" cy="130" r="7"/>
    <circle cx="280" cy="130" r="7"/><circle cx="320" cy="130" r="7"/><circle cx="360" cy="130" r="7"/>
    <circle cx="440" cy="130" r="7"/><circle cx="480" cy="130" r="7"/><circle cx="520" cy="130" r="7"/><circle cx="560" cy="130" r="7"/>
  </g>
  <g stroke="#1a6b3c" stroke-width="2" fill="none">
    <line x1="40" y1="130" x2="40" y2="165"/><line x1="80" y1="130" x2="80" y2="165"/>
    <line x1="120" y1="130" x2="120" y2="165"/><line x1="160" y1="130" x2="160" y2="165"/>
    <line x1="200" y1="130" x2="200" y2="165"/><line x1="240" y1="130" x2="240" y2="165"/>
    <line x1="280" y1="130" x2="280" y2="165"/><line x1="320" y1="130" x2="320" y2="165"/>
    <line x1="360" y1="130" x2="360" y2="165"/><line x1="440" y1="130" x2="440" y2="165"/>
    <line x1="480" y1="130" x2="480" y2="165"/><line x1="520" y1="130" x2="520" y2="165"/>
    <line x1="560" y1="130" x2="560" y2="165"/>
  </g>
  <g stroke="#43a047" stroke-width="2" fill="none">
    <line x1="40" y1="165" x2="40" y2="200"/><line x1="80" y1="165" x2="80" y2="200"/>
    <line x1="120" y1="165" x2="120" y2="200"/><line x1="160" y1="165" x2="160" y2="200"/>
    <line x1="200" y1="165" x2="200" y2="200"/><line x1="240" y1="165" x2="240" y2="200"/>
    <line x1="280" y1="165" x2="280" y2="200"/><line x1="320" y1="165" x2="320" y2="200"/>
    <line x1="360" y1="165" x2="360" y2="200"/><line x1="440" y1="165" x2="440" y2="200"/>
    <line x1="480" y1="165" x2="480" y2="200"/><line x1="520" y1="165" x2="520" y2="200"/>
    <line x1="560" y1="165" x2="560" y2="200"/>
  </g>
  <g fill="#43a047">
    <circle cx="40" cy="200" r="7"/><circle cx="80" cy="200" r="7"/><circle cx="120" cy="200" r="7"/>
    <circle cx="160" cy="200" r="7"/><circle cx="200" cy="200" r="7"/><circle cx="240" cy="200" r="7"/>
    <circle cx="280" cy="200" r="7"/><circle cx="320" cy="200" r="7"/><circle cx="360" cy="200" r="7"/>
    <circle cx="440" cy="200" r="7"/><circle cx="480" cy="200" r="7"/><circle cx="520" cy="200" r="7"/>
    <circle cx="560" cy="200" r="7"/>
  </g>

  <!-- HIGH concentration label -->
  <text x="300" y="50" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e53935">HIGH Concentration (outside)</text>

  <!-- LOW concentration label -->
  <text x="300" y="300" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">LOW Concentration (inside)</text>

  <!-- Molecules above -->
  <g fill="#e53935">
    <circle cx="60" cy="75" r="9"/><circle cx="120" cy="55" r="9"/><circle cx="180" cy="85" r="9"/>
    <circle cx="240" cy="65" r="9"/><circle cx="300" cy="50" r="9"/><circle cx="360" cy="80" r="9"/>
    <circle cx="420" cy="60" r="9"/><circle cx="480" cy="90" r="9"/><circle cx="540" cy="55" r="9"/>
    <circle cx="90" cy="95" r="9"/><circle cx="150" cy="50" r="9"/><circle cx="330" cy="95" r="9"/>
    <circle cx="450" cy="105" r="9"/><circle cx="510" cy="70" r="9"/>
  </g>
  <g fill="#fff" font-family="Arial" font-size="9" text-anchor="middle">
    <text x="60" y="78">O₂</text><text x="120" y="58">CO₂</text><text x="180" y="88">O₂</text>
    <text x="240" y="68">N₂</text><text x="300" y="53">O₂</text><text x="360" y="83">CO₂</text>
    <text x="420" y="63">O₂</text><text x="480" y="93">N₂</text><text x="540" y="58">CO₂</text>
  </g>

  <!-- Molecules below (fewer) -->
  <g fill="#1565c0">
    <circle cx="80" cy="250" r="9"/><circle cx="200" cy="270" r="9"/><circle cx="340" cy="245" r="9"/>
    <circle cx="460" cy="260" r="9"/><circle cx="540" cy="275" r="9"/>
  </g>
  <g fill="#fff" font-family="Arial" font-size="9" text-anchor="middle">
    <text x="80" y="253">O₂</text><text x="200" y="273">CO₂</text><text x="340" y="248">O₂</text>
    <text x="460" y="263">N₂</text><text x="540" y="278">CO₂</text>
  </g>

  <!-- Movement arrows -->
  <g stroke="#e53935" stroke-width="2" fill="none" marker-end="url(#a)">
    <defs><marker id="a" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#e53935"/></marker></defs>
    <path d="M100,100 Q110,165 130,230"/>
    <path d="M250,100 Q240,165 220,230"/>
    <path d="M400,100 Q390,165 410,230"/>
    <path d="M500,110 Q510,165 530,230"/>
  </g>

  <text x="300" y="240" text-anchor="middle" font-family="Arial" font-size="12" font-style="italic" fill="#555">Concentration gradient: HIGH → LOW (no energy required)</text>

  <text x="450" y="40" font-family="Arial" font-size="11" fill="#999">Small nonpolar</text>
  <text x="450" y="55" font-family="Arial" font-size="11" fill="#999">molecules only</text>
</svg>