<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#fff"/>
  <text x="300" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#333">Allosteric Enzyme Kinetics — Sigmoidal Curve &amp; Cooperativity</text>

  <!-- Axes -->
  <line x1="70" y1="350" x2="540" y2="350" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="350" x2="70" y2="50" stroke="#333" stroke-width="2"/>
  <text x="300" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">[S] (Substrate Concentration) →</text>
  <text x="22" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333" transform="rotate(-90,22,205)">Rate (v₀) →</text>

  <!-- Sigmoidal curve -->
  <path d="M80,345 Q110,340 140,330 Q180,310 220,270 Q260,210 300,140 Q340,80 400,58 Q460,48 540,45" fill="none" stroke="#6a1b9a" stroke-width="3"/>

  <!-- Michaelis-Menten comparison (dotted) -->
  <path d="M80,345 Q130,310 170,260 Q220,190 280,130 Q350,80 440,58 Q510,48 540,45" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Vmax -->
  <line x1="70" y1="43" x2="540" y2="43" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="545" y="47" font-family="Arial, sans-serif" font-size="12" fill="#ff8f00" font-weight="bold">Vmax</text>

  <!-- Half Vmax -->
  <line x1="70" y1="198" x2="540" y2="198" stroke="#1565c0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="545" y="202" font-family="Arial, sans-serif" font-size="10" fill="#1565c0">½Vmax</text>

  <!-- S₀.₅ -->
  <line x1="260" y1="198" x2="260" y2="350" stroke="#6a1b9a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="260" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6a1b9a" font-weight="bold">S₀.₅ (K₀.₅)</text>

  <!-- Phases -->
  <text x="145" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6a1b9a">Low affinity</text>
  <text x="145" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6a1b9a">(T-state)</text>

  <text x="360" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6a1b9a">High affinity</text>
  <text x="360" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6a1b9a">(R-state)</text>

  <!-- T → R switch -->
  <text x="225" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e53935" font-weight="bold">T→R transition</text>

  <!-- Allosteric enzyme diagram inset -->
  <rect x="380" y="270" width="150" height="110" rx="8" fill="none" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="455" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6a1b9a" font-weight="bold">4 Subunits</text>

  <!-- T state R state -->
  <!-- T state -->
  <rect x="395" y="300" width="20" height="20" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <rect x="417" y="300" width="20" height="20" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <rect x="395" y="322" width="20" height="20" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <rect x="417" y="322" width="20" height="20" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
  <text x="425" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#999">T (tense)</text>

  <text x="455" y="310" font-family="Arial, sans-serif" font-size="12" fill="#333">→</text>

  <!-- R state -->
  <rect x="465" y="300" width="20" height="20" rx="10" fill="#e1bee7" stroke="#6a1b9a" stroke-width="2"/>
  <rect x="487" y="300" width="20" height="20" rx="10" fill="#e1bee7" stroke="#6a1b9a" stroke-width="2"/>
  <rect x="465" y="322" width="20" height="20" rx="10" fill="#e1bee7" stroke="#6a1b9a" stroke-width="2"/>
  <rect x="487" y="322" width="20" height="20" rx="10" fill="#e1bee7" stroke="#6a1b9a" stroke-width="2"/>
  <text x="496" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6a1b9a">R (relaxed)</text>

  <text x="455" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6a1b9a">Binding at one site ↑</text>
  <text x="455" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6a1b9a" dy="12">affinity at others</text>

  <!-- Legend -->
  <line x1="70" y1="385" x2="100" y2="385" stroke="#6a1b9a" stroke-width="3"/>
  <text x="108" y="390" font-family="Arial, sans-serif" font-size="11" fill="#6a1b9a">Allosteric (sigmoidal)</text>
  <line x1="260" y1="385" x2="290" y2="385" stroke="#999" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="298" y="390" font-family="Arial, sans-serif" font-size="11" fill="#999">Michaelis-Menten</text>
</svg>
