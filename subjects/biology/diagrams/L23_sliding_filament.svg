<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 650" width="600" height="650">
  <rect width="600" height="650" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Sliding Filament Theory — Cross-Bridge Cycle</text>

  <!-- Step 1 -->
  <rect x="30" y="50" width="540" height="70" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="50" y="72" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">1. Ca²⁺ Released from SR</text>
  <text x="50" y="90" font-family="Arial" font-size="9" fill="#333">Action potential → T-tubules → Ca²⁺ released from sarcoplasmic reticulum → Ca²⁺ binds Troponin C → tropomyosin shifts → myosin-binding sites on actin exposed</text>

  <line x1="300" y1="120" x2="300" y2="135" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="30" y="140" width="540" height="70" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="50" y="162" font-family="Arial" font-size="11" font-weight="bold" fill="#1a6b3c">2. Cross-Bridge Formation</text>
  <text x="50" y="180" font-family="Arial" font-size="9" fill="#333">Energized myosin head (ADP + Pi bound, "cocked" position) binds to exposed myosin-binding site on actin</text>

  <line x1="300" y1="210" x2="300" y2="225" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="30" y="230" width="540" height="70" rx="6" fill="#fce4ec" stroke="#e53935" stroke-width="1.5"/>
  <text x="50" y="252" font-family="Arial" font-size="11" font-weight="bold" fill="#e53935">3. POWER STROKE</text>
  <text x="50" y="270" font-family="Arial" font-size="9" fill="#333">Myosin head pivots (90° → 45°) → pulls actin filament toward M-line. Pi released (triggers stroke), then ADP released. Force generated!</text>

  <line x1="300" y1="300" x2="300" y2="315" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="30" y="320" width="540" height="70" rx="6" fill="#fff3e0" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="50" y="342" font-family="Arial" font-size="11" font-weight="bold" fill="#ff8f00">4. ATP Binding → Detachment</text>
  <text x="50" y="360" font-family="Arial" font-size="9" fill="#333">New ATP molecule binds to myosin head → conformational change → myosin head releases from actin (rigor state broken)</text>

  <line x1="300" y1="390" x2="300" y2="405" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <rect x="30" y="410" width="540" height="70" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="50" y="432" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">5. ATP Hydrolysis → Re-cocking</text>
  <text x="50" y="450" font-family="Arial" font-size="9" fill="#333">Myosin head hydrolyzes ATP → ADP + Pi (both remain bound). Energy used to re-cock head to high-energy 90° position. Ready for next cycle!</text>

  <!-- Summary box -->
  <rect x="30" y="500" width="540" height="140" rx="6" fill="#fafafa" stroke="#333" stroke-width="1"/>
  <text x="300" y="522" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">ATP's Three Roles in Muscle Contraction</text>
  <text x="50" y="545" font-family="Arial" font-size="10" fill="#333">1. ATP HYDROLYSIS → energizes (re-cocks) the myosin head into high-energy position (ADP + Pi)</text>
  <text x="50" y="565" font-family="Arial" font-size="10" fill="#333">2. ATP BINDING → causes myosin head to release from actin (without ATP, rigor mortis — heads locked on)</text>
  <text x="50" y="585" font-family="Arial" font-size="10" fill="#333">3. ATP powers Ca²⁺ REUPTAKE into SR via SERCA pumps (required for muscle relaxation)</text>
  <text x="50" y="610" font-family="Arial" font-size="10" fill="#e53935">Key: Ca²⁺ regulates AVAILABILITY of binding sites. ATP drives the mechanical cycle. Both are essential.</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M0,0 L4,6 L8,0 Z" fill="#333"/>
    </marker>
  </defs>
</svg>