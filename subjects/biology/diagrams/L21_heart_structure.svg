<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 650" width="600" height="650">
  <rect width="600" height="650" fill="#fff"/>
  <text x="300" y="28" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Human Heart — Structure &amp; Blood Flow</text>

  <!-- Right side (deoxygenated) -->
  <rect x="50" y="65" width="225" height="180" rx="20" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="162" y="92" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">RIGHT ATRIUM</text>
  <text x="162" y="108" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Deoxygenated blood</text>

  <!-- SVC -->
  <line x1="162" y1="45" x2="162" y2="65" stroke="#1565c0" stroke-width="3"/>
  <text x="162" y="42" text-anchor="middle" font-family="Arial" font-size="8" fill="#1565c0">SVC</text>

  <!-- IVC -->
  <line x1="120" y1="250" x2="145" y2="235" stroke="#1565c0" stroke-width="3"/>
  <text x="105" y="260" font-family="Arial" font-size="8" fill="#1565c0">IVC</text>

  <!-- Tricuspid valve -->
  <line x1="95" y1="180" x2="230" y2="180" stroke="#333" stroke-width="2"/>
  <text x="162" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Tricuspid Valve</text>

  <rect x="60" y="205" width="200" height="100" rx="15" fill="#bbdefb" stroke="#1565c0" stroke-width="2"/>
  <text x="160" y="245" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">RIGHT VENTRICLE</text>

  <!-- Chordae tendineae -->
  <line x1="140" y1="180" x2="130" y2="215" stroke="#555" stroke-width="1"/>
  <line x1="175" y1="180" x2="185" y2="215" stroke="#555" stroke-width="1"/>
  <text x="100" y="265" font-family="Arial" font-size="7" fill="#555">Chordae</text>
  <text x="100" y="275" font-family="Arial" font-size="7" fill="#555">tendineae</text>

  <!-- Pulmonary semilunar valve -->
  <text x="40" y="325" font-family="Arial" font-size="8" fill="#333">Pulmonary</text>
  <text x="40" y="336" font-family="Arial" font-size="8" fill="#333">Semilunar</text>

  <!-- Pulmonary artery -->
  <path d="M130,305 Q120,340 80,380 Q60,410 30,430" fill="none" stroke="#1565c0" stroke-width="3"/>
  <text x="65" y="375" font-family="Arial" font-size="8" fill="#1565c0">Pulmonary Artery</text>

  <!-- Septum -->
  <rect x="275" y="65" width="20" height="250" fill="#ccc" stroke="#999" stroke-width="1"/>

  <!-- Left side (oxygenated) -->
  <rect x="325" y="65" width="225" height="180" rx="20" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
  <text x="437" y="92" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e53935">LEFT ATRIUM</text>
  <text x="437" y="108" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Oxygenated blood</text>

  <!-- Pulmonary veins -->
  <line x1="380" y1="45" x2="395" y2="65" stroke="#e53935" stroke-width="3"/>
  <line x1="480" y1="45" x2="475" y2="65" stroke="#e53935" stroke-width="3"/>
  <text x="437" y="42" text-anchor="middle" font-family="Arial" font-size="8" fill="#e53935">Pulmonary Veins</text>

  <!-- Bicuspid/Mitral -->
  <line x1="370" y1="180" x2="505" y2="180" stroke="#333" stroke-width="2"/>
  <text x="437" y="198" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">Bicuspid (Mitral) Valve</text>

  <!-- Left ventricle — thicker wall -->
  <rect x="330" y="205" width="210" height="115" rx="15" fill="none" stroke="#e53935" stroke-width="3"/>
  <rect x="330" y="205" width="210" height="18" fill="#ffcdd2"/>
  <text x="435" y="250" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#e53935">LEFT VENTRICLE</text>
  <text x="435" y="275" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935" font-weight="bold">THICKER WALL</text>
  <text x="435" y="290" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">(2-3× thicker)</text>

  <!-- Aortic semilunar -->
  <text x="555" y="338" font-family="Arial" font-size="8" fill="#333">Aortic</text>
  <text x="555" y="350" font-family="Arial" font-size="8" fill="#333">Semilunar</text>

  <!-- Aorta -->
  <path d="M440,320 Q470,340 500,330 Q550,310 570,280" fill="none" stroke="#e53935" stroke-width="3"/>
  <text x="520" y="295" font-family="Arial" font-size="8" fill="#e53935">Aorta</text>

  <!-- Blood flow arrows summary -->
  <rect x="30" y="380" width="540" height="260" rx="6" fill="#fafafa" stroke="#333" stroke-width="1"/>
  <text x="300" y="402" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Blood Flow Pathway</text>

  <text x="50" y="425" font-family="Arial" font-size="10" fill="#333">Body → SVC/IVC → Right Atrium → Tricuspid Valve → Right Ventricle</text>
  <text x="50" y="444" font-family="Arial" font-size="10" fill="#333">→ Pulmonary Semilunar Valve → Pulmonary Artery → LUNGS (gas exchange)</text>
  <text x="50" y="463" font-family="Arial" font-size="10" fill="#333">→ Pulmonary Veins → Left Atrium → Bicuspid/Mitral Valve → Left Ventricle</text>
  <text x="50" y="482" font-family="Arial" font-size="10" fill="#333">→ Aortic Semilunar Valve → Aorta → BODY</text>

  <text x="50" y="510" font-family="Arial" font-size="10" fill="#e53935" font-weight="bold">Left ventricle thicker: pumps to entire body (high resistance systemic circulation)</text>
  <text x="50" y="528" font-family="Arial" font-size="10" fill="#1565c0" font-weight="bold">Right ventricle thinner: pumps only to lungs (low resistance pulmonary circulation)</text>
  <text x="50" y="552" font-family="Arial" font-size="9" fill="#333">Chordae tendineae anchored to papillary muscles — prevent AV valve inversion (prolapse) during ventricular contraction</text>
  <text x="50" y="570" font-family="Arial" font-size="9" fill="#333">AV valves open when atrial P > ventricular P. Semilunar valves open when ventricular P > arterial P.</text>
  <text x="50" y="595" font-family="Arial" font-size="9" fill="#333">Blue = deoxygenated blood (right side). Red = oxygenated blood (left side).</text>
  <text x="50" y="618" font-family="Arial" font-size="9" fill="#333">SVC = Superior Vena Cava, IVC = Inferior Vena Cava</text>
</svg>
