### L04_b: Phospholipid Self-Assembly & Protocell ###
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 550" style="background:#fff">
  <defs><linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a6b3c"/><stop offset="100%" stop-color="#43a047"/></linearGradient></defs>
  <rect width="600" height="550" fill="#fff"/>
  <rect x="0" y="0" width="600" height="42" fill="url(#hdr)"/>
  <text x="300" y="28" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="bold" font-size="16">Phospholipid Self-Assembly — Bilayer Formation &amp; Protocells</text>

  <!-- Stage 1: Individual phospholipids in water -->
  <text x="100" y="70" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="13">① Phospholipids in Water</text>
  <!-- phospholipid molecules scatter -->
  <g>
    <circle cx="50" cy="100" r="8" fill="#43a047"/><line x1="50" y1="108" x2="40" y2="130" stroke="#333" stroke-width="2"/><line x1="50" y1="108" x2="60" y2="130" stroke="#333" stroke-width="2"/>
    <circle cx="90" cy="90" r="8" fill="#43a047"/><line x1="90" y1="98" x2="80" y2="120" stroke="#333" stroke-width="2"/><line x1="90" y1="98" x2="100" y2="120" stroke="#333" stroke-width="2"/>
    <circle cx="130" cy="110" r="8" fill="#43a047"/><line x1="130" y1="118" x2="120" y2="140" stroke="#333" stroke-width="2"/><line x1="130" y1="118" x2="140" y2="140" stroke="#333" stroke-width="2"/>
  </g>
  <text x="90" y="155" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">Hydrophilic heads (P)</text>
  <text x="90" y="168" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">+ Hydrophobic tails</text>

  <!-- Arrow -->
  <text x="170" y="120" text-anchor="middle" fill="#333" font-family="Arial" font-size="20">→</text>

  <!-- Stage 2: Bilayer cross-section -->
  <text x="300" y="70" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="13">② Spontaneous Bilayer Formation</text>
  <!-- Upper heads -->
  <circle cx="250" cy="105" r="8" fill="#43a047"/><circle cx="270" cy="105" r="8" fill="#43a047"/><circle cx="290" cy="105" r="8" fill="#43a047"/><circle cx="310" cy="105" r="8" fill="#43a047"/><circle cx="330" cy="105" r="8" fill="#43a047"/><circle cx="350" cy="105" r="8" fill="#43a047"/>
  <!-- Tails -->
  <line x1="250" y1="113" x2="260" y2="135" stroke="#333" stroke-width="2"/><line x1="250" y1="113" x2="240" y2="135" stroke="#333" stroke-width="2"/>
  <line x1="270" y1="113" x2="280" y2="135" stroke="#333" stroke-width="2"/><line x1="270" y1="113" x2="260" y2="135" stroke="#333" stroke-width="2"/>
  <line x1="290" y1="113" x2="300" y2="135" stroke="#333" stroke-width="2"/><line x1="290" y1="113" x2="280" y2="135" stroke="#333" stroke-width="2"/>
  <line x1="310" y1="113" x2="320" y2="135" stroke="#333" stroke-width="2"/><line x1="310" y1="113" x2="300" y2="135" stroke="#333" stroke-width="2"/>
  <line x1="330" y1="113" x2="340" y2="135" stroke="#333" stroke-width="2"/><line x1="330" y1="113" x2="320" y2="135" stroke="#333" stroke-width="2"/>
  <line x1="350" y1="113" x2="360" y2="135" stroke="#333" stroke-width="2"/><line x1="350" y1="113" x2="340" y2="135" stroke="#333" stroke-width="2"/>
  <!-- Lower tails (reverse) -->
  <line x1="250" y1="145" x2="260" y2="167" stroke="#333" stroke-width="2"/><line x1="250" y1="145" x2="240" y2="167" stroke="#333" stroke-width="2"/>
  <line x1="270" y1="145" x2="280" y2="167" stroke="#333" stroke-width="2"/><line x1="270" y1="145" x2="260" y2="167" stroke="#333" stroke-width="2"/>
  <line x1="290" y1="145" x2="300" y2="167" stroke="#333" stroke-width="2"/><line x1="290" y1="145" x2="280" y2="167" stroke="#333" stroke-width="2"/>
  <line x1="310" y1="145" x2="320" y2="167" stroke="#333" stroke-width="2"/><line x1="310" y1="145" x2="300" y2="167" stroke="#333" stroke-width="2"/>
  <line x1="330" y1="145" x2="340" y2="167" stroke="#333" stroke-width="2"/><line x1="330" y1="145" x2="320" y2="167" stroke="#333" stroke-width="2"/>
  <line x1="350" y1="145" x2="360" y2="167" stroke="#333" stroke-width="2"/><line x1="350" y1="145" x2="340" y2="167" stroke="#333" stroke-width="2"/>
  <!-- Lower heads -->
  <circle cx="250" cy="175" r="8" fill="#43a047"/><circle cx="270" cy="175" r="8" fill="#43a047"/><circle cx="290" cy="175" r="8" fill="#43a047"/><circle cx="310" cy="175" r="8" fill="#43a047"/><circle cx="330" cy="175" r="8" fill="#43a047"/><circle cx="350" cy="175" r="8" fill="#43a047"/>

  <!-- Labels for bilayer -->
  <text x="300" y="96" text-anchor="middle" fill="#1a6b3c" font-family="Arial" font-size="10">Hydrophilic heads</text>
  <text x="420" y="120" fill="#333" font-family="Arial" font-size="11">Hydrophobic</text>
  <text x="420" y="136" fill="#333" font-family="Arial" font-size="11">core</text>
  <text x="300" y="195" text-anchor="middle" fill="#1a6b3c" font-family="Arial" font-size="10">Hydrophilic heads</text>

  <!-- Arrow to protocell -->
  <text x="430" y="155" text-anchor="middle" fill="#333" font-family="Arial" font-size="20">→</text>

  <!-- Stage 3: Protocell (liposome with RNA inside) -->
  <text x="470" y="70" text-anchor="middle" fill="#333" font-family="Arial" font-weight="bold" font-size="13">③ Protocell (Liposome)</text>
  <circle cx="510" cy="145" r="45" fill="#e8f5e9" stroke="#43a047" stroke-width="3"/>
  <circle cx="510" cy="145" r="42" fill="none" stroke="#2e7d32" stroke-width="1.5"/>
  <!-- RNA inside -->
  <path d="M490,130 C495,125 505,120 510,128 C515,120 525,125 530,135" stroke="#e53935" stroke-width="2.5" fill="none"/>
  <path d="M495,145 C500,140 510,138 515,145" stroke="#e53935" stroke-width="2.5" fill="none"/>
  <path d="M498,155 C505,148 515,150 522,158" stroke="#e53935" stroke-width="2.5" fill="none"/>
  <text x="510" y="145" text-anchor="middle" fill="#e53935" font-family="Arial" font-weight="bold" font-size="16">RNA</text>
  <!-- Label -->
  <text x="510" y="210" text-anchor="middle" fill="#333" font-family="Arial" font-size="11">Phospholipid bilayer</text>
  <text x="510" y="226" text-anchor="middle" fill="#666" font-family="Arial" font-size="10">enclosing RNA</text>

  <!-- Bottom section: Key properties of protocells -->
  <rect x="20" y="250" width="560" height="120" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="275" text-anchor="middle" fill="#1a6b3c" font-family="Arial" font-weight="bold" font-size="14">Key Properties of Protocells</text>
  <text x="40" y="298" fill="#333" font-family="Arial" font-size="11">1. Form a boundary between inside and outside — crucial step toward life</text>
  <text x="40" y="318" fill="#333" font-family="Arial" font-size="11">2. Can grow by incorporating more phospholipids from environment</text>
  <text x="40" y="338" fill="#333" font-family="Arial" font-size="11">3. Can divide (pinch in two) when reaching a certain size</text>
  <text x="40" y="358" fill="#333" font-family="Arial" font-size="11">4. Maintain an internal chemical environment different from the outside</text>

  <!-- Bottom: self-assembly driving force -->
  <rect x="20" y="385" width="560" height="100" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="300" y="410" text-anchor="middle" fill="#1a6b3c" font-family="Arial" font-weight="bold" font-size="13">Driving Force: The Hydrophobic Effect</text>
  <text x="40" y="432" fill="#333" font-family="Arial" font-size="12">• Phospholipids are amphipathic — hydrophilic heads + hydrophobic tails</text>
  <text x="40" y="452" fill="#333" font-family="Arial" font-size="12">• In water: tails cluster together (away from water) → spontaneous bilayer</text>
  <text x="40" y="472" fill="#333" font-family="Arial" font-size="12">• No enzymes, no energy, no genetic instructions needed — pure physical chemistry</text>
</svg>