<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <rect width="600" height="360" fill="#fff"/>
  <text x="300" y="22" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Na⁺/K⁺ ATPase Pump — 6-Step Cycle</text>

  <!-- Step boxes -->
  <g font-family="Arial" font-size="10" fill="#333">
    <!-- Step 1 -->
    <rect x="15" y="40" width="175" height="130" rx="6" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
    <text x="102" y="57" text-anchor="middle" font-weight="bold" fill="#1a6b3c">① 3 Na⁺ Bind (cytosol)</text>
    <rect x="50" y="65" width="105" height="50" rx="8" fill="#81c784" stroke="#1a6b3c" stroke-width="2"/>
    <text x="102" y="90" text-anchor="middle" font-size="12" fill="#333">Pump open</text>
    <text x="102" y="105" text-anchor="middle" font-size="12" fill="#333">to inside</text>
    <circle cx="70" cy="80" r="6" fill="#e53935"/><text x="70" y="83" text-anchor="middle" font-size="8" fill="#fff">Na⁺</text>
    <circle cx="90" cy="80" r="6" fill="#e53935"/><text x="90" y="83" text-anchor="middle" font-size="8" fill="#fff">Na⁺</text>
    <circle cx="110" cy="80" r="6" fill="#e53935"/><text x="110" y="83" text-anchor="middle" font-size="8" fill="#fff">Na⁺</text>
    <text x="102" y="160" text-anchor="middle" font-size="9" fill="#555">Intracellular [Na⁺] high</text>

    <!-- Step 2 -->
    <rect x="210" y="40" width="175" height="130" rx="6" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
    <text x="297" y="57" text-anchor="middle" font-weight="bold" fill="#e53935">② ATP→ADP + Pi</text>
    <rect x="245" y="65" width="105" height="50" rx="8" fill="#ef9a9a" stroke="#e53935" stroke-width="2"/>
    <text x="297" y="85" text-anchor="middle" font-size="12" fill="#333">Phosphorylation</text>
    <text x="297" y="105" text-anchor="middle" font-size="12" fill="#333">shape change</text>
    <text x="270" y="77" font-family="Arial" font-size="8" fill="#e53935">ATP</text>
    <text x="310" y="100" font-family="Arial" font-size="8" fill="#e53935">ADP+Pi</text>
    <text x="297" y="160" text-anchor="middle" font-size="9" fill="#555">Energy from ATP used</text>

    <!-- Step 3 -->
    <rect x="405" y="40" width="178" height="130" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
    <text x="494" y="57" text-anchor="middle" font-weight="bold" fill="#1565c0">③ 3 Na⁺ Released</text>
    <rect x="438" y="65" width="112" height="50" rx="8" fill="#90caf9" stroke="#1565c0" stroke-width="2"/>
    <text x="494" y="85" text-anchor="middle" font-size="12" fill="#333">Conformation</text>
    <text x="494" y="105" text-anchor="middle" font-size="12" fill="#333">opens outward</text>
    <circle cx="455" cy="120" r="6" fill="#e53935"/><circle cx="475" cy="125" r="6" fill="#e53935"/><circle cx="495" cy="120" r="6" fill="#e53935"/>
    <text x="494" y="160" text-anchor="middle" font-size="9" fill="#555">[Na⁺] high outside</text>

    <!-- Step 4 -->
    <rect x="15" y="185" width="175" height="130" rx="6" fill="#e8f5e9" stroke="#1a6b3c" stroke-width="2"/>
    <text x="102" y="202" text-anchor="middle" font-weight="bold" fill="#1a6b3c">④ 2 K⁺ Bind (extracellular)</text>
    <rect x="50" y="210" width="105" height="50" rx="8" fill="#81c784" stroke="#1a6b3c" stroke-width="2"/>
    <text x="102" y="235" text-anchor="middle" font-size="12" fill="#333">K⁺ binds</text>
    <text x="102" y="250" text-anchor="middle" font-size="12" fill="#333">outside</text>
    <circle cx="85" cy="225" r="6" fill="#ff8f00"/><text x="85" y="228" text-anchor="middle" font-size="8">K⁺</text>
    <circle cx="110" cy="225" r="6" fill="#ff8f00"/><text x="110" y="228" text-anchor="middle" font-size="8">K⁺</text>
    <text x="102" y="305" text-anchor="middle" font-size="9" fill="#555">Extracellular [K⁺] low</text>

    <!-- Step 5 -->
    <rect x="210" y="185" width="175" height="130" rx="6" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
    <text x="297" y="202" text-anchor="middle" font-weight="bold" fill="#e53935">⑤ Dephosphorylation</text>
    <rect x="245" y="210" width="105" height="50" rx="8" fill="#ef9a9a" stroke="#e53935" stroke-width="2"/>
    <text x="297" y="230" text-anchor="middle" font-size="12" fill="#333">Pi released</text>
    <text x="297" y="250" text-anchor="middle" font-size="12" fill="#333">shape restores</text>
    <text x="297" y="270" font-family="Arial" font-size="8" fill="#e53935">Pi→</text>
    <text x="297" y="305" text-anchor="middle" font-size="9" fill="#555">Conformation closes</text>

    <!-- Step 6 -->
    <rect x="405" y="185" width="178" height="130" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
    <text x="494" y="202" text-anchor="middle" font-weight="bold" fill="#1565c0">⑥ 2 K⁺ Released (cytosol)</text>
    <rect x="438" y="210" width="112" height="50" rx="8" fill="#90caf9" stroke="#1565c0" stroke-width="2"/>
    <text x="494" y="230" text-anchor="middle" font-size="12" fill="#333">Pump resets</text>
    <text x="494" y="250" text-anchor="middle" font-size="12" fill="#333">ready for Na⁺</text>
    <circle cx="465" cy="275" r="6" fill="#ff8f00"/><circle cx="505" cy="270" r="6" fill="#ff8f00"/>
    <text x="494" y="305" text-anchor="middle" font-size="9" fill="#555">[K⁺] high inside</text>
  </g>

  <!-- Flow arrows between steps -->
  <g stroke="#333" stroke-width="2" fill="none" marker-end="url(#na)">
    <defs><marker id="na" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#333"/></marker></defs>
    <line x1="190" y1="105" x2="205" y2="105"/>
    <line x1="385" y1="105" x2="400" y2="105"/>
    <line x1="520" y1="165" x2="520" y2="200" stroke="#e53935"/>
    <line x1="190" y1="250" x2="205" y2="250"/>
    <line x1="385" y1="250" x2="400" y2="250"/>
    <line x1="60" y1="250" x2="40" y2="165" stroke="#1a6b3c"/>
  </g>

  <text x="300" y="340" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">3 Na⁺ OUT : 2 K⁺ IN per ATP · Electrogenic pump (net negative inside)</text>
</svg>