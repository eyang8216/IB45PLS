<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" width="600" height="520">
  <rect width="600" height="520" fill="#fff"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#333">Stomatal Opening and Closing</text>

  <!-- OPEN STOMA -->
  <text x="150" y="60" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a6b3c">STOMA OPEN</text>

  <rect x="30" y="75" width="240" height="200" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <!-- Guard cells - turgid, curved -->
  <path d="M100,170 Q100,110 135,120 Q150,130 135,170" fill="#a5d6a7" stroke="#1a6b3c" stroke-width="2.5"/>
  <path d="M200,170 Q200,110 165,120 Q150,130 165,170" fill="#a5d6a7" stroke="#1a6b3c" stroke-width="2.5"/>
  <!-- Pore open -->
  <rect x="138" y="118" width="24" height="60" rx="3" fill="#fff" stroke="#1a6b3c" stroke-width="1"/>

  <text x="90" y="90" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">K⁺ pumped IN</text>
  <text x="90" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Water follows</text>
  <text x="90" y="116" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Cells TURGID</text>
  <text x="220" y="90" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">Guard cells</text>
  <text x="220" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a6b3c">bend apart</text>

  <text x="150" y="250" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a6b3c">CO₂ enters for photosynthesis</text>

  <!-- CLOSED STOMA -->
  <text x="450" y="60" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e53935">STOMA CLOSED</text>

  <rect x="330" y="75" width="240" height="200" rx="6" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
  <!-- Guard cells - flaccid, straight -->
  <rect x="360" y="120" width="20" height="70" rx="5" fill="#ef9a9a" stroke="#e53935" stroke-width="2"/>
  <rect x="420" y="120" width="20" height="70" rx="5" fill="#ef9a9a" stroke="#e53935" stroke-width="2"/>

  <text x="390" y="90" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">K⁺ pumped OUT</text>
  <text x="390" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Water leaves</text>
  <text x="390" y="116" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Cells FLACCID</text>
  <text x="510" y="90" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">Guard cells</text>
  <text x="510" y="103" text-anchor="middle" font-family="Arial" font-size="9" fill="#e53935">straighten</text>

  <text x="450" y="250" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53935">Conserves water at night</text>

  <!-- Mechanism summary -->
  <rect x="30" y="290" width="540" height="215" rx="6" fill="#f5f5f5" stroke="#333" stroke-width="1"/>
  <text x="300" y="315" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Mechanism (both panels)</text>

  <text x="50" y="340" font-family="Arial" font-size="10" font-weight="bold" fill="#1a6b3c">Opening (triggered by blue light):</text>
  <text x="60" y="358" font-family="Arial" font-size="10" fill="#333">1. Phototropin receptors detect blue light in guard cells</text>
  <text x="60" y="374" font-family="Arial" font-size="10" fill="#333">2. H⁺-ATPase pumps H⁺ out → electrochemical gradient</text>
  <text x="60" y="390" font-family="Arial" font-size="10" fill="#333">3. K⁺ channels open → K⁺ flows IN down gradient</text>
  <text x="60" y="406" font-family="Arial" font-size="10" fill="#333">4. Cl⁻ and malate²⁻ follow → solute concentration ↑</text>
  <text x="60" y="422" font-family="Arial" font-size="10" fill="#333">5. Water enters by osmosis → guard cells swell → turgid</text>
  <text x="60" y="438" font-family="Arial" font-size="10" fill="#333">6. Inner wall thick, outer thin → cells curve → pore OPENS</text>

  <text x="50" y="462" font-family="Arial" font-size="10" font-weight="bold" fill="#e53935">Closing: ABA (drought stress) → K⁺ exits → water leaves → flaccid → pore closes</text>
  <text x="50" y="482" font-family="Arial" font-size="9" fill="#333">Cell wall: Inner wall (facing pore) thick + rigid; Outer wall thin + flexible → curvature when turgid</text>
  <text x="50" y="498" font-family="Arial" font-size="9" fill="#333">Guard cells contain chloroplasts (blue-light sensing), unlike other epidermal cells</text>
</svg>
