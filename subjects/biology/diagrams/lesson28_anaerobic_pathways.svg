<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <rect width="600" height="500" fill="#fff"/>
  <text x="300" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#333">Anaerobic Respiration — Lactate &amp; Ethanol Fermentation</text>

  <!-- LEFT: Lactate -->
  <text x="155" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e53935">Lactate Fermentation (Animals)</text>

  <!-- Glucose -->
  <rect x="88" y="75" width="70" height="24" rx="5" fill="#ffcc80" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="123" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Glucose (C₆)</text>

  <line x1="123" y1="99" x2="123" y2="115" stroke="#333" stroke-width="2" marker-end="url(#ar5)"/>
  <defs><marker id="ar5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#333"/></marker></defs>

  <!-- Glycolysis -->
  <rect x="78" y="118" width="90" height="24" rx="4" fill="#c8e6c9" stroke="#43a047" stroke-width="1.5"/>
  <text x="123" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#43a047">Glycolysis</text>
  <text x="123" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#43a047" dy="0">(cytoplasm)</text>

  <line x1="123" y1="142" x2="123" y2="162" stroke="#333" stroke-width="2" marker-end="url(#ar5)"/>

  <!-- 2 Pyruvate -->
  <rect x="73" y="165" width="45" height="22" rx="4" fill="#ffcc80" stroke="#ff8f00" stroke-width="1"/>
  <text x="95" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Pyruvate</text>
  <rect x="128" y="165" width="45" height="22" rx="4" fill="#ffcc80" stroke="#ff8f00" stroke-width="1"/>
  <text x="150" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Pyruvate</text>

  <!-- ATP generated -->
  <text x="123" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ff8f00">→ 2 ATP (net)</text>

  <!-- NADH regeneration arrow -->
  <line x1="95" y1="187" x2="95" y2="215" stroke="#333" stroke-width="1.5" marker-end="url(#ar5)"/>
  <line x1="150" y1="187" x2="150" y2="215" stroke="#333" stroke-width="1.5" marker-end="url(#ar5)"/>

  <rect x="60" y="218" width="126" height="24" rx="4" fill="#ffcdd2" stroke="#e53935" stroke-width="1.5"/>
  <text x="123" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e53935" font-weight="bold">2 NADH → 2 NAD⁺</text>

  <line x1="95" y1="242" x2="95" y2="265" stroke="#333" stroke-width="1.5" marker-end="url(#ar5)"/>
  <line x1="150" y1="242" x2="150" y2="265" stroke="#333" stroke-width="1.5" marker-end="url(#ar5)"/>

  <!-- 2 Lactate -->
  <rect x="70" y="268" width="45" height="24" rx="5" fill="#ff8a80" stroke="#e53935" stroke-width="2"/>
  <text x="92" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">Lactate</text>
  <rect x="130" y="268" width="45" height="24" rx="5" fill="#ff8a80" stroke="#e53935" stroke-width="2"/>
  <text x="152" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">Lactate</text>

  <text x="123" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e53935">Enzyme: Lactate Dehydrogenase</text>
  <text x="123" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Muscle cells, RBCs</text>

  <!-- Divider -->
  <line x1="310" y1="70" x2="310" y2="340" stroke="#ddd" stroke-width="1.5"/>

  <!-- RIGHT: Ethanol -->
  <text x="460" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6a1b9a">Ethanol Fermentation (Yeast/Plants)</text>

  <rect x="393" y="75" width="70" height="24" rx="5" fill="#ffcc80" stroke="#ff8f00" stroke-width="1.5"/>
  <text x="428" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Glucose (C₆)</text>

  <line x1="428" y1="99" x2="428" y2="115" stroke="#333" stroke-width="2" marker-end="url(#ar5)"/>

  <rect x="383" y="118" width="90" height="24" rx="4" fill="#c8e6c9" stroke="#43a047" stroke-width="1.5"/>
  <text x="428" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#43a047">Glycolysis</text>

  <line x1="428" y1="142" x2="428" y2="162" stroke="#333" stroke-width="2" marker-end="url(#ar5)"/>

  <rect x="378" y="165" width="45" height="22" rx="4" fill="#ffcc80" stroke="#ff8f00" stroke-width="1"/>
  <text x="400" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Pyruvate</text>
  <rect x="433" y="165" width="45" height="22" rx="4" fill="#ffcc80" stroke="#ff8f00" stroke-width="1"/>
  <text x="455" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Pyruvate</text>

  <text x="428" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ff8f00">→ 2 ATP (net)</text>

  <!-- Step 1: Decarboxylation -->
  <line x1="400" y1="187" x2="400" y2="215" stroke="#333" stroke-width="1.5" marker-end="url(#ar5)"/>
  <line x1="455" y1="187" x2="455" y2="215" stroke="#333" stroke-width="1.5" marker-end="url(#ar5)"/>

  <rect x="370" y="218" width="116" height="24" rx="4" fill="#ede7f6" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="428" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6a1b9a" font-weight="bold">Pyruvate Decarboxylase</text>
  <text x="428" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6a1b9a" dy="0">( → 2 CO₂ released)</text>

  <!-- CO2 off -->
  <text x="495" y="228" font-family="Arial, sans-serif" font-size="8" fill="#e53935">CO₂ ↑</text>

  <line x1="400" y1="242" x2="400" y2="260" stroke="#333" stroke-width="1.5" marker-end="url(#ar5)"/>
  <line x1="455" y1="242" x2="455" y2="260" stroke="#333" stroke-width="1.5" marker-end="url(#ar5)"/>

  <!-- Acetaldehyde -->
  <rect x="375" y="263" width="50" height="20" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="400" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">Acetaldehyde</text>
  <rect x="430" y="263" width="50" height="20" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="455" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">Acetaldehyde</text>

  <!-- NADH regeneration -->
  <line x1="400" y1="283" x2="400" y2="305" stroke="#333" stroke-width="1.5" marker-end="url(#ar5)"/>
  <line x1="455" y1="283" x2="455" y2="305" stroke="#333" stroke-width="1.5" marker-end="url(#ar5)"/>

  <rect x="360" y="308" width="136" height="24" rx="4" fill="#ede7f6" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="428" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6a1b9a" font-weight="bold">Alcohol Dehydrogenase</text>
  <text x="428" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6a1b9a" dy="0">2 NADH → 2 NAD⁺</text>

  <line x1="400" y1="332" x2="400" y2="348" stroke="#333" stroke-width="1.5" marker-end="url(#ar5)"/>
  <line x1="455" y1="332" x2="455" y2="348" stroke="#333" stroke-width="1.5" marker-end="url(#ar5)"/>

  <rect x="375" y="351" width="50" height="24" rx="5" fill="#ce93d8" stroke="#6a1b9a" stroke-width="2"/>
  <text x="400" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">Ethanol</text>
  <rect x="430" y="351" width="50" height="24" rx="5" fill="#ce93d8" stroke="#6a1b9a" stroke-width="2"/>
  <text x="455" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">Ethanol</text>

  <!-- Comparison box -->
  <rect x="30" y="365" width="540" height="125" rx="6" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="300" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#333" font-weight="bold">Comparison of Anaerobic Pathways</text>
  <line x1="200" y1="396" x2="200" y2="480" stroke="#ddd" stroke-width="1"/>

  <text x="115" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e53935" font-weight="bold">Lactate Fermentation</text>
  <text x="115" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">• Animals, some bacteria</text>
  <text x="115" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">• No CO₂ released</text>
  <text x="115" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">• 1 step: pyruvate → lactate</text>
  <text x="115" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">• Reversible (Cori cycle)</text>

  <text x="400" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6a1b9a" font-weight="bold">Ethanol Fermentation</text>
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">• Yeast, some plants</text>
  <text x="400" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">• CO₂ released (bread rises!)</text>
  <text x="400" y="464" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">• 2 steps: → acetaldehyde → ethanol</text>
  <text x="400" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">• Irreversible</text>
</svg>
