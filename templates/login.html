<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lessons — Login</title>
<style>
  :root {
    --bg: #fafaf8;
    --text: #1a1a1a;
    --muted: #777;
    --error: #c0392b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Georgia, 'Times New Roman', 'Palatino', serif;
    font-size: 17px;
    line-height: 1.7;
    color: var(--text);
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .login-container {
    background: white;
    border-radius: 16px;
    padding: 3rem 2.5rem;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
  }

  .login-icon {
    font-size: 3rem;
    margin-bottom: 0.8rem;
  }

  h1 {
    font-size: 1.8rem;
    color: #1a1a2e;
    margin-bottom: 0.3rem;
    font-weight: normal;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.95rem;
    margin-bottom: 2rem;
  }

  .form-group {
    margin-bottom: 1.2rem;
    text-align: left;
  }

  label {
    display: block;
    font-size: 0.85rem;
    color: #555;
    margin-bottom: 0.3rem;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-weight: 600;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 1rem;
    font-family: inherit;
    transition: border-color 0.2s;
    outline: none;
    background: #fafaf8;
  }

  input:focus {
    border-color: #1a1a2e;
    background: white;
  }

  .btn {
    width: 100%;
    padding: 0.85rem;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1.05rem;
    cursor: pointer;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-weight: 600;
    transition: all 0.2s;
    margin-top: 0.5rem;
  }

  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 15px rgba(26,26,46,0.4);
  }

  .btn:active {
    transform: translateY(0);
  }

  .error {
    background: #ffeaea;
    color: var(--error);
    padding: 0.7rem 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    margin-bottom: 1.2rem;
    border: 1px solid #f5c6cb;
  }

  .footer {
    margin-top: 2rem;
    color: var(--muted);
    font-size: 0.78rem;
  }

  .footer a {
    color: #1a5276;
    text-decoration: none;
  }

  /* Prevent password managers from styling inconsistently */
  input:-webkit-autofill {
    -webkit-box-shadow: 0 0 0 30px #fafaf8 inset;
  }
</style>
</head>
<body>

<div class="login-container">
  <div class="login-icon">📚</div>
  <h1>Lessons</h1>
  <p class="subtitle">IB Study Hub — Economics · Chemistry · Physics · Math</p>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/login" autocomplete="off">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter your username"
             maxlength="50" required autofocus>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password"
             maxlength="128" required>
    </div>

    <button type="submit" class="btn">Sign In</button>
  </form>

  <div class="footer">
    <p>Secured with encrypted passwords &middot; <a href="#">IB Study Hub</a></p>
  </div>
</div>

</body>
</html>
